body:
  text: 古杭雲棲寺弟子廣伸述二明唯識性二初本論二論釋初本論若有三性如何世尊說一切法皆無自性頌曰即依此三性立彼三無性故佛密意說一切法無性初即相無性次無自然性後由逺離前所執我法性此諸法勝義亦即是真如常如其性故即唯識實性二論釋二初正釋二結示初正釋三初釋首一頌二釋次一頌三釋後一頌初釋首一頌論曰即依此前所說三性立彼後說三種無性謂即相生勝義無性故佛密意說一切法皆無自性非性全無說密意言顯非了義謂後二性𨿽體非無而有愚夫於彼增益妄執實有我法自性此即名為徧計所執為除此執故佛世尊於有及無總說無性自此至不應依之至都無自性總說諸法都無自性詳釋三頌通無性顯實性也今釋首四句頌初順釋頌文四句二轉釋密意所以頌前難謂有性不合說無頌文答謂立無即依於有今順文論曰即依此前所說三性立彼後說三種無性非離此立彼捨前而後外有而無說相無性生無性勝義無性也故佛密意說一切法皆無自性非性全無密意之言顯非了義耳非全無者徧計是無後二依圓體非是無體既非無說一切皆無者以有愚夫於彼依圓體上增益妄執實有我法自性此我法性名徧計所執佛為除此執故於有及無總說為無使速去其有執耳豈可滯於言說不明說中之意耶問何謂了義曰了者顯了而不覆密究竟而無餘剩如雙明三性三無性即無葢覆三無則不有三性則不無不有不無中道究竟是無餘剩故二釋次一頌云何依此而立彼三謂依此初徧計所執立相無性由此體相畢竟非有如空華故依次依他立生無性此如幻事託眾緣生無如妄執自然性故假說無性非性全無依後圓成實立勝義無性謂即勝義由逺離前徧計所執我法性故假說無性非性全無如太虚空𨿽徧眾色而是眾色無性所顯𨿽依他起非勝義故亦得說為勝義無性而濫第二故此不說初徴次釋三簡徴云云何依此三性立彼三無性耶釋云謂依初立相無性由徧計體相畢竟非有如空中華故如繩上故如華嚴云一切空無性即相無性妄心分別有即徧計所執也依次立生無性由依他如幻事託眾緣生無如妄執自然性故假說無性非性全無如華嚴云如理而觀察一切皆無性是也依後立勝義無性謂即勝義中無我法性故亦是假說非性全無如太虚空𨿽徧眾色是眾色無性所顯故亦曰無性如華嚴云若實若非實若妄若非妄皆是假說是也假說正佛密處無不礙有意耳然恐難云無前徧計名勝義無性依他𨿽非圓成非前徧計亦得說為勝義無性此不言者何也簡云濫第二故不說意以立圓成為勝義無性更立依他則第三勝義無性濫第二生無性矣是以畧之三釋後一頌二初釋前二句二釋後二句初釋前二句此性即是諸法勝義是一切法勝義諦故然勝義諦畧有四種一世間勝義謂蘊處界等二道理勝義謂苦等四諦三證得勝義謂二空真加四勝義勝義謂一真法界此中勝義依最後說是最勝道所行義故為簡前三故作是說此諸法勝義亦即是真如初釋初一句次析諦差別三舉頌簡非頌文曰此諸法勝義謂此非全無之性即是諸法勝義以是一切法勝義諦故曰即是諸法勝義也但勝義之言渾含多種意𨿽案下真如詞既未分不知依何勝義而說故析云然勝義諦畧有四種一世間勝義二道理勝義三證得勝義四勝義勝義此四勝義對四世俗言四世俗者一世間世俗二道理世俗三證得世俗四安立世俗世間勝義者謂蘊處界等正因緣生法簡非㝠諦自性等曰世間勝義宗鏡名體用顯現諦言蘊等有實體用過於世俗曰勝義隨事差別說名蘊等曰顯現也道理勝義者苦等四諦悉皆實是所迷所證曰道理勝義宗鏡名因果差別諦言智斷修證因果別故證得勝義者二空真如正智所顯由修而成曰證得勝義宗鏡名依空顯實諦真如實理依彼二空之門顯故勝義勝義者一真法界是大總相法門體義無可過曰勝勝宗鏡名詮談㫖諦葢不落言詮勝義之中真勝義性故世間世俗者即假名無實諦如軍林等道理世俗者即隨事差別諦謂蘊處界等證得世俗者即方便安立諦謂預流等安立世俗者即假名非安立諦謂二空真如是則勝義第四絕待之真世俗第一我法之妄前三相對第一已勝世間况具彼第二第二已勝道理况具彼第三第三已勝證得况具彼第四此之第四殊勝殊勝無可與對諦名詮談㫖良有以也是故得㫖者一心融萬萬有何莫非心翳眼觀空晴空安得無翳彼佛未出世外道立神我㝠諦等真翳眼也二釋後二句真謂真實顯非虚妄如謂如常表無變易謂此真實于一切位常如其性故曰真如即是湛然不虚妄義亦言顯此復有多名謂名法界及實際等如餘論中隨義廣釋此性即是唯識實性謂唯識性畧有二種一者虚妄謂徧計所執二者真實謂圓成實性為簡虚妄說實性言復有二性一者世俗謂依他起二者勝義謂圓成實為簡世俗故說實性初釋後頌第二句次釋後頌第四句釋第三句中三叚初重釋真如二正釋三句三重釋亦字虚是無體如空華夢境毫無有實妄是有體如鍮銅燕石假偽不真變遷改易轉移非虚妄釋真無改易表如皆約以詮體也于一切位常如其性者色心之位有異此性無異染淨之位有異此性無異如過去空常如現未空此方空常如彼方空曰于一切位常如其性唯識實性不但簡徧計之虚妄非實亦簡依他之世俗非勝故曰勝義中真勝義諦二結示三頌總顯諸契經中說無性言非極了義諸有智者不應依之總諸法都無自性觀結于三頌之總顯當察文言之義趣如誡于智者之不應唯依于唯識之實性矣以上第二明唯識性一大竟三明唯識位二初串釋長行二分釋偈頌初串釋長行二初總標問答二別釋種悟初總標問答如是所成唯識相性誰于幾位如何悟入謂具大乘二種性者畧于五位漸次悟入自此而下皆串本論之文而為釋也即如此叚共三十二字二十五字是本文于本文上加謂大乘種者漸次之七字而便成答詞矣下文二叚一一皆對三十論文檢之可知如是所成唯識相性是躡前誰于幾位如何悟入是正問誰問人品幾位問階級如何悟入問方法意謂何等人品于何階級如何用心而能悟入謂具大乘等答也具大乘二種性者是標答誰字畧于五位是標答幾位漸次悟入是標答如何悟入也噫悟入曰漸次漸次曰五位不入位從何漸悟入耶聖人之大寳曰位無位即天魔外道混亂失真而無可慿據者矣今叅禪妄言悟道者敢請以五位自考若曰我頓悟也何位何漸之有殊不知頓中自有淺深是亦頓中之漸次也位如空中鳥跡不既有明徴乎悟須直登初地不既有德山之語乎吾早曾經多劫修言猶在耳也幸一平氣而深思之哉二別釋種悟二初釋種性二釋悟入初釋種性何謂大乘二種種性一本性住種性謂無始來依附本識法爾所得無漏法因二習所成種性謂聞法界等流法已聞所成等熏習所成要具大乘此二種性方能漸次悟入唯識釋二種性竟誰字問也前問誰能悟入唯識性相答謂具大乘二種性者悟入今釋謂本性住種性習所成種性者方能漸次悟入也無漏因種曰法爾所得者本自具足非新熏始有也法爾所得曰依附本識者第八為所依種子為能依故也依附本識曰無始已來者逺不可推莫測其肇端之際也如有土處法爾有種非因種植始有曰無始法爾也熏習所成曰聞所成等者不獨聞熏兼思修之熏所成也聞所成等曰聞法界等流法已者修始于思思始于聞總曰聞所成種性又𨿽有法爾舊種若不聞正法因聞思修無此外緣新熏資𤼵之力亦不能悟故云要具此二方能漸次悟入不具則不能也由是觀之法爾種子無論矣今生不悟者其熏習不成之歟而此時更不加熏熏或不恒縱恒不密縱稍恒密而不堅強勇猛和盤轉無始慣習染惡之習則淨善熏習何由而成悟入何時而得反求于心不覺流泗滿襟悲痛無已既而憤勇忽興遂自要自誓兾同志者相與勉旃此行殊不可忽問何謂法界等流曰十二分教皆從法界平等而流又法界性善順惡違具諸功德此亦如是故名等流二釋悟入何謂悟入唯識五位一資糧位謂修大乘順解脫分二加行位謂修大乘順决擇分三通逹位謂諸菩所住見道四修習位謂諸菩所住修道五究竟位謂住無上正等菩提云何漸次悟入唯識謂諸菩于識相性資糧位中能深信解在加行位能漸伏除所取能取引𤼵真見在通逹位如實通逹修習位中如所見理修習伏斷餘障至究竟位出障圓明能盡未來化有情類復令悟入唯識相性釋五位竟上幾位之問釋漸次竟上如何之問也初釋悟入五位次釋漸次悟入五位漸次俱詳下文上串釋長行竟二分釋偈頌五初資糧位二加行位三通逹位四修習位五究竟位初資糧位二初本論二論釋初本論初資糧位其相云何頌曰乃至未起識求住唯識性于二取隨眠猶未能伏滅二論釋二初釋前二句二釋後二句初釋前二句論曰從𤼵深固大菩提心乃至未起順决擇識求住唯識真勝義性齊此皆是資糧位攝為趣無上正等菩提修習種種勝資糧故為有情故勤求解脫由此亦名順解脫分從此至下究竟對前長行是釋頌皆護法文今釋資糧首二句初釋資糧分齊次釋資糧所為分齊謂從具二種性𤼵深固大菩提心已來中間許多經歷乃至未起順决擇識時求住唯識真勝義性齊此皆資糧位攝前此後此非此位攝也所為謂于三賢位修福慧二事種種資糧為趣無上正覺菩提修習種種勝資糧故為諸有情纏縛欲使解脫而自先纏縛從井曷能救人故為自勤求解脫使他方能解脫行行不違𣵀槃曰順由此亦名順解脫分分支義因義解脫因之支分也為趣菩提是自利為有情故是利他又瑜伽謂資糧畧有二種一福二智福即施戒忍智即般若進定各通福智又菩提具四弘誓以趣無上即誓佛道資糧即誓法門有情即誓眾生解脫即誓煩𢚰在文可見二釋後二句二初畧釋二廣釋初畧釋此位菩依因善友作意資糧四勝力故于唯識義𨿽深信解而未能了能所取空多住外門修菩行故于二取所引隨眠猶未有能伏滅功力令彼不起二取現行畧釋二取隨眠猶未能伏滅之故也四勝力者佛果由于𤼵菩提心曰依因勝力疑惑除于真善知識曰依善友勝力退屈忘于作意勤求曰依作意勝力饑之𠑽于益己糧用曰依資糧勝力依因為內因善友為外緣內外𨿽具不作意勤求無上菩提猶有退屈三事畢具乃能修積種種福慧資糧曰依四勝力也洞徹本性曰能了對信解比量言著相于施等不少曰多住外門對理行無住之內門言也二取現行起于隨眠二取隨眠引于二取既引于二取必伏于二空行住外門不相對治故于二取所引隨眠猶未有能伏滅功力令彼隨眠不起二取現行故曰于二取隨眠猶未能伏滅若依攝論則云此位菩已能悟入大乘多聞熏習相續故名因依力已得奉事無量諸佛故名善友力已得一向决定勝解非諸惡友所能搖動故名作意力已得積集諸善根故名資糧力此位菩得此四種殊勝之力于唯識義能深信解𨿽能伏除二取麄煩現行而未了能所取空以彼𨿽能修菩行止觀力微取著外相未能忘捨故于二取所引種子及彼二取微細現行未能伏滅與前所釋大同小異二廣釋二初釋第三句二釋第四句初釋第三句八初正釋頌文二轉釋二障三分對諸識四簡對三心五對辨有異六對四無記七問答通妨八結定所斷初正釋頌文此二取言顯二取取執取能取所取性故二取習氣名彼隨眠隨逐有情眠伏蔵識或隨增過故名隨眠即是所知煩𢚰障種初釋二取二釋隨眠三指隨眠謂頌中此二取言非能所取名二取顯能所取之取名二取以執取能取所取性故意以煩𢚰所知二障能執相見等二之執執取二取得二取名也二取習氣名彼隨眠者定隨眠之名不約二取現行而立隨逐有情眠伏蔵識或隨增過故名隨眠者即名以釋隨眠之義也隨逐有情曰隨是相順不離意眠伏蔵識曰眠是隱蔵難見義或隨增過曰隨眠則眠是過義迷義隨眠則迷以增迷過而益過亦隨眠義即是所知煩𢚰障種者指定隨眠之所是也又隨眠轉相無量畧有十八一隨自境二隨他境三被損四不被損至十六能生多苦十七能生少苦十八不能生苦等細具論中二轉釋二障煩𢚰障者謂執徧計所執實我迦耶見而為上首百二十八根本煩𢚰及彼等流諸隨煩𢚰此皆擾𢚰有情身心能障𣵀槃名煩𢚰障所知障者謂執徧計所執實法迦耶見而為上首見疑無明愛恚慢等覆所知境無顛倒性能障菩提名所知障初釋煩𢚰二釋所知釋煩𢚰中先出所執次辨頭後釋其名所知亦然但于頭數不辨畧列惑名耳迦耶云身見謂我身之見此見非有徧計為實今執徧計所執之實也上首此為領袖故百二十八者辨根惑頭數有見有修見則頌曰根本煩𢚰貪等十欲界四諦各具十于上二界各除瞋七十二合百十二以此皆見道所斷於迷諦時是分別起故各別取數若修道斷者是俱生惑于迷諦時任運堅固唯取三界總數故頌云修道再除疑三見欲界總加六數筭上二除瞋各有五百二十八頭頭現除三謂邪見二取也欲既除四存六上二更除于瞋則三界修惑共有十六連見百一十二合曰百二十八也及彼等流隨煩𢚰者以根本各有隨煩𢚰故根隨皆煩𢚰者以皆擾𢚰有情身心曰煩𢚰能障𣵀槃寂滅常處生曰煩𢚰障實法對實我言執五蘊中實有主宰曰我執執五蘊一一皆實曰法執言慢等者亦等隨惑所知境即有為無為無顛倒性謂真如理覆所知境無顛倒性則諸法空相蔽矣能障菩提令智不生名所知障又煩𢚰即障是持業釋所知依主釋智障障所知故三分對諸識此所知障决定不與異熟識俱彼微劣故不與無明慧相應故法空智品與俱起故七轉識內隨其所應或少或多如煩𢚰說眼等五識無分別故法見疑等定不相應餘由意力皆容引起以所知與八種識論俱否也與異熟識斷不俱起與六七識隨應俱起與前五識有不俱起與同時意亦有引起不與異熟俱者其故有三以異熟微劣故則所知是著是勝可知所以然者煩𢚰對所知則煩𢚰著而勝以所知對異熟則所知著而勝矣著與微乖勝與劣悖自不俱矣此其一也又異熟以其微劣但與徧行五所相應不與別境相應所知是無明慧慧是別境豈得相應此其二也又所知是法執之障法空智是對障之治轉慧為智法空智品障治相違異熟亦空則法空智品與俱起故此其三也或多或少者第七所知唯是俱生根四隨八但有十二故名少第六所知根隨具二十六故名多如煩𢚰說者我法二障皆由根隨執我執法而分差別故六七所知皆如煩𢚰障說五無伺二分別故于法執中見疑根隨等定不相應餘煩𢚰障𨿽有不起而由同時意識之力皆容引起亦可五無稱量定不與法見慢疑等相應餘法貪法恚法無明由意識力皆容引起四簡對三心此障但與不善無記二心相應論說無明唯通不善無記性故癡無癡等不相應故于三心中簡善心相應也初正釋二引證三出故癡無癡等不相應故者善心定與無癡俱不善等定與癡俱如明與暗决定不俱故所知障但與不善無記相應五對辨有異煩𢚰障中此障必有彼定用此為所依故體𨿽無異而用有別故二隨眠隨聖道用有勝有劣斷惑前後對辨有異者二障對辨煩𢚰中有所知體同用異而斷亦異也定用此為所依者如迷杌方謂為人迷繩方謂為人定用杌繩為所依故恐有問云二障體無有異聖道斷二隨眠云何前後不同故答云體𨿽無異而執我執法用有差別故二隨眠隨聖道用之勝者先斷所知後斷煩𢚰聖道用之劣者先斷煩𢚰後斷所知也又見道位生空觀勝法空觀劣修道位中法空觀勝生空觀劣隨勝劣為斷之先後耳六對四無記此于無覆無記性中是異熟生非餘三種彼威儀等𫝑用薄弱非覆所知障菩提故此名無覆望二乘說若望菩亦是有覆以所知對四無記辨定是非也謂所知與六七俱六七又依真異熟起名異熟生故于四無記中唯是異熟生無記非餘工巧威儀變化三種無記以彼三𫝑用薄弱非覆所知障菩提故也恐問前云覆所知境名所知障今何復名無覆故答云此名無覆望二乘說以二乘但斷煩𢚰不障彼智故名無覆若對菩是障彼智亦是有覆又此無記分上中下具如別釋七問答通妨若所知障有見疑等如何此種契經說為無明住地無明增故總名無明非無見等如煩𢚰種立見一處欲色有愛四住地名豈彼更無慢無明等初問次答問意云經說五住煩𢚰此障種子名無明住地若所知障有見疑等此經何不及其餘耶答謂無明增故總名無明非無見等例之如煩𢚰種屬惡見者立見一切住屬三界攝者立為欲愛住色愛住無色愛住豈煩𢚰唯見愛更無慢無明等耶亦由煩𢚰障中愛見最盛故偏說耳八結定所斷如是二障分別起者見所斷攝任運起者修所斷攝二乘但能斷煩𢚰障菩俱斷永斷二種唯聖道能伏二現行通有漏道初結二障斷通見修二結二障斷別大小三結二種斷唯聖道四結二現伏通有漏見所斷者是初地修所斷者二地至金剛心唯聖道能者以雙斷二種唯等覺後心剎那頓斷入究竟位唯無漏道故通有漏者謂伏二障分別現行當在加行位若伏第六識二障俱生當在第四地若伏第七識二障俱生當在第八地八地純是無漏四地尚間有漏加行正在有漏故云通有漏也二釋第四句四初正釋頌義二明地所攝三明所修行四明退不退初正釋頌義菩住此資糧位中二麄現行𨿽有伏者而于細者及二隨眠止觀力微未能伏滅釋頌文猶未能伏滅也曰𨿽有伏者麄亦未能盡伏况細及種子乎以止觀力微治不勝障故伏滅之未能耳二明地所攝此位未證唯識真如後勝解力修諸勝行應知亦是解行地攝解行地者信解行證分四此位既未證真自非證地未至加行亦非行地然以依勝解力修諸勝行亦是解行地攝且解行地該資糧加行二種故問曰勝解曰勝解力當何指陳曰此位菩不著果報不破禁戒于苦不動于修不懈障因不生心專志一即能于諸法决定了知唯識曰勝解不可移轉曰勝解力修諸勝行下文自明三明所修行所修勝行其相云何畧有二種謂福及智諸勝行中慧為性者皆名為智餘名為福且依六種波羅蜜多通相皆二別相前五說為福德第六智慧或復前三唯福德攝後一唯智餘通二種復有二種謂利自他所修勝行隨意樂力一切皆通自他利行依別相說六到彼岸菩提分等自利行攝四種攝事四無量等一切皆是利他行攝如是等行差別無邉皆是此中所修勝行於福智自他約通別明勝行之相也初徴二釋三結徴意以相辨不精行門不著不唯加行無階有志于資糧者何所矜式耶故特徴也釋中先以福智攝勝行次以自他攝勝行福智攝者諸勝行中慧為性者皆名為智餘名為福且依六波羅蜜多通相皆二度度福智別相前五福德第六智慧或復前三唯福德攝後一唯智慧攝餘進禪二通于福智謂為智慧而行精進是智慧資糧為福德而行精進是福德資糧緣四無量而修靜慮是福德資糧為由得智慧而修靜慮是智慧資糧以此進禪歷于諸度福智皆然也自他攝者所修勝行隨意樂力一切皆通自他利行別則六到彼岸三十七品菩提分等是自利行攝布施愛語利行同事四種攝事及慈悲喜捨四無量等皆是利他行攝結云如是等行差別無邉皆是此中所修勝行其相如此四明退不退此位二障𨿽未伏除修勝行時有三退屈而能三事練磨其心于所證修勇猛不退一聞無上正等菩提廣大深逺心便退屈引他已證大菩提者練磨自心勇猛不退二聞施等波羅蜜多甚難可修心便退屈省己意樂能修施等練磨自心勇猛不退三聞諸佛圓滿轉依極難可證心便退屈引他麄善况己妙因練磨自心勇猛不退由斯三事練磨其心堅固熾然修諸勝行約練磨于退屈以明勝行之相也初標次釋三結標云三退屈三練磨釋云一名菩提廣大屈引他况己練謂聞無上正等菩提廣莫邉涯大而無上深不可測逺無盡時心便退屈即引他已證大菩提者練磨自心勇猛不退如攝論云十方世界諸有情念念速證善逝果彼既丈夫我亦爾不應自輕而退屈二名萬行難修屈省己增修練謂聞施等波羅蜜多甚難可修心便退屈即便省察我已獲得如是意樂離慳貪恚等𡚁惡少加功用即得圓滿由此能修施等練磨自心勇猛不退如攝論云汝昔惡道經多劫無益勤苦尚能超今行少善得菩提大利不應生退屈三名轉依難證屈引麄况妙練謂聞諸佛圓滿轉依極難可證心便退屈引他人天麄善尚感富樂况我所修清淨妙善之因而無果耶練磨其心勇猛不退如攝論云博地一切諸凢夫尚擬逺證菩提果汝已勤苦經多劫不應退屈𨚫沉淪結云由斯三事練磨其心堅固熾然修諸勝行是則修諸福智自他二利固名勝行能于種種退屈中種種練磨之不退乃所以為勝行也故行人不患有退屈特患無練磨耳今有以惟攻睡眠曰打七名練磨者果得謂練磨也乎哉二加行位二初本論二論釋初本論次加行位其相云何頌曰現前立少物謂是唯識性以有所得故非實住唯識二論釋八初結前原後立名二總顯加行體義三別釋加行名義四總結加行名義五承前屬對頌文六依位辨惑伏義七明位所觀二諦八根滿依起定界初結前原後立名論曰菩先于初無數劫善備福德智慧資糧順解脫分既圓滿已為入見道住唯識性復修加行伏除二取謂煖頂忍世第一法此四總名順决擇分順趣真實决擇分故近見道故立加行名非前資糧無加行義從此至世第一法雙印二空皆釋加行名義也然不即解頌文者位所由來不明位之名義不現故先結前原後立名次總顯名體更別釋名義後方屬對頌文則頌意不求顯而自顯也結前原後立名者初至既圓滿已是結前次至伏除二取是原後末至無加行義是立名煖頂忍世第一立別名也順解脫分立總名也加行立通名也順趣真實决擇分故者滅一切疑曰真實决能分別四聖諦法曰真實擇加行於此真實𨿽未即入然能行行不離不逆曰隨順趣入真實决擇也曰近見道故立加行名則逺見道故立資糧名也可知非前資糧無加行義則非今加行無資糧也又可知然總意是前第一阿僧祗劫福智資糧已圓滿矣又修加行果何所為為入見道特加添功行曰四加行由進于道可至于道也亦名順决擇分由順于道可入于道也非前資糧全無加行去道尚逺但可名資糧非此加行不是資糧去道既近正當于加行資糧有加行攝于資糧加行有資糧但攝于加行耳二總顯加行體義煖等四法依四思四如實智初後位立四思者思名義自性差別假有實無如實徧知此四離識及識非有名如實智名義相異故別求二二相同故合思察初標體二正釋三通難承上四法依何而立故云依四思四如實智初後位立依初四思位立煖頂依後四如實位立忍世第一初即下義後即上義依下思立煖依上思立頂依下如實立忍依上如實立世第一如後𤼵下𤼵上等是也又此思如實即煖等體四思謂思名思義思名義自性思名義差別名即能詮義即所詮名詮自性句詮差別名中有自性差別義中亦有自性差別假有實無者以方便智了此名等唯意言境依識假立非實有故若能如實徧知所取名等離識非有及能取識亦不可得名四如實智如攝論云推求名唯是假立實不可得說名思若即于此果智生時决定了知假有實無名如實智如是于義自性差別說亦應爾恐問名義何故各別思名義自性差別何故合觀察耶故答云名義相異故別求名義與自性相同故合思察也思如實觀門詳具顯等問四加行位何于名義自性差別思耶答名義即名相妄想自存如實即正智如理自在迷名相以起妄想溺徧計而成轉流了名相契如理即依他以入圓成迷悟樞機聖凢關要故也又名如色受想等義如蘊處界等名義自性如色受想等名義自性名義差別如無常苦空等共相三別釋加行名義四初釋煖位二釋頂位三釋忍位四世第一初釋煖位依明得定𤼵下思觀無所取立為煖位謂此位中創觀所取名等四法皆自心變假施設有實不可得初獲慧日前行相故立明得名即此所獲道火前相故亦名煖依明得定至立為煖位釋前依初位立煖位也謂此位中創觀所取至實不可得轉釋𤼵下思觀無取也初獲慧日前行相故轉釋定名明得也即此所獲道火前相故亦名煖轉釋煖位也慧日前相者如日𨿽未出先有精色指三摩地中初得慧前方便智明也道火前相者如火𨿽未出先有𤍠氣指此位中先得智火前行相也問明得與思何別曰明得是定思是慧由定生慧曰𤼵以初對後而明尚未勝曰𤼵下也問思豈不是明曰思固明是明所𤼵故屬于慧明得𨿽照不離三三摩地故屬于定耳二釋頂位依明增定𤼵上思觀無所取立為頂位謂此位中重觀所取名等四法皆自心變假施設有實不可得明相轉盛故名明增思位極故復名頂依明增定至立為頂位釋前依後位立頂位也謂此位中重觀所取至實不可得轉釋𤼵上思觀無所取也明相轉盛故名明增轉釋明增定也思位極故復名頂轉釋頂位也思之智從明增𤼵對明得所𤼵為勝曰上思也三釋忍位依印順定𤼵下如實智于無所取决定印持無能取中亦順樂忍既無實境離能取識寧有實識離所取境所取能取相待立故印順忍時總立為忍印前順後立印順名忍境識空故亦名忍依印順定至亦順樂忍釋前依初位立忍位也既無實境至相待立故轉釋無所取無能取也印順忍時總立為忍者轉釋樂名忍印持亦名為忍以無能取中順樂忍可于心名為中忍于無所取决定印持名下忍故印前順後立印順名者轉釋印順定也忍境識空故亦名忍含釋上忍于忍空中也以上忍不但順樂于能取亦能忍空于能取之識故智名如實對前二思之方便言也定𤼵實智曰下以創得智果對後之增上言也又忍即別境中勝解具印持决定順樂忍可今曰印順二皆備矣四世第一依無間定𤼵上如實智印二取空立世第一法謂前上忍唯印能取空今世第一法二空雙印從此無間必入見道故立無間名異生法中此最勝故名世第一法依無間定𤼵上如實智印二取空立世第一法釋前依後位立世第一位也謂前下忍印所取空中忍順能取空上忍唯印能取空猶涉次第今世第一法二空雙印不屬次第轉釋印二取空也從此無間必入見道立無間名轉釋無間定也異生法中此最勝故名世第一轉釋世第一也又定𤼵實智曰上對前創得之下為殊勝故也四總結加行名義如是煖頂依能取識觀所取空下忍起時印境空相中忍轉位于能取識如境是空順樂忍可上忍起位印能取空世第一法雙印空相總結四加脈絡貫串義易見也謂如是煖頂二位下上思觀名等四所取是空而未能印下忍于無所取𨿽决定印持于能取尚未能忍中忍于無能取能順樂忍可于心而猶未能印上忍于無能取則印空矣然而似屬次第唯世第一法能所二相雙印其空殊無先後四加之義總之若此五承前屬對頌文皆𭘧相故未能證實故說菩此四位中猶于現前安立少物謂是唯識真勝義性以彼空有二相未除𭘧相觀心有所得故非實安住真唯識理彼相滅已方實安住依如是義故有頌言菩于定位觀影唯是心義想既滅除觀唯自想如是住內心知所取非有次能取亦無後觸無所得初釋頌二引證屬對者以前釋名義屬于頌文而相對顯其義自明何則如上所明煖頂二位未能無相忍與第一亦未無相皆𭘧相故未能證實真如故說菩此四加行位中猶于現前安立少物心上變如而緣謂是唯識真勝義性也以彼前二位中有相未除後二位中空相未除𭘧相觀心有所得故非實安住真唯識理然必如何安住耶彼相滅已方實安住以相滅無物無物無得無得真現真現是實安住依如是義故有頌言菩于定位觀影唯是心此即煖位義想既滅除觀唯自想此即頂位如是住內心知所取非有即中下二忍次能取亦無即上忍位又合上三句即世第一位後觸無所得即見道位世親攝論釋云菩于定位觀影唯是心者謂觀似法似義影像唯是其心義想既滅除觀唯自想者謂此位中義想既遣觀似義似法之相唯是自心如是住內心者能攝自心住于無義即是令心住于內心知所取非有者謂了所取義無所有次能取亦無者由所取既是非有故能取心能取性亦不能成後觸等者謂從此後觸證真如無所得故名無所得又末句即上彼相滅已方實安住六依位辨惑伏義此加行位未遣相縛于麄重縛亦未能斷唯能伏除分別二取違見道故于俱生者及二隨眠有漏觀心有所得故有分別故未全伏除全未能滅辨此位伏斷之惑也相縛即少物謂空有二相麄重即分別二障種子二取即分別二障現行俱生二障俱生現行也及二隨眠俱生種子也未全伏除者于二障俱生現行未全伏除也全未能滅者二障俱生種子全未能滅也有所得有分別未全伏滅之故也脈絡是加行位未遣相縛于分別二障麄重亦未能斷唯能伏除分別二障現行以麄