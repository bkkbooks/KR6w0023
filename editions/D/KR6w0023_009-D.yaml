羅蜜多現在前故也極而言之生是凢夫行𣵀槃是二乘行生𣵀槃是菩魔事智論云除諸法實相餘皆魔事今引無分別最勝般若現前則能契實相而逺魔事矣七逺行七逺行地至無相住功用後邉出過世間二乘道故承前六地如瑜伽云前地𨿽能多住無相作意而未能令無相作意無間無多修習住為令滿故次云逺行地善修證故入至無相住功用後邉後邉者世間二乘名前名近今則出過世間二乘道故曰後曰逺也又從前逺來起無相行至功用邉名後此功用行邉能逺至後位亦名後也故瑜伽云已入七地菩于有加行無間無相界作意能極逺入于加行道已到究竟正深密所謂能逺證入無無間無相作意與清淨地共相鄰接名逺行地也八不動八不動地無分別智任運相續相用煩𢚰不能動故承前七地如瑜伽云𨿽于無相作意無間無多修習位而未能于無相中捨離功用又未能于相自在修習得滿且前三地𭔃同世間次四地𭔃同三乘今地𭔃同一乘故次言不動地不動者煩𢚰名相用不起分別名無相分別纔起名相煩𢚰捨離功用名無功用行一有功用名用煩𢚰前六地為相用所動第七𨿽得無相猶住無相功用今此地中報行純熟無分別智于無相觀任運無間任運故用不能動相續故相不能動故云相用煩𢚰不能動曰不動地也深密亦云由于無相得無功用于諸法中不為現前煩𢚰所動是也九善慧九善慧地成就微妙四無礙解能徧十方善說法故承上八地如瑜伽意云前𨿽無相住中捨離功用亦能于相自在而未能于異名眾相訓詁差別一切品類宣說法中得大自在為令此分得圓滿故次云九地四無礙者一法無礙解了知一切法句故二義無礙解通逹一切義理故三辭無礙解分別一切言辭故四樂說無礙解喜樂而說隨所宜故能徧十方善說法故者如莊嚴論云九地中四無礙解最為殊勝云何勝耶謂此菩于一剎那普答三千大千世界所有人天異類異音異義問此菩能以一音普答眾問徧斷眾疑由此觀之如是善說乃名最勝如是最勝即微妙義如是微妙故名善慧十法雲十法雲地大法智雲含眾德水䕃蔽一切如空麄重𠑽滿法身故承上九地如瑜伽云𨿽于一切品類宣說法中得大自在而未能得圓滿法身現前證受令精勤修習已得圓滿故次言法雲地法雲者總緣一切諸法之智曰大法智滿證法身之智亦大法智也陀羅尼門諸三昧門曰眾德曰大法智雲含眾德水者智能蔵彼眾德如雲含水有生彼勝功能故也麄重即所知少分及煩𢚰惑種麄重如空者喻廣大義䕃蔽隔斷義䕃蔽一切如空麄重充滿法身者謂此智能䕃蔽廣大之惑不令障礙如攝論云又如大雲覆隱如空廣大無邉惑智二障故又此智充滿所證所依法身猶如大雲充滿虚空故問瑜伽云麄重之身廣如虚空法身圓滿譬如大雲與法身如空智如雲異者何也曰約寂曰法身約照曰智身全寂全照法滿智滿故言別而義相融也然總其要畧前地𨿽得說法自在法身未滿此則以智含德徧斷諸障徧證法身也二通釋如是十地總攝有為無為功德以為自性與所修行為勝依持令得生長故名為地通釋自性及地名也四智之中妙平二智既在因位必渉有為地地所證真如即是無為總攝此二功德以為十地自性然名為地者有依持生長義故今諸地與所修行為勝依持令得生長如本業經云地名為持能持百萬阿僧祇功德故亦名生成生成一切因果故是也二釋十行二初正釋十行二義類分別初正釋十行七初指行總標二別列數目三別明體性四別明依止五別不增減六別明次第七別明修滿初指行總標十勝行者即是十種波羅蜜多二別列數目施有三種謂財施無畏施法施戒有三種謂律儀戒攝善法戒饒益有情戒忍有三種謂耐怨害忍安受苦忍諦察法忍精進有三種謂被甲精進攝善精進利樂精進靜慮有三種安住靜慮引𤼵靜慮辦事靜慮般若有三種謂生空無分別慧法空無分別慧俱空無分別慧方便善巧有二種謂𢌞向方便善巧濟方便善巧願有二種謂求菩提願利樂他願力有二種謂思擇力修習力智有二種謂受用法樂智成熟有情智列十種名數使知各各有差別也前六各三後四各二施三者無染心捨資生具曰財施止損害濟驚怖曰無畏施無染心如實說法曰法施也戒三者諸惡莫作曰律儀戒眾善奉行曰攝善法戒無生不度曰攝眾生戒也忍三者如仙人忍惡王之割羅𬑟泣外道之打等乃是成熟有情之因曰耐害忍寒𤍠饑渴皆能忍受種種逼迫無有退轉乃是當來成佛之因曰安受忍如實觀察堪忍甚深廣大之法是前二忍所依止故曰諦察法忍也進三者立大誓願𫝑不可撓曰被甲精進方便進修綂諸善法曰攝善精進化利眾生無有止息曰利樂精進也禪三者得現法樂住離慢見愛得清淨故曰安住靜慮引𤼵六種神通殊勝功德曰引𤼵靜慮欲饒益諸有情類以能止息饑儉疾疫諸怖畏等苦𢚰故曰辦事靜慮也慧三者斷我執所證曰生空無分別慧斷法執所證曰法空無分別慧雙斷二執所執曰俱空無分別慧也方便二者所作施等不為自求𢌞向有情不住生曰𢌞向方便善巧為濟有情不專利己不住𣵀槃曰濟方便善巧也願二者佛道無上誓願成曰求菩提願眾生無邉誓願度曰利樂他願也力二者正思决擇應作不應作能伏一切正行等所對治障曰思擇力所修靜慮等有勝堪能無有怯弱善行决定曰修習力也智二者由施等六種成立此智復以此智成立六種而𦔳般若令所修滿足曰受用法樂智由此妙智能正了知此施戒等如所聞法饒益一切有情亦令受用大乘法樂曰成熟有情智也三別明體性此十性者施以無貪及彼所起三業為性戒以受學菩戒時三業為性忍以無瞋精進慧及彼所起三業為性精進以勤及彼所起三業為性靜慮但以等持為性後五皆以擇法為性說是根本後得智故有義第八以欲勝解及信為性願以此三為自性故此說自性若并眷屬一一皆以一切俱行功德為性明十行之性使不濫于差別之法也無貪謂無貪善根及彼所起者彼即無貪對所起三業曰能起又彼即行施時含此二義故云及彼所起三業為施性也受學菩戒時三業為性者言行善止惡之體不離三業清淨于受學之時也其實三戒俱備無瞋精進十一善中之二慧別境中慧及彼三業者通此三種如論謂耐害忍即以無瞋三業為性安受苦忍即以精進三業為性諦察法忍即以慧三業為性是也進禪可知五俱擇法為性者此五俱用七覺支中擇法一覺支為體良以論說第六是根本智後四皆後得智二智不離擇法故也願以欲等為自性者以無善欲善决定及與深信此願無由𤼵起故也眷屬者如施以無貪為體無貪俱行餘信慚等為眷屬乃至智以擇法為性擇法俱行心及心所為眷屬等也四別明依止此十相者要七最勝之所攝受方可建立波羅蜜多一安住最勝為要安住菩種性二依止最勝謂要依止大菩提心三意樂最勝謂要悲愍一切有情四事業最勝謂要具行一切事勝五巧便最勝謂要無相智所攝受六𢌞向最勝謂要𢌞向無上菩提七清淨最勝謂要不為二障間雜若非此七所攝受者所行施等非到彼岸由斯施等十對波羅蜜多一一皆應四句分別明行到彼岸之相使知簡別于行岸此彼之到否也初順標二正釋三反結四料簡要七最勝之所攝受方可建立波羅蜜多者意謂施等十行攝于七種最勝之內者方是到彼岸之行則世間及聲聞等所有施等可知矣七最勝者一安住二依止三意樂四事業五巧便六𢌞向七清淨安住最勝者謂要安住菩種性而行施等方是到彼岸之正因地若此外餘四種性但感人天有漏及二乘果非無上極果之正因矣依止最勝者謂要依止大菩提心而行施等方是到彼岸之正依止如經云不𤼵菩提心而行施等是為魔業是也意樂最勝者謂要悲愍一切有情而行施等方是到彼岸之正意樂否則秪自利而非兼利意樂矣事業最勝者謂要具一切事業萬行莊嚴方是到彼岸之事業不然則施等行寡不能滿足無上菩提矣巧便最勝者謂要無相智所攝受之施等方是到彼岸之巧便若無善巧方便不逹三輪體空住相之施等矣𢌞向最勝者謂要𢌞向無上菩提則行有所歸方是到彼岸之施等不然則諸行流入異途不至極果矣清淨最勝者謂要不為二障間雜而行施等方是到彼岸之淨行若三時悔心即名煩𢚰由不了故而悔即名所知此二間雜烏得清淨故結云若非此七所攝受者所行施等非到彼岸也四句者一是施非波羅蜜多謂離七最勝而行施等二是波羅蜜多非施謂依七最勝所集戒等三亦施亦波羅蜜多謂依七最勝所行施等四非施非波羅蜜多謂離七最勝而修戒等餘九一一皆有四句問𢌞向與依止既皆菩提何分二種曰依止是有道心然未必一一皆能𢌞向菩提又依止是行前之心𢌞向乃行後之心又𢌞向亦即是願故別開也問安住與依止似舉一可以該二以菩提種性即大菩提心故是以攝論亦止有六闕初安住今必用安住者何也曰一是無始種性一是𤼵菩提心故于種性曰安住于大心曰依止經云忘失菩提心修諸行業必落魔道夫𤼵後始得云忘豈非菩根性亦須時檢依止為要故別開也問上求下化曰大菩提心則依止足該意樂何必第三曰實如所問亦可不用第三但論意欲以即悲之智曰大菩提心而且目上求故以即智之悲曰意樂而特彰下化不分而分見意樂利生之為重耳豈徒繁名相已哉五別不增減二初通明增減二別明增減初通明增減此但有十不增減者謂十地中對治十障證十真如無增減故行但有十增不至多減不至少者謂此行于十地中所治之障唯十所證之如唯十能治能證依所治所證之數故無增減耳二別明增減二初明前六二明後四初明前六復次前六不增減者為除六種相違障故漸次修行諸佛法故漸次成熟諸有情故此如餘論廣說應知又施等三增上生道感大財體及眷屬故精進等二决定勝道能伏煩𢚰成熟有情及佛法故諸菩道唯有此二又前三種饒益有情施彼資財不損𢚰彼堪忍彼𢚰而饒益故精進等三對治煩𢚰𨿽未伏滅而能精勤修對治彼諸善加行永伏永滅諸煩𢚰故又由施等不住𣵀槃及由後三不住生為無住處𣵀槃資糧由此前六不增不減別約四義以明前六不增減也初約六障明不增減次約二道明不增減三約二利明不增減四約無住明不增減五總結前示不增減意以此波羅蜜多前六後四合之為十前六不增減者其義有四一約對治慳等六障自修益人而行六度故不增減二約施戒忍三于財體眷屬有增上生道進定慧三于伏惑二利有决定勝道而行六度故不增減三約施戒忍以益人進定慧以自益而行六度故不增減四約施戒忍是大悲不住𣵀槃進定慧是大智不住生而行六度故不增減也問進定慧等誰為伏惑誰成熟有情及佛法耶曰進伏煩𢚰修善方便故定熟有情依定𤼵通故慧成佛法佛法由慧故問前三饒益有情是利他後三能伏煩𢚰是利自而曰精進等三對治煩𢚰𨿽未伏滅等者何也曰恐有問言定能伏惑慧能破惑精進何能治煩𢚰耶故云精進于煩𢚰𨿽無伏惑之義然以勤修諸對治煩𢚰諸善加行故能令煩𢚰永滅是故亦得對治之名也二明後四後唯四者為𦔳前六令修滿足不增減故方便善巧𦔳施等三願𦔳精進力𦔳靜慮智𦔳般若令修滿故如解深密廣說應知明後法唯四之故益明不增減也初出故二正釋三引證謂前六已明後唯四者為𦔳前六令修滿足不增減故意顯四攝于六義隨六異耳𦔳令修滿者以施戒與忍為攝有情而方便善巧用施以攝之乃至方便善巧用忍以攝之則𦔳成此三令滿足之也如深密云謂諸菩于前三種波羅蜜多所攝有情以諸攝事方便善巧而攝受之安置善品是故我說方便善巧波羅蜜多與前三種而為𦔳伴願𦔳精進者意謂由正願故能破劣意願起精進修而滿足之也力𦔳靜慮者意謂諸菩親近善士聽聞正法如理作意為因緣故轉劣意樂成勝意樂亦得上界勝解名力波羅蜜多由此力故于內心住有所堪能故說力度𦔳定而令滿足之也智𦔳般若者意謂若諸菩已能聞法為緣善修習故能𤼵靜慮如是名智由此智故復能引𤼵出世間慧故說智𦔳般若而令滿足之也是則前六是正後四為𦔳𦔳正不增不減意葢如此上五別不增減一科竟六別明次第十次第者謂由前前引𤼵後後及由後後持淨前前又前前麄後後細故易難修習次第如是釋總別名如餘處說明十度次第使知有序也初正釋次第二別指釋名前前引𤼵後後者如深密謂能為後後引𤼵依故謂諸菩若于身財無所顧悋便能受持清淨禁戒為護戒故便修忍辱修忍辱已能𤼵精進修精進已能辦靜慮具靜慮已便能獲得出世間慧得出世慧故能行方便有慧方便已能𤼵大誓𤼵大願已于諸善品有所堪能有堪能已便能獲得受用法樂成熟有情之智此前後次第之當如是者一也後後持淨前前者由任持智波羅蜜多故能令力波羅蜜多清淨乃至由任持戒波羅蜜多故能令施波羅蜜多清淨此前後次第之當如是者二也又前前麄後後細者如施麄而戒細戒麄而忍細乃至力麄而智細前九並為前前從戒至智並名後後此前後次第之當如是者三也前前易修後後難修此前後次第之當如是者四也豈徒為次第已哉總名波羅蜜多別名施等如攝論等處說也七別明修滿此十修者有五種修一依止任持修二依止作意修三依止意樂修四依止方便修五依止自在修依此五修修習十種波羅蜜多皆得圓滿如集論等廣說其相明十波羅蜜修依五法得圓滿也一依止任持修任持義含四種謂種性因力自體報力本誓願力簡擇慧力此等皆能堪任執持依此種性等而修施等名依止任持修亦可即前第一最勝安住菩種性也二依止作意修作意亦含四種謂于波羅經教勝解作意于己得波羅蜜多勝功德起味愛作意于一切有情所行施等深生隨喜作意于自己當來勝品波羅蜜多深生願樂作意依此作意而修誓求菩提名依止作意修亦可即前第二最勝依止大菩提心也三依止意樂修意樂則含六種謂無厭廣大歡喜恩德無染好善之意樂也以此無厭足等起大慈悲憐愍一切有情志期度脫而修名依止意樂修亦可即前第三意樂最勝悲愍一切有情也四依止方便修方便秪含三種謂三輪觀察無分別智觀察施等施物施者受者三輪清淨依此方便而修名依止方便修亦可即前第五最勝巧便無相智也五依止自在修自在亦含三種謂身自在行自在說自在也地上菩分證法身得身自在隨類變現攝化眾生法行自在而以四無礙辯宣說無滯則說自在依此而修名依止自在修即前第七清淨最勝不為二障間雜等是也依此五修十種波羅蜜多皆得圓滿則不依此五修圓滿未必可知集論廣說引論證也已上第一正釋十行竟二義類分別二初正明二結示初正明六初自類相攝門二六十互攝門三所感五果門四三學相攝門五五位具修門六因位名異門初自類相攝門此十攝者謂十一一皆攝一切波羅蜜多互相順故依修前行而引後者前攝于後必待前故後不攝前不待後故依修後行持淨前者後攝于前持淨前故前不攝後非持淨故若依純雜而修習者展轉相望應作四句明自類通別之相攝也初總約通相明相攝二別約引𤼵明相攝三別約持淨明相攝四別約純雜明相攝通攝者凢舉一種皆攝十種以互相順故如捨內外身財是施方便此方便中若捨一切是施波羅蜜即于此中若慈悲心防一切損害逼迫𢚰亂他性是戒波羅蜜即于此中忍受礙損害疲倦是忍波羅蜜即于此中數數𤼵起勇勵施心是精進波羅蜜即于此中其心純善繫心一境不外流散是靜慮波羅蜜即于此中善取施行如實因果不取異見是慧波羅蜜如是乃至方便波羅蜜多皆隨其所應當善建立施既如此餘可例知矣故云檀度攝于六資生無畏法是也二別約依修前行而引後者前攝于後以後必待前故後不攝前以前不待後故也三別約依修後行持淨前者後攝于前以後持淨前故前不攝後以前非持淨故也四若依純雜修習展轉相望應作四句者單修一行名純兼修餘行名雜四句者一純修非雜二雜修非純三亦純亦雜四非純非雜如初地修施望餘戒等即是初句餘九專修戒等望于初地修施即是二句初地修施餘非不兼隨力隨分即第三句不一不兼是第四句也二六十互攝門此實有十而說六者應知後四第六所攝開為十者第六唯攝無分別智後四皆是後得智攝緣世俗故即攝以明六十開合之故也以後四是第六所攝本後二智合而為一故但言六開六為十者以第六攝根本無分別智後得攝後四種以皆緣世俗而生起故問第六唯攝無分別則智有所遺何可言六曰此以開論不應執合為難也是故合則根本含乎後得開則後得依于根本必合之者取簡盡故必開之者取義備故有卷舒有進退有縱橫故也三所感五果門此十果者有漏有四除離繫果無漏有四除異熟果而有處說具五果者或互相資或二合說明十行所感之果也初正釋二通妨有漏有四者謂異熟等流增上士用果也除離繫者有漏法中無無漏故無漏有四者謂離繫等流增上士用果也除異熟者無漏法中無有漏故何謂離繫等耶謂能永斷自所對治是諸波羅蜜離繫果于現法中由此施等攝受自他是士用果于當來世後後增上展轉生起是等流果大菩是增上果感大財富徃生善趣無無壞多諸喜樂有情中尊身無損害廣大宗是施等波羅蜜多異熟果也問漏與無漏各除一者何也答以此二果各屬一位故餘三通漏無漏故而有處說皆通于五者當知或約漏無漏互相資說或漏無漏合說義各有取爾也四三學相攝門五初戒學門二定學門三慧學門四判慧位五明相攝初戒學門十與三學互相攝者戒學有三一律儀戒謂正逺離所應離法二攝善法戒謂正修證應修證法三饒益有情戒謂正利樂一切有情此與二乘有共不共甚深廣大如餘處說此至相攝明十與三學之無礙也今明戒學初總徴相攝二正明戒門三對小引證前二可知此與二乘有共不共者律儀與共餘二不共以聲聞不能攝諸善法普利有情故即律儀一戒聲聞以止為持作為犯菩開隨宜共中尚有不共况不共乎如餘處說者如攝大乘論云復次畧有四種殊勝故此殊勝一由差別殊勝謂即此戒有三品別二由共不共殊勝戒與聲聞共不共故三由廣大殊勝學處福德修行證果俱廣大故四由甚深殊勝所學尸羅逆順甚深難可測故餘處更多故云如餘處說又須知律儀即斷德攝善即智德攝生即恩德四無畏不共法等亦不出此三德好心學道者特宜謹此二定學門定學有四一大乘光明定謂此能𤼵照了大乘理教行果智光明故二集福王定謂此自在集無邉福如王𫝑力無等雙故三賢守定謂此能守世出世間賢善法故四徤行定謂佛菩大徤有情之所行故此四所緣對治堪能引𤼵作業如餘處說明定學差別知所辨也一徃觀之初一定所𤼵慧中二定所集福末一定所具悲詳之如清涼云以即事而真智治于地前成初地令得賢守定以此三昧能守世出世間賢善法故前三地為世第四地為出世以既了即事而真能即散而定故二以即體之用智對治四地未能起用令得五地入俗成集福王定三以平等無相智對治五地𨿽能隨俗未得平等令得六七二地般若大光功用成大乘光明定四以平等無功用智對治七地功用令入八地乃至佛果得首楞嚴定所作究竟由此觀之第三當第一為初地至四地定第二當第二為五地定第一當第三為六七二地定第四當第四為第八地至佛地定故彼又云果既具四因亦通用也此四乃至如餘處說者即攝大乘論彼有六種差別一由所緣差別謂大乘法為所緣故二由種種差別謂大乘光明集福王定賢守徤行等三摩地種種無量故三由對治差別謂一切法總相緣智以楔出楔道理遣阿頼耶識中一切障麄重故四由堪能差別謂住靜慮樂隨其所欲而受生故五由引𤼵差別謂由引𤼵一切世間無礙神通故六由作業差別謂能振動熾然徧滿示現轉變徃來卷舒一切色像皆入身中所徃同類或隱或顯所作自在伏他神通施辨念樂放大光明引𤼵如是大神通故又能引𤼵諸難行事從一自誓難行誓受無上大菩提願故二不退難行生眾苦不能退故三不背難行一切有情𨿽行邪行而不棄故四現前難行有情所現作一切饒益行故五不染難行生在世間不為世法所染汙故六勝解難行于大乘中𨿽未能了然于一切廣大甚深生信解故七通逹難行具能通逹補特伽羅法無我故八隨覺難行于諸如來所說甚深秘密言詞能隨覺故九不離不染難行不捨生而不染故十加行難行能修諸佛安住解脫一切障礙竆生際不作功用常起一切有情一切義利行故由是觀之則今所謂四者即論第二差別也三慧學門慧學有三一加行無分別慧二根本無分別慧三後得無分別慧此三自性所依因緣所緣行等如餘處說明慧學多種亦知所辨也加行慧無分別者凖世親攝論釋是思慧又云希求慧由此能生無分別智是故亦得無分別智名根本無分別慧者擇論釋是正證慧又云內證慧又云加行是此智因後得是此智果後得無分別慧者攝論釋是起用慧又云攝持慧是無分別智之後得是故亦得無分別智名也此三自性乃至如餘處說者謂此三種慧一自性二所依三因緣四所緣五行相等者等六任持七𦔳伴八異熟九等流十出離十一究竟十二勝利十三差別十四作事十五甚深也此三性者無性釋云謂于真義不異計度以為自性此三所依者謂無分別智所依心非思義故亦非非心為所依止心種類故以心為因數習𫝑力引得此位名心種類此即顯示智所依心出過一切思量分別此三因緣者無性釋云謂于大乘言音熏習聽聞由此所引功能差別及如理作意等此三所緣者即是一切補特伽羅諸法無性所顯真如解脫增益損減二邉斯是無分別智所緣境界此三行相者無性釋云于所緣境相似而行故名行相無分別智真如境相相似而行離一切相作意行相以為行相三智差別者攝論云譬如啞人求受境界而未能受亦不能說如是加行無分別智求證真如而未能證寂無言說當知亦爾又如啞人正受境界無所言說如是根本無分別智正證真如離諸戲論當知亦爾如不啞人受諸境界亦起言說如是後得無分別智返照真如現證境界能起言教當知亦爾此即十三差別中釋今取于第五行相中使知行相有別耳其餘十種皆各有頌釋詳如第八卷中四判慧位如是三慧初二位中種具有三現唯加行于通逹位現二種三見道位中無加行故于修習位七地已前若種若現俱通三種八地以去現二種三無功用道違加行故所有進趣皆用後得無漏觀中任運趣故究竟位中現種俱二加行現種俱已捨故判三慧種現于諸位知所辨也資加二位具三慧種者以具法爾無漏種故現慧唯加行者以未證真如無本後二智之現行故通逹位中現行唯二慧者以初見道十五心中乍證真如其時促故無有加慧現行也修習位中從見道第十六心至七地已前漏無漏雜斷惑證果有加行故種現俱通三種慧也八地已去無功用道不假加行以修進違加行故所有進趣皆用後得作無漏觀任運趣進入餘位矣故無加行現慧唯二現也究竟位中金剛道後解脫道中加行現種俱已捨故種現唯根本後得也若總其要是資加二位三種具現行唯有加行慧通逹八地已上同二具三種加現空七地已前修習異三種三現俱不去究竟根後種現全加慧種現俱無與以上𨿽分四科總之皆三學之相也五明相攝若自性攝戒唯攝戒定攝靜慮慧攝後五若并𦔳伴皆具相攝若隨用攝戒攝前三資糧自體眷屬性故定攝靜慮慧攝後五精進三攝徧策三故若隨顯攝戒攝前四前三如前及守護故定攝靜慮慧攝後五正以四法明相攝也一自性二𦔳伴三隨用四隨顯自性者如戒以防非等為自性定以離散等為自性慧以照察等為自性各約當體言也𦔳伴者對正主言如戒為正主餘皆𦔳伴乃至慧為正主餘亦𦔳伴凢舉一法收一切也隨用者用謂業用隨體起故隨顯者顯即顯現義現前故若自性攝戒唯攝戒定唯攝定慧攝後五不出自體之外也若并𦔳伴此三學與十行一一皆相攝曰具攝若隨用攝戒攝前三以戒即自體施即戒之資糧忍即戒之眷屬性故定攝靜慮慧攝後五精進三攝徧策三故若隨顯攝戒攝前四前三如前及攝精進以守護戒能防非令清淨故定攝靜慮慧攝後五五五位具修門此十位者五位皆具修習位中其相最顯然初二位頓悟菩種通二種現唯有漏漸悟菩若種若現俱通二種已得生空無漏觀故通逹位中種通二種現唯無漏于修習位七地已前種現俱通有漏無漏八地以去種通二種現唯無漏究竟位中若現若種俱唯無漏明十行種現于五位中漏與無漏各不同也五位皆具十行修位相最顯者如初地施最增上乃至十地智最增上是也資加二位頓悟菩種通二種現唯有漏者以一類菩于前二位二障種現俱未伏滅直至初地頓斷分別二障種現名為頓悟故于初二位中所修勝行若種若現俱唯有漏然種亦通無漏者此指法爾無漏種言也漸悟菩種現俱通二種已得生空無漏觀故者謂地前已伏分別煩𢚰現行與生空所俱十行通無漏故然于俱生現行煩𢚰猶未永伏是故亦通有漏攝也通逹位中種通二種現唯無漏者已斷分別二障種故修習位中七地已前種現俱通有漏無漏者以生法二空有出有沒所修勝行應通二故八地以去種通二種現唯無漏者以生空智果純無漏故究竟俱唯無漏者有漏種現已永盡故六因位名異門此十因位有三種名一名波羅蜜多謂初無數劫爾時施等𫝑力尚微被煩𢚰伏未能伏彼由斯煩𢚰不覺現行二名近波羅蜜多謂第二無數劫爾時施等𫝑力漸增非煩𢚰伏而能伏彼由斯煩𢚰故意方行三名大波羅蜜多謂第三無數劫爾時施等𫝑力轉增能畢竟伏一切煩𢚰由斯煩𢚰永不現行猶有所知微細現種及煩𢚰種故未究竟明十行因位異名識所行也十行三名在文易曉分之名波羅蜜多正當資加二位以尚未見道依解修行但有到彼岸之名字而已近波羅蜜正當通逹修習七地已前𨿽漏無漏雜與大彼岸不逺故名近也大波羅蜜正當八地至十地中純是無漏名大猶未究竟者以有所知微細現種及煩𢚰種故未究竟二結示此十義類差別無邉恐厭繁文畧示綱要十于十地𨿽十皆修而隨相增地地修一𨿽十地行有無量門而皆攝在十到彼岸正結之則十義類差別無邉恐厭繁文畧示綱要勿便以此為詳盡也簡結之則十于十地𨿽實皆修而隨相增地地修一勿謂地地定局于十也廣結之則𨿽十行有無量而皆攝在十到彼岸勿謂此十攝法有不盡也已上二釋十行竟三釋十障二初正明十障二攝屬二障初正明十障十初異生障至十未得障初異生障五初通大小明斷二簡二道起別三明初地所斷四簡異小所斷五明亦斷俱生初通大小明斷十重障者一異生性障謂二障中分別起者依彼種立異生性故二乘見道現在前時唯斷一種名得聖性菩見道現在前時具斷二種名得聖性二真見道現在前時彼二障種必不成就猶明與暗定不俱生如秤兩頭低昂時等諸相違法理必應然是故二性無俱成失初釋異生性障所由立二顯大小乘斷之不同三以法喻貼合明必斷分別簡俱生種簡現行謂異生性障不依二障俱生現立俱生種立分別現立而依二障分別種子立也斷一種者二乘見道唯斷分別我執種現之一種斷二種者菩見道具斷我法分別種現之二種也無俱成失者以智起惑亡時理自然法喻顯著若見道而障種成就如明暗俱生秤之兩頭低昂時不等矣有是理乎是故惑智二性無俱成之失二簡二道起別無間道時已無惑種何用復起解脫道為斷惑證滅期心別故為捨彼品麄重性故無間道時𨿽無惑種而未捨彼無堪任性為捨此故起解脫道及證此品擇滅無為簡道起別見解脫之不容己也問謂道起正為斷惑設惑尚在當起解脫無間起時已無惑種復起何用不知斷惑證滅期心別故期心別者無間期于斷惑解脫期于證理所期之心既別解脫何容不起無間道時𨿽無惑種之重而未捨彼惑種無堪任之輕為捨此故及證此品擇滅無為之理何容不起是則解脫豈獨為證理起亦為捨惑而起也汝問何用是無用耶問一名惑種一名麄重一名隨眠義何所別答詳如集論繁不能引大約煩𢚰品所攝名麄重名隨眠異熟及餘無記所攝唯名麄重不名隨眠若信等善品所攝種子不名麄重亦非隨眠以此法生時所依自體唯有堪能非不堪能今解脫斷麄重者約分別麄重中有覆無記是染汙品氣類攝故對無間所斷種此輕彼重此即無堪任性也三明初地所斷𨿽見道生亦斷惡趣諸業果等而今且說能起煩𢚰是根本故由斯初地說斷二愚及彼麄重一執著我法愚即是此中異生性障二惡趣雜染愚即是惡趣諸業果等應知愚品總說為愚後准此釋或彼唯說利鈍障品俱起二愚彼麄重言顯彼二種或二所起無堪任性如入二定說斷苦根所斷苦根𨿽非現種而名麄重此亦應然後麄重言例此應釋正明初地所斷別大小之通斷也初釋前妨難二正詳所斷三別作一解難云經說菩見道亦斷惡趣諸果及感惡趣諸業今但斷異生性障何耶釋云𨿽見道生亦斷惡趣諸業果等而今且說能起煩𢚰不說所起業果者以煩𢚰是業果二種根本本可攝末畧不言耳由斯深蜜初地說斷二愚一執著我法愚即是此中異生性障二惡趣雜染愚即是此中惡趣諸業果等然惡趣業果亦名愚者應知是愚之品類總說名愚後九地如犯三業等皆即愚品故云後准此釋或彼經初地說斷二愚謂利鈍障相應二無明利即五見鈍即貪等及彼麄重者即彼二愚種子或即彼二愚無堪任性例之如入第二靜慮說斷苦根苦根𨿽非種現而名麄重此中麄重名無堪任其義亦爾後地地麄重皆例種子無堪任二義而釋是則彼二愚麄重又可別作一解𨿽別一解義可相融四簡異小所斷𨿽初地所斷實通二障而異生性障意取所知說十無明非染汙故無明即是十障品愚二乘亦能斷煩𢚰障彼是共故非此所說又十無明不染汙者唯依十地修所斷說𨿽此位中亦伏煩𢚰斷彼麄重而非正意不斷隨眠故此不說簡異二乘所斷正顯大乘所斷也初約意取簡斷二約唯依簡斷意取者謂初地見所斷惑𨿽實通煩𢚰所知二障意則唯取所知為正何則證之于經說十地斷十障品即是無明非言煩𢚰染汙性故所以不言者以二乘亦能斷煩𢚰障是與共故非此菩斷障中說故畧不取也唯依者又十無明不染汙者唯依十地修所斷說非謂見道所斷亦名不染汙故然此修位亦伏煩𢚰及彼麄重云不說者以此位𨿽亦伏煩𢚰斷彼麄重而非正意正意地上唯在直趣菩提斷所知故而俱生煩𢚰隨眠留之𦔳生至金剛喻定方斷以此二義故畧而不言耳又麄重即無堪任性是則意取已異于二乘唯依又異于見道簡別何可以不明也五明亦斷俱生理實初地修道位中亦斷俱生所知一分然今且說最初斷者後九地斷准此應知住滿地中時既淹久理應進斷所應斷障不爾三時道應無別故說菩得現觀已復于十地修道位中唯修永滅所知障道留煩𢚰障𦔳願受生非如二乘速趣圓寂故修道位不斷煩𢚰將成佛時方頓斷故明初地亦斷俱生顯地地皆有進斷也初正明進斷二引證進斷問上言十無明依十地修所斷說是初地有斷俱生一分義矣何前但云斷分別起異生性耶故云理實初地修道位中亦斷俱生所知一分地地皆然良以諸地皆有三心初名無間斷本地惑中名解脫證本地理後名勝進斷次地惑能斷次地者以初中之後滿心時既淹久理應進斷所應斷障不爾三時道應無別既後道別于初中應知必斷俱生一分也故說菩初地得現觀已復于十地修道位中唯修永滅所知障道留煩𢚰障𦔳願受生非如二乘速趣圓寂故修道位不斷煩𢚰將成佛時方頓斷故是則俱生所知一分斷于初地而地地之進斷可准既有證成實理愈顯矣二邪行障二邪行障謂所知障中俱生一分及彼所起悞犯三業彼障二地極淨尸羅入二地時便能永斷由斯二地說斷二愚及彼麄重一微細悞犯愚即是此中俱生一分二種種業趣愚即彼所起悞犯三業或唯起業不了業愚所知簡煩𢚰俱生簡分別一分簡全體下倣此及彼所起悞犯三業者彼即能起指所知以續生煩𢚰與所知相通故能起也此業及一分是釋邪行障二地極淨尸羅是釋邪行障二地入二地能永斷出斷時二愚謂現行麄重謂種子及無堪任或唯起業不了愚者重釋悞犯三業之所以為愚也若瑜伽即邪行更多如云當知畧說後後引𤼵有八種相一者能退智邪行退故妄念邪行妄故壞百法邪行壞故惡意現邪行惡故難調伏邪行難調故行非道邪行行非故不善良邪行不賢故不如意邪行三闇鈍障三闇鈍障謂所知障中俱生一分令所聞思修法忘失彼障三地勝定總持及彼所𤼵殊勝三慧入三地時便能永斷由斯三地說斷二愚及彼麄重一欲貪愚即是此中能障勝定及修慧者彼昔多與欲貪俱故名欲貪愚今得勝定及修所成彼既永斷欲貪隨伏此無始來依彼轉故二圓滿聞持陀羅尼愚即是此中能障總持聞思慧者總釋之所知障中俱生一分指障法也能令三慧忘失釋闇鈍也彼障三地勝定總持指所障地法也及彼所𤼵殊勝三慧者謂及障彼勝定所𤼵修慧總持所𤼵聞思慧也入三地便能永斷者出斷障時也別釋之一欲貪愚即是此中能障勝定及修慧者然上標所知此云欲貪以彼所知者多與欲貪俱此貪多住散亂障定與修慧故名欲貪愚耳今得勝定及修所成慧彼障既永斷欲貪隨伏此貪無始依彼障轉故障盡彼亦忘也二圓滿聞持陀羅尼愚即此中能障總持聞思慧者大鈔云此持通四謂法義咒持及能得忍持今云聞思者以聞思與彼聞持極相近故是以偏言問欲貪者為貪煩𢚰為欲界貪曰謂欲界貪亦即貪煩𢚰菩住𤼵光地時自初禪至上定說斷二愚入初禪時離五欲斷十惡除五葢即斷欲界貪矣問聞思修慧分別云何曰不獨願聞于法且心生喜好且常時愛味樂法是名聞慧故曰聞法喜法樂法也不獨依大乘教自見正取不忘且隨自讀誦且為他解說且順所聞法靜處深思其義是通聞思故曰依法隨法解法順法也從此而依定修行到于究竟住出世間智順佛解脫之行是名修慧故曰到法住法行法也詳具大經畧取義釋令易曉耳四煩𢚰障二初正釋二簡釋初正釋四微細煩𢚰現行障謂所知障中俱生一分第六識俱身見等攝最下品故不作意緣故逺隨現行故說名微細彼障四地菩提分法入四地時便能永斷彼昔多與第六識中任運而生執我見等同體起故說煩𢚰名今四地中既得無漏菩提分法彼便永滅此我見等亦永不行初二三地行施戒修相同世間四地修得菩提分法方名出世故能永害此身見等初正釋障名次詳釋斷障正釋障名者括之具三義名微細蔽四地菩提分法名障彼昔多與第六識中任運而生執我見等同體起故名煩𢚰故曰微細煩𢚰現行障詳之所知障中俱生一分指障法也第六識俱身見等攝簡所攝也以第七俱者愈微細非四地所斷之惑也最下品故簡非中上二品以第六識中分別身見名上品唯是不善獨頭貪等名中品通善不善此唯有覆無記故名下品一也不作意緣任運而起二也逺隨現行無始隨逐于身三也具此三義望前地立微細之名耳障四地等者以有身見不能觀身為不淨等故然上言所知障中俱生一分今云煩𢚰者以所知昔多與煩𢚰障同一體起名煩𢚰耳詳釋斷障者四地中既得菩提分法彼所知障即便永滅此我見等亦永不行然初二三地不能害此見者以彼行施戒修相同世間故四地修得菩提分法方名出世故能永害此身見等也二簡釋寧知此與第六識俱第七識俱執我見等與無漏道性相違故八地以去方永不行七地已來猶得現起與餘煩𢚰為依持故此麄彼細伏有前後故此但與第六相應身見等言亦攝無始所知障攝定愛法愛彼定法愛三地尚增入四地時方能永斷菩提分法特違彼故由斯四地說斷二愚及彼麄重一等至愛愚即是此中定愛俱者二法愛愚即是此中法愛俱者所知障攝二愚斷故煩𢚰二愛亦永不行簡釋者簡非七識所俱身見釋四地所斷之二愚也初徴問次簡異三釋愚問寧知此與第六識俱意謂六七皆有俱生身見則此身見與第七俱亦未可知答則簡非第七之故簡是第六之故也非第七者第七識俱執我見等與無漏道性相違故八地已去方永不行豈似此身見四地即得永不行耶七地已來猶得現起與餘愛見慢煩𢚰為依持故豈似此身見四地即得不現起耶此六識俱身見麄故伏在于前彼七識俱身見細故伏在于後故知此身見不與七識相應但與六識相應耳躭玩于諸禪三昧曰定愛躭玩于聞思修法曰法愛此愛本是煩𢚰以與二愚俱起故身見而曰等者則亦攝無始所知障攝定愛法愛彼定愛法愛三地尚增入四地時方能永斷以菩提分法特違彼故由此四地說斷二愚及彼麄重謂種子無堪任性二愚者一等至愛愚即此中定愛俱者二法愛愚即此中法愛俱者所知障攝二愚斷故煩𢚰二愛亦永不行故總名微細煩𢚰現行障五𣵀槃障五于下乘般𣵀槃障謂所知障中俱生一分令厭生樂趣𣵀槃同下二乘厭苦欣滅彼障五地無差別道入五地時便能永斷由斯五地說斷二愚及彼麄重一純作意背生愚即是此中厭生者二純作意向𣵀槃愚即是此中樂𣵀槃者下對上言即二乘也般𣵀槃是寂滅而云障者以五地真俗相應此地真如名類無別今以四地住出世心厭生苦樂趣𣵀槃義同小乘欣厭未忘取捨角立能礙真俗並觀是故成障由斯五地等釋斷二愚六麄相障六麄相現行障謂所知障中俱生一分執有染淨麄相現行彼障六地無染淨道入六地時便能永斷由斯六地說斷二愚及彼麄重一現觀察行流轉愚即是此中執有染者諸行流轉染分攝故二相多現行愚即是此中執有淨者取淨相故相觀多行未能多時住無相觀現行簡非種子曰麄相者對六地無染淨言染淨礙無染淨曰障故入六地便能永斷良以無明緣行乃至生緣老是染無明滅故行滅乃至生滅故老滅是淨六地最勝般若現前都無所得則證無染淨真如彼染淨將安在哉故曰永斷流轉還滅不無執之者住染淨耳七細相障七細相現行障謂所知障中俱生一分執有生滅細相現行彼障七地妙無相道入七地時便能永斷由斯七地說斷二愚及彼麄重一細相現行愚即是此中執有生者猶取流轉細生相故二純作意求無相愚即是此中執有滅者尚取還滅細滅相故純于無相作意勤求未能空中起有勝行現簡種子細對前言前執染淨故麄今無染淨尚取生滅故細曰障者以礙七地妙無相道生滅雙忘故是以入七地時此障能斷總之是執有生滅細相現行障分之細相現行愚是執有生猶取流轉細生相故純作意求無相愚是執有滅取還滅細滅相故問六地斷染無流轉之生斷淨無還滅之滅云有此障者何也曰無染淨處正落此障以彼麄此細深進始得現耳純于無相作意勤求者但念空無相無作也未能空中起有勝行者于諸菩淨佛國土遊戲神通尚未具行不能于無相空中巧施方便有為之事也如大經云菩具足六地已欲入第七逺行地當修十種方便慧起殊勝道何等為十所謂𨿽善修空無相無願三昧而慈悲不捨眾生𨿽得諸佛平等而樂常供養佛𨿽入觀空智門而勤集福𨿽離三界而莊嚴三界𨿽畢竟滅煩𢚰𦦨而能為一切眾生起滅貪瞋癡煩𢚰𦦨𨿽知諸法如幻夢影響等自性無二而隨心作業無量差別𨿽知一切國土猶如虚空而能以清淨妙行莊嚴佛土𨿽知諸佛法身本性無身而以相好莊嚴其身𨿽知諸佛音聲性空寂滅不可言說而能隨一切眾生出種種差別音聲𨿽隨諸佛了三世唯是一念而隨眾生意解分別以種種相種種時種種劫數而修諸行菩以如是十種方便慧起殊勝行從第六地入第七地此菩于十波羅蜜于念念中皆得具足皆悉圓滿由是觀之則妙無相道即空中勝行也故具錄經文以便觀覽耳八加行障八無相中作加行障謂所知障中俱生一分令無相觀不任運起前之五地有相觀多無相觀少于第六地有相觀少無相觀多第七地中純無相觀𨿽恒相續而有加行由無相中有加行故未能任運現相及土如是加行障八地中無功用道故若得入第八地時便能永斷彼永斷故得二自在由斯八地說斷二愚及彼麄重一于無相作功用愚二于相中不自在愚令于相中不自在故此亦攝土相一分故八地以上純無漏道任運起故三界煩𢚰永不現行第七識中細所知障猶可現起生空智果不違彼故初正明加行為障二約位所斷二愚三道障止滅有辨無相中作加行障加行障無功用道之無相也何謂障體謂所知障中俱生一分以護法謂七地無相中有加行智體非是障以善住故只由所斷障令作加行乃說為加行障故也云何障耶令無相觀不任運起是名障耳詳釋之前五地有相觀少第六無相觀多第七純無相觀𨿽恒相續而有加行由無相中有加行故後得智中未能任運現身及土如是加行皆七地中能障八地無功用道任運而現故名無相加行障也以故若得入第八地時便能永斷得二自在由斯八地說斷二愚及彼麄重一于無相作功用愚令能現不自在二于相中不自在愚令于所現身及器界之相不自在今既永斷二俱自在然以道論八地已上純無漏道任運起故三界煩𢚰永不現行以障論則第七識中細所知障猶可現起以所得生空智果不違彼故是以起也九利他障九利他中不欲行障謂所知障中俱生一分令于利樂有情事中不欲勤行樂修己利彼障九地四無礙解入九地時便能永斷由斯九地說斷二愚及彼麄重一于無量所說法無量名句字後後慧辯陀羅尼自在愚于無量所說法陀羅尼自在者謂義無礙解即于所詮總持自在于一義中現一切義故于無量名句字陀羅尼自在者謂法無礙解即于能詮總持自在于一名句字中現一切名句字故于後後慧辯陀羅尼自在者謂詞無礙解即于言音展轉訓釋總持自在于一音聲中現一切音聲故二辯才自在愚辯才自在者謂辯無礙解善逹機宜巧為說故愚能障此四種自在皆是此中第九障攝初正釋障次明斷時三釋二愚利他不欲行障以何為體謂所知障中俱生一分也何以為障以令于利樂有情事中不欲勤行樂修己利彼障九地四無礙解故名為障耳如經云第八不動地菩入無生忍三際平等寂滅現前若諸佛不與菩無量起智門者彼時即入究竟𣵀槃棄捨一切利眾生事是也入九地時便能永斷由斯九地說斷二愚及彼麄重二愚者一于無量所說法無量名句字後後慧辯陀羅尼自在愚二辯才自在愚于無量所說法陀羅尼自在者謂義無礙解義即所詮義理無礙即于所詮總持自在于一義中現一切義故曰義無礙解于無量名句字陀羅尼自在者謂法無礙解法即能詮名句無礙即于能詮總持自在于一名句字中現一切名句字故曰法無礙解于後後慧辯陀羅尼自在者謂詞無礙解詞即言音展轉訓釋無礙即于言音展轉訓釋總持自在于一音聲中現一切音聲故曰詞無礙解也二辯才自在愚者謂辯無礙解以善逹機宜巧為說故亦名樂說無礙上三皆以能持立名此以能說立名即說上三耳愚能障此四種自在者正顯愚用也皆是此中第九障攝者見第九所攝之𡩖嚴分際也十未得障二初正明二所餘初正明十于諸法中未得自在障謂所知障中俱生一分令于諸法不得自在彼障十地大法智雲及所含蔵所起事業入十地時便能永斷由斯十地說斷二愚及彼麄重一大神通愚即是此中障所起事業者二悟入微細秘密愚即是此中障大法智雲及所含蔵者初正釋此障次釋斷二愚諸法未得自在障其體謂所知障中俱生一分令于諸法不得自在彼障十地大法智雲及所含蔵所起事業故名障也入十地時便能永斷由斯十地說斷二愚及彼麄重二愚者一大神通愚即是此中障所起事業事業者如華嚴云佛子此菩智慧明逹神通自在隨其心念能以狹世界作廣世界廣世界作狹世界乃至隨其心念于一毛孔示現一切佛境莊嚴之事是也二悟入微細秘密愚即是此中障大法智及所含蔵者大法智雲謂能含之智所含蔵者謂力無畏等諸功德悟入者如華嚴云此菩即如實知諸佛如來入微細智所謂修行微細智命終微細智受生微細智出家現神通成正覺轉法輪住壽命般𣵀槃教法住微細智如是等皆如實知又入如來秘密處所謂身秘密語秘密心秘密時秘密思量秘密乃至得菩提行秘密是也二所餘此地于法𨿽得自在而有餘障未名最極謂有俱生微所知障及有任運煩𢚰障種金剛喻定現在前時彼皆頓斷入如來地由斯佛地說斷二愚及彼麄重一于一切所知境極微細著愚即是此中微所知障二極微細礙愚即是此中一切任運煩𢚰障種故集論說得菩提時頓斷煩𢚰及所知障成阿羅漢及成如來證大𣵀槃大菩提故初結前明障次釋斷二愚三引論證成此地于法𨿽得自在結前也而有餘障未名最極餘障者俱生微所知障及有任運煩𢚰障種由此觀之此中不立十一地位應知即是十地滿心後名等覺也金剛喻定現在前時彼皆頓斷入如來地由斯佛地說斷二愚等者即佛地初心無間道也引集論證成而以成羅漢及成如來頓斷煩𢚰及所知障者此有二義一斷煩𢚰成羅漢斷二障成如來二佛亦名羅漢故大𣵀槃無住𣵀槃也大菩提圓滿覺也問等妙二覺何辨曰等覺𨿽能修行功德海滿由未能捨三法不名妙覺一未捨劣無漏法二未捨白淨無記法三未捨有漏善法至妙覺已方捨此三紹興府山隂縣常禧車水坊居住奉佛信官張汝𢡟男景華男婦董大慈喜捨淨貲一十二兩敬刻此唯識訂正第九卷專祈智壽智長聰明智福壽綿長簮纓繼武吉祥如意者崇禎四年歲次辛未佛誕日謹識贒預姑蘇信女張門李氏大緣𦔳板
