body:
  text: 古杭雲棲寺弟子廣伸述五三有為四初設為問答二詳為破斥三申明正義四問難通妨初設為問答復如何知諸有為相異色心等有實自性契經説故如契經説有三有為之有為相乃至廣説設問答為破斥之端也初大乘問次餘乘答根塵十一名色八種識王名心五十一所名等此諸有為體也生異滅三紜為動作簡異無為此諸有為相也相於色心全波之濕色心於相盡濕之波本不相離乃餘乘異之法執之謬至此故大乘問云汝執二無心定已破其知矣復如何知諸有為相異色心等有實自性耶答意蓋謂經云有三有為是顯然生異與滅不無於色心之中而云有三有為之有為相是隱然生異與滅之別有於色心之外也問何不説四答以異攝住令有情生厭畏故譬如有人處稠林中有三敵欲為損害一從稠林牽出一衰其力一壞命根三相亦爾住於彼行攝受安立常樂與彼不相捨離故不立於有為中又無為有自相住住濫彼故不説又生等名三相出經與瑜伽等二詳為破斥二初總明破斥二別明破斥初總明破斥此經不説異色心等有實自性為證不成二別明破斥三初約能所體異破二約能所俱有破三約三世相違破初約能所體異破非第六聲便表異體色心之體即色心故非能相體定異所相勿堅相等異地等故若有為相異所相體無為相體應異所相文有三𫨻初引論破證二以自例共三以淨例染第六聲者俱舍謂體業具為從屬依呼名八種聲第六名屬謂攝屬繫屬即生滅屬於五蘊故也屬則不異故云非第六聲便表異體色心之體即色心故豈異色心有實自性哉色心名所相生滅名能相亦名共相以色心共有生滅故也地等名所相堅等名能相亦名自相地等各有自相故也堅等即地等正能相即所相非能相體定異所相勿堅等體異地等故豈生滅有為之共相異色心等有實自性哉若有為相異所相體無為相體應異所相意以為與無為旨固懸殊異與不異式自可比若生異滅有為能相異於色心有為所體應不生滅無為能體定異真如所相體矣然而不生滅能相不異真如所相豈有為能相定異色心所相耶反而觀之斷不然矣是則證之於説為證不成論之於聲表異不可能不異所以自例共之昭昭所不外能反淨於染之愈現是異色心等有實自性耶二約能所俱有破又生等相若體俱有應一切時齊興作用若相違故用不頓興體亦相違如何俱有又住異滅用不應俱能相所相體俱本有用亦應然無別性故若謂彼用更待因緣所待因緣應非本有又執生等便為無用所相恆有而生等合應無為法亦有生等彼此異因不可得故約俱有比量展轉以刳異執之情也初能中生等俱有破二能所體俱本有破三所恆能合比量破初中承上意以能異於所上雖已非而能體未祛異所之情復起故又破云又生等相若體俱有則生體全是住滅住體全是生等能體既其俱有能用宜乎齊興若救云生等由相違故用不頓興則體亦如然如何執體為俱有耶又住異滅用不應俱云何執之同于現在是則能體尚不可得將何以異色心二中意逆餘乘之心以為能體雖是推空色心之體本具所相既其本具復形能體之𭓩然能體既以形生能異所相之又起故牒破云能相所相體俱本有者則用亦應俱本有無別性故而用俱又違上用不頓興若轉計謂彼用更待因緣以成上用不頓興不知所待因緣應非本有則用亦非本有用非本有體亦應非本有矣更待則因緣自生因緣自滅生滅全是因緣夫生滅既全因緣汝又執生等離心別有實體便為無用豈本有之實用耶用不本有體豈本有本有之體用雙空相異之執安所𭔃乎三中意逆餘乘之心以為能體所體雖被推空色心生等殊非斷滅所相恆有色心之體必常能相合時生滅之體隨在合處之所固非能合體之能應異所豈非異色心等有實體性耶故量破云所相恆有而生等合應無為法亦有生等所以然者為與無為法固不同因以成宗式當相例彼此之因恆有彼此之合應同故量云三有為法與生等合所相恆有故如三無為三無為法亦生等合所相恆有故如三有為無為所相恆有既不與生等合有為所相亦應非生等合也有為既不同于無為則有為所相定非恆有所相尚非恆有况能相生滅而實有哉又如廣百論敘彼計云我宗中説諸行四相不相捨離由生等合故成無常法性不壞故説恆有三約三世相違破又去來世非現非常應似空華非實有性生名為有寧在未來滅名為無應非現在滅若非無生應非有又滅違住寧執同時住不違生何容異世故彼所執進退非理約三世難破所執之非理也初顯時空無體二難所執相違三結所執非理承上生等俱有之執己若所非生等所屬之時未詳其失故云又去來世非現非常等也意謂所屬之時性既非實能屬之法體自非真所執者生則執在未來滅住同居現在難所執者生名為有寧在未來滅名為無應非現在滅若非無生應非有有是理乎又滅違于住寧執同于現在之時住不違生何容異于未現之世違者同而不違不違者異而反違皆相違也故彼所執進名無之滅于見在固非理也退名有之生於未來亦非理也能在之生等體既非真所在之三時性且非實况以能在所之不當於時乎三申明正義然有為法因緣力故本無今有暫有還無表異無為假立四相本無今有有位名生生位暫停即説為住住別前後復立異名暫有還無無時名滅前三有故同在現在後一是無故在過去申明正義見實有自性并所屬之時皆非正也初通原四相是假立二別原四相所由名三結歸四相於三世承上有為之偏執已如上非有為之正義由何而立故云然有為法因緣力故以至假立四相等也生等之有非自有因緣和會力故本無今有滅處之無豈便無因緣離散力故暫有還無為有為無之有為非無有無之無為表為異于無為於因緣力故之有無假立四相豈離因緣有無之外實有四相之可立哉若別原假立之名則本無今有于此有位名生非以無位名生也生位暫停即説為住亦以有位名住也少別於前之暫停仍別於後之無滅於此中間復立異名尚于有位而名異也暫有還無無時名滅非以有時名滅也是則前三有故同在現在生豈屬于未來後一是無故在過去滅豈同于現在假立明而實有之非愈顯三世定而謬屬之時不既昭昭乎四問難通妨如何無法與有為相表此後無為相何失生表有法先非有滅表有法後是無異表此法非凝然住表此法暫有用故此四相於有為法雖俱名表而表有異此依剎那假立四相一期分位亦得假立初有名生後無名滅生已相似相續名住即此相續轉變名異是故四相皆是假立設難通妨析表法以更詳假立也初難問二詳通三結顯難意前三有故為有為相後一無故亦有為相吾以為聚當以類分必從羣有與有合類出天然生等皆有應有為相無與有乖羣分法爾如何無法與有為相蓋生等有法為相之可得也滅之為法為相之不可得也豈知無之與有義似不同彼以顯此法寧有外生表此是有滅表此有無此有全後無是有為相既其可得後無全此有與有為相何得有失詳言之四相各何所表生表有法先非是有滅表有法後是於無異表此法非是凝然住表此法暫為有用此依剎那假立四相表異無為之無四相也若夫一期分位亦得假立初有之分位名生不濫於後有後無之分位名滅不濫于前異生已相似相續之分位名住不濫于初有即此相續轉變之分位名異非竟外于中住也指之則出胎名生至壯名住漸老為異後名滅情無情類皆然也剎那一期固久暫不同相分名位豈表詮無異然而總之皆非真實假立以表異無為耳是故四相皆假豈異色心有實體性哉餘乘可以悟矣六破名等三初問答二破斥三正義初問答復如何知異色心等有實詮表名句文身契經説故如契經説佛得希有名句文身設問答為破斥之端也初大乘問次餘乘答身積聚依止義單名曰名多名曰名身句文皆然也名等有所詮表聖教皆同異色心等有實詮表妄執乃爾故問云執三有為知其知矣名等之異復如何知答謂契經説故佛得希有名句文身如顯言則句必有名名不必有句名必有字字不必有名等詳在下文希有者四無礙辨能所妙詮邁凡情超聖量不可思議名希有也意以名句文身是有詮表得名句文身是異色心有實詮表説出于經知由于説二破斥此經不説異色心等有實名等為證不成若名句文異聲實有應如色等非實能詮謂聲能生名句文者此聲必有音韻屈曲此足能詮何用名等若謂聲上音韻屈曲即名句文異聲實有所見色上形量屈曲應異色處別有實體若謂聲上音韻屈曲如絃管聲非能詮者此應如彼聲不別生名等又誰説彼定不能詮聲若能詮風鈴聲等應有詮用此應如彼不別生實名句文身若唯語等能生名等如何不許唯語能詮何理定知能詮即語寧知異語別有能詮語不異能詮人天共了執能詮異語天愛非餘詳為破斥展轉以窮異也初依經總破異知二隨情別破轉計於轉計分六初立量比破異聲二約聲奪破能生三舉例難破異聲四即喻合破能生五就例奪破能詮六唯語曉破異詮破由執起執以破生以破觀執從一至六生起之次第𭓩然以執觀破自始入終脈絡之連環法爾窟而又窟狡兔之伎倆固多窮之更窮慧將之精研莫敵澄神靜慮細研可見依經總破云此經不説異色心等有實名等為證不成轉計中初躡經部師執云汝于名句文如俱舍論等起種種執異聲實有名為異耶不知名等能詮者正以聲也異聲實有應如色香味等非實能詮矣量之名等非實能詮何者異聲實有故應如色等色等不能詮色等異聲故名等既異聲名等豈能詮二牒經部師轉計云汝聞此破若謂聲能生名等名等能詮故異於能生之聲者不知能生必有音韻屈曲始能生名等即此音韻屈曲便足能詮何用名等名等尚不用異將安在三牒正理師轉救云汝聞此破救云聲上音韻屈曲即名句文異聲實有故可言異者不知聲上音韻屈曲猶色上形量屈曲若聲上音韻屈曲即名句文異聲實有是色上形量屈曲應異色處實有矣有是理乎四牒正理師轉救云汝聞此破又謂聲上音韻屈曲如管絃聲非能詮表必別生名等而後能詮故異聲者不知果如是則此音韻屈曲應如彼管絃聲不別生名等能詮表矣尚不能生異將安在五大乘因難餘乘云又誰説彼管絃聲定不能詮以亦有聞管絃而解義者在耳餘乘乃反難云管絃聲若有詮用風鈴聲應有詮用風鈴不能詮故知管絃不能詮也大乘遂破云若如所言此能生名等之聲應如風鈴等不別生實名句文矣尚不別生名等異又將安在六中論主因其迷而曉之曰若風鈴絃管俱不能生唯語聲能生名等而能詮者則唯語定能詮矣如何不許唯語能詮耶乃餘乘昧名等即語語即名等而謂何理定知能詮即語不信唯語大乘反難云寧知異語別有能詮所以然者以語不異能詮人天共所了知執能詮異語唯光音天耳以光音天用光為音詮表一切不用語聲是獨光音一天愛能詮之光異語耳豈可以為普被常行之道哉餘乘非光音餘天非光音能詮異語既非所能唯語能詮應是所愛異奚以為又總分七節再分十一以第五分三第六亦分三故三正義然依語聲分位差別而假建立名句文身名詮自性句詮差別文即是字為二所依此三離聲雖無別體而假實異亦不即聲由此法詞二無礙解境有差別聲與名等蘊處界攝亦各有異且依此土説名句文依聲假立非謂一切諸餘佛土亦依光明妙香味等假立三故申明正義形經部師等異執之非實也文分四節初約所依顯假立二即假立辨用殊三泯即離明攝異四舉諸土盡依立大意依立明而離即泯離即泯而依立彰縱諸土依立之法有異依立之式非異也豈離聲即聲異色心有實體性哉詳之異執己若所破正義畢竟云何故云然依語聲等也分分限位地位差別者分限地位各不同也語聲分位差別者久暫差別音韻差別也久暫者少剎那較多剎那聲之分位差別多剎那較無量剎那皆聲之分位差別也音韻者彼宮商分位較此徴羽聲之差別彼宮商等分位較彼彼宮商等皆聲之差別也依語聲分位差別而假立名句文身者依少剎那至多剎那彼此音韻分位差別而假建立字身依多剎那更多剎那彼此音韻分位差別而假建立名身依多剎那至無量剎那彼彼音韻分位差別而假建立句身既依聲而假立豈異聲實有體性耶名詮自性句詮差別文即是字為二所依者即詮顯以辨用殊也意以所依聲體既是差別能依名等用豈相同故云名詮句詮等之不同也自性者水濕為自性火燥為自性名詮自性者名火顯燥名水顯濕各詮本體也差別者燥別於濕濕別於燥詮差別者水非是火火不是水互詮差別也文者彰義彰顯旨趣故以次第行列之名次第安布之句次第聯合而為文也即是字者出文體也為二所依者名句不離於字也此三離聲雖無別體而假實異至亦各有異者總依立泯即離明所攝之不同也意以由依而立名不離聲既不離聲豈非即聲故云此三離聲雖無別體以語聲是實名等是假亦不即聲由法詞之境有差別蘊界之攝不相同愈可見矣境有別者法無礙解名等為境詞無礙解以聲為境名為境者法對所詮故如所詮是心法必緣心名所詮是色法必緣色名之類是也聲為境者詞對化機故如所化是某機必以某聲入則所吐是某詞必緣於某聲之類是也由此境有差別者依詞説法法固不離于詞詞非是法法豈即是于詞由此聲名不離不即而法詞之境不離之處亦不即也攝亦各有異者聲攝于色蘊界處皆聲攝名攝于行蘊界處皆法攝依聲立名名固不離于聲聲非是名名豈即是于聲由此依立不離不即之故而三科之攝不離之處亦不即也且依此土至假立三故者舉諸土以會依立也意以國土無邉機宜靡量依聲假立且就此方聲外立依諸塵皆是雖所依之法不同依立之式可同不離光明不即光明乃至不離香味不即香味是異色心有實自性耶思之三旁破有執隨眠異心心所是不相應行蘊所攝彼亦非理名貪等故如現貪等非不相應執別有餘不相應行準前理趣皆應止旁破謬攝盡所止也初敘執二破執三例破眠眠伏隨隨逐隨逐藏識眠伏不起對已起之現行言即種子也有執者化地部也異心心所是不相應行蘊所攝者謂隨眠非心心所無所緣與現行異現行自性與心相應隨眠自性心不相應故也寧知亦非理耶何則現行貪等從種而發既是相應種名貪故如現貪等非不相應以非為是理將云何量之則所執隨眠非不相應名貪等故如現貪等推而例之執隨眠外別執有餘不相應行準前非不相應之理皆應不使顯止不使行可也是則由總而別正破之既詳自正而旁例推之殆盡不相應行是異色心有實體性乎問不相應行大小乘類多寡數殊詮釋義異具如別簡直如分位各何所屬耶答命根唯心分位以是第八心種連持功能故異生性唯所分位以是二障種上一分功能能令趨生不同故二無心定無想異熟王所分位以是王所上假王所滅已名無想等餘十九法通色心法及與心所以是三上假立故通三也詳百法注中以上不相應行竟三破諸無為二初詳破斥二申正義初詳破斥二初總破二別破初總破諸無為法離色心等決定實有理不可得標破實有之執也承上餘乘所執離識實有色不相應及諸無為理非有故色不相應已如上破諸無為法離色心等決定實有理不可得無為對有為言離諸造作之謂諸無為即三種無為也二別破四初例破二量破三難破四總量初例破且定有法略有三種一現所知法如色心等二現受用法如瓶衣等如是二法世共知有不待因成三有作用法如眼耳等由彼彼用證知是有無為非世共知定有又無作用如眼耳等設許有用應是無常故不可執無為定有以理例破實有之執也初能例之法二所例無為三結破定有不待因成者不俟成立因量而後知也證知是有者必由比量證據而後知也且定有法等者意以決定實有理不可得乃決定實無矣欲識定無之義當明定有之理故例之曰且定有法現所知如色五識身他心智現受用之假法如瓶衣此二世共知有理之可定於有者也有作用法如眼耳等以能發識證成其道理知是有也今三無為既非世人共知又無作用證知設許有用應是無常乖所執常定有之理安在定有之理無在定無之理的然故不可執無為定有問前破色法及不相應等皆非實有今破無為非實乃以色心等為定有者不唯自語矛盾行將法執中矣如之何其破餘乘耶曰離識而有是為法執唯識之有執殆何存以唯識假有之定有例破離識實有之定有而厥意𭓩然何不以意逆志二量破然諸無為所知性故或色心等所顯性故如色心等不應執為離色心等實無為性以理量破離心之執也所知性者心智為能知無為為所知所顯性者色心為能顯無為為所顯也意以上舉定有例破定有矣既非定有豈離色心苐不知所以不應離者故將安在乃云然諸無為所知性故所顯性故如色心等不應執離能知識心能顯色心為實無為性也問所知所顯差別云何曰所知即後依識中意所顯即後依法中意下方詳明此先略露以為不離之故耳問何為如色心等曰無為是性不離色心色心是相不離無為不離無為色心如無為不離色心無為如色心總是非離色心有實無為性也量之無為是有法非離色心有實無為性為宗因云所知性故或色心等所顯性故同喻如色心三支道理昭然兩家真似判矣三難破又虛空等為一為多若體是一遍一切處虛空容受色等法故隨能合法體應成多一所合處餘不合故不爾諸法應互相遍若謂虛空不與法合應非容受如餘無為又色等中有虛空不有應相雜無應不遍一部一品結法斷時應得餘部餘品擇滅一法緣闕得不生時應於一切得非擇滅執彼體一理應爾故若體是多便有品類應如色等非實無為虛空又應非遍容受餘部所執離心心所實有無為準前應破以理難破實有之執也初設問兩關二難破兩關意以例破量破理已甚明我是汝非情恐未盡無為實有實不離體又虛空擇非擇滅體各何如為復每各一體耶為復每各多體耶一多中先難一體一體中先難虛空虛空曲為四難一隨合成多難二諸法互遍難三不合非容難四遍雜相違難隨合成多者無所乖戾彼此渾融之謂合所合之空體固一能合之法數甚多一體遍一切處容受色等法故將見隨順能合之多法所體亦應成多何則一能合法所合之處處全能合餘不合故餘處皆合豈不成多然而既云一體安可體多故成難也若謂非一所合處餘不合者則諸法皆合合處全空空處全法能合千差互遍虛空之體所合一體互隨諸法之遍有是理乎故成難也不合非容者若謂不合則非虛空之容受如餘無為矣豈理也哉故成難也遍雜相違者色中有空空固周遍雜空非色如色法何色中無空色固不雜空豈能周如虛空何不遍不可以為空不雜不足以名遍然雜則非色如之何其遍一切處耶故成難也虛空一體不成如此擇非擇滅若一體者一部分一品類結惑鈍使斷時應得一地之外餘部一品之外餘品擇滅無為有是理乎一法緣闕得不生時應于一切得非擇滅有是理乎擇非擇滅體不應一又如此若多體者便有多品應如有為色等矣豈實無為之性耶虛空又非容受矣豈理也哉三無為之不可多體又如此餘部所執離心心所實有無為準前應破者則前例量難法應當破斥以祛其執也指所已陳含所未盡渾於文中讀者詳之問部之與品同異云何曰部部分貪部嗔部等亦三界九地曰部品謂品類即八十一品思惑每地九品餘者此部品對彼部品言也問六種無為請言其槩答約諸經論虛空無為者謂於真諦離諸障礙猶如虛空豁虛離礙從喻得名然有三種一法性虛空即真諦體有離諸障礙義二識變虛空即六識上作解心變起虛空相分三事虛空即所見頑空二擇滅無為揀擇斷滅由無漏智斷諸障染所顯真理非擇滅者一真法界本性清淨不由擇力斷滅所顯或有為法緣闕不生所顯真理不動無為者四禪離前三定出於三災八患無喜樂等動搖身心所顯真理此從能顯彰名想受滅者無所有處想受不行所顯真理立此名也俱謂之無為者為作也以前九十四乃生滅之法故屬有為今此六法寂寞沖虛湛然常住無所造作故曰無為四總量又諸無為許無因果故應如兔角非異心等有總量異心實有之為非也意以果從因起因自心生既執異心實有豈非許無因果因果無故應如兔角了不可得是異心等無非異心等有何為乎決定實有耶量之則又諸無為非異心等實有為宗因云許無因果故同喻如兔角兔角是非有兔角無因果許無因果故喻應如兔角二申正義二初總標二別釋初總標然契經説有虛空等諸無為法略有二種略意蓋謂實有已如上破正義當復云何故云然契經説有虛空等也六種之有説既出於聖經二種之略義殊堪為定量略之為言要也非有所未盡之略也二別釋二初依識假有二依法假有初依識假有一依識變假施設有謂曾聞説虛空等名隨分別有虛空等相數習力故心等生時似虛空等無為相現此所現相前後相似無有變易假説為常依識變假有形彼離心實有之非正也名詮自性虛空等名聞屬耳意二識相有差別虛空等相有屬分別意識隨者相隨分別分別隨于名也數習分別修觀不已數習力者觀想已成識有能變之力用也心等生時王所剎那取境時也似虛空等無為相現正境依識變隨分別有虛空等相也以元無本質但隨識變影像相分故名似等也前後六種之前後相似無易者前後相似即無變易無有變易即前後相似也假説為常者無易為常相似無易不離識變非為實常故名假説若分之一依識變假施設有是釋中之標名謂標能現之名曰識變所現之名曰假有也謂曾聞説至無為相現是釋中之釋相謂釋所現假有之相不離於能現之識能現識變之相不離所現之假有也此所現相至假説為常是但明所現之相釋此施設為假有破彼離心之實常也若貫之略有二種一依識變非離心也假施設有非離心實有也識變假有果何所謂謂曾聞六種名數習分別現起六種之相所現之相前後相似無有變易假説為常而已豈異色心實有常法之可得哉問識變相分説是無為者即相狀之相隨識而為何成無為答此説識變假設無為其實非是無為無為是常住法故今此依無為體者但取隨識所變獨影相分為體以相似不變假説為常耳此六無為地前菩識變即是有漏若地上後得智變即無漏也二依性假有二依法性假施設有謂空無我所顯真如有無俱非心言路絶與一切法非一異等是法真理故名法性離諸障礙故名虛空由簡擇力滅諸雜染究竟證會故名擇滅不由擇力本性清淨或緣闕所顯故名非擇滅苦樂受滅故名不動想受不行名想受滅此五皆依真如假立真如亦是假施設名為無故説為有執為有故説為空勿謂虛幻故説為實理非妄倒故名真如不同餘宗離色心等有實常法名曰真如故諸無為非定實有依性略顯無為之有形彼離心實有之非正也文分三節初標次釋三結初二句名標次至故名法性釋所依法性次至名曰真如釋假施設有三至非定實有結簡非實所依法性者法謂萬法色心依正世出世間善惡染淨一切法也性謂理性二空無我所顯真如不住二邊有無俱非不可思議心言路絶者也法性者性與萬法性不即法故非一性不離法故非異是法真理故名法性依法性假施設有者六種之有本于法性曰依諸有之設離性無體曰假真如之體非假真如之名亦假不過彼執為迷謬顯此理非妄倒耳不同餘宗離色心等有實自體之可得也故諸無為非定實有問六種依假二義各各云何曰直如虛空無為由性無障礙而立故名依離無障礙無體故名假諸可例知矣問何謂擇滅曰擇屬智滅屬理曰究竟證會則理智一如雖由擇而有滅實外滅而無擇也問何謂緣闕所顯曰諸有為法皆以緣生生緣不具得不生時即清淨理顯如俱舍謂永礙當生得非擇滅如眼與意專一色時以緣不具諸耳識等不生是也問諸餘無為無論矣第四禪天名不動等凡夫伏惑定耳何槩以無為名耶曰但據不動不行能顯所顯名也彼沉溺此定者未必了然耳况大小聖定借路經過以此為基者又何可以例判也耶問前云依識此云依性差別云何曰依性假有據立教之本源依識假有據聞經之觀行既本理以立教必由教以觀理二而不二不二而二者也故云唯識實性即是真如以上餘乘法執竟連前則廣顯內二科中初科破諸法離心實有竟下二立比量以顯唯識也二立比量顯唯識外道餘乘所執諸法異心心所非實有性是所取故如心心所能取彼覺亦不緣彼是能取故如緣此覺諸心心所依他起故亦如幻事非真實有為遣妄執心心所外實有境故説唯有識若執唯識真實有者如執外境亦是法執初破能所次遣王所大意是實有異心其執固非實有唯心其執亦非如藥因病用正當隨病以食藥病去藥除不當執藥以成病也量之則餘外所執諸法是有法異心心所非實有性為宗因云是所取故喻如心心所意以所取相分不離能取見分之心能取見分不離所依自證之體其猶鏡影不離鏡光鏡光不離所依之銅體因以明宗喻之合法異心非實有性彼謂離心之境即餘外執法異心有實自性者是此謂即心之境即大乘謂內色如外現為識所緣緣者是亦不緣彼者謂豈獨所取異心非實有性能取彼覺亦不緣彼異心之境何則是能取故如緣此覺謂是能取見分必不緣于離心相分如緣此內境之覺豈緣離心之境耶量之能取彼覺是有法亦不緣彼為宗因云是能取故如緣此覺此境不離覺此全是能取緣彼離于能覺豈能緣彼遣王所者恐謂離心法執固非唯識王所必實故謂依他如幻亦非實有然必説之者為遣外心執有實境者説耳若夫又執為實如執外境亦是法執豈説唯識之本心乎即此而觀遣境存心故名唯識識如幻事心又奚存唯識實性其在茲乎故亦名全頭唯識也如轉識論云立唯識義者本為遣境遣心今境界既無唯識又泯即是了唯識義也此即淨品煩惱及境界二俱無故問遣境存識乃可稱唯識既境識俱泯何識可成答立唯識乃一往遣境留心卒終為論遣境為欲空心故境識俱泯是其正義此雙泯正是唯識實性實性即菴摩羅識故古德謂緣如起解便成比量迷現量心失唯識宗華嚴如智無二是為一道清淨以上別釋中二科初廣顯一科竟下二總明法執也二總明法執三初列數標名二詳釋義斷三判證非真初列數標名然諸法執略有二種一者俱生二者分別二詳釋義斷二初俱生法執二分別法執初俱生法執俱生法執無始時來虛妄熏習內因力故恆與身俱不待邪教及邪分別任運而轉故名俱生此復二種一常相續在第七識緣第八識起自心相執為實法二有間斷在第六識緣識所變蘊處界相或總或別起自心相執為實法此二法執細故難斷後十地中數數修習勝法空觀方能除滅初釋俱生之義二析俱生之殊三明斷執之位餘義準前我執中解二分別法執分別法執亦由現在外緣力故非與身俱要待邪教及邪分別然後方起故名分別唯在第六意識中有此亦二種一緣邪教所説蘊處界相起自心相分別計度執為實法二緣邪教所説自性等相起自心相分別計度執為實法此二法執粗故易斷入初地時觀一切法法空真如即能除滅亦分三節義釋如前三判證非真如是所説一切法執自心外法或有或無自心內法一切皆有是故法執皆緣自心所現似法執為實有然似法相從緣生故是如幻有所執實法妄計度故決定非有故世尊説慈氏當知諸識所緣唯識所現依他起性如幻事等初判有無于內外次結所執于似法三簡似實于空有四證如幻於識現詳如我執中釋以上別明法執竟連上是別釋中初明我法執相一科竟二總顯我法唯識二初正明二通妨初正明如是外道餘乘所執離識我法皆非實有故心心所決定不用外色等法為所緣緣緣用必依實有體故現在彼聚心心所法非此聚識親所緣緣如非所緣他聚攝故同聚心所亦非親所緣自體異故如餘非所取由此應知實無外境唯有內識似外境生是故契經伽他中説如愚所分別外境實皆無習氣擾濁心故似彼而轉躡前決無外境比量結證我法唯識也初躡前決無外境次比量決無外境三引證決無外境餘外執離識我法皆非實有云如是者躡前離識之執有種種非實之破有種種也故心心所決定不用外色等法為所緣緣結外境決非所緣緣而出必非之故也非實有者破遍計有實體者立依他以離識之境無如離繩之即識之境有如緣起之繩望圓成雖名幻事對遍計可名實體緣用必依從因緣生之實體外境決無實體之可依也王所非一各以類從曰聚彼此不形但就本類曰同五之王所名彼聚六便名此六之王所名此聚五便名彼量之現在彼聚心心所是有法非此聚識親所緣緣為宗因云他聚攝故喻如非所緣以攝既不同彼此體異自非親所緣緣如聲非眼所緣眼不親緣聲彼非此所緣此豈親緣彼又同聚心所是有法亦非心王親所緣為宗因云自體異故如餘非所取以王所聚同王所體異自非親所緣緣如非所取境能取必不取心非所取境心王豈親緣即此而觀不獨離識無體之外境不可為所緣緣異攝隔體之內心亦不可也何獨異攝隔體之內心不可為所緣緣同聚異體之內心亦不可也緣用必依實有自體外境決定實無自體明矣汝問云何應知實無外境今由此廣略之推詳總別之明辨應知實無外境遍計全空唯有內識似外境生豈疑似之見無一定之知乎豈徒開其端不竟其説乎故契經伽他之説不獨可以為實無外境之徴亦異執紛紜者有定量之懼又實外境者由愚癡愚癡由擾濁擾濁又由于習氣學者當研機析理慎思明辨于習氣定其心不使之擾清其心不使之濁擾濁漸退淨寂斯增外轉忽內轉而似外現之旨昭然矣勉旃斯行二通妨三初設難二釋難三正意初設難有作是難若無離識實我法者假亦應無謂假必依真事似事共法而立如有真火有似火人有猛赤法乃可假説此人為火假説牛等應知亦然我法若無依何假説無假説故似亦不成如何説心似外境轉全據情設難窮實無我法之為假也初難顯實有我法次喻明實有我法三反合難實我法初中有作是難若無離識實我法者假亦應無標實有我法謂假必依真事似事共法而立者釋實有我法次中如有真火有似火人有猛赤法喻真事似事共法也乃可假説此人為火假説牛等應知亦然者喻假依真似共法而立也三中我法若無依何假説反合難無依也無假説故似亦不成反合難無似也如何説心似外境轉反合難似説也總之法難喻難而復喻見實有之煥然反合反難而轉難見實有之確然故下文先類實以破其喻而法可知後真似以破其法而合可知末更足之以依識變現對遣妄執説假似言則難謂如何可説者如是而説故云由假説我法難在釋處釋在難處脈絡潛通意義鈎鎖觀者詳之至下指出二釋難二初總釋二別釋初總釋彼難非理離識我法前已破故依類依實假説火等俱不成故約理總非實有我法之難也初句標定非理下出非理之故問下文別釋類實皆在喻中既不該法何能總耶曰此有二義約喻正名為總此總類實下別類實皆是喻故二約法亦名為總喻以明法喻外無法總喻即總法故况喻言類實法言真似言雖不同而義非全異故類與似通共通實與真通皆總意也二別釋二初釋喻二釋法初釋喻二初依類破二依實破初依類破依類假説理且不成猛赤等德非類有故若無共德而假説彼應亦于水等假説火等名若謂猛等雖非類德而不相離故可假説此亦不然人類猛等現見亦有互相離故類既無德又互相離然有于人假説火等故知假説不依類成以理別破依類假説之不成也初約無德破類次約相離破類三結假不依類依類假説理且不成躡前文也猛赤等德非類有故出理且不成之故也若無共德而假説彼應亦于水等假説火等名例難假説之必不可成也意以前謂如有真火有似火人有猛赤法乃可假説此人為火者正以類火之故假説此人為火耳乃吾謂理且不成者良以火之為物也暖性為體人皆具暖豈是之為類耶化物為用人無燒用豈是之為類耶猛赤等為德而人有猛赤者必是之為類矣亦寧知類德之非有乎何則火之猛赤也金石雖堅觸之則流變生為熟化有為無火之德也人特性猛色赤耳是故火猛赤人猛赤猛赤之類也人猛赤非火猛赤猛赤之德非類有也既無同火之德慿何假説火人若無共德而假説彼應亦于水等假説火等名矣有是理乎脫轉救云猛𫝑之處全赤赤色之處全猛此火之猛赤不相離也人之猛赤亦不離焉則雖不類于猛赤之德而類于猛赤之不相離依此不離可假説此人為火者亦寧知現見亦有互相離耶猛者未必赤豈類火之赤于猛處乎赤者未必猛豈類火之猛于赤處乎類既無德類將安在互離不合救類何從然有于人假説火等者故知假説不依類成依類假説豈理也哉我故曰理且不成二依實破依實假説理亦不成猛赤等德非共有故謂猛赤等在火在人其體各別所依異故無共假説有過同前若謂人火德相似故可假説者理亦不然説火在人非在德故由此假説不依實成以理別破依實假説之不成也初約無共顯非理次約説在顯非理三結假不依實實者實火人與火共體方可言依實蓋同德曰類共體曰實初中首二句牒前文次二句不成之故中四句非共之故後二句指假同前意謂依類假説理且不成矣依實假説理亦不成者以實火之猛赤與人之猛赤此猛赤之有也人之猛赤離火之猛赤非猛赤之共有也而其所以然者以猛赤之所在不同故耳猛赤在火體是色觸色觸不離于火其體別于人之色心而所依非有情也猛赤在人體是色心色心不即是火其體別于火之色觸而所依非無情也依異體別彼此逈然猛赤之德非共有也明矣無共假説是何異于水等假説火等之名乎無是理矣脫謂火有猛赤之德自火而言人有猛赤之德自人而言不必深求其實克窮其類但彼猛而此非怯彼赤而此非黃德相似故可假説人為火者寧知其理亦不然何者説在相非之過耳今夫曰德曰人是説德在德説人在人也曰火德曰火人是説火在德説火在人也使曰火德而説火在德乃曰德相似故可假説者則誠然矣以説火在德不在人故今曰火人是説火在人非説德在人曰可假説者豈其然乎以説火在人非在德故也末二句結假説不依實成之由問前破依類云無共德此破依實云非共有不共若是均乎曰類實從法中真似來共德從法中共法來真似既云共法共德必通類實但共在類于類名共共在實于實名共同名為共略差類實耳問此中似德之計于類何別曰類是于人之猛赤求同于火之猛赤曰類故曰若無共德今云似者不必人之猛赤定類于火之猛赤名似但火有猛赤人亦有猛赤名似耳思之可知二釋法又假必依真事立者亦不應理真謂自相假智及詮俱非境故謂假智詮不得自相唯于諸法共相而轉亦非離此有別方便施設自相為假所依然假智詮必依聲起聲不及處此便不轉能詮所詮俱非自相故知假説不依真事由此但依似事而轉似謂增益非實有相聲似增益似相而轉故不可説假必依真是故彼難不應正理別破假依真立之非理也初標破非理次釋破非理末結破非理釋中初至俱非境故釋𨔻理之由次至不得自相釋非境之意三至共相而轉見全非自相四至為假所依見唯依共相五至必依聲起決共相唯依六至此便不轉指自相不能依七至俱非自相申自相之不得八至不依真事原不依之知九至似相而轉申唯共相而轉十至假必依真拂假依真説自自己相體相自己本體如宗鏡云若法自體唯證智知言説不及是為自相似水濕火暖五識現量所得之境異共相也共同共相相狀託質變相如宗鏡云若法體性言説所及假智所緣是為共相似濕影暖影意識分別所轉之境隔自相也假智即心上行解分別心假智詮即心上解心名句文及聲上名句言説相也增益者現量智了自相已于後剎那有同類智是有分別變現影像乃從相上增益其相如照鏡人形更現影名為增益意謂喻中依類實理不成矣法依真事理亦不應者以依真者必自相是境是境者必得乎自相今分別之假智言説之詮表其于諸法自相如意識之于暖濕耳聽之于青黃何可得耶不得即非境非境即非依矣是以唯于諸法共相而轉全非自相亦非離共之外有別方便能使自相為假所依全依共相也然詮表必起于假智智詮必起于音聲唯依共相而轉之可決也聲不及處即是自相此便不轉不依自相而轉之可指也能詮之言智所詮之義境俱非自相豈有自相之可得耶故知假説不依真事非不明見于理漫然之説者比也由此但依似聲增益非實有相之似相而轉豈不唯依共相乎故不可説假必依真豈得能依自相是故彼難假必依真不應正理我故曰亦不應理問據法喻相齊則此當以真齊實以似齊類以共齊共今但破不依真立曰依似立與前破類豈不相乖曰前破類者以類真故故約共破此不破似者是大乘正意故即立似處破依真立故似雖與前相同與類相類而意義迢然不齊之齊思之三正意然依識變對遣妄執真實我法説假似言由此契經伽他中説為對遣愚夫所執實我法故于識所變假説我法名申明正意竟假説之旨也初申正二引證承上因難而破情理昭然自喻于法立敵矣苐不依真起唯依似立似又奚從故云然依識變云云也以對遣心外實有我法之執故説識變假似以祛其妄執耳豈又有假似之可得哉故觀契經之頌假説有明徴矣我故曰由假説我法以上釋首三句頌竟二釋次三句頌二初釋能變三名二釋三名能變初釋能變三名識所變相雖無量種而能變識類別唯三一謂異熟即第八識多異熟性故二謂思量即第七識恆思量故三謂了境即前六識了境相粗故及言顯六合為一種釋能變三名使知即名之義類也初釋頌初句次釋頌後二此能變唯三者能變對所變言唯三對無量言意以所變境相雖不可量能變識心別唯有三攝境于心別心于類三外無所有也謂異熟思量及了別境識意以唯三果何所謂一謂異熟二謂思量三謂了別異熟者即第八識思量者即第七識了別者即前六識第八何故名異熟以多異熟性故第七何故名思量以恆思量故前六何故名了境以了境相粗故是則三謂者別唯三之名三即者指三名之屬三故者原三名之由也隨論釋頌順文消歸若此詳之異者不同約因言也熟者成熟約果言也因果合論異因居于過去果熟成于現前此異時而熟也善惡之業彼此不同總別之報升沉有辨而總是無記此異性而熟也異類之因既成五趣之果各別此異類而熟也二障分別種上趣生差別功能聖人已無此異聖而熟也曰多異熟性者第八無覆無記純是業招曰異熟性異于前六一分無記惟用一分業招曰多異熟性故第八隨先業轉不待現緣如餘識也思量諸識皆有獨歸第七者以第八無第六無恆前五全無第七思第八為我恆無間斷恆全具故也了別亦遍諸識獨歸前六者以第八了境最細第七亦細而前五向外門轉第六向內外轉前五之境固粗第六亦粗故言了別境識者是了別粗境之前六識也合為一種者類可同故式應爾故法易辨故二釋三名能變此三皆名能變識者能變有二種一因能變謂第八識中等流異熟二因習氣等流習氣由七識中善惡無記熏令生長異熟習氣由六識中有漏善惡熏令生長二果能變謂前二種習氣力故有八識生現種種相等流習氣為因緣故八識體相差別而生名等流果果似因故異熟習氣為增上緣感第八識酬引業力恆相續故立異熟名感前六識酬滿業者從異熟起名異熟生不名異熟有間斷故即前異熟及異熟生名異熟果果異因故此中且説我愛執藏持雜染種能變果識名為異熟非謂一切釋三名能變使知能變之異同也初列能變之目次釋能變之因三釋能變之果四簡能變之果承上謂能變三名已如上釋三名能變當復云何故云此三皆名能變者略有二種等也因能變中習氣即種子曰等流者望果而立全識之惑也曰異熟者亦望果立全惑之業也中謂自證第八識中種所在處謂持種識也由前七至生長者等流習氣所由有由前六至生長者異熟習氣所由有也未生熏之令有已有熏之令增亦生長也六無無記者以無記業不熏種故七有無記者以三性熏親種故果能變中習氣力者惑種管業業種資惑也有八識生各從種子起現行也現種種相八種現行識相也八識體相者自證名體見相曰相差別而生者諸識王所各各四分之不同也果似因故出等流之所由名望因而立也業名為引牽而使之往引名為力往之必隨于牽也酬者如感人天第八酬六識善業之引力感鬼獄第八酬六識惡業之引力也恆相續簡非間斷立異熟名單名第八識也業名為滿如于引業作模之中而填滿之謂也酬者如感人天妍醜前六識中一分無記是酬前善滿業之嗔忍也感鬼畜妍醜六識一分無記是酬前惡滿業之嗔愛也名異熟生單名前六識果異因故出異熟果所由名望因而立也簡能變中此中頌中也且説至異熟者且説執藏受熏持種能變之第八果識名為異熟非圓滿果全收八種謂一切為異熟也然總其大意三皆名能變者前七之現行熏令生長八中之種子八中等異之種子現諸相見之現行因果歸于能變能變變于此三故曰此三皆名能變又第六善惡性能造引滿前五一分善惡者唯能造滿業七八非造前五一分無記非造至于招業成果第八則全前六特一分而已非業招者第七則全前六特一分善不善性而已又業之有力者招總報無力招別報二廣辨唯識相二初三能變二五問答初三能變三初第八識二第七識三前六識初第八識二初標文二解釋初標文雖已略説能變三名而未廣辨能變三相且初能變其相云何頌曰初阿賴耶識異熟一切種不可知執受處了常與觸作意受想思相應唯捨受是無覆無記觸等亦如是恆轉如暴流阿羅漢位捨二解釋二初正釋頌文二重為詳辨初正釋頌文九初能變自相二能變果相三能變因相四能所行相五相應所相六王所受相七王所性相八王所喻相九伏斷位相初能變自相論曰初能變識大小乘教名阿賴耶此識具有能藏所藏執藏義故謂與雜染互為緣故有情執為自內我故此即顯示初能變識所有自相攝持因果為自相故此識自相分位雖多藏初過重是故偏説圖第八之自相善辨者徹當體也初顯示名具之義次顯示義具之由三點出顯示所指四結示偏頌之故雜染謂前七互為緣者前七現行以第八為種子緣第八諸種以前七為長養緣前七現行以第八為依止緣第八種等以前七為攝植緣持種為能藏受熏為所藏第七執我為執藏如此顯示果何所示非止顯示即名之義即義之故而已即顯示初能變識所有自己體相是攝持能藏之因所藏之果為自相故善辨者親見其本來面目若此豈徒為顯示哉又此識自相不止三藏頌偏言者以藏為罪魁惡首是故偏説非有他也又根身種子器界是此識相分此識是此三所藏之處如物在藏如身在室故云欲覓賴耶識只在身心中欲覓摩尼珠只在青黃中此所藏義能藏者根身等皆藏在識心之中故云欲覓一切法只在賴耶中欲覓一切像只在摩尼中又攝是能藏所藏持是執藏義據世親謂緣一切雜染品法所有熏習能生于彼功能差別識為自性等則意重能藏過重以無能藏則無餘藏故也二能變果相此是能引諸界趣生善不善業異熟果故説名異熟離此命根衆同分等恆時相續勝異熟果不可得故此即顯示初能變識所有果相此識果相雖多位多種異熟實不共故偏説之摹第八果相善辨者慎所辦也初順顯果相二反決果相三正指果相四簡結果相前六所造三界五趣善不善業牽之必往名為能引此異熟因也第八所受三界五趣愛非愛果唯業是酬名為所引此異熟果也連持色心相續功能名命根既屬第八種子分別界趣衆同分等所有差別又屬第八身心然則頌名異熟蓋顯此第八是能引諸界趣善不善業之異熟果故説名異熟而有命根衆同分等恆時相續勝果之可得也若離此第八何可得耶即之可得離之不可此異熟者果何所示即示第八所有之果相善辨者慎所辦熟耳豈徒異熟之名已哉多位多種者此識現行望自種子是等流果望作意等心所是士用果望第七為增上果望善惡因即異熟果階地非一曰多位類數非一曰多種異熟實不共謂異熟之外雖皆八識果相而諸識亦有是可共也勝異熟相獨是第八識果諸識所無是不共也以其不共故偏説之尅顯果相耳不言離繫以唯具四故如世親云謂即依彼雜染品法無始熏習此識續生而能攝持無始熏習是名安立此識果相是也三能變因相二初正顯因相二更辨種相初正顯因相此能執持諸法種子令不失故名一切種離此餘法能遍執持諸法種子不可得故此即顯示初能變識所有因相此識因相雖有多種持種不共是故偏説初能變識體相雖多略説唯有如是三相顯第八因相善辨者知所因也初順顯因相次反決因相三正指因相四簡別因相五總結三相諸法種謂染淨執持不失謂功能也識有此能名一切種識亦如麥種有生芽之能得為種子若損壞不生非復為種今持種不失正謂能生是故得名一切種識離此識外餘諸識法能遍執持種子何可得也即之而有離故則無反復于持種果何顯示即顯示初能變識所有因相欲善辨者徹見因容而為生物之本也豈徒釋名已哉因相多種者六因中雖異熟因非無記所有遍行因非無染所有而無染無記之第八于因種俱時而有是俱有因望自類種前後相引是同類因望同時心所等是相應因能持種子義邉是持種因既有多種而偏言持種者以持種之外餘因諸識亦有是可共也唯此持種獨有于第八他識所無故偏説之以尅顯因相耳體相多者天親云決定藏論中明有八相異彼之廣唯略説三反博歸約令簡便易從耳問初云自相次云果相三云因相似三種判然乃初又云攝持因果為自相則後二殆何如曰一識三相三相一識約當體蓋渾然于藏內別因果則歷然于體中以此而因以此而果者也請細玩之二更辨種相三初總標二別釋三總結初總標一切種相應更分別此總標定下有所統也種相名一切者染淨諸種皆無量故凡是一種皆多相故分別云應更者上一切種已略分別矣苐種之于識不易玄黃種之為相還宜更辨因相既爾炳然果識不辨明矣有所統者如下釋中始自相次舊新再具義終習熏皆統于一切種相四字中也指陳自相披析舊新成具諸義能所習熏皆統于應更分別四字中也二別釋四初辨自相二辨本始三辨具義四辨熏習初辨自相四初楷定自體二定假實三判屬分位四簡別三性初楷定自體此中何法名為種子謂本識中親生自果功能差別此與本識及所生果不一不異體用因果理應爾故楷定種體杜一異之執也初徴問二的指三料簡四原由此中謂本識中功能謂種生現行差別謂各種生各現行也親生自果者第八自證體中眼種親生眼識現行自果耳種親生耳識現行自果等也然此種子與所依本識及所生現果見不精明者不落于異便墮于一不知其為不一不異也何則識是種所依體種是體所出用種為現果之因現為因種之果一則體用因果不分異則體用因果判然皆非理也用之于體因之于果理應不一歷歷于渾然之中理應不異渾然于歷歷之內判然冥然體用因果之理豈其然乎又第八攝持種子故名種子識又本識是集諦故名種子是苦諦故名果報又攝持種子是第八功能能生現行是種子功能二定假實雖非一異而是實有假法如無非因緣故此與諸法既非一異應如瓶等是假非實若爾真如應是假有許則便無真勝義諦然諸種子唯依世俗説為實有不同真如決種為實杜假説于雙非也初原雙非是實次難雙非是假三詰雙非為實四簡真俗之實承上執是為非起于名言之相類識此于彼慿乎甄別之殊方聞以不一不異指種子于識果得無謂同外道雙非之計流于是假而非實乎得無雖原為實同于自相相違之過乎得無雖詰為實流于真俗相濫之過乎故原之難之詰之而復簡之甄別既盡實旨自彰藻鑑已精狐疑安𭔃大意如此詳之意以外于心外執非一異是假非實種于識果雖非一異是實非假所以然者假法如無畢竟斷滅不復有生非如因緣熾然而生今既因緣豈非是實故不可執相似之名言而昧不同之真實也脫又難云此種是有法是假非實為宗因云種與識果非一異故同喻如瓶等合云瓶等是有法是假非實為宗因云此與泥團等非一異故同喻如種子則以非一異之種為是實非假者豈不犯宗法自相相違之過乎而不知其不相犯也何者以法難者尚以喻顯以喻難者盍以喻通喻與法同者許以難人喻與喻同者盍以自難若種子與諸法非一非異是假非實如瓶與泥團非一非異是假非實則真如與諸法非一非異亦是假非實矣汝許之耶不許之耶許則便無真勝義諦矣有是理乎是則不唯不犯且善能成立然又須知此種之實真如之實名雖同俗種之實真如之實真俗不可同也故知是實非假種子不同于外執之雙非是俗非假種實不同于真實之究竟是實非假豈易為言哉三判屬分位種子雖依第八識體而是此識相分非餘見分恆取此為境故判種所屬杜分疑于雙非也謂種對識體名功能之用識對種用名所依之體體用既非一異此種于第八四分中為是第八自證分證自證分之體耶為是第八之見分與相分之用耶故判定云此種雖依第八識體不屬于體四分中是此識相分非餘三分為第八見分親所緣緣恆取此為境而無間斷者也是則相非三分故不一不離自證故不異何疑于不一不異四簡別三性諸有漏種與異熟識體無別故無記性攝因果俱有善等性故亦名善等諸無漏種非異熟識性所攝故因果俱是善性攝故唯名為善若爾何故決擇分説二十二根一切皆有異熟種子皆異熟生雖名異熟而非無記依異熟故名異熟種異性相依如眼等識或無漏種由熏習力轉變成熟立異熟名非無記性所攝異熟釋明三性通異熟一切種也異熟雖見上文漏無漏種不離于此正異熟一切種也依攝不同三性有辨正通異熟一切種也初明種性于異熟二難種性于異熟三通種性于異熟初中諸有漏種體性與異熟識不異因果性與異熟識不一諸無漏種體性與異熟識固異因果與異熟識亦異異熟一切種差別有如此故難云此論釋頌頌述瑜伽既繩承于一脈應旨趣之同源若無漏種非異熟性何故彼説皆異熟種皆異熟生則不唯十九有漏之根是異熟種餘三無漏之根亦異熟種何得同居無記三性𭓩殊俱名異熟攝否異致乎故通云雖名異熟不與第八同無記性以皆善性故依異熟名異熟種非如有漏攝于異熟名異熟種也異性相依如眼等根是無記性為善眼等識能依之所依則異熟識是無記性獨不為善無漏種能依之所依乎或無漏種不應以有漏之異熟為名由無漏行熏習之力轉變成熟立異熟名非無記性所攝異熟不可以名言相同頓迷于不同之體性也是則漏無漏種其性雖別同依異熟故名異熟一切種但有漏種體是親生自果功能是實非假是相非見是通三性其與識體現果一之不可異之不可者也二十二根者眼等六苦樂等五信等五男女命三及三無漏是也二辨本始三初敘唯本無始二敘唯始無本三明始本兼具初敘唯本無始四初義立唯本二教證唯本三理證唯本四結顯唯本初義立唯本此中有義一切種子皆本性有不從熏生由熏習力但可增長敘清目等唯立本有之義也一切指染淨皆本性有表唯本也不從熏生有始也由熏習力但可增長意通伏難難云不從熏生熏竟無用耶故云由熏習力但增長本有使之成熟而無生力我故曰不從熏生二教證唯本如契經説一切有情無始時來有種種界如惡義聚法爾而有界即種子差別名故又契經説無始時來界一切法等依界是因義瑜伽亦説諸種子體無始時來性雖本有而由染淨新所熏發諸有情類無始時來若般𣵀槃法者一切種子皆悉具足不般𣵀槃法者便闕三種菩提種子如是等文誠證非一敘清目等教證唯本之義也初引經證唯本不從熏生自在次引論證熏長唯本之義更申如惡義聚雖喻惑業苦三不離正顯諸種藂生于一處也別名因義文當互見以有時名種有時名界故也𣵀槃云寂滅大小不同般入義謂智與法合如楞伽謂所聞逗機淚下毛聳欣悅之類則不唯有漏種具無漏亦具足也菩提云覺智亦該大小便闕三種即真性實智方便三種菩提也如是等文誠證非一豈非一切種子皆本有之明徴耶豈非由熏習力增長之明徴耶經論昭昭非無所據三理證唯本又諸有情既説本有五種性別故應定有法爾種子不由熏生又瑜伽説地獄成就三無漏根是種非現又從無始展轉傳來法爾所得本性住種敘清目等理證唯本之義也初約五性本有之理證次約三根是種之理證三約無始傳來之理證五性謂聲聞緣覺如來不定闡提性也三無漏根謂未知當知根已知根具知根真見道義也定有法爾者謂五種性別既説本有則本識性中天然一定而有不由熏後而始生者矣五性法爾之理既明三根是種之理又現加以展轉傳來依附本識則本有之理不更明而愈顯乎至理誠可證也四結顯唯本由此等證無漏種子法爾本有不從熏生有漏亦應法爾有種由熏增長不別熏生如是建立因果不亂敘清目等結顯唯本之義也初結證諸種唯本無始次結證唯本是真能立此等指理證教證結證諸種唯本無始者初立一切種子皆本性有不從熏生由熏習力但可增長既而證之于教證之于理故云由此等證無漏有漏法爾有種結一切種皆本性有也由熏增長不別熏生結不從熏生由熏力長也乃有見亦應二字便作例詞不知是頂上三無漏根順文為言耳殆非前文單證無漏本有至此方例有漏本有請觀初節一切種子皆本性有次節一切種子皆悉具足三節五種性別法爾種子何曾偏指無漏今方例有漏耶灼知是通結諸種唯本無始智者詳之建立曰如是本有熏長也因果曰不亂種現秩然也以本有能發之本種名因所發之現行名果熏習但可為增長之緣耳漏無漏之因果迢然發與生之親踈辨矣何亂之有若夫種非本有不惟現行無從現將非果如以熏是能生不惟本種非因種反成果矣紊亂可勝道哉二敘唯始無本四初義立唯始二教證唯始三理證唯始四斥前唯本初義立唯始有義種子皆熏故生所熏能熏俱無始有故諸種子無始成就種子既是習氣異名習氣必由熏習而有如麻香氣華熏故生敘難陀等唯立始有之義也初標定次通妨三釋義末喻顯皆熏故生對一切種不從熏生立也所熏能熏至無始成就者恐有難云既皆熏生便成新有何故教云無始成就通云熏皆無始故種成無始豈以無始便非熏生然又推以熏之故而後生者以習氣有時名種子種子乃習氣異名種既習氣異名習氣必因熏習而有豈非諸種皆以熏故而生耶麻之香氣猶心之香氣香氣必以華熏故生習氣必以現行熏故而生無始熏生義甚明喻甚顯我故曰皆熏故生二教證唯始如契經説諸有情心染淨諸法所熏習故無量種子之所積集論説內種定有熏習外種熏習或有或無敘難陀等教證唯始之義也初引經證諸種積集由熏二引論決內種熏習定有有情心謂第八自證染淨法謂前七現行積集者自少至多由微而著曰積合其所積輻輳會聚曰集謂現行熏習其心無量習氣積集于第八自證中也內種謂心內惑業等種外種謂心外麥等種定有熏習論與經同也或有如華熏故生等或無如糞毛蓮生等此一往之論就實而言內種是實外種是假自假相觀之從麥等生芽似麥為親種水等為踈緣自實理觀之心識為親種麥等亦非親也以假形實內種定由于熏生以實望假外種之生亦由于內種三理證唯始又名言等三種熏習總攝一切有漏法種彼三既由熏習而有故有漏種必藉熏生無漏種生亦由熏習説聞熏習聞淨法界等流正法而熏起故是出世心種子性故敘難陀等理證唯始之義也三種謂名言習氣我執習氣有支習氣詳見第八卷中淨法界即是法身等流正法者謂清淨法界中平等流出之正法也意以熏生不唯有教可據亦復有理可徴何則總有攝別之義別無違總之理名等三種之總既由熏習而生漏種無量之別寧有非熏之理又無漏種子從聞熏起寧非新生之理乎是則不惟世間心種熏生之理可證出世心種熏生之理亦可證也我故曰一切種子皆熏故生又出世心即是見道如手杖論云云乃至結云是故定知雖是世間而能親作出世間心種子也四斥前唯本有情本來種性差別不由無漏種子有無但依有障無障建立如瑜伽説于真如境若有畢竟二障種者立為不般𣵀槃法性若有畢竟所知障種非煩惱者一分立為聲聞種性一分立為獨覺種性若無畢竟二障種者即立彼為如來種性故知本來種性差別依障建立非無漏種所説成就無漏種言依當可生非已有體敘難陀斥本有之非也初斥種別由于無漏次斥地獄非本有種初中首標次證三結不由無漏種子有無者彼本來差別之由斥唯本之非但依有障無障建立者表彼五種差別之依形所由之謬真如曰境迷固依此悟亦依此煩惱所知曰障一礙于智一礙于理也永不可害曰畢竟非不可害曰無畢竟既依畢竟二障種立不𣵀槃豈由無無漏種立闡提性耶既依無畢竟二障種立如來性豈由有無漏種立如來性耶既依畢竟所知障種非煩惱者一分立為聲聞種性一分立為緣覺種性豈由無漏種子差別立為小乘中乘性耶故知種性差別依障建立非無漏種又以地獄成就三無漏根是種非現以證本有不知所説成就無漏種言蓋言當來可生非言已有體也執之以證本有豈其然乎是則唯本之旨既破唯始之義愈彰唯始既彰唯本將安在我故曰一切種子皆熏故生三明始本兼具三初正義二破前三總結初正義有義種子各有二類一者本有謂無始來異熟識中法爾而有生蘊處界功能差別世尊依此説諸有情無始時來有種種界如惡義聚法爾而有餘所引證廣説如初此即名為本性住種二者始起謂無始來數數現行熏習而有世尊依此説有情心染淨諸法所熏習故無量種子之所積集諸論亦説染淨種子由染淨法熏習故生此即名為習所成種申護法兼具之正義也意以染淨各有新熏本有二類本有則識中法爾而有天然具足全非熏後而生始起則無始熏習而有殊非本具必假熏後而生此染淨種雖各有新本二類然當生現行時新種遇緣即從新種生現本種遇緣即從本種生現非謂二種于一念中同生一現而犯多種共生一芽之過問新生無論矣直如本有種子總未聞熏從何而生曰從無始來此身與種子俱時而有如外草木等種故云異熟識中法爾而有生蘊處界功能也故知以過去已熏之種為未來之本有者正屬新熏殊非護法所云法爾而有以釋本有之意也又第八識聚及此所變異熟五根相分并異熟浮塵根等及異熟前六識等並無新種以其極劣非能熏故從本有舊種所生其長養五根及此浮根及等流五塵相分前六識所變者皆可各有新本二種二破前二初破唯本二破唯始初破唯本若唯本有轉識不應與阿賴耶為因緣性如契經説諸法于識藏識于法亦爾更互為果性亦常為因性此頌意言阿賴耶識與諸轉識于一切時展轉相生互為因果攝大乘説阿賴耶識與雜染法互為因緣如炷與𦦨展轉生燒又如束蘆互相依住唯依此二建立因緣所餘因緣不可得故若諸種子不由熏生如何轉識與阿賴耶有因緣義非熏令長可名因緣勿善惡業與異熟果為因緣故又諸聖教説有種子由熏習生皆違彼義故唯本有理教相違破清目唯本之非見兼始之為是也初約所應以標難次引教量以證標三按至理以責謬四總諸教以違五總相違以結責承上意謂初立本有次立始起茲立本始者正以唯本唯始者之皆非也試以唯本言之四緣中凡親生者曰因緣賴耶親生賴耶名因緣轉識親生轉識名因緣若唯本有不從熏生而但熏長是賴耶應與轉識為因緣轉識不應與賴耶為因緣矣證之于教互為因果互為因緣初無不從熏生而但熏長之教按之以理唯依此二建立因緣所餘因緣不可得故亦無不從熏生而但熏長之理不獨已引聖教之難通况復未引諸教之相悖故知唯本之非立必當兼于始起也大意若此詳之互為因果者轉識與賴耶交互為因交互為果如賴耶生雜染賴耶為轉識因轉識為賴耶果轉識生賴耶諸法為賴耶因賴耶為轉識果矣互為因緣者亦賴耶生雜染賴耶為轉識因緣轉識生賴耶轉識為賴耶因緣也如炷與𦦨展轉生燒舉增上緣喻因緣義謂一剎那燈炷如彼種子炷生燈𦦨如種生現剎那燈熖如彼現行𦦨生燈炷如現熏種種現現種相依不離約俱有因喻種現互為因果曰又如束蘆互相依住唯依此二建立因緣所以然者所餘因緣不可得故若諸種子不由熏生如何轉識與阿賴耶有因緣義非熏令長可名因緣若熏長為因緣者業為因緣矣勿善惡業與異熟果為因緣故重引諸教見相違之他無可援盡絶其餘疑也末二句總結相違見唯本之必不可立而兼始之不相違也二破唯始六初難無因破唯始二難論説以顯正三通所引以破證四破無漏于當生五總教説以重責六約理教以結破初難無因破唯始若唯始起有為無漏無因緣故應不得生有漏不應為無漏種勿無漏種生有漏故許應諸佛有漏復生善等應為不善等種破難陀唯始之非見兼本之為正也初牒執無果破二救難破三約許窮破若唯始起牒執也應不得生破無果也無漏曰有為以四智由轉識之作為而成也不得生曰應者以唯始起則無本有法爾種因無因不得生果理所應也脫轉救云聞法界等流正法所起聞熏習即此熏習可為無漏種故非無因乃救云聞熏是有漏心不應為無漏種更破云勿無漏種生有漏故豈有有漏為無漏種子之理若許無漏得生有漏則諸佛是無漏之人應生有漏善等應為不善等種世出世間因果顛倒有是事否故知必不可許則必不可救必不可救則必不可唯始也明矣若必唯始一切衆生永不成佛有是理乎又清淨法界了因所了可非種子生故下𣵀槃曰顯得四智菩提生因所生起必由種故下菩提曰生得又攝論云轉依曰法身由聞熏四法得成一信樂大乘是大淨種子二般若波羅蜜是大我種子三虛空器三昧是大樂種子四大悲是大常種子此聞熏習及四法為四德種子四德圓時本識都盡四德本來是有不從種生從因作名故稱種子此聞熏習損滅本識為對治本識與本識性相違故不為本識性所攝故云四德圓時本識都盡若不盡種子則熏習生增益本識也雖曰由聞熏四法得成似與法爾有異然其意謂以聞熏增益其力而成之耳况言本來是有言從因名種言與本識違不為本識性所攝皆無漏種義是同故録之以便參考二難論説以顯正三初牒論説為因二難論説為因三明經義正旨初牒論説為因分別論者雖作是説心性本淨客塵煩惱所染汙故名為雜染離煩惱時轉成無漏故無漏法非無因生縱牒救詞為破顯之案也通篇皆救詞一雖字便縱牒救詞破顯者破救顯正也分別論者即論後三卷引上座部經兼作論之人也心性本淨至轉成無漏乃彼所引經故無漏法非無因生是論結經旨救詞蓋謂勿謂唯始即無因緣應不得生如論所釋故無漏法非無因生也而救詞中所含之意乃是無漏之法生于因無漏之因生于轉無漏之轉生于離離則客塵去而主空現遡流窮源心性本淨為因奚必本有種子為因耶故護法縱牒其救詞云雖作是説是説有辨牒其救不準其救也二難論説為因二初難説空理二難説即心初難説空理而心性言彼説何義若説空理空非心因常法定非諸法種子以體前後無轉變故難説空理見説之不救于無因也初躡言徴義二難説無因三釋出無因四原無所以意以汝雖引論以救無因然言必有義義存于説心性本淨之言彼論主説何義耶為説空理為説即心若説空理空非無漏心因何謂空理即是常法何謂心因即是種子空非心因者以常法之體從前徹後竟無轉變故非因種之轉變也是則空理之説既難因生之救何在我故曰雖作是説誠以是説之可辨于此者一也二難説即心若説即心應同數論相雖轉變而體常一惡無記心又應是善許則應與信等相應不許便應非善心體尚不名善况是無漏有漏善心既稱雜染如惡心等性非無漏故不應與無漏為因勿善惡等互為因故若有漏心性是無漏應無漏心性是有漏差別因緣不可得故又異生心若是無漏則異生位無漏現行應名聖者若異生心性雖無漏而相有染不名無漏無斯過者則心種子亦非無漏何故汝論説有異生唯得成就無漏種子種子現行性相同故難説即心見説之不救于無因也初過同外道不可即二理違法門不可即三義乖位次不可即欲摧碎其執情多展轉于文句若直提正旨只消例取上云若説即心即非心因雜染有漏現心定非清淨無漏種性以種子現行性相同故則通篇一百七十六字盡泄于所例三十一字中矣詳之一冥諦是常一之體念三諦是轉變之相應同者雜染多心淨性無二説性即心體相豈殊既同外道不可即也法猶物色理是權𢖍物固難齊理無不平統論法門之理染性必是染心淨現全由淨種別理染法之門惡性必是惡心善心全由善種今説即心不惟過同數論亦且理悖法門何則淨性即染心心全是淨法心性既無異心便可即心惡無記心又應是善心矣許則惡王善所之相應不許惡心便應非善心體矣惡心尚不名善心體况是無漏之種性乎三心既同雜染三性咸非無漏故云應與無漏為因勿善惡等互為因故倘若執有漏染心必是無漏淨性則無漏淨心應是有漏染性矣麻種豆苗瓊根木葉無此理也又異生凡位是有漏種現若必差別因緣可得則異生心是無漏矣心若無漏位當無漏現行應名聖者有是理乎脫謂性無漏而相有染無斯過者亦寧知有相必有性相既有染性豈無漏何故汝教謂異生唯得成就無漏種子而乖種現性相相同之義乎即心之説既難因生之救安在我故曰雖作是説誠以是説之可辨于此者二也三明經義正旨然契經説心性淨者説心空理所顯真如真如是心真實性故或説心體非煩惱故名性本淨非有漏心性是無漏故名本淨由此應信有諸有情無始時來有無漏種不由熏習法爾成就後勝進位熏令增長無漏法起以此為因無漏起時復熏成種有漏法種類此應知明經顯正見展轉破斥之有歸也初明經二顯正説心空理所顯真如指所説之性也真如是心真實性故原心之性淨也或説心體亦指所説之性非煩惱故亦原心之性淨也空理即真如云所顯者我空法空等所顯真如之理也真實無虛妄義逺離虛妄故名清淨此約出纏説性淨體即性義煩惱則染汙非煩惱故名清淨此約在纏名性淨出纏名離垢清淨在纏名自性清淨纏之出在有殊性之真如無二此法身理性邉事豈報身智種可同如宗鏡釋云心性者真如也真如無為非心之因亦非種子能有果法如虛空等故非有漏心性是無漏名性本淨也乃有不逹此義竟以真如為本有無漏種子者不惟違悖護法亦且未詳永明由此性淨非四智因應信無漏種子法爾成就資加二位不過藉聞熏增益其力而殊勝之耳後見道無漏現行起時用此增長無漏種子為因無漏現行起時復熏成無漏種子矣無漏如此則有漏法種類此無漏之本具等可知也二難論説以顯正竟三通所引以破證二初通所引熏習二通所引依障初通所引熏習諸聖教中雖説內種定有熏習而不定説一切種子皆熏故生寧全無本有種子然本有種亦由熏習令其增盛方能得果故説內種定有熏習其聞熏習非唯有漏聞正法時亦熏本有無漏種子令漸增盛展轉乃至生出世心故亦説此名聞熏習聞熏習中有漏性者是修所斷感勝異熟為出世法勝增上緣無漏性者非所斷攝與出世法正為因緣此正因緣微隱難了有𭔃粗顯勝增上緣方便説為出世心種通所引熏習以破唯始之證也初通內熏定有熏習之説次通熏習乃有差別之名三判熏習類説之辨初中意以熏習雖説定有而不定説皆熏故生之因緣則全本有之非也明矣熏習所説定有而是通説由熏增盛之增上緣則引證唯始之非益明矣次中意以用有漏心聞無漏法新所熏種是有漏性固名熏習聞無漏法熏無漏種增本有力是無漏性亦名熏習執新熏即無漏種即以此種名聞熏習不知本有無漏種子熏令增長名聞熏習亦復不知此新熏種是有漏性故云其聞熏習非是唯熏新有漏種等聞正法時亦熏本有無漏種子令漸增盛展轉乃至生出世心故亦説此名聞熏習出世心即見道心也三中意以聞熏習中各有二種熏生有漏性者感變易生勝異熟果為出世法作增上緣至修道位此種可斷熏長無漏性者與出世法為正因緣此因直至佛果位中無有間斷非所斷攝恐有疑云若有漏性是增上緣何故能熏出世心種釋云此無漏性正因緣種微隱難了故聖教中𭔃託粗而不微顯而不隱有漏性中之勝增上緣方便説為出世心種其實出世心種是本有無漏正因緣也無性攝論云此聞熏習雖是世間有漏心而是出世間心種子性法華亦以聞法如繫珠繫珠明理性之常在故判決既明類不容濫熏習之旨既通唯始之證可氷釋矣二通所引依障依障建立種性別者意顯無漏種子有無謂若全無無漏種者彼二障種永不可害即立彼為非𣵀槃法若唯有二乘無漏種者彼所知障種永不可害一分立為聲聞種性一分立為獨覺種性若亦有佛無漏種者彼二障種俱可永害即立彼為如來種性故由無漏種子有無障有可斷不可斷義然無漏種微隱難知故約彼障顯性差別不爾彼障有何別因而有可害不可害者若謂法爾有此障別無漏法種寧不許然若本全無無漏法種則諸聖道永不得生誰當能害二障種子而説依障立種性別通所引依障以破唯始之證也初通依障建立之意二通依障建立之疑初中三假初至種子有無是略標正意次至如來種性是詳釋正意三至不可斷義是結顯正意總之是難陀引論證種性依障建立不由無漏種子有無今通論意正顯無漏種子有無所以然者種性有無因障有無障之有無因何有無蓋由無漏種子之有障有可斷而無由無漏種子之無障有不可斷而有種性有無因障有無二障有無因無漏種子之有無也豈非意顯無漏種子有無耶恐有疑云既由無漏種子有無建立五性云何瑜伽説依障建立耶答云雖障之斷否由種有無然無漏種子幽隱難知故約彼障斷否以顯有無差別耳不然彼障外此無漏有無之因有何別因而有可害不可害者若謂法爾有此障別則無漏法種寧不許法爾有耶反而觀之若本全無無漏法種則諸聖道永不得生誰當能害二障種子而説依障建立種性差別明知依障建立者正顯無漏種子有無何必疑也四破無漏于當生既彼聖道必無生義説當可生亦定非理承上破無漏根之當生見難陀非已有種説之不當也難陀破地獄成就三無漏根之詞曰所説成就無漏種言依當可生非已有體今復破云既彼聖道必無生義説當可生亦定非理以當生無生全體相反相反故非理非理則唯本之説不破唯始之説何成五總教説以重責然諸聖教處處説有本有種子皆違彼義六約理教以結破故唯始起理教相違問理教者為復即教之理為復理不是教曰分之理自理教自教融之教外無理理外無教三總結由此應知諸法種子各有本有始起二類三辨具義二初正明六義二簡別外種初正明六義三初總標二別釋三總結初總標然諸種子略有六義總標以貫別釋見辨種者當精研其義于種也六尚云略則義義皆有所含義不離種則種種皆有六義既由種而有義必由義以知種義明而種自昭然是故辨種之義二別釋一剎那滅謂體才生無間必滅有勝功力方成種子此常法常無轉變不可説有能生用故顯種成于生滅無間也六義各三初句列名謂下正釋此下異體即種體才生必滅生時滅時無間隔也又無間者剎那剎那念念生滅曾無間斷者也于轉變位有勝功能生現果法方為成就種子耳彼無為之常外道之常常無轉變無能生用豈成種子耶故此生滅無轉變此勝功能無作用其不成種也彼表真如為種子者表入所果何謂而然耶二果俱有謂與所生現行果法俱現和合方成種子此前後及定相離現種異類互不相違一身俱時有能生用非如種子自類相生前後相違必不俱有雖因與果有俱不俱而現在時可有因用未生已滅無自體故依生現果立種子名不依引生自類名種故但應説與果俱有顯種成于因果不離也于列釋三之外自現種異類至必不俱有是申明義自雖因與果至無自體故是簡須現在自依生現果至與果俱有是原種立名謂與所生現行果法等者俱即同時現即現在和合即融會謂能生因種與所生現果同時現在融和會合始為成就種子耳彼有前後而非現俱決定相離而非和合者豈成所立種子耶故此現在前後和合相離也申而明之云何耶現生于種現種異類如子望母互不相違非如種生于種種是同類如母望母彼此相違而不和合也種于現行同處同時一身俱時有能生用非如種與種子種非異類前後相離而不俱時也簡而別之雖因與果有種現之俱種子之不俱而現在俱時可有因種能生現果之用須取俱也彼種子之未來者未生過去者已滅俱無體故不可取不俱也原而名之依生現果而立種名非依引生自類而立種名是則由義之申明復簡別于可否更推原于依立而義無餘蘊矣故但應説與果俱有豈可應説與因俱有耶問種生現種引種現熏種現引現四義不明上文多惑請詳示之曰種生現如炷生燈𦦨種引種如炷前後自相引現熏種如𦦨生焦炷現引現如𦦨前後自相引前三名親因緣後一名真等流問炷生𦦨𦦨生炷應名親因緣炷引炷何得名親因緣耶曰炷之下更無有物能生炷者即如前炷親引後炷此亦名親良以前念既滅後念已生即前念體親引後念略如輥彈者前輥至後後即前彈豈不親生種現相生別辨體者尚説為親種子引種前念後念即是一體豈不名親耶問誠如所言現引現行亦一體生何名等流曰前念種子生起頭上現行其種輥至第二念時還生頭上第二念現行故知後念現行不是前念現行親生乃第二念種子生也如𦦨引𦦨下已有前後燈炷而生即知後𦦨非是前𦦨親生故不可以為親因緣止取相似但可以為真等流耳問種生現現熏種𨚫得同時現引現種引種即不同時其理安在曰前二約豎論如頭上下生莖結子故得同時也後二約橫論剎那四相前後相引故不同時也同則一時二身相並有是理乎三恆隨轉謂要長時一類相續至究竟位方成種子此轉識轉易間斷與種子法不相應故此顯種子自類相生顯種成于隨順本識也相續簡間斷一類簡善惡長時簡不究竟究竟位謂種自類至成熟位也亦可即金剛道亦名治際良以金剛道𥠖耶此時功能方盡故名隨逐至治際恆與本識相應隨之而轉長時一類無記念念相續直至金剛究竟位始為種子成就耳若彼前七轉識轉易間斷不與種子相應故此一類彼轉易此相續彼間斷此顯種子自類相生者謂種引種也然雖有生義而無自熏義詳如宗鏡問前後相離既已為種義第二之所簡恆常隨轉何又為種義第三之所收曰義各不同簡別而分劑有歸種全具義圓收而規模無欠簡此所取約彼而簡收彼所簡約此而收豫奪隨宜各適其當問若一類相續應無有斷云何壽盡相耶曰生果有限種體非斷若以命斷而種便斷捨生趣生者其誰耶雖趣生不無現行而現行必從種體詳之四性決定謂隨因力生善惡等功能決定方成種子此餘部執異性因生異性果有因緣義顯種成于因力決定也先世業熏名因後生現行名果力即功能曰決定者生善果之功能斷不轉移為生惡果之功能始可為種子成就彼善因生惡果等之異性豈得成就種子故此決定彼不定見不定非種子也問異性因不成種子何謂因通善惡曰此説因緣彼是增上何可同年由是觀之善惡現行之果生于決定種子之能決定功能之種生于善惡熏習之業業惡者無論矣即熏習于善其熏不猛其力不生猛而不恆生亦不成功能未決于今生升沉寧保于來世永明云修行之要無他直要洗滌八識田中無量劫來根塵下無邉垢染種子乾淨妙哉言乎吾曹聞此鏤骨銘肌念念不忘始名善學法者始名不背恩者五待衆緣謂此要待自衆緣合功能殊勝方成種子此外道執自然因不待衆緣恆頓生果或餘部緣恆非無顯所待緣非恆有性故種于果非恆頓生顯種成于待緣和合也衆緣即因緣增上等四緣心種待四緣色種待二緣曰自辦自果之緣也如眼自九緣和合而生耳自八緣等也功能即生現之功能殊勝者以決定之能必緣合而生現殊勝也待衆緣者謂此功能要待自家衆緣和合而功能殊勝者方成為種子彼無緣而自然生不待緣而緣恆有豈成種子故緣合自然待緣恆緣其不成種子也六引自果謂于別別色心等果各各引生方成種子此外道執唯一因生一切果或餘部執色心等互為因緣顯種成于各引自果也別別色心自果也各各引生引自果也如是方成種子耳彼自在天等一因生一切果豈別因別果之謂乎餘部色心互為因緣豈因引自果之謂乎故其不成種子也三總結唯本識中功能差別具斯六義成種非餘總結具義也中即八之自證差別者每種皆具六義故曰功能差別具斯六義成種非餘見六義之必不可也二簡別外種外榖麥等識所變故假立種名非實種子此種𫝑力生近正果名曰生因引逺殘果令不頓絶即名引因內種必由熏習生長親能生果是因緣性外種熏習或有或無為增上緣辦所生果必以內種為彼因緣是共相種所生果故對內簡外決外種非因緣也初推原假實二通辨生引三簡緣所屬四重核其因總之外種是識所變相非親因緣但通論生引則不獨內種雙具外種亦具若別熏有無則內是因緣外唯增上以外種望所生果但為增上親辦果體必以內種為親因緣以是八識中共相種所生果故彼外榖麥等種亦是器界所攝故也大意如此詳之生引二因解有多種要之內種初生至壽量邉際為正果即名生因能引喪後尸骸未即壞盡為殘果即名引因外種初生至果成熟為正果即名生因能引枯後相續為殘果即名引因生因盡故枯喪引因盡故滅盡引雖生之餘𫝑而其力未不本于初始故古以放箭為生因彎弓為引因等也熏習生長已見前文或有或無者無性菩云從牛糞毛等隨其次第生彼苣蕂青蓮華根及以蒲等非彼苣蕂等與彼炭等俱生俱滅互相熏習而從彼生如是外種或無熏習又苣蕂等與華鬘等俱生俱滅由熏習故生香氣等如是外種或有熏習有無不定故名為或又增上有順有逆有力無力四種對因緣皆為外緣四辨熏習四初問答總標二別釋所熏三別釋能熏四通辨熏習初問答總標依何等義立熏習名所熏能熏各具四義令種生長故名熏習問答原名標熏習所由立也熏者資熏擊發習者數數不已現行心境資熏擊發不已自使本識種子生起增長也二別釋所熏三初徵二釋三結初徵何等名為所熏四義二釋一堅住性若法始終一類相續能持習氣乃是所熏此轉識及聲風等性不堅住故非所熏列釋三四𫨻皆同堅謂無易始終一類無雜是堅住謂無間念念相續不斷是住習氣即種子能持者此堅住性方能任持種子不失乃是所熏彼前六識多類變易則非堅五位無心則非住既無能持豈是所熏故為此且兼第七及經部師以七住有漏位雖不間斷在十地位中亦有解脫間斷得無漏時不能持有漏種有漏無漏體相違故第八雖是有漏以在因中體無解脫惟無覆性即不妨亦能持無漏種以經部師將色心更互持種今謂於無色界入滅盡定色心俱有間斷五根五塵不通三界如何持耶故亦也量之轉識是有法非是所熏為宗因云性非堅住故同喻如聲風等二無記性若法平等無所違逆能容習氣乃是所熏此善染𫝑力強盛無所容納故非所熏由此如來第八淨識唯𭘧舊種非新受熏平等無逆雙含二義一平等是表無違逆是無違逆即平等表處全平等即無違逆時全表二平等是能無違逆是所法是平等故無所違逆無所違逆因能法平等也平等無逆正無記面孔因此能容習氣如素帛之能容熏習乃是所熏彼善染𫝑力強盛無所容納如沉麝韭蒜之無所容於香臭非是所熏故為所也豈惟是哉由此之故如來第八淨識亦如沉麝不受不善無記等法亦非所熏即彼識中但唯𭘧昔曾熏之舊無漏種非今日又新受熏習而成種也問善不容惡為惡是煩惱善非煩惱何為不容曰亦不容信等所熏以互不相容故也是則單取堅住不以無記簡之則堅住於佛果之第八亦是所熏矣豈是所熏三可熏性若法自在性非堅密能受習氣乃是所熏此心所及無為法依他堅密故非所熏拘繫則不自在無拘繫者名心王堅密則不虛踈非堅密者為能受自在虛踈能受習氣可是所熏彼難陀第八五所豈得自在馬鳴無為真如寧得虛踈非是所熏故為所耳問前取堅此非堅差別云何曰前堅是一類不易取其能持此堅如金石之實非其不能受也名同義別須當以義定名是則縱兼無記而不以可熏簡之則第八心所之雙具二義無為之亦有堅住皆是所熏矣豈是所熏四與能熏共和合性若與能熏同時同處不即不離乃是所熏此他身剎那前後無和合義故非所熏同時者同一剎那同處者同一身處不即者所不是能不離者處時不隔時處同即離絶正與能熏共和合義乃是所熏若此人第八望他人前七他身不同處前後不同時相離非和合豈是所熏故為所也亦兼經部師前念識體熏後念識相不同時故亦非所熏是則止取前三為所熏而不以第四簡之則此人第八受他人前七之熏矣豈是所熏三結唯異熟識具此四義可是所熏非心所等三別釋能熏三初徴二釋三結初徴何等名為能熏四義二釋一有生滅若法非常能有作用生長習氣乃是能熏此無為前後不變無生長用故非能熏列釋三四𫨻皆同非常即生滅能有作用生長習氣者謂有生長習氣之作用也作用如此乃是能熏彼無為無生滅前後不變無生長用豈是能熏故為所二有勝用若有生滅𫝑力增盛能引習氣乃是能熏此異熟心心所等𫝑力劣故非能熏增盛即勝用能引正𫝑力增盛也勝用如此乃是能熏異熟心心所者心心所指第八及六識中極劣無記等指色法及不相應業感異熟心心所等雖有能緣熏用而無善染強盛之用能熏色法雖有強盛之用而無能緣熏用不相應行二用皆無總以弱該之言其皆不能引習氣也既不能引豈是能熏故為所是則獨取生滅而不以勝用簡之異熟心心所等皆能熏矣豈是能熏三有增減若有勝用可增可減攝植習氣乃是能熏此佛果圓滿善法無增無減故非能熏彼若能熏便非圓滿前後佛果應有勝劣攝收藏義植栽培義增減損益義若有勝之用數數熏習而使之增益熏習伏除而使之減損收攝培植其習氣乃是能熏彼佛果前七雖具生滅勝用以圓滿善法無所損益非是能熏故為所彼若能熏便非圓滿非圓滿便有勝劣豈佛果之謂哉是則止取前二不以增減簡之則佛果前七是能熏矣豈是能熏四與所熏和合而轉若與所熏同時同處不即不離乃是能熏此他身剎那前後無和合義故非能熏同前所熏第四不必重明問若與所熏和合一處方名能熏者且如後人為先亡作諸功德令他獲福豈非熏他識耶答此有二解一此但為增上令亡者自發心非熏他識二七分之中許獲一分非全獲也難曰只此一分便是此人造福他人受果應乖唯識矣答一定力二通力三借識力四大願力五佛法威德力此五唯識不判是則所獲一分功德全借識力等不判唯識但為增上外緣三結唯七轉識及彼心所有勝𫝑用而增減者具此四義可是能熏問七轉心所可是能熏第八心所何非所熏曰所闕自在故非所熏能熏之所雖闕自在為因有力可為能熏又受熏須一報之主所既非主果且無力故非所熏耳况王所一聚六皆受熏凡一能熏應熏六種種多現必多是一有情成六有情矣有是理乎問直如第七一聚心所有十八法緣第八時齊熏十八質種何無頓生十八種果之失耶曰能熏雖多受熏處一唯生一果如一麥中有多麵塵共生一等問前七能熏熏第八四分中約熏何分曰前五熏八相分種子第六熏八相見種子第七熏八見分種子問前七識四分何分能熏曰見相二分相亦能熏者以相是見分與力又自證與力故四通辨熏習如是能熏與所熏識俱生俱滅熏習義成令所熏中種子生長如熏苣蕂故名熏習能熏識等從種生時即能為因復熏成種三法展轉因果同時如炷生𦦨𦦨生燋炷亦如蘆束更互相依因果俱時理不傾動能熏生種種起現行如俱有因得士用果種子前後自類相生如同類因引等流果此二於果是因緣性除此餘法皆非因緣設名因緣應知假説通辨熏習以判結因果也初正辨熏習二種現相生三例明因果苣蕂即胡麻子可作油西域用油塗身先以華香取苣蕂子聚為一處淹令極爛後取苣蕂壓油香遂芬馥是以苣蕂本無香氣以華香熏俱生俱滅而後有香令熏習義成也種子增長者亦如苣蕂華香熏習同時種生現如炷生𦦨現熏種如𦦨生焦炷種現不離亦如蘆束更互相依種為因現為果種生現因果固同時現為因種為果現熏種因果亦同時也此同時理豈動搖耶俱有因者謂因與果俱時而有果與因俱名俱有因士用果者謂士夫作用所成辦果如由士農商賈書算占卜等士夫之用而成辦諸稼穡財利之果也如俱有因者能熏現因而生種果能起種因所起現果果與因俱也如俱有因得士用果者能熏勝用所生種子種隨因力生現果法士用所辦果也同類因者即因似果等流果者即果似因如同類因者前種與後種為因種因同種果也如同類因引等流果者前種生後自類所生自類果似前因故也此二於果是因緣性除此餘法皆非因緣設名因緣應知假説因緣不可易也問六因五果宗鏡雖已詳陳真似等流此文竟何所指曰八識之中三性種因生三性果是真等流此之謂也殺因而夭果施因而富果等皆似等流非此之謂也至若種生種名親因與現生現為等流已如前辨三總結是謂略説一切種相此通結前文一切種相應更分別以下之文也猶云略説不盡可知四能所行相二初問答標旨二正釋行緣初問答標旨此識行相所緣云何謂不可知執受處了設為問義舉頌以當其旨見執受處即所緣了即行相幽隱而不可知也又不可知及處了總是行相所緣四字二正釋行緣二初執受處了二謂不可知初執受處了二初略釋二廣釋初略釋了謂了別即是行相識以了別為行相故處謂處所即器世間是諸有情所依處故執受有二謂諸種子及有根身諸種子者謂諸相名分別習氣有根身者謂諸色根及根依處此二皆是識所執受攝為自體同安危故執受及處俱是所緣阿賴耶識因緣力故自體生時內變為種及有根身外變為器即以所變為自所緣行相仗之而得起故即廣之略釋行緣以明變相也初釋行相二釋所緣三明變相識之動處名行行之容貌即相了別行之貌也相業習氣名名言習氣分別我法習氣初屬相次屬見三屬遍計色根即勝義依處是浮塵及處之處則器界矣執受各二義執攝義持義攝為自體持令不散受領義覺義領以為境令生覺受根身具四義謂攝為自體同無記性持令不散不使爛壞也領以為境是八相分令生覺受與八同安危故八安五根安八危五根危故若器界則但領以為境而已有漏種子義同根身無漏則但持之一義而已前七現行不持不緣以變影而緣即犯八緣假法之過犯有情界增之過蓋變起則有兩重故也若親緣則緣他心犯唯識不成之過也自體生時者自證之體以因緣力生此能變之自體也內種根外器界見相二分皆自體所變內外不離于變也即以所變為自所緣所緣不離于變也行相仗之而得起故則行相又豈離于變哉故曰第一能變也問即以所變為自所緣為有本質為無本質答無本質問前五與第八皆是境從種生識任運緣同此二義之因緣變何五識有本質八便無耶曰前五非根本故緣境須藉本質八是本識不假本質全體現量性境若離三境外更有法與八為本質者即心外有法雖然若望緣他人浮根及異器界定中果色即不其本質也若夫無漏種子以對治義不順義性異義之三種雖不為本識之境而以不離識故亦非心外有法况究竟為果上相分之流類乎問種子不離自證八識能緣種子時能緣自證否曰緣犯因中內緣之過但緣種子如水中鹹味色裡膠青但緣水色自外鹹青二廣釋五初廣釋了字二廣釋處字三廣釋執受四結顯二變五簡別二變初廣釋了字二初且攝見分二詳辨諸分初且攝見分此中了者謂異熟識于自所緣有了別用此了別用見分所攝既曰是用非體可知既曰見攝非證可知然而下文四攝為三或攝為二後三皆是能緣性故皆見分攝則見分所攝四字豈徒然哉即前即後全後于前見分所攝非特以見為見也二詳辨諸分三初難陀二分二陳那三分三護法四分初難陀二分二初用二破一二小大互明初用二破一然有漏識自體生時皆似所緣能緣相現彼相應法應知亦爾似所緣相説名相分似能緣相説名見分若心心所無所緣相應不能緣自所緣境或應一一能緣一切自境如餘餘如自故若心心所無能緣相應不能緣如虛空等或虛空等亦是能緣故心心所必有二相如契經説一切唯有覺所覺義皆無能覺所覺分各自然而轉承上雖見分所攝若不廣辨諸分從淺之深而次第即後于前而圓融不惟見分不徹將見所攝亦不洞然矣故云然有漏識等云云也初正立二分次破無所緣三破無能緣四證有能所皆似現者謂依他似遍計識體生時二分無不現也相應亦爾者心所同心王也似所緣名相非以遍計為相似能緣名見非以遍計名見相見二分如此若心心所無所緣相眼應不緣自所緣色耳應不緣自所緣聲或應眼能緣聲等耳能緣色等色如聲等聲如色等矣有是理乎所緣不可無也應不能緣如虛空等順破無能緣或虛空等亦是能緣反破無能緣能緣不可無也一切唯有覺證唯識也所覺義皆無證心外妄執實境是無也能覺所覺分能覺證依他實見分所覺證依他實相分也各自然而轉證見分從見分心種生相分從相分色種生也自然而轉誰能強使之轉誰又能強使之不轉實種生現因緣之變也彼安慧竟以見相為假獨立自證為實蓋未考諸此宜乎絶救于難陀之難二大小互明執有離識所緣境者彼説外境是所緣相分名行相見分名事是心心所自體相故心與心所同所依緣行相相似事雖數等而相各異識受想等相各別故逹無離識所緣境者則説相分是所緣見分名行相相見所依自體名事即自證分此若無者應不自憶心心所法如不曾更境必不能憶故心與心所同所依根所緣相似行相各別了別領納等作用各異故事雖數等而相各異識受等體有差別故用逹迷以明分也初舉執二執外境心外本質之境相分本質變影之相事體事同所依緣者同所依根同所緣境也以執離識之境故所緣同以相分為行相故相相似數謂軌則心王之事即心體相心所之事即所體相軌則不異故言數等相各異者識非受等也總之執心外之境為所緣遂以相分所緣之境為行相見分能緣之行相為體事迷殆至此故下其執云逹無離識所緣境者則説相分是所緣豈外境是所緣見分名行相豈相分名行相相見所依自體名事即自證分豈見分名事乎此若無者應不自憶心心所法如不曾更境必不能憶故斷有自證分也心心所法者見分心心所也如不曾更等者更猶經歷也自證即證自證自見分緣境不謬也自證若無應不自憶見分如見分不曾經歷之境後必不能憶境良以能緣見分於過現世但緣相分不曾自緣則前已滅心既入過去有何所以而自憶持今許現時心心所法能自記憶明知昔日者以定有自證緣于見分證彼緣境作量果故故今能記憶耳即如現今眼識見分忽然緣青定不緣黃緣黃定不緣青者皆由自證綱維樞紐之力證彼緣境不錯謬耳豈無自證耶同所依根者如眼識依眼根等所緣相似者以內如外現不同以本質外境為所緣也行相各別者王所見分作用有異不同以相分為相似也體有差別者王所之數雖等而各自有體不同全以見分為體也古釋謂此雖是立二分家義已有三旨哉言乎是則執者以迷唯識不唯於自證而所緣行相體事之皆非逹者以契唯識既能根於自證而所緣行相體事之皆正微執者不顯逹者之是微逹者豈知執者之非彼此相形黑白始顯為論之式固如此為人之心為何如二陳那三分然心心所一一生時以理推徴各有三分所量能量量果別故相見必有所依體故如集量論伽他中説似境相所量能取相自證即能量及果彼三體無別用三破二以明分也初正明二引證各有三分者八王五十一所各各皆有三分也所量是相分能量是見分量果是自證自證即所依體也果成因義謂自證足以成見分緣境之因不謬故曰果也似境相所量者即相分似外境現是所量也能取相即見分體無別者同一識也若以喻明所量如絹能量如尺量果如記數之智是則安慧之自證有體無用難陀之二分有用無體今此三分體用方具三護法四分四初正明四分二判屬四分三引證四分四融攝歸心初正明四分又心心所若細分別應有四分三分如前復有第四證自證分此若無者誰證第三心分既同應皆證故又自證分應無有果諸能量者必有果故不應見分是第三果見分或時非量攝故由此見分不證第三證自體者必現量故立四分以補立三之不足也初正立第四次斷有第四三無第四應皆證者見分是心分自證證於見自證是心分證自證應證必有果者見分是能量自證為量果自證量於見必有證自證恐彼救云即以見分為量果故救云不應見分是第三果所以然者見分或時非量攝故證自體者必現量故良以證猶保證如人之敦直者始可為保一現量二內緣三不變影四是自體方可為量果今見分不止於比或時非量則現量尚不能純况四法乎證第三者必具四之證自證若更補以喻顯則絹尺與智如前三第四如人以尺能量絹智為量果智屬於人人為智果又鏡影是所量鏡光是能量鏡面證鏡光鏡背證鏡面思之可知二判屬四分此四分中前二是外後二是內初唯所緣後三通二謂第二分但緣第一或量非量或現或比第三能緣第二第四證自證分唯緣第三非第二者以無用故第三第四皆現量攝故心心所四分合成具所能緣無無窮過非即非離唯識理成判屬內外緣量以顯理也是外者見相唯在外門轉也是內者後二唯在內門證也初唯所緣後三通二判能所也謂第二分但緣第一則見屬能緣第三能緣第二則見屬所緣第三能緣第四則三是能緣四是所緣第四唯緣第三則三是所緣四是能緣以無用故者為第三所證故也量之三四皆現第二通三謂現比非也無無窮過者三四互證則不須更有證矣不然第五第六展轉何窮非即者具四分故非離者唯一識故離即俱非唯識理成豈以四為四耶三引證四分是故契經伽他中説衆生心二性內外一切分所取能取纏見種種差別此頌意説衆生心性二分合成若內若外皆有所取能取纏縛見有種種或量非量或現或比多分差別此中見者是見分故引證四分見所立之不可易也二性者內二分為一性外二分為一性也一切分者即內外各有二分也所取纏即所緣相分之纏縛能取纏即能緣見分之粗動種種差別謂三量各不同也四融攝歸心如是四分或攝為三第四攝入自證分故或攝為二後三俱是能緣性故皆見分攝此言見者是能緣義或攝為一體無別故如入楞伽伽他中説由自心執著心似外境轉彼所見非有是故説唯心如是處處説唯一心此一心言亦攝心所故識行相即是了別了別即是識之見分融攝唯心結見攝于異熟也初正攝二引證三結歸第四攝入自證者後二皆識果體故後三俱是能緣性者後二攝入第二見分故體無別故者唯一心故如是處處説唯一心等者因釋經義而總收一切謂不獨此經如是唯心如是處處皆説唯一心也色法心之所變似外境轉色唯一心心所與心相應所不離心所唯一心真如之理識之實性亦不離心並名唯識説唯一心也以故識之行相即是了別了別不離于識了別即是識之見分見分不離于識然則前云見分所攝即是識攝前即是後豈徒言哉二廣釋處字二初總釋正義二問答詳明初總釋正義所言處者謂異熟識由共相種成熟力故變似色等器世間相即外大種及所造色雖諸有情所變各別而相相似處所無異如衆燈明各遍似一總釋該別以顯性境也初正釋二通難異熟識是能變之心共相種是器界之種共相者永明云多人所感故雖人人所變各別名為唯識然有相似共受用義説名共相實非自變他能用之若能用者即犯緣心外法故變似色等者謂由自種為因緣故本識變似色等器世間相唯外非情即能造四大所造四微以色在外處故言外大非心外法恐有難云諸有情識所變各別云何現見是一器界故通云雖諸有情所變各別共中不共而相相似共中共也喻之諸有情如衆燈所變相如燈明所變各別如明各遍而相相似處所無異如明似一也總之是第八所緣性境曰處處即器界器由種變而種根于識異熟識中共相種熟變成器界雖所變各別共而不共而相相似不共而共處所豈有異耶如衆燈明明雖各遍而實相似不必疑也二問答詳明二初正為問答二次第難明初正為問答誰異熟識變為此相有義一切所以者何如契經説一切有情業增上力共所起故問答能變之識使不迷于共變也初問次答問曰為誰欲有定指答云一切熟可為徴引經説一切有情業增上力共所起故意以由經而知一切器界變于一切聖凡等之異熟識也二次第難明二初難一顯正二難二顯正初難一顯正有義若爾諸佛菩應實變為此雜穢土諸異生等應實變為他方此界諸淨妙土又諸聖者厭離有色生無色界必不下生變為此土復何所用是故現居及當生者彼異熟識變為此界經依少分説一切言諸業同者皆共變故難初家所解以顯經正義也初難斥二顯正難斥者意以經云一切非謂總該聖凡普收高下而無所遺餘之一切也誠如所解諸佛菩應實變為此界穢土諸異生等應實變為他方此界諸妙淨土耶佛度衆生權現容有生承佛力乍見或然而謂為實變恐不可也又諸那含聖者消礙入空厭離有色生無色界必不下生變為此土復為何用又不可也既諸難之相違當何説之為正是故乃現居及當生者彼異熟識變為此界經依現當少分説一切言諸業同者皆共變故非以一切為一切也是則現居則佛居淨生居穢既無淨穢雜亂之失當生則有當生有不當生且無無色生變之非共種所感愈明異熟之誰有定論矣二難二顯正有義若爾器將壞時既無現居及當生者誰異熟識變為此界又諸異生厭離有色生無色界現無色身預變為土此復何用設有色身與異地器粗細懸隔不相依持此變為彼亦何所益然所變土本為色身依持受用故若于身可有持用便變為彼由是設生他方自地彼識亦得變為此土故器世界將壞初成雖無有情而亦現有此説一切共受用者若別受用準此應知鬼人天等所見異故難二家所解以顯能變之正義也初難斥二顯正難斥者初器壞無生難難云現居當生所變據器界住時猶或可耳器將壞時當現之居既無變土之人何在此一不可也二預變無用難難云生無色後雖後當生然今現無色身况未即下生且上下之界劫數長短天壤不侔下土劫短久經三災預變何益此二不可也三粗細懸隔難難云設汝謂無色無身不變或可色界有身豈得不變不知色界之身細下界之器粗上之與下粗細懸隔不相依持此變為彼亦復何益此三不可也三皆不可而以當生現居當經之一切為當為不當耶故正顯云當與不當當觀所為今所變之土果何為耶本為色身依持受用耳故若于身可有持用便變為彼不當論于此彼之土也由是義故此土雜居自地之生設生他方雜居自地彼雜居自地衆生之識亦得變為此土雜居之自地耳故器世界將壞初成雖無有情而亦現有何必以無有情遂無能變之識為難耶如此方之人置彼方之産雖不現居而亦得有受用義也此説一切共受用者結前非別受用而是共中共變也若別受用準此應知者例雖後不離前而是共中不共變也鬼人天等所見異故者各於同中別有所見也如一恆河鬼見為火人見為水天見琉璃魚見窟宅彼類為同此類別于彼此類為同彼類別于此也問何為四變曰一共中共即無主山河衆業共變而共受用者也二共中不共即有主山河共變而不共受用者也三不共不共即勝義根唯本識變唯自受用者也四不共中共即浮塵根雖唯自識所變他亦受用者也四變不同同唯識變問下三姑置共中共者如多人共變無主一樹多人受用一樹一人斫去一人不見是名唯識餘人不斫悉皆不見何名唯識曰一人斫去所隨之相分已滅餘人不見能隨之相分亦亡善哉慈氏之言曰相似業生隨順業轉衆業同變曰相似生多人相分被一人受用名隨順業轉業能轉生能必隨所何必疑也三廣釋執受二初種子二根身初種子諸種子者謂異熟識所持一切有漏法種此識性攝故是所緣無漏法種雖依附此識而非此性攝故非所緣雖非所緣而不相離如真如性不違唯識釋執受之種子以顯性境也初正顯二通妨所持一切有漏法種持而不失也此識性攝攝入無記性也故是所緣領以為境也持攝境三含于覺受四義𭓩具無漏法種雖依附此識而非此性攝故非所緣者依附是持義非攝非緣含于覺受惟持之一義耳簡別之義固明妨難之情隨起良以既非所緣必是相離既是相離何名唯識故為通云雖非所緣而不相離例如真如之性是識實性不違唯識豈以非緣便得相離二根身二初正釋二通異初正釋有根身者謂異熟識不共相種成熟力故變似色根及根依處即內大種及所造色有共相種成熟力故于他身處亦變似彼不爾應無受用他義釋執受之根身以顯性境也初變自根身二變他依處根身者根是別名身是總稱有根之身名曰根身不共相者別業所感之因名不共相種似色根者謂勝義根即不共種因所變不共之果正不共中不共也及根依處者謂浮塵根是勝義依處即不共種因所變不共之果正不共中共也內大種謂地水火風以對外四大名內周遍十方名大能成一切名種所造色對四大能造色言謂色香味觸之色也能所合成是根身體有共相者於上不共種中復有一分共相種子成熟力也於他人身處亦變似浮塵根若不變者應無受用他義名不共中共據此則不唯自變根身亦變他人浮根矣二通異此中有義亦變似根辨中邉説似自他身五根現故有義唯能變似依處他根于己非所用故似自他身五根現者説自他識各自變義故生他地或般𣵀槃彼餘尸骸猶見相續通異解決變依處之為是也初舉異二明正三通論四結驗異解謂變勝義似根引論以證孰知論意之未必然乎故有義斥云唯能變似依處良以有受用故有變若變他勝義根于己非所用矣變之何益至于所引似自他身五根現者非説變他勝義根也乃是説自阿賴耶識自變為根他阿賴耶識他變為根各自變義豈自變他根耶不唯無用不變他根亦由不定説言自身本識變他根故何可為證故生他地或般𣵀槃彼餘尸骸猶見相續之可證也餘尸骸即浮塵亦名依處相續者雖終必歸盡現今未即盡也尸骸相續足驗已死有情自己種子引因之力猶見尸骸相續正驗現在有情種子變現之力也豈非變他依處問若變他依處受用他人將非心外取法有乖唯識耶答以自先變一重相分在他身處雖受用他相分實受用自相分耳不乖唯識問若受用自相分殺他即是殺自何為又得地獄罪耶答自相分與他相分同在他人身處殺自相分亦能令他五根根分斷滅故得罪也噫玄矣哉四結顯二變前來且説業力所變外器內身界地差別若定等力所變器身界地自他則不決定所變身器多恆相續變聲光等多分暫時隨現緣力擊發起故略説此識所變境者謂有漏種十有色處及墮法處所現實色總結二變見所變之不同也初分別二變不同二總結一識所變二變不同者前業力所變此定力所變業力所變決定定力所變不決定也不決定者定力所變之器有界有地界地隨機宜以淨穢固不可定定力所變之身有自有他自他任緣力以尊卑又不可定故曰不決定也然于不決定中有可定者則所變身器是一期利物為他受用故多相續所變身光等是隨現緣力擊發而起多分暫時此所變之不同有如此者若夫反博歸約總而結之則略説此識所變境者謂有漏種子根塵器界十色三類之性境及墮法處定果實色之四類性境而已以定果色亦是法處所攝色故名定自在所生色如十遍處至魚米肉山酥酪黃金等皆此色攝五簡別二變三初問答二簡定三結顯初問答何故此識不能變似心心所等為所緣耶有漏識變略有二種一隨因緣𫝑力故變二隨分變𫝑力故變初必有用後但為境設為問答以定異熟之變也初不能變心為所緣之故意謂色心名所變變色心者名能變能變無二所變寧殊此識既能變根器等似色法為所緣不能變似心法為所緣者故將安在欲其不能之故以定此識之變也故答云有漏識變略有二種一隨因緣𫝑力故變二隨分別𫝑力故變等云云也名言實種名因異熟增上業因名緣慿業所轉任運而緣名因緣𫝑力順此力故轉為境等名隨因緣𫝑力故變由于作意而生籌度名分別于籌度中發起連𭘧名分別𫝑力順此力故轉為境等名隨分別𫝑力故變此分別變故之不同也因緣從實種生既有實體斷有實用如宗鏡云唯第八異熟心故所熏處故能持種故故曰初必有用分別從作意生既無實體豈有實用如宗鏡云餘七所變色觸等皆無實用似本質用如鏡中光故曰後但為境此分別變用之不同也意以知識變之故變用之殊則不能變之故明矣問後但為境豈非用與緣耶曰但可為六七之境不可為第八所緣之境又六七之心所緣影像相分無有實體未必有用以故因緣變非分別即五識王所第八心王以所緣相分自種生故二惟分別變非因緣即有漏第七第八五所所變相分唯從分別心生故三是因緣是分別即有漏第六無漏第八以能通緣假實法故四非因緣非分別即不相應行以無實體故不與能緣同種生故精細若此不可忽也二簡定異熟識變但隨因緣所變色等必有實用若變心等便無實用相分心等不能緣故須彼實用別從此生變無為等亦無實用故異熟識不緣心等至無漏位勝慧相應雖無分別而澄淨故設無實用亦現彼影不爾諸佛應非遍智簡定異熟唯因緣變也初顯有漏不緣二明無漏能現相分心等不能緣故者釋無實用之所以如深密經云諸變化心無自依心有依他心佛地論謂無自緣慮實體之心有隨見分所變相分似慮之心如鏡中光此即相分心自不能緣名無實用又第八因中不能緣正名無所緣實用也須彼實用別從此生者顯決無實用也彼是相心此是因緣相心必從分別生不從因緣生則須彼相心實用別從此因緣生可也必不從此生必無實用明矣變無為等亦無實用者亦顯非所緣也以假無為異熟不緣犯變影而緣故實無為異熟亦不緣以未曾證故下結答前問云故異熟識不緣心等何必疑也然仍恐執有漏異熟之位以迷無漏故又云至無漏位勝慧相應非有漏無慧劣慧之可比也雖無分別而澄淨故既具能現之德設無實用亦現彼影而起遍照之功不爾諸佛應非遍智決顯必現影也是則有漏第八唯是因緣無漏第八通因緣分別矣餘如上引三結顯故有漏位此異熟識但緣器身及有漏種在欲色界具三所緣無色界中緣有漏種厭離色故無業果色有定果色于理無違彼識亦緣此色為境結定所緣顯見分之不緣也三所緣謂種子根身器界緣有漏種顯因中不緣無漏種也厭離色故者厭惡逺離業因所感之業果色即欲色等依正是也有定果色者定力為因所顯果色曰定果色也亦緣此為境則不止緣有漏種而已問定果色為可見否曰經謂佛邉側立淚下如雨變身萬億共立毛端蓋歷歷可徴何不可見特業果粗而定果細非可以易見耳以上釋執受處了竟二釋不可知不可知者謂此行相極微細故難可了知或此所緣內執受境亦微細故外器世間量難測故名不可知云何是識取所緣境行相難知如滅定中不離身識應信為有然必應許滅定有識有情攝故如有心時無想等位當知亦爾釋不可知令人知有不可知也初正顯二歷指總承上文謂執受處了已如所釋而頌謂不可知者果何所謂謂此行相極微細故難可了知曰不可知或所緣內執受境根身種子亦微細故難可了知曰不可知或外器界上下界地粗細廣狹量難測故難可了知曰不可知則行相所緣見相二分一一微細皆難知故曰不可知非專指一法言也雖然此是言本識見相不可知未是指不可知見相之本識也指本識于難知則難知有下落矣故復徴云云何是識取所緣境行相難知答云如滅定中諸識不行然有一類微細本識不離身中念念相續此即本識而行相等自在其中矣既非是無應信為有也若取而量之滅定有識為宗因云有情攝故同喻如有心時無想定等亦然若無有識則是非情死人矣以何為滅定者以何為無想者以何為滅受想者乎特其幽微玄渺罔象虛神如水中鹹味色𫟚膠青決然是有不見其形故永明云此體不可説微妙最難知周遍法界而無住心任持一切而不現相若月含一色遍分萬象之形等日耀千光普照四天之下云云也雲棲合山衆比丘捐資刻姑信女張門李氏大緣助板賢預
