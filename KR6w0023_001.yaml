body:
  text: 古杭雲棲寺弟子廣伸述將釋此論大文分四初題目二論主三譯師四正文初題目成唯識論識即八識有了別義謂眼能了色耳能了聲以至賴耶了別根身等自分之境是也唯獨義唯識者獨有內心無外境也雖所了之境似在心外而境從識變不越內心曰唯識也成安立義成唯識者由智立量據教證理破彼外境樹我唯心曰成唯識也此總括大意脈絡貫通令易曉耳詳之則識具五義唯具三義成有八義五義者一自相謂諸識自己之體狀二所變諸識所變之境相三相應諸識相應之心所四分位諸識色心之分位五實性諸識二空之真性諸識各具五義五義全是諸識故名識也三義者一簡持義簡去遍計我法之妄任持依圓二性之真二決定義決無心外之境定有內心之識三顯勝義五位百法唯心顯著為主能變勝餘法故三種不同同歸唯義故名唯也八義者比現二智宗因喻三異同二類以及聖教始終相承循環不斷總名成也論者較量往返徴辨較量旨歸楷定本頌之正意決了唯識之真宗也然有二種一宗論宗經立論自為一書者也二釋論但釋其言發明其致者也今雖釋論亦可該宗以遍證諸經橫該大藏樹義標玄破偏立正故也必成此論者良以凡外及諸小乘迷謬唯心膠粘外境邪宗自此綢繆真乘由是迂遠大聖垂慈興言拯始彌勒宗諸經以説瑜伽繼天親宗瑜伽而作本頌諸賢釋成百卷奘師糅百為十根於正智發於宗因類之以異同證之以聖教一顯聖凡依正全體自心教行理果天然唯識心外之邪宗自寢唯識之正理全彰誠真明之關鑰至道之玄樞也兩手預為分付三金始就一觀豈徒然哉又所觀百法為體能觀王所為用而取慧則一遣虛存實至五捨相證性五觀問答略如樞要二論主護法等菩造菩云覺有情以唯識之正智覺外執之有情也等者親勝火辨德慧安慧難陀淨月勝友陳那智月九大論師也九師與護法皆成十卷今首護法者按法乃毗茶國人大臣之後生而神王愛而壻之以彼久修離欲愛染無心將成之夕默於佛前祈求解脫忽有神人携之數百里外置古寺中厥後遇緣出家遍究諸乘心專至道芳聲動於列國著述擅於諸方片言妙義遏競者之橫流半偈全機啓當人之正信踈文淺義𣲖演不窮浩句宏宗甄陶有則比夫九師則獨擅光輝標芬馥故首標也三譯師唐三藏法師玄奘譯唐代名三藏經律論法師以法師範衆生譯易𣑽語為華言也按師陳留郡人姓陳氏世祿之後幼而圭璋特逹聰慧不羣隨兄腱法師出家於淨土寺因遍謁諸師稽諸聖典隱顯有異莫之適從乃誓詣西竺以問所惑既至則無迹不禮無教不披閲斯妙理殷俯諦求玄鑑居士記先聖之遺言必今賢之是囑因奉斯草本五蘊論章歸而錯綜羣言糅成十卷先是師西行之日撫靈巖寺松而作誓言吾西行汝西長吾東歸汝東向後松果西長數丈忽一日東旋門弟子喜曰吾師歸矣已而果然師之真語化彼無情當與如來真語實語無有異也論譯於師可弗信歟四正文三初緣起二正論三回向初緣起四初皈敬述意二總釋論意三別釋論意四總結前意初皈敬述意稽首唯識性滿分清淨者我今釋彼説利樂諸有情性以隨緣不變為義曰識性者性不離相即頌中諸法勝義即是真如指法寶也滿淨者障淨德圓指佛寶分淨者二障分淨指僧寶稽首者皈敬之至也言陳似止屬身厥意通該三業必皈敬者臣子有為必告君父况三界大師三寶不測之神力乎皈敬既已逼真護念因而有地故必稽首乞求加被也彼説指三十頌釋彼説指作論諸語辭諸有情指當機又諸無盡義謂當機之外見聞隨喜以至疑毀不信凡有知者皆是也利利益知唯心之理依解以起行也樂安樂順唯心之理斷障以證性也又此專指當機而言若夫疑毀不信亦能植種識田多劫多生俱蒙解脫亦利樂也又此偈二句固重請加二句固顯釋意然利樂必由於釋頌釋頌必因於有智智慧必成於請加則請加乃所以生智生智乃所以釋頌釋頌乃所以利樂而成悲也欲即智以成悲必請加而益智我凡衷忽冥聖意矣是則四句雖有二意總之歸重請加故名論前皈敬又皈性是重意以唯無漏唯真諦聖所履迷悟依故亦可世俗勝義依圓識性二總釋論意今造此論為於二空有迷謬者生正解故生解為斷二重障故由我法執二障具生若證二空彼障隨斷斷障為得二勝果故由斷續生煩惱障故證真解脫由斷礙解所知障故得大菩提頌文皈敬請加本為利樂有情然不知有情如何我云何為使彼得何利樂故曰今造此論為迷真執妄住苦果失利樂之有情使之生解破迷斷障證果得真實廣大最為殊勝菩提𣵀槃之利樂也此總括大意詳之則於二空有迷謬者所為之有情也生解證空斷障得果正利樂於有情也迷謂乖真謬謂執妄如迷方者執東為西也苐凡外我法俱執則二空俱迷小乘但餘法執故唯迷法空空曰二者由斷二執得二空名理非有二也由我法執二障具生者由我執引生煩惱障大𣵀槃法執引生所知障大菩提故也若證二空彼障隨斷者智起惑亡如明生暗滅不移時也煩惱既能續生斷之則生永寂得入𣵀槃名真解脫所知既能礙解斷之則智慧獨朗得圓滿覺名大菩提是則造論能令有情利樂如是故必請加益智以釋彼説也又煩惱者燥義悶義勞義擾亂義謂見思惑而云障者煩惱即障非煩惱之障也所知障者智所知境名為所知𬒳此染法障所知境令智不知名所知障蓋所知之障非所知即障也其二障頭數同是根隨二十六惑以惑上有擾亂用曰煩惱障有覆蓋用曰所知障此二具有分別俱生頓斷漸斷單斷雙斷伏斷後先大小乘別之不同詳載後文三別釋論意又為開示謬執我法迷唯識者令逹二空於唯識理如實知故復有迷謬唯識理者或執外境如識非無或執內識如境非有或執諸識用別體同或執離心無別心所初至如實知故別為小乘凡外次至無別心所別為聖教異執以作論所為始終總意雖見上文而證果由於斷障斷障由於破執破執由於通逹通逹又由於開示也故又為開示我法開示異執開示妙理前陳之惡既祛初之善可運由此而障可漸斷果可漸證誠尅敵之先鋒為人之第一義云別為也此統括大意詳之則開者裂其封示者指其詳如開倉指示其麻等也我法元假執之為實曰謬唯識本真昧之不覺曰迷二空曰逹者我法了不可得也如實知者知理毫無所間也或執外境如識非無者有境也迷謬唯識之境空也或執內識如境非有者無識也迷謬唯識之心有也或執諸識用別體同者迷謬唯識之體用皆不同也或執離心無別心所者迷謬唯識離心王之別有心所也四師之異見紛紜凡外之迷情差別皆為化之有情也由開示而異見唯心自通逹而迷情無地皆利樂於有情此又皈敬請加釋彼本頌之意也又按古釋則第一是有宗依十二處教執境如心俱有也二如清辨等依密意空教識如境亦空也三是大乘一類菩計諸八識體唯是一如一水鏡多波像生四是經部覺天所計士夫六界染淨唯心無心所故雖於蘊中亦有心所但於識上分位假立非實有體也士夫即作者以心能造物故名作者六界謂地水火風空識各別故名為界四總結前意為此等種種異執令於唯識深妙理中得如實解故作斯論種種異執不獨舉前仍該未備莫為終窮曰深不可思議曰妙即唯識性也果如實解異見全歸正見時恰是表時作論之故為令若是故曰為此等云云也以上例經序分此下例經正宗回向例經流通矣正宗中前二十四頌辨唯識相第二十五頌辨唯識性後五頌辨唯識位二十四頌中初一頌半略辨唯識次二十二頌半廣辨唯識今略辨也二正論二初詳釋本論二結釋題目初詳釋本論三初明唯識相二明唯識性三明唯識位初明唯識相二初明能變三相二明所變唯識初明能變三相二初略明三能變二廣明三能變初略明三能變二初本論二論釋初本論若唯有識云何世間及諸聖教説有我法頌曰由假説我法有種種相轉彼依識所變此能變唯三謂異熟思量及了別境識論主設為問詞意以識名曰唯此外無剩法矣世間縱迷不知聖教堪為定量若唯有識云何二俱各説有我法耶説有者是唯將安在稱唯者正定量被訶果何所適從哉二論釋二初釋前三句二釋後三句初釋前三句二初略釋二廣釋初略釋四初釋第一句二釋第二句三釋第三句四結判前文初釋第一句論曰世間聖教説有我法但由假立非實有性我謂主宰法謂軌持我謂主宰出我執體用主如君主有自在義任運自然體也宰如宰輔有宰割義分別不同用也法謂軌持顯法執體用軌謂軌則軌生物解如火不言燥軌人取以發育水不言濕軌人取以滋成用也持謂任持有不失義如火持燥性不失為濕水持濕性不失為燥體也假立者隨諸緣位假説我法聖教中有體假也隨自執情施設我法外道等無體假也意謂世間聖教固説我法而主宰我軌持法但由假建立耳豈真有我法之體性哉蓋言説與我法為由由言説故有假我法我法與言説為由由有我法方起言説而最初言説根由於妄情執有我法耳故曰但由假立二釋第二句彼二俱有種種相轉我種種相謂有情命者等預流一來等法種種相謂實德業等蘊處界等轉謂隨緣施設有異情對無知命即命根凡有知者曰情命通指六凡而曰等者等彼知者見者受者神我等此世間我相也預流初果也一來二果也等者等彼三賢十聖等此聖教我相也實德業等即勝論六句世間法相也蘊處界等即佛法三科聖教法相也隨緣謂隨主宰軌則之緣施設有異者隨主宰之緣立我名異於法隨軌則之緣立法名異於我而我法之名亦復各異如於名色入界和合法中妄計有我名有情妄計命根成就連持不斷曰命者至斷分別我曰預流斷欲界修惑六品曰一來等是也如為迷心重者説五蘊迷色重者説六根俱迷者説十八界是也夫世間我法妄情執著假説無論聖教何亦説耶以隨順世間故言説便易故能除無我怖畏故更有自他染淨事業等故是故亦假説耳總之聖教之説我名字我也三釋第三句如是諸相若由假説依何得成彼相皆依識所轉變而假施設識謂了別此中識言亦攝心所定相應故變謂識體轉似二分相見俱依自證起故依斯二分施設我法彼二離此無所依故或復內識轉似外境我法分別熏習力故諸識生時變似我法此我法相雖在內識而由分別似外境現諸有情類無始時來緣此執為實我實法如患夢者患夢力故心似種種外境相現緣此執為實有外境文分四假初躡徵略釋二闡頌所攝三層直詳解四舉喻顯計初二可解層直者自證是識之體相見是識之用我法依所變相見相見依能變自證故云層也直者外境是所變內識是能變似外境現之我法依內識轉故云直也必先層者依因緣故必後直者分別熏故依如是熏如是終日層終日直無二我法也然以似故攝於依他諸有情類無始時來緣此執為實我實法則遍計矣喻如病力所現夢力所現執似為真執內為外不既顯且現乎是則我法依識所變而成離識有實我法哉故曰假説又外境者謂似我法對內識言俱名外境又轉變異變現變現唯現心等能起見相不通於種相分色等轉變通於種現現能熏種種能生現種能生種故也四結判前文愚夫所計實我實法都無所有但隨妄情而施設故説之為假內識所變似我似法雖有而非實我法性然似彼現故説為假外境隨情而施設故非有如識內識必依因緣生故非無如境由此便增減二執境依內識而假立故唯世俗有識是假境所依事故亦勝義有結判三𫨻初至故説為假雙結上文兩節之意先結遍計我法全空非有後結依他我法雖有非真同一假也故頌中曰假説論中曰假施設等次至增減二執心境合論彼此互形道理昭然境無心有境無則境有之增心有則識無之減二謗既中道表矣三至亦勝義有以二諦判心境之寬狹也唯有單俗故名狹亦有兼真故名寬問所依事故既兼真俗依識而境何唯世俗答以執為實有外境故也如下文云若執唯識真實有者亦是法執則亦唯世俗有矣唯由於執何以疑為二廣釋二初通明二別釋初通明云何應知實無外境唯有內識似外境生實我實法不可得故廣辨我法中總問答也問意謂內固有心外實有境人所知也唯有內識似外境生人所昧也使我不昧洞然了知應云何耶意其窮立破於毫端研真似於當下也答意謂實外境者為實我法我法可得外境何可無也實不可得外境將安在若欲了知但盡於不可得已下文千蹊萬徑同歸於不可得之中曲辨詳陳盡入於無何有之內名曰通明良有以也二別釋二初明我法執相二顯我法唯識初明我法執相二初釋我執二釋法執初釋我執二初徵二釋初徵如何實我不可得耶二釋三初別明我執二總顯我執三問答通妨初別明我執三初約我量計大小二依蘊立分即離三核異執明實無初約我量計大小二初敘計二破計初敘計諸所執我略有三種一者執我體常周遍量同虛空隨處造業受苦樂故二者執我其體雖常而量不定隨身大小有卷舒故三者執我體常至細如一極微潛轉身中作事業故別答我問中敘外道三種實我執也一即勝數二師所執言隨處造業受苦樂者意以我體既常無時不有體既遍無處不同量同虛空充塞無欠故隨處隨時以造受也二即無慚尼犍二宗所執言隨身大小有卷舒者身大則我舒之而同大身小則我卷之而同小我與身合故言隨身隨身有常義卷舒即不定義也三即獸主遍出二宗所執曰潛轉身中作事業者以至細難窺云潛運動不息云轉轉時即潛不見其轉潛處即轉不唯於潛惟潛惟轉有常體義作諸事業有常用義是則三執不同而我同同歸於常問外道既多我執自廣何止於此而但敘之以為辨耶不知外道雖多不出三種一外道二附佛法外道三學佛法而成外道今論中所敘俱第一種外道元惡既已授首亂流自爾歸降况與佛同時兩相角立置過未而攻現在理當如是又此六師三計餘九十種可攝云略有者對廣言可該廣故也二破計三初破初家二破次執三破後執初破初家初且非理所以者何執我常遍量同虛空應不隨身受苦樂等又常遍故應無動轉如何隨身能造諸業又所執我一切有情為同為異若言同者一作業時一切應作一受果時一切應受一得解脫時一切應解脫便成大過若言異者諸有情我更相遍故體應相雜又一作業一受果時與一切我處無別故應名一切所作所受若謂作受各有所屬無斯過者理亦不然業果及身與諸我合屬此非彼不應理故一解脫時一切應解脫所修證法一切我合故破初有三初就外所執破次設為兩關破三就彼救破應不隨身受苦樂者謂身空相望小大天懸我量同空何大而乃受報於眇然之身是猶促大鵬於蟭螟納須彌於芥子矣有是理乎又常則苦樂不干受將安在遍則充周無限隨自何生故不應也如何隨身能造諸業者謂身固造業能造諸業者隨身我也我有動轉始可隨身今既常遍動轉理無如何其隨身耶又所執我一切有情為同為異等者若言其同猶一食之衆飽若言其異類共處之千燈共處而燈光更遍異不異同食一而衆人難飽同元同異兩關俱陷若為異同救謂作受各有所屬無斯過者意顯不相紊亂無有他作我受之過耳理亦不然等者破謂此身此業不屬彼身彼報彼身不屬此果理所應也然而身是我身業是我作果是我受與諸我合渾然無間屬此非彼理不應也理既有乖過仍前濫是則就而辨之理不可伸推而窮之義殊有過救不可救原不能原我之常遍實不可得何以執為若立三支破彼於因有於異品無於同品犯法自相相違過於宗犯能別不極成於喻犯能立法不成過二破次執中亦非理所以者何我體常住不應隨身而有舒卷既有舒卷如槖籥風應非常住又我隨身應可分析如何可執我體一耶故彼所言如童豎戲破文亦三初破體常次破體一故彼所言如童豎戲結非實也意謂不遷名住永住名常槖籥之風出入無時尚無有住何况其常卷舒如之非恆可見又我體無二名之為一我曰隨身身即是我我身可析豈不我分既曰可分一之何在非一非常執之常一執且成戲戲又如童全體謬迷了不可得三破後執後亦非理所以者何我量至小如一極微如何能令大身遍動若謂雖小而速巡身如旋火輪似遍動者則所執我非一非常諸有往來非常一故破文有二初破量小次破轉計如何能令大身遍動者意謂微名曰極微無過矣况一極微身名曰大量可知矣况對一極微極微之我能動極微之身耳若令大身遍動是猶蚍蜉之撼喬木蟭螟之御洪車矣如之何其能動乎遍動者大身全體動也似遍動者我動如身遍也速巡縱似旋火往來寧是一常故又破曰諸有往來非常一故法若有往不守一體法若有來豈是常存非一非常執為常一徒勞潛轉漫自極微二依蘊立分即離二初敘計二破計初敘計又所執我復有三種一者即蘊二者離蘊三者與蘊非即非離別答我問中敘附法外道所執之我也初即正量計二經部所計三犢子部等所計也蘊蘊藏集聚義謂色心聚集為身真性覆藏而不顯也即蘊者我即是蘊離身心外別無我也離蘊者離身心外別有我也以別有故方知是實但不即身非指在身之外也非即離者彼執我體即蘊非即不墮於即離蘊非離不墮於離妙寄於離即間逈出於即離外故知蘊有生滅我體常存二破計三初破即計二破離計三破俱非初破即計初即蘊我理且不然我應如蘊非常一故又內諸色定非實我如外諸色有質礙故心心所法亦非實我不恆相續待衆緣故餘行餘色亦非實我如虛空等非覺性故約總別以破即蘊我也非常一者蘊有生滅故非常五事紛紜故非一我既即之我寧常一此總破也內諸色即五根外諸色即五塵外有質礙故非我內既如外豈實我耶不恆相續待衆緣者不恆則非我之常待緣則非我之實餘行餘色亦非實我者餘行指不相應餘色指法處所攝曰如空非覺性故者以行無質礙故如空色非能緣故非覺我實非空我性有覺行色豈是我耶此別破也總別之深窮既盡常一之實我奚存即蘊之執了不可得二破離計中離蘊我理亦不然應如虛空無作受故如空無作受者作謂作業受謂受報我既離蘊非色非心非色無質非心無知正如虛空無知無礙不能作受矣我能作受之執將如之何是則離蘊求我又不可得也三破俱非後俱非我理亦不然許依蘊立非即離蘊應如瓶等非實我故又既不可説有為無為亦應不可説是我非我故彼所執實我不成破文有三初量破二例破三結破許依蘊立非即離蘊者我依蘊立故非離我不是蘊故非即若此則如瓶依泥立故非離泥瓶不是泥故不即泥用是而知泥可言實瓶決定假蘊可言實我定非實矣此量破也例之汝宗三聚五藏中第三非二聚第五不可説藏我在其中以不可説為有為無為故夫即蘊是有為非即蘊不可言有為矣離蘊是無為非離蘊不可言無為矣有無不可言是非將安立故云亦應不可説是我非我量例昭然非實可知又三聚五藏即犢子部立一有為聚二無為聚三非二聚五謂三世及無為與不可説也三核異執明實無二初歷核異執二立量顯非初歷核異執又諸所執實有我體為有思慮為無思慮若有思慮應是無常非一切時有思慮故若無思慮應如虛空不能作業亦不受果故所執我理俱不成又諸所執實有我體為有作用為無作用若有作用如手足等應是無常若無作用如兔角等應非實我故所執我二俱不成又諸所執實有我體為是我見所緣境否若非我見所緣境者汝等云何知實有我若是我見所緣境者應有我見非顛倒攝如實知故若爾如何執有我者所信至教皆毀我見稱讃無我言無我見能證𣵀槃執著我見沉淪生豈有邪見能證𣵀槃正見令沉淪生復約三義詰諸執歷核實我不可得也初約思慮有無破次約作用有無破三約我見所緣破又諸所執實有我體者論主詰外道餘乘所執實我體也下皆例此為有思慮為無思慮詰以兩關也有思應是無常無慮還同虛豁難破兩關也故所執我理俱不成結破諸執也為有作用為無作用亦詰以兩關也有作應是無常無用還同兔角亦難破兩關也故所執我二俱不成亦結破諸執也為是我見所緣境否亦詰以兩關也意謂我體是所緣境我見是能緣心諸執實有我體是我見所緣耶非我見所緣耶若非我見所緣境者牒彼計也汝等云何知實有我者難彼計也謂取境清明方知實有既非所緣實云何知若是我見所緣境者亦牒計也應有我見非顛倒攝如實知故者亦難彼計也謂無我名正見如實而知故也有我名倒見非如實而知故也今執我體是實又為我見所緣則應我見性非顛倒成如實知矣果爾如何小乘所信至教於有我則毀抑其沉淪生於無我則讃其能證𣵀槃豈有我之邪見能證無我之正見令沉淪乎無是理也是則詰之思慮有無俱陷詰之作用用否非我體我見交徵是緣非緣俱病頭頭察密密研窮我實全虛了不可得二立量顯非又諸我見不緣實我有所緣故如緣餘心我見所緣定非實我是所緣故如所餘法是故我見不緣實我但緣內識變現諸蘊隨自妄情種種計度復立二量申明諸我之非真也初量破能緣之心次量破所緣之境三結破我執之妄初量云又諸我見是有法不緣實我為宗因云有所緣故喻如緣餘之心以因成宗以喻明旨楷定其非拂能緣於所緣決破能緣之不可得也次量云我見所緣是有法定非實我為宗因云是所緣故喻如所餘之法因以成宗喻以明旨亦楷定其非所緣於能緣決破所緣之不可得也隻字全機片言妙義相宗家法如此苐恐理微辭險更一詳明則有所緣者即下文變現諸蘊所緣之有也如緣餘心者餘謂實我之外色聲等心謂我見之外眼耳等是所緣者對上非所緣而言也意謂實我非能緣之所緣者自有是能緣之所緣即下文變現諸蘊等之所緣也亦可有所緣是所緣者歸重於有是之所緣耳以能生於所能豈是真所根於能所寧非妄其猶𦦨非實水汪洋於渴鹿之情空豈成華飛舞於翳根之見我見所緣於何而不寂耶由是知外執內執難逃總別之推窮彼我此我不出格量之破立了不可得豈虛語哉又內識變現五蘊似我之相乃依他隨自妄情種種計度即遍計也二總顯我執二初釋義二結判初釋義二初總標二分釋初總標然諸我執略有二種一者俱生二者分別舉約該博通括我執淺深也謂我執既分內外內外復各不同上已廣辨若夫以少攝多守約施博諸我略有俱生分別二種足以帡包世出世間種種我執而無遺也二分釋二初俱生二分別初俱生俱生我執無始時來虛妄熏習內因力故恆與身俱不待邪教及邪分別任運而轉故名俱生此復二種一常相續在第七識緣第八識起自心相執為實我二有間斷在第六識緣識所變五取蘊相或總或別起自心相執為實我此二我執細故難斷後修道中數數修習勝生空觀方能除滅初釋俱生之義二析俱生之殊三明斷執之位一中先順釋次逆推三詳辨順釋者我執曰俱生名也名必有義以何義故名俱生耶俱者同義共義有身即有我與生同生恆共不離曰俱生者轉義起義俱時即轉時不假外引任運自起曰俱生也若逆推之則俱生我執據已成之果言而果不自有何因以致然耶以無始時來虛妄熏習內因之力故有俱生也更詳辨之曰內因之力指我執習氣簡非外緣之力也曰虛妄熏習指前七現行簡非真實之熏也曰無始時來又顯既曰虛妄而熏習之力足以成此俱生者以時甚恆久故也是以生空勝字對俱生數數修習對無始字句鈎鎖文義循環若此二中七緣八識者七之見分為能緣八之見分為所緣也起自心相執為實我者相即七之相分自心即七之見分起謂七之見分托八見分為本質從己自證體上變起相分為自見分所緣之相而迷謬固執為真實之我也常相續者執不離識識既恆執寧有間故常相續也六緣識所變等者六識見分為能緣第八所變蘊相為所緣也總者總緣五蘊為我也別者別緣一蘊等為我也起自心相執為實我者相即六識所緣相分自心即六識能緣見分起即六之見分托八所變為本質從六自證體上變起相分為自見分所緣而迷謬固執為真實之我也曰間斷者以執不離識六有間斷故執亦有間斷也三中此二細故難斷者細謂細微渺難見粗淺之智不能窺也細謂細密綿密如無粗猛之力不能到也後修道中者對前見道指二地以去言也生空礙我執之實有而曰勝者以深沉之智慧洞渺之難窺致力用之幽微礙綿密之恆起也然必數數則無間無間則彼恆與身俱者難乎其恆故曰方能除滅也問六七俱名起自心相相果若是均乎曰七自心相獨名𭘧質之真六自心相乃名𭘧質之似然亦可名獨影也良以兼緣色蘊為我故耳問俱生微細不可易窺然既云恆與身俱獨不能指示於此身之中乎曰孩提之童皆知愛親敬長儒謂良知良能赤子之心不知赤子之愛非待引之而後愛赤子之啼亦非必使之而後啼也不假外緣任運自起俱生之恆於吾身者獨不可顯見於赤子之身乎特以執之在人心者分別顯而俱生不知非無俱生也如病之在人身者毒疾顯而細病不覺非無細病也思之二分別二初正釋二判證初正釋分別我執亦由現在外緣力故非與身俱要待邪教及邪分別然後方起故名分別唯在第六意識中有此亦二種一緣邪教所説蘊相起自心相分別計度執為實我二緣邪教所説我相起自心相分別計度執為實我此二我執粗故易斷初見道時觀一切法生空真如即能除滅初釋分別之義二析分別之相三明斷執之位一中亦由現在外緣力故非與身俱等者意謂分別雖有內因之力亦若外緣之力而後起起由外緣故不與身俱也然此執所居果何所在在於第六不在餘識唯在第六餘更無在良以七是俱生五無計度不此之在而將誰在二中邪教所説蘊相即實德業等指所緣也緣邪教等指能緣也起自心相例如前釋而曰分別計度執為實我者正顯分別之執相也所説我相者即神我大小等也分別計度執為實我者亦顯分別之執相也但前執邪蘊為我此執邪我為我分別之執未嘗不同所別之緣不同而同不同者蘊我之相不同而同者同一我也三中此二我執粗故易斷等者反上細故難斷言也初見道時指登初地對前後修道中言也觀一切法生空真如即能除滅者約所觀之理別前勝空之觀智言也然所必具能能不外所文互見也問上云邪教及邪分別當何所辨曰邪教指名句文身能所之詮顯言也邪分別指因教而心起不正之思惟比度言也雖有心教之分緣屬外緣以能引起分別之執對不由引起之俱生故也問俱生分別二執聖凡同異若何曰自佛而外六凡三聖固不可得而異又何可得而同何則十地大士二執皆空八地以還俱生未盡而初地但盡分別而已正使斷於羅漢餘習侵於辟支降此而六凡五道大同畜生差異以彼分別不行故也縱靈禽異獸如鴝鵒猿猴等亦但似有分別而實無分別不過俱生殊勝云爾不然則畜生報無盡期超升之日絶矣果可得而全同果可得而全異乎哉二判證如是所説一切我執自心外蘊或有或無自心內蘊一切皆有是故我執皆緣無常五取蘊相妄執為我然諸蘊相從緣生故是如幻有妄所執我橫計度故決定非有故契經説苾芻當知世間沙門婆羅門等所有我見一切皆緣五取蘊起結證我不離蘊總判非真以曉諸妄執也初總躡前文判執之有無於諸蘊二結我執不離於取蘊三判蘊我空有之不同四證我起不離於取蘊一中先正釋次詳辨正釋者總躡上文著二或及一切四字判者意謂我生於執執起於緣既緣蘊以執我當即蘊以辨緣蘊既內外之不同執必異同之有辨內外有無之必甄親踈淺深之瞭然矣研機析理自當如是故曰或有或無一切皆有云云也詳辨者外蘊指本質境即上四種如第七所緣第八見分第六緣第八所變五蘊此二從緣生故云或有六緣邪教所説蘊我二皆妄説故云或無內蘊指相分境有者以能緣能及是親所緣緣故名為有無有少法能取少法唯有自心還取自心二執不離於此故曰自心內蘊一切皆有二中皆緣無常五取蘊等者蘊名聚覆謂色心積聚覆蔽真理取即煩惱以蘊從取著而生故名取蘊無常者蘊相生滅非不生滅之真常也蘊尚如斯况緣之妄執為我乎三中從緣生故是如幻有類依鏡之呈形橫計度故決定非有似計杌之為鬼依他尚是非真遍計從何得實四中引證復舉世間內外二類者以近證俱生分別之略遠應外道餘乘之廣也指執之起處癡孩肉面頓醒於鏡中識處之起時令演若狂頭忽明於當下噫了不可得至此當自知矣又集論以取合名取蘊以欲貪為取希求未來染現在故俱舍云無漏行唯蘊非取煩惱名取蘊從取生故如草粳火或蘊屬取如帝王臣或蘊生取如華果樹其論甚細不可忽也三問答通妨四初通無我三世難二通無我作受難三通無我厭求難四總結有我是妄初通無我三世難實我若無云何得有憶識誦習恩等事所執實我既常無變後應如前是事非有前應如後是事非無以後與前體無別故若謂我用前後變易非我體者理亦不然用不離體應常有故體不離用應非常故然諸有情各有本識一類相續任持種子與一切法更互為因熏習力故得有如是憶識等事故所設難於汝有失非於我宗文中初難問次正破三轉破四顯理五結失難謂我固非事事非離我我憶過去我識現在我習未來我我恩事豈離我耶實我若無云何得有此事乎破云所執實我既常無變等云云也意謂我常無變三世一如過去應如現在現在應如過去現如過去則我體常無恩親亦應常無誰為憶識誦習過去如現則我體常有恩亦應常有何須憶識誦習以前與後同一我體無分別故然而豈有是理耶復恐救謂我雖是實體用不同我用變易非我體之不常我體自常任應用之有變烏得以變易難我體之恆常耶故又破云前執我體實常乖我事之變易理既非矣今計我用之變易救我體之恆常理亦不然蓋體用相乖理所不然者也體用不離理之天然者也今以其所然辨汝之所不然則用不離體應常有矣我用變易之安在體不離用應非常矣我體不變之奚存不惟能救之理一無可伸并其所救之道愈增其陷矣以理論之然諸有情各有本識等云云也本指第八有情必有識諸有情各有識也如畜類本識不同於人人類之識寧同於天過去業因之不齊現在識果之有辨同而不同云各有也一類相續任持種子者無記善惡名三性八唯無記名一類也善惡有間名不恆無記恆轉名相續也種子對現行言云任持者識能擔荷操存多生因種之不失也一切法指諸識也與一切法八與一切也諸種生現八為一切之因諸現熏種一切為八之因云更互也是則八識受熏諸識能熏由現熏種之力三世愛憎之因地具矣因種發現之力多生恩之果事𭓩然此識熏之力得有恩豈我執之力所得有耶乃結其失云故所設難於汝有失非於我宗二釋無我作受難若無實我誰能造業誰受果耶所執實我既無變易猶如虛空如何可能造業受果若有變易應是無常然諸有情心心所法因緣力故相續無斷造業受果於理無違若無實我誰能造業誰受果者難也意謂果報必由於業因受果元起於造業能造受者我也實我若無作受者其誰耶業果之事不無作受之人必有實我之不可無也明矣所執實我至應是無常破也意謂所執實我是有變耶是無變耶無變同空不能造受有變無常又乖本宗有無之執俱非作受之能安在實我之不能有也亦明矣然諸有情至於理無違明業果不斷之正理也心心所法總指八識王所因緣力故相續無斷等者親從心內所含種生名因助成心內所含種生名緣全心之惑造業全心之業受報三相循環曰相續不斷而心能造業心能受果於理無違我能作業我能受果豈不違於理耶經云無我無造無受者善惡之業亦不亡因緣力耳三通無我厭求難我若實無誰於生輪回諸趣誰復厭苦求趣𣵀槃所執實我既無生滅如何可説生輪回常如虛空非苦所惱何為厭捨求趣𣵀槃故彼所言常為自害然有情類身心相續煩惱業力輪回諸趣厭患苦故求趣𣵀槃初至誰復厭苦求趣𣵀槃難也意以苦樂之事不同同名為境歷苦樂之境不同同歸於人甘心苦境不願出離與厭苦不甘求趣𣵀槃之樂者我也實我若無其猶釋皮肉以問瘡疣外精神而談羽化豈理也哉苦樂之境不無厭求之我必有也明矣次至故彼所言常為自害破也意謂能立須起於自宗能破貴隳乎異執我無生滅自執之宗也執我無生説我於生是以生滅自害其無生如之何其可説也我常如空自執之喻也執我常空而有我於厭求是以厭求自害其常空果何為而有厭求也破由敵者理或可以再伸害由自己我固不勝屈矣三至厭患苦故求趣𣵀槃顯輪回厭求之正理也曰身心相續即六趣之身心指輪回之人也曰輪回諸趣即諸趣之輪回指生之法也如斯苦果由於惑業是惑業染力於輪回非有實我於輪回也苦以逼迫為義對𣵀槃之樂境言厭患苦故求趣𣵀槃求樂由於厭苦之心而厭由於智是智業淨力於厭求非有實我於厭求也四總結有我是妄由此故知定無實我但有諸識無始時來前滅後生因果相續由妄熏習似我相現愚者於中妄執為我總結無我顯妄執之為愚也由此故知定無實我者決無於實我也但有諸識至似我相現者原有於似我也愚者於中妄執為我者結妄於執我也我名曰實猶實水也我名曰似猶𦦨水也我名曰妄執陽𦦨為實水也此者近承三遠齊實我不可得以下之文而至於此也知者了然無疑該乎比現之二量也意謂證義須本於聖言顯理必由於明辨今由內外總別之詳明俱生分別之統攝更之以三研之以諸辨妄窮理顯析真似於毫端虛去實存判有無於頃刻昭然而顯了然而知實我斷無諸識但有於此有中生滅熏習似我假現於似有我執為實我其猶渴鹿執陽𦦨為實水也妄而已矣曾何一毫真實於其間哉前問云何應知實我叵得今則由此故知假説我法豈徒然哉上破外道我竟不破餘乘以悟我空修無我故二釋法執二初通釋二別釋初通釋如何識外實有諸法不可得耶外道餘乘所執外法理非有故承前實我實法不可得中別問法執也意謂色香味等是實有諸法眼外見色耳外聞聲等是識外實有諸法可得今謂識外不可得者頓違輿論大拂常情矣厥旨安在答中理非有故者意以餘乘外道其類何繁心外實法所執略等竟違彼執云不可得者蓋以短長量於尺輕重凖於稱是非有無真似之決於理也理不可得識外之法成烏有矣獨強為之説耶二別釋二初廣顯二總明初廣顯二初破諸法離心實有二立比量以顯唯識初破諸法離心實有二初外道二餘乘初外道二初廣破諸執二束廣從略初廣破諸執五初數論二勝論三自在四聲論五迦耶初數論二初總徵敘執二詳破非真初總徵敘執外道所執云何非有且數論者執我是思受用埵剌闍答摩所成大等二十三法然大等法三事合成是實非假現量所得別徵外執先標數論執詞也數慧數數度諸法根本立名從數起論由論生數名數論者指人言始祖於迦毗羅終傳於自在黑師資朋黨凡業於此皆是也且者外道廣之九十六略之十三種又略此論之六種耳言不纍書故且舉也我神我思思慮執我是思是表詮乃含詮表如云我是知者見者受者如我非作者等蓋彼以冥諦自性為作者故也我是思言思是我也如我思勝境冥諦則變我若不思冥諦不變是也埵云貪剌闍云嗔答摩云癡此冥諦中本具能成三德二十三法者冥初生覺等也此二十三名所成者是貪嗔癡能成之所成也受用埵等二十三法者神我能受用也如云積聚為他故他指我積聚為他言積聚牀席卧具之類為我受用耳今冥諦中三德所變二十三法不過為我之受用故云受用埵所成等也然大等法三事合成是實非假現量所得者正執識外有法之可得也現謂現在非過未現前非隱覆現有非虛無量刊定義如明鏡照物煥然妍醜現即是量妍醜煥然量全是現量處現處現時量時不落名言行解於其間也意謂此等諸法實有體相現量所緣之實境非比量所緣之假境也數論之執如此若取金七十等意詳之則彼偈云自性次第生大我慢十六十六內有五從此生五大謂自性先生大大增長義自性相增故大亦名覺名想名智大次生我執謂自性起用觀察於我知我知須境故我執亦名我慢名五大初十六者意謂慢生十六謂五唯五知五作心平等也十六內有五從此生五大者就十六內初生五唯唯生五大大生十一根初生五唯者一聲二觸三色四味五香唯定義定用此成五大故從聲唯生空大觸唯生風大色唯生火大味唯生水大香唯生地大聲唯生空大空大成耳根耳還聞聲觸唯生風大風大成身根身根還受觸色唯生火大火大成眼根眼根還見色味唯生水大水大成舌根舌根還知味香唯生地大地大成鼻根鼻根不聞地而聞香次生五作業根者謂口手足小大便也心平等根者謂分別為心相是相即心事六具五唯成通緣諸境故是也此所成二十三法能成是冥諦亦名自性名勝性以外道通力八萬劫外冥無所知曰冥諦未生大等但住自位曰自性若生大等名勝性用增勝故第二十五我知亦名神我以神我受用冥性及三德所成大等二十三法自性三德唯能作不能受用故以跛喻神我能見不能作故以盲喻冥性能作不能見故此二合成能生世間與我受用如跛盲各逹所在各得分位我見自性時即得解脫令我獨存走筆至此不覺失笑冥諦似本性神我似主人通極八萬弄精魂手亦至於此外道昧之為冥諦老莊迷之為自然周孔認之為太極有味乎其言之也巖頭云不貴子行履處祗貴子見地真切亦有味乎其言之也二詳破非真三初總破徵二別詳破三總結破初總破徵彼執非理所以者何執應前執我是思等之執彼執非理者執我是思執我受用執三能變執諸所變執三事合成執是實非假執現量所得此等之執彼非不是於迷情我謂總乖乎正理𮈔分縷析察入秋毫似盡真存明如指掌所以非者何耶必有道矣二別詳破七初所成不實破二能所互難破三體多周變破四各別異同破五總別合否破六體具諸相破七能所無異破初所成不實破大等諸法多事成故如軍林等應假非實如何可説現量得耶即因定宗喻破所執現量之非理也夫假境比量所得實境現量所得理也大等諸法多事合成理應是假非實其猶多人合會而成軍一一分析至盡軍豈實乎多木叢聚而為林一一分析至盡林定假矣由因定宗即喻明法如之何可説現量得耶非現由於不實不實由於合成顯然可見二能所互難破又大等法若是實有應如本事非三合成埵等三即大等故應如大等亦三合成轉變非常為例亦爾能所互難例破其執也大等名所執三合成以為實有本事名能謂非三合即生大等又大等法若是實有牒執為因也應如本事非三合成所應如能用能破所也意謂若是實應如能如處破處才如則是三合成者非三矣可如耶不可如不可實也埵等三即大等故牒執為因也應如大等亦三合成能應如所用所破能也意謂既是即應如所如時破時才如則非三合成者是三矣可如耶不可如不可即也轉變非常為例亦爾見例當然也以冥初生覺等轉移變易增長非常則雖執自性是常即大等故應例大等亦轉變非常也亦可如奘師云彼執自性既常應如神我何為轉變非常彼執神我是常應如冥諦何為受用非常故云為例亦爾量之大等非三合成以實有故應如本事等亦三合成即大等故應如大等三體多周變破又三本事各多功能體亦應多能體一故三體既遍一處變時餘亦應爾體無別故體多難破三事頓變難破次第各多功能者彼許三自性一一皆有明躁昧等衆多作用也體即自性亦應多者能體一故能即是用用不離體體少用固當少用多體自應多體多不唯違三本事多則應如大等定是無常矣能成本事尚自難端所成大等又何可定若謂三德之體不分而遍不成多者三體既遍一處變時餘亦應爾遍體無別故也變果是頓必乖次第之生何取於冥初生覺從覺我心等耶然而必不然也故知非遍四各別異同破許此三事體相各別如何和合共成一相不應合時變為一相與未合時體無別故若謂三事體異相同便違己宗體相是一體應如相冥然是一相應如體顯然有三故不應言三合成一約各別異同破三事合成之非理也初約各別破次約異同破而文中一各別二一相三是一四是一五成一揀擇須明各別者嗔體別貪癡貪體別癡嗔曰體各別貪相別嗔癡癡相別嗔貪曰相各別一相指二十三法皆以三德而成法法云一相也三是一者三體不異三相也四是一者三體如相同也五成一者即所成一相也破意謂三事可成一相者以三之可以渾然無乖而和合之也今許各別縱欲和合如之何其和合耶脫救以合之之時變為一相未合之時不妨各別此亦不應以既合之後與未合之時體無別故體既無別猶然各別也豈能合成一相乎脫又謂體異相同而以體異故可名三事相同故可合成一者便違己宗體相是一何則己宗體相是一豈不體應如相然謂相同則體應如相者冥然一而同矣體豈得異耶己宗體相是一豈不相應如體然謂體異則相應如體者顯然三而異矣相豈得同耶冥然是一應云一合成一顯然有三應云三合成三故不應言三合成一五總別合否破又三是別大等是總總別一故應非一三此三變時若不和合成一相者應如未變如何現見是一色等若三和合成一相者應失本別相體亦應隨失不可説三各有二相一總二別總即別故總亦應三如何見一約總別以難破三事合成之非理也初難能所之難一次難三一之難非三難二相之難具能所難一者所成大等是總能成三事是別彼執總別一故則能所渾而不分一不成一三不成三矣一不成一所成之總相應非三不成三能成之別相烏有總別既非合成何在然而終不可非也一果應非應如未變無一之可見矣如何現見和合之一色耶三果應非失本別相矣如何和合之時而本體之不失耶脫執能成之三各具總別二相以具總故所成之一色自見以具別故能成之別相常存具斯二相自當免彼俱非不知其亦不可也何則總即別故總外無別總外無別總亦應三如之現見一色而不見三耶一不見三總不具別矣總不具別別不即總矣是各具二相耶非一非三之不可是總是別之仍乖能成之轉計愈見其途窮所執之邪宗尤彰於理外三事合成之非不又昭昭乎六體具諸相破若謂三體各有三相和雜難知故見一者既有三相寧見為一復如何知三事有異若彼一一皆具三相應一一事能成色等何所闕少待三和合體亦應各三以體即相故承前約體各三相展轉難破三事合成之非理也初至故見一者出轉計也二至三事有異約知見一異難也三至待三和合約所具能成難也四至以體即相故約相例體難也轉計中三體三德之三體三相即體之三相各有者一體三相三體各有三相也和雜難知故見一者出惟見一色之故也計謂總即別故總亦應三宜見於三而惟見乎一者良以三體各有三相和融雜亂難知其歷然之三故惟見於渾融總相之一色耳破謂故見一者汝之見也吾以為有一見一理之常也既有三相寧見三而為一體各有相汝之所知和雜難知亦汝之知既曰難知復如何知異於和雜之中耶所具能成者若謂彼體一一皆具三相則事事能成色等必待三事和合而後成者是有所闕少矣豈得謂彼一一皆具耶更以相例體而難之每體既具三相則每體當各三體以體即相故果誠如是乎否耶是則知見一異之難通所具能成之有待體有諸相尚未昭明體復諸體重增疑惑即一色於惟見因展轉之迂途推三事之合成豈平常之大道七能所無異破又大等法皆三合成展轉相望應無差別是則因果唯量諸大諸根差別皆不得成若爾一根應得一切境或因一境一切根所得世間現見情與非情淨穢等物現比量等皆應無異便為大失約能所不異咎三事合成之非理也初原所成無別次咎諸法無成三病根境不分四結合成之過又大等法指所成三合成指能成皆者覺固三德合成我亦三德合成唯大及十一根莫非三德之合成也展轉相望所必肖能應無差別是則因之能成果之所成唯量聲觸等空風諸大等眼耳諸根等色非色心非心渾而莫辨差別皆不得成矣若爾則一根應得一切境或應一境一切根所得情器不分淨穢無辨比現無別違世間違現見違自教宗旨失而又失豈小失哉三總結破故彼所執實法不成但是妄情計度為有總結所執非有應上云何非有之問向也堅持不捨以為理至當法極成不可破壞今則現量所得既乖是實非假何在三事合成而竟失多方救援之無能故彼所執實法不成情有理無名為遍計二勝論三初敘執二正破三結非初敘執勝論所執實等句義多實有性現量所得成劫之末有仙名米臍將入滅為徒五頂者説自所悟六句法最勝諸論故名勝論實等者實德業三大有同異和合句也實有九種謂地水火風空時方我意也實者德業所依真實有體故也德有二十四種謂色香味觸及數量別性合離并彼性此性覺樂苦欲嗔勤勇重性與液性潤行法及非法聲二十有四如斯訂德者實句九種各有所具之功德也如地水我三各具十四火之與風十一及九空惟有六時方同五而意則八種各各所具多寡之不同也業有五種謂取捨屈伸行也業者業用有動作義如地水火風意是有動作空方與時我是無動作之類是也大有者所有之大也謂實德業三同一有故離此三外別有一法為體由此大有有實德業故也同異者實德業上同異性也如地望地水望水有其同義地望水水望地有其異義地之同異是地非水水之同異是水非地同異雖是實等之上然離實等外又別有自體名同異性也亦可同即有性由實等三同一有故以同有實德業三之實體性故也異亦有性由離實等三外別有一法為體性也前依清涼後慿勝論開合無常意義不遠和合者諸法和聚如鳥飛空忽至樹枝住而不去名和合也如斯六種是我受用若能遠離便得解脫而入𣵀槃矣多實有性者此六雖不可盡謂為實有多分是實及有性也既實有性則非比量所得之假境矣六句實性現量所得勝論之執殆若此又和合非現量故可言多二正破二初總破徵二別詳破初總破徵彼執非理所以者何破執六句多實有性現量所得為理無也徵意執情在彼是而不非破理在我非而不是出過不容於毫髮立義大闡於幽微非理所以果何如二別詳破二初明諸句體非實有二明諸句非現量得初明諸句體非實有七初破諸句常無常二破實句與德句三破實句與諸句四破諸句離識有五破所執大有句六破所執同異性七破所執和合句初破諸句常無常諸句義中且常住者若能生果應是無常有作用故如所生果若不生果應非離識實有自性如兔角等諸無常者若有質礙便有方分應可分析如軍林等非實有性若無質礙如心心所應非離此有實自性別破諸句常無常義顯實有非理也諸句義中至兔角等破常住諸無常者至實有性破無常諸句義中且常住者牒執若能生果若不生果兩關難也應是無常應非離識實有自性破常實也有作用故不生果故出無常非實之故也如所生果如兔角等出無常非實之喻也總見生果不生之兩關難出有作不生之二因極成有作定是無常不生斷然非實諸句常住實有自性者非理矣諸無常者牒執有質礙無質礙兩關難也便有方分應可分析便無方分無可分析出不實之故也非實有性應非離此有實自性破實有性也如軍林等如心心所喻實無有性也亦見有礙無礙之兩關難出可分不分之二因極成可分定是非真無質應非識外諸句無常有實性者理非有矣已上取其易解補足本文影略釋之而已若依文立量常與無常皆各二量常二量者執常住是有法應是無常為宗因云有作用故同喻如所生果生果𨚫是無常此約能生果義破常住次量云執常住是有法應非離識實有自性為宗因云不生果故同喻如兔角等此約不生果義明唯識以兔角是意識遍計所執實無其體然不離識引為喻者破離識有實性之執也無常二量者執無常是有法非實有性為宗因云有質礙方分可分析故同喻如軍林等此約有質礙破非實次量云執無常者是有法應非離識實有自性為宗因云無質礙方分可分析故同喻如心心所此約無質礙明唯識雖前二量約於所執次二量約於唯心然諸句常無常義不同離識之外實有自性之執同也若以因反常住犯異品中有以因反離識實有自性犯能別不極成後二量亦然二破實句與德句又彼所執地水火風應非有礙實句義攝身根所觸故如堅濕暖動即彼所執堅濕暖等應非無礙德句義攝身根所觸故如地水火風地水火三對青色等俱眼所見準此應責故知無實地水火風與堅濕等各別有性亦非眼見實地水火風約外所執句攝不定更相詰破實有之非理也初互破次例破後結破意謂彼執諸句常無常義已如上破又彼所執實句所攝地等有礙德句所攝堅等無礙以皆身根所觸之實境也實句所攝地等有礙色德句所攝青等無礙色以皆眼根所見之實色也在根則能觸能見之既實在境則所觸所見之逼真實有體性現量所得不可破矣亦寧知其所執之非實乎何則因以成宗宗由因定有礙地等實句所攝及無礙堅等德句所攝之宗既皆以身根所觸為因乃犯因中共不定過則有礙應非而如無礙之堅濕暖動無礙應非而如有礙之地水火風矣宗豈能成例如地等實句是眼所見青等德句亦眼所見眼見之因既𡩖德實所攝之句豈能定乎準立量責應云又彼所執地水火三應非有礙實句義攝眼根所見故喻如青色等即彼所執諸青色等應非無礙德句義攝眼根所見故如地水火三如此立量迭相推破則地等所攝先無凖的豈有實體可得故云無實地等各別有性亦非眼見實地水火風又地水火三者以取眼見故略風耳雖動處是風宜若可見然彼意以為風非可見故也三破實句與諸句又彼所執實句義中有礙常者皆有礙故如粗地等應是無常諸句義中色根所取無質礙法應皆有礙許色根取故如地水火風破實句常法諸句無礙非理也實句有礙常者是有法應是無常宗以皆有礙故喻粗地等諸句義中色根所取無質礙法是有法應皆有礙宗以許是色根取故喻如地水火風何則無形者或可以暫留有礙者未必其可久也如所執粗地等皆以有形質礙之故可壞可分地等不能永終於地等應是無常諸句義中色根所取空堅聲等無質礙法果悉為無礙否耶不知應皆有礙何者即以汝之所許為因破汝所取之為礙耳地水火風色根取地水火風既有礙諸無礙法色根取諸無礙法豈非礙故云如地水火風安在乎其無礙也然則所執有礙之常不得為常無礙之法竟成有礙故曰非理又此二量於四種因犯有法自相相違四破諸句離識有又彼所執非實德等應非離識有別自性非實攝故如石女兒非有實等應非離識有別自性非有攝故如空華等此約唯識破諸句實有之非理也非實德等非實句之德等五句也非有實等非有句之實等五句也萬法唯心全依識現乃彼謬計諸句為識外不知既云非實豈不成虛徒有空名如石女矣既云非有自己成無全歸妄見如空華矣非實如石女德等之兒自何生非有如虛空實等之華將安在由喻顯因因不能生自因定宗宗豈成是我故曰應非離識別有自性也正意因執識外別有自性但破離識本無非為特顯唯識又非業德等非德實等約義皆可為言非有實等非實德等破妄殊為易顯故獨取非實以虛其宗非有以無其執耳又此𫨻俱犯所立法不成過然有以此節屬大有者未盡置之諸句者為允當耳智者詳之又彼執諸句其體定異故不相攝曰非實德等非有實等五破所執大有句彼所執有應離實等無別自性許非無故如實德等若離實等應非有性許異實等故如畢竟無等如有非無無別有性如何實等有別有性若離有法有別有性應離無法有別無性彼既不然此云何爾故彼有性唯妄計度量例縱奪破執大有是實之非理也初量破次例破三縱奪破四總結破實德業三易顯餘二稍隱大有更晦觀其教五頂之量曰大有是有法非實非德非業為宗因云有一實故有德業故如同異性因明破云此因如能成實等如是亦能成有性俱決定故蓋言若能成宗而有法非矣有法且無宗將安寄責犯法差別相違過也今初量用許有自性為因破離實等宗喻如實德業等豈離實德業等別有自性故云應離實等無別自性次量用許離實等為因破非有性喻如畢竟無等豈離實等更有有法故云若離實等應非有性旨全因明但先後覆層疊出過之尤顯耳若例明之如有非無非無即有非離有法有別有性則實德業有法即有自性如何離實德等有別有性耶更縱奪之若離實等有法有別有性應離非實等無法有別無性矣無既不爾有云何然亦可初量許其有性破其離實等能別不極成過犯似宗次量許其離實等破其非有性所依不成過犯似因六破所執同異性又彼所執實德業性異實德業理定不然勿此亦非實德業性異實等故如德業等又應實等非實等攝異實等性故如德業實等地等諸性對地等體更相徵詰準此應知如實性等無別實等性實等亦應無別實性等若離實等有實等性應離非實等有非實等性彼既不爾此云何然故同異性唯假施設總別結破同異之非實也同異者諸法各別曰異體相一類曰同如以地望地名同以地望水曰異之類是也今破同異應云又彼同異性而言實德業性者以於實德業上論同異言實德業性即同異性見同異不離實德業性彼執異實德業豈理也哉故總破云定不然也所以然者彼執同異異實德業則此同異𭓩同大有亦非實德業性異實等故如德業等矣豈是實等之同異性耶如於地水之上論同異而執同異異於地水之性理將安在故勿之勿之者申破似量之理定不然非真能立之三支也且同異異於實等則同異應非實等攝同異既非實等攝又應實非實攝德非德攝業非業攝異實等性故如德業實等準此而知堅性非堅攝異地體故喻如濕性濕與暖動皆然也地體非地攝異堅性故喻如水體水與火風皆然也應耶不應耶應之者難之難似量之理定不然破非真能成立一切之三支也如實性等外無實等性則實等外亦應無別實性等同異性例而明之昭然顯現而彼定執同異異實等離實等之外有同異者決無此理矣若離實等有實等同異性縱如彼執應離非實等有非實等同異性奪為我奪矣何者離非實等必無非實等同異性彼既不爾離實等焉得有實等同異性此云何然故同異性惟假施設如廣百云分別意識於色等法假施設有越諸根量非現量得而執之以為實者何也已上一可分六節初總破非理末結破非實中間四節皆別破非理以筆力高古如大璞圓珠恐蹈穴鑿之弊故略加點綴串意於釋中以摹寫其本色耳觀者細心熟玩當自得之七破所執和合句又彼所執和合句義定非實有非有實等諸法攝故如畢竟無彼許實等現量所得以理推徴尚非實有况彼自許和合句義非現量得而可實有設執和合是現量境由前理故亦非實有量况轉破和合實有之非理也初量破次况破三轉破渾而不乖曰和會而不隔曰合彼執由和合故諸法方聚而和合體是別有非諸法攝故量破云和合定非實有因云非有實等諸法攝故喻如畢竟無良以既離諸法和合義無和合且無體將何寄故即彼非有實等所攝之因定其為非實有也况之則彼許現量得者以理推徴尚非實有况和合是彼許非現量得者可實有也耶設彼轉和合非現之執更執為現量者轉以前可析無礙無常唯識之理破今現量和合之執亦非實有豈獨非現量為非實有耶由因定宗以况比義現量非現全空和合實有安寄我故曰理非有也以上別破所執實有現量之義自含下破能所現量實有之義𭓩具不可因實有屬上現量科下而遂泥之又亦末可縱奪破二明諸句非現量得然彼實等非緣離識實有自體現量所得許所知故如毛等又緣實智非緣離識實句自體現量智攝假合生故如德智等廣説乃至緣和合智非緣離識和合自體現量智攝假合生故如實智等量破能所皆非現量也初量破所緣之境次量破能緣之智實等者實德業等諸句也離識實有自體者彼執諸句離心識外各有自己真實之體性也現量所得者既有實體名為實境不假分別而有任運對緣而現名現量所得也總之執所緣六句之境為現量如廣百論云彼論説有實句義是現量境是也破謂彼實等所緣之境非離於識非實有體非現量得以汝自許所知故也所知屬分別分別則非真譬如毛從何而有但是意識非量所緣尚非真比豈成現量故廣百破現量境則云理亦不然所以者何瓶衣等物意識於色等法假施設有云何執為現量境又緣實智等者執能緣之智為現量也破謂又緣實句之智非緣離識非緣實體非現量攝以汝自許假合而生故也假非真實合豈天成如德智等緣諸堅濕從意想起豈離籌度心任運而緣之現量耶故廣百論云因德所引實智非現量攝謂因青等暖等諸德所引實智定非見觸現量所攝等是也至若廣之雖諸句不同總之則能緣無別假合而生因地既以無殊現量所得果地自然俱故曰廣説乃至如實智等問性境現量判五識此唯識宗今非彼現量何也答此云現量但如鏡中無別分析無有執心雖是識內亦無唯識之念彼執識外彼指瓶衣彼執為實非量所攝豈可同年上第二正破竟三結非故勝論者實等句義亦是隨情妄所施設此總結非實現量也施設隨情理豈能順隨情是妄實則何有汝曰多實有體今則實不可得汝曰現量所得今則實非現量皆真實理也豈虛妄之情乎勝論之徒可以悟矣數勝二法執竟三自在二初自在二例餘初自在有執有一大自在天體實遍常能生諸法彼執非理所以者何若法能生必非常故諸非常者必不遍故諸不遍者非真實故體既常遍具諸功能應一切處時頓生一切法待欲或緣方能生者違一因論或欲及緣亦應頓起因常有故破執自在能生之法執也初敘彼執二總破徴三詳推破四破轉救有執指塗灰彼見有情不隨欲轉因修欲進而偏退果報願逹而固窮思必有主宰者以為物父因執有一大自在天體實遍常能生諸法四德為萬物之因焉在執之溺於情也未不是以理之量於執也全體成非而其所以非者何也試逆推之且無論其能生與否若法能生生則有滅生果應是無常有作用故必非是常諸非常者才生即滅無動義故無容從此轉至餘方必不遍故諸不遍者非真實故無為真實必周遍故體實遍常將安在哉而况其未必能生也何則體既常遍具諸功能生一切法吾以為常窮一切時遍周一切處應於一切處時無有前後頓生一切諸法而後可以稱常遍能生也又犯世間相違等過矣然而豈有此理脫轉救云體雖常遍能生諸法要待衆生樂欲或緣會方生故無頓生之過者以涉三因即非大自在天一因能生諸法寧不所救非所執而前後自相矛盾也耶若例而破之或欲及緣亦應頓起以大自在天因常有故則所救無頓生之過者正當頓生矣如之何其能救耶吾故曰彼執非理二例餘餘執有一大梵時方本際自然虛空我等常住實有具諸功能生一切法皆同此破例破餘執能生之法執也初列名敘執二指破法同餘執執自在能生之餘執即下七等也大梵者圍陀論師此云明彼計那羅延天中生大蓮華華上有梵天祖翁為萬物祖從梵天口生婆羅門臂生剎利䏶生毗舍生首陀能作一切命無命物是故梵天名常是𣵀槃因詳載瑜二論是亦天能生也時者時散外道以見種等衆緣和合有時生果有時不生時有作用或舒或卷令枝條等隨其榮悴由是決定知實有時時所待因都不可見不見因故所以無生以無生故即知無滅無生滅故復言常遂執一切物皆從時生是故時是常是一是萬物因是𣵀槃因詳載廣百是時能生也方謂方論師計實有方常相有日合處是方相等計方能生人人生天地滅後還入於方故方是常是一是萬物因是𣵀槃因亦如百論是方能生也本際者安茶論師執本際是過去之初世界最始唯有大水時有大安茶花出形如雞卵周匝金色時熟剖為二𫨻上𫨻為天下𫨻為地中生一切萬物如此方渾沌未分形如雞子從此生天地萬物等具如清涼是本際能生也自然者即無因論師彼見世間無有因緣或時歘爾大風卒起於一時間寂然止息或時忽爾暴沙瀰漫於一時間頓即空竭或時鬱爾果木敷榮於一時間颯然衰悴因此起無因見立無因論計一切萬物無因無緣自然生滅故自然是常是萬物因是𣵀槃因載於瑜伽如此方莊老之類是自然能生也虛空者口力論師計虛空為萬物因別有一法是實是常是萬物因從空生風風生火火生暖暖生水水生凍堅作地地生五生命命後還歸空是故虛空是萬物因是𣵀槃因載具百論是空能生也我者計我論師謂彼計有埵命者生者養育者數取趣者如是諦實常住是故我眼能見諸色如是於耳鼻舌身意應知亦爾等者等取宿作論師宿作亦不離我彼計一切衆生受苦樂報皆隨往日本業因緣是故若有持戒精進受身心苦能壞本業本業既盡衆苦盡滅衆苦盡滅即得𣵀槃是故宿作為一切因廣破如𣵀槃及清涼玄談此我業能生也皆同此破者同前比量所執盡虛故曰皆同四聲論有餘偏執明論聲常能為定量表詮諸法有執一切聲皆是常待緣顯發方有詮表彼俱非理所以者何且明論聲許能詮故應非常住如所餘聲餘聲亦應非常聲體如瓶衣等待衆緣故破二種聲常之法執也初偏執明論聲次遍執一切聲有餘即餘有謂八種之外餘有執聲者也明論者謂內明因明聲明工巧以及醫方五明論也今偏取聲明故曰明論聲常者不易之謂表詮顯諸法之義一印印定遐方異域不能改亘古及今不可易能為一定之量者論之聲明他不能也一切者遍諸色之聲也皆執為常者聲性是常不從緣生其體非斷但待緣顯發方有詮表耳若鐘鼓待而響金石俟扣而鳴文義待宣吐而後顯之類是也執情皆是正理俱非請以量破明論聲是有法應非常住為宗因云許能詮故喻所餘聲夫常無所作能作亦無能所雙非方為常義許能詮故能必有所既涉能所體非常住如所餘聲同是聲性次破云一切聲是有法亦應非常為宗因云待衆緣故聲體如瓶衣等體既待緣緣離則滅安得為常五迦耶二初敘執二正破初敘執有外道執地水火風極微實常能生粗色所生粗色不越因量雖是無常而體實有此破四大極微能生諸法之法執也外道即路迦耶此云順世計一切色心等法皆用四大極微為因然四大中最精靈者能有緣慮即為心法如色雖皆大而燈發光餘則不爾故四大中能有緣慮其必無失顯第九云由不如實知緣起故計有為先有果集起離散為先有果壞滅由此因緣彼謂從衆微性粗物果生漸析粗物乃至極微住是故粗物無常極微常住因量者父母微最初極微名父母聚生諸色故所生粗色名子微子微雖是無常不越父母故是實常迦耶之執大約如此詳載瑜伽下於破中轉計雖多不出正計二正破二初破因微二破果色初破因微彼亦非理所以者何所執極微若有方分如蟻行等體應非實若無方分如心心所應不共聚生粗果色既能生果如彼所生如何可説極微常住彼執非理總破能所之非理所以者何總徴非理之所由下別破中先破能生極微後破所生粗色今先極微也意謂汝執極微是實是常能生粗色吾以為所執極微為有方分無方分耶若有方分如蟻之行伍前不是後捨後取前既可分析體應非實若無方分如心心所尚無有形云何而能共聚生粗果色况所生於能能必肖所極微既能生色極微如彼所生所生既是無常如何可説極微常住亦可三量初破實末破常中破能生二破果色六初約因量破二約量德破三約自因破四約多合破五約因果破六約體一破初約因量破又所生果不越因量應如極微不名粗色則此果色應非眼等色根所取便違自執破共六節一破正計五破轉計今初破不越因量之正計也生果是粗色因量是極微生果不越因量粗色應如極微粗色眼根取極微非眼等色根所取便違汝執粗色是色根之所取矣是則不越因量汝之執也色根所取亦汝之執一己之二執相違一定之至理何在我故曰彼執之非理也二約量德破若謂果色量德合故非粗似粗色根所能取所執果色既同因量應如極微無粗德合或應極微亦粗德合如粗果色處無別故破量德合之轉計也初出轉計之情次破果濫於因三破因同於果計意蓋謂前破不名粗色違色根取者以但約不越因量為言耳若但以量言則果色非粗根無所取誠如所破今則粗德合故果色似粗根所能取又豈如所破耶是則量德合故不惟因量之不越非粗似粗亦乃自執之無違轉計之意如此破意蓋謂果色是德合因量是極微果色異於因量者果色粗德合極微無粗德合也若謂量德合故非粗似粗則所執果色同因量矣既同因量果色應如極微之因既如極微果色竟無粗德之合汝以為果可為果吾以為果乃成因矣如之何又極微之異果色者以極微因量之時非德合果色之時則極微因量之處殊有別於德合果色之處也若謂量德合故非粗似粗則似粗不越於非粗之際德合無別於量合之處矣果色德合之地正極微德合之地汝以為果可為果吾以為因可為果矣如之何果同於因果將安在因同於果因又奚存因果尚是偕亡色根取之何所我故曰彼執之非理也三約自因破若謂果色遍在自因因非一故可名粗者則此果色體應非一如所在因處各別故既爾此果還不成粗由此亦非色根所取破遍在自因之轉計也破意蓋謂汝轉計量德合生粗色不能成矣若謂果色遍在自因因非一故可名粗者亦不成也何者粗色在果體應是一一體所在處亦成同果色𭓩然是粗色根自然可取今以非一之多因可名粗色之一體則粗色之一體應是非一之多因多因在處之不同體應如在之各別各別則果自是因果色還不成粗不成則色非根色色根亦何所取因非一故可成粗依然因量之難越果既無故非可取還如前執之仍違我故曰彼執之非理也四約多合破若果多分合故成粗多因極微合應非細足成根境何用果為既多分成應非實有則汝所執前後相違破果色體異於因之轉計也初計果異於因二難因同於果三破果體非實計意蓋謂前破不越因量不能成粗色矣量德合故亦不能成粗色矣遍在自因又不能成粗色矣雖辨所生之果以皆論果於因故悉為所破斥耳吾以為因量固能生果果是因之所生既論所生之果自當辨果於果矣今夫果成粗色非自成也然必以合而後能成合成粗色非自合也必由分而後可合曰奩曰底非多分乎是必奩底合聚而後可以成瓶曰腹曰項非多分乎是必腹項合聚而後可以成瓶也果之多分合成粗色寧可破斥寧可不為色根之所取耶轉計之意如此破意蓋謂細之與粗因果自當有辨分之與合果因恐未懸殊果色之多分猶極微之多因也多分合故成粗多因合應非細合故成粗可為色根所取之境合應非細豈不足成色根所取之境乎因不足成故用於果足成根境何用果為汝以果異於因吾以為因可同於果矣如之何又前執所生之果雖是無常而體實有今則多分合成必非實矣前實後非自相矛盾又如之何夫因可同果計果合成之既非後逆於前計果合成之愈謬矣我故曰彼執之非理也五約因果破又果與因俱有質礙應不同處如二極微若謂果因體相受入如沙受水藥入鎔銅誰許沙銅體受水藥或應離變非一非常破果因同處體先受入之轉計也初量破二轉救三救四縱奪量破之意蓋謂以果望因所生粗色之不成就果辨果多分合成之有過得無因居果地果地之外無因果踞因居因居之外無果因果和合處同無二以明所生之粗色乎不知果稱粗色雖為有質之形設因非極微則無礙而踞有形處自當一也因號極微固非無形之質脫果非粗色則有形而居無礙處正應同也今則二俱有礙應不同居如二極微處何可一量破之意如此使轉救之若謂因入果色果受因微果入因微微受果色因果之相受也如沙受水如銅受藥因果之相入也如水入沙如藥入銅因果之體既相受入因果之處法爾應同不知法由喻顯喻因許成沙不受水銅不受藥誰不許之沙體受水銅體受藥其誰許之能譬之喻既無許可之人所喻之法必無受入之理矣其何能以救之哉縱或受入應離變矣或應離變則又非常一豈汝所執之宗耶良以在喻在法未必妙齊而入變受離大應相類離之則非一不越因量之何如變之則非常極微是常之何在展轉之不成反覆之無救我故曰彼執之非理也六約體一破又粗色果體若是一得一分時應得一切彼此一故彼應如此不許違理許便違事故彼所執進退不成但是隨情虛妄計度破果體是一之轉計也初代出轉計二約得立理三兩關難破四結歸妄情代出之意蓋謂以果望因既粗色之不成就果論果復合成之有過更以因果同處之既非得無果體是一之為計乎情𫝑之所必然倫次之所必到者也代出之意如此破計之意蓋謂又粗色果體若是一理事皆不可也何者粗色之果不齊色果之形必異形色之本質亦異彼此異故則得一分境時不應得一切境所得之此與彼異彼得應異此之不得也事也粗色之果雖異色果之形固異而形色之本體不異彼此一故彼應如此則得一分境時自應得一切境所得之彼與此一故得彼應如得此之無二也理也汝果許其一得一切得耶果不許其一得一切得耶不許雖順於世間現見不應之事違粗果一體應得之理矣許固順於一體應得之理違於世間不應得之事矣進之而順理事又相違退之而順事理且不順許不許之兩關有礙退不退之二義不成非是一體但是隨情非真量度但妄計度我故曰彼執之非理也又一分是少分一切是全體彼即全體此即一分無論矣更須詳粗果之體是一所該者廣則一分一切可一境可諸境彼此亦然二束廣從略二初總標二別釋初總標然諸外道品類雖多所執有法不過四種反歸約令易曉也品非自品由執成品曰十一種十三種九十五種能執之人品類雖多執不自執因法成執多束之少少束之又少少至於四種所執之法多數有限以有限之四種盡幾百之支流亡羊者不致泣岐流者可以得源作論之體應如此婆心之切為何如二別釋四初破執定一二破執定異三破執雙亦四破執雙非初破執定一一執有法與有等性其體定一如數論等彼執非理所以者何勿一切法即有性故皆如有性體無差別便違三德我等體異亦違世間諸法差別又若色等即色等性色等應無青黃等異破有法與有等性定一初列執標人二以理破徴三以同難一四別出過端有法隨指一法有等指一切法也性體性云有法與有等性其體定一者執一法與諸法之性斷無二也如數論執一冥性變多種法法雖多種原一冥性而不自知其非理何者有等一切法法固有差別諸法各異體體自有差別有法有等一一切即有性法皆如有性體應無差別勿一切法即有性故皆如有性體無差別不獨理之所難亦復違之更多違自教三德等定異而非定一違世間諸法定差別而非定無差別違眼根現量所取青黃等定異之色而非定無異乃至便違身根現量所取冷暖澀滑定異之觸而非定無異也自教相違理已難通况世間乎世間又違理更難通况現量乎凡執類於數論者請以理思又法即是事性即是理事有千差理無二致定一則無千差二破執定異二執有法與有等性其體定異如勝論等彼執非理所以者何勿一切法非有性故如已滅無體不可得便違實等自體非無亦違世間現見有物又若色等非色等性應如聲等非眼等境破有法與有等性其體定異初列執標人二以理破徴三以無難異四別釋相違五重指過端定異謂色等諸法非色等性如勝論實句為德業所依德業異於實句實等為大有所依大有異於實等而不自知其非理也何者法不自立因性而有體不自存由法而得有法有性異一切非有性非性如滅無其體不可得勿一切法非有性故如已滅無體不可得不獨理之難通亦復違有多種體不可得便違自教實句等自體可得如已滅無亦違世間現見有物而非一切滅無設更剖析又犯現量相違何者眼耳至身現量之根色聲至觸現量之境又若聲等非聲等性應不相關應如聲等非眼等境無所緣義豈不違眼等現量了知是色之過乎一謬已自難通三違更從何釋勝論之徒請以理勝三破執雙亦三執有法與有等性亦一亦異如無慚等彼執非理所以者何一異同前一異過故二相相違體應別故一異體同俱不成故勿一切法皆同一體或應一異是假非實而執為實理定不成破有法與有等性亦一亦異初列執標人二以理破徴三非理之故四以別難同五實假成非夫所執之法有等有性之不離能執之情有等有性之各別數論執一殊非勝論之情勝論執異不具數論之執執有法與有等性亦一亦異如無慚者併數勝之執而一之者也歷覽形對雙存似進於數勝之偏循鞠推窮亦執深乖乎中正之理所以然者過同前故相乖違故不能成故等也同前者一同數過異同勝過併二過於雙亦之中也乖違者異乖於一一乖於異雙亦之不可亦也不能成者亦異一即異亦一異即一即異一同異即一異同一同一異不成同異一豈得一異俱不成亦亦從何得一異本不同而以雙亦之故強使之同則一切差別之法皆可使之同矣勿一切法皆同一體無是理也或應一異之名但是假立一法二相互相形對而乃執以為真是實空華之濃淡爭鏡影之妍矣理豈能成無慚之流幸成以理四破執雙非四執有法與有等性非一非異如邪命等彼執非理所以者何非一異執同異一故非一異言為為表若唯是表應不雙非若但是應無所執亦亦表應互相違非表非應成戲論又非一異違世共知有一異物亦違自宗色等有法決定實有是故彼言唯矯避過諸有智者勿謬許之破有法與有等性雙非初列執標人二以理破徴三指執同前四表難破五出其相違六結責誡人夫執由情起情以待生一與異待異生於一單與復對復起乎單雙亦之復才生雙非之執待起彼存我泯情𫝑自然有執諸法與有等性非一非異如邪命等者併無慚之雙存而雙泯之者也以泯望存似掃蕩者空清於著迹由泯察泯知莾蕩者過重於無慚而不自知其非理也所以然者執同前故乖表故違世教故等也同前者非一同於勝論勝論執異是非一也非異同於數論數論執一是非異也反形二過於雙非之中也乖表者之為言覆也表之為言顯也雙非一句義含於二言表二言理該乎四句非一異言為是覆之言耶為是表顯之言耶若偏是表不應雙非初句乖矣若但是應無所執次句乖矣亦亦表應互相違三句乖矣非表非應成戲論四句乖矣四句乖而表逆雙非果何義耶出相違者非一異言違世間共知有一異物亦違自教色等有法決定實有而非雙非之不可得也同前執乖表己自難為違世間違自教又將何若是故彼言唯矯強避其過失而已豈真有實理之可詳哉諸有智者磨吹毛於既用拂古鏡於維新務深闢之而使之自屈勿謬許之而之得伸也有志於正人心者勉旃斯行以上四句外道所依百非所出四句既遣百非自絶種種外道失所依矣攝廣歸略良有以也上破外道離心法執一科竟二餘乘二初總徴破二別詳破初總徴破餘乘所執離識實有色等諸法如何非有彼所執色不相應行及諸無為理非有故破餘乘法執非有之總問答也如何非有者前云外道餘乘所執外法理非有故外道非有理如上聞餘乘非有非有如何答中彼所執色不相應行及諸無為者通指所執之法理非有故總破所執之法也但無為止虛空擇滅非擇滅心王止第六意識心所止四十六除邪見無癡失念散亂不正知以遍行五別境五名大地十以善十一去無癡名大善地十以根本六名大煩惱地六而但存癡足之以放逸懈怠不信惛沉掉舉而成六小隨名煩惱地數仍大乘不定名不定地增貪嗔慢疑為八不相應存得非得同分命根無心定滅盡定無想報生住異無常名句文之十四共七十五法經部計能成極微是實所成根等是假婆多計能所皆實而於大乘百數之有者以大小之教理不同則多寡之名言有辨耳此等俱非有者理也豈強使之非耶下當詳辨又不標心者以非餘乘所執故也二別詳破三初破諸色法二破不相應三破諸無為初破諸色法二初明對無對二明表無表初明對無對二初總列二別釋初總列且所執色總有二種一者有對極微所成二者無對非極微成列色名數便破斥之次第也總有二種舉所成大數有對無對列所成色名極微所成非極微成出能成之不同也更細分之有對有二無對有五二可見有對不可見有對可見有對謂色塵及能造四大不可見有對勝義根及聲香味觸五謂極略極逈受所引遍計定果是也極略者以假想觀分析根塵之色至極微位故極逈者亦以假想觀分析空間光影等色至極微位故受所引者謂於受戒師處精誠之至引起思心種子發起防犯功能現行之色故遍計者謂意識周遍計度種種色法以為實有故定果者定中現諸境界如水觀成而水現之類故又有對色從色種生無對色從心種生總之是法處所攝一色可分為影像無表定果三門影流類義像相似義謂此所變相分不惟是本質之流類亦似本質故也極略極逈唯有觀心影像都無實體散位獨頭意識緣五根五塵水月鏡像當情變起相分乃是遍計亦影像攝以是水鏡為緣意識妄計有月有像並非眼識之境又遍計是妄心極略極逈是觀心故總攝於影像受所引色是無表門攝以依思願善惡分限假立無表門謂不可表示故也如以受戒律儀之有表熏成善無表殺生不律儀之有表熏成不善無表禮佛毆罵等處中之有表熏成善惡無表也問定果何謂無對答集論云三義名有對一種類謂諸法互為能礙互為所礙二積集謂極微以上三不修治謂非三摩地自在轉色今定果是三摩自在轉色三義皆反故云無對二別釋二初有對二無對初有對二初明色非實有二顯色唯識變初明色非實有二初明能成極微不實二結所成果色非有初明能成極微不實二初略明二廣顯初略明彼有對色定非實有能成極微非實有故略破有對之非實也初二句斷非實次二句出非實故以能所固自有分厥體應無有二能成極微不實所成有對豈真故斷非實也二廣顯六初約質礙破能成不實二約方分破能成不實三約現處決能成方分四約見觸定能成方分五約住處決能成方分六約果色決能成方分初約質礙破能成不實謂諸極微若有質礙應如瓶等是假非實若無質礙應如非色如何可集成瓶衣等後四句斷極微有質礙首四句判質礙之為假意謂所成不實以能成不實之故能成不實者以能成有質礙耳極微既有質礙質礙必是虛假故不實也二約方分破能成不實又諸極微若有方分必可分析便非實有若無方分則如非色云何和合承光發影後四句決極微有方分首四句判方分是虛假方謂方隅分謂分位不落界限體莫得而捫摩者名實方位昭然形可得而剖析者名假今所成不實以能成不實能成不實者以能成有方分耳極微既有方分方分必可分析故不實也和合者空間極微紛飛渾會名和合非以合成粗色之果名和合也承光發影者和合承光顯現於光名發影也不曰形者極微雖是有對以極微故非眼識所取之境許其和合於隙光中必有影發影即彼質映光始現名之為影非以影為影也意欲以難取之極微顯之於可見之光影即便以可見之光影指出極微之方分耳故曰若無方分則如非色云何和合承光發影正顯和合承光能發影者是方分也是則極微渾合處便名和合和合映現時便名發影光中之影合和合和合之物全光影也三約現處決能成方分日輪才舉照柱等時東西兩邊光影各現承光發影處既不同所執極微定有方分承上前言極微有方分故能承光發影此言承光發影故定極微有方分也何則日輪才舉照於柱壁等時孔隙之中極微光影兩邊各現夫各現則處不同矣承光發影處既不同所執極微豈不定有方分然則自東西以觀光影方分已顯於兩邉由各現以見極微界畔莫知其數量微微所在之方各各齊限之分何其歷然而可定也故廣百論頌云微若有東方必有東方分極微若有分如何是極微論曰是諸極微既有質礙日輪才舉舒光觸時東西兩邊光影各現逐日光移隨光影轉承光發影處既不同故知極微定有方分既有方分便失極微如是極微即可分析應如粗物非實非常違汝論宗極微無方分常住實有造世間萬物四約見觸定能成方分又若見觸壁等物時唯得此邊不得彼分既和合物即諸極微故此極微必有方分承上豈獨光影現處可定方分又若見光影觸處亦可定方分也何則光影觸此則不在彼光影觸彼則不得此彼此光影即和合物此和合物即諸極微既和合物即諸極微彼此豈非極微之方分乎故此極微必有方分以上方分三節論意若謂因此顯彼猶涉於揣摩即物而真始名為卓見苐法之必難於指陳者不容不為之旁猶可以形容者何得不為之直指極微之為物也固難指陳於大明之下猶可形容於隙光之中使彼親見光影之方分則必了然極微之可分既默識能成之不真尚可所成之有實耶此論主一片婆心殆若此乃昧者竟以果色釋之是藉果知因由此顯彼意也縱若所見何不似前若無質礙云何和集成瓶衣等若無方分云何和合成物色等何其簡易何其明白乃弄光捕影耶得無以實色明方分反覺難明以光影明方分反似易明故捨實色之方分而取實色之影以明實色之方分乎是猶以人面辨妍醜反覺難辨以面影辨妍醜反似易辨必捨人面之妍醜而取人面之影以辨人面之妍醜矣有是理乎智者詳之五約住處決能成方分又諸極微隨所住處必有上下四方差別不爾便無共和集義或相涉入應不成粗由此極微定有方分文有三𫨻初順顯有方分次反顯有方分三結斷有方分此亦的指極微方分但不在光中顯耳若以光臨所住上下四方皆光影矣由此極微定有方分問前既光中的指方分今於住處又指方分何也曰承光發影偶見於一隙隨所住處實遍乎十虛以一隙光影見十虛十虛皆一隙之光影以十虛住處見光影光影盡十虛之住處狹以形𡩖𡩖自可明𡩖以望狹狹應非局隨所住處於光影之後良有以也佛性論云為當一塵中有六方不若有六方即成六分若無六方非謂為色既有六方即可分析若有方無分是則六塵共入一塵無量諸塵並應如是則無成大義是也六約果色決能成方分執有對色即諸極微若無方分應無障隔若爾便非障礙有對是故汝等所執極微必有方分文有四轉初二句牒彼所執次二句斷彼所即後二句難彼所執末三句結定所執即諸極微極微外無有對也若無方分應無障隔極微無方分極微無障隔也若爾便非障礙有對者見有對之不成也是故汝等所執極微必有方分者言即所執有對辨所執極微以所執極微決所執有對有對既其障礙極微必有方分問隨所住處後又約果明方分何也曰文必有義義必有意意管乎義義貫乎文有對不實之文全在能成極微不實能成不實之義全在質礙方分可分質礙已如上明方分自茲而止方分五𫨻前四皆約因明方分第六但約果顯極微正見全因作果極微能成乎有對全果是因有對不外於極微極微無方分有對之障礙不成極微無障隔有對之方分何有故曰執有對色即諸極微又曰所執極微必有方分先因後果果色愈明後果於因因色更顯始略明於質礙後詳顯於分方方分可以詳質礙質礙可以總方分故曰若無方分應無障隔見方分質礙之不離也又曰若爾便非障礙有對見方分不離於質礙質礙方分之因不離有對之果也文中義義中意後先次第豈徒然哉細玩自顯二結所成果色非有有方分故便可分析定非實有故有對色實有不成初三句結能成不實後二句結所成不實雖有能所之分不無偏重之別求所成不實偏重於能能成不實而所後可以不實也結能成不實偏重於所所成不實而能始可言不實也重能重所固自應分為所而能總之歸結於所問上辨能成實質礙足矣何更以方分為曰據實二可兼該約義不無有辨質以形言礙者形之障隔方以處言分者處之齊限總是極微之體有形隔曰質礙質礙所在之齊限曰方分論主欲實所成者徹見於能成故重重披析空彼膠粘耳問析極微七分成鄰虛七鄰虛成一透金塵七透金成一透水塵七透水成一兔毛塵七兔毛成一羊毛塵七羊毛成一牛毛塵七牛毛成一隙中遊塵則一遊塵者屈指當是八十二萬三千五百四十三極微矣粗細大小何可同年今指遊塵為鄰虛固不勝錯前引廣百佛性實今極微之解豈其然乎答細玩和合和合物豈不極微而遊塵細玩隙中承光影豈不遊塵而極微良以粗如遊塵尚自鼓舞於光中細若極微豈不飄於隙內特以會聚中即而可指知是遊塵冥渾之餘渺而難見非無極微極與遊俱於隙中指隙中光影顯極微方分正遊塵渾處也則極微鼓舞於中冥渾而渺然者何可限量也耶智者請詳二顯色唯識變二初徴二釋初徴五識豈無所依緣色承上設為問難以起下文也所依緣色承上有對豈無所依緣色承上破有對起下文者起下正顯識變依緣起破餘乘所執依緣等良以由上望下餘乘所執依緣盡含有對之中自下望上餘乘所執有對不出依緣之內依者所依之根識必依根而發緣者所緣之境識必由境而生今破有對乃難豈無所依緣色者意顯有唯識依緣破無餘執依緣顯有以執破始顯破執以有顯破成下一大分七節總之是破心外之有對非真內識之依緣定有熟玩通其旨自現二釋七初正顯唯識所變依緣二縱破餘乘執所緣緣三况破餘乘執所緣緣四結出唯識正所緣緣五重詳變相破異執六復明極微通逹異執七總結有對是識非微初正顯唯識所變依緣雖非無色而是識變謂識生時內因緣力變似眼等色等相現即以此相為所依緣然眼等根非現量得以能發識比知是有此但功能非外所造外有對色理既不成故應但是內識變現發眼等識名眼等根此為所依生眼等識此眼等識外所緣緣理非有故決定應許自識所變為所緣緣答文分三初總明依緣二別明所依三別明緣緣總明依緣者以問五識豈無依緣色故總答云雖非無色而是識變為所依緣耳詞總而義貫取先識其總而後別可明也雖非無色者有所依緣也而是識變者本識變現非心外別有極微所成之色為依緣也謂諸識生時由本識自證內種子因緣能生現力變似眼等五根似色等五塵相現眼等五識即以所變根相為所依託所變五塵本質變起五塵相分為所緣也別明所依者意以根塵同是識變五塵現量五根必亦現量得矣故云然眼等根非現量得既非現量以何所以得知有根以五勝義有能發五識之功用比知有體如由芽發比知有根然則此但以發識之功能名根非心外大種所造之色名根也外有對色理既不成故應但是內識變現功能發眼等識名眼等根此根為所依生眼等識以依望緣不同如此別明緣緣者意以五識所依之根既以別明而不濫五識所緣之境豈不別明而更明耶故云此眼等識於本質境能緣緣不著名踈所緣緣乖於唯心名之為外理非有故故曰五識不得本質決定應許自眼識等託本質變色等相分為所緣緣也以緣望依不同又如此故皆別明也二縱破餘乘執所緣緣四初縱破能生為所緣緣二縱破和合為所緣緣三縱破極微為所緣緣四縱破和集為所緣緣初縱破能生為所緣緣謂能引生似自識者汝執彼是此所緣緣非但能生勿因緣等亦名此識所緣緣故初二句牒執下皆破執者字指有法能引生有法有牽引生識之功能也似自識者似已相識因緣指種子等者等增上無間二緣三緣皆有能生但非此識之境耳汝指正量師此指似自識代計意云五識豈無所依緣色謂以能引生似自識者汝執彼是此所緣緣耳寧知所緣緣者謂能緣識𭘧彼相起及有實體令能緣識托彼而生能所雙具非但能生已也如但能生勿因緣等有能生義亦名此識所緣緣耶三緣不可以為緣緣能引生者且無論能生何如縱能生無識𭘧彼相起之所緣闕一支矣豈可以為所緣緣耶二縱破和合為所緣緣眼等五識了色等時但緣和合似彼相故非和合相異諸極微有實自體分析彼時似彼相識定不生故彼和合相既非實有故不可説是五識緣勿第二月等能生五識故初四句牒執此下難破執中似彼相者識似和合之相是但緣之故也以眼緣色至身緣觸但了和合之五塵不了能成之極微能了似和合之所了故也破中非和合相至不生故出無實體之故彼和合相至五識緣出不可為之故末二句喻顯和合必不可以為緣也經部執意謂五識豈無所依緣色謂以眼等五識了色等時但緣和合似彼相故為所緣緣耳寧知實有自體者乃可為生識之緣所執和合相非離極微有實自體以分析彼時似彼相識定不生故然則彼和合既非實有故不可説是五識緣如第二月揑目所成亦無實體不可為緣和合可以為緣勿第二月能生五識故是則和合之相縱可以為所緣必不可以為緣豈可以為所緣緣耶三縱破極微為所緣緣非諸極微共和合位可與五識各作所緣此識上無極微相故非諸極微有和合相不和合時無此相故非和合位與不合時此諸極微體相有異故和合位如不合時色等極微非五識境此破和合位極微也文有四節初至無極微相故破所緣次至無此相故破和合相三至體相有異難極微體相四至非五識境總結極微非所緣也首四句除一非字便是執詞不去非字便是破詞含執詞正量部救前破云和合粗色雖假而有能成一一極微此是實有各得為緣能生五識故破云非至此識上無彼相故等也謂生識者名緣識𭘧相起者名所緣識上既無極微相極微共和合位非是所緣如五識不能緣五根以五識生時不𭘧彼相故也次中意以汝執極微共和合位有和合相有相故可作所緣不知相之有無不可定可定於合否之時和合此極微不和亦此極微不合之時有相和合之時相矣不和合時無此相非諸極微有和合相三中非和合位與不合時體相有異者以和合之位觀極微謂極微有和合相以未合之時觀和合非和合位與不合時此諸極微體相有異既其不異相將安在故和合位如未合時色等極微非五識境豈可與五識各作所緣問前能引生與此何別曰前但標能引生者雖不明言極微而極微自在此標和合極微乃言各作所緣則不但能生已故前引餘緣破但能生見無所緣此破識上不𭘧彼相見非所緣前後相望亦可共作一量但前執但能生此執所緣之別四縱破和集為所緣緣有執色等一一極微不和集時非五識境共和集位展轉相資有粗相生為此識境彼相實有為此所緣彼執不然共和集位與未集時體相一故瓶甌等物極微等者緣彼相識應無別故共和集位一一極微各各應捨微圓相故非粗相識緣細相境勿餘境識緣餘境故一識應緣一切境故初至為此所緣是牒執詞下皆破執情也意以前難五識豈無所依緣色謂有執色等一一極微不和集時最細難見以至難觸非五識境共和集位展轉相資有粗相生為此識境可為所緣彼體是實可以為緣而為所緣緣耳寧知彼執之不然乎何者和集之位如未集之時體相常一無粗相可得如論意謂和集非所緣以許極微相故也若謂瓶甌是和集之粗相緣彼相識應有別者不知能成極微之量既等所成瓶甌之實無別緣彼相識亦應無別如論意謂瓶甌假非實覺相應無別故也若謂能緣之識應別則所緣之相必粗所緣之相果粗則共和集位一一應捨微圓相矣有是理乎然所以當捨者以粗相之識不緣細相之境若粗識能緣細相色餘之聲識應緣聲餘之色境矣脫或有之應有一識能緣一切之過矣由是觀之一識不能緣一切餘境之識不能緣餘境明矣餘境之識不能緣餘境微細圓相不應捨於和集之位又明矣細相不應捨於和集之位粗相之識果安在粗相之識不可得和集之粗相又安在吾故曰共和集位與未合時體相一故彼執之不然也又不相乖戾而渾融者曰和合不相乖戾而會聚者曰和集如集論謂和合者極微已上有方分色更互和合如濁水中一地水極微更相和合聚集者謂方分色展轉集會如二泥團相擊成聚若水和沙必不成聚以水和土即成泥團等是也三况破餘乘執所緣緣許有極微尚致此失况無識外真實極微首二句躡縱破起况破次二句即况破責餘乘意以有有法可論緣緣有可論乃論緣緣於不可可不可於緣緣緣不緣於有法極微是餘乘有法即上縱破觀之許有極微尚至四節之失不可為所緣緣况無識外真實極微乎極微有法既已空華更何緣緣是非於其間哉四結出唯識正所緣緣由此定知自識所變似色等相為所緣緣見託彼生𭘧彼相故初四句顯識變似相為緣緣末二句出似相為緣緣之故自指五識對餘識言以五識外其他諸識非色等五塵之自識也又五對色等各有自他如色以眼為自識餘四皆他聲以耳為自識餘亦皆他似色者指相分色內色如外非實外色名似色也自識所變似色等相者五識各自證分託第八所變本質變起相分也為所緣緣者意以未經剖析之前不以極微為便以和合為不為於極微和合便不離極微和集紛紛未知所決今以能成既破之後唯識正顯之餘加以縱破况破情盡執窮妄除理現由此定知非外境所成實色等相為所緣緣是內自識所變似色等相為所緣緣也能為所緣緣者以見分託彼似相之實體而生識上變𭘧似質之相而起𭘧彼相起故是所緣見託彼生故是於緣二支無闕理善極成矣又𭘧有二義一挾𭘧即能緣心親挾境體而緣二變𭘧即能緣心變起相分而緣相亦二義一體相相二相狀相五識緣境於兩種二義中唯是後義謂於五識體上變𭘧色等相狀而為眼等見分所緣論云內色如外現為識所緣緣內色即相分色外境即本質色是所慮名所緣此即所託名緣五重詳變相破異執然識變時隨量大小頓現一相非別變作衆多極微合成一物初三句詳變相次三句迷執一相所該者廣量固前塵本質心業二種亦名為量識變時者五託八相為本質變起相分時也隨量大小頓現一相者謂正變之時隨心業本質之量頓現一相量大小而相大小變時全隨隨時全現變處隨處現處離諸後先非漸次也如佛相黑色於餓鬼金質黃於路人瓊子琉璃於五臺宣公瓦礫於七寶可想見也意以前以相唯識變結唯識未詳識之所以變故又云然識變時隨量頓現等也是則知相之所以變唯識之變明矣唯識之變明識外之變何更辨六復明極微通逹異執為執粗色有實體者佛説極微令其除析非謂諸色實有極微諸瑜伽師以假想慧於粗色相漸次除析至不可析假説極微雖此極微猶有方分而不可析若更析之便似空現不名為色故説極微是色邉際文有四節初約佛説顯假次約諸師顯假三約通難顯假末二句引證其假難云非識變作衆多極微合成一物理則誠然爭如佛説極微何曰為執粗色有實體者佛説極微令分析粗色以祛實體之執耳非謂諸色實有極微何疑對執之權説耶次中接云佛既有説按説諸師以假想觀慧分析粗色至不可析即此不可析者假立其號名曰極微愈見其非實矣三中難云前云極微定有方分是可分析今何故云不可析耶故云雖此極微猶有方分而不可析若更析之便似空現不名為色是則前云可析約極微之方分言此云不可析約方分之極微言雖曰方分如無方分豈真有方分之可得哉問如上所明前何於隙光中承光發影指極微方分耶曰外識有極微者謂非識變故以方分可析為破若知萬法皆同識變寧獨簡變於極微無謂無實有之能成者耳如集論云當知此中極微無體無實無性性假建立展轉分析無限量故但由覺慧漸漸分析細細損滅乃至可析邊際即約此際建立極微問若諸極微無實體性何故建立答為遣一合想故若以覺慧分析所有諸色爾時妄執一切諸色為一合想即便捨離由此順入數取趣無我性故又為悟入諸有色非實有故乃至悟入唯識道理由此順入諸法無我性故是也七總結有對是識非微由此應知諸有對色皆識變現非極微成由此應知者以前知極微成非識所變由此立破之詳陳應自是非於甄別知昔之是者今非其成知昔之非者今是其變有對色果識外乎否耶我故曰理非有也上破有對色已竟二無對餘無對色是此類故亦非實有或無對故如心心所定非實色諸有對色現有色相以理推究離識尚無况無對色現無色相而可説為真實色法初例破次量破後况破此指有對無對五塵所落之影五根不能對也是此類者無對雖非有對然不離於色是此對色之流類亦非實有者有對之色離識外既非實有有對之外餘無對色是此類故亦非離識外而實有色也或者不定意可破頗多不定於一法之謂如心心所者心無形非實色無對如心故定非實况破可知夫例之厥義已明量之其旨又的更從而况之無容辨駁於其間矣是以亦非實有定非實色况可説實自踈入親由緩而一氣層疊破斥之妙一至於此上色法二科對無對一科竟二明表無表七初總致難問二總為破徴三破身表業四破語表業五破無表業六難明三業七結唯識變初總致難問表無表色豈非實有表色者身動語發之謂色顯示其心之謂表通三性也無表色者思想防發受所引之謂色莫能明現於外曰無表唯善惡也意謂表無表色現有表示防發功能豈非實有二總為破徴此非實有所以者何總破實有之難總徴非實之由下文或別或總反覆詳明皆顯非實之由是以末復結以實無外色識變似色終焉三破身表業且身表色若是實有以何為性若言是形便非實有可分析故長等極微不可得故若言是動亦非實有才生即滅無動義故有為法滅不待因故滅若待因應非滅故若言有色非顯非形心所引生能動手等名身表業理亦不然此若是動義如前破若是動因應即風界風無表示不應名表又觸不應通善惡性非顯香味類觸應知故身表業定非實有然心為因令識所變手等色相生滅相續轉趣餘方似有動作表示心故假名身表文有八節初徴表體次破形執三破動執四出轉計五破轉計六破諸塵七結非實八申正義表體者意以定有法是非當求有法體性得有法體性可決有法之是非且身表色若是實有以何為體若汝有宗言身表體性是形表色便非實有以有形可分析故分長短等至極微表色體性何可得耶形體叵得表色不實矣若汝正量言身表體性是動表色亦非實有以才生即滅曾不移時無動義故良以有所等待待時乃為動時不得名即有為動法之滅不待因故如電現即滅名即滅也滅若待因應非滅故者俱舍云待因謂果滅無非果故不待因滅既不待因才生即滅若初不滅後亦應然以後與初有性等故既後有盡知前有滅等是也動性既無表色是不實矣若汝有宗轉計心所引生二以言表色而曰表色非青黃等顯色非長短等形色既非二攝是心力引生能動手等名身表業者寧知正計理固不然轉計理亦不然耶何則此所引生為若是動義如前破若是動因則此引生應即風界風無表示不應名表動與動因皆不可得表色之實安在得無以觸香味三是表色耶不知非顯風觸不通善惡豈以無記而為身表非顯香味亦是無記故云類觸應知夫形動正執既非引生轉計復謬故知身表定非實有實有諸執固破表色正義若何故謂第六心為因能令第八所變手等色相生滅相續轉趣餘方似有動作表示心故假名身表餘乘無知執為識外之真不知似也執為識外之實不知假也假名得之於似有似有根之於識心知表色者當自心識始問小乘亦以心為因與此何別答彼雖云以心為因實計識外有色是故不同問前破才生即滅無動義故今云生滅相續似有動相豈不相違答無動破識外實動似動正非實動相違安在仁王護國經云九十剎那為一念一念中一剎那經九百生滅則一念中屈指當生滅八萬一千矣無常神速至此無動似動可想也已四破語表業語表亦非實有聲性一剎那聲無詮表故多念相續便非實故外有對色前已破故然因心故識變似聲生滅相續似有表示假名語表於理無違初破非實次申正義破中初一句標破次六句釋破但破中文義簡盡若欲詳明例前三轉初云汝執語表是實以何為性若言是聲亦非實有所以者何一剎那聲無詮表故剎那曰一為時至促為相至微不惟無名亦復無字是以不能詮表也然以明不實之故者以詮表全體是聲聲性不外詮表既無詮表故無實性此於無詮表釋非實也次云若言多聲亦非實有所以者何多念相續便非實故多念者由多剎那成字多字成名多名成句連而不斷雖有詮表然即合成處便非實有之故此於詮表釋非實也三云若言是色亦非實有所以者何外有對色前已破故對色者聲是色法聲是可聞然外對已破即是不實之故此舉已破釋非實也不實之因窮不實之旨表是實之執當自消矣申正義者然因心故識變似聲生滅相續似有表示假名語表而餘乘執似為真執假為實離識而有何其昧也五破無表業表既實無無表寧實然依思願善惡分限假立無表理亦無違謂此或依發勝身語善惡思種增長位立或依定中止身語惡現行思立故是假有此毗婆沙師經部師之執也初例破二正破謂有表誠實無表豈無今表既實無無表寧實然雖不實依何而立故云然依思願善惡分限假立等也思謂酌量即第六所俱遍行中思願謂希望即第六所俱別境中欲善惡分限者思願於善界於惡限思願於惡限於善分依之而立者依善邊防惡發善之功能假立善無表色依惡畔防善發惡之功能假立惡無表色也然思願固有善惡善惡復有種現種現更分定散今所依立為種為現為定為散果何所謂故云謂此或依發勝身語等也身語曰勝有力之善惡也種位曰增長有力之成熟也謂此無表不定依一法而立或依發勝惡身語之惡思種增長位立防善發惡功能之惡無表色或依發勝善身語之善思種增長位立防惡發善功能之善無表色或依定中止身語惡之現行思立防惡發善功能之善無表色也然則是散是定難逃思願之心曰種曰現不出功能之外捨心識種現之功能無表從何而立故是假有非實有也問散心但約種位立者何也曰種子功能如此現何必言問定心但約現行立者何也曰在定之時定思現行故當言現問既云現行何異於表曰以不形於外故名無表問既依現思應自表知何名無表答現思之上防發功能豈得自知問現由於種種由於願思思有慮決定動發何思種子有此功能答三思中取上品者初念所熏有此功能以初念為無表依故後念不立如皇儲立一非餘此或單可善言善惡該通詳宗鏡五十五卷六難明三業世尊經中説有三業身語業豈不違經不為無但言非色能動身思説名身業能發語思説名語業決二思意相應故作動意故説名意業起身語思有所造作説名為業是決思所遊履故通生苦樂異熟果故亦名為道故前七業道亦思為自性或身語表中思發故假説為業思所履故説名業道總難三業發明前意也初設難二釋難三結難四復明設難意謂言至聖經堪為定量後賢仰聖惟畏惟遵乃世尊經中説有三業汝論無身語豈不違經釋云不為無但言非汝所執實色不者以逹身語二表及無表三業之名諸名之性故耳身業語業意業名也名從何得以能動身思説名身業離動思外無身業之名以能發語思説名語業離發思外無語業之名以慮決定二思意相應故作動意故説名意業離決外無意業之名且身語不獨起思有所造作名業亦可名道以是第六決能履之所履故也以通生苦樂異熟果地之因地故也是則即業原名即名會體何獨意業以思為自性耶故結云前七業道身語二種亦以思為自性思為自性身之行動引生安在哉思為自性語之少聲多聲對色安在哉以何為性亦非實有聲性不徒然也豈為無但言非色而已更復明之三業之名三名之性雖由於思所發身語非思何亦名業故云或身語表體雖非思乃由中思之所發動思既名業此依思立假名為業思所履故亦名為道不必疑也七結唯識變由此應知實無外色唯有內識變似色生總結非實也此指前文由此應知者別推之已悉總辨之既精應了然指外色實無不應如昔迷為實有應了然知內識似有不應昔迷之非內也上破色法已竟二破不相應三初總破二別破三旁破初總破不相應行亦非實有所以者何得非得等非如色心及諸心所體相可得非異色心及諸心所作用可得由此故知定非實有但依色等分位假立此定非異色心心所有實體用如色心等許蘊攝故或心心所及色無為所不攝故如畢竟無定非實有或餘實法所不攝故如餘假法非實有體總破不相應行非實有也文有三節初總破徴二推原假實三量定假實不相應行亦非實有者以體用之於色心一往推之如異了不可得但是假立再三量之攝否皆非實有但是假有也推原者究所以為假之故也意以如色心體相可得固實非假異色心作用可得亦實非假今非如則不即色心非異則不離色心由此故知定非實有但依色心彼此支分之位而假立也夫假立既因體用不實不實乃因如異雙非雙非獨無因而致然乎故量之曰此不相應定非異色心心所有實體用以許蘊攝之故如色心等也謂色心是蘊攝色心非異蘊此既許行攝此非異色心豈無因而云非異哉一因不可盡或此不相應行定非實有者正以心心所法及色無為所不攝故如畢竟無畢竟無無攝畢竟無非實此非彼所攝此定非實有豈無因而言非實有哉或此不相應行非實有體者正以餘為無為實法所不攝故如餘假法也假法實不攝假法徒有名此實所不攝此但有假名豈無因而言假立哉是則由如異二非體用之假實既明復宗因三量名實之有無更顯亦非實有豈徒言哉又初量非異次量非如末量非實而初量其體用與上異者見次量亦可具也二別破六初破得等二破同分三破命根四無心定五三有為六破名等初破得等三初得等問答二得等破斥三得等正義初得等問答且彼如何知得非得異色心等有實體用契經説故如説如是補特伽羅成就善惡聖者成就十無學法又説異生不成就聖法諸阿羅漢不成就煩惱成不成言顯得非得初大乘問次餘乘答問意謂破為執起執以知生得其知破斥始端今得非得異色心等有實體用執也且彼如何知實有耶答中初引經次出意補特伽羅云數取趣謂數數取著世間起惑造業趣於六道亦名異生阿羅漢云應供云殺賊云無生亦名聖者善惡指六道業因煩惱指見思二惑十無學者正語正業正命是無學戒蘊正念正定是無學定蘊正見正思惟正精進是無學慧蘊正解脫是無學解脫蘊正智是無學解脫知見蘊經云成者顯得不成顯非得業惑染法無學淨法染淨雖異同是實有體用成就染淨之得不成染淨之非得得否固殊證之實有體用經如是説説如是意我如是知豈外經以有知耶二得等破斥經不説此異色心等有實體用為證不成亦説輪王成就七寶豈即成就他身非情若謂於寶有自在力假説成就於善惡法何不許然而執實得若謂七寶在現在故可假説成寧知所成善惡等法離現在有離現實法理非有故現在必有善種等故又得於法有何勝用若言能起應起無為一切非情應永不起未得已失應永不生若俱生得為因起者所執二生便為無用又具善惡無記得者善惡無記應頓現前若待餘因得便無用若得於法是不失因有情由此成就彼故諸可成法不離有情若離有情實不可得故得於法俱為無用得實無故非得亦無此文展轉頗多剖析不易詳分十五細意始彰略為兩節大意更顯初斥解違經二引例證謬三原意破執四反詰勝用五代出用計六正難無起七反難無起八轉救有起九約執難起十轉計具得十一以頓難具十二代出得義十三約義破實十四結得無用十五例結非得意謂汝前引經為證欲成離色心等有實體用之執也經不説此異色心等有實體用經中亦説輪王成就七寶豈即離我色心成就女寶之他身而非我身成就輪寶等之非情而非我心哉如俱舍云若有墮在自相續中有得非得非他相續無有成就他身法故非非相續無有成就非情法故是也若謂輪王於寶有自在力任意轉移假説成就於善惡法何不許有自在力假説成就而執為實得耶若謂七寶在現在故可假説成寧知所成善惡離現在有離現實法理非有故現行有起不起現在必有善等種子常存故也此即經推窮得既非實汝執為實將無得之於法有勝用耶今試詰汝又得於法有何勝用若言用是能起為生因者則有情有得應以此得而起無為方名勝用無情不具此得有情未得善法或既得已失者應皆永無生起方顯得有勝用今不見無為以得而起何也見無情不起而常起何也未得而得已失復得何也勝用安在哉脫轉救云過去得亦過去未來得亦未來現在得亦現在揀前後生以無始之俱生得為因故未得已失亦有起者則汝所執因緣生假名生便為無用墮一因論違自教矣何况得唯無記𫝑力劣故無前後生不通善惡耶脫又俱者具足義是善惡無記無不具足名得則三性應頓現前方名有用為因既齊生果應爾若待餘因得便無用矣若得之義於法是不失因有情由此成就善等法故然諸可成法不離有情非關於得若離有情色心之外實不可得汝等云何離色心外有實體用之可得耶得實無故非得亦無非實有也是則詳分十五意已盡消於此更為兩節則初至善種等故雖似破體而用自在總是依經破實次至非得亦無雖是破用而用不離體𨚫是以用破實臨文細玩當自得之又不失因大約多劫業不忘由得繩不斷使然如有部立輔行七之三引之頗詳三得等正義然依有情可成諸法分位假立三種成就一種子成就二自在成就三現行成就此假立不成就名此類雖多而於三界見所斷種未永害位假立非得名異生性於諸聖法未成就故文有二初得正義二非得正義種子謂善染無記三種曰成就者謂未經損害故也如瑜伽五十二卷云若所有染汙法諸無記法生得善法不由功用而現行者彼諸種子若未為奢摩他之所損伏若未為聖道之所永害若不為邪見損伏諸善如斷善根者名為種子此即業因成就自在謂善及無記二種自在成就者生彼功力增長無損故也此即業力如瑜伽云若加行所生善法及一分無記法生緣所攝受增盛因種子名自在成就現行者現謂現在現顯行者流行運轉之謂此即業果如瑜伽云若現在諸法自相現前轉名現行成就不成就即非得而於三界等舉要言之也見所斷惑者謂於三界四諦見道所斷分別惑種未為聖道所永害假立非得即大乘異生性性者以此為數取趣之體性故也問善名生得與加行所生何別曰生得者不由功用修得者也加行所生者由加功行勉而後得者也是則生得名本具種加行名熏習種問本具獨善不及染與無記修兼無記不及於染何也曰既曰本具染不必論既曰修為善必當論然又兼一分無記者則知或是由於加行所成工巧等入於純化不落思惟之謂故曰增盛因種子曰自在成就也噫假立成就假立非得異色心等有實體用乎二破同分三初同分問答二同分破斥三同分正義初同分問答復如何知異色心等有實同分契經説故如契經説此天同分此人同分乃至廣説初大乘問次餘乘答問意欲破其執在詰其知答則別無所知知全經説意謂經説則知正知正則同分實有豈可破耶二同分破斥此經不説異色心等有實同分為證不成若同智言因斯起故知實有者則草木等應有同分又於同分起同智言同分復應有別同分彼既不爾此云何然若謂為因起同事欲知實有者理亦不然宿習為因起同事欲何要別執有實同分破斥有三初依經總非二別破言因三別破欲因解了同分而詮表曰同智言計謂同分實有者非無故而知以言智必根於體實諸同智言既因同分而起故知同分為實有破謂果若所知則某草某木同是謂同智言言由草木生豈不因斯起起故知實有則草木等應有同分矣然而聖教不説無情有同分又於同分起同智言則同分為能起同分應更有同分為能起起既無盡過又何窮彼同分既別無同分而起此同智言云何因同分起耶事謂事業即身所為欲謂樂欲即意所願事欲不異曰同事欲意謂事之於欲人所必有同事於欲起豈無因因同分而起同事欲故知同分為實有抑知理之亦不然乎何則現行之果起於種子之因種子起於宿習理豈不然別執有實同分為起者理豈然乎是則引經實有之知依經既謬轉計實有之知約理又非反覆不可如何知耶三同分正義然依有情身心相似分位差別假立同分分謂分限位謂品位曰差別者鬼與畜別天與人別善惡之辨凡聖之殊彼彼地位之不同也曰身心相似者以天望天以人望人界趣之相若生類之相肖也如彌勒云於彼彼地同界同趣同生同類位性形等由彼彼分互相似位是也有情顯非無情假立顯非實有依有情不依無情依有情等假立不依有情等實有所立豈異色心有實同分三破命根三初命根問答二命根破斥三命根正義初命根問答復如何知異色心等有實命根契經説故如契經説壽暖識三應知命根説名為壽復如何等大乘問也如契經説餘乘答也答謂我知有實命根依經説而知經如何説經説壽暖識三我云何知應知命根説名為壽緣所説之差別知所會之別名即所會之別名知所説之異義何謂差別壽不是暖暖不是識判然而為三也何謂別名亦名為壽亦名命根歷然而為二也緣所説而知所會者識既是心暖既是色壽是於誰是會命根之名説名為壽也即所會而知異義者壽命非色壽命非心命根豈不異色心等為實有耶二命根破斥此經不説異色心等有實壽體為證不成又先已成色不異識應比離識無別命根又若命根異識實有應如受等非實命根若爾如何經説三法義別説三如四正斷住無心位壽暖應無豈不經説識不離身既爾如何名無心位彼滅轉識非阿賴耶有此識因後當廣説此識足為界趣生體是遍恆續異熟果故無勞別執有實命根大分三節細析九轉初依經直破所知次依蘊例破所知三依難辨破所知若於例中分二難中分六共初為九轉矣然總是依經直破猶虞厥旨未明依蘊例彰仍患餘情未盡難之更難辨之更辨直使情消執謝見破惑亡而後已耳此能破大略也詳之直破者壽暖識三説既不同旨當有在汝引之為證欲成汝異色心等有實命根之執耳經既不説證豈能成不假轉辨云直破也例之則又先已成色不異識汝當應比離識無別命根矣又若命根異識實有應如受等是心所法命根非心所異識豈實有耶故云非實命根難云若爾如何經説三法意以誠若所破經不説異誠若所例命不説離不異不離應説為一如何經説三法豈非壽異識暖歷然別有實體之為是耶不然聖經定量如之何其説三也辨云義別説三如四正斷意以斷所當斷名正而云四者約除惡生善已未之義而分其實一精進耳今約色身相分之義説名為暖現行見分之義説名為識連持相續之義説名為壽義別説三其實唯一識耳如四正斷既非判然而四則今豈判然而為三耶何疑於説三也難云住無心位壽暖應無意以既不離識識有彼有心無彼無住無心位壽暖應無而經不説無豈非判然為三壽異於色心耶辨云豈不經説識不離身意以壽暖不無經之所説識不離身經豈不説是則雖名無心識不離身又何必以無心之位難壽暖之應無耶難云既爾如何名無心位意以心可名識識可名心離則名無不離名有義甚明也識不離身則有心矣如何名無心位辨云彼滅轉識非阿賴耶等意以彼無心者無前七轉識之心非無第八賴耶識之心也是則雖名無心非全無心故前文云豈不經説識不離身必有此識之因後當廣説略言則是三界五趣受生之體周遍恆續異熟之果果體在於此豈是無耶是則質之以經定量既顯例之以蘊比量愈明而復明之以辨則凡隱奧於經中幽微於比例之未彰者悉皆因此而昭昭矣况揭賴耶既是果體命根豈在果體外乎噫餘乘當豁然矣三命根正義然依親生此識種子由業所引功能差別住時決定假立命根先順釋次逆推三詳辨命謂情命對無情言根謂根本對枝末言良以無情有生而無命形無神合故也有情命全是生神與形合故也念念相續合處之生命即根非命之根也意以異色心等有實命根者固已破矣然其正義畢竟依何而有云何立耶故云然依親生此識種子而此種由業所引差別功能住時決定以假立命根非實有也逆推者命根全住時之決定住時全差別之功能功能全業之所引業不離種而種非心所之種非諸識之種乃親生第八心王現行果識之種子也遡流窮源層當七級因初而後但是由業所引第八種子上連持色心差別功能住時決定者名命根耳若詳辨之引者牽引即引生也功能者於諸色心能連不散能持不失能處全功名功能也差別者界趣之殊久暫之異分劑頭數莫堪枚舉云差別也所引對能引言因能引業有善惡故所引功能界趣是分緣能引業有慈忍故所引功能壽夭之辨業正牽時唯牽引此種子種子方能生現行功能全本於業故云由也住時決定者諸趣未之前曰住時應長時者決不短宜時短者定不長各隨其當生之劑限而無移云決定也業引功能等皆歸八種者以是總報之主所當連持遍界之主無不連持恆續之主乃能連持趣生之主不由不連持也故以種子連持之功能假立命根者功能非命根而命根於第八種子之功能耳四無心定三初無心問答二無心破斥三無心正義初無心問答復如何知二無心定無想異熟異色心等有實自性若無實性應不能心心所法令不現起二無心定無想定滅盡定也無想者無前六識之想滅盡者兼無第七染汙之心也雖所無之法粗細不同同是心義能滅之力淺深不同同是無義故此二定均名無心異熟名無想果不離因也離色心等有實自性餘乘執也復如何知等者大乘問也意以命根異色心等已如上知復如何知二定異色心等有實自性耶答云若無實性應不能心心所法令不現起意以約心名定既非是色定名無心心自非有豈非定異色心等自有實性性有功能能於心令不現起名無心定耶若無實性無有功能無能必不能礙不礙心必現起現起名有有心名散定曷從來耶故知無心全是不起不起全是能能全是實性定體豈不異色心等有實自性耶二無心破斥若無心位有別實法異色心等能於心名無心定應無色時有別實法異色心等能於色名無色定彼既不爾此云何然又礙心何須實法如堤塘等假亦能初以定類例破次以假法例破定類者一是無心一是無色無雖不同無心曰定無色曰定定可為類心定比色定色定既應如心彼定例此定此定自應如彼彼既無別實法異色心等能礙於色此何有別實法異色心等能於心當局於心者瞥或生迷旁觀於色者倐應有悟比例既其允明別法當何所在又汝以為礙其心必須實法我以為礙其心何須實法今夫法之凡可以止遏者皆名有礙不取必於形物也物之凡可以障隔者皆能有不取必於實法也如積泥等之高者曰堤鑿泥等之下者曰塘泥等有實自體泥等是實堤塘離泥無體堤塘是假而假法亦能於水等也如心等實有自性心等是實二定離心無實體性二定非實而假法亦能於心等也汝必欲二定離於色心有別實法始能於心是猶堤塘必欲離於泥等別有堤塘之實法能於水也有是理乎縱不明於昔日之知乃當知於今日之例縱不知於定類之例必當劃然於堤塘假法之例矣須實法耶不須實法三無心正義謂修定時於定加行厭患粗動心心所故發勝期願心心所令心心所漸細漸微微微心時熏異熟識成極增上厭心等種由此損伏心等種故粗動心等暫不現行依此分位假立二定此種善故定亦名善無想定前求無想果故所熏成種招彼異熟識依之粗動想等不行於此分位假立無想依異熟立得異熟名故此三法亦非實有初無心定之正義次無想報之正義末結破非正義也承上定曰無心由於不起心之不起由於能而不須實假亦能之則此始終因果正義竟何所謂故云謂修定時於定加行等云云也於定加行增修無心定也發勝期願心心所者正修加行之相也厭患粗動心心所等者原修加行之由也漸細漸微者正見加行之力也微微心時者正見加行之勝力也異熟為所熏厭為能熏增上謂殊勝極增上謂殊勝之殊勝曰熏成種者以種非自種由熏而成熏非苟熏熏貴有力雖厭之能熏熏異熟之所熏設能熏怯弱種亦難成縱或成種且非增上况極增上乎今由殊勝之厭患發殊勝之願期生殊勝之礙使彼漸細漸微至於微微斯時也如魔軍之𠆸倆垂盡天兵之勇奮愈增縱未至渠授首亂流歸降將見縮首潛蹤趨避退藏彼地為我地矣極增上厭心之熏寧不成極增上厭心之種乎此加行之有成也由此損伏粗動心等暫不現行非如前之猶有微微行也此厭心等種之功能也依此分位假立二定者依厭患前六礙前六損伏前六使前六現行暫不行位假立無想定也依厭患兼七礙兼七損伏兼七七汙心暫不行位假立滅盡定也曰所熏成種招異熟識者果由於因也無想定前求無想果者因始於求也所以求者欣慕彼天為真解脫最寂靜故也依之者依異熟也依異熟立得異熟名者原無想異熟之所由名也是則始終之義既顯因果之義甚明二定之立是假無想之報非真故此三法亦非實有豈異色心等有實體性也哉賢預姑信女張門李氏大緣助板
