無求亦無三第三師有義所樂謂欲觀境于一切事欲觀察者有希望故若不欲觀隨因境𫝑任運緣者即全無欲由斯理趣欲非遍行此師以欲觀釋所樂于一切事欲觀察者不簡欣厭中容但欲觀者則有欲不欲觀者則無欲以此校前二師𨿽各有㫖此師為正二斥異有說要由希望境力諸心心所方取所緣故經說欲為諸法本彼說不然心等取境由作意故諸聖教說作意現前能生識故曾無處說由欲能生心心所故如說諸法愛為根本豈心心所皆由愛生故說欲為諸法本者說欲所起一切事業或說善欲能發正勤由彼𦔳成一切善事故論說此勤依為業初敘異次奪破三例破四通經此師誤用欲為作意錯解經文而以別境為遍行也既奪之復例之更為通經理自昭然矣噫一切事業由欲而起世間無論矣出世之業果能起乎否耶捨金輪而入雪山六年苦行萬德嘉猷王娑婆中天下而獨立莫不由欲起也吾儕如之何易惡欲為善欲即善欲而無善念念𢌞光時時加察一彈指頃不可忽也不然三途事業橫陳萬劫輪𢌞無已亦欲也其寒心哉其寒心哉二解二初正釋二破異初正釋云何勝解于决定境印持為性不可引轉為業謂邪正等教理證力于所取境决印持由此異緣不能引轉故猶豫境勝解全無非决心亦無勝解由斯勝解非遍行攝初正釋次轉釋三簡非勝解以印持為性印持由于教理之境證據之力而後成也故猶豫境勝解全無豈不由于决定之境乎非决心亦無勝解豈不由于决定之心乎由斯非遍行攝者由此心境不遍故也噫邪教不必遇不幸而遇幸而能擇設不能擇决印持九十六種外道等自茲始矣正教必期遇幸而得遇必期于會設而證會决印持百千萬種似法等不能轉矣不可不解不可不勝不可不正于勝二破異有說心等取自境時無拘礙故皆有勝解彼說非理所以者何能不礙者即諸法故所不礙者即心等故勝發起者根作意故若由此故彼勝發起此應復待餘便有無窮失究失以窮其執也初敘執二破執異執心等取自境時無拘礙故皆有勝解原勝解由有于無拘礙也而取無拘礙以有勝解則無拘礙處乃所以為勝解抑所以為遍行執意如此故破云彼說非理何者能不礙者即諸法故諸法非勝解所不礙者即心等故心等非勝解勝增上緣發起心等是根及作意故根意非勝解如是推求勝解安在若謂由此勝解彼根作意方作勝增上緣發起心等者是彼根與作意不能自發待此勝解而發則此勝解亦不能自生復應待餘而生展轉相待失不可勝故曰無窮三念二初正釋二破異初正釋云何為念于曾習境令心明記不忘為性定依為業謂數憶持曾所受境令不忘失能引定故于曾未受體類境中全不起念設曾所受不能明記念亦不生故念必非遍行所攝初正釋次轉釋三簡非體類境者體境謂所受自體之境類境謂所受同類之境又所受自體之類餘文易知問業禪者明記話頭不忘為是念否曰一念萬年能引定矣定生而慧悟近矣所患者甲生乙滅俄至忽遷久常人難得耳故佛誡弟子曰勿忘念二破異有說心起必與念俱能為後時憶念因故彼說非理勿于後時有癡信等前亦有故前心心所或想𫝑力足為後時憶念因故初敘執次破執誤解後時憶念之因定執心起必與念俱不知其所執之非理也何者例而觀之可知矣若謂後時憶念以前必有念而為因勿後有癡信等亦必以前有癡信等而為因耶此既不爾彼云何然寧知後時憶念因者或前心心所想取境界分齊𫝑力足為何以念為四定二初正釋二破異初正釋云何為定于所觀境令心專注不散為性智依為業謂觀得失俱非境中由定令心專注不散依斯便有决擇智生心專注言顯所欲住即便能住非唯一境不爾見道歷觀諸諦前後境別應無等持若不繫心專注境位便無定起故非遍行初正釋體用次轉釋體用三簡非遍行得失俱非者如理曰得不如理曰失非如非不如曰俱非境𨿽無量不出此三觀此三中專注不散是定體依定發慧曰定用恐謂專注者專注一境而不遷移更不許諸境矣不知專注之言是顯此心所欲住境此定令心即便能住非唯一境也不然見道位中歷觀上下苦等四諦前後境別而不定一既非專注一境此位應無等持乎故專注言非唯一境若不繫心等者反顯非遍行之故也問邪定等無論矣歷觀諸境云何專注曰前不云乎隨所欲住即便能住正歷觀中而隨注也不然雲興百問瓶瀉千酬問答之境蓋不知幾許矣將非定耶二破異二初破非遍行二破非即心初破非遍行有說爾時亦有定起但相微隱應說誠言若定能令心等和合同趣一境故是遍行理亦不然是觸用故若謂此定令剎那頃心不易緣故遍行攝亦不應理一剎那心自于所緣無易義故若言由定心取所緣故遍行攝彼亦非理作意令心取所緣故初敘執遍行次破非遍行執云爾時亦有定起但相微隱者謂不繫心專注之時亦有定起但定相微而不著隱而不顯非若繫心專注者之顯著豈全無耶不必繫心而有定是遍行矣破云此虛妄無義之語也應說誠諦有理之言何則逆汝所計之意將無謂亦有定起者定能令心和合同趣一境故是遍行耶不知若然者理亦不然以此是觸業用非定心故又將無謂此定令剎那頃心不易緣故是遍行耶不知若云云者亦不應理以一剎那心為時極促自于所緣無有變易何必待定然後無變易乎又將無謂由于定心取所緣境故是遍行耶不知若云云者彼亦非理取所緣者是作意故非是定心既皆非定而謂此是遍行豈誠言耶不應說也明矣二破非即心有說此定體即是心經說為心學心一境性故彼非誠證依定攝心令心一境說彼言故根力覺支道支等攝如念慧等非即心故初敘執即心次破執即心執者意謂定體即是心非別有體以經說三學定為心學故又說此定為心一境性故破云依定攝心故說心學之言全心一境故說心一境性之言非謂定體即心作此言也若比量之則定非即心根力覺道諸品攝故如念慧等念慧各有體念慧不即心定是別有體定豈即是心耶五慧二初正釋二破異初正釋云何為慧于所觀境簡擇為性斷疑為業謂觀得失俱非境中由慧推求得决定故于非觀境愚昧心中無簡擇故非遍行攝初正釋體用次轉釋體用三簡非慧性推求釋簡擇謂于三境中推窮求何者為正何者非正正與非正必求其所以然也决定釋斷疑始之猶豫者今已决定而無疑矣非觀境謂非所觀之境愚昧心謂非能觀之心無簡擇故釋非遍行之由也二破異有說爾時亦有慧起但相微隱大受寧知對法說為大地法故諸部對法展轉相違汝等如何執為定量唯觸等五經說遍行說十非經不應固執初敘異執次破異執爾時亦有等者謂非觀境愚昧心時亦有慧起但慧相隱微而不顯著如纖毫之物為大器所受大器寧知是有耶然非竟無特隱微而似無耳所以然者對法論中說為大地法故大地即遍地證慧是遍行攝也然對法通于小大此意取小乘為說破云汝引對法為證而對法且自展轉相違何可為證况觸等遍行是經說欲等遍行非經說何可固執展轉相違者論遍行自簡去欲等論別境自簡去遍行又觸等欲等以地論之俱遍一切地以遍行論之別境止遍于二餘二不遍何得攝于遍行中耶三總結然欲等五非觸等故定非遍行如信貪等量云欲等是有法定非遍行為宗因云非觸等故同喻如信貪等信貪非遍行因非觸等故信貪非觸等既非遍行攝別境非觸等別境豈遍行二現起分位二初明定俱二明不俱初明定俱有義此五定互相資隨起一時必有餘四欲顯不定為正先明定俱以形之也隨一起時必有餘四正互相資所以互相資者以此五行相無相違故然一往觀之似是細玩下文此說未盡二明不定二初總明不定二別申正義初總明不定有義不定瑜伽說此四一切中無後二故又說此五緣四境生所緣能緣非定俱故此正義也不定者不俱起也無後二故非定俱故證不定也以既無後二非一切時非八識俱豈得定俱起耶既定不俱則所緣四緣不定俱起能緣五位不恆相應豈得定俱起耶又起一至四名不俱起五名俱二別申正義二初明起位二明不起初明起位五初起一二起二三起三四起四五起五初起一應說此五或時起一謂于所樂唯起希望或于决定唯起印解或于曾習唯起憶念或于所觀唯起專注謂愚昧類為止散心𨿽專注所緣而不能簡擇世共知彼有定無慧彼加行位少有聞思故說等持緣所觀境或依多分故說是言如戲忘天專注一境起貪瞋等有定無慧諸如是等其類實繁或于所觀唯起簡擇謂不專注馳散推求專注所緣而不能簡擇釋有定無慧之故也彼加行位少有聞思等者通妨難也恐有難云既愚昧不能揀擇云何乃說緣所觀耶故通云彼愚昧者𨿽有定無慧然于加行位中少有聞思之慧故說等持緣所觀境耳又恐難云既言少有聞思亦可兼慧何云所觀唯定故通云又或依多分不依少分故說有定無慧如戲忘天有定無慧等類既繁豈不足證耶謂不專注馳散推求者正釋唯簡擇也二起二或時起二謂于所樂决定境中起欲勝解或于所樂曾習境中起欲及念如是乃至于所觀境起定及慧合有十二或時起二者起十個二也謂于所樂决定起欲勝解所樂曾習起欲及念所樂所觀起欲及定所樂所觀起欲及慧决定曾習起勝解念决定所觀起勝解定决定所觀起勝解慧曾習所觀起念及定曾習所觀起念及慧所觀境中雙起定慧境唯有四相躡而成以所樂决定曾習三境俱重合所觀一境為十重起此十個二也三起三或時起三謂于所樂决定曾習起欲解念如是乃至于曾所觀起念定慧合有十三或時起三者起十個三也謂于所樂决定曾習起欲解念所樂决定所觀起欲解定所樂决定所觀起欲解慧所樂曾習所觀起欲念定所樂曾習所觀起欲念慧或于所樂所觀起欲定慧或于决定曾習所觀起解念定或于决定曾習所觀起解念慧或于决定所觀起解定慧或于曾習所觀起念定慧境亦唯四相躡而疊合之為十起十個三也四起四或時起四謂于所樂决定曾習所觀境中起前四種如是乃至于定曾習所觀境中起後四種合有五四起四者起五個四也謂于所樂决定曾習所觀四境起欲解念定于所樂决定曾習所觀四境起欲解念慧于所樂决定所觀三境起欲解定慧于所樂曾習所觀三境起欲念定慧于决定曾習所觀三境起解念定慧境亦唯四躡疊共成五重每重起四曰五個四也五起五或時起五謂于所樂决定曾習所觀境中俱起五種如是于四起欲等五總別合有三十一句起五者于四境中一時具起五心所也如是于四起欲等五總別合有三十一句者總結句數也謂具起五種總為一句別者起一有五句起二有十句起三亦十句起四有五句故合之為三十有一句然五種皆曰或時是不遍一切時也二明不起或有心位五皆不起如非四境率爾墮心及藏識俱此類非一有心位皆當起曰不起者有三義故一無四境時不起無境則心不生故二率爾墮心不起無分別故三與藏識俱不起不遍心故釋現起分位竟三餘門分別三初諸識相應門二諸受俱起門三結例餘諸門初諸識相應門二初前三識二後五識初前三識第七八識此別境五隨位有無如前已說第六意識諸位容俱已轉未轉皆不故如前已說者七未轉位唯有一慧第八全無若已轉皆具五種第六意識已轉未轉皆容俱起故二後五識有義五識此五皆無緣已得境無希望故不能决無印持故恆取新境無追憶故自性散動無專注故不能推度無簡擇故有義五識容有此五𨿽無于境增上希望而有微劣樂境義故於境𨿽無增上决而有微劣印境義故𨿽無明記曾習境體而有微劣念境類故𨿽不作意繫念一境而有微劣專注義故等引故說性散動非等持故容有定𨿽于所緣不能推度而有微劣簡擇義故由此聖教說眼耳通是眼耳識相應智性餘三准此有慧無失未自在位此五或無得自在時此五定有樂觀諸境欲無減故印持勝解常無減故憶習曾受念無減故又佛五識緣三世故如來無有不定心故五識皆有作事智故初明五無五所次明五有五所三明未轉或無已轉定有等引不等持者通難問也恐問云論說五識自性散動何得有定通云等引故說性散動非等持故容有定以三摩鉢提此云等持唯局有心而通散心三摩呬多此云等引通于有心及與無心謂離沉掉名等生功德名引論明有心無心引生功德之定故說自性散動非有心散心之定作如是言故知五識容有定俱又等引是出定入定等持是住定入出則散動不容在定則現量容有眼耳二通是眼耳相應智性正顯前五亦有慧故未自在位此五或無非定無也已自在位此五定有非容有也以樂觀四諦諸境欲不減故印持勝解一多相融常無減故憶習曾受久歷法門念無減故行住坐卧皆是那伽無不定故成諸一切所作之事智無減故佛之五識緣三世故未轉𨿽具微劣而不顯勝今則最為顯著增勝無加矣二諸受俱起門此別境五何受相應有義欲三除憂苦受以彼二境非所樂故餘四通四唯除苦受以决等五識無故有義一切五受相應論說憂根于無上法思慕愁戚求欲證故純受苦處希求解脫意有苦根前已說故論說貪愛憂苦相應此貪愛俱必有欲故苦根既有意識相應决等四苦俱何又五識俱亦有微細印境等四義如前說由斯欲等五受相應初初師之解二次師之解欲三除憂苦受者謂欲一心所與三受俱除憂苦二受以憂苦境非所樂故餘解念定慧四所通餘四受唯除苦受以决等五識無故前五識是苦受識識既不與四心所相應苦受亦不與四心所相應也此師之解未盡次師云欲等五所五受相應前師云欲不與憂苦相應今通云論說憂根于無上法思慕愁戚求欲證故純受苦處希求解脫豈非欲與憂苦相應耶前師云四法不與苦受相應今通云意有苦根前已說故豈非四法與苦受相應耶且證之于論則說貪愛憂苦相應此貪愛俱必有欲故豈非欲與苦憂相應耶前執苦根無决等今通云苦根既與同時意識相應意又相應决等四故苦與四相應何過耶况前五𨿽無增上四法亦有微細印境等四何得言無由斯五所五受相應此師義正于前三結例餘諸門此五復依性界學等諸門分別如理應思性謂善等三性界謂欲等三界學謂學無學等此五既通初二一切則三性三界皆通又第六意識轉與未轉皆具五所則知學無學等所應有也明矣諸門分別如理應思者見如是等類其例頗繁言未必盡當以理思信官劉錫玄許𮗚吉信士許士翀顧紹芬顧同德捐資共刻賢預姑蘇信女張門李氏大緣𦔳板
