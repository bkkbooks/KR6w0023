body:
  text: 古杭雲棲寺弟子廣伸述三旁論餘受二初總徴二別釋初總徴此染汙意何受相應前頌𨿽無受文亦可餘等二字含之以識必有受况與八互俱自可以意得故不言耳今正釋頌完理應補出對頌有文此無名旁非不之說及邉旁之旁也二別釋二初歷舉偏執二詳明正義初歷舉偏執有義此俱唯有喜受恆內執我生喜受故有義不然應許喜受乃至有頂違聖言故應說此意四受相應謂生惡趣憂受相應緣不善業所引果故生人欲天初二靜慮喜受相應緣有喜地善業果故第三靜慮樂受相應緣有樂地善業果故第四靜慮乃至有頂捨受相應緣唯捨地善業果故此二初義固僻次義亦偏以初據執我生受唯有喜受不知七遍三界喜亦應遍然而聖說喜受但通二禪其何能遍違于聖言耶次以隨七所緣界地界報不同之故四受皆具比前執唯喜受似覺𡩖通不知因識有受受當隨識既通諸受與六何殊是故先以偏義陳于前次以正義列于後使偏因正以愈明正以偏而更顯也二詳明正義有義彼說亦不應理此無始來任運一類緣內執我恆無轉易與變異受不相應故又此末那與前藏識義有異者皆別說之若四受俱亦應別說既不別說定與彼同故此相應唯有捨受未轉依位與前所說心所相應已轉依位唯二十一心所俱起謂遍行別境各五善十一如第八識已轉依位唯捨受俱任運轉故恆于所緣平等轉故初斥非顯正次約轉顯同以憂喜樂三名變異受七無轉易變異何從七八受別義應別開別說既無受自無別况未轉之心所𨿽別已轉之心所是同平等轉故已轉之受固同任運轉故未轉之受又同通變異受豈得為是故曰亦不應理以同第八捨受為應理也又任運簡隨緣一類顯無記內執簡非外平等轉于所緣十種真如之境平等轉也六釋性攝二初未轉依二已轉依初未轉依二初問答二釋成初問答末那心所何性所攝有覆無記所攝非餘問謂八種王所通有四性賴耶無覆無記攝矣末那王所何性攝耶舉頌答云有覆無記一性所攝非餘三性二釋成此意相應四煩𢚰等是染法故障礙聖道隱蔽自心說名有覆非善不善故名無記如上二界諸煩𢚰等定力攝藏是無記攝此俱染法所依細故任運轉故亦無記攝初正釋所攝次通妨所攝釋云何故說名有覆無記耶以此相應十八心所是染法故礙聖道隱蔽自心說名有覆非善不善故名無記耳難云根隨煩𢚰通于二性何唯有覆無記攝耶引例通云如色無色界諸煩𢚰等豈不通于二性定力攝伏藏覆而不顯現是無記攝此俱染法𨿽通二性以所依識極微細故無強計度任運轉故能依染法攝藏于所故亦無記二已轉依若已轉依唯是善性七釋界繫二初未轉依二已轉依初未轉依二初問答二釋成初問答末那心所何地繫耶隨彼所生彼地所繫繫繫屬繫繫縛問謂三界計九地末那王所于九地中何地繫耶舉頌答云隨彼所生彼地所繫繫隨于所生地能定為之繫耶彼含三義不必定指如下所釋然若欲以上彼指八下彼指界亦可也二釋成謂生欲界現行末那相應心所即欲界繫乃至有頂應知亦然任運恆緣自地藏識執為內我非他地故若起彼地異熟藏識現在前者名生彼地染汙末那緣彼執我即繫屬彼名彼所繫或為彼地諸煩𢚰等之所繫縛名彼所繫初明彼地繫次明異熟繫三明煩𢚰繫上謂隨彼所生彼地所繫者其義有三一謂生欲界現行末那即欲界繫由此乃至有頂四空應知亦色界繫亦四空繫也所以然者任運恆緣所生自地藏識執為內我非他地故此以彼地所繫為所生所繫也二者若于此地乃起彼地酬先引業異熟藏識現在前者名生彼地染汙末那緣彼執我即繫屬彼異熟藏識名彼所繫此以繫于異熟為所生所繫也三者或為彼地煩𢚰所繫謂生欲界現行末那相應心所即為欲界煩𢚰等之所繫縛乃至有頂亦然名彼所繫此以煩𢚰所繫名所生所繫也二已轉依若已轉依即非所繫非上界識惑三所繫也八釋位捨二初問答二別釋初問答此染汙意無始相續何位永斷或暫斷耶阿羅漢滅定出世道無有二別釋二初明無染二明有淨初明無染二初略明伏斷二詳明伏斷初略明伏斷阿羅漢者總顯三乘無學果位此位染意種及現行俱永斷滅故說無有學位滅定出世道中俱暫伏滅故說無有無學果位曰三乘者聲聞利鈍及大乘八地也染意種現俱斷名阿羅漢無有也三乘學位及滅盡定出世道中染意種現暫伏名無有也略明無有不同如此二詳明伏斷二初明有學暫伏二明無學永斷初明有學暫伏謂染汙意無始時來微細一類任運而轉諸有漏道不能伏滅二乘聖道有伏滅義真無我解違我執故後得無漏現在前時是彼等流亦違此意真無我解及後所得俱無漏故名出世道滅定既是聖道等流極寂靜故此亦非有由未永斷此種子故從滅盡定聖道起已此復現行乃至未滅詳有學染意之所以暫伏也初至名出世道明出世道無有也次至此亦非有明滅盡定無有也三至乃至未滅明有學現行正顯二位暫伏而未斷也不能伏滅者四禪八定但能伏六識中染七之染汙微細粗不違細故也真無我解根本智也後得無漏後得智也是彼等流者後得是本智源處所流流與源同也聖道等流者定慧係道品所攝故也極寂靜者此定逺于煩𢚰故也此亦非有者染意亦伏而不起也此復現行者在定但伏現行出定則煩𢚰現行復從種起也二明無學永斷二初正釋二通妨初正釋然此染意相應煩𢚰是俱生故非見所斷是染汙故非非所斷極微細故所有種子與有頂地下下煩𢚰一時頓斷𫝑力等故金剛喻定現在前時頓斷此種成阿羅漢故無學位永不復起詳無學染意之所以永斷也地曰有頂無色四空天也煩𢚰曰下下第六識內思惑第八十一品也𫝑力等故者出染意種子與下下同斷之故也定喻金剛堅利智慧能壞一切義也現在前時有三謂二乘那含後心大乘菩七地後心及十地後心也二通妨二乘無學𢌞趣大乘從初發心至未成佛𨿽實是菩亦名阿羅漢應義等故不別說之詳不言二乘趣大永害染意之故也謂有問言二乘無學永害染意已如上明更有二乘已證無學𢌞趣大乘從初發心至未成佛中間實是菩何不言之將非略或更別有㫖耶故云𨿽是菩亦名羅漢以應供殺賊無生之義相等故不別說非有他也二明有淨二初敘執無淨二辨明有淨初敘執無淨此中有義末那唯有煩𢚰障俱聖教皆言三位無故又說四惑恆相應故又說為識雜染依故安慧師無淨第七之執也唯有煩𢚰障俱正是偏執聖教等引偏解以證其執也然據對法中說三位皆無皆無染意不說無淨顯說四惑相應說染相應不說無淨攝論亦但說為識雜染依不說無淨依是則教非偏說彼皆偏解故執但有染意無淨意耳二辨明有淨三初略明二詳明三結定初略明有義彼說教理相違出世末那經說有故無染意識如有染時定有俱生不共依故此下皆護法正意今先略明有淨七也經說有故釋違教定有俱生不共依故釋違理無染意識者淨第六識也不共依者第七意根也第六有染定有第七染意為根第六無染如有染時定有無染第七淨意為根彼執無淨豈不理教相違二詳明二初詳違教二詳違理初詳違教論說藏識决定恆與一識俱轉所謂末那意識起時則二俱轉所謂意識及與末那若五識中隨起一識則三俱轉乃至或時頓起五識則七俱轉若住滅定無第七識爾時藏識應無識俱便非恆定一識俱轉住聖道時若無第七爾時藏識應一識俱如何可言若起意識爾時藏識定二俱轉顯論說末那恆與四煩𢚰相應或彼相應恃舉為行或平等行故知此意通染不染若由論說阿羅漢位無染意故便無第七應由論說阿羅漢位捨藏識故便無第八彼既不爾此云何然又諸論言轉第七識得平等智彼如餘智定有所依相應淨識此識無者彼智應無非離所依有能依故不可說彼依六轉識許佛恆行如鏡智故歷引聖教詳辨執無淨意之相違也初辨違瑜伽次辨違顯三辨違本論四辨違諸論違瑜伽中初至則七俱轉引論文也次至定二俱轉顯違論也應一識俱者以住聖道時必以意識作無漏觀故違顯中初至或平等行引論文也故知此意通染不染顯違論也恆與四煩𢚰相應是有覆染末那然或彼相應中我慢恃舉為行是染末那或平等行豈非淨末那耶故知此意通染不染非止染也違本論中初至便無第七躡彼執頌言也次至此云何然即論頌以反質其執也違諸論中轉第七識得平等智此諸論之言也順而明之則彼能依平等性智如餘成所作等三智定有所依相應五六第八淨識反而難之則此淨識無者彼平智應無非離所依有能依故必不可也若汝轉計彼平等智依六轉識則又不可何者以許佛恆行平等性智如鏡智故無有間斷若依六轉間斷之識能依平等性智亦間斷矣豈所許恆行如鏡智無間之謂乎是則悖瑜伽俱轉之說逆顯相通之滯本頌言中之意乖諸論依許之談我故曰違教二詳違理又無學位若無第七識彼第八識應無俱有依然必有此依如餘識性故又如未證補特伽羅無我者彼我執恆行亦應未證法無我者法我執恆行此識若無彼依何識非依第八彼無慧故由此應信二乘聖道滅定無學此識恆行彼未證得法無我故又諸論中以五同法證有第七為第六依聖道起時及無學位若無第七為第六依所立宗因便俱有失或應五識亦有無依五恆有依六亦應爾歷顯正理詳辨執無淨意之相違也初顯無學第八必有淨七為俱有依理次顯三位法執必有淨七為所知依理三顯三位第六必有淨七為俱生依理初俱有依中先反明次正明合而量之無學第八有俱有依是識性故如餘眼識等眼根眼識性眼有眼根依意根第八性八有意根依二所知依中先舉人我恆行既有煩𢚰第七為所依次例法我恆行必有所知第七為所依且我見屬慧八既無慧捨七其誰應信三位尚居法執必是此識為彼所依三俱生依中五同法者如眼識依眼根根識名同法耳等皆然抑以前五為第六同法喻也證有依者眼等既以五根為依證第六必以第七為依所立宗因便俱有失者第六是有法定有俱生不共所依為宗因云極成六識隨一攝故同喻如眼識等若無第七則所立宗上有能別不極成之失所立因上犯共不定之失或應五識亦無有依今五同法既恆有依六亦應爾豈無依耶是則執無淨七不惟乖無學第八之依三位法執之依亦乖三位第六之依而有宗因俱失之我故曰違理三結定二初决有淨七二通釋差別初决有淨七是故定有無染汙意于上三位恆起現前言彼無有者依染意說如說四位無阿賴耶非無第八此亦應爾定有恆起决三位有淨七也依說如說原所說以例明其說也二通釋差別二初總標二別釋初總標此意差別略有三種一補特伽羅我見相應二法我見相應三平等性智相應上已結有淨七此復明差別者以識有染淨我法之分位有大小淺深之別識不離位淺深自辨位不離識染淨攸分况有我必全有法有法未必全我性攝生攝不同何能不辨故又通釋之也二別釋二初釋相應二釋我法初釋相應初通一切異生相續二乘有學七地以前一類菩有漏心位彼緣阿賴耶識起補特伽羅我見次通一切異生聲聞獨覺相續一切菩法空智果不現前位彼緣異熟識起法我見後通一切如來相續菩見道及修道中法空智果現在前位彼緣無垢異熟識等起平等性智釋相應之分劑也初釋我見相應次釋法我見相應後釋平等性智相應補特伽羅云數取趣數數起惑造業取諸趣輪𢌞也此我見末那𨿽通異生等然于一切異生相續恆起以純有漏心故于二乘有學七地已前有間而起以于無漏心位不起有漏心位起故法我見末那𨿽亦通一切于異生聲聞獨覺相續恆起以未證法無我故於一切法空智果菩有間而起以法空智果現在前位則不現起不現前位彼緣異熟識起法我見故平等性智相應末那𨿽通一切于如來相續恆起以永斷二障究竟二空故于菩見修二位有間而起以于此位法空智果不現前位則不現起若現前位彼緣無垢異熟起平等性智故然曰無垢者平智起時暫能恆思量無我相故曰異熟者尚在因位故三種均名相應分劑不同有如此者二釋我法二初明我法二唯明法初明我法補特伽羅我見起位彼法我見亦必現前我執必依法執而起如夜迷杌等方謂人等故我法二見用𨿽有別而不相違同依一慧如眼識等體𨿽是一而有了別青等多用不相違故此亦應然明我法體同我起法必起也初我必依法次用別體同承上初通一切等起我見矣為復止起我見為復法亦起耶故云補特伽羅起位彼法我見亦必現前以我必依法如迷杌方謂人故倘謂我法既然用別俱起恐致相違不知用𨿽有別而不相違以同依一慧為體由慧而後起見生執故也如眼識體一有了別青黃等用之別乃至身識體同有了別冷暖等用之別彼既用不違體此亦應然何違之有故知初通云云者獨就我見為通耳二唯明法二初唯明法二判所攝初唯明法二乘有學聖道滅定現在前時頓悟菩于修道位有學漸悟生空智果現在前時皆唯起法執我執已伏故二乘無學及此漸悟法空智果不現前時亦唯起法執我執已斷故八地以上一切菩所有我執皆永不行或已永斷或永伏故法空智果不現前時猶起法執不相違故如有經說八地以上一切煩𢚰不復現行唯有所依所知障在此所知障是現非種不爾煩𢚰亦應在故明我既伏斷起唯法執起也初約我執伏位以明法執次約我執斷位以明法執三約菩我執永伏斷位以明法執四引經證成簡定法執承上次通一切等起法我見矣為復唯起法我為復我亦起耶故云二乘有學等唯起法執二乘無學等亦唯起法執八地已上等猶起法執云云也初約我執伏位以明法執中通有三類一二乘于有學位聖道滅定現在前時唯起法執二頓悟菩從初地至十地修道位中唯起法執三漸悟菩于初地至七地有學位中生空智果現在前時唯起法執故云皆唯起法執我執已伏故次約我執斷位以明法執中意謂不但二乘有學等為然二乘無學亦然及此𢌞心向大漸悟菩法空智果不現前時亦然故云亦唯起法執我執已斷故三約菩伏斷位以明法執中八地以上一切菩者謂第八地已上所有頓漸𢌞心等一切也皆永不行者我執永不現行也或已永斷或永伏故出不行之由也永斷即𢌞心向大菩永伏即頓漸二類菩伏斷攸分皆曰永者生空智果純無漏故法空智果不現前時猶起法執則現前之時可知此間起也不相違故原猶起也謂生空智果與彼法執不相違礙故得起也取而證之如經說八地以上一切煩𢚰不復現行唯有所依所知障在此經文也即而辨之此所知障是現非種若謂是種煩𢚰種在亦應言在何得言唯故知唯所知障者唯有現行所知障也又煩𢚰種在者以八地𨿽不執賴耶為我猶有異熟微細我執故也二判所攝法執俱意于二乘等𨿽名不染于諸菩亦名為染障彼智故由此亦名有覆無記于二乘等說名無覆不障彼智故是異熟生攝從異熟識恆時生故名異熟生非異熟果此名通故如增上緣餘不攝者皆入此攝于法執俱意判定生性所攝使無所濫也然于二乘名無覆以二乘志在生空此意不障生空智故于大乘名有覆以大乘志在二空此意障彼法空智故是則第七名有覆無記者我執俱意于二乘名有覆法執俱意于大乘名有覆耳寧知大乘有覆乃小乘之無覆小乘無覆正大乘之有覆耶性攝誠不可以不辨也法執俱意是異熟生以從異熟識恆時生故非異熟果以真異熟果所不攝故取而例之異熟生名可通攝故如增上緣餘不攝者皆入此攝良以增上緣𨿽唯六根其餘三緣所不攝者皆增上攝此名𨿽唯前六識中無記名生然真異熟果所不攝者皆異熟生攝是則所生所繫一隨第八有似于果而竟非果又誠不可不辨也上釋頌文已竟二引證二初問二答初問云何應知此第七識離眼等識有別自體大乘論第七離眼等別有自體小乘執現在名識過去名意未來名心則意但是第六過去非別有體故以云何應知為問答知本于教理證離眼等別有以破小乘之執也二答二初總標二別釋初總標聖教正理為定量故二別釋二初引教證二顯理證初引教證謂薄伽梵處處經中說心意識三種別義集起名心思量名意了別名識是三別義如是三義𨿽通八識而隨勝顯第八名心集諸法種起諸法故第七名意緣藏識等恆思量為我等故餘六名識于六別境粗動間斷了別轉故如入楞伽伽他中說藏識說名心思量性名意能了諸境相是說名為識又大乘經處處別說有第七識故此別有諸大乘經是至教量前已廣說故不重成解脫經中亦別說有此第七識如彼頌言染汙意恆時諸惑俱生滅若解脫諸惑非曾非當有彼經自釋此頌義言有染汙意從無始來與四煩𢚰恆俱生滅謂我見我愛及我慢我癡對治道生斷煩𢚰已此意從彼便得解脫爾時此意相應煩𢚰非唯現無亦無現在過去未來無自性故如是等教諸部皆有恐厭廣文故不繁述歷引諸教證第七離眼等識別有自體也初引大別義二釋大別義三證大別義四總證大義五引小乘義六統結證意承上教為定量果何所謂謂薄伽梵處處經中說三別義集起名心思量名意了別名識等云云也如是三義統用通義釋之積集解心八皆名心積熏至于輳集諸種子故等無間緣解意八