平二智相應心品非長非夜如餘識俱貪等亦長亦夜即第七無明是則此無明者不獨勝于餘識之癡兼亦勝于此識俱三則不獨對餘癡可名不共對俱三亦應名不共矣何以難為二廣釋不共無明總有二種一恆行不共餘識所無二獨行不共此識非有故瑜伽說無明有二若貪等俱者名相應無明非貪等俱者名獨行無明是主獨行唯見所斷如契經說諸聖有學不共無明已永斷故不造新業非主獨行亦修所斷忿等皆通見所斷故恆行不共餘部所無獨行不共此彼俱有廣釋以詳不共之差別也初標不共二釋不共三證獨行四釋獨行五判有無然撮其大要是分不共之有恆獨恆是此識有而獨非此識有矣證相應以異獨行獨非此識有而相應自非此識有也而復辨獨行于主非則是主非主皆非此識之所有也以獨與不共等名言𨿽同義不同也且恆則唯見于大乘獨則俱通于小大差別如此誠不可以不辨故廣釋之統括大意如此詳之有漏心位常起無間曰恆行不與餘識間斷者俱曰不共唯此識有曰餘識所無也不與忿等相應而起不與餘九同時而起獨迷諦理曰獨行不共唯餘識有曰此識非有也相應無明者彼自釋云非無愚癡而起諸惑是故貪等餘惑相應所有無明名相應無明獨行者彼云若無貪等諸煩𢚰纏但于苦等諸諦境中由不如理作意力故鈍慧士夫補特伽羅諸不如實揀擇覆障纏褁暗昧等心所性名獨行無明是主者彼云不與忿等小十俱者名為是主何以故忿等十法自類不俱各自為主此之無明既不與各自為主者俱獨自行時自便為主故曰是主此屬分別故在見道一時頓斷契經證之可知非主獨行者與忿等俱名為非主由忿等各自為主自無主故此屬俱生通見修二斷以隨忿等通見所斷故故結云恆行不共餘部所無獨行不共彼此皆有餘部所無唯大乘宗中有也此彼俱有者大小乘宗俱有也亦可依俱舍則見四諦及修所斷名五部恆行不共唯修所斷曰餘部所無獨行不共五部皆通曰彼此俱有也顯示正理六科初恆行無明竟二為緣生識四初引經證成二引例正釋三破轉救四申量結明初引經證成又契經說眼色為緣生于眼識廣說乃至意法為緣生于意識若無此識彼意非有引經顯六識皆依根塵二緣而生若無第七根緣第六意識唯一法緣必不生也二引例正釋謂如五識必有眼等增上不共俱有所依意識既是六識中攝理應許有如是所依此識若無彼依寧有以理例第六必有第七為俱有依也謂如五識是六識中攝必有眼等五根為增上不共所依意識既是六識中攝理應許有第七為增上不共所依此七若無彼六之依寧有三破轉救不可說色為彼所依意非色故意識應無隨念計度二分別故亦不可說五識無有俱有所依彼與五根俱時而轉如芽影故又識與根既必同境如心心所决定俱時救以窮其說情盡而理顯也色為彼所依者小乘救云我宗取肉團心為第六所依何要別執第七論主破云肉團心是色不可說彼依蓋第六必依意意非是色故第六若依色無二分別故色不可以為依也明矣五識無有俱有所依者小乘復救云我宗五識根先識後故即前滅意識發後念意識無別第七為俱有依也論主破云先後則不俱彼根識俱轉如芽依種起影藉形生又如心與心所取境既同理必同時五識之有俱有依也又明矣即此以證第六豈無俱有依耶俱有依不無是無第七識耶四申量結明由此理趣極成意識如眼等識必有不共顯自名處等無間不攝增上生所依極成六識隨一攝故顯自名處者眼根是眼識自名處乃至意根是意識自名處依眼之識名為眼識乃至依意之識名為意識是顯自名處也等無間不攝者小乘以第六前滅意為根生後念意識是等無間所攝不攝是簡內六處非前滅意之所收攝也增上生所依者謂內六根是識之增上生緣識所依也隨一攝者各隨一根攝也意謂由前正釋及破等種種理趣則極成意識如眼等識必有不共顯自名處之第七意根汝之等無間不攝是增上生所依極成六種識各隨增上生所依一根攝也量之則意識是有法必有不共顯自名處乃至增上生所依為宗因云極成六識隨一攝故同喻如眼等識三得思量名四初引經證成二以理正釋三破轉救四結有原名初引經證成又契經說思量名意若無此識彼應非有經說思量名意是第七識小乘執第六等無間意是思量意故反證以成有第七云若無此第七識彼思量名應當非有二以理正釋謂若意識現在前時等無間意已滅非有過去未來理非有故彼思量用定不得成既爾如何說名為意以名理釋有第七識也前云若無第七彼思量名應非有者果何所謂謂若第六意識現在前時汝所執第六前念能引後念等無間意已滅滅屬過去理應非有思體尚無用從何得既無思量經說思量名意將如何耶故知執等無間為意根必無思量之名而違教用第七識為意根始有思量之名而順經第七豈能無耶三破轉救若謂假說理亦不然無正思量假依何立若謂現在曾有思量爾時名識寧說為意初破假無依次破名無意恐轉救云已滅非有思用不成難違經名此以實說為難耳不知思量名意者但是假說非實有體破云若謂假說理亦不然以假依實立無正思量為所依假依何法而立假亦不可得矣恐又救云意識現在曾有思量今𨿽已滅得名為意何須別執第七為思量意耶故即彼宗破云爾宗于一意識過去名意現在名識爾現在時意識𨿽有思量應名為識不名為意現在安得過去之名耶故云寧說為意四結有原名故知別有第七末那恆思量正名為意已滅依此假立意名由正釋之理甚明救之義愈顯故知第六外別有末那恆思量初無間斷者名意非以第六滅意為意也諸識前已滅念等無間意皆依恆第七假立意名耳又意取第七心王自體思量名意𨿽心所之思亦在恐犯八識皆有遍行思所故又思量為性相者見分是思量相內分是思量性以內二證見分緣境故亦名思量但見分思量我是非量自證是現量非二量攝以見分妄執故非量自證證見分妄執故體是現量攝也又擴充之則二乘無學思量法我名意佛思無我亦名為意特染淨之不同耳四無心定別四初引經證成二正釋無別三破轉救四結有末那初引經證成又契經說無想滅定染意若無彼應無別二正釋無別謂彼二定俱滅六識及彼心所體數無異若無染意于二定中一有一無彼二何別體謂六識心王數謂相應心所無異者二定之所滅第六同也其不同者無想有染意滅定無染意一分之不同耳若無染意于二定中一有一無彼二果何所差別耶三破轉救若謂加行界地依等有差別者理亦不然彼差別因由此有故此若無者彼因亦無推差別因之所由有破定不關意之救也初救二破加行加功用行所謂作意界地三界九地謂所居地依即所依謂定起處等等自體及假立自體定各自體假立各立假名此五是二定差別之因詳如攝論彼差別因由此有者由有此第七而有也謂若以出離想作意為先令不恆行心心所滅想滅為首立無想名此定唯屬第四靜慮若止息想作意為先令不恆行及恆行染汙心心所滅立滅盡名此名𨿽屬有頂而無漏攝此加行地界差別也所依別者滅定是佛弟子說力起故無想是外道說力起故自體假名可知矣此五差別皆因意有意若無者彼差別因亦無矣然則總括大意則無想與滅定是果差別加行及依等是因差別救謂果別由于因別何關第七破謂因別更由于因正謂第七故反决破云此第七若無彼別因亦無別果從何而有耶遡流窮源更有其源思之哉四結有末那是故定應別有此意五無想天染四初引經證成二正釋其義三展轉救四結有染七初引經證成又契經說無想有情一期生中心心所滅若無此識彼應無染生之始終曰一期心心所滅第六王所伏而不行非斷滅也此指第七彼謂無想染謂我執若無等者汝執但有第六無有第七若無第七彼無想有情既已第六心心所滅應當無染而無想但名善定不是無染依然我執者何耶二正釋其義謂彼長時無六轉識若無此意我執便無非于餘處有具縛者一期生中都無我執彼無我執應如𣵀槃便非聖賢同所訶厭初决我明染釋有第七次引訶證染釋有第七染即我執我即具縛非于餘處有具縛者决我染必有于無想此意處也故云若無此識彼應無染斷我生滅名曰𣵀槃是則清淨為諸聖所讃今無想有情六識伏而不行似乎無我殊非無我彼果無我應如𣵀槃便非聖賢同所訶厭矣同訶正以我執我執故名染汙染汙正是此識故云若無此識彼應無染三展轉救初後有故無如是失中間長時無故有過去來有故無如是失彼非現常無故有過所得無故能得亦無不相應法前已破藏識無故熏習亦無餘法受熏已辨非理此中救首尾六假解中自悉故不科題小乘救云汝難若無此識我執便無有如是失不知無想天中六識王所初半劫滅後半劫生初後皆有六識故有我執無如是失何要別執有第七耶論主破云若謂初後皆有六識而起我執無如是過者不知中間四百九十九劫六識王所皆滅是誰執我豈非有過復轉救云過去未來皆有六識故有我執無如是失不必第七論主復破云過去非常未來非現又既非現在定非常法已屬無體焉能執我豈非有過𨿽然此皆隨救隨破耳以理論之若無第七過不止此將見所得無想異熟果報亦無所得無故能得無想有情亦無無想屬不相應行非是實有前已破若無第七又不止此將見藏識亦無藏識無故誰為受熏染淨熏習亦無藏識之外餘法受熏已辨非理則一切因果皆悉無矣第七豈能無耶問無第七識所得能得何為便無曰由有情于無想定前求無想果所熏成種招彼異熟染汙末那緣彼執我依之粗動想等不行于此分位中假立無想報若無此識彼不應有既無所得異熟亦無能得有情也藏識無故等者謂由第七我見愛等執藏以為自內我故攝藏一切雜染品法因斯以立阿賴耶名無此執藏彼識非有既無藏識染淨諸法熏習亦無餘法不能受熏故也四結有染七故應別有染汙末那于無想天恆起我執由斯賢聖同訶厭彼染七曰別有不可止坐于第六中也我執曰恆起不可是前後去來起也由斯異生凡定後報盡已復沉生更起煩𢚰是故聖賢同訶斥之使知非所當讃同厭惡之使知非所當欣也六三性時染三初引經證成二詳釋其義三結有染識初引經證成又契經說異生善染無記心時恆𭘧我執若無此識彼不應有二詳釋其義二初約取相釋二約有漏釋初約取相釋謂異生類三性心時𨿽外起諸業而內恆執我由執我故令六識中所起施等不能亡相故瑜伽說染汙末那為識依止彼未滅時相了別縛不得解脫末那滅已相縛解脫言相縛者謂于境相不能了逹如幻事等由斯見分相分所拘不得自在故名相縛依如是義有伽他言如是染汙意是識之所依此意未滅時識縛終不脫約取相徴釋有第七也初正明取相二引論證成三釋明所引四重引證成不能亡相是謂相縛然見分為境相之所纏縛者由七恆執我為依止能令六識見分于所緣境不能了逹如夢如幻事等執之為實為真相見所拘不得自在故名相縛初徴于瑜伽再證于伽他相縛由于末那豈非若無此識彼不應有也耶問恆我是第七不能亡相是第六𭘧我而亦言恆者何曰六比第七俱生我執𨿽有間斷而更多分別除無心悶絶等則三性互為起伏彼所謂我或𭘧于善或𭘧于惡二心才伏更𭘧于無記以其所起施等𨿽名為善不精純不清淨有所夾雜曰𭘧而𭘧隨于心常不相離自相續中謂六之恆𭘧所以恆𭘧者則由七之俱生恆我為源頭為依止為使令耳二約有漏釋二初破執情二釋正義初破執情四初正破斥二破隨眠三破漏種四破染引初正破斥又善無覆無記心時若無我執應非有漏自相續中六識煩𢚰與彼善等不俱起故去來緣縛理非有故非由他惑成有漏故勿由他解成無漏故從此至染引歷破有漏執情顯有第七識也初標有第七次釋其所以承前不但三性心時若無第七應非取相又善無覆無記心時若無第七我執應非有漏何者六識俱生現行煩𢚰自相續中與彼善無記心此現彼伏不俱起故不熏有漏不俱即屬去來去則已滅來猶未生體不可得而為緣縛理非有故非由去來他惑而令善等成有漏故勿由去來他解而令善等成無漏故成善成染皆由第七執我不執我而成也問何謂自相續曰如眼識後念續于前念名自眼識相續乃至第六等名自意等相續自相續中煩𢚰者惑不離心也但此自且屬第六下自身之自即屬第七二破隨眠又不可說別有隨眠是不相應現相續起由斯善等成有漏法彼非實有已極成故別有隨眠者計別有一法名曰隨眠異心心所是不相應行蘊所攝由斯善等成有漏法者執隨眠于善等時現相續起能熏善等成有漏不知隨眠既非實有不是能熏有漏豈由此成故破云又不可說非實如上二卷中破三破漏種亦不可說從有漏種生彼善等故成有漏彼種先無因可成有漏故非由漏種彼成有漏勿學無漏心亦成有漏故初推破轉救次例破轉計從有漏種生彼善等故成有漏轉救也亦不可說破轉救也彼種先無因可成有漏故推破亦不可說之由非由漏種彼成有漏牒轉計也勿學無漏心亦成有漏故例破轉計也先無因可成有漏者漏種必由第七執我與善等俱而後成既無第七執我與第六善等俱彼漏種先無因矣漏種不成善等漏現曷從乎來而曰從有漏種生成有漏耶非由漏種彼現行成有漏者是現不由種成矣不由種成難道有學位中學無漏心自有漏種起亦成有漏故然彼不成有漏法種自相續中不與漏俱故也彼既不爾此云何然可例知矣四破染引𨿽由煩𢚰引施等業而不俱起故非有漏正因以有漏言表漏俱故又無記業非煩𢚰引彼復如何得成有漏恐又計云善等心時𨿽非惑俱然由此前煩𢚰所引故施等成有漏法此不逹有漏名言而以增上為正因也破云𨿽由煩𢚰引施等業善業起時煩𢚰已滅不俱起故非有漏正因以有漏言表與有漏種子俱生故又無記業是隨先業所引不待現緣非煩𢚰引彼復如何得成有漏是則引之為義于善心為非因于無記為更非無記非染引得成有漏善等有漏豈煩𢚰引可例知矣二釋正義二初正釋二通妨初正釋然諸有漏由與自身現行煩𢚰俱生俱滅互相增益方成有漏由此熏成有漏法種後時現起有漏義成異生既然有學亦爾上破有漏非他惑非隨眠非業引成矣然諸施等有漏由何成耶故云第六識中所起施等由與自身第七相應現行四種煩𢚰俱生俱滅遞相增益更互而資為正因緣方成有漏耳由此現行煩𢚰熏成有漏種子後時種子復生現行有漏義成異生有學楷定俱生有漏分位以起下文無學之疑也至若自身簡他惑現行簡隨種俱生簡不俱在文可見二通妨無學有漏𨿽非漏俱而從先時有漏種起故成有漏于理無違恐有難云無學已斷我執既非漏俱云何亦有貪瞋等如身子難陀習氣諸漏起耶通云𨿽非自身現行煩𢚰互相增益而成然從先時熏成有漏種起于理無違𨿽然自相續中非漏俱故終不復熏成有漏法種三結有染識由有末那恆起我執令善等法有漏義成此意若無彼定非有故知別有此第七識此結三性時染也上示正理第二科竟三總結勸信證有此識理趣甚多隨攝大乘略述六種諸有智者應隨信學然有經中說六識者應知彼是隨轉理門或隨所依六根說六而識類別實有八種初總結勸信次决疑令信六種即上所引攝大乘之六種也隨轉理門等者或隨宜轉變權巧之理門而說六或隨所依之六根而說六耳非經常一定之理門而說六也據實而論乃有八種非止六也第八詳在前卷第七如今所明實是起凡聖之因立解惑之本將施妙藥預候病源欲出塵勞先安地斯為要矣豈可忽耶斯為矣豈可緩耶故密嚴經云末那緣藏識如磁石吸鐵如有兩頭各別為其業染業亦如是執取阿賴耶能為我事業增長于我所復與意識俱為因而轉謝于身生暖觸運動作諸業飲食與衣裳隨物而受用騰躍或歌舞種種自嬉遊持諸有情身皆由意功力如火輪垂髮乾闥婆之城不了唯自心妄起諸分別身相器世間如動鞦韆𫝑無力不堅固分別亦復然分別無所依但行于自境譬如鏡中像識種動而見愚夫此迷惑非諸明智者仁主應當知此三皆識現于斯逺離處即是圓真實此偈不明第八亦不全明故録之以備觀覽三前六識二初性相二現起初性相三初心王二心所三即離初心王二初本論二論釋初本論如是已說第二能變第三能變其相云何頌曰次第三能變差別有六種了境為性相善不善俱非二論釋三初釋初二句二釋第三句三釋第四句初釋初二句二初總標二別釋初總標論曰次中思量能變識後應辨了境能變識相此識差別總有六種隨六根境種類異故二別釋三初隨根立名二隨境立名三釋所依緣初隨根立名謂名眼識乃至意識隨根立名具五義故五謂依發屬𦔳如根𨿽六識身皆依意轉然隨不共立意識名如五識身無相濫過或唯依意故名意識辨識得名心意非例釋名隨根立以別隨境復通妨以簡濫也初正釋次通妨前云隨根境種類異故何謂隨根謂名眼識等云云也五義者謂依眼之識依眼等處俱有根而得住故根所發識眼根等所引發故眼若變異識亦變異如迦末羅病損眼根于青色等見為黃故屬根之識識之種子隨逐于根而得生故𦔳根之識由根合識有所領受根有損益故如根之識俱有情數之所攝故故曰隨根立名然恐難云六識皆依意轉悉應名意何唯第六獨名意識耶通云𨿽六轉識皆依意轉然前五以意為共依第六以意為不共依今隨不共立意識名如五識依五色根各隨不共立名而無相濫之過或唯依意故名意識不同前五兼依色故不名意識耳辨識得名心意非例者恐有難云隨根立名依意名意識者謂心依意意依心七八二識亦應隨根互立名耶通云辨識得名故隨根立非辨心意不應為例問根具何義體用如何復有差別否耶曰根者主義生義殊勝及增上義異熟長養之辨浮塵勝義之殊過去惑業招感曰異熟現在飲食滋培曰長養四塵為體浮顯于外𨿽無照用可為勝義之依如所謂眼如葡萄朵耳如卷樺皮等浮塵是也淨色為體勝妙于內既有照用可為生識之依亦如所謂卷樺皮雙垂爪等者勝義是也如俱舍云眼根極微在眼星上傍布而住清徹膜覆如頗迦胝不相障礙耳根極微在耳穴內旋環而住如卷樺皮鼻根極微居鼻額內背上面下如雙爪甲舌根極微布在舌上形如半月身根極微遍住身分如身形量據此則皆如卷樺皮雙垂爪等之象特浮塵粗顯不但可對亦且可見勝義則寓于浮塵不囿于浮塵清淨微妙如彼醍醐但可對而不可見耳二隨境立名或名色識乃至法識隨境立名順識義故謂于六境了別名識色等五識唯了色等法識通能了一切法或能了別法獨得法識名故六識名無相濫失此後隨境立六識名依五色根未自在說若得自在諸根互用一根發識緣一切境但可隨根無相濫失莊嚴論說如來五根一一皆于五境轉者且依粗顯同類境說佛地經說成所作智决擇有情心行差別起三業化作四記等若不遍緣無此能故釋名隨境立復簡濫通妨盡其致也初正釋次簡濫三簡異四通妨正釋者正釋隨境立名也謂于六境了別名識今了別色故名色識乃至了別法故名法識也簡濫者簡去立名相濫之失也五識唯了色等故名色識乃至觸識意識通了一切法能了差別法故名法識何濫之有簡異者根自在位與未自在不同簡別其立名亦應不同然而但可隨能發之根以立則眼根發者仍名眼識乃至意根發者仍名意識所以無相濫之失也通妨者妨難云根自在位若緣一切境何莊嚴論說如來五根一一皆于五境轉耶通云且依粗顯同類境說非究竟說也何不觀于佛地經乎成所作智决擇有情心行差別起身口意三業之化作未發適發冥為無生等四種之記豈非五識遍緣一切若不遍緣無此能故問三業更有差別否曰身現神通受生業果三化口則慶慰方便辨物三語意則决擇造作發起領受四意更有一向分別反詰捨置四記詳如雜心三釋所依緣然六轉識所依所緣粗顯極成故此不說前隨義便已說所依此所緣境義便當說釋依緣顯本頌微顯闡幽意也恐有難云前第八頌云不可知執受處了第七頌云依彼轉緣彼皆說依緣此六轉頌中何不說依緣耶故云然六轉識所依者六根所緣者六境粗顯易知不必頌也而前論中隨根義便已通說心三所依下文境便亦當解說有所緣義頌不說而論釋非相違也隨便故耳二釋第三句次言了境為性相者雙顯六識自性行相識以了境為自性故即復用彼為行相故由斯兼釋所立別名能了別境名為識故如契經說眼識云何謂依眼根了別諸色廣說乃至意識云何謂依意根了別諸法彼經且說不共所依未轉依位見分所了餘所依了如前已說釋三能變自性行相復引證而簡別之也初正釋次引證正釋有三一以了境釋自性謂六種識各有自證分體性能了境故說了境為識自性二以了境釋行相謂六種識各有見分為自性行行能了境復說了境為行相三以了境兼釋別名以心意識之名各別集起名心思量名意別說了境名為識故如契經至了別諸法證了別也彼經且說等依眼根了別色乃至依意根了別法彼經且約未自在位依根發識見分所了之境有差別耳若已轉依位一根作諸根一識了諸境如前已說不可局于此文三釋第四句二初問答二釋成初問答此六轉識何性攝耶謂善不善俱非性攝二釋成二初明三性相應攝二明三性俱不俱初明三性相應攝俱非者謂無記非善不善故名俱非能為此世他世順益故名為善人天樂果𨿽于此世能為順益非于他世故不名善能為此世他世違損故名不善惡趣苦果𨿽于此世能為違損非于他世故非不善于善不善益損義中不可記別故名無記此六轉識若與信等十一相應是善性攝與無慚等十法相應不善性攝俱不相應無記性攝釋頌中三性攝也初釋俱非次釋三性三釋性攝順益違損非于他世者苦樂之果隨于善惡之業果轉于業業有盡故果亦有盡能為他世者善惡之性不同于業𨿽惡終有盡不易盡故善性竟無盡故與無慚等十法相應者中隨無慚無愧小除諂誑憍三加根本之瞋是名十法以根本餘五小隨餘三大隨之八皆通二性故不言也又此善性于十三善中今當第一自性善其第二相應善謂彼相應法三隨逐善謂即彼諸法習氣至十三等流善反此十三不善及十三無記詳載瑜伽二明三性俱不俱二初明不俱二明容俱初明不俱有義六識三性不俱同外門轉互相違故五識必由意識導引俱生同境成善染故若許五識三性俱行意識爾時應通三性便違正理故定不俱瑜伽等說藏識一時與轉識相應三性俱起者彼依多念如說一心非一生滅無相違過先明不俱形後文俱義之為正也初正釋不俱次釋論通妨不俱者一念之時三性不俱起也同外門轉正俱起也互相違故出不俱之故也惡與善悖善時不是惡時無記雙非善惡無記之時又豈善惡之時更互相違三性故不俱時而起也必由意識引導者見五識三性不能自起也俱生同境成善染故者出必由導引之故也謂五與意俱生五與意同境五由意成善染故五必由意導引而後起也既五必由五俱意識導引若許五識三性俱行則俱行之時正五俱意識之時意識爾時應通三性便與一念不容三性之正理違矣故定不俱恐有難云瑜伽等說藏識一時與轉識相應三性俱起而今言不俱豈不相違故通云彼瑜伽依多念相續起說如說一心非一生滅今依一念豈容俱起故不相違此師之論如此一往觀之似是及對下文方知非正問同外門轉者同是俱義轉是起義上不俱已如前釋著外門二字果何謂耶曰此有三意一五識同向外門二意對前五似內同時意識同五外門三顯俱意必約外門二明容俱四初正釋二引正三通妨四結判初正釋有義六識三性容俱率爾等流眼等五識或多或少容俱起故五識與意𨿽定俱生而善性等不必同故前所設難于此唐捐此至末節釋引通妨判定其容俱也今正釋中分三假初標容俱次釋容俱三前難率爾等流眼等五識容俱起故釋五識三性容俱五識與意𨿽定俱生而善性等不必同故釋六識與五生必定俱性不必俱而容俱自在矣率爾心者聞法創初遇境即起此屬無記等流心者念念緣境先後齊等此通善染多少云或者不定義多或四五俱起少則二三識起也容俱起者率爾等流容俱起故謂五識緣境或遇五境齊現眼起率爾耳起等流餘起不善耳起善等斯即五識三性容俱義若夫意識𨿽與五定俱生而善等性則不必定同是以六識三性容俱起然則前難五識三性俱行意識爾時應通三性便違正理于此豈非徒設二引證故瑜伽說若遇聲緣從定起者與定相應意識俱轉餘耳識生非唯彼定相應意識能取此聲若不爾者于此音聲不領受故不應出定非取聲時即便出定領受聲已若有希望後時方出在定耳識率爾聞聲理應非善未轉依者率爾墮心定無記故由此誠證五俱意識非定與五善等性同諸處但言五俱意識亦緣五境不說同性引論以證不必同也初引論文次釋論義三結不同論文至餘耳識生謂從定起者是與定相應善意識俱轉之餘耳識生順證二識必俱而後定能起也非謂彼定相應意識能取此聲若不爾者于此音聲不領受故不應出定反證意耳必俱而後定應出也非取聲時即便出定領受聲已若有希望後時方出復證出定耳識不能無意識也從而釋之在定耳識率爾聞聲理應非善未轉依者率爾墮心定無記故從而斷之無記耳識既與定相應善意識俱轉由此誠證五俱意識非定與五善等性同况諸處但言五俱意識亦緣同境不說同性尤足為徴何必同三通妨雜集論說等引位中五識無者依多分說梵語三摩呬多此云等引定之出入也梵語三摩地此云等持定之正住也蓋定有初入中住後出三時故以等持名住以等引名出入也今難謂雜集說等引位中無五識此云何言與定相應意識俱轉餘耳識生能聞聲耶通云彼依在定多分而說無五識此約出定少時而言餘耳生等也故彼此文不相違反四結判若五識中三性俱轉意隨偏注與彼性同無偏注者便無記性故六轉識三性容俱得自在位唯善性攝佛色心等道諦攝故已永滅除戲論種故上證五識與意定俱生而性不必同然則亦有同時否耶故云若五識中三性俱轉意隨偏注等云云也隨偏注者如眼專注于善則意隨其專注而亦成善餘識偏注于不善則意識亦成不善等是知五識三性𨿽俱意隨偏注而自成一故六轉識三性容俱𨿽然此皆約未自在位而說得自在位唯善性攝何者佛色心等道諦攝故無有不善永絶戲論種故無有無記上釋心王竟二心所二初略釋六位二廣顯差別初略釋六位二初本論二論釋初本論六識與幾心所相應頌曰此心所遍行別境善煩𢚰隨煩𢚰不定三受共相應二論釋二初釋前三句二釋第四句初釋前三句二初總標二別釋初總標論曰此六轉識總與六位心所相應謂遍行等此約第三能變而言總與分之如八識頌所明二別釋二初釋心所得名二明六位類別初釋心所得名恆依心起與心相應繫屬于心故名心所如屬我物立我所名心于所緣唯取總相心所於彼亦取別相𦔳成心事得心所名如畫師資作模填彩故瑜伽說識能了別事之總相作意了此所未了相即諸心所取所別相觸能了此可意等相受能了此攝受等相想能了此言說因相思能了此正因等相故作意等名心所法此表心所亦緣總相餘處復說欲亦能了可樂事相勝解亦了决定事相念亦能了串習事相定慧亦了得失等相由此于境起善染等諸心所法皆于所緣兼取別相初釋心所通名次釋心所行相三證遍行行相四證別境行相五例四位行相五十一位通名心所者謂恆依心王而起恆與心王相應恆繫屬于心王故名心所如屬我物立我所名非王依所起王與所應王繫于所也別其行相則心王與所緣唯取總相不取別相如畫師但作于模心所與彼不但取總亦取別相如資更填于彩𦔳成心王未了之事得心所名也證之于瑜伽而王所之總別可知遍行行相可知證之于餘處而別境行相可知善等四位皆可例知也問何論取總別相曰如緣青色心王唯取大略名總心所分別青之微細曰別問作意了此所未了相者謂了此心王所未了相下文即接心所取所別相者何曰此有二意一心王未了者即是諸心所取所別相二作意明利能了此衆多未了之相舉一雙該行文最妙問可意云等攝受云等正因云等言說云因者何曰可意即順境不可意即違境等即俱相違境攝受謂順益不攝受即非順益等亦俱相違言說因者由想安立種種分齊而後能起言說故正因等者即境上正邪等相是思之因故此表心所亦緣總相者釋諸句此字謂此𨿽指王而王但緣總故表之也問瑜伽以作意為先此論以觸為先云何不同曰瑜伽以作意令心心所取境功能最勝故先此論以觸能令根境識三和合一處引生心所功能最勝故先義各有取也實則左右先鋒難兄難弟二明六位類別𨿽諸心所名義無異而有六位種類差別謂遍行有五別境亦五善有十一煩𢚰有六隨煩𢚰有二十不定有四如是六位合五十一一切心中定可得故緣別別境而得生故唯善心中可得生故性是根本煩𢚰攝故唯是煩𢚰等流性故于善染等皆不定故然瑜伽論合六為五煩𢚰隨煩𢚰俱是染故復以四一切辨五差別謂一切性及地時俱五中遍行具四一切別境唯有初二一切善唯有一謂一切地染四皆無不定唯一謂一切性由此五位種類差別標列類數釋義以證差別也初標位列數次釋位別義三引證差別四一切者一切性至一切俱也一切性者善惡無記三性一切地者初雜居地至第九非非想地一切時者過現未三時一切俱者與八種識相應共俱遍行具四者以三性九地諸時八識皆共有故別境唯二者唯通三性遍九地故善唯一者謂一切地以一切地俱通善故染四皆無者三性中唯不善故不通一切性于上八地伏不起故不通一切地有間斷故不通一切時于八識中不俱有故不通一切識不定唯一者謂一切性謂于善染等性皆不定故問前五與意名為六轉前五亦與六位皆相應耶曰五識相應止三十四謂遍行別境善十一中二大八貪嗔癡其餘互違頌約三能變故言𨿽是總其意則別二釋第四句二初釋三受義二明俱不俱初釋三受義二初總明三受二別明差別初總明三受此六轉識易脫不定故皆容與三受相應皆領順違非二相故領順境相適悅身心說名樂受領違境相逼迫身心說名苦受領中容境相于身于心非逼非悅名不苦樂受初標三受相應之故次釋三受不同之義易脫者間斷轉變義不定者欣戚捨行互起義領三境由于皆容三受容三受由于易脫不定二別明差別四初明分二二明分三三明分四四明分五初明分二如是三受或各分二五識相應說名身受別依身故意識相應說名心受唯依心故又三皆通有漏無漏苦受亦由無漏起故于總三受分二種三受也身心名二漏無漏二皆有苦樂捨三是各分二也別依身故者五識別依五根五根依于一身出五識相應說名身受之故也唯依心故者意識唯依意根意根亦是心分出意識相應說名心受之故也亦由無漏起者恐有難云漏應具三受無漏應無苦不知證無漏時自無于苦始修無漏歷艱辛苦况是苦由無漏而起故無漏亦攝苦受不觀雪山穿少室齊腰于未悟未證之先乎二明分三或各分三謂見所斷修所斷非所斷又學無學非二為三于總三受分三種三受也如見所斷苦修所斷苦非所斷苦樂捨亦然有學樂無學樂非二樂苦捨亦然名各分三也非所斷者非見道所斷非修道所斷約法以明則一切有學出世間法一切無學相續法中所有諸法若出世法於一切時自性淨故名非所斷餘世間法由已斷故名非所斷見修所斷可知矣非二者亦約法明非學非無學法謂除先所說學無學法所餘預流乃至阿羅漢若墮一切異生相續若彼增長所有諸法即資糧加行位也當知是名非學非無學法而學無學可知矣三明分四或總分四謂善不善有覆無覆二無記受有義三受容各分四五識俱起任運貪癡純苦趣中任運煩𢚰不發業者是無記故彼皆容與苦根相應瑜伽論說若任運生一切煩𢚰皆于三受現行可得若通一切識身者遍與一切根相應不通一切識身者意地一切根相應雜集論說若欲界繫任運煩𢚰發惡行者亦是不善所餘皆是有覆無記故知三受各容有四于總三受總各分四歷證而結明之也初總分四受次各分四受三引論證成四結各分四總分四者謂樂受即善苦受即不善不苦不樂即二無記謂無覆不苦不樂受有覆不苦不樂受也各分四者謂善心相應三受不善心相應三受有覆無記三受無覆無記三受也何名無記三受如五識俱起任運貪癡純苦趣中任運煩𢚰不發業者是有覆無記故彼皆容與苦根相應則樂捨可知矣證于瑜伽任運一切煩𢚰豈非有覆無記乎皆于三受現行可得非無記之三受乎但此煩𢚰通前七一切識者遍于諸識三受根相應不通一切識身者唯于意地三受根相應耳證于集論若欲界繫任運煩𢚰發惡行者亦是不善所餘欲界繫不發惡者及上二界任運煩𢚰皆有覆無記所攝則不獨無記通三受之可徴而不善通于三受亦可徴也既通染二善淨可知是以結云故知三受各容有四四明分五二初明五受二釋相應初明五受或總分五謂苦樂憂喜捨三中苦樂各分二者逼悅身心相各異故由無分別有分別故尤重輕微有差別故不苦不樂不分二者非逼非悅相無異故無分別故平等轉故初列五受名次分苦樂義三捨不分義逼悅身心相各異故者逼身是苦相逼心是憂相悅身是樂相悅心是喜相苦樂無分別是尤重故憂喜有分別是輕微故由此相別故各分二非逼非悅相無異故者非逼故于身心無苦憂之異非悅故于身心無喜樂之異純無分別無有輕重平等一味轉故是以不分二釋相應二初適悅相應二逼迫相應初適悅相應諸適悅受五識相應恆名為樂意識相應若在欲界初二靜慮近分名喜但悅心故若在初二靜慮根本名樂名喜悅身心故若在第三靜慮近分根本名樂安靜尤重無分別故此六轉識適悅相應之不同也謂五識相應恆名為樂意識相應喜與喜樂及樂三種差別故也初二第三靜慮者初禪二禪三禪天也近分根本者居此欣彼身𨿽未至不相懸隔曰近分已至彼地對此近分曰根本也安靜尤重無分別者謂修第三禪時厭離二禪之喜是浮動是輕微是有分別故是以不但根本之已至名樂𨿽近分之未至亦名為樂以皆安