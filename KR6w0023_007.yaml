body:
  text: 古杭雲棲寺弟子廣伸述五不定位二初本論二論釋初本論已說二十隨煩𢚰相不定有四其相云何頌曰不定謂悔眠伺二各二二論釋二初正釋頌文二餘門分攝初正釋頌文三初通釋等四名二別釋等四相三詳釋二各二言初通釋等四名論曰悔眠伺于善染等皆不定故非如觸等定遍心故非如欲等定遍地故立不定名釋四名不定之由也初約善染釋二例遍別釋謂信等定善不染忿等定染非善此四于善不唯于善于染不唯于染既皆不定故名不定觸等定遍一切心欲等定遍一切地此異彼遍心地故名不定問四通三性豈非定遍一切性耶曰此所謂善染皆不定也正名不定二別釋等四相二初釋悔眠二釋伺初釋悔眠二初正釋相二辨分位初正釋相悔謂惡作惡所作業追悔為性障止為業此即于果假立因名先惡所作業後方追悔故悔先不作亦惡作攝如追悔言我先不作如是事業是我惡作悔謂惡作立悔名也惡所作業釋悔義也追悔為性釋惡作體也障止為業悔必具掉舉也此指悔為惡作于果假立因名者悔是果惡作是因悔謂惡作此即于果假立因名也先惡所作業後方追悔故出假立之故也此悔已作通于三性悔先不作亦惡作攝者明悔未作亦通三性如追悔等指明未作也問悔己作惡是善悔己作善是惡悔未作善是善悔未作惡是惡悔何謂無記悔曰悔時歷歷者曰善惡昏住者曰無記對境起心一加察焉自可驗知又悔作無記業亦無記攝眠謂睡眠令身不自在昧略為性障觀為業謂睡眠位身不自在心極暗劣一門轉故昧簡在定略別窹時合顯睡眠非無體用有無心位假立此名如餘蓋纏心相應故初正釋體用次轉釋體用三簡顯體用四釋通妨難五例明有體極暗釋昧極劣釋略一門轉總其暗劣謂止運轉于睡眠位獨頭夢意識之一門中也亦可極暗劣釋昧一門轉釋略簡在定者非如定時之惺惺別窹時者殊異覺時之廣緣合顯睡眠非無體用有無心位假立此名者恐難彼極重睡眠曰無心則無心名睡眠今名睡眠豈不同彼而曰有體者何耶故通云有無心位假立此名此名𨿽同于彼所以立者不同于彼也非醒覺明了之有心位非極重睡眠之無心位齊此有無之間以假立是有昧略為體之睡眠名睡眠非同無心之睡眠也若對後文亦可云以此齊此故假立此名耳餘蓋纏者謂貪欲瞋恚惛沉掉舉惡作五蓋如瑜伽無慚無愧睡眠惛掉惡作嫉妬慳吝忿覆十纏如俱舍如𨿽是例亦可作量喻有體用謂睡眠非無體用心相應故如餘蓋纏二辨分位四初第一師二第二師三第三師四第四師初第一師有義此二唯癡為體說隨煩𢚰及癡分故初釋唯癡為體次引瑜伽為證然而其失有二何者唯癡為體是自無有體矣說隨煩𢚰是唯染不通善等矣二第二師有義不然亦通善故應說此二染癡為體淨即無癡論依染分說隨煩𢚰及癡分攝染癡為體淨即無癡者染二癡為體淨二無癡為體也論依染分說隨煩𢚰及癡分攝者則知若依淨分說之不同可知不察說由于依但引其說是論本不局于染引者自局于染耳然通善差勝于前為體殊未中的下文自顯三第三師有義此說亦不應理無記非癡無癡性故應說惡作思慧為體明了思擇所作業故睡眠合用思想為體思想種種夢境相故論俱說為世俗有故彼染汙者是癡等流如不信等說為癡分無記非癡無癡性故者不惟原不應理之所由亦且顯唯通于善之為局矣意以此通無記不惟善染以無記悔眠非癡無癡二所攝故但以思慧思想為此二體引論俱說為假有者證為他分攝也是癡等流等者量通引論染汙悔眠說為癡分是癡等流如不信等四第四師有義彼說理亦不然非思慧想纏彼性故應說此二各別有體與餘心所行相別故隨癡相說名世俗有此正意也非思慧想纏彼性故原理亦不然也纏彼性纏即彼性以五蓋十纏皆有眠悔眠悔之性是纏縛纏繞豈思慧想之謂纏耶應說惡作追悔為體睡眠昧略為體此二各別有體與餘五位心所行相別故然既有自體論說為假有者以隨癡相說名世俗有耳不原其說但局于說則此二竟無自體豈理也哉二釋伺謂求令心匆遽于意言境粗轉為性伺謂伺察令心匆遽于意言境細轉為性此二俱以安不安住身心分位所依為業並用思慧一分為體于意言境不深推度及深推度義類別故若離思慧伺二種體類差別不可得故初正釋體用次推窮分位匆忙義遽義意言境意識取境多依名言于意言境者伺唯意識俱也粗細者粗粗踈細細密凡意言境皆有粗細求于境之粗相曰粗轉分別于境之細相曰細轉如五蘊論釋云云粗者謂求瓶衣車乘等粗相伺云細者謂于瓶衣等分別細相成不成等差別義故是也此二俱以安不安住身心分位所依為業者意謂身心安住依于之粗轉而安身心不安亦依之粗轉不安身心安住依于伺之細轉而安身心不安亦依于伺之細轉不安也並用思慧一分為體者言之所以為粗轉者固用思慧一分為體伺之所以為細轉者亦用思慧一分為體也不深推度及深推度義類別故者瑜伽云謂不深推度所緣思為體性若深推度所緣慧為體性若離思慧等反顯不可離也是則用思徐緩而安思量性故用慧疾不安簡擇性故思慧並用于伺一隨其主𦔳先後之分而身心安否適係之耳問不深推曰思宜于之粗轉深推度曰慧宜于伺之細轉而以思慧為體伺亦思慧為體者何耶曰瑜伽云謂求伺謂伺察或思或慧于境推求粗位名即此二種于境察細位名伺則知粗位思慧為體細位思慧為體粗位推度有淺深細位推度亦淺深耳若依通照釋有兼正若正用思則慧隨思能令心安若正用慧則徐思隨慧亦令不安是其並用也三詳釋二各二言三初第一師二第二師三第三師初第一師二各二者有義伺各有染淨二類差別意以伺名二此二各有染淨二類名二各二既失于二復失于各二下文自顯二第二師有義此釋不應正理悔眠亦有染淨二故應說如前諸染心所有是煩𢚰隨煩𢚰性此二各有不善無記或復各有纏及隨眠此師亦以伺為二也初斥前非理二舉例正釋非理者若以伺名二各有染淨名各二則悔眠亦有染淨遺彼而取此故非理也意謂不當取淨應說例如前者諸染心所有煩𢚰隨煩𢚰二性此伺二各有不善有覆無記二類或復各有現行纏隨眠種之二類名二各二也此解𨿽斥初師之非然竟例根隨為二是一個二非頌文二各二之兩個二也是以無論其各二之非即二字之致亦遺一重矣然亦可此二即根隨之二有善及無記等名二各二以例伺亦具善及無記也三第三師有義彼釋亦不應理不定四後有此言故應言二者顯二種二一謂悔眠二謂伺此二二種種類各別故一二言顯二二種此各有二謂染不染非如善染各唯一故或唯簡染故說此言有亦說為隨煩𢚰故為顯不定義說二各二言故置此言深為有用此正意也初斥前非理次申己正義非理者釋言當問來源二各二言既有于四不定後必有兩二何惟又局伺為二故不應理正義者先開釋二二字各二之義後合釋其說不定屬隨煩𢚰也開釋者二者顯二種二謂悔眠是一種二伺是二種二此二二種悔之與眠種類不同之與伺種類不同故一二言顯二二種豈一二種如汝所謂伺耶各二者此伺悔眠各有二謂染不染反而例之非如信等唯善非如貪等唯染各唯定一也或唯簡染唯是煩𢚰此通不染亦是善攝故言二各二也合釋者瑜伽亦說此四為隨煩𢚰故今此頌中為顯不定屬于隨煩𢚰通染不染故說二二各有二種是則用以具善染即復用以簡唯染深為有用豈汝根隨二等之用而已哉問然則瑜伽有未盡歟曰且據于染適時隨法之說耳二餘門分攝二初正明二結示初正明十二初假實定否門至十二見斷等攝門初假實定否門四中伺定是假有思慧合成聖所說故悔眠有義亦是假有瑜伽說為世俗有故有義此二是實物有唯後二種說假有故世俗有言隨他相說非顯前二定是假有又如內種體𨿽是實而論亦說世俗有故自此至第十二詳所攝以精研其分齊也賴他為體曰假自有本體曰實以此二門攝彼四法則伺定假悔眠不定然論說悔眠為假者隨他相說非顯前二定是假有如內種體𨿽是實而論亦說為假則悔眠有實體也可例知矣二自類相應門四中伺定不相應體類是同粗細異故依于伺有染離染立三地別不依彼種現起有無故無雜亂俱與前二容互相應前二亦有互相應義初約伺相對明不相應次原所立地通其妨難三約伺悔眠容互相應四約悔眠相對亦容並起剎那並起曰相應伺不離思慧曰體同思慧不離推求曰類同伺定不相應者體類是同𭓩若相應粗伺細行相異故一剎那中决無並起之義瑜伽云非一剎那二法相應一類粗細前後異故是也通妨難者恐有難云若在欲界及與初禪唯有伺起不現時豈不濫同二禪無唯伺地耶通云欲明濫否當觀所立觀立當究立依汝謂雜亂是依伺種起現行有現行曰有伺無現行曰無伺等耳不知是依于伺有染離染立三地別謂若伺俱未離染名有有伺地若離伺未離名無唯伺地若伺俱離名無無伺地不依彼種現起有無故無雜亂如瑜伽云此中由離伺欲道理故名無無伺不由不現行故所以者何未離欲界欲者由教導作意差別故于一時間亦有無無伺意現行已離伺欲者亦有伺現行如出彼定及生彼地是也由此觀之若依彼種現起有無者則亦有無無伺者豈欲界之伺地耶亦有伺現行者豈二地已上之無伺地耶灼知以現行為有無則濫依于有染離染而立故無濫耳俱指伺互相應者伺不違于悔眠悔眠並起于伺也前二指悔眠亦有互相應者悔不違眠眠並于悔也三諸識相應門二初第一解二第二解初第一解四皆不與第七八俱義如前說悔眠唯與第六識俱非五法故有義伺亦五識俱論說五識有伺故又說伺即七分別謂有相等雜集復言任運分別謂五識故義如前說謂惡作追悔先業第七任運恆緣現境故無惡作睡眠必依重昧外衆緣力第七一類內執故無睡眠伺俱依外門而轉第七一類執我故無伺惡作等四無記性者有間斷故定非異熟非五法者悔眠非前五相應之法故唯與第六識俱謂有相等者一有相分別謂自性隨念二種分別取過現境種種相故二無相分別謂希求未來境行分別三任運分別謂五識身如所緣相無異分別于自境界任運轉故四求分別謂于諸法觀察求所起分別五伺察分別謂于己所求己所觀察伺察安立所起分別六染汙分別謂于過去顧戀俱行于未來希望俱行于現在執著俱行所有分別若欲分別若恚分別若害分別或隨與一煩𢚰隨煩𢚰所起分別七不染汙分別若善無記謂出離分別無恚分別不害分別或隨與一信等善法相應或威儀路工巧處諸變化所有分別大意總論則四皆不與七八相應別論則悔眠唯與第六相應伺亦與五識相應所以然者證之于論五識有伺故伺即七分別第三任運即五識故也此師之釋如此而伺必非五識正以錯會論文耳下文自詳二第二解有義伺唯意識俱論說求伺察等法皆是意識不共法故又說伺憂喜相應曾不說與苦樂俱故捨受遍故可不待說何緣不說與苦樂俱𨿽初靜慮有意地樂而不離喜總說喜名𨿽純苦處有意地苦而似憂故總說為憂又說伺以名身等義為所緣非五識身以名身等義為境故然說五識有伺者顯多由彼起非說彼相應雜集所言任運分別謂五識者彼與瑜伽所說分別義各有異彼說任運即是五識瑜伽說此是五識俱分別意識相應伺故彼所引為證不成由此五識定無伺初正釋意俱二釋通妨難三約所緣破四通所引文不共法者伺皆是意識不共餘識法也又說憂喜相應意俱可知不說與苦樂俱五不相應可知矣然恐難云伺亦有苦樂受俱但彼略而不言如捨受定有亦不言耳故通云捨受遍故可不待說苦樂不遍何緣不說復恐難云五識有苦樂伺唯憂喜由此伺非五俱者然前云于初靜慮有意地樂純受苦處有意地苦此二處中既有苦樂亦豈無有伺俱耶故又通云𨿽初靜慮有意地樂不離喜故總名為喜不名為樂純苦處中有意地苦似餘憂故總名為憂不名為苦是則伺唯與憂喜相應豈不唯意俱耶不但此也瑜伽又說伺以名身等義為所緣是比量境非五識現量以名身等為所緣則伺非五識俱也明矣然瑜伽說五識有伺非顯伺與五識俱也意顯伺起時多分由彼率爾五識而起故說五識有伺知瑜伽所說之意伺非五識也又明矣又雜集所言任運分別謂五識者彼與瑜伽所說分別義各有異彼雜說任運即是五識以五識身亦有自性分別義故瑜伽說此七種分別是五俱意識相應伺以伺具有七分別故然則五俱意之任運豈雜集所云即五識之任運耶故彼所引為證不成由此五識定無伺結斷伺唯意俱也謂由正釋既明通妨又悉所緣之更論文之意異而五識之伺决無第六之伺斷唯俱矣何以難為四諸受相應門有義惡作憂捨相應唯戚行轉通無記故睡眠喜憂捨受俱起行通歡戚中庸轉故伺憂喜捨樂相應初靜慮中意樂俱故有義此四亦苦受俱純苦趣中意苦俱故初四皆無苦次四皆有苦是非何居曰若論前文意樂總名為喜意苦總名為憂則不獨苦者為非有樂受者亦非矣若據意樂俱故名樂意苦俱故名苦則亦隨義立名而殊不同于五識之苦樂也五別境相應門四皆容與五別境俱行相所緣不相違故行相謂能緣心所所緣謂决定等境不相違正釋俱義問伺與別境俱義可知悔眠何不相違曰眠則日之所為夜之所夢容俱易見悔是戚捨而于欲樂宜乎不順曰不相違者以追悔所惡不逆所好故也然總之四境是四所行處故不相違六信等相應門悔眠但與十善容俱此唯在欲無輕安故伺容與十一善俱初靜慮中輕安俱故悔眠既通三性善性攝者宜有十一但與十善容俱者以悔眠唯在欲界欲無輕安故俱但十耳伺容與十一善俱者以初禪伺有輕安故能全俱也七根惑相應門悔但容與無明相應此行相粗貪等細故睡眠伺十煩𢚰俱此彼展轉不相違故粗細既逆但與無明相應之故也此彼展轉不相違者三心所中亦有俱生分別義故十惑中具昧略細粗展轉通順正三與十之所以應俱也問悔善是癡悔惡豈得為癡悔不行取是貪悔不行殺曰瞋豈止于癡而曰但容與癡俱者厥㫖安在曰此但論根惑如五蓋中曰悔蓋止論悔體不論所悔以障定故也又若論所悔則悔所作善無智屬癡悔所作惡即不屬癡若夫斷未來過惡曰悔此又因義立名名同義不同也八隨惑相應門悔與中大隨惑容俱非忿等十各為主故睡眠伺二十容俱眠等位中皆起彼故此四于二十隨惑中悔于不善攝者容與中大二隨俱非小隨俱以忿等十各別為主不與餘相應故眠及伺與彼二十容俱以此三染位攝者容起彼二十故彼二十中俱有昧略淺深推度義故九三性相攝門此四皆通善等三性于無記業亦追悔故有義初二唯生得善行相粗鄙及昧略故後二亦通加行善攝聞所成等有伺故有義初二亦加行善聞思位中有悔眠故後三皆通染淨無記惡作非染解粗猛故四無記中悔唯中二行相粗猛非定果故眠除第四非定引生異熟生心亦得眠故伺除初彼解微劣不能察名等義故初總判通三次別判通善三判通無記初中于無記業亦追悔故約所悔之業釋通無記之由也次中生得善行者如瑜伽謂即彼諸善法由先串習故感得如是報由此自性即于是處不由思惟任運樂住是也加行善者亦如瑜伽云依止親近善丈夫聽聞正法如理作意修習淨善法隨法行是也蓋生得即俱生善加行即分別善一師以悔眠唯通生得以加行細明了而悔眠粗鄙昧略兩相違故伺兼通生加以聞思修所成善法有伺俱故一師謂悔眠亦通加行以聞思位中容有善悔及眠息故此二師之釋義各有取終以後說為正三中染淨無記者有覆無記曰染無覆無記曰淨眠與伺皆通染淨惡作一種唯通無覆非染無記所以然者悔之行相粗猛彼有覆無記細彼此相違故也四無記者一異熟無記即業所引蘊處界等此唯是染二威儀無記即行住坐卧等此通善染三工巧無記即養生業等此兼通善染四變化無記即三摩地此唯是善悔唯威儀工巧者行相粗猛非定故不通變化非果故不通異熟也眠通三種唯除變化者非定引生故能通異熟者以異熟生心亦得睡眠故尋伺唯除異熟者以異熟心行相微劣不能察名等義故十地繫現緣門惡作睡眠唯欲界有伺在欲及初靜慮餘界地法皆妙靜故悔眠生上必不現起伺上下亦起下上下上伺能緣上下有義悔眠不能緣上行相粗近極昧略故有義此二亦緣上境有邪見者悔修定故夢能普緣所更事故明四法分屬界地現起相緣之不同也初明界繫二明現起三明相緣初中餘界地法謂已上七地所有身心也皆妙靜故唯有在欲之故也悔眠生上必不現起者謂生上地悔眠二法必不現起也伺上下亦起下上者在上地起下地伺在下地起上地伺也下上伺能緣上下者謂下能緣上上亦緣下也悔眠二法一謂悔粗近眠昧略不能緣上一謂此二亦緣上境如欲界修上定者遇邪見人無因果悔修上定故悔緣上如異生從上界沒生人中者夢中普緣所更上界故亦緣上也問第二靜慮已上既無伺何言上下皆相緣耶曰此齊初靜慮以言上下耳曰悔眠唯欲界有又云亦緣上者何耶曰此言緣上不言上有十一學等三攝門悔非無學離欲捨故睡眠伺皆通三種求解脫者有為善法皆名學故學究竟者有為善法皆無學故釋四法于位攝之不同也悔非無學非無學位攝也以悔唯在欲陀洹于不還位離欲界惑捨此悔故睡眠伺皆通三種者以此三原名不定故通學無學非學非無學也此三不離生滅名有為通學無學名善法若有學人求解脫者有為善法皆名學故若無學人學究竟者有為善法皆無學故至若異生無記法學者無記法無學者無記法并無為法是非學非無學法睡眠伺三法一一俱通可知十二見斷等攝門悔眠唯通見修所斷亦邪見等勢力起故非無漏道親所引生故亦非如憂深求解脫故若已斷故名非所斷則無學眠非所斷攝伺𨿽非真無漏道而能引彼從彼引生故通見修非所斷攝有義伺非所斷者于五法中唯分別攝瑜伽說彼是分別故有義此二亦正智攝說正思惟是無漏故彼能令心求等故又說彼是言說因故未究竟位于藥病等未能遍知後得智中為他說法必假伺非如佛地無功用說故此二種亦通無漏𨿽說伺必是分別而不定說唯屬第三後得正智中亦有分別故初以四法與三斷論攝否次以五法與非斷辨所攝初中悔眠唯通二斷伺三斷俱通通二斷者以邪見身見𫝑力引起者唯屬見斷有漏善攝者即修所斷故云邪見等𫝑力引起也然唯通二斷不通非斷者以眠非無漏道所引生故悔非如憂深求解脫故若見修已斷後如身子法華敘昔疑悔尼乾經說羅漢佛亦有眠皆非所斷攝三俱通者以伺𨿽非真無漏而能引彼無漏則能引彼者即修所斷從彼無漏引生之伺即非所斷見斷可知矣五法與非斷辨所攝者有義伺非所斷者于名等五法之中唯第三妄想分別所攝而證之于瑜伽有義亦正智攝以伺由于正思正語由于伺而正思正語皆八正道無漏法故况菩未究竟位所得後得亦是無漏為他說法必假伺則伺豈不通于無漏而瑜伽𨿽說伺必是分別而不定說唯屬第三妄想所以然者後得正智亦有分別故伺二法非所斷者亦通正智為是二結示餘門准上如理應思此十二門外之餘門也如質門相門相應之類准上諸門應如理思自可例知上釋六識相應心所竟三即離三初略申問答二廣難即離三詳申正義初略申問答如是六位諸心所法為離心體有別自性為即是心分位差別設爾何失設爾何失答也意謂設爾即離亦無有失若謂有失失謂之何二廣難即離二俱有過若離心體有別自性如何聖教說唯有識又如何說心逺獨行染淨由心士夫六界莊嚴論說復云何通如彼頌言許心似二現如是似貪等或似于信等無別染善法若即是心分位差別如何聖教說心相應他性相應非自性故又如何說心與心所俱時而起如日與光瑜伽論說復云何通彼說心所非即心故如彼頌言五種性不成分位差過失因緣無別故與聖教相違難心所離心即心之過也離心云何有過百法釋攝論之意謂遊歷六塵曰心逺無別心所曰獨行固不言心所離心瑜伽云四大空識能成有情色動心三最勝所依士夫云作者亦可言有情四大空識即六界色依四大動轉依空心依于識曰最勝所依亦不言心所離心莊嚴論說心似二現非實有情見也似貪似信等無別染善又不言心所離心且諸聖教明明說唯有識染淨由心誠證非一今言心所離心有別自性豈不犯聖教相違過耶即心云何有過瑜伽問云諸法誰相應為何義故建立相應答云他性相應非自性故謂遍了知依自性清淨心有染淨法若增若減是故建立相應此固非言心所即心又說心與所俱時而起如日與光光若即日云何空中更見圓日亦非言心所即心五種性謂五蘊體性不成者既心所即心受想行等俱無自體五何能成分位差過失者又若彼計分位差別故有五性者分位別計亦有過失何以故是諸分位展轉相望作用差別若有若無乃至轉變詳如彼論所破又云又心因緣無差別故行別分位不應道理于一剎那必不可得差別因緣令彼分位而有差別是故汝計分位差別不應道理又聖教言貪瞋癡等𢚰擾其心令不解脫若唯有心二不俱有是即貪等應不依識愈非心所即心種種悖戾豈不大犯聖教相違過耶我故曰二俱有過三詳申正義應說離心有別自性以心勝故說唯識等心所依心𫝑力生故說似彼現非彼即心又識心言亦攝心所恆相應故唯識等言及現似彼皆無有失此依世俗若依勝義心所與心非離非即諸識相望應知亦然是謂大乘真俗妙理初正明有體二通前教意三結示諦理承上離即之說皆違聖教應云何說而後可耶故云應說心所離八心王有別自體依俗諦理當如是也恐難前說唯有識心乃至及現似彼豈不犯即心之失故通云以心勝故依心生故恆相應故等云云也心勝者心能為主心能為依心行相總心恆决定所無四義心勝所劣諸聖教中依心勝故說唯有識心逺獨行染淨由心士夫六界等也又復心所依心𫝑力生故所以莊嚴論說似貪信現非顯貪信即是其心又識心言亦攝心所恆相應故是以唯識等及現似彼皆無即心之失若結而示之然此離心有別自性是依世俗諦理若依勝義諦理心所與心非即非離即諸心王相望亦非即離是謂大乘真俗妙理也王所之相差別曰俗理無別曰真理如後文俗故相有別真故相無別是也今云非即非離則心言路絶故名曰妙上初釋前六性相竟二現起二初本論二論釋初本論已說六識心所相應云何應知現起分位頌曰依止根本識五識隨緣現或俱或不俱如濤波依水意識常現起除生無想天及無心二定睡眠與悶絶二論釋三初正解頌義二問答料簡三釋非一異初正解頌義三初解前四句二解後四句三總為結明初解前四句論曰根本識者阿陀那識染淨諸識生根本故依止者謂前六轉識以根本識為共親依五識者謂前五轉識種類相似故總說之隨緣現言顯非常起緣謂作意根境等緣謂五識身內依本識外隨作意五根境等衆緣和合方得現前由此或俱或不俱起外緣合者有頓漸故如水濤波隨緣多少此等法喻廣說如經初釋初句二釋二句三釋三四句根本指陀那賴耶局染陀那通至佛位故不言賴耶生根本者染淨識生皆以陀那為根本共親依者本現行識六識共增上緣依本種子識六識親因緣依以各別種故不言七者以七緣恆具此正明六識故種類相似者一俱依色根二同緣色境三俱緣現在四俱有間斷五識同具四義故言相似緣謂作意等者即空明根作意四增上緣所緣緣根本緣染淨緣分別緣親因緣共九緣而眼則皆具耳唯除明鼻舌身三通除空明第六于空明外又除分別染淨以分別即已染淨即根緣故也七于空明分別染淨外更除根本兼根境合而為一止三緣矣第八具種子作意根境四緣若加等無間則諸識皆從頭各增一緣而為十為九乃至為四為五緣矣衆緣和合方得現前者以識本自無隨緣而有由此隨緣現義緣頓合則五識俱起緣漸合或一至四起如深密經謂如大暴流水若一浪生緣現前唯一浪轉乃至若多浪生緣現前有多浪轉等是也二解後四句二初釋第一句二明次三句初釋第一句由五轉識行相粗動所藉衆緣時多不具故起時少不起時多第六意識𨿽亦粗動而所藉緣無時不具由違緣故有時不起第七八識行相微細所藉衆緣一切時有故無緣礙令總不行又五識身不能思慮唯外門轉起藉多緣故斷時多現行時少第六意識自能思慮內外門轉不藉多緣唯除五位常能現起故斷時少現起時多由斯不說此隨緣現總明諸識釋第六之常現起也初總明諸識現起恆漸不同次別明前六現起多少不同以現起時多者為常耳不能思慮者無計度分別故唯外轉者不能內緣故內外轉者具任運計度二分別故餘文易見二明次三句五初明無想天報二明二無心定三明睡眠悶絶四明及與二言五判聖凡有無初明無想天報五位者何生無想等無想天者謂修彼定厭粗想力生彼天中違不恆行心及心所想滅為首名無想天故六轉識于彼皆斷有義彼天常無六識聖教說彼無轉識故說彼唯有有色支故又說彼為無心地故有義彼天將命終位要起轉識然後命終彼必起下潤生愛故瑜伽論說後想生已是諸有情從彼沒故然說彼無轉識等者依長時說非謂全無有義生時亦有轉識彼中有必起潤生煩𢚰故如餘本有初必有轉識故瑜伽論說若生于彼唯入不起其想若生從彼沒故彼本有初若無轉識如何名入先有後無乃名入故决擇分言所有生得心心所滅名無想故此言意顯彼本有初有異熟生轉識暫起宿因緣力後不復生由斯引起異熟無記分位差別說名無想如善引生二定名善不爾轉識一切不行如何可言唯生得滅故彼初位轉識暫起彼天唯在第四靜慮下想粗動難可斷故上無無想異熟處故即能引發無想定思能感彼天異熟果故徴標五位別釋無想天也別釋有三初正釋無想天義次料簡六識有無三料簡所起界地于彼皆斷者于彼無想天中六識王所斷而不起非斷滅也無想天曰彼天無想定曰彼定修彼定生彼天果符于因也六識王所起有間斷曰不恆行而曰違者于彼皆斷之所以也想滅為首無想所由名也料簡六識有無者初師謂從初至終常無六識曰無想天如聖教云彼無轉識但有色支而無名名無心地豈不足證乎次師謂命終要起轉識原之于理彼命終者必起下地潤生之愛潤生愛與意識俱故證之于論後想生已是諸有情從彼沒故然則前引無轉識者依四百九十劫中間長時論耳非謂全無三師謂豈獨命終初生亦有轉識原之以理彼修無想定人欲生彼天時彼中有身必起潤生之愛潤生愛俱有轉識故例之餘禪天本有初生時必有轉識故證于瑜伽之唯入不起知本有之初先有轉識後可言入證于决擇所有生得心心所滅而知本有之初有異熟生轉識暫起是則三師之說義各有取尅就無想則但從中間長時無轉識以立名耳料簡界地者無想天所在之地唯在四禪九天之第四靜慮也不在下者下三地想心粗動難可斷故不在上者無想滅心存色上四滅色存心無有滅心存色之異熟處故即能引發等者出無想因果能引能感不離一意思業見思之為要也問如善引生二定名善者何曰由宿串習此定𫝑力後不復生此無想也由此引起真異熟識分位差別說名無想則無想引生無想如善引生二定名善例之使易曉耳問本有初者何曰本生中四有前已詳釋今言本有初者即今身初生時也以中有末位于投胎正歡喜時中有即滅中有正滅剎那五蘊正生指此正生名本有初如俱舍云本有謂前俱生剎那後俱生剎那正本有初耳二明二無心定二初牒頌總標二別釋二定初牒頌總標及無心二定者謂無想滅盡定俱無六識故名無心二別釋二定二初無想定二滅盡定初無想定四初釋定體二明類別三明攝屬四辨起處初釋定體無想定者謂有異生伏遍淨貪未伏上染由出離想作意為先令不恆行心心所滅想滅為首立無想名令身安和故亦名定承上二定俱無者已知別名無想何謂故云謂有異生等云云也遍淨之貪已伏遍淨之上貪染未伏此異生觀想基也由出離粗想作意而為先導觀想如病如癰如箭入第四靜慮修背想作意于所起種種想中厭背而住唯謂無想寂靜微妙于無想中持心而住如是漸次離諸所緣心便寂滅故云令六轉識不恆行心心所滅名無想者以想滅為首故令身調暢安和故亦名定問此與無想天何別曰此因彼果此善彼無記此有行彼無行等故不同也二明類別修習此定品別有三下品修者現法必退不能速疾還引現前後生彼天不甚光淨形色廣大定當中夭中品修者現不必退設退速疾還引現前後生彼天𨿽甚光淨形色廣大而不最極𨿽有中夭而不决定上品修者現必不退後生彼天最極光淨形色廣大必無中夭窮滿壽量後方殞沒承上無想定義已知此定如何修耶故云修習此定云云也三品修者如集論謂于諸定入住出相未善了逹名下𨿽已了逹未善串習名中既已了逹復善串習名上必退不必必不退者退有决不决不退則可决也現前曰還引以曾退故不能速疾現前者知之不徹行之不疾至也設退速疾還引現前者行𨿽未善知之則已能也上品不言還引者以必無退故光淨形色以及壽命三品各以因從異生之根分利鈍功有怠勤因果低昂如此焉可誣也三明攝屬此定唯屬第四靜慮又唯是善彼所引故下上地無由前說故四業通三除順現受承上修習已知此定于界性業受果何屬耶故云此定以界地言唯屬第四靜慮上下無處前已說故以三性言唯屬善性以彼加行善所引發故以業因言流轉所攝業謂善惡無記三種還滅所攝業謂無漏一種無想定通前三業非無漏故以受報言現受生受後受不定受而無想除順現受以今修無想定當來方得無想果故不定者前三皆不定故又通不定者或有外道由謗解脫生地獄故或改邪修正出三界等如瑜伽以時報作定否四句今不定即第四時報俱不定也四辨起處有義此定唯欲界起由諸外道說力起故人中慧解極猛利故有義欲界先修習已後生色界能引現前除無想天至究竟故此由厭想欣彼果入故唯有漏非聖所起承上界等攝屬已知此定起處云何故云有義等也一謂起于欲界外道講說人中猛利之慧一謂始起于欲界後引于色界𨿽起于欲色與越想至究竟天之無想不同故除之以彼是不還果聖人所起此由厭想欣彼無想之果而入此唯有漏非彼聖人無漏所起故也如瑜伽謂此無想非學所入亦非無學何以故此中無有慧現行故乃至不能證得諸勝善法由是稽留誑幻處故問前云慧極猛利此云無慧何耶曰彼論外人此論聖學是故以外論外則為猛利以內論外則為無慧二滅盡定四初釋定體二明類別三明分攝四明起處初釋定體滅盡定者謂有無學或有學聖已伏或離無所有貪上貪不定由止息想作意為先令不恆行恆行染汙心心所滅立滅盡名令身安和故亦名定由偏厭受想亦名滅彼定前頌二無心定謂無想滅盡無想已如上明滅盡云何故云滅盡定者謂有無學等云云也學無學該三乘得滅盡定之人也于無所有貪有學已伏無學已離非非想貪于學無學不定伏離此得滅盡定人之德也恆行謂七識王所不恆行謂六識王所而云止息想作意為先令此染汙總滅者此正所以為滅盡定也令身安和調暢故亦名定然又云滅受想定者由彼偏厭受想故又從偏厭以立名耳問無想名凡滅盡名聖而無想云出離想作意為先此云止息想作意為先止息出離何所分別曰此正因地不同聖凡逈別彼以出離為先故如石壓草非真無想而名為無想此以止息為先故六七思惑或伏或離如侵除草根是真滅盡名滅盡也二明類別修習此定品別有三下品修者現法必退不能速疾還引現前中品修者現不必退設退速疾還引現前上品修者畢竟不退承上滅盡定體已知修習此定如何故云修習此定品別有三云云也下中上法𨿽聖凡逈別而儀式是同略如上釋三明分攝此定初修必依有頂遊觀無漏為加行入次第定中最居後故𨿽屬有頂而無漏攝若修此定已得自在餘地心後亦得現前𨿽屬道諦而是非學非無學攝似𣵀槃故承上修習已知果何所攝屬耶故云此定初修乃至有頂攝無漏攝道諦攝非二攝也必依非想地歷行觀察四諦真無漏理以慧資定為滅盡加行而趣入者以始從初禪乃至有頂鄰接而入九次第定居于最後既居有頂之後故依有頂而為加行入也然而有頂之後無別有地是故此定亦屬有頂𨿽屬有頂通于凡聖以凡夫根本味禪隱沒有垢無記故是有漏此依根本淨禪不隱沒無垢有記觀練熏修九十八使山動故是無漏恐有問云此定既屬有頂餘地亦得起此定否故為通云定力轉深奮迅超越出入自在從初禪不假方便次第入滅盡復從滅盡定從上向下逆次而出還至初禪故云餘地亦得現前仍恐問云此定屬于道諦學等果何攝耶故又通云𨿽屬道諦是非二攝以寂靜微妙似𣵀槃故故非學攝非真𣵀槃故非無學攝也四明起處三初但明定起處所二通明三乘定起三別明菩定起初但明定起處所此定初起唯在人中佛及弟子說力起故人中慧解極猛利故後上二界亦得現前塢陀夷經是此誠證無色亦名意成天故于藏識教未信受者若生無色不起此定恐無色心成斷滅故已信生彼亦得現前知有藏識不斷滅故承上已知此定分攝始起之處云何故曰此定初起云云也唯欲界人中佛及弟子說法之力慧極猛利之力而為初起處所若既起後已習純熟後生上二界中亦得現前設有難云色界或現無色無身云何能現耶故引經證云無色名意成天𨿽無業果色豈無名攝非色四蘊耶故亦能起但此有二類曾聞藏識未信受者不起此定恐斷滅故已信生彼亦得現前知有藏識不斷滅故二通明三乘定起要斷三界見所斷惑方起此定異生不能伏滅有頂心心所故此定微妙要證二空隨應後得所引發故有義下八地修所斷惑中要全斷欲餘伏惑斷然後方能初起此定欲界惑種二性繁雜障定強故唯說不還三乘無學及諸菩得此定故彼隨所應生上八地皆得後起有義要斷下之四地修所斷惑餘伏惑斷然後方能初起此定變異受俱煩𢚰種子障定強故彼隨所應生上五地皆得後起若伏下惑能起此定後不斷退生上地者豈生上已𨚫斷下惑斷亦無失如生上者斷下末那俱生惑故然不還者對治力強正潤生位不起煩𢚰但由惑種潤上地生𨿽所伏惑有退不退而無伏下生上地義故無生上𨚫斷下失承上但由說力即能起者諸異生等聞說便能起此定耶故云要斷三界見所斷惑等云云也初顯斷三界見惑得證二空方起二顯斷欲界修惑七地惑伏方起三顯斷下四地修上地惑伏方起四難伏惑得起失在上𨚫斷下五通斷亦無失實無斷下之失初中見惑從解得名以見理時能斷故六十二至百八見皆此所攝斷見小則陀洹大則初地初心方起此定異生是凡于有頂心心所惑不能伏滅定豈能起二空我法二空隨應後得所引發者以根本智先證二空後得智中復修加行然後乃能入此定故然菩或雙證二乘或單證單雙不定故云隨應等也次謂單斷三界見惑未必能起此定必除非非想于下八地修所斷惑欲則全斷餘伏惑斷然後方起以欲界有覆不善二性繁雜障定強故所以九品思惑全斷又以聖教唯說不還天第三果人三乘無學及諸菩得此定故則全斷欲修及伏餘地之惑方得此定豈不足證耶彼隨所應生上八地皆得後起者通則不還三乘及諸菩隨所應別則不還果人隨所應以或從梵衆天沒生究竟而全超或從梵衆天沒已中間漸受十四天處或超一二乃至十三後乃生色究竟皆名半超或全不能超遍沒色界一十六天而但除大梵無想如是等生上地者皆得起此故曰隨應三中謂若全斷欲修餘伏惑斷未必能起此定要斷下欲及三禪四地修所斷惑餘伏惑斷然後方能初起此定以下四地苦樂憂喜變異受俱煩𢚰種子粗動轉易障定強故所以當斷如是則彼隨所應生上五地皆得彼起四中難謂若但伏下惑能起此定後于所伏不斷之惑退轉現起之時豈無生上𨚫來斷下惑之失耶意謂必斷而後生之無失也五中通謂斷亦無失先順通謂例之則如生上地三乘將得無學者一剎那中頓斷下末那俱生惑故恐伏難云若伏餘惑能起此定後于所伏設不退轉不現起則生上者豈竟無潤生惑耶亦順通云不還居四禪對治力強若生上四地正潤生時不假起現行煩𢚰但由惑種潤生耳然斯答也據三乘人縱其難而順答之耳若據三果人之實而逆答之則𨿽所伏惑有退起如前難有不退起如伏難之別而六識俱修所斷種三界九地一一漸次九品別斷或為一聚九品別斷故無伏下生上地義豈有生上𨚫斷下惑之失耶三別明菩定起若諸菩先二乘位已得滅定後𢌞心者一切位中能起此定若不爾者或有乃至七地滿心方能永伏一切煩𢚰𨿽未永斷欲界修惑而如已斷能起此定論說已入逺地菩方能現起滅盡定故有從初地即能永伏一切煩𢚰如阿羅漢彼十地中皆起此定經說菩前六地中亦能現起滅盡定故承上前通據三乘說耳若直據菩根當復云何故云若諸菩等云云也初約小乘𢌞心次約大乘漸悟三約大乘頓悟先二乘位已得滅定者本是菩根器以先在二乘位中色究竟天斷三界俱生我執得滅定已即于捨心發明智慧慧光圓明便出塵界成阿羅漢入菩乘名為𢌞心大阿羅漢則無論位之高下或賢或聖皆能起此定也若非二乘𢌞心一向發大乘心者必先斷三界見惑登初地已乃至七地滿心方能永伏三界一切俱生煩𢚰𨿽未永斷欲界修惑而如不還已斷能起此定如經謂逺行地菩方能現起滅盡定是也此約漸悟者言耳若頓悟菩復有從初地中即能永伏三界修所斷惑如阿羅漢永斷無異彼從初地乃至十地皆起此定證之于經六地既然後四可例知矣三明睡眠悶絶無心睡眠與悶絶者謂有極重睡眠悶絶令前六識皆不現行疲極等緣所引身位違前六識故名極重睡眠此睡眠時𨿽無彼體而由彼似彼故假說彼名風熱等緣所引身位亦違六識故名極重悶絶或此俱是觸處少分除斯五位意識恆起初牒頌總標次別釋睡眠三別釋悶絶四判屬分攝末則結除顯恆令前六識皆不現行𫝑不異前二種故此二亦名無心此睡眠位𨿽無彼體而由彼似彼假說彼名者恐難眠是不定心所與心相應此既無心寧有心所釋云此極重睡眠𨿽無彼睡眠昧略之體由彼睡眠引起與彼相似是故假立彼名耳不必實有彼體以心難無心也或此俱是等者此指睡悶疲極風熱等緣皆是觸塵少分觸有二十六種謂地水火風四種是實餘冷暖饑渴澀滑飽悶等皆依四大而起差別建立今此二位借身根為緣引起一分是身根攝故云少分除此五位則意恆現起不除不恆則常現起者亦就無常以言常耳四明及與二言正生時亦無意識何故但說五位不行有義生及與言顯彼說非理所以者何但說六時名無心故謂前五位及無餘依應說生即悶絶攝彼是最極悶絶位故說及與言顯五無雜此顯六識斷已後時依本識中自種還起由此不說入無餘依初難次答三斥四申正義五通妨難顯五無雜者無想因果似同二定俱滅心所睡悶外相無異以及與二言顯五無雜此顯六識斷已等者恐有難云既云六時無心此何不云無餘依耶釋云此中顯六轉識後時從自種起無餘不爾一入永入故此不言五判聖凡有無此五位中異生有四除在滅定聖唯後三于中如來自在菩唯得存一無睡悶故承上五位之義已明五位有無于聖凡當云何耶故云異生有四除在滅定聖唯後三除無想因果如來與八地已上菩唯得存一滅定并無極重睡眠悶絶故也三總為結明是故八識一切有情心與末那二恆俱轉若起第六則三俱轉餘隨緣合起一至五則四俱轉乃至八俱是謂略說識俱轉義總結頌文即前六以通明俱現之義也上云依止本識五隨緣現六常現起但除五位即顯八種識于一切有情第八心及末那二恆俱轉第六不遇違緣而起即三俱轉五識起一即四俱轉五識起二即五俱轉乃至五識俱起即八俱轉也上正解頌義一科竟二問答料簡六初簡情識一多難二簡緣識一多難三簡識境一多難四簡識類不俱難五簡不用俱意難六簡諸識相應難初簡情識一多難若一有情多識俱轉如何說彼是一有情若立有情依識多少汝無心位應非有情又他分心現在前位如何可說自分有情然立有情依命根數或異熟識俱不違理彼俱恆時唯有一故此至第六設問答以闡其微也承上一切有情心與末那二恆俱轉乃至八俱則是凡一有情多識俱轉矣故難云若一有情多識俱轉當知是多有情如何是一有情耶意謂一有情身應唯一識不知辨有情當知所立明所立須會立依立有情依識多少汝起一識名一有情者若無心位一識不生應非有情耶又若依識立有情者識與戒善相應起位爾時可言人趣自分有情若人中起四禪八定天分心或六度萬行菩分心是他分心如何可說自分有情所以然者汝執一識一有情故也須知依命根異熟識立有情數以命根異熟一有情身恆唯一故是則明于依立而一多之難自可釋矣二簡緣識一多難一身唯一等無間緣如何俱時有多識轉既許此一引多心所寧不許此能引多心又誰定言此緣唯一說多識俱者許此緣多故又欲一時取多境者多境現前寧不頓取諸根境等和合力齊識前後生不應理故又心所性𨿽無差別而類別者許多俱生寧不許心異類俱起又如浪像依一起多故依一心多識俱轉又若不許意與五俱取彼所緣應不明了如散意識緣久滅故難意云識從緣生一身多識須具多緣前三種緣或可容多等無間緣一身唯一若一有情唯一等無間緣如何能令多識一時俱轉耶答中初約許能引多順意答二約緣因識多奪破答三約生緣力齊識俱答四約所例心王並起答五約喻顯多識俱轉答六約五俱意識反難答初約許能引多順意者如前念眼識引生後念眼識緣色等境時必有相應善染心所即是許一等無間緣引多心所矣既許此一引多心所寧不許此一能引多心耶是故諸識俱起亦無有失二約緣因識多奪破者依自類識說一識止一等無間緣如眼識則有眼識一等無間緣乃至藏識則有藏識一等無間緣誰定言此等無間緣唯是一耶說多識俱者許此緣多故也三約生緣力齊識俱者前難如何俱時有多識轉故今答云又若一人作意欲一時取多境者諸根不壞多境現前寧不諸識俱轉一時頓取耶以根等和合力齊識前後生而不齊者理不應也四約所例心王並起者又心所體性𨿽無差別而善等類別于一身中一時俱轉許多心所不以類別而互違寧不許異類心王一時俱起耶五約喻顯多識俱轉者又如浪像依一暴流隨多風緣起多波像互不相違依一賴耶遇多境緣有多識轉亦互不違也六約五俱意識反難者如謂一身唯一識轉是不許第六意與五識俱轉矣若不許意與五俱轉則取彼所緣應不明了而明了者應如散意識取過去境似有似無矣有是理乎此又不通之甚者也然則從一至六展轉之酬處既精而于一千多識緣之疑難當氷釋矣三簡識境一多難如何五俱唯一意識于色等境取一或多如眼等識各于自境取一或多此亦何失相見俱有種種相故難意云一識取一境人所同解如何五識同俱唯一明了意識于色等境取一而或多耶答云欲明一意能取多境但觀五識各能取多可例知矣如一眼識一時唯取青色或于一時頓取青等多色乃至身識皆然此意或于一時唯與眼俱但取色塵或于一時同與五俱頓取色等諸塵亦何所失所以然者意識通緣一切而有種種相見分故豈一見一相之可拘耶四簡識類不俱難何故諸識同類不俱于自所緣若可了者一已能了餘無用故此躡前難謂眼等諸識見分各于自境相分既能取多則眼等識見分有多同類故云諸識同類類同則起亦應同同類見分而不一時同起者故將安在其詞𨿽難五識之類同不俱其意自含同時意識答云諸識同類各有所緣于自所緣若可了者一已能了或起一等如不可了餘亦無用或多不起是以同類不俱起耳五簡不用俱意難若爾五識已了自境何用俱起意識了為五俱意識𦔳五令起非專為了五識所緣又于彼所緣能明了取異于眼等識故非無用由此聖教說彼意識名有分別五識不爾此亦躡前難云既言一已能了餘無用者五已能了自境用意何為曰五俱意耶答云汝難將謂五俱意識專為了五所緣已耶不知意為五分別依𦔳五令起又五取境不能明了但如鏡照物無別分析意又于彼所緣能明了取異于眼等有此多故非專為了五所緣已也由此聖教說彼名有分別五識不爾不應為例六簡諸識相應難多識俱轉何不相應非同境故設同境者彼此所依體數異故如五根識互不相應難謂王所俱轉名相應諸識俱轉亦相應俱轉是同不同相應者何答謂王所俱轉名相應者同一剎那和合似一定俱生滅同所依根共所緣境具五義故今諸識𨿽剎那俱轉所緣各別非同境故設如五俱意識與五同境而彼此依異自證之體心所之數亦異故互不相應也如五識與五根𨿽俱時轉互不相應可例知矣曰非如王所體數不異和合似一得相應也上問答料簡一科竟三釋非一異八識自性不可言定一行相所依緣相應異故又一滅時餘不滅故能所熏等相各異故亦非定異經說八識如水波等無差別故定異應非因果性故如幻事等無定性故如前所說識差別相依理世俗非真勝義真勝義中心言絶故如伽他說心意識八種俗故相有別真故相無別相所相無故恐難諸識俱轉似定一不相應故似定異敢問八識自體是定一耶定異耶故通云不可定一異也不可定一者一能見行相所依之根所緣之境相應心所異故不可言定一二一識滅時餘七不同時滅故不可言定一三能熏是前七所熏是第八能所四相各異故不可言定一也不可言定異者一經說八識前七如波第八如水無異相故不可言定異二更互為因更互為果因契果性果合因性麻不生豆因果性故不可言定異三如幻等無定一定異性故不可言定異也又恐疑云然則前說三能變相六位心所差別性相豈非定異耶故重通云此于四重俗諦中依第二道理世俗諦說有差別耳非四種真諦中第四真勝義諦心言路絶一異兩忘忘亦叵得可言有差別相耶如伽他說心意識八種俗故相有別真故相無別以真淨中能所皆絶故也如水以波為能相即復以水為所相日以光為能相即復以日為所相火以𦦨為能相即復以火為所相諸識亦爾以執持思量了別為能相即復以識為所相真勝義中俱不可得由是而知此假未結之前曰六曰三能變之差別紛然此假正結之際為一為多所執之異同盡矣孰謂性外有相而執性以難相耶上初明能變三相竟二明所變唯識四初正明我法唯識二料簡分別唯識三料簡生唯識四料簡三性唯識初正明我法唯識二初本論二論釋初本論已廣分別三能變相為自所變二分所依云何應知依識所變假說我法非別實有由斯一切唯有識耶頌曰是諸識轉變分別所分別由此彼皆無故一切唯識二論釋三初正解頌義二教理證成三問答料簡初正解頌義二初約依他相見釋二約遍計我法釋初約依他相見釋論曰是諸識者謂前所說三能變識及彼心所皆能變似見相二分立轉變名所變見分說名分別能取相故所變相分名所分別見所取故由此正理彼實我法離識所變皆定非有離能所取無別物故非有實物離二相故是故一切有為無為若實若假皆不離識唯言為離識實物非不離識心所法等依他等者約依他因緣所變相見二分以釋頌文也初釋初句次釋二句三釋三句四釋四句似者似外執實能所現非實外也心及心所色不相應四位名有為虛空滅定以及真如六位名無為有為前三從緣生故曰實不相應行依分位故曰假非不離識心所法等者非為止不離識法言亦有心所法等也總其大意是離三能變無似所變之相見離似所變無執實有之我法然則我法不在能所取外豈離見相能所取外更有一毫實我法哉故曰由此彼皆無决定盡非有故一切唯識二約遍計我法釋或轉變者謂諸內識轉似我法外境相現此能轉變即名分別虛妄分別為自性故謂即三界心及心所此所執境名所分別即所妄執實我法性由此分別變似外境假我法相彼所分別實我法性决定皆無前引教理已廣破故是故一切皆唯有識虛妄分別有極成故唯既不不離識法故真空等亦是有性由斯逺離增減二邉唯識義成契會中道約周遍計度我法為實以釋頌文也前已正釋此又一釋故云或謂或可又作一釋也初釋初句二釋次句三釋三句四釋四句轉變者內心心所諸識我法分別熏習力故生時變似我法外境相現立轉變名分別所分別者能變三界心及心所即名分別虛妄分別為自性故妄執實我法性名所分別虛妄分別所執境故由此彼皆無者由此能變分別力故變似外境我法相現故實我法决定皆無初卷所引教理已廣破故如宗鏡意謂自證變相見如結巾成兔頭執相見為我法如頭上更結二耳不證實有之巾而起似頭已自名假更於似頭而起二耳益名為假法可知矣但相見𨿽假似有從種而生執相見為我法决定是無遍計妄有之故也是故三界內外一切諸法悉無有體唯有內識虛妄分別理極成故唯離識外境不不離識法故真空及依他起亦是有性由唯義故實有外境之增由識義故簡實無內心之減有無離而增減唯識義成中道理會矣二教理證成三初深問教理二詳答教理三結證簡示初深問教理由何教理唯識義成豈不已說𨿽說未了非破他義己義便成應更確陳成此教理初問次答而更問歸重于問曰深問豈不已說指三卷四卷所引未了者以前𨿽廣引教理論意但在破他心外有法于唯識義猶未顯了然非為破斥他義自己唯識之義便成應于此外更確敷陳教理成此唯識也亦可小乘九難此即第一唯識所因難謂離心之外現見色法則色心異色等實境而為所緣則能所異以此所因唯識不成而論主總名唯識者所因果安在哉二詳答教理二初詳引教二詳顯理初詳引教三初總引諸經二別釋四智三重引結成初總引諸經如契經說三界唯心又說所緣唯識所現又說諸法皆不離心又說有情隨心垢淨又說成就四智菩能隨悟入唯識無境三界唯心華嚴及十地經也三界則萬有俱該更何有而不唯識又說所緣唯識所現解深密經也親踈所緣既皆識現更何緣而不唯識又說諸法皆不離心楞伽經也諸法既不離心更何法而不唯識又說有情隨心垢淨垢淨有情皆隨于心更何情而不唯識又說成就四智菩能隨悟入唯識無境阿毗逹磨經也既說地前菩𨿽未證阿賴耶識而能信解求彼轉依是以或聞佛說或見地上菩所有妙變魚米肉山等事故能成就四智隨順悟入唯識真理無境可得則更有何境而不唯識耶教之成證唯識層見疊出不可枚舉有何不顯有何不了有何可疑而不信耶二別釋四智一相違識相智謂于一處鬼人天等隨業差別所見各異境若實有此云何成前標成就四智能隨悟入唯識無境故從此至後决定悟入一一列名解釋而結明之也一謂相違識相智鬼人天畜能變之識彼此不順曰識相違所變之相同處各別曰相相違菩之心于此了知異相皆虛一唯識變曰成就相違識相智也隨業差別者境由識變識循業轉故也如恆河一處鬼見猛火人見清流天見寶嚴魚見窟宅此一恆河果有此四境差別否耶則人見糞穢犬見淨食人見淨食天見臭穢一隨業識所變而彼此之相决不可同彼此之决不可同者决非心外實有之境也以猛火若實清流窟宅云何得成餘皆然也問此相為遍計相相分相曰相分相問所變之相為是本質有異相分異耶曰相質皆別前六以第八相分為本質彼本識相分既別故六識所變相分亦別耳二無所緣識智謂緣過未夢境像等非實有境識現可得彼境既無餘亦應爾緣過未夢境及鏡像水月等𨿽容貌𭓩然皆從獨頭散意搆畫遍計當情變起非實有體曰無所緣識所變現曰識現可得菩于此了知境無識現曰成就無所緣識智彼過未既其非實餘現在境亦非實矣問心憶前人或憐或恨心想醋梅口中水出是過未耶是現在耶曰三世俱有而要之憐恨由心水出非味一皆識現可得前人醋味固可得哉三自應無倒智謂愚夫智若得實境彼應自然成無顛倒不由功用應得解脫自應無倒者菩照了凡夫于自身所執常樂我淨反决其自然是倒曰自應無倒智如攝論云成就應離功用無顛倒智謂愚夫智于無常無我等身橫計常樂我淨自以為真實之境不知其必非真實何者若得實境彼應自然成無顛倒不由功用修持應得解脫然而决無此理故必非真實之境唯是妄識四隨三智轉智一隨自在者智轉智謂已證得心自在者隨欲轉變地等皆成境若實有如何可變二隨觀察者智轉智謂得勝定修法觀者隨觀一境衆相現前境若是真寧隨心轉三隨無分別智轉智謂起證實無分別智一切境相皆不現前境若是實何容不現菩成就四智者于唯識理决定悟入衆境變更皆隨智轉智能了知故曰隨三智轉智謂成就三種智令境隨轉前三智觀凡夫境此三觀聖人境而三合為一者三皆聖所行故隨自在智轉智者謂八地已上證得心自在隨欲轉變地成水等水成地等河為酥酪地作黃金任運皆成令應見者如實而見境若離心實有如何隨心轉作一切境耶隨觀察智轉智者謂諸聲聞獨覺菩得勝妙定修無常苦空法觀者隨觀一法之上無常等相現前境若離心是真有者寧隨行人心所轉變現衆相于一法耶隨無分別智轉智者謂從初地已去起根本智證真如時真如妙境與智冥合能所一如更無分別內外凝寂一切境相皆不現前境若是實何容一切皆不現耶故結云菩成就四智者于唯識理决定悟入問變大地作黃金等為滅𨚫地令金種別生為轉其地便成金耶唯識鏡云為佛菩以妙觀察智繫大圓鏡智及異熟識令地種不起金種生現以此為增上緣能令衆生地滅金住名之為變非便轉地成金之謂變也故攝論云由觀行為增上緣令餘識人變以色無定體元是如來藏中不思議法隨心轉變故耳問定力變化諸事為實為虛實則云何石作金地作水等虛則聖人云何而行不定事耶曰是實非虛以聖人三毒已故一切法無定相故如膠為地類得火則消之水而為濕水非地類遇寒則結之氷而為堅石汁作金金變為銅惡可為善善可為惡類皆然也故一切法皆無定相三重引結成又伽他說心意識所緣皆非離自性故我說一切唯有識無餘此等聖教誠證非一問前已詳引諸經此又引者何曰以此是貫華可誦義意完足故也心即第八意即第七識即前六自性諸識本體也此等聖教等𨿽是結上所引之教亦是等攝未引之文如楞伽佛告大慧身及資生器世間等一切皆是藏識影像所取能取二種相現彼諸愚夫墮生住滅二見中故于中妄起有無分別又入楞伽亦云種種隨心轉唯心非餘法心生種種生心滅種種滅衆生妄分別無物而見物無義唯是心無分別得脫此皆金口昭然可證者也上初詳引教竟二詳顯理四初明前五二明後三三親所緣四踈所緣初明前五極成眼等識五隨一故如餘不親緣離自色等宗鏡云此第一比量成立五塵相分色皆是五識親所緣成唯識義也作量云極成眼識是有法定不親緣離自識色是宗因云極成五識中隨一攝故如餘極成四識釋云宗前陳云極成即揀兩宗不極成眼識且如大乘宗中許有他方佛眼識及佛無漏眼識為小乘不許亦揀之不取若小乘宗中執佛是有漏眼識及最後菩染汙眼識即大乘不許亦須簡之即兩宗互不許者是不極成法今但許兩宗共許極成眼識方立為宗故前陳言極成眼識也若不置極成二字以簡兩宗前陳便有自他一分所別不極成過因中亦犯自他一分所依不成過為前陳無極成眼識為所依故如因明云虛空實有德所依故對無空論所依不成後陳言定不親緣離自識色宗者但是離眼識相分外所有本質色及餘四塵但離眼識者皆不親緣若立敵共諍只諍本質若大乘自宗成立眼識親相分色然不言定親緣不離自識色者恐犯能別不極成過謂小乘不許色不離于眼識故因云極成五識隨一攝故者因言極成亦簡不極成五識若不言極成但言五識中隨一攝者即犯自他一分隨一不成過如因明云所作性故對聲顯論隨一不成喻云如餘極成四識者喻言極成亦揀不極成法若不安極成犯一分能立所立不極成過如因明云能立法不成者如說聲常無質礙故諸法質礙見彼是常猶如極微然彼極微所成立法常住是有能成立法無質礙無以諸極微質礙性故所立法不成者謂說如覺然一切覺能成立法無質礙有所成立法常住性無以一切覺皆無常故問宗依須兩家共許今後陳立者言不親緣離自識色敵者許親緣離自識本質色何言極成答小乘亦許眼識不親緣餘四塵以離眼識故但使他宗許有不親緣離自識色即是宗依極成也問他宗既許餘四塵眼識不親緣後合為宗便自相扶豈成宗諍答今所諍者但取色塵本質眼不親緣互相差別順己違他正成宗體以小乘𨿽許色本質離于眼識且是親緣今言不親緣豈非宗諍問宗中所諍是眼識不親緣本質色同喻如餘四識餘四識但不親緣餘四塵豈得相似答餘四識是喻依各有不親緣離自識法是喻體今取喻體不取喻依亦如聲無常宗同喻如瓶不應分別聲瓶有異但取聲瓶各有無常義相似為因等也問何謂五隨一故曰是五識中隨攝一識即名因義故也二明後三餘識識故如眼識等亦不親緣離自諸法宗鏡云此第二以理成立第六兼暗成立七八二識皆緣自之親相分不離于識是唯識義也量云極成餘識是有法亦不親緣離自識法宗因云是識性故同喻如極成五識釋云宗前陳言極成亦簡不極成若不言極成犯自他一分所別不極成過若言六七八識為有法他不許七八二識即犯他一分所別不極成過若但立意識為有法因中便犯不定過被他將七八二識為異喻量犯共中自不定過而外人出過云為如意識是識性故證汝餘識不親緣離自諸法耶為如七八二識亦是識性故證汝餘識定親緣離自諸法耶今但總言餘別取第六意兼七八即暗成立攝取七八于餘識之中後陳亦不親緣離自識法者亦同五識不親緣離自識諸法因云是識性故者即同五識是識性故喻如極成五識者即同五識亦不親緣離自識故明知即親所緣不離自識法既成立已故知一切親所緣緣境皆不離心是唯識義三親所緣此識所緣定非離此二隨一故如彼能緣宗鏡云此第三以理成立前六識親所緣緣相分皆歸心體所言心體者即自證分也然𨿽見分亦依自證而轉今但立相分者以見分共許故量云此識所緣相分是有法定非離此自證分宗因云相見二分中隨一相分攝故同喻如能緣見分見分不離自證分證相分不離自證分以小乘許見分是不離心體故取為同喻四踈所緣所緣法故如相應法决定不離心及心所此等正理誠證非一宗鏡云此第四道理成立一切踈所緣緣境皆不離心是其唯識即第八識相分望前六名踈所緣緣以小乘不許第八故但云踈所緣緣也量云一切隨自識所緣是有法决定不離我之能緣心及心所宗因云以是所緣法故同喻如相應法釋云此量後陳言定不離我之能緣者謂一切有為無為但所緣之法定不離我之能緣識若後陳不言我之能緣者便犯一分相符之失謂小乘亦許他心智所緣之境不離能緣心故為簡此相符過遂言我之能緣即簡他之能緣也同喻如相應法者即是前來已成立親相分是也皆所緣法故此等正理誠證非一結可信也已上引教顯理二科竟下總結教理勸信引證而復示其意也三結證簡示故于唯識應深信受我法非有空識非無離有離無故契中道慈尊依此說二頌言虛妄分別有于此二都無此中唯有空于彼亦有此故說一切法非空非不空有無及有故是則契中道此頌且依染依他說理實亦有淨分依他初勸信次引證三示意承上教如此詳理如是顯故于唯識應深信受遍計之我法非有依圓之空識非無非有故離有非無故離無既離二邉故契中道如慈尊依此說二頌云云也宗鏡云虛妄分別有者虛妄分別心有能取所取也于此二都無者于此妄心之上能取所取二執之相都無也此中唯有空者此妄心中唯有真如即俗諦中有真諦空性也于彼亦有此者于彼空性中有此妄分別識耳一切法即有為無為非空謂虛妄分別心與空性即依圓是有也非不空謂能所取我法二執之相是空即遍計性也言有無及有故者有謂虛妄分別無謂二取我法及有故謂于妄分別中有真空于真空中有妄分別也是則契中道者謂非一向空如清辨等非一向有如小乘等又二諦有不同清辨二取我法無不同小乘故名中道辨中邉論與此大同且依染依他說者謂頌言二都無但無染分依他淨唯識變又非所執是妙俗諦故理實有耳上第二教理證成一科竟亦是答小乘第一唯識所因難竟三問答料簡八初答世事乖宗難二答聖教相違難三答唯識成空難四答色相非心難五答現量違宗難六答夢覺相違難七答外取他心難八答異境非識難初答世事乖宗難若唯內識似外境起寧見世間情非情物處時身用定不定轉如夢境等應釋此疑初是經部師以世事乖唯識之宗為難次是大乘師以世事合唯識之宗為答也難云若唯內識似外境起非心外實有境寧見世間情非情物處定時定身與作用皆不定耶處定者且如世人將現量識正緣南山處其識與山俱在其南山不離識可言唯識忽若將現量識緣北之時其山定在南處且不隨緣者之心轉向北處既若緣北之時緣南山心不生者明知離識之外有實南山之境此何成唯識時定者若緣南山時識正現起山亦隨心而起即可成唯識且如不緣南山時其緣山心即不生然山且在不隨心滅即是離心有境何成唯識有情身不定者且如有多有情同在一處其中一半有患眩翳者或見空華或見頭髮或見蒼或全不見此等皆是病眼人自識變起所變髮等相分盡不離患眩翳者之心可是唯識且如一半不患眩翳者或十或五共在一處所見一般物皆同境既是一者明知離心有境何成唯識作用不定者于中分出三難第一難云復有何因患翳者所見髮等即無髮等實用餘不患翳者所見髮等實用非無汝大乘既許皆是唯識即須一時有實作用不然一時無實作用今既不同未何者是其唯識第二難云復云何因有情于夢中所得飲食刀杖毒藥衣服等即無實作用及至覺時若得此等便有實用第三難云復有何因香城等即無實用餘甎土城便有實用答如夢境等應釋此疑者是引唯識三十頌也頌云處時定如夢身不定如鬼同見膿河等如夢損有用若依此頌答前四難即足且第一答前處定難者大乘云汝還許有情于夢中有時見有村或男女等物在于一處即定其有情夢心有時便緣餘處餘處便不見前村園等物即夢心不定汝且總許是唯識否經部答云我宗夢中𨿽夢境處定夢心不定然不離有情夢心皆是唯識大乘云我覺時境色亦復如然𨿽山處長定其有情能緣心不定然皆不離現心總是唯識立量云我宗覺時所見境色是有法决定是唯識為宗因云境處定心不定故喻如汝宗夢中之境皆是唯識第二答前時定難者大乘云且如有情于夢中所見村等物其夢心若緣時可是唯識若不緣時應非唯識經部答云我夢中之境若夢心緣時亦是唯識若夢心有不緣時然不離夢心亦是唯識大乘云我覺時境色亦復如是我今長時緣南山山不離心是唯識有時緣山心𨿽不生然不離現心亦是唯識頌云處時定如夢一句答前二難竟第三答身不定難者大乘云汝經部還許衆多餓鬼同于一處于中有三有五業同之者即同見膿河定有三五隨自業力所見不定即同于一處或有見猛火或有見糞穢或有見人把棒攔住如是餓鬼同于一處一半見境定一半所見各異汝總許是餓鬼唯識否答云𨿽見有同異然不離餓鬼自業所變皆是唯識大乘云我宗唯識亦復如然𨿽一類患翳者所見各別有一類不患翳者所見即同然不離此二類有情識之所變皆是唯識頌云身不定如鬼同見膿河等此兩句頌答此一難竟第四總答作用不定中三難者大乘云汝經部還許有情夢中所得刀杖飲食等無實作用是唯識否又只如有情于夢中有時遺失不淨及失尿等事即有實用汝亦許是唯識否皆答云是大乘云汝既許夢中有實作用及無實作用俱是唯識者即知我宗患翳及不患者并夢中現覺兼假城實城亦如汝夢中有實作用無實作用皆是唯識量云我宗覺時境色是有法定是唯識宗因云有實作用故如汝夢中境色頌云如夢損有用此一句答上第四難中三種難竟亦可如三十頌云一切如地獄同見獄卒等能為逼迫事故四義皆成則處時身用定不定四亦如獄中有情各見不同皆是唯識一頌可以答四難矣詳如宗鏡二答聖教相違難何緣世尊說十二處依識所變非別實有為入我空說六二法如斷見說續有情為入法空復說唯識令知外法亦非有故違教為難合教為答也初難次答小乘難謂若一切皆唯是識無心外實境者寧不違聖教乎何則若皆唯識世尊只合說意法二處不合說有十色處今既於阿含經中說有十二處明知離𨚫意法處外別有十色處是心外有法何一切皆唯識耶此如宗鏡承第一假答為難意謂五塵相分色是五識所變可如汝宗是唯識其本質五境色未是何識之唯識以五識第六皆不親緣本質五境即此本質五境豈非離心外有何成唯識故大乘第二正答云依識所變非別實有等也謂依自宗五塵本質色是第八識所變為第八親相分相分不離第八則十有色處依八所變非別離識有實自性然佛所以說十二處者果何所為為愚夫妄執有我輪轉生無窮欲令衆生觀十二處都無主宰悟入我空說六二法猶如彼後不生斷滅之見說續有情捨生趨生無有窮盡耳復有未逹諸法空寂不能趣向無上菩提者令入法無我理故復說三界一切唯識令知心外之法亦非有故得證法空無上覺也是則本于聖教豈得違于聖教問假答云何答論主引三十頌答云識從自種生似境相而轉為成內外處佛說彼為十謂五識自證現行各從五識自證種子而生將五自種便為五根似境相而轉者即五自證現行從自種生已而能變似二分現所變見分說名五識所變相分說名五境其實根境十處皆不離識此是假將五識種子為五根以經部許有種子在第六識中持亦不離唯識有故也三答唯識成空難此唯識性豈不亦空不爾如何非所執故謂依識變妄執實法理不可得說為法空非無離言正智所證唯識性故說為法空此識若無便無俗諦俗諦無故真諦亦無真俗相依而建立故無二諦是惡取空諸佛說為不可治者應知諸法有空不空由此慈尊說前二頌承上難云既言一切諸法皆悉空寂此唯識體豈不亦空不爾亦空殆如何耶欲窮其所以不空之㫖也故答云非所執故等云云也初正釋說非所執二反顯識不可無三重引二頌為證非所執故者意謂識性是淨依他體即不空說法空者依識所變似外境上遍計妄執實法理不可得說為法空非無離執正智所證唯識之體說法空也又識性是妙俗諦此識若無二諦俱無以真俗相依而立此則彼不成無二諦是惡取空佛所不治如中論云諸佛說空法為度于有見若復見有空諸佛所不化有空有不空明彰于佛頌不可忽也四答色相非心離若諸色處亦識為體何緣乃似色相顯現一類堅住相續而轉名言熏習𫝑力起故與染淨法為依處故謂此若無應無顛倒便無雜染亦無淨法是故諸識亦似色現如有頌言亂相及亂體應許為色識及與非色識若無餘亦無以色不同心難唯識以色不離心答唯識也初小乘難問次大乘答難宗鏡出難意謂諸外色處由心自證分變似能取說名見分變似所取說為相分亦識為體者則外色當同內識不顯現同內識之改變同內識之住時間斷不相續矣何緣乃似色相如山河大地等不同內識之不顯現而顯現耶不同內識之多改變而一類堅住耶不同內識之不相續而歷多年劫相續不間斷耶既外色不同于內心明知離心有外實色何言一切皆是唯識故宗鏡出答意云名言熏習𫝑力起故等也謂此但由一切有情無始時來前後遞互以名言虛妄熏習作心外堅住相續等解由此𫝑力有此相現非是真實有心外堅住色等也外又問云既言唯識有情何要變似外色而現釋云與染淨法為依處故謂于色處迷執為實曰顛倒從此雜染二障是生此若無者應無顛倒便無雜染亦無淨法是故諸識亦似色現如攝論云所變色相之亂相能變心體之亂體應許為色識亂相及非色識心體若體相俱無染淨亦無亦可所變之色既無能變之識亦無曰若無餘亦無五答現量違宗難色等外境分明見證現量所得寧為無現量證時不執為外後意分別妄生外想故現量境是自相分識所變故亦說為有意識所執外實色等妄計有故說彼為無又色等境非色似色非外似外如夢所緣不可執為是實外色以現量難非唯識即以現量答是唯識也初小乘難次大乘答宗鏡出小乘難云且如外五塵色境分明五識現證是現量所得大小乘皆共極成何故無言一切唯識意謂比量非量遍計所起遍計所執強思計度搆畫而生相分不離于心可成唯識今五識既現量得外實五塵者何故亦言皆是唯識答中有二初正答所難二彼實情謂五現量識緣五塵時得法自性不𭘧名言無籌度心不生分別不執為外後念分別意識妄生分別便執為外言有實境故現量境是五識親自相分由五識自證分所變故亦說為有後念分別意起時妄執心外有其實境此即是無而現量所得豈為無耶𨿽然不可因說是有遂執是實是外以色等境非色似色非外似外如夢所緣所緣不出夢中不可執實夢外之色也問小乘許現量心中不執為外與大乘何別答大乘即五識同時意識皆現量不執為外小乘唯是五識不執為外問五現量境既言是有則境已非無豈得成唯而境有耶答此對意識妄計之無為有耳究竟則相分不離見分見分不離自證豈非唯識問五識中瞋等起時不稱本質何言唯是現量答𨿽不稱本質然稱相分亦是現量由心無執故第六意識相應瞋若與執俱時相本二皆不稱若不與執俱時起即同五識故五現量緣境不執為外皆是唯識六答夢覺相違難若覺時色皆如夢境不離識者如從夢覺知彼唯心何故覺時于自色境不知唯識如夢未覺不能自知要至覺時方能追覺覺時境色應知亦爾未真覺位不能自知至真覺時亦能追覺未得真覺恆處夢中故佛說為生長夜由斯未了色境唯識承上以夢覺相違難唯識即以覺夢不違答唯識也初小乘難問次大乘答難牒前難云汝謂覺時境色皆如夢境不離唯識法喻似齊我謂法喻不齊何則若覺時色皆如夢境不離識者如從夢覺知彼唯心則正當覺時應知唯識何故覺時于自色境不知唯識耶此蓋不喻白日之覺即黑夜之夢竟以覺為覺矣故答云我謂覺夢正齊何則如夢未覺不能自知夢境唯心要至覺時方能追覺夢境唯識真覺之時境色亦爾未得真如智覺不能自知三界唯心至真覺時亦能追覺所緣唯識未得真覺恆處夢中則夢時固夢醒覺亦孰非夢耶故佛說為生長夜由斯未了色境唯識則其法喻亦何不齊之有七答外取他心難外色實無可非內識境他心實有寧非自所緣誰說他心非自識境但不說彼是親所緣謂識生時無實作用非如手等親執外物日等舒光親照外境但如鏡等似外境現名了他心非親能了親所了者謂自所變故契經言無有少法能取餘法但識生時似彼相現名取彼物如緣他心色等亦爾以外取他心難唯識即以能了他心答唯識也初小乘難問次大乘答難難中先縱後奪承上縱云汝言心外之色實無唯內識境可非內識境耶奪云且如他心實有寧非自識所緣意謂若此人心緣他人心著即離此人心別有他心為境若此人心緣他人心不著者即有境而不緣緣著即乖唯識不著則何成他心智耶答中初標二釋三證標答云誰說他心非自識境但不說彼是親所緣耳是自識境非親所緣者謂此人心緣他人心識生之時託他人心為本質變起相分當情無實作用非如手等親執外物日等舒光親照外境緣他人心時但如鏡中影似外質現鏡像無實作用然非無他人心體故名了他心即知他心相分不離自心亦是唯識但非親能了耳親所了者謂自識變如解深密經意云能取是心所取亦心無有少法能取餘法而有所緣相現者但自識生時似彼相現耳如緣他人心但託他人心為本質自變相分緣而非親緣則緣他人浮塵根相分色亦但託為本質自變相分緣亦不親得如自身眼識緣第八識所變器世間色時亦但托為質亦不得親耳等四識緣本識所變聲等亦然也豈了取他心違唯識耶八答異境非識難既有異境何名唯識竒哉固執觸處生疑豈唯識教但說一識不爾如何汝應諦聽若唯一識寧有十方凡聖尊𤰞因果等別誰為誰說何法何求故唯識言有深意趣識言總顯一切有情各有八識六位心所所變相見分位差別及彼空理所顯真如識自相故識相應故二所變故三分位故四實性故如是諸法皆不離識總立識名唯言但愚夫所執定離諸識實有色等若如是知唯識教意便能無倒善資糧速入法空證無上覺救含識生輪𢌞非全無惡取空者違背教理能成是事故定應信一切唯識此以異境難非唯識即以境非一人答是唯識也初正難二責難三重問四斥過五正釋六勸信小乘承上難云既言此人緣他人心時託他人心為本質自變相分緣者即相分不離此人心是唯識義若他人心本質緣不著者即離此人心外有他人心既有異境何成唯識蓋以離此人心外有他人心即為異境是謂唯識者唯說一人之識矣故責云竒哉固執觸處生疑𨿽本質離自識有然不離他人能變之心不違唯識若離自心即非唯識者豈唯識教唯說一人之識耶問云不說一人之識說將如何誡聽而斥過云汝應諦聽若聖教唯說一人之識者寧有六凡四聖尊𤰞因果等別若無佛者衆生何求若無凡夫佛為誰說如是等事皆不成就其過可勝道哉乃正釋云故唯識之言有深意趣總顯一切有情各有八識識自性故六位心所識相應故所變相見二所變故分位差別即不相應行是前三分位故及彼空理所顯真如即前四之實性故如是百法皆不離識總立識名唯言但愚夫所執定離諸識外實色等不內識所變不離諸識色等諸法復勸信云若如是了知唯識教意便能無倒善備資糧速入法空證無上覺而自利救含識生輪𢌞而利他非全無惡取空者違背教理能成是二利之事也故定應信一切唯識安得謂有異境而難唯識耶以上第三問答料簡竟連前所變唯識中四科內第一正明我法唯識竟二料簡分別唯識二初本論二論釋初本論若唯有識都無外緣由何而生種種分別頌曰由一切種識如是如是變以展轉力故彼彼分別生亦可此是小乘于九難之後總申一難大乘舉頌為答也二論釋二初略釋二廣釋初略釋五初釋首句二釋次句三釋三句四釋四句五總釋意初釋首句論曰一切種識謂本識中能生自果功能差別此生等流異熟士用增上果故名一切種除離繫者非種生故彼𨿽可證而非種果要現起道斷結得故有展轉義非此所說此說能生分別種故此識為體故立識名種離本識無別性故種識二言簡非種識有識非種種非識故又種識言顯識中種非持種識後當說故初總釋下四字次別釋下三字三釋除離繫果四單釋一識字五簡顯釋識種釋四字者本識謂第八是釋識字能生自果功能是釋種字差別是釋一切謂第八識中一切種曰一切種識也別釋三字者此功能生等流同因之果生異熟異因之果生士用因果俱有之果生增上𦔳因共感之果所生之果既多能生之因非一曰一切種也釋除離繫果者一正釋除意二釋通難果三釋通難種除意者約所生現果顯能生種因離繫既非分別種生將何所顯故除之也通難果者難云離繫可證豈非是果曰非種生之果者何通云彼𨿽可證非分別種家之果要現起真無漏道斷盡結惑而後得此果故也復難云此現起道豈非種生曰不從種生者又何也答此𨿽從種生望于彼果有展轉義然非此中正意所說此說能生分別種彼是無漏清淨種故也單釋識字者識為種體性種為識相分以種離本識無有別性故立識名也簡顯釋種識者種識二字合說簡非種識以現識名識而非種種子名種而非識今簡非彼故名種識亦可識非種簡前七種非識簡外種又種識二言顯本識中所持之種非顯能持種子之識後當說故指下因緣中廣說種子五果之義亦見後文二釋次句此識中種餘緣𦔳故即便如是如是轉變謂從生位轉至熟時顯變種多重言如是謂一切種攝三熏習共不共等識種盡故餘緣𦔳故原如是如是轉變之由也謂識中種得現識等餘緣輔𦔳之力即從生位轉至熟時明如是如是轉變之相也又顯變種多故重言如是謂一切種三字攝名言我執有支三熏習及共種不共種等識種皆盡故也三釋三句展轉力者謂八現識及彼相應相見分等彼皆互有相𦔳力故互有相𦔳正展轉力也彼皆互有者現識相應相見望于種子皆有𦔳力曰展轉亦可此現𦔳彼種彼現𦔳此種亦曰展轉四釋四句即現識等總名分別虛妄分別為自性故分別類多故言彼彼即現識等總名分別者即從種所生八種現行識及心所等總名分別也虛妄分別為自性者出總名之由也分別類多者性界受地現比量等其類實繁故言彼彼五總釋意此頌意說𨿽無外緣由本識中有一切種轉變差別及以現行八種識等展轉力故彼彼分別而亦得生何假外緣方起分別諸淨法起應知亦然淨種現行為緣生故此總顯頌意以答也意謂汝難無外緣識如何生不知𨿽無外緣而以本識多種現識多𦔳變多分別何假外緣而方生耶染既如此諸淨法起淨種現行緣生亦然二廣釋二初問答標數二詳釋緣生初問答標數所說種現緣生分別云何應知此緣生相緣且有四問意謂前答種現俱可為緣能生種種分別然云何應知此緣生起何法為何緣之相下答中種現𨿽皆因緣而餘之三緣不離現行即種現為緣生相也二詳釋緣生三初且明四緣二旁論十因三正論緣生初且明四緣四初明親因緣二明無間緣三明所緣緣四明增上緣初明親因緣一因緣謂有為法親辦自果此體有二一種子二現行種子者謂本識中善染無記諸界地等功能差別能引次後自類功能及起同時自類現果此唯望彼是因緣性現行者謂七轉識及彼相應所變相見性界地等除佛果善極劣無記餘熏本識生自類種此唯望彼是因緣性第八心品無所熏故非簡所依獨能熏故極微圓故不熏成種現行同類展轉相望皆非因緣自種生故一切異類展轉相望亦非因緣不親生故有說異類同類現行展轉相望為因緣者應知假說或隨轉門有唯說種是因緣性彼依顯勝非盡理說聖說轉識與阿賴耶展轉相望為因緣故初標列名體二解釋因緣三簡非因緣因緣者感果曰因𦔳生曰緣親辦自果有𦔳生義因即是緣曰因緣有為者有簡無體法為表有作用大約除法界外餘色心等並屬有為種子謂本識中三性三界九地等差別功能名種子即一切種也能引次後功能即種生種及起同時自類現果即種生現此唯望彼是因緣性者此指差別功能彼指次後自類功能及同時自類現果種引種是異時種生現是同時故現行者謂七轉識與彼相應心所及所變相見性界地等差別諸法皆名現行即此差別現行唯除佛果善轉識等及三性中極劣無記餘一切法熏根本識生自類種此轉識等望彼自類種是因緣性恐問何為前七及彼相應只熏本識不言本識心所釋云以第八心品非所熏故恐又問云性界地等唯是所依何亦能熏釋云能所依法皆是能熏非是簡去所依界地非能熏獨取能依七轉識等為能熏故恐更問云能熏法中何除佛果及極劣無記釋云劣無記極微劣故佛果善極圓滿故因此二法不熏成種是以除之耳簡非因緣者心現望心現色現望色現曰同類現行同類展轉相望皆非因緣但可為等無間緣謂現行從自種子生非現行生現行故也如宗鏡云種引種名親因緣前念已滅後念已生即前念體親引後念故也現引現亦是前念親引後念名等流者為已有種故前念種子生前念現行其前念種子流至後來還生第二念現行則知後念現行不是前念親生故非因緣也色現望心現心現望色現曰異類一切異類展轉相望亦非因緣不親生故但可為增上以有𦔳生義故耳然有說同類異類現行展轉相望為因緣者應知是假說非真說隨宜說非究竟說也有唯說種望現行為因緣不許種望種現望種為因緣者當知種生現因隱果現比餘二顯勝從顯勝說非為盡理何則聖說轉識與阿賴耶展轉相望為因緣故如炷與𦦨展轉生燒故因緣性定應有二謂種與現二明無間緣三初正釋二料簡三歷明初正釋二等無間緣謂八現識及彼心所前聚于後自類無間等而開導令彼定生八現識者謂前聚八種現行識及彼八種現識心所于後自類平等開導令彼後聚自類决定得生然八現王所是明此緣體顯色無為不相應等非緣體也前聚于後為緣顯同時非緣及後聚不可以為前緣也自類者如眼識王所為自類對耳識王所便為他類八現皆然見他類不可以為緣也無間者𨿽前為後緣中間無有自類間隔等者能引所引力用齊等謂一引一聚一聚酬一一聚引一一酬一聚一聚引一聚一聚酬一聚一引一法一法酬一又此論緣故兼王所若論依則單取八識心王如前已辨二料簡多同類種俱時轉故如不相應非此緣攝由斯八識非互為緣心所與心𨿽恆俱轉而相應故和合似一不可施設離別殊異故得互作等無間緣入無餘心最極微劣無開導用又無當起等無間法故非此緣云何知然論有誠說若此識等無間彼識等决定生即說此是彼等無間緣故料簡于緣使知所去取也初俱轉非緣次開相應是緣三簡無餘非緣四證無餘非緣同類者以心對色心與色為異心與心為同類也多同類者如多個眼識種子曰多同類乃至多個意識種子等皆多同類也俱時轉者謂多同類種子俱時生多同類現行也如不相應者謂彼此別異非等無間所攝由斯義故八識俱轉非互為緣夫上曰自類此曰同類上曰前後此曰俱時上曰八現王所此曰種生現行名言簡別已精矣更總言之是去種生現行由俱時轉無前後之義故非此緣恐有難云心與心所亦恆俱轉何故偏能互作等無間緣耶故為開云𨿽恆俱轉而相應故心與心所同所依根同所緣境同一性攝同一剎那定俱生滅如衆燈明和合似一不可施設離別殊異一開導時餘亦開導故得互作等無間緣恐又難云既八識皆有此緣入無餘心亦應有此何故定無故為簡云以其身智俱泯一入永入最極微劣前無開導之用後無當起之法是以非此緣所攝耳證之于論則云若此識等無間彼識决定生蓋言即說前識是後識等無間緣今無餘心既無此義故非所緣也三歷明四初明第八等無間緣二明第七等無間緣三明第六等無間緣四明五識等無間緣初明第八等無間緣即依此義應作是說阿陀那識三界九地皆容互作等無間緣下上生相開等故有漏無間有無漏生無漏定無生有漏者鏡智起已必無斷故善與無記相望亦然此何界後引生無漏或從色界或欲界後謂諸異生求佛果者定色界後引生無漏後必生在淨居天上大自在宮得菩提故二乘𢌞趣大菩提者定欲界後引生無漏𢌞趣留身唯欲界故彼𨿽必往大自在宮方得成佛而本願力所留生身是欲界故有義色界亦有聲聞𢌞趣大乘願留身者既與教理俱不相違是故聲聞第八無漏色界心後亦得現前然五淨居無𢌞趣者經不說彼發大心故初明界地下上更互引生次明無漏起依界地有別即依此義應作是說者從此第八貫下五識明昧異故之文云是說也以皆此識等無間彼識等决定生義故也陀那于諸界地皆容互作此緣者以下地時心即作上地生時心等無間緣上界已生下亦然互相開導其義均故有漏無間有無漏生者菩金剛喻定現在前時斷異熟識成無垢識故無漏定無生有漏者以大圓鏡智起已盡未來際必無斷故豈有當生有漏心理此唯約佛餘無有分若以性言則異熟無記無間有無垢善識生無垢淨識定不生無記異熟故云相望亦然無漏始起界地者或從色界或從欲界從色界者謂直往根器諸異生輩求佛果者定于色界後心此第八識引生無漏以因行既滿將成佛時後必生在淨居色究竟天得菩提故從欲界者其說不同一謂二乘𢌞心趣大菩提者第八定于欲界後引生無漏以所留不受後有之身唯欲界故恐難云然彼必往大自在天宮方後成佛何故唯欲界耶故通云彼𨿽必往而本願力所留生身是欲界故一謂色界亦有聲聞𢌞趣大乘願留身者既與教理俱合是故聲聞第八無漏色界心後亦得現前恐又難云既聲聞于色界後引生無漏則五淨居宜有𢌞趣而乃無者何耶故通云經說五淨居無𢌞趣者唯說不發大心之定性聲聞耳較量二說欲色皆有為是二明第七等無間緣第七轉識三界九地亦容互作等無間緣隨第八識生處繫故有漏無漏容互相生十地位中得相引故善與無記相望亦然于無記中染與不染亦相間導生空智果前後位中得相引故此欲色界有漏得與無漏相生非無色界地上菩不生彼故初明界地得互為緣次簡無色界非互相生隨生處繫者第八生于何處第七即繫屬于何處執第八為我故出界地亦容互作之由也十地位中得相引者漏與無漏相間而起正互相生之由也以末那是因中轉智不同第八唯在果上是以七與第八轉有三品初地下品轉八地中品轉等覺上品轉下品初轉未純無漏故與有漏得互相引故云十地位中出觀入觀漏無漏相間而起也前五第八唯上品轉故得無漏時不生有漏善與無記相望亦然者無漏唯善與有覆無記之有漏亦互相生也于無記中生空智起名為不染智不起時亦名為染前位亦為後位引故曰染與不染亦互相開導也地上菩不生無色正漏與無漏相生唯欲色二界之由也問云何有漏無漏相間而起答如五卷云滅定既是聖道等流極寂靜故此亦非有由未永斷此種子故從聖道起已此復現行乃至未滅此即無漏引生有漏也三明第六等無間緣第六轉識三界九