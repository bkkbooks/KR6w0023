變為此不應理故非諸有情種皆等故應說此品踈所緣緣一切位中有無不定初唯有親緣而無踈二不唯有親亦定有踈三破前俱不應理破唯親緣不應理者自他身土可互受用他所變者為自質故而今言唯親身土無互用為質義矣豈理也哉定有踈緣不應理者踈緣中應須簡別身土可互種子不然自種于他無受用理他變為此不應理故非五性差別諸有情種皆等故而可共受用也今言定有則身土與種渾而不分豈理也哉正義云何應說此品踈所緣緣已轉未轉一切位中有無不定而非可言定有定無也問因中緣自三境唯是親緣無論矣踈緣何謂不定耶答因位之時若在色界緣他浮塵根及異器界託之為質容有踈緣若在無色根器既無以何為質而有踈緣果位之時緣他身異界即託之為質得有踈緣若緣自境及緣真如併緣過去無體法時即無本質踈緣將安在哉故云有無不定然總其正意是第八于所緣緣中具親踈二種踈中身土互用種子定無互用之中有無仍不定也二第七所緣緣第七心品未轉依位是俱生故必仗外質故亦定有踈所緣緣已轉依位此非定有緣真如等無外質故未轉是俱生故必仗外質者一以俱生我執恆相應故必仗第八見分為質起自我相一以俱生無力必仗外質而起自相故定有踈所緣緣已轉非定有者緣無垢識為無我境亦仗外質根本智緣真如踈將安在後得智緣真如亦仗外質無漏第七緣過去及無體法踈將安在故云不定有也三第六所緣緣第六心品行相猛利于一切位能自在轉所仗外質或有或無踈所緣緣有無不定一切位即已轉未轉能自在轉者以勇猛快利不為他法之所拘故有無不定者非定有無以同時意識緣現在境所仗質有獨頭散意識緣過未境所仗質無故等也四前五所緣緣前五心品未轉依位粗鈍劣故必仗外質故亦定有踈所緣緣已轉依位此非定有緣過未等無外質故粗比前三不細鈍劣復不利勝也以所緣現在之法必仗外質方起內所慮託故定有踈所緣緣已轉能緣三世而緣過未時質將安在故踈非定有是則五于踈所緣緣未轉定有已轉不定有也若分別本質相分有無應作四句一有本質相分是實性境即前五識及明了意識初念少分獨頭意識二有本質相分是假即有質獨影及𭘧質境是三無質相分是假即無質獨影是四無質相分是實性境即第八心王緣三境并本智緣真如是也以上具宗鏡七十七十一卷詳辨四明增上緣二初總明二別顯初總明四增上緣謂若有法有勝𫝑用能于餘法或順或違𨿽前三緣亦是增上而今第四除彼取餘為顯諸緣差別相故此順違用于四處轉生住成得四事別故如宗鏡云謂若有法亦是有體即依圓二性此簡所執意謂無體法即我法等也有勝𫝑用謂為勝義即有為無為有勝𫝑用此用非是與果等用但不障意顯是增上用簡非因緣也能于餘法者簡其自體顯不同前所緣緣故或順或違者顯與順逆俱能為緣與後生異法為緣非前滅法意簡非等無間緣也恐有問云前三亦是增上而今獨此名者何耶故答云四緣之名有通有別通名增上別名因緣等前三從別立名第四名從通立故云𨿽前三亦是而今第四除彼取餘為顯諸緣差別相故恐又問云前云能于餘法或順或違未餘法為何答云此順違用于四處轉謂生住成得四事別故四處即四事處無而忽有生已暫止完足無缺自在不失皆不離順違不障增上之緣力故曰於四處轉即與後生異法為緣也又若總論此緣所含頗多有順有違有力無力有親有踈順如諸波羅蜜行門等以順性等故違如智起惑斷以能違諸惑障故有力如五根等能出自心心所故無力如他人浮塵等𨿽能益我而為力稍踈劣故自根即親他根即名踈增上故違用可名為順違惑即順二空理故又本文單云有勝𫝑用即順違皆勝而言踈言無力似與相違不知分別則勝劣親踈不妨𭓩然總之皆歸增上緣故踈𦔳親而親愈勝無力𦔳力而𫝑力益增上故為無為別情非情殊生住成得莫不皆增上于此緣故增上緣海廣大無不攝故二別顯二初釋二結初釋五初約勝總標根數二釋出十九根體三未知當知根體四釋出已知根體五釋出具知根體初約勝總標根數然增上用隨事𨿽多而勝顯者唯二十二應知即是二十二根但約勝顯其餘隱劣自該故唯言二十二根也皆勝顯者如中邉論釋云眼等六根取境有增上義命根一期相續有增上義男女二根續于家族有增上義樂等五根受用善惡業果有增上義信等五根于世間淨有增上義未知當知等三根于出世淨有增上義則總約六事而釋勝顯之增上也二釋出十九根體前五色根以本識等所變眼等淨色為性男女二根身根所攝故即以彼少分為性命根但依本識親種分位假立非別有性意根總以八識為性五受根如應各自受為性信等五根即以信等及善念等而為自性體者二十二根皆有增上緣用用生于體體不明用不明矣故當出體本識等等即種子淨色如淨醍醐謂清淨四大是也所變者以本識種子是能變故身根攝故即以彼身根少分為二根性者此少分體比一身分其要有四能出生故利知覺故速轉變故總脈絡故非餘少分之可比也命根但依本識親種分位假立為性者顯命根自無有體以第八自種分位假立為體所謂種子上一分連持色心不斷功能是也意根以八識為體謂等無間意根以八現識皆隨意轉如瑜伽謂依止隨自在轉增上義故建立一根五受各以自受為體者如苦受以苦為體樂受以樂為體等也信等五根即以信等及善念為體者信進二根即以善位信勤為體念定慧三根即以別境善念等為體也三未知當知根體未知當知根體位有三種一根本位謂在見道除後剎那無所未知可當知故二加行位謂暖頂忍世第一法近能引發根本位故三資糧位謂從為得諦現觀故發起决定勝善法欲乃至未得順决擇分所有善根名資糧位能逺資生根本位故于此三位信等五根意喜樂捨為此根性加行等位于後勝法求證愁戚亦有憂根非正善根故多不說前三無色有此根者有勝見道傍修得故或二乘位𢌞趣大者為證法空地前亦起九地所攝生空無漏彼皆菩此根攝故菩見道亦有此根但說地前以時促故初明位二出體三簡別謂此根所具之位位根所為之體前三無色菩起此𢌞趣聲聞地前亦起多種不同是以既明其位復出其體而更為簡別之也大意如此詳之則未知當知者未知之道而當知之也曰未知當知根者謂從能逺資生根本位之資糧造至近能引發根本位之加行至正在見道第十五心之根本位自前至此譬如當得之城池于未得之時攻之攻之攻至此際當得未得之心何其能持何其能生而一假不可搖者故曰未知當知根也根本位者此根以見道為根本故除後一剎那無所未知可當知者謂八忍八智名十六心亦曰十六剎那前十五心得名見道由見所未曾見諦故後一剎那由熏習所曾見故屬修道攝已知法性無所未知可當知故故除之也順决擇分所有善根者謂加行位釋見後文于此三位信等九根為此根性者出三位未知當知根體也然雜集論說加行道時順决擇分後于上解脫希求欲證愁戚所攝故加行等位亦有憂根為此根性今不言者以非正善根故多不說也若夫無色四天前三亦有此根者以有勝見道傍修得故謂决擇分善在四靜慮有勝見道菩兼修上定故三無色亦有此根或二乘位為證法空地前亦起者未知當知根二乘極果生空無漏對菩言位齊八地若𢌞趣大乘求證法空其位僅在資糧故言地前亦起所以然者彼于生空𨿽已具知今既𢌞心于法空理乃所當了所證九地生空無漏應是菩未知當知根所攝以未證入法空理故恐有問云𢌞趣菩于見道位亦有此根何故但說地前而不言見道耶答云以時促故謂見道位唯有十五心其時甚促故不說見道而唯說地前起此根也四釋出已知根體始從見道最後剎那乃至金剛喻定所有信等無漏九根皆是已知根性未離欲者于上解脫求證愁戚亦有憂根非正善根故多不說初釋體二通妨既見道已無未知當知故云已知屬修位也始從見道最後剎那即已知根初心乃至者自最後剎那望金剛喻定中間有多位故而此定通三一二乘那含後心為斷最後有頂九品俱生煩𢚰得起此定二菩行地滿心為永斷三界俱生一切煩𢚰亦起此定三菩法雲地後心為永斷一切煩𢚰種子及最後一分所知障故亦起此定所有無漏九根皆是已知根性者正出體也五釋出具知根體諸無學位無漏九根一切皆是具知根性有頂𨿽有遊觀無漏而不明利非後三根初正釋二通妨具知具足之知而具有不同各約當分言也諸無學者一二乘無學于生空理究盡無餘固名具知二大乘無學若八地已上諸菩等具證人空分證法空亦名具知若如來二障永盡一真全顯是圓滿具知無漏九根皆是性者出具知根體也恐有難云入滅盡定依有頂遊觀無漏前三無色既云有無漏根何獨有頂非無漏攝釋云不明利故非後三根以第八非非想定𨿽止觀並行將入滅盡必依此定遊觀無漏而意偏于定慧不明利是以非後三根攝如瑜伽謂非非想處止有八根謂命意捨根及信等五根而無後三根故二結二十二根自性如是諸餘門義如論應知諸餘門者謂二十二根業用假實及界繫等分別也如論者詳如瑜伽論中五十七卷茲不繁引上初且明四緣竟若更總之因緣于有為之門親辦自果無間為開導之義萬有咸生所緣具慮託二義親踈俱立增上有勝𫝑力不障他緣則四緣囊括殆無遺矣大明國直蘇州府吳縣至德鄉十一都何山土地顧明大王界天平山居住信官范𠃔臨喜捨刻此唯識訂正第七卷保佑新生子佛扈福德長壽智慧聰明無關無煞吉祥如意崇禎四年歲次辛未孟冬佛誕日謹識賢預姑蘇信女張門李氏大緣𦔳板
