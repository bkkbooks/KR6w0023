body:
  text: 成唯識論訂正序似空伸公閉關山中訂正成唯識論三年而後成曰吾以成先之志也善似公為蓮池大高弟子云余自癸卯嵗昭淺似公于花山忱然影曰天生蓮乃有是弟子能以無礙之才闡篤實之光輝天生似公乃有蓮為之能以不動之妙智域不住之圎想唯克領受斯法器吾友茅菴極擊莭于轉言而今三十年來似公學彌深功彌勒著述彌富若金剛八識規𭑌宗風玄暢至唯識訂正而圎融自布理事只有條貫無遺矣善真如即相即性即理即事即無即有即圎融即行布而法界一迷生滅生滅能取為見所取為相八萬四千樊然教梵隨緣逐境粘殢顛倒為輪廽根本而揔歸之八識然八識本無垢以七識執之而成垢七識本無執六識牽之而成執則夫散入㝎染入淨凡入又豈能外于識之力也故不研相宗而欲明性是蹈空而行也不研性識而欲明相是舍茷而渡也訂正之功其可少乎讀是編者當知似公之苦心直抉流浪之源能脫生死之關上追慈恩之古疏不負佛面之奇徵而自內他外一時俱銷我相銷識情自盡頓入覺地而不自知矣若八識田中但存語立文字之𮗚則捫籥扣盤轉展執相受熏持種纏縛僉守即日修萬行要不種于凡夫之心量而已矣慈恩教兩亦在善于領受者乎崇禎壬申十月朔文震孟題于竺塢草庵刻唯識訂正題辭唯識一宗十師論頌於西竺稱浩博矣奘師傳譯東歸卷束為十文字簡奧句義幽密繇唐迄今解者十家互有短長本師蓮池和尚病之特命空師訂正守一與師同事本師四十年耳目最真空師苦心𢲅關三載書始成出以示一弟筆花靈秀義意精密綱舉目張提掇玄妙大得先師疏鈔作法故幽晦深隱者頓使昭瑩條暢空師從白淨識中照了王所百法故能纖悉洞逹乃爾真識宗之功臣矣上不負本師委托下可開來學無窮一弟曷勝欣慰敬刻首帙併題語為之左證云崇禎三年八月中秋日雲棲法弟宋守一稽首書
