body:
  text: 古杭雲棲寺弟子廣伸述二攝屬二障二初明所攝二顯斷位初明所攝此十一障二障所攝前標十障今舉十一以十地斷障後復有著礙二愚名有餘障故云十一如深密謂善男子此諸地中有二十二種愚癡十一種粗重是也瑜伽亦云永斷最極微細煩惱及所知障無著無礙等二障所攝今云二障所攝者煩惱所知二障攝前十一障也又含異生在分別攝餘俱生攝必攝屬者博反約故有綱領故二顯斷位三初通釋諸位斷義二別彰三位斷義三詳種頓漸斷義初通釋諸位斷義煩惱障中見所斷種於極喜地見道初斷彼障現起地前已伏修所斷種金剛喻定現在前時一切頓斷彼障現起地前漸伏初地已上能頓伏盡令永不行如阿羅漢由故意力前七地中雖暫現起而不為失八地已上畢竟不行所知障中見所斷種於極喜地見道初斷彼障現起地前已伏修所斷種於十地中漸次斷滅金剛喻定現在前時方永斷盡彼障現起地前漸伏乃至十地方永斷盡八地以上六識俱者不復現行無漏觀心及果相續能違彼故第七俱者猶可現行法空智果起位方伏前五轉識設未轉依無漏伏故障不現起初釋煩惱斷位次釋所知斷位煩惱中自又兩節謂始至地前漸伏釋煩惱見修所斷種現之位次至畢竟不行是通妨難應有問云既如羅漢令永不行如何前四地猶起我見七地已前猶起貪瞋等耶故通云為化衆生故意力起故前七地中雖暫現起而不為失直至八地已上道力殊勝始得畢竟不行耳釋所知斷位中亦又兩𫨻初至方永斷盡明所知見修所斷種現之位次八地已上之下明諸識相應有現否不同無漏觀心第六識心也及果相續生空智果也能違彼者八地已去生空智果及所依心王皆以轉成無漏與同聚所知障相違所以不復現行第七識俱猶可現行者第七相應法我見等四種以微細故八地已上猶現行也法空智果起位方伏者至第十地法空智果起時方乃伏盡也前五轉識設未轉依無漏伏故障不現起者前五識俱法貪瞋癡三種所知八地已上雖未轉依為第六識無漏觀心之所伏故亦不現起也二別彰三位斷義雖於修道十地位中皆不斷滅煩惱障種而彼粗重亦漸斷滅由斯故説二障粗重一一皆有三位斷義雖諸位中皆斷粗重而三位顯是故偏説別彰斷義以釋難也初正釋二重通修道十地位中皆不斷滅煩惱障種此句即難辭著一雖字便即難辭為釋辭難辭謂據上通釋諸位斷義於修道位中皆不斷滅煩惱障種何故前云修習位俱斷二障及粗重耶釋云雖於修道位皆不斷滅煩惱障種然斷所知時而彼煩惱粗重如無堪任性者亦漸斷滅由斯故説煩惱所知二障粗重一一皆有三位斷義謂通逹位頓斷煩惱所知分別種修道位漸斷煩惱所知俱生種現等覺位斷盡煩惱所知俱生種子由此觀之但不斷滅非不漸斷也恐又問云若唯三位斷粗重則資糧加行皆不斷粗重耶故重通云雖諸位中皆斷粗重而三位顯是故偏説非偏於三位能斷餘位全不斷也三詳種頓漸斷義二初徴問二答釋初徴問斷二障種漸頓云何問意謂二障斷義約位通別雖彰然種現互陳頓漸猶未詳盡單約二種詳分頓漸斷當云何耶二答釋二初釋所斷二釋能斷初釋所斷第七識俱煩惱障種三乘將得無學果時一剎那中三界頓斷所知障種將成佛時一剎那中一切頓斷任運內起無粗細故餘六識俱煩惱障種見所斷者三乘見位真見道中一切頓斷修所斷者隨其所應一類二乘三界九地一一漸次九品別斷一類二乘三界九地合為一聚九品別斷菩要起金剛喻定一剎那中三界頓斷所知障種初地初心頓斷一切見所斷者修所斷者後於十地修道位中漸次而斷乃至正起金剛喻定一剎那中方皆斷盡通緣內外粗細境生品類差別有衆多故初約七識相應二障種斷義二約六識相應二障種斷義七識相應俱生煩惱障種以第七不能入生空觀無漸斷義故三乘將得羅漢獨覺如來無學果時一剎那中三界頓斷若第七識相應俱生所知障種菩將成佛時一剎那中一切頓斷以此任運內起執於第八不緣於外境唯一類無有粗細故唯頓斷此七識相應俱生二障之頓斷也餘六識俱煩惱障種見道所斷分別起者三乘見道位中一切頓斷修道所斷俱生起者三乘隨其所應斷有頓漸謂二乘頓漸大乘頓斷二乘頓漸者一類漸根於三界九地每地九品先斷五趣雜居地九品次斷離生喜樂地九品乃至最後斷非非想地九品漸次九品別斷而成阿羅漢一類頓根二乘更有上中下別於三界九地俱惑合為一聚共為九品上根頓斷九品中根先斷上三次斷中三後斷下三下根九品一一別斷先斷上上品次斷上中品乃至最後斷下下品故經謂預流果人有一生得阿羅漢者有二生五生乃至七生得阿羅漢道者是也大乘頓斷者菩要起金剛喻定一剎那中三界頓斷若六識相應所知障種即分別起者亦非關二乘唯在菩初地初心見道位中一切頓斷若修斷者不同煩惱三界頓斷要於修道十地位中漸次而斷乃至正起金剛喻定一剎那中方皆斷盡以此六識俱者通緣內外粗細境生品類差別有衆多故是以漸斷若總其大意二障不離六七二識七識二障不通分別唯俱生故三乘以及菩皆是頓斷六識二障通乎分別俱生分別煩惱三乘見位得以頓斷俱生煩惱小大之斷頓漸不同所知分別起者菩初地初心得以頓斷俱生起者十地修位斷亦漸次必至金剛喻定而始盡也二釋能斷二乘根鈍漸斷障時必各別起無間解脫加行勝進或別或總菩利根漸斷障位非要別起無間解脫剎那剎那能斷證故加行等四剎那剎那前後相望皆容俱有復釋能斷見大小利鈍不同也二乘根鈍漸斷障時必各別起等者謂無間斷惑解脫證理加行勝進或總或別總則俱時別分前後也菩剎那剎那能斷證者斷惑與證理同時非別起也加行等四即等勝進無間解脫三位皆容俱有者一剎那中四容俱有即四道同容於一剎那中也問二乘鈍利無論菩根性雖利亦須久經多劫佛道乃成何云剎那剎那能斷證耶曰此有三義一時雖無量攝在一剎那故云處夢謂經年悟乃須頃二精進修者時不覺長故云佛於無量劫勤勇謂須三雖説剎那剎那殊不可量故從初至後有多無間解脫勝進道故以上釋十障竟四釋十如二初正釋二通妨初正釋十初釋遍行至十業自在初釋遍行十真如者一遍行真如謂此真如二空所顯無有一法而不在故初標次釋下皆倣此遍謂遍滿行即行相謂此真如即所顯也二空我法二空即能顯也無有一法而不在正遍行也以初地施行斷異生性障空二分別隨眠證法界一分真理遍一切有為行無有一法非二空故曰遍行真如二釋最勝二最勝真如謂此真如具無邉德於一切法最為勝故具無邉德於一切法最勝之由也如惡病如怖畏如愚暗如惡道等乃一切法也今離垢地修行戒行逺離邪行犯戒之垢其所證真如戒德及具無邉德於大惡病為良藥於大怖畏為守護於愚暗為明燈乃至惡道海中為大船筏等豈非于一切法為最勝也耶故云最勝真如詳智論中三釋勝流三勝流真如謂此真如所流教法於餘教法極為勝故於餘教法極為勝者梁攝云從真如流出正體智正智流出後得智後得流出大悲心大悲流出十二部經名為勝流真如餘教法非證此真如之所流者今第三發光地修行忍行離暗鈍障具勝定總持流出無邉妙慧照大乘法故曰勝流真如四無攝受四無攝受真如謂此真如無所繫屬非我執等所依取故無所繫屬如世親云於此如中無計我所無攝我所如北洲人無繫屬故非我執等所依取謂非我執我慢我愛無明邉見等所依取故也無繫屬非依取正無攝受以第四𦦨慧地修精進行斷微細煩惱現行障得出世間所證法界名安住最勝菩提分法非一切之所管屬曰無攝受真如五類無別五類無別真如謂此真如類無差別非如眼等類有異故類無別者生𣵀槃皆平等故梁攝謂由此真如能令三世諸佛相續不異衆生迷此萬類差別諸佛證此居然不變故以難勝地修妙靜慮斷下般𣵀槃障真俗雙行所證法界畢竟無盡無有變異非如眼等隨諸有情各各差別類有異故曰類無別真如六無染淨六無染淨真如謂此真如本性無染亦不可説後方淨故謂此真如本性無染本性無淨可知亦不可説後方淨故不可説先曾染又可知以現前地修妙般若斷粗相現行障證得真如觀十二緣起法無染無淨名此真如為無染淨故表此真如本無染淨其不可説後方淨而無染曰無染淨真如七法無別七法無別真如謂此真如雖多教法種種安立而無異故教依如立教法既多如若有別不知教法雖種種安立曰法界曰法性曰實相曰無相等名有異而如無異也以逺行地修方便行斷細相現行障入妙無相觀證法無差別了種種教法皆同真如無有二相曰法無別真如八不增減八不增減真如謂此真如離增減執不隨淨染有增減故即此亦名相土自在所依真如謂若證得此真如已現相現土俱自在故第八不動地修行願行斷無相中作加行障所證真如名不增減謂此真如離增減執以染法減時不隨染法有減淨法增時不隨淨法有增真得無生法忍不見一法有增減故即此亦名相土自在所依真如謂此所證是相自在之所依止隨所欲相即能現前十身相作故謂此所證是土自在之所依止隨所欲土成金寶等即現前故九智自在九智自在所依真如謂若證得此真如已於無礙解得自在故謂第九善慧地修行力行斷利他不欲行障證得智自在所依真如謂若證得此真如已於四無礙解任運自在善説法要四無礙即智自在智自在是能依所證真如是所依言是智自在之所依止曰智自在所依真如十業自在十業自在等所依真如謂若證得此真如已普於一切神通作業總持定門皆自在故第十法雲地修妙智行等滿足斷諸法中未得自在障所證真如為神通之所依止所依既勝能依自殊故神通作業等皆得自在故名業自在等所依真如廣如淨名不思議品二通妨雖真如性實無差別而隨勝德假立十種雖初地中已逹一切而能證行猶未圓滿為令圓滿後後建立恐問真如之性實無有別別立十種何也故云雖真如性實無差別隨真如德假立差別不以名別性遂別也問云初地見理已逹一切名為遍行何必更立後九種耶故云雖逹一切而能證行猶未圓滿為令圓滿後後建立耳能證行即十波羅蜜又初約所證為妨二約能證為妨雖分能所所不離能德隨證行顯有淺深能不離所行由性德而證高下即能即所全所全能別而無別無別而別已上第四釋十如竟五釋轉依二初結前起後二正釋轉依初結前起後如是菩於十地中勇猛修行十種勝行斷十種障證十真如於二轉依便能證得二正釋轉依二初明位別二明義別初明位別二初總標二別釋初總標轉依位別略有六種二別釋六初損益轉二通逹轉三修習轉四圓滿轉五下劣轉六廣大轉初損益轉一損力益能轉謂初二位由習勝解及慚愧故損本識中染種𫝑力益本識內淨種功能雖未斷種實證轉依而漸伏現行亦名為轉初標列轉名二原釋損益三縱奪釋轉二位指資加謂資糧位具四力修六行發三心以聞熏修悟唯識性相具習勝解加行位起四思發四如實觀二取空具慚愧羞耻過惡也損益等者謂由習殊勝解及慚愧過惡之力故能損減依附異熟識中煩惱熏習染種發現之𫝑力增益依附異熟識中所習淨法起現之功能也恐疑此際尚未能斷障種何名為轉故先縱而後奪云雖未斷分別障種實證轉依以漸伏分別現行使之不行是亦轉其行於不行故亦名轉耳二通逹轉二通逹轉謂通逹位由見道力通逹真如斷分別生二障粗重證得一分真實轉依由見道力通逹真如者體會曰通逹能見諦理無壅塞也斷分別生二障粗重者頓斷分別我法二障種子也證得一分真實轉依者得根本智證遍行真如得一分真實轉依曰通逹轉三修習轉三修習轉謂修習位由修習十地行故漸斷俱生二障粗重漸次證得真實轉依攝大乘中説通逹轉在前六地有無相觀通逹真俗間雜現前令真非真現不現故説修習轉在後四地純無相觀長時現前勇猛修習斷餘粗重多令非真不顯現故初正釋修習二會通攝論數數修習十地十種勝行無間曰修習由數修習漸斷俱生我法種子漸證十種真實轉依曰轉是從初地後心至十地皆名修習轉也若證於攝論説通前六地皆名通逹轉以有相觀通俗無相觀逹真入無相觀真現而非真不現出無相觀真亦不現入有相觀則非真現而真不現也故名通逹轉説修習轉在後四地以無相觀長時現前勇猛修習斷餘粗重多令非真不現前故夫曰多令不現則無相觀之常現可知夫曰多令不現則非真之猶現可知而曰純無相觀者何也曰此對前之間雜曰純尅體而論純中猶有未純在也故八地已上方是真純愚謂前六後四充類至義之盡之言也亦可初地後心勝進入二地已來亦通修習轉故云修十地行故等也四圓滿轉四果圓滿轉謂究竟位由三大劫阿僧祇耶修習無邉難行勝行金剛喻定現在前時永斷本來一切粗重頓證佛果圓滿轉依窮未來際利樂無盡從資糧至加行可名相似轉從初地至十地可名分證轉唯此得名圓滿轉謂究竟位三大無數劫修習無邉勝行曰行圓滿自資糧至等覺無間道普光明等十大三昧金剛喻定現在前時永斷本來一切種盡曰斷圓滿至解脫道頓證佛果圓滿轉依曰證圓滿遡流窮源證由於斷斷由於修故曰由三大阿僧祗耶修習至於證圓滿也修之時義大矣哉窮未來際利樂無盡對上自利圓滿此名利生圓滿但利生無圓滿時窮未來際利樂無盡是謂圓滿利生耳圓滿利生故曰無盡五下劣轉五下劣轉謂二乘位專求自利厭苦欣寂唯能通逹生空真如斷煩惱種證真擇滅無勝堪能名下劣轉專求自利志下劣也厭苦欣寂行下劣也唯逹生空解下劣也斷煩惱種斷下劣也證真擇滅證下劣也無二利勝能等觀勝能大解勝能雙斷勝能雙證勝能故從初至證雖得名轉轉非殊勝眇目矬陋曰下劣轉六廣大轉六廣大轉謂大乘位為利他故趣大菩提生𣵀槃俱無欣厭具能通逹二空真如雙斷煩惱所知障種頓證無上菩提𣵀槃有勝堪能名廣大轉此中意説廣大轉依捨二粗重而證得故廣大轉上可知此中意説等簡定頌意也以頌言捨二粗重故便證得轉依者意取第六廣大轉依雖對菩唯取大乘因位而圓滿自在其中以云頓證無上菩提𣵀槃故也上正釋轉依中初明位別竟二明義別二初總標二別釋初總標轉依義別略有四種二別釋四初能轉道二所轉依三所轉捨四所轉得初能轉道二初正釋二料簡初正釋一能轉道此復有二一能伏道謂伏二障隨眠𫝑力令不引起二障現行此通有漏無漏二道加行根本後得三智隨其所應漸頓伏彼二能斷道謂能永斷二障隨眠此道定非有漏加行有漏曾習相執所引未泯相故加行趣求所證所引未成辦故能轉道對所轉依言能轉道有二一能伏道二能斷道能伏謂二障種有能生現行𫝑力修六行及加行等智伏之令不現起此通漏無漏道謂六行漸伏唯通有漏若加行智後得智漸伏通漏無漏若根本智頓伏唯通無漏故二能斷者謂起根本無分別智能永斷二障隨眠此能斷道不通有漏道及加行智二道中除有漏道三智中除加行智也除有漏者以有漏道是曾習相執所引未泯相故謂第七念念執我令第六所行施等不能亡相雖有漏道常起現行而不為損亦無所益故能斷道唯取無漏除加行者以加行之智雖勤勇趣求而於所證真如之理所引根本之智未能成辦故除之也此能轉道之差別如此二料簡有義根本無分別智親證二空所顯真理無境相故能斷隨眠後得不然故非斷道有義後得無分別智雖不親證二空真理無力能斷迷理隨眠而於安立非安立相明了現前無倒證故亦能永斷迷事隨眠故瑜伽説修道位中有出世斷道世出世斷道無純世間道能永害隨眠是曾習故相執引故由斯理趣諸見所斷及修所斷迷理隨眠唯有根本無分別智親證理故能正斷彼餘修所斷迷事隨眠根本後得俱能正斷初師唯取根本智能斷隨眠次師雙取以根本能斷迷理迷事隨眠後得亦斷迷事隨眠證之於瑜伽則修道位中根本智名出世斷道後得名世出世斷道加行名純世間道無能永害等者以唯在地前伏除分別二障現行不能永害隨眠也曾習故相執引故出所以如前所釋由斯理趣諸見所斷及修所斷迷理隨眠唯根本無分別智親證理故能正斷彼餘修所斷迷事隨眠根後俱能正斷較量二説此説為正迷理事者別迷心曰迷理任運迷境曰迷事又迷己為物曰迷理認物為己曰迷事二所轉依二所轉依此復有二一持種依謂根本識由此能持染淨法種與染淨法俱為所依聖道轉令捨染得淨餘依他起性雖亦是依而不能持種故此不説二迷悟依謂真如由此能作迷悟根本諸染法淨法依之得生聖道轉令捨染得淨餘雖亦作迷悟法依而非根本故此不説所轉依對能轉道言依有二種謂持種依迷悟依持種依者第八本識持染淨種與染現行淨現行法為所依曰轉者修聖道時轉令捨染得淨曰轉依也雖前七識等並依他起亦所依法不能持種故此不説迷悟依者謂真如法是迷悟根本與染淨法為所依曰轉者修聖道時令捨染得淨曰轉依也雖餘依他起亦迷悟依而非根本故此不説一往觀之持種依是約相宗迷悟依是約性宗究竟論之真如即唯識實性識與真如非一非異三所轉捨二初正釋二料簡初正釋三所轉捨此復有二一所斷捨謂二障種真無間道現在前時障治相違彼便斷滅永不成就説之為捨彼種斷故不復現行妄執我法所執我法不對妄情亦説為捨由此名捨遍計所執二所棄捨謂餘有漏劣無漏種金剛喻定現在前時引極圓明純淨本識非彼依故皆永棄捨彼種捨已現有漏法及劣無漏畢竟不生既永不生亦説為捨由此名捨生劣法三所轉捨對所轉得言捨有二種一斷捨二棄捨斷捨者真無間道斷二障種種斷而現伏名捨妄執我法之心所執我法之境對妄情而現行之遍計皆捨也二棄捨者金剛喻定引極圓明無漏本識二障種外餘有漏善種及劣無漏種無所依故皆永棄捨名捨種捨而現永不生亦名為捨由此名捨生劣法以餘有漏善能感分𫨻生劣無漏善其力但能感變易生故也又斷乃彼障此治敵體相違猶水與火不可並立棄則能依之法無所依而自消無漏善生漏善自滅勝法圓明劣法自遣矣二料簡有義所餘有漏法種及劣無漏金剛喻定現在前時皆已棄捨與二障種俱時捨故有義爾時猶未捨彼與無間道不相違故菩應無生法故此位應無所熏識故住無間道應名佛故後解脫道應無用故由此應知餘有漏等解脫道起方棄捨之第八淨識非彼依故初師以餘二種及二障種俱時捨於金剛喻定次師以五所以斷其未捨一不相違故不捨謂斷須障治相違無間道與劣無漏種及有漏善種不違豈能捨耶二菩應無生法故不捨謂無間道時菩尚有一分變易生此時云捨應無生法耶三無間位應無所熏識故不捨所熏識即異熟識有漏善種及劣無漏種皆此識執持若此時所持既捨能持異熟亦捨則無間位應無所熏識耶四若無間道時已捨異熟則因位菩名為佛耶五既已名佛起解脫道應無有用然而解脫起時有能棄有漏善根及劣無漏種之用有能證極果顯理之用豈無用耶展轉窮之應知無間道時不捨此種解脫道起方棄捨之以第八淨識非彼所依故也較量二説後説為正四所轉得二初所顯得二所生得初所顯得二初明通體二彰義別初明通體四所轉得此復有二一所顯得謂大𣵀槃此雖本來自性清淨而由客障覆令不顯真聖道生斷彼障故令其相續名得𣵀槃此依真如離障施設故體即是清淨法界𣵀槃云圓寂大者通俱後三謂無上大𣵀槃也以體全法界德滿塵沙曰圓妙絶相纍究竟離念曰寂所轉得對所轉捨以有轉捨必有轉得故也初至名得𣵀槃縱難奪釋顯得次至清淨法界括意結釋本淨此雖本來之此指大𣵀槃謂有難言此大𣵀槃本來自性清淨曰得者何故縱難而奪釋云此雖本來等云云也此依真如之此指所顯得謂更難云既云顯得即屬新淨曰本來者何故括釋意而結釋之云此依真如等云云也二彰義別三初正釋二料簡三結名初正釋𣵀槃義別略有四種一本來自性清淨𣵀槃謂一切法相真如理雖有客染而本性淨具無量微妙功德無生無滅湛若虛空一切有情平等共有與一切法不一不異離一切相一切分別思路絶名言道斷唯真聖者自內所證其性本寂故名𣵀槃二有餘依𣵀槃謂即真如出煩惱障雖有微苦所依未滅而障永寂故名𣵀槃三無餘依𣵀槃謂即真如出生苦煩惱既盡餘依亦滅衆苦永寂故名𣵀槃四無住處𣵀槃謂即真如出所知障大悲般若常所輔翼由斯不住生𣵀槃利樂有情窮未來際用而常寂故名𣵀槃上文通體既顯大旨自彰別義未明細微不盡故復略開四種一本來自性清淨𣵀槃二有餘依𣵀槃三無餘依𣵀槃四無住處𣵀槃本來自性清淨者謂蘊處界等一切法相所依真理雖有客塵煩惱所染本性清淨具無數量微妙功德無生無滅湛若虛空不簡有情聖凡平等共有曰本淨與一切法不一不異等乃至本寂曰𣵀槃不一異者一則真如應是無常異則真如非法實性故離一切相一切分別者謂不可以有無等四句分別之也思路絶者離顯境名言不可以識識也名言道斷者離表義名言不可以言言也二有餘依者真如出煩惱障子縛已盡無有喧動曰𣵀槃身智未泯果縛猶存餘微苦依曰有餘依𣵀槃也三無餘依者真如出生苦煩惱既盡衆苦已寂曰𣵀槃身智復滅果縛亦忘苦依殆盡曰無餘依𣵀槃也四無住處者謂即真如出所知障非有餘無餘但出於煩惱障大悲般若常為輔翼非有餘無餘猶住於𣵀槃也利樂有情窮未來際非有餘無餘不能利生之無盡也問窮未來際利樂有情利他妙用得矣何名𣵀槃答用而常寂故名𣵀槃則此對前二可名有住𣵀槃前二形此得名無住𣵀槃良以用而常寂不住生豈不寂而常用不住𣵀槃二邉不住故名無住二料簡二初通約凡聖總簡二復申問答別釋初通約凡聖總簡一切有情皆有初一二乘無學容有前三唯我世尊可言具四上文正釋𣵀槃別義似明然所以別者猶未能詳明也何則法元無異異由於人若不通為料簡別致問酬則微細何由而現委曲何自而彰乎故又先通簡而後別釋也有情曰一切皆有則凡聖外微細昆曷常欠一毫毛雜華云竒哉衆生云何具有如來智慧德相是也但以無明妄想執著而不證得故無後三耳餘文可知然則有情但性具而已有情如二乘無學雖具性修於修尚有情如世尊始得性修圓滿通論差別如此二復申問答別釋六初躡世尊釋有餘二躡聲聞釋無依三躡所知釋感得四躡感得釋障得五躡障得釋斷得六躡斷得釋障説初躡世尊釋有餘如何善逝有有餘依雖無實依而現似有或苦依盡説無餘依非苦依在説有餘依是故世尊可言具四如何善逝有有餘依躡前世尊可言具四問也意謂二已離諸苦永寂名佛何復有苦依曰有餘依耶答中初約實無似有示現答二約表無有顯説答實無者無實有餘依也似有者示現似有餘依也如病時須乳及金鎗背痛等雖無實有餘依以為衆生故示現有身必苦因果之不忘也表無者或苦依盡説無餘依表有無餘依也有者非苦依在説有餘依有漏蘊為有餘依也故云非苦依在説有餘依隱然於苦依無處説有餘依耳無處説有豈非以無漏蘊為依乎二躡聲聞釋無餘若聲聞等有無餘依如何有處説彼非有有處説彼都無𣵀槃豈有餘依彼亦非有然聲聞等身智在時有所知障苦依未盡圓寂義隱説無𣵀槃非彼實無煩惱障盡所顯真理有餘𣵀槃爾時未證無餘圓寂故亦説彼無無餘依非彼後時滅身智已無苦依盡無餘𣵀槃或説二乘無𣵀槃者依無住處不依前三又説彼無無餘依者依不定性二乘而説彼才證得有餘𣵀槃決定回心求無上覺由定願力留身久住非如一類入無餘依謂有二乘深樂圓寂得生空觀親證真如永滅感生煩惱障盡顯依真理有餘𣵀槃彼能感生煩惱盡故後有異熟無由更生現苦所依任運滅位餘有為法既無所依與彼苦依同時頓捨顯依真理無餘𣵀槃爾時雖無二乘身智而由彼證可説彼有此位唯有清淨真如離相湛然寂滅安樂依此説彼與佛無差但無菩提利樂他業故復説彼與佛有異初躡前問難次約義隱答三約實無答四轉釋一類若聲聞等有無餘依躡前容有前三也如何有處説彼非有無餘有處説彼無餘有餘都無約他處違前容有為問也豈有餘依彼亦非有據法合人難有餘非有之未合也義隱答者都無之義隱於身智在時有所知障苦依未盡説有餘無餘都無非彼實無煩惱障盡所顯真理有餘𣵀槃無無餘義隱於此時未證無餘圓寂説彼無無餘依非彼後時滅身智已無苦依盡無餘𣵀槃也實無者約實無無住𣵀槃曰無𣵀槃非無前三名無𣵀槃也又實無無餘𣵀槃名無𣵀槃者非無有餘名無𣵀槃以不定性聲聞才證有餘回小向大不入無餘依之故耳非如一類入無餘依者之可同也一類入無餘依釋有三𫨻一釋入無餘二通妨身智三對佛辨異釋入無餘者謂有一類二乘根則深樂圓寂觀則得生空觀證則親證真如滅則永滅感生煩惱障盡顯依真理有餘𣵀槃彼能感生煩惱盡故後有異熟無由更生彼現在衆苦之身亦隨業盡任運滅位則二乘觀智及相應心品之餘有為法名能依者既無所依與彼苦依同時頓捨顯依真理無餘𣵀槃曰入無餘依也通妨身智者恐有難云既無身智誰為能證通云爾入無餘依時雖無身智然先曾由彼身智證得故可假説彼有身智耳對佛辨異者此位與佛亦異亦同以此位唯有清淨真如湛寂安樂説與佛同但無上求菩提下利他業因乖萬行果圓常與佛異耳三躡所知釋感得諸所知障既不感生如何斷彼得無住處彼能隱覆法空真如令不發生大悲般若窮未來際利樂有情故斷彼時顯法空理此理即是無住𣵀槃令於二邉俱不住故感得者問意云感而後生由煩惱障以是不善性故斷彼得二𣵀槃所知是無記性既非感生如何斷之亦得無住𣵀槃耶釋感得者意謂所知雖不感生雖障法空真理即障利他大悲故斷彼時顯法空理此所顯理即是不住二邉之妙𣵀槃理是以斷彼得無住處四躡感得釋障得若所知障亦障𣵀槃如何斷彼不得擇滅擇滅離縛彼非縛故障得者問意云所知既障無住𣵀槃斷障應得擇滅無為以擇滅智斷一分障顯一分理故意以擇滅可盡攝諸𣵀槃也不知擇滅無為是離煩惱障縛所顯彼所知障既不感生非同煩惱能縛有情住於生故斷彼時不得擇滅無為但證真如無為耳五躡障得釋斷得既爾斷彼寧得𣵀槃非諸𣵀槃皆擇滅攝不爾性淨應非𣵀槃能縛有情住生者斷此説得擇滅無為諸所知障不感生非如煩惱能縛有情故斷彼時不得擇滅然斷彼時法空理顯此理相寂説為𣵀槃非此𣵀槃擇滅為性故四圓寂諸無為中初後即真如中二擇滅攝若唯斷縛得擇滅者不動等二四中誰攝非擇滅攝説暫離故擇滅無為唯究竟滅有非擇滅非永滅故或無住處亦擇滅攝由真擇力滅障得故擇滅有二一滅縛得謂斷感生煩惱得者二滅障得謂斷餘障而證得者故四圓寂諸無為中初一即真如後三皆擇滅不動等二暫伏滅者非擇滅攝究竟滅者擇滅所攝初明無住非擇滅攝次明無住亦擇滅攝於無住非擇滅攝中曲分為二初至中二擇滅攝是問答明二無為攝四𣵀槃次至非永滅故是問答明非擇滅攝二無為二無為攝四𣵀槃躡前彼非縛故問云既所知非縛斷彼寧得𣵀槃意以諸𣵀槃皆擇滅攝也不知前四𣵀槃有是擇滅攝非擇滅攝者故云非諸𣵀槃皆擇滅攝若謂不爾皆屬擇滅攝者則初一性淨既非斷障所得屬於擇滅乃應非𣵀槃矣然而不可不謂之淨性𣵀槃也是以非皆攝者以能縛有情住生者斷此説得擇滅無為諸所知障不感生不縛有情故斷彼時不得擇滅雖是不得以斷彼故法空理顯此理相寂説為𣵀槃非此𣵀槃以擇滅為性也故四圓寂於諸無為中初性淨後無住此二𣵀槃真如無為攝中間有餘無餘二𣵀槃即擇滅無為攝是謂二種無為能攝四種𣵀槃也非擇滅攝二無為者牒前問云若唯斷縛得擇滅者即如第四禪名不動滅無為等滅受想無為此二無為在虛空與擇滅并非擇滅及真如之四無為中是誰所攝耶答云此二無為在四無為中是非擇滅無為攝以此二種緣闕不生説暫離故非是擇滅以擇滅無為唯究竟滅有非擇滅是暫離故非究竟滅是以非擇滅二無為也展轉窮之無住𣵀槃非擇滅攝也明矣次明無住亦擇滅攝者或無住處亦擇滅攝以由法空觀智真擇滅力斷所知障而證得故恐有難云前云無住非擇滅攝今何又云亦擇滅攝耶故云擇滅有二云云也意謂前約離縛所得擇滅説擇滅不攝無住此約滅障所得擇滅説擇滅亦攝無住耳故四圓寂諸無為中初一即真如無為攝後三皆擇滅無為攝不動等二暫伏滅者非擇滅無為攝究竟滅者擇滅所攝問暫伏究竟其義云何曰二乘那含及菩七地前所入捨念清三昧及滅盡定由俱生煩惱未永斷伏故名暫伏滅三乘無學果人所入二定由永斷伏俱生煩惱故名究竟滅具如成實論中六躡斷得釋障説既所知障亦障𣵀槃如何但説是菩提障説煩惱障但障𣵀槃豈彼不能為菩提障應知聖教依勝用説理實俱能通二障果問意謂既所知障亦障𣵀槃何聖教但説是智障不言障𣵀槃耶答云欲知所説當觀説依如煩惱固障𣵀槃亦障菩提乃教説煩惱但障𣵀槃豈彼不能障菩提耶由此觀之應知聖教各依殊勝之用而説以理論之實則煩惱所知俱能通障二果不察其依徒觀其説説豈能知三結名如是所説四𣵀槃中唯後三種名所顯得初非顯得者以自性淨寂名為𣵀槃不由斷障所顯得故即性宗真如門也則後三反妄歸真屬生滅可知二所生得二初正釋二總結初正釋二初總標釋二別徴釋初總標釋二所生得謂大菩提此雖本來有能生種而所知障礙故不生由聖道力斷彼障故令從種起名得菩提起已相續窮未來際此即四智相應心品謂大菩提指所生得之果此即四智相應心品指所生得果體起已相續窮未來際顯無終窮果用此雖本來等通妨難也恐問此大菩提本有能生之種何名為得故云此雖本來有能生種等云云也聖道力即法空觀智力也二別徵釋三初明四智相用二明四智起位三明四智緣用初明四智相用六初大圓鏡二平等性三妙觀察四成所作五結立名六明轉依初大圓鏡云何四智相應心品一大圓鏡智相應心品謂此心品離諸分別所緣行相微細難知不妄不愚一切境相性相清淨離諸雜染純淨圓德現種依持能現能生身土智影無間無斷窮未來際如大圓鏡現衆色像明大圓鏡智相用也徴意謂既生得菩提即四智相應心品智品不詳菩提不顯故問云何等者欲窮其相用及與起位發明乎緣用使知何以名四智何以名心品而得昭然于所生得之菩提也故釋云大圓鏡智及成所作智乃至此四心品云云也大圓鏡智相應心品其義有七一此心品離諸分別智體能所雙絶永出煩惱所知障故二所緣行相微細難知非愚昧等智所可測故三不妄不愚一切境相普於一切所知障境不愚迷故四性相清淨智光明鑑性相俱無垢故五離諸雜染純淨圓德現行功德此為所依種子功德此為能持無漏德所依持故六能現能生身土智影自受用身土此智能現餘三智影此智能生故七無間無斷窮未來際常恆寂用無終盡故如大圓鏡現衆色像者以喻合法具前義故又此智七義對第八識未轉依時一一相符合可知具釋如佛地經莊嚴論中又相應心品者即淨八識與自相應二十一法和合共成一聚曰品品者品類下三心品例此二平等性二平等性智相應心品謂此心品觀一切法自他有情悉皆平等大慈悲等恆共相應隨諸有情所樂示現受用身土影像差別妙觀察智不共所依無住𣵀槃之所建立一味相續窮未來際明平等性智相用也觀一切法自他有情悉平等者因中執我與一切法自他差別今轉識成智我法既除故皆平等如佛地謂證得諸相增上喜受平等一切領受緣起平等逺離異相非相平等弘濟大悲平等無待大悲平等隨諸衆生所樂示現平等一切衆生敬愛所説平等世間寂靜皆同一味平等世間諸法苦樂一味平等修植無量功德平等證此十相名平等性智也大慈悲等恆共相應者恆與慈悲喜捨相應異未轉依時癡愛慢見之相應也隨諸有情所樂示現差別者為十地菩現他受用身土差別利益之不同也妙觀察智不共所依者因中為第六所依之根果時亦為妙觀察智所依之根云不共者以智各有所依故也無住𣵀槃之所建立者悲與智合不住邉故一味一無漏味相續者無漏無間窮未來際無盡時也問大圓平等此之平等若是均乎曰大圓平等如明鏡現像鏡無現像之念性智平等似秋月流空空無異月之輝思之可知三妙觀察三妙觀察智相應心品謂此心品善觀諸法自相共相無礙而轉攝觀無量總持之門及所發生功德珍寶于大衆會能現無邉作用差別皆得自在雨大法雨斷一切疑令諸有情皆獲利樂明妙觀察智相用也自謂色心共謂無常苦空等又圓成實性為共依他起性為自功德謂六度道品如佛地謂種種可現波羅蜜多菩提分法是也作用差別謂諸神通現相放光等妙觀察者妙即無邉作用差別觀察即善觀察自共相等轉曰無礙以融通故觀而曰攝以總持故如佛地謂住持一切陀羅尼門三摩地門是也四成所作四成所作智相應心品謂此心品為欲利樂諸有情故普于十方示現種種變化三業成本願力所應作事明成所作智之相用也所作謂所應作度生解脫之事成所作謂普于十方示現種種變化三業成本因地願力所應作事曰成所作智也變化三業者佛地經云由是如來勤身化業示現種種工巧等處摧伏諸攴傲慢衆生以是善巧方便力故引諸衆生令入聖教成熟解脫由是如來慶語化業宣種種隨所樂法文義巧妙小智衆生初聞尚信以是善巧方便力故引諸衆生令入聖教成熟解脫由是如來決意化業決擇衆生八萬四千心行差別以是善巧方便力故引諸衆生令入聖教成熟解脫詳如彼中噫成所作智果也果起于因佛未果時因何如哉反而求之五內俱熱五結立名如是四智相應心品雖各定有二十二法能變所變種現俱生而智用增以智名顯故此四品總攝佛地一切有為功德皆盡結名所由立而通妨也二十二者五遍行五別境十一善法并所依淨識也有云伺中隨用一法共二十二有云二十三者連所依淨識言也能變謂內二分所變謂見相分俱生能所種現同時而生非後先也佛地一切有為功德者對無為言謂本具性德不假為作天然成現者曰無為從迷得悟返妄歸真轉識成智者曰有為雖全性起修即真于妄然其無為而為待彼天然者亦曰有為所謂修證不無始覺之功德是也恐問四智相應心品每一所依淨識及二十一善則各各定有二十二法能所之變種現俱生獨以四智顯名何耶答如是四智相應心品雖各定有等而智用增故獨以智顯名耳是則以四智心品其名一切之名皆顯一切佛地有為功德皆顯攝無不盡故但以智名六明轉依此轉有漏八七六五識相應品如次而得智雖非識而依識轉識為主故説轉識得又有漏位智劣識強無漏位中智強識劣為勸有情依智捨識故説轉八識而得此四智明轉識成智而通妨也此指四智轉有漏八七等而得者謂轉有漏第八相應品而得大圓鏡智十方塵剎普皆圓照轉有漏第七相應品而得平等性智現他受用被十地機轉有漏第六相應品而得妙觀察智普照大千觀根説法轉有漏五識相應品而得成所作智現千丈大化被大乘加行丈六小化被大乘資糧與二乘凡夫現隨類化普被一切六道等也恐問智是別境心所識是心王已轉未轉體用不同何言轉識而得四智耶答云此有三義一智雖非識而依識轉識為主故説轉識得二有漏位智劣識強智為識轉無漏位中智強識劣有轉識義三為勸有情依智捨識故説轉八識而得此四智亦可又有漏位智劣識等更是一解問謂有漏位名識不名智豈有漏位遂無智耶無漏位名智不名識豈無漏位遂無識耶故答云有漏位中識強智劣非全無智也無漏位中智強識劣非全無識等也上初明四智相用竟二明四智起位四初大圓起位二平等起位三妙觀起位四成所起位初大圓起位大圓鏡智相應心品有義菩金剛喻定現在前時即初現起異熟識種與極微細所知障種俱時捨故若圓鏡智爾時未起便無能持淨種識故有義此品解脫道時初成佛故乃得初起異熟識種金剛喻定現在前時猶未頓捨與無間道不相違故非障有漏劣無漏法但與佛果定相違故金剛喻定無所熏識無漏不增應成佛故由斯此品從初成佛盡未來際相續不斷持無漏種令不失故明大圓鏡智現起分位也釋義有二初師謂無間道方起以異熟識中有漏善種劣無漏種與極微細所知障種俱時捨故若捨異熟鏡智不起爾時無有持淨種者故無間道決定現起次師謂解脫道中成正覺時乃得初起以金剛喻定無間道中不能違異熟種非障有漏善種劣無漏種以此二種但與解脫道成正覺時定相違故若金剛喻定能空異熟無所熏識則本有無漏淨法不增不減不增應成佛故何必更俟第二剎那解脫道耶由此義故定知此品從解脫道初成佛時方得現前盡未來際相續不斷持無漏種令不失故豈無間道得有此義較量二義後説為正此果上轉也二平等起位平等性智相應心品菩見道初現前位違二執故方得初起後十地中執未斷故有漏等位或有間斷法雲地後與淨第八相依相續盡未來際明平等性智現起分位也初方起二有間三究竟方起者菩見道初現前位第六雙空觀智違我法分別二執種子故第七一分無分別智方起有間者後十地中俱生二執未斷若第六識入生法二觀觀我法空伏二執故此智現前若出觀時與漏心俱則不現起故言或有間斷究竟者謂第十法雲地後斷二障種究竟無漏以淨第八而為所依相續無間盡未來際此因中轉也三妙觀起位妙觀察智相應心品生空觀品二乘見位亦得初起此後展轉至無學位或至菩解行地終或至上位若非有漏或無心時皆容現起法空觀品菩見位方得初起此後展轉乃至上位若非有漏生空智果或無心時皆容現起明妙觀察智現起分位也初明生空觀智兼大小乘二明法空觀智唯是大乘兼大小中生空觀品亦得初起者二乘見道位中斷分別我執故也此後展轉至無學位者我執俱生位至于此而斷始竟也或至菩解行地終者謂大乘漸悟之機之加行位也或至上位者謂大乘頓悟之機之見道及八地也若非有漏或無心時皆容現起者言此智必起于此位之無漏有心時也唯大乘中法空觀品菩見位方得初起者大乘見道位中斷法執分別故也此後展轉乃至上位者十地後心斷法執俱生之竟位也若非有漏生空智果或無心時皆容現起者以有漏與彼相違生空不違法執無心則無六識故此三時皆不現起明此智必起于此位之無漏心法空智果及有心位此亦因中轉也四成所起位成所作智相應心品有義菩修道位中後得引故亦得初起有義成佛方得初起以十地中依異熟識所變眼等非無漏故有漏不共必俱同境根發無漏識理不相應故此二于境明昧異故由斯此品要得成佛依無漏根方容現起而數間斷作意起故此四種性雖皆本有而要熏發方得現行因位漸增佛果圓滿不增不減盡未來際但從種生不熏成種勿前佛德勝後佛故明成所作智起位通釋諸疑也初唯釋作智次通釋諸疑唯釋中初師之意亦同六七二識因中得轉謂修道中為第六識後得所引亦得初起次師之意成佛方起展轉窮之其故有四一依異熟識所變眼等非無漏故所依根既有漏是以因中無轉義也二有漏不共必俱同境根發無漏識理不相應故謂眼根唯眼識依耳根唯耳識依等曰不共必俱者是俱有依根識定同時故同境者同境依根識同緣一境故此三名異俱屬五根三依中俱有依攝所依眼等既有漏發無漏識理豈不違是以因中無轉義也三此二于境明昧異故漏根必昧無漏斯明既是不明何得為智是以因中無轉義也四由斯此品要得成佛依無漏根方容現起而數間斷以必作意而後起故則佛果已成尚數間斷非如餘三長時無間是以因中無轉義也亦可初故是總次二展轉發明第四故則結申正意也恐問此四智品皆從本有無漏種生若起現行應一切時頓成無漏何有前後因果轉變之不同耶故云雖皆本有而要熏發方得現行熏有勝劣因位漸增至果方圓滿耳既圓滿已不增不減盡未來際無有窮時恐問何以佛位不增減耶故云但從種生不熏成種若更熏種是佛德有勝劣矣勿前佛德勝後佛故諸佛心同道同而德同何容毫髮低昂于其間哉若曰十方世界彌陀第一者是論報非論德也何可同年三明四智緣用二初別釋所緣二總申用異初別釋所緣四初鏡智所緣二性智所緣三察智所緣四作智所緣初鏡智所緣大圓鏡智相應心品有義但緣真如為境是無分別非後得智行相所緣不可知故有義此品緣一切法莊嚴論説大圓鏡智于一切境不愚迷故佛地經説如來鏡智諸處境識衆像現故又此決定緣無漏種及身土等諸影像故行緣微細説不可知如阿賴耶亦緣俗故緣真如故是無分別緣餘境故後得智攝其體是一隨用分二了俗由證真故説為後得餘一分二準此應知鏡智所緣之境也初師釋是本智緣如非後得智緣以行相所緣不可知故次師釋有七𫨻一此品緣一切法是標鏡智通緣一切二莊嚴云鏡智于一切境不愚迷故佛地諸處境識像現是引教以證通緣三又此決定緣無漏種及身土等諸影像故是據理以證通緣四行緣微細説不可知如阿賴耶亦緣俗故是通前例釋所因五緣真如故是無分別緣餘境故後得智攝是釋通本後二攝六其體是一隨用分二了俗由證真故説為後得是原説以通伏難七餘一分二準此應知是例後妙平二智以上節節主意如此若血脈貫穿則次師正義曉前師云此品所緣豈止無分別本智但緣真如實通緣一切法也何則莊嚴論云大圓鏡智于一切境不愚迷故佛地經説如來鏡智諸處境識衆像現故則通緣一切不有明證乎不獨此也以理揆之又此鏡智決定緣無漏種及身土等諸影像故如有漏時定緣三境豈止但緣真如耶且云不可知者謂鏡智所緣行相微細説不可知如阿賴耶緣俗諦時亦云不可知也豈不可知便是本智獨緣真如耶不知緣真如故是無分別智攝緣餘境故是後得智攝智體元非二也特以用此緣真即名根本用此緣俗即名後得隨用而分二耳若云體一用二後先莫定何名後得者則由證真故有根本由了俗故有後得了俗必由證真故説後得也其餘妙平二智亦一分二準此應知非竟以二為二也較量二義此説為正二性智所緣平等性智相應心品有義但緣第八淨識如染第七緣藏識故有義但緣真如為境緣一切法平等性故有義遍緣真俗為境佛地經説平等性智證得十種平等性故莊嚴論説緣諸有情自他平等隨他勝解示現無邉佛影像故由斯此品通緣真俗二智所攝于理無違性智所緣之境釋有三師初例染七但緣淨八次原平等但緣真如三緣真俗遍證諸教末結通緣是二智攝餘如前釋三察智所緣妙觀察智相應心品緣一切法自相共相皆無障礙二智所攝察智所緣之境也自即色心等共即無常等又自即依他共即圓成曰一切法自共正普緣也皆無障礙者一自共無障礙二一切無障礙二智所攝獨顯于此者形後非二智攝也四作智所緣成所作智相應心品有義但緣五種現境莊嚴論説如來五根一一皆于五境轉故有義此品亦能遍緣三世諸法不違正理佛地經説成所作智起作三業諸變化事決擇有情心行差別領受去來現在等義若不遍緣無此能故然此心品隨意樂力或緣一法或二或多且説五根于五境轉不言唯爾故不相違隨作意生緣事相境起化業故後得智攝作智所緣之境也此有二釋初謂緣五現境引論為證次謂通緣三世引經為證而論若與經違者然此心品隨意樂力或二或多且説五根于五境轉不言唯緣五境故不相違也問前三皆二智攝此攝云何故云隨妙觀察智作意引生緣事相度生之境起三業變化故唯後得智攝又前依心根故二智俱通此智但依色根故唯後得故曰變相觀空唯後得二總申用異此四心品雖皆遍能緣一切法而用有異謂鏡智品現自受用身淨土相持無漏種平等智品現他受用身淨土相成事智品能現變化身及土相觀察智品觀察自他功能過失雨大法雨破諸疑網利樂有情如是等門差別多種明四智于所緣申用之各異也初牒前縱標二奪釋用異三結多異用亦可牒前縱標即是牒難謂有難云既皆遍緣何分為四故釋謂云云也餘文易見二總結此四心品名所生得此所生得總名菩提及前𣵀槃名所轉得雖轉依義總有四種而今但取二所轉得頌説證得轉依言故此修習位説能證得非已證得因位攝故約名頌因位而總結之也初約名歸所轉得結二約頌簡取轉得結三約位説因證得結謂能證得非果上已證得乃約因位能證得也餘文易見上釋修習位竟五究竟位二初本論二論釋初本論後究竟位其相云何頌曰此即無漏界不思議善常安樂解脫身大牟尼名法二論釋四初釋第一句二釋第二句三釋第三句四釋第四句初釋第一句二初正釋二通妨初正釋論曰前修習位所得轉依應知即是究竟位相此謂此前二轉依果即是究竟無漏界攝諸漏永盡非漏隨增性淨圓明故名無漏界是藏義此中含容無邉希有大功德故或是因義能生五乘世出世間利樂事故修習位指十地滿心究竟位指金剛後心解脫道中盡未來際也修位所得轉依即究竟位相言彼攝于此總大意而標釋之也此謂此前二轉依果即是無漏界攝無漏者五住二諸漏永盡離彼相應縛也非漏隨增離彼所緣縛也蕩無纖塵而性淨非二乘猶有所知障照無不極而圓明非十地猶有未滿曰無漏也界是藏義此中含容無邉希有大功德故者神通光明智慧總持等曰功德逈出權小豎極橫周曰大功德最為難得曰希有大功德無邉者十大數之三無量無量為一無邉不墮此三更無邉涯之無邉也或是因義能生五乘世出世間利樂事故謂人乘天乘是世間利樂事二乘大乘最上乘是出世間利樂事也二通妨二初通本論二通集論初通本論清淨法界可唯無漏攝四智心品如何唯無漏道諦攝故唯無漏攝謂佛功德及身土等皆是無漏種性所生有漏法種已永捨故雖有示現作生身業煩惱等似苦集諦而實無漏道諦所攝自此至而純無漏詳設問答窮無漏幽微也今問意云清淨法界有佛無佛性相常住可唯無漏四智心品從種生故有為無漏何得亦唯無漏攝耶答意云聖説四諦前二有漏後二無漏今四智心品道諦攝故唯無漏攝以佛功德身土皆無漏種生有漏既已永捨豈得猶有有漏恐問佛變化身示同生老等何為道諦攝耶故云雖有示現生身似苦諦業煩惱似集諦而有漏種已斷盡故實無漏道諦所攝二通集論二初問二答初問集論等説十五界等唯是有漏如來豈無五根五識五外界等躡前問云本論之疑雖通集論之義有礙何則集論除後三界説十五界等唯是有漏若如來功德身土皆唯無漏豈佛無五根五識五外界等耶若云有者何成無漏二答三初第一師二第二師三第三師初第一師有義如來功德身土甚深微妙非有非無離諸分別絶諸戲論非界處等法門所攝故與彼説理不相違甚深微妙絶諸戲論則可非界處等攝則不可自謂理不相違理殊未盡二第二師有義如來五根五境妙定生故法界色攝非佛五識雖依此變然粗細異非五境攝如來五識非五識界經説佛心恆在定故論説五識性散亂故成所作智何識相應第六相應起化用故與觀察智性有何別彼觀諸法自共相等此唯起化故有差別此二智品應不並生一類二識不俱起故許不並起與理無違同體用分俱亦非失或與第七淨識相應依眼等根緣色等境是平等智作用差別謂淨第七起他受用身土相者平等品攝起變化者成事品攝豈不此品攝五識得非轉彼得體即是彼如轉生言得𣵀槃不可𣵀槃同生攝是故于此不應為難此師初正答次料簡必先正答後料簡者正答中違妨假展轉料簡而發明之也正答取其易明撮本文補足而順釋之則云汝難如來豈無五根五識五外界等意謂有則墮于根識塵界是有漏攝非純無漏攝不知如來五根五境首楞百八三昧妙定生故法界色攝非有漏根塵界攝如來五識恆在定故法界識攝非有漏五識界攝若謂降佛已還非佛有情五識必藉如來法界五塵為質變相而緣此所託質是五外界攝者不知非佛五識雖依此變然所變者粗可界等攝為質者細非五境攝恐難如來五識既非識界則成所作智亦不應與五識相應然則何識相應耶故答云與第六淨識相應仗彼引起變化三業故又恐難相應則與妙觀察智有何差別故答云彼則觀察色心自共相等此成所作智緣事相境起三業故不同也再恐難云此二既有差別應不並生以一類二識不俱起故故答云許不並起于理無違同體用分俱亦非失此其一也或此成所作與第七淨識相應以成所作依眼等根緣色等境是平等智作用差別故也謂淨第七起他受用身土相者平等品攝起變化身土者成事品攝故差別也更恐難云既此與六七相應豈不此品亦得攝五識取故答云非轉彼五識得成所作成所作體即是五識同五識攝例破云如轉生言得𣵀槃不可𣵀槃同生攝以智由慧轉五識無慧此約因中無慧言也結責云是故于此五識所攝不應為難此師之答若此細玩亦未盡理三第三師有義如來功德身土如應攝在蘊處界中彼三皆通有漏無漏集論等説十五界等唯有漏者彼依二乘粗淺境説非説一切謂餘成就十八界中唯有後三通無漏攝佛成就者雖皆無漏而非二乘所知境攝然餘處説佛功德等非界等者不同二乘劣智所知界等相故理必應爾所以者何説有為法皆蘊攝故説一切法界處攝故十九界等聖所故若絶戲論便非界等亦不應説即無漏界善常安樂解脫身等又處處説轉無常蘊獲得常蘊界處亦然寧説如來非蘊處界故言非者是密意説又説五識性散亂者説餘成者非佛所成故佛身中十八界等皆悉具足而純無漏此正義也初正答前問二會通集論三會通餘處四斥前所答五通論説義六結示正義初中如應攝在等謂如來功德身土應屬于蘊應屬于處應屬于界者如其所應攝在三科彼三皆通有漏無漏意謂佛外餘所成者通漏無漏佛所成者純無漏也前引集論難佛非無漏者不知彼論之説依耳何則集論説十五界唯有漏攝不通無漏者彼依二乘粗淺境説非説一切謂除佛之外其餘成就十八界者于中唯有後三通于無漏非唯有漏佛成就者雖十八界皆是無漏非二乘所知境攝豈佛具三五便是有漏與集論之説不相同耶謬解者自不同耳然餘處説佛功德等非界等攝者亦是不同二乘劣智所知皆無漏耳非言竟不攝于界等也故前云如應攝在蘊處界中理必應爾所以者何教説有為法皆蘊攝故説一切法界處攝故如來功德既屬有為屬一切法故當攝于三科中也若謂非是十八界者應是十三處十九界矣十九界等聖所故豈其理耶又若初師謂絶諸戲論便非界等亦不應説此即無漏界等不應處處説轉無常蘊獲得常蘊等寧得説佛非界等攝耶故言非者非二乘劣智所知之境密意顯有大乘妙智所知境耳不察其密竟為顯了可乎至若論説五識性散亂者是説佛外餘乘所成非佛所成何得相違是則由正答之既明再會通之又顯即本頌以斥前非引他處而證謬解散亂是説餘成佛成法爾恆定故佛身中十八界等皆悉具足而純無漏何事紜紜故曰此即無漏界二釋第二句三初釋不思議二釋一善字三釋一常字初釋不思議此轉依果又不思議超過思言議道故微妙甚深自內證故非諸世間喻所喻故初名相釋二敦原本釋三絶形容釋又微妙甚深自內證即超思非喻所喻即超議二釋一善字此又是善白法性故清淨法界逺離生滅極安隱故四智心品妙用無方極巧便故二種皆有順益相故違不善故俱説為善論説處等不唯無記如來豈無五根三境此中三釋廣説如前一切如來身土等法皆滅道攝故唯是善聖説滅道唯善性故説佛土等非苦集故佛識所變有漏不善無記相等皆從無漏善種所生無漏善攝初正釋善義二引論難問三答釋妨難正釋中初故通原二果性二故別原𣵀槃相三故別原菩提相四故雙原二果相五故反原釋善名引論難云論説處等等界也謂説十二處十八界皆通三性而香味觸唯無記性色聲許通三性唯無記如來豈無五根香味觸三境是則亦通無記矣若如所示現作生身即有漏無記如所示現業煩惱等即有漏不善今言又唯是善攝何耶通云此中三釋廣説如前三科所釋也今略取而釋之則初至皆滅道攝約諦攝釋唯是善二至非苦集故約諦性釋唯是善三至無漏善攝約變從釋唯是善是則論説五根三境唯無記者約餘成就者説非佛所成就三釋一常字此又是常無盡期故清淨法界無生無滅性無變易故説為常四智心品所依常故無斷盡故亦説為常非自性常從因生故生者歸滅一向説故不見色心非無常故然四智品由大願力所化有情無盡期故窮未來際無斷無盡又所依即理願力稱性故能常初通原二果時期釋常二別約𣵀槃自性釋常三別約菩提所依釋常四別釋菩提因生非常五別釋菩提願力是常問𣵀槃既名轉得亦由于因何非無常答是從因顯非從因生故有異也三釋第三句此又安樂無逼惱故清淨法界衆相寂靜故名安樂四智心品永離體害故名安樂此二自性皆無逼惱及能安樂一切有情故二轉依俱名安樂二乘所得二轉依果唯永逺離煩惱障縛無殊勝法故恆名解脫身初標釋二果安樂二別釋𣵀槃安樂三別釋菩提安樂四總釋二果安樂五簡釋名解脫身衆相寂靜者離二五住喧動故永離體害者絶智體所知障害故無殊勝法者無自利殊勝安樂無利他殊勝安樂故問此名究竟位以二乘之身為言何也曰以二乘轉依之果佛皆具故今但約彼當分所得名解脫身若在如來則名法身故下云大牟尼名法也四釋第四句二初略明頌義二廣明法身初略明頌義大覺世尊成就無上寂默法故名大牟尼此牟尼尊所得二果永離二障亦名法身無量無邉力無畏等大功德法所莊嚴故體依聚義總説名身故此法身五法為性非淨法界獨名法身二轉依果皆此攝故初釋大牟尼次釋名法身三簡身所攝牟尼此云寂默大則稱體之寂默謂永寂二邉默契中道曰大牟尼此牟尼尊所得二果永離二障亦名法身謂無量無邉十力等大功德法所莊嚴故體是依義聚義總名為身故佛地經云清淨真如及四智品五法為性而獨以淨法界名法身者非此所謂二轉依果皆此法身所攝之法然則豈獨清淨法界名之為法身乎哉如云一切智為頭第一義諦為髻八萬四千陀羅尼為髮權實二智為眼無漏為鼻四十不共為齒四無礙辨為舌十力為手如來藏為腹大慈大悲為心三三昧為腰清淨法界為體四智菩提所依萬善功德集聚故名法身正此意也録之以觀覽二廣明法身三初明能依身二明所依土三合明身土初明能依身四初正釋三身二五法相攝三三身德別四自他利殊初正釋三身如是法身有三相別一自性身謂諸如來真淨法界受用變化平等所依離相寂然絶諸戲論具無邉際真常功德是一切法平等實性即此自性亦名法身大功德法所依止故二受用身此有二種一自受用謂諸如來三無數劫修集無量福慧資糧所起無邉真實功德及極圓淨常遍色身相續湛然盡未來際恆自受用廣大法樂二他受用謂諸如來由平等智示現微妙淨功德身居純淨土為住十地諸菩衆現大神通轉正法輪決衆疑網令彼受用大乘法樂合此二種名受用身三變化身謂諸如來由成事智變現無量隨類化身居淨穢土為未登地諸菩衆二乘異生稱彼機宜現通説法令各獲得諸利樂事初自性二受用三變化自性中受用變化平等所依以能依顯所依之勝也離相寂然絶諸戲論正真淨法界也具無邉際真常功德謂真淨法界杳杳冥冥中具足無邉性德即是聚義是一切法平等實性即是體義皆所謂自性也即此自性亦名法身大功德法所依止故即以依義釋法身也然前通以二果名法身此中唯以自性名法身者以後二身即菩提果故應知前後開合立名故標中言如是法身有三相別即是開意但此自性于三身中又得法身通稱是以亦名法身二受用中一自受用謂極圓淨常遍色身相續湛然盡未來際恆自受用廣大法樂曰自受用而遡其所從謂諸如來三無數劫修集無量福慧資糧此熏習之行也由熏發動本有無漏種子從無漏種所起無邉真實十地現行功德及證極圓淨自受用身二他受用謂由平等智示現微妙淨功德身居純淨土名他受用曰由平等顯自受用之由鏡智也曰示現顯自受用之非示現也為住十地菩乃至令彼受用大乘法樂即被十地機為他得受用起他受用身若雜華之舍那身是也合此二種名受用者見自他雖分常合不分而分分不分也三變化者變現無量隨類化身居淨穢土曰變化然索變化之本由成事智窮變現所為之機為地前賢位二乘聲聞六道異生之機也變必無量化必隨類者稱彼機宜現通説法令彼各得利樂事也二五法相攝二初一師明攝二二師明攝初一師明攝以五法性攝三身者有義初二攝自性身經説真如是法身故論説轉去阿賴耶識得自性身圓鏡智品轉去藏識而證得故中二智品攝受用身説平等智于純淨土為諸菩現佛身故説觀察智大集會中説法斷疑現自在故説轉諸轉識得受用身故後一智品攝變化身説成事智于十方土現無量種難思化故又智殊勝具攝三身故知三身皆有實智五法謂真如及四智三身謂自性受用變化身也相攝者今初師謂五法攝三身四智攝三身也五法攝三身者真如鏡智二法攝自性身平等察智二法攝受用身成所作智一法攝變化身四智攝三身者以智殊勝故知三身皆有實智此師唯成所作智攝變化身不錯其餘諸釋多未協理下文自顯二二師明攝二初明攝自性二明攝用化初明攝自性有義初一攝自性身説自性身本性常故説佛法身無生滅故説證因得非生因故又説法身諸佛共有遍一切法猶若虛空無相無為非色心故然説轉去藏識得者謂由轉滅第八識中二障粗重顯法身故智殊勝中説法身者是彼依止彼實性故自性法身雖有真實無邉功德而無為故不可説為色心等物此師明攝皆正義也今攝自性先明攝次通論初真如一法攝自性身異前真如鏡智二法攝自性身也以説自性身本性常故説佛法身無生滅故異鏡智有生滅也説證因得非生因故異鏡智生因之所生也又説法身諸佛共有遍一切法猶若虛空無相無為非色心故異鏡智有相有為是色心法也然前師謂鏡智攝自性身至引論轉去藏識為證不知論説轉去藏識得者謂由轉滅第八識中二障粗重顯法身故非鏡智即自性身也又前云智殊勝故具攝三身不知智殊勝中説法身者謂法身是彼四智之依止是彼四智之實性約此義故言具攝三身理實不攝法身唯攝用化二身耳以自性法身雖有真實無邉功德而無為故不可説為四智色心等物是以鏡智不攝自性法身二明攝用化二初且明相攝二斥有實智初且明相攝四智品中真實功德鏡智所起常遍色身攝自受用平等智品所現佛身攝他受用成事智品所現隨類種種身相攝變化身説圓鏡智是受用佛轉諸轉識得受用故雖轉藏識亦得受用然説轉彼顯法身故于得受用略不説之又説法身無生無滅唯證因得非色心等圓鏡智品與此相違若非受用屬何身攝又受用身攝佛不共有為實德故四智品實有色心皆受用攝且明相攝者正釋既明後斥其非也相攝中初通明智攝身二轉釋自受用身謂四智品中除方便似現取真實功德及能起鏡智之所起常遍色身攝自受用能現平等智品所現佛身攝他受用能現成事智品所現隨類種種身相攝變化身也轉釋自受用中文有三假初至略不説之原意釋四智實德攝自受用次至屬何身攝推理決大圓鏡智攝自受用三至皆受用攝約攝結四智實有皆自受用攝謂有問曰以何所以四智功德及鏡智所現皆自受用攝耶故曰説圓鏡智是受用佛轉諸轉識得受用故轉藏識亦得受用故也既轉藏識亦得受用不説受用者何故云雖轉藏識亦得受用然轉有二義一轉藏識中二障種子顯現法身二轉染識體成大圓鏡得自受用今此但説顯法身義而于轉識成淨略之不説非無而不説也又説法身無生無滅唯因清淨聖智證得非色心等圓鏡智品既有色心與此相違若非受用屬何身攝是以理推之則鏡智攝自受用明矣不但此也以攝論之又受用身攝佛不共有為實德故四智品實有色心皆自受用攝問色心曰實者何曰上文云四智真實功德是也問既以平等所現屬他受用作智所現屬變化身云何色心又攝自受用中曰他受用及變化身色心不可言實而此云實者真實有體甚深微妙色則十地所不能見心則等覺所未能知故云自受用受用獨佛自己他何與焉二斥有實智又他受用及變化身皆為化他方便示現故不可説實智為體雖説化身智殊勝攝而似智現或智所起假説智名體實非智但説平等成所作智能現受用三業化身不説二身即是二智故此二智自受用攝然變化身及他受用雖無真實心及心所而有化現心心所法無上覺者神力難思故能化現無形質法若不爾者云何如來現貪瞋等久已斷故云何聲聞及傍生等知如來心如來實心等覺菩尚不知故由此經説化無量類皆令有心又説如來成所作智化作三業又説變化有依他心依他實心相分現故雖説變化無根心等而依餘説不依如來又化色根心心所法無根等用故不説有初斥前皆有實智次釋通化有似法斥有者謂汝前云智殊勝具攝三身三身皆有實智是謂化用二身亦可説實智為體矣又寧知他受用及變化身皆為化他方便示現假相故不可説實智為體若謂化身智殊勝攝是亦不知其説者也何則雖説化身智殊勝攝而似智現非真智起或智所起非能起智假説智名體實非智豈説智殊勝攝便説化身攝實智體耶其所説者但説平等性智能現他受用身成所作智能現三業化身不説所現二身即是能現二智故大圓鏡自受用攝不必言矣而此二智亦自受用攝前云他受用變化身亦有實智者豈其説耶恐有疑云既四智品實有色心皆自受用攝他用變化皆無真實者如機關木偶何能説法等益有情耶故通云然變化身及他受用雖無真實心及心所而有化現心心所法恐又疑云有形之色可化無形質心如何能化故再通云無上覺者神力難思故能化現無形質法若不能者如來三毒等久已斷故云何能現貪瞋癡法如來實心等覺不知云何聲聞及傍生等知如來心故知決能化現似心心所由此之故經説化無量類皆令有心説成所作智化作三業説變化有依他心依他有情實心為本質變化似質之相分心現也恐更疑云既變化身有根心者云何他處説變化無根心等耶故復通云雖説變化無根心等是依佛外餘二乘劣定等變化而説不依如來説也又云化色同實色用化根及心但有相現而無實根心用故不説變化有根心曰變化無根心者此皆説餘二乘等非説如來何必疑三三身德別如是三身雖皆具足無邉功德而各有異謂自性身唯有真實常樂我淨離諸雜染衆善所依無為功德無色心等差別相用自受用身具無量種妙色心等真實功德若他受用及變化身唯具無邉似色心等利樂他用化相功德皆具無邉曰各有異者自性身具足功德異自受用及餘二無邉餘三身具足功德異自性身無邉自受用身非餘二身無邉餘二復異自受用無邉也是故自性身具足乃無為功德而曰無色心等相用差別自受用具足乃真實功德而曰具無量種妙色心等餘二身具足乃化相功德而曰唯具無邉似色心等同名功德有無為真實化相之分真實化相二皆有為有為雖具色心仍分妙似甄別之精固如此三身之德何可以少濫四自他利殊又自性身正自利攝寂靜安樂無動作故亦兼利他為增上緣令諸有情得利樂故又與受用及變化身為所依止故俱利攝自受用身唯屬自利若他受用及變化身唯屬利他為他現故他受用及變化身唯屬利他自受用唯屬自利自性身正自利攝亦兼利他兼有二義一為增上緣以諸佛自性身正法界理遍一切法與有情心故有情發心修行皆藉此而為內熏令其所作咸得成就故兼利他二為依止則他用變化之利他根於自性他用變化之利皆亦自性身之利矣故兼利他二明所依土四初法性土二自用土三他用土四變化土初法性土又自性身依法性土雖此身土體無差別而屬佛法相性異故此佛身土俱非色攝雖不可説形量小大然隨事相其量無邉譬如虛空遍一切處又自性身依法性土約能依明所依不離性也以能依必合所依所依必不違能依能依是自性身所依必法性土土外無身外身無有土故也雖此身土體無差別而屬佛法性相異故是約體屬原能所正明依也以身是此體土是此體約體屬原能所也不可言異何可言依身屬佛相土屬法性不可言同何不云依蓋自其體而觀之了無能所蓋自其即體於屬而觀之絶能所中不妨亦能所也此佛身土俱非色攝雖不可説形量小大然隨事相其量無邉譬如虛空遍一切處是即隨喻量遍元無量也此佛身土形色既非大小逈絶安得以量喻然此佛身土隨受用事相隨變化事相何無其量但其量無邉譬如虛空遍一切處宗鏡云此即於自心性相分身土之名以自心相義名身自心性義名土故佛地論云清淨法界而為法身即以法性而為其土智論云在有情數中名為佛性在無情數中名為法性清涼云身土異則不名法性同則不名能所依是也又身自是佛佛云相者以佛義是相名功德法所依止故衆德集聚故為二身自體故土自是法法名性者以法是性義功德自性故能持自性故諸法自性故詳如古釋二自用土自受用身還依自土謂圓鏡智相應淨識由昔所修自利無漏純淨佛土因緣成熟從初成佛盡未來際相續變為純淨佛土周圓無際衆寶莊嚴自受用身常依而住如淨土量身量亦爾諸根相好一一無邉無限善根所引生故功德智慧既非色法雖不可説形量大小而依所證及所依身亦可説言遍一切處自受用身還依自土約能依標所依不離于自也謂圓鏡智相應淨識由昔所修自利無漏純淨佛土因緣成熟釋自土出本因不離于修也從初成佛盡未來際相續變為純淨佛土周圓無際衆寶莊嚴釋土相極橫豎不離于變也自受用身常依而住如淨土量身量亦爾釋身依量如土自用自也諸根相好一一無邉無限善根所引生故釋自身相好遍從因生也功德智慧既非色法雖不可説形量大小而依所證及所依身亦可説言遍一切處例功德與智慧悉周遍也依所證者謂二空真如依所依身者謂自法性身也以上逐假出意如此若夫總其脈絡是周圓無際衆寶莊嚴盡未來際相續純淨自受用土由於大圓鏡智所變智變又由往昔所修自利純淨佛土因緣成熟而起自受用身常依此土而住身如土量相好無邉亦從善根引生而起其非色法之功德智慧者依所證二空真理所依自法性身遍一切處功德智慧起於證證起於修修之時義大矣哉三他用土他受用身亦依自土謂平等智大慈悲力由昔所修利他無漏純淨佛土因緣成熟隨住十地菩所宜變為淨土或小或大或劣或勝前後改轉他受用身依之而住能依身量亦無定限他受用身亦依自土約能依明所依不離於他也謂平等智大慈悲力由昔所修利他無漏純淨佛土因緣成熟即他土明土因起於修也隨住十地菩所宜變為淨土或小或大或劣或勝前後改轉即他土明土相變於宜也他受用身依之而住能依身量亦無定限釋依土身如土量無定也上隨假出意如此若總其脈絡則隨住十地菩所宜大小勝劣前後改轉他受用之淨土起於平等智大慈悲力之隨變智力隨變又由往昔所修利他無漏純淨佛土因緣成熟而起也修可後乎利他無漏因緣者如直心是菩淨土菩成佛時不諂衆生來生其國等是也或大小勝劣者如初地所見淨土望於二地為小為劣二望於初即為大為勝矣展轉而上直至法雲層層大小勝劣可知四變化土若變化身依變化土謂成事智大慈悲力由昔所修利他無漏淨穢佛土因緣成熟隨未登地有情所宜化為佛土或淨或穢或小或大前後改轉佛變化身依之而住能依身量亦無定限若變化身依變化土約能依明所依不離於化也謂成事智大慈悲力由昔所修利他無漏淨穢佛土因緣成熟即化土明土因因於修也隨未登地有情所宜化為佛土或淨或穢或小或大前後改轉於化土明土相化於宜也佛變化身依之而住能依身量亦無定限明依土身如土量無定也逐假出意如此若總其脈絡則隨未登地有情所宜或淨穢大小前後改轉之變化土化於成事智之大慈悲力智力與化又由於往昔所修利他無漏淨穢佛土因緣成熟而起也修可後乎問佛所修因無非淨行寧有穢土成熟之理而云然者何也曰以衆生根性不等宜順導者現淨以攝之宜逆化者示穢以折之彌陀現居極樂迦文示生堪忍諸菩等隨所化生而取佛土是也淨穢大小前後改轉者淨改為穢穢轉為淨大轉為小小改為大也如梵王見此佛土無非七寶身子見此佛土無非瓦礫是改轉淨穢大小可知矣能依身量亦無定限者丈六八尺至三尺等亦各隨機所見佛身何有定量三合明身土二初分簡二通簡初分簡自性身土一切如來同所證故體無差別自受用身及所依土雖一切佛各變不同而皆無邉不相障礙餘二身土隨諸如來所化有情有共不共所化共者同處同時諸佛各變為身為土形狀相似不相障礙展轉相雜為增上緣令所化生自識變現謂於一土有一佛身為現神通説法饒益於不共者唯一佛變諸有情類無始時來種性法爾更相繫屬或多屬一或一屬多故所化生有共不共不爾多佛久住世間各事劬勞實為無益一佛能益一切生故分簡者於身土合明中分簡自性身土自用身土他用變化之身土也自性身土竟同一切如來體無差別同所證故自用身土不同而同不同者一切諸佛各別因緣各變身土各變不同而同者雖各變不同而皆無邉不相障礙故他用變化隨諸如來所化有情有共不共共者隨諸如來所化有情同處同時諸佛各變為身為土而身土形狀相似不相障礙展轉相雜為增上緣如阿閦彌陀藥師寶集同化為迦文一身令所化生自識變現謂於一土有一佛身為現神通説法饒益名曰共也不共者唯一佛變非多佛共變設見十方百千化佛亦是一佛化現諸身曰不共也然所以共不共者諸有情類無始時來同具佛種共有佛性種性法爾與諸如來更相繫屬或多類衆生因緣唯屬一佛所化隨所化生變一身土不同多佛共變而化故不共也或一類衆生因緣屬多佛共化故須諸佛同時同處各變身土形狀相似令所化生自識變現謂於一土有一佛身故得共也若不爾者多佛久住世間各事劬勞實為無益何以故一佛能益一切衆生何以多佛為耶二通簡二初明所變漏無漏別二明所變四分虛實初明所變漏無漏別此諸身土若淨若穢無漏識上所變現者同能變識俱善無漏純善無漏因緣所生是道諦攝非苦集故蘊等識相不必皆同三法因緣雜引生故有漏識上所變現者同能變識皆是有漏純從有漏因緣所生是苦集攝非滅道故善等識相不必皆同三性因緣雜引生故蘊等同異類此應知不爾應無五十二等於身土合明中通簡所變四種身土有漏無漏之不同也謂此四種身土若淨若穢約佛無漏識上所變現者則所變身土同能變識俱善無漏所以然者從純善無漏共不共等種子因緣所生是道諦攝非苦集所攝故也恐有疑云能變之識無漏所變身土亦無漏則能變是識所變亦應唯是識相無蘊等差別耶故通云蘊等識相不必皆同等謂能變雖是識所變蘊相不必皆識相以從無漏戒定慧解脫知見蘊處界三種引生故也此四種身土若約九界有情有漏第八識上託佛身土為質所變親相分者則所變身土同能變識皆是有漏所以然者純從有漏種子因緣之所生是苦集攝非滅道所攝故也恐又疑云若能變是有漏所變亦有漏則能變識性是無記所變亦應唯是無記性耶故通云善等識相不必皆同等謂能變之識是無記所變不必皆同無記識相以從識中三性種子雜引生故蘊等同異類此應知者亦應云蘊等識相不必皆同三法因緣雜引生故若謂不爾應無五蘊十二處十八界耶無是理也問諸佛身土淨穢約佛識變則純無漏約九界則純有漏竊有疑焉何則法性純淨無漏無俟論矣他用變化雖是隨機而佛識變則穢亦是淨漏亦無漏亦無俟論矣他用變化有淨有穢約有情識變則六道異生地前三賢穢與有漏又無俟論矣乃初歡喜以至法雲既非是穢安得皆有漏耶曰十地之位雖高而第八未轉尚在有漏則能變第八託佛身土為質所變親相安得不同於能變之有漏乎若夫對下稱高待凡名聖則身土千差又當別論殊非通簡身土之大較意也以上皆約此論本文順體口氣而解若約佛地論如是淨土主既圓滿應有輔翼主必攝受輔翼者故諸大菩衆所雲集諸聲聞等無如是事謂初地上諸菩衆雖不能集諸佛自利受用淨土而能集會諸佛利他受用淨土諸佛慈悲於自識上隨菩宜現粗妙土菩隨自善根願力於自識上似佛所生淨土相現雖是自心各別變現而同一處形相相似謂為一土共集其中如是地上菩淨土為是有漏為是無漏有義無漏謂自心中後得無漏淨土種子願力資故變生淨土於中受用大乘法樂以初地上諸菩衆證真如理得真無漏處真法流住真淨土常見諸佛故所變土是真無漏道諦所攝有義有漏謂自心中加行有漏淨土種子願力資故變生淨土於中受用大乘法樂以彼菩雖證真如得真無漏而七地來煩惱現起乃至十地尚有修斷煩惱種子及所知障第八識體能持彼故現受熏故猶是有漏無記性攝有為無漏道諦所攝決定是善若十地中第八識體是無漏善應知佛地不離執持有漏種子不應受熏第八識體既是有漏無記性攝所變淨土云何無漏善性所攝又一有情無二實身其身爾時既是有漏所依淨土云何無漏是十地菩淨土是妙有漏苦諦所攝如實義者十地菩自心所變淨土有二若第八識所變淨土是漏識相分攝故是有漏身所依處故雖無漏善力所資熏其相淨妙而是有漏苦諦所攝隨加行等所現亦爾若隨後得無漏心變淨土影像是無漏識相分攝故從無漏善種子生故體是無漏道諦所攝言蘊等者即無漏五蘊一無漏淨戒名為戒蘊二無漏定名為定蘊三無漏慧名為慧蘊四無學勝解名解脫蘊五無學正見名解脫知見蘊前三是因後二是果五蘊法界一切三乘功德所依通學無學無學圓滿戒定慧三法因緣雜引生故學位分得戒定慧三隨用一性所引生故蘊等同異滿分淨染類此應知第八有漏所變身土亦是有漏後得無漏所變身土亦是無漏故言同也第八所變不同後得後得所變不同第八故言異也不爾者牒前一往所談身土皆是隨他變現若不變現則又何有五蘊十二處十八界之建立也哉以上具録以便參考二明所變四分虛實二初初解二二解初初解然相分等依識變現非如識性依他中實不爾唯識理應不成許識內境俱實有故此至心與心所定相應故於身土合明中通簡所變四種身土虛實之不同也初正釋二反釋正釋者然相分等依識變現非如識性依他中實者相見二分曰相分等又等等自證識性曰依他形上相見是遍計依他曰中實形上相見是虛妄意謂相見二分為遍計所執自證識性為依他而起依他起法自因緣生是妙俗諦可言唯識遍計所執由分別起是虛妄執故云非如識性依他中實復反釋以決之云不爾唯識理應不成所以然者許識內境俱實有故謂識所變心內之境而識與內境皆是實有安可不爾此師之義未盡下文自顯二二解或識相見等從緣生俱依他起虛實如識唯言遣外不內境不爾真如亦應非實內境與識既並非虛如何但言唯識非境識唯內有境亦通外恐濫外故但言唯識或諸愚夫迷執於境起煩惱業生沉淪不解觀心勤求出離哀愍彼故説唯識言令觀自心解脫生非謂內境如外都無或相分等皆識為性由熏習力似多分生真如亦是識之實性故除識性無別有法此中識言亦説心所心與心所定相應故此護法正義也初正釋虛實次難問虛實三答明唯識承上初師四分虛實已如上陳或有異於前釋者曰識相見分自證證自證皆從緣生俱依他起自非初師相見屬於遍計之虛識性屬於依他之實矣然而四分俱是實耶故云虛實如識良以約真勝義言識如幻夢相見何得云真其虛固如識也依世俗諦言有依他識相見何得是虛其實亦如識也虛實如識而言唯者為遣心外之境不心內之境故不違於唯耳若謂不然本智所緣真如內境亦應非是實耶然恐難云內境與識既並非虛當唯境識但云唯識何耶故三釋以通之一恐濫外境言唯識二愍存內境言唯識三統攝識性言唯識恐濫者識唯內有境則不但內有亦通外有者也若言唯境即濫外計故但言唯識耳愍存者或諸愚夫迷執外境起惑業因受生果不解觀我內心勤求出離大聖愍彼説唯識言令自觀心識不迷外境起惑造業解脫生非謂心內之境如遍計之外境都無而單言唯識比也統攝者或內境相分等亦識為體由熏習力似四分生此四分不離識性也真如內境亦是識之實性真如又曷離識性耶故除識性外無別有法識之一言攝無不盡且心所與心相應雖言唯識心所自統於中故但言唯識若千山之止於嶽邉萬𣲖之消於海上耳寧有纖毫攝之不盡者哉不必疑也四釋題回向此論三分成立唯識是故説為成唯識論亦説此論名淨唯識顯唯識理極明淨故此本論名唯識三十由三十頌顯唯識理乃得圓滿非增減故已依聖教及正理分別唯識性相義所獲功德施羣生願共速登無上覺初釋題二回向釋題三義初謂此論三分成立唯識名成唯識論三分者宗因喻為三分亦可初稽首一頌名宗前敬敘分次三十頌名依教廣成分後已依一頌名成就施願分亦名三分二説雙具前三為正蓋十卷之多必以三支成立唯識故也二此論名淨唯識顯唯識理極明淨故極明淨者顯理究竟殊無一毫不盡曰極明淨也又顯識究竟圓成實性無垢識故曰極明淨二説圓具前説為正蓋十卷之多展轉顯理究竟無垢之識自在故也三此本論名唯識三十由三十頌顯唯識理乃得圓滿非增減故圓滿無增減者一三十頌從因至果顯唯識理離於增減損益之義恰中其妙乃得圓滿二釋三十頌從頌至頌顯唯識理字字句句逺離增減之過巧適其中乃得圓滿而要之雙含二義為完蓋十卷之文不離三十頌三十頌全處十卷之論文故也二回向者已依聖教及正理分別唯識性相義是依教理造論所獲功德施羣生願共速登無上覺是修回向發願性相者前八卷是顯唯識相後二卷是顯唯識性雖性不離相相全顯性而隨義隨文倫次不得不秩然耳功德有三一即性之具曰德全德之能曰功所謂常樂我淨等本覺性功德也二由修而得曰德即德之能曰功所謂不共無畏等始覺修功德也三雖即本而始全修全性名究竟覺亦不分而分焉若按慈氏之論修德則有讀誦總持漏與無漏通別之辨讀誦但熟於文總持兼了於義讀誦唯屬聞慧總持兼屬思慧讀誦總持名通修行唯屬有漏修慧屬別修行唯攝無漏所獲功德者或通有漏或唯無漏奘師譯信金剛福德曰生如是福德取如是福德生也者指修時所植種子言也取也者指從種所發現行言也乃什師統生取而譯之曰得如是福德今獲者得也以此施生名為法施登無上覺是佛道無上誓願成共登無上覺是衆生無邉誓願度煩惱無盡法門無量誓願斷學自在其中矣或曰欲速不逹儒者有是言也况無上覺乎曰敏則有功儒者亦有是言也况無上覺乎不知速者精進義聖王曰無逸覺皇曰慎勿放逸精進貫於諸度諸度之中精進最為有力惟願痛無常危脆之身念常住圓成之識既汩沒於三有愛河之水須撈摝於十卷心海之文抒之又抒抒之不已極力而海波元減索之更索索之不休罔象而神珠自呈精進煥然千生只在一生懈怠瞥爾一誤而成百誤相與勉旃共勤砥礪已遵教理及師命訂正唯識性相義所獲功德施含識願證識心三昧海賢預姑蘇信女張門李氏大緣助板助刻姓氏管宗顏徐昌時嚴栴戴文光方昌育施大施時化塢大材沈大用劉大恆廣淨大𮗚德純定心道廬
