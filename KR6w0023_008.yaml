body:
  text: 古杭雲棲寺弟子廣伸述二旁論十因三初正明十因二因緣相攝三因緣得果初正明十因二初總標徴二別釋義初總標徴如是四緣依十五處義差別故立為十因云何此依十五處立此下復以十因廣明四緣也緣止四因有十因立於依處則所謂十五云云者果有異於因緣乎展之卷之緣生義始徹耳豈徒為旁論也哉又十因名出地持經詳釋如瑜伽論二別釋義十初隨説因依處二觀待因依處三牽引因依處四生起因依處五攝受因依處六引發因依處七定異因依處八同事因依處九相違因依處十不違因依處初隨説因依處一語依處謂法名想所起語性即依此處立隨説因謂依此語隨見聞等説諸義故此即能説為所説因有論説此是名想見由如名字取相執著隨起説故若依彼説便顯此因是語依處初指語依處二釋依立因三會通論説語依處者語性起必有處如鈔云即法名想三為語因法即一切法為有所詮諸法便能令諸有情內心起想想像此等所詮諸法已次方安立其名內心安立名後方能發語即法名想三為先是能起方起得所起之語即語依處故謂依法名想所起語性曰語依處也依立因者即依此語依處立隨説因謂依此語隨見隨聞隨知覺説諸義趣此即能説之語為所説義趣之因以有語言文字而後詮顯義理故也集論説此隨説因是名想見謂由如名字之名取相之想執著之見隨起説故若依此説便顯此隨説因是語依處義極相同瑜伽亦云三界繫不繫法施設名為先故想轉想為先故語轉由此語故隨見隨聞隨知隨覺起諸言説是故依語依處立隨説因脈絡愈為明顯二觀待因依處二領受依處謂所觀待能所受性即依此處立觀待因謂觀待此令彼諸事或生或住或成或得此是彼觀待因觀對義待藉義領納義受五受領受依處謂所對藉能所受性也即依此觀待能所受性處立觀待因謂觀待此令彼諸事或生住成得者此如手足彼如執持往來等故瑜伽云如觀待手以手為因故起執取業觀待足以足為因故起往來業等觀待節以節為因故起屈伸業諸有欲求欲界繫樂及不繫樂彼觀待此此為因故於諸欲具或為求得或求積聚或求受用乃至色無色等皆然是故依領受處立觀待因然大約是即能所相對藉以立其因耳三牽引因依處三習氣依處謂內外種未成熟位即依此處立牽引因謂能牽引逺自果故習熏習氣氣分瑜伽云由淨不淨業熏習三界諸行是也依處謂內外種未經被潤已前此名習氣依處即依此未潤種上立牽引因且內種者如第八識中有無量種若有漏種子未被愛取水潤已前雖未便生現行然此種上且有能牽引生當起現行果之功能即以此種名牽引因如宗鏡云一切種子望後自果名牽引因四生起因依處四有潤種子依處謂內外種已成熟位即依此處立生起因謂能生起近自果故成熟位釋有潤以未被愛潤已前名生位故即依此成熟處立生起因謂能生起近自果故以未被愛潤已前但有牽引現行之逺能今成熟則有生起現行之近能矣所謂欲色無色諸法各從自種而得生起也故經謂業為感生因愛為生起因瑜伽亦云即諸種子望初自果名生引因五攝受因依處五無間滅依處謂心心所等無間緣六境界依處謂心心所所緣緣七根依處謂心心所所依六根八作用依處謂於所作業作具作用即除種子餘助現緣九士用依處謂於所作業作者作用即除種子餘作現緣十真實見依處謂無漏見除引自種於無漏法能助引證總依此六立攝受因謂攝受五辦有漏法具攝受六辦無漏故五無間滅依處者即心心所等無間緣謂前滅心心所為緣能與後念一聚心心所為依處後念心心所依他前念為緣處生故名無間滅依處六境界依處者即是一切所緣緣境能與一切能緣心心所為依處故七根依處者即內六處此六是八識心心所所依之處但前無間滅依處取八識前念功能為依處引後念令生今此根依處即取現在五色根及第七意名根依處也八作用依處者即通作業作具之作用作業有情工巧智能造殿堂及種種器具等物作具世間種種作具如斤斧車船等但除𨚫識中種子外法種子以種生現現熏種種引種及親助現緣非作用處餘踈助現緣能成辦種種事業者皆是此作用依處也九士用依處者即於前作用依處唯取作者士夫之用故云於所作業作者作用謂於所作事業之農工等士夫之作用也即除種子餘作現緣者亦除內外等種餘一切作現緣者皆是士用依處十真實見依處謂無漏見者見不虛妄曰真實能與一切無漏有為無漏無為而為所依故名依處除引自種非此依處於無漏法能助引證是此依處總依此六立攝受因而攝受者是因果相關涉義但除𨚫親因緣外取餘一切踈助成因緣者皆名攝受對法論云如日水糞望麥芽等雖有自種所生然增彼力名攝受因何者攝受前五能辦世間有漏色心等法故具攝受六能辦出世無漏智理等法故顯瑜伽皆同此説恐繁不引六引發因依處十一隨順依處謂無記染善現種諸行能隨順同類勝品諸法即依此處立引發因謂能引起同類勝行及能引得無為法故初釋依處二依立因謂無記染善現種諸行能隨順同類勝品諸法者釋隨順依處也宗鏡云隨順依處者即一切色心等種現皆有隨順自性及勝同類品諸法故名隨順依處隨順自性即簡他法不得為此依因如第八中三性種子各各自望三性現行為依為因及勝同類品諸法者如無漏法即唯與自無漏有為及無為勝品法為因處不與下品劣無漏為因就有漏位中亦自有勝劣也釋依立因者即依此隨順依處立引發因謂能引起同類勝行及能引得無為法故如顯釋云由欲繫善法能引欲繫諸勝善法亦能引起色無色繫諸勝善法隨順彼故如欲繫法如是色無色繫亦爾如色無色繫如是不繫善法能引不繫諸勝善法及能引無為作證之法又不善法能引勝不善法謂如欲貪能引瞋癡慢見疑及身惡行等如欲貪如是瞋等亦爾如不善法如是無記之法能引善不善無記又無記法能引同類勝無記法瑜伽之釋與此大同而云引發因者即初種子所生起果望後種子所牽引果名引發因又引發跟隨順餘倣此七定異因依處十二差別功能依處謂有為法各於自果有能起證差別𫝑力即依此處立定異因謂各能生自界等果及各能得自界果故初釋依處二依立因色心等各別種子曰有為法諸色種各色現行果諸心種各心現行果等曰自果各於自果有能起證差別力者諸種各於自現行果有能生起能證得不同之功能也即於此差別功能依處立定異因言不亂也謂各能生自界果及各能得自界果故者釋定異因也謂欲界色心功能各能生欲界色心等現行果各能得欲界自現行果也顯釋云由欲界繫法自體功能有差別故能生種種現差別法如欲界繫如是色無色繫及不繫法亦爾是故依差別功能依處立定別因瑜伽亦云種種異類各別因緣名定別因總之自界法即與自界為因各各自有因果相稱不相雜亂名差別功能名定異因如欲界一地而有六趣之殊五戒等善業定起證人天第八十不善業定起證三塗第八乃至自三乘種子望自三乘有為無為果為因定者因果相稱義異者不共他義一切諸法各各相望皆有定異因八同事因依處十三和合依處謂從領受乃至差別功能依處於所生住成得果中有和合力即依此處立同事因謂從觀待乃至定異皆同生等一事業故謂從領受至和合力指依處也即攝前六因十一依為此和合處體謂十一依各各於自所獲生住成得果中皆有和合力故名和合依處即依此處至一事業釋同事因也言即依此和合處立同事因謂從觀待牽引生起攝受引發定異六因皆各共成生住成得一事業故瑜伽云要由獲得自生和合故欲繫法生如欲繫法色無色繫法及不繫法亦爾如生和合如是得和合成立和合成辦和合作用和合亦爾是故依和合處建立同事因且如眼識生時待空明等緣立觀待因由有新本二二類種如其次第得有牽引及生起因次取等無間及根境等立攝受因望前於後是引發因由名言種故有定異因眼識既爾餘法亦然九相違因依處十四障礙依處謂於生住成得事中能障礙法即依此處立相違因謂彼能違生等事故謂於生住成得事中能障礙法指障礙依處也謂彼能違生等事故釋相違因也能障礙法曰相違因即違增上緣顯釋云若欲法將生時若有障礙現前便不得起如是色無色法及不繫法亦爾如是為欲生如是為欲得為欲成立為欲成辦為欲作用亦爾是故依障礙依處立相違因瑜伽云於所生法能障礙名相違因當知相違略有六種一語言相違謂有一類或諸沙門或婆羅門所造諸論前後相違二道理相違謂為成立諸所成立諸所知義建立比量而與證成道理相違三生起相違謂所生法能生緣闕障生緣會四同處相違謂明暗貪瞋苦樂等法五敵相違謂毒鼠狼貓狸鼷鼠互為敵惡知識等六障治相違謂修不淨與諸貪欲修慈與瞋修悲與害修七覺支八聖道支與三界繫一切煩惱於六義中正意唯取生起相違十不違因依處十五不障礙依處謂於生住成得事中不障礙法即依此處立不相違因謂彼不違生等事故謂於生住成得不障礙法指依處也謂彼不違生等事故釋立因也此即順增上緣顯論云若欲繫法將生時若無障礙現前便得生起如欲繫法如是色無色繫法及不繫法亦爾如生如是得成立成辦作用亦爾是故依無障礙依處建立不相違因瑜伽云此障礙因若闕若離名不相違因若總論十因則隨説為諸法先導之門觀待了現前作用之事牽引能成自果攝受能攝萬緣生起令萬類能生引發使諸果成辦定異則種類各別同事則體用一如相違起障礙之門不違順緣生之理以上正明十因竟二因緣相攝二初以二因攝於十因二以四緣攝十二因初以二因攝於十因二初標二釋初標如是十因二因所攝一能生二方便二釋二初明通攝二明局攝初明通攝二初菩地二伺地初菩地菩地説牽引種子生起種子名能生因所餘諸因方便因攝此説牽引生起引發定異同事不相違中諸因緣種未成熟位名牽引種已成熟位名生起種彼六因中諸因緣種皆攝在此二位中故雖有現起是能生因如四因中生自種者而多間斷此略不説或親辦果亦立種名如説現行麥等種所餘因謂初二五九及六因中非因緣法皆是生熟因緣種餘故總説為方便因攝非此二種唯屬彼二因餘四因中有因緣種故非唯彼八名所餘因彼二因亦有非因緣種故引瑜伽菩地文釋二因所攝發隱意之所通也初引論文二發文意於發意中初至榖麥等種發牽引生起名能生因意次至方便因攝發所餘諸因攝方便因意三至因緣種故發能生方便不止二八因意發初意中據文只説牽引種子生起種子名能生因意此説牽引生起引發定異同事不相違中諸因緣種未成熟位名牽引種已成熟位名生起種彼六因中諸因緣種皆攝在此二位中非止以二位名能生也又恐難云現行生種亦能生因如初二五九四因中生自種者何不言耶故通云彼四因中現起生種多間斷故略不説耳如言説等有時而無即間斷也雖然亦或四因中現起親辦種果雖是現行亦立種名如麥等雖是現行亦得種子名故據此則六因中因緣固能生之名四因中現行亦得能生之名也發次意中又彼論説所餘諸因方便因攝者所餘謂初二五九及牽引等六因中非因緣法是生熟二種之餘故總名方便亦非止以餘八為所餘名方便也發三意中恐難云菩地説能生攝二因方便攝餘八云何此中二通攝十耶故通云非此二種唯屬牽引及生起因餘引發等四因中亦有因緣種故不必局於二因而不通也非但彼八名所餘因牽引生起二因之中亦有非因緣種故不必局於餘八而不通也又能生即因緣方便即增上其所緣緣等無間雖俱攝受因亦屬方便因攝又菩地是瑜伽一地之名在三十八卷二伺地有等地説生起因是能生因餘方便攝此文意説六因中現種是因緣者皆名生起因能親生起自類果故此所餘因皆方便攝非此生起唯屬彼因餘五因中有因緣故非唯彼九名所餘因彼生起因中有非因緣故引瑜伽伺等地文釋二因所攝發隱意之所通也初引文二發意於發意中初至自類果故發生起是能生餘因方便攝次至非因緣故發生起餘因名屬不止一九意發初意中據文只説生起一因是能生因餘九方便因攝據文意説六因中現行種子是因緣者皆名生起因以能親生種現自類果故即此生起是能生因此所餘因皆方便攝者意謂此六因外及六因中非因緣法皆方便攝也發次意中恐難云彼説生起一因是能生餘九名方便今何一通於五九不止於九耶故通云非此生起唯屬彼因餘五因中有因緣故不局於一因而不通也非唯彼九名所餘因彼生起因中有非因緣故不局於九而不通也上文已説此多影略觀者凖前自可知矣又等地等於無等二地亦瑜伽三地之名二明局攝或菩地所説牽引生起種子即彼二因所餘諸因即彼餘八雖二因內有非能生因而因緣種勝顯故偏説雖餘因內有非方便因而增上者多顯故偏説有等地説生起因是能生因餘方便者生起即是彼生起因餘因應知即彼餘九雖生起中有非因緣種而去果近親顯故偏説雖牽引中亦有因緣種而去果逺踈隱故不説餘方便攝準上應知順瑜伽諸地之文釋局攝而不通也初菩地以二為二以八為餘約勝顯説其義可知次伺等地偏説生起不説牽引者雖生起亦有非因緣種去果親近以能生起近自果故能親生現行之義顯故偏説生起是能生因雖牽引中亦有因緣種去果踈逺謂能牽引逺自果故親能生現行之義隱故不説牽引是能生因也方便亦然是則十因二因所攝通局之致如此文隨於義以意逆文不可以辭害意二以四緣攝十二因二初問二答初問所説四緣依何處立復如何攝十因二因問謂四緣於十五處各依何處建立十因二因復如何相攝也二答二初答四緣依處立義二答四緣攝於諸因初答四緣依處立義論説因緣依種子立依無間滅立等無間依境界立所緣依所餘立增上此中種子即是三四十一十二十三十五六依處中因緣種攝雖現四處亦有因緣而多間斷此略不説或彼亦能親辦自果如外麥等亦立種名或種子言唯屬第四親踈隱顯取捨如前言無間滅境界處者應知總顯二緣依處非唯五六餘依處中亦有中間二緣義故或唯五六餘處雖有而少隱故略不説之初引瑜伽文釋次發論文意引釋中論説因緣依種子立者依第三習氣種子第四有潤種子二依處立也依無間滅立等無間者依第五無間滅依處立等無間緣也依境界立所緣者依第六境界依處立所緣緣也依所餘立增上者共依十一種依處立增上緣也發論意中六𫨻初於因緣先約通義釋次約通妨釋三約比例釋四約局義釋五於無間所緣二種先約通義釋次約局義釋論中種子即是第三習氣第四已潤種子十一隨順十二差別功能十三和合十五無障礙依處皆因緣種攝恐難云初二五九四處現行生種亦有因緣不言者何耶故通云而多間斷故略不説雖然或彼四處亦能親辦種果雖是現行亦立種名如外麥等雖是現行亦得種子之名可比知也或種子言唯屬第四生起約局義釋也親踈隱顯取捨如前者例前以通難難曰有潤種子依處亦有非因緣法今何通取通曰非通取也以去果親而不踈顯而不隱故取之耳又難曰餘五處如三如十一十二十三十五亦皆有因緣種今何簡捨通曰餘五處中因緣非不收取以去果踈而不親隱而不顯故捨之耳親踈隱顯取捨如前伺等地中所釋言無間滅境界處者先通後局義自明顯又不釋增上者三緣既明故可軌知故四緣之立依處如此餘依處中指十三依處中也二答四緣攝於諸因論説因緣能生因攝增上緣性即方便因中間二緣攝受因攝雖方便內具後三緣而增上多故此偏説餘因亦有中間二緣然攝受中顯故偏説初能生攝進退如前初引論文釋次發論文意前問四緣復如何攝十因二因故引論答云因緣攝於能生增上攝於方便中間二緣攝於攝受論文無十因者二因攝故文中增攝受因者攝緣盡故恐難云方便因中具後三緣獨言增上者何發論意釋云雖方便內具後三緣而增上多故此偏説恐又問云餘九因中亦有中間二緣豈但攝受能攝此二緣耶亦可餘因指能生方便二因中亦有無間所緣故釋意云餘因亦有二緣然以攝受中顯故偏説耳恐更問云前菩地以牽引生起為能生因伺地以生起為能生因今論説因緣能生因攝為如菩地中為如伺地耶故云初能生攝進退如前答意謂汝問意以為能生因中亦有非因緣何故通取不知以因緣顯勝故進而取之汝問意以為方便攝受中亦有因緣何故簡取不知二因雖有因緣以隱少故退而捨之耳亦皆如伺地中故曰如前四緣攝於二因十因如此通上第二因緣相攝竟三因緣得果二初問二答初問所説因緣必應有果此果有幾依何處得初問因緣得果二問果有幾種三問得果依處二答三初答數目二答依處三答得果初答數目果有五種一者異熟謂有漏善及不善法所招自相續異熟生無記二者等流謂習善等所引同類或似先業後果隨轉三者離繫謂無漏道斷障所證善無為法四者士用謂諸作者假諸作具所辦事業五者增上謂除前四餘所得果前問此果有幾今答果有五種云云也有漏善簡無漏善自相續簡他身及非情異熟生者但言異熟不攝別報云異熟生攝總別報主以自相續異熟如暴流無間即第八真異熟識前六名異熟生謂六識中所作有漏善惡無記引滿二業招感三界所攝真異熟及異熟生總名異熟果也二等流果等平等流對源説流與源同曰等流也習善等所引同類者如第八中所習善種引生善現同類果所習惡種引生惡現同類果所習無記種引現無記同類果真等流也或似先業後果隨轉者今日所受報果與先業相似果隨業運如今夭果似先殺業夭隨殺轉今日貧果似先慳業貧隨慳轉等似等流也三離繫果煩惱名繫縛煩惱滅曰離繫無漏道斷障所證善無為法者聖八支道曰無漏以此道斷煩惱障曰無漏道斷障寂滅無為為體曰善無為法是無漏能斷道之所證得曰所證善無為法也然此果究竟非異生世智滅諸煩惱不究竟者得攝於此果也四士用果士士夫用作用因法為作者緣法為作具果由於人之作用而得曰士用果顯云若諸世間於現法中隨依一種工巧業處起士夫用謂營農商賈事正書算計數造印等由依此故苗稼成滿獲商利等果法成就名士用果五增上果增對減説上對下説此果本於助殊勝而得曰增上果顯云眼識是眼根增上果乃至意識是意根增上果如是二十二根一切各由別增上力故彼果得生應知彼果皆名增上即前四果所不攝者皆此果攝故宗鏡云增上果最廣如四緣增上緣五見中邪見不簡漏無漏為無為四果不攝皆此所攝若總明之則五果者異熟則因生果熟異時而成等流則因果性同流類無濫增上則力用殊勝能助他緣士用則功業所成能獲諸利離繫則斷障證真超諸繫縛如上因緣報成五果故知因果相酬唯識變定噫嘻四緣十因以及成果收盡凡聖之道能成教法之門闕之則一法不圓昧之則終成外道學者特宜熟讀而詳玩之可也二答依處瑜伽等説習氣依處得異熟果隨順依處得等流果真見依處得離繫果士用依處得士用果所餘依處得增上果習氣處言顯諸依處感異熟果一切功能隨順處言顯諸依處引等流果一切功能真見處言顯諸依處證離繫果一切功能士用處言顯諸依處招士用果一切功能所餘處言顯諸依處得增上果一切功能不爾便應太𡩖太狹或習氣者唯屬弟三雖異熟因餘處亦有此處亦有非異熟因而異熟因去果相逺習氣亦爾故此偏説隨順唯屬第十一處雖等流果餘處亦得此處亦得非等流果而此因招勝行相顯隨順亦爾故偏説之真見處言唯詮第十雖證離繫餘處亦能此處亦能得非離繫而此證離繫相顯故偏説士用處言唯詮第九雖士用果餘處亦招此處亦能招增上等而名相顯是故偏説所餘唯屬餘十一處雖十一處亦得餘果招增上果餘處亦能而此十一多招增上餘已顯餘故此偏説引論答果依處闡幽微也初引瑜伽文次發文通義三發文局義上問依何處得今引瑜伽等文説習氣依處得異熟果乃至士用依處得士用果所餘十一依處得增上果也次發通義者謂論中習氣處言乃至所餘依處言非止言習氣處及所餘處而各各通有所顯於習氣則顯諸依處感異熟功能不專指第三依處乃至所餘依處則顯諸依處得增上果功能不專指所餘十一種依處也不爾便應四果四處得則太狹十一全分得增上則太𡩖矣均之故無此過發局義者或習氣言唯屬第三乃至所餘處言屬餘十一非不互具從顯勝處故然則通不離局局處亦通恐以局為局通發於本文之後以通為通局又發於通義之後耳又餘已顯餘謂餘四處已顯餘四果故此偏説增上三答得果如是即説此五果中若異熟果牽引生起定異同事不相違因增上緣得若等流果牽引生起攝受引發定異同事不相違因初後緣得若離繫果攝受引發定異同事不相違因增上緣得若士用果有義觀待攝受同事不相違因增上緣得有義觀待牽引生起攝受引發定異同事不相違因除所緣緣餘三緣得若增上果十因四緣一切容得上問所説因緣必應有果今承前二答之文答云如是即説此五果中牽引及增上五因一緣得異熟果牽引及初因緣後增上緣七因二緣得等流果攝受及增上五因一緣得離繫果四因及增上一緣得士用者非也八因三緣除所緣緣得士用果者為是何則古釋諸心心所通具四果佛無異熟凡除離繫則眼識等士用果豈不由種生耶故亦有牽引生起引發定異等四因方得因既如是緣亦應爾故二解中後義為正十因四緣一切容得增上果以增上最𡩖前四果中所不攝者皆此所攝故也問八識云何具四果耶曰眼等五識從種生現是等流果五根為所依是增上果眼識等作意警心及眼識等能緣色等是士用果五根是第八親相是異熟果六種生現是等流果前念意根為能引或能引五識是增上果能緣三世內外境等是士用果能造當來總別報及與異熟為因皆異熟果七種生現是等流果前念第七與後念為所依即增上果能緣第八見分為自內我是士用果能與真異熟為所依即異熟果八種生現名等流果與七為所依是增上果能緣三境及持種受熏是士用果當體是真異熟名異熟果五果得於十因因緣必應有果如此以上連前第二旁論十因一大科竟三正論生緣二初結前起後二釋緣生相初結前起後旁論已了應辨正論依處不明十因不顯十因不明四緣不透今論十因曰旁者以前問都無外緣由何而生種種分別今論從種識內緣而生名為正答正答以外名之為旁殊非邉旁不可置之旁也二釋緣生相三初正釋二結斥三廣指初正釋九初識種生現論緣生二現起分別論緣生三自他相望論緣生四自八識聚論緣生五自類前後論緣生六同聚異體論緣生七同體四分論緣生八淨八識聚論緣生九現種於種論緣生初識種生現論緣生本識中種容作三緣生現分別除等無間謂各親種是彼因緣為所緣緣於能緣者若種於彼有能助力或不障礙是增上緣生淨現行應知亦爾此至餘論中具廣分別皆重釋由一切種識乃至展轉力彼彼分別生也今唯約識種生現論緣生初標次釋三例本識第八識中種本識中八種現識各親種也容作三緣生現分別曰除等無間者以等無間唯前後現識相望是現生現立為緣故此種生現是故除之八種現識各有親生種子是彼八種現識因緣此因緣種為能緣第八及觸等五所相分是所緣緣若此識種望彼現識有能助力縱不助力或不障礙是增上緣也生淨現行應知亦爾謂染種生染現既如此淨種生淨現亦具三緣可例知也二現起分別論緣生現起分別展轉相望容作三緣無因緣故唯約現識論緣生也展轉相望等者如現起眼識望餘現耳識等不相障礙有能助力耳等現識望眼現識皆然是增上緣現意識得緣餘現識第七現識得緣第八現識是所緣緣前八現識望後八現識各於自類有開導力是等無間緣無因緣者非約種生現故三自他相望論緣生謂有情類自他展轉容作二緣除等無間唯約自他現識論緣生也展轉容作二緣者以自望他以他望自或至得他心通皆有為所緣二義相助無障皆有為增上緣義除等無間者以自他無開導義不言除因緣者不言自可知也四自八識聚論緣生自八識聚展轉相望定有增上緣必無等無間所緣緣義或無或有八於七有七於八無餘七非八所仗質故第七於六五無一有餘六於彼一切皆無第六於五無餘五於彼有五識唯託第八相故唯約自己八種現識聚彼此相望論緣生也定有增上者於自一聚中此彼相望皆有相助無障義故必無等無間者不約諸識自類前後相望故所緣緣義或有或無者七八相望論有無七六相望論有無五六相望論有無也七八相望有無者八於七有踈所緣緣以六七二識緣第八故第八相分是前五所仗質故七於八無所緣緣以前七識非第八所仗質故第八正緣三類性境故第七於六有無者第七於六五無所緣緣一有所緣緣五不緣七唯外門轉第六能緣第七識故餘六於彼一切皆無以第七不緣前六唯緣第八見分為內我故第六於五有無者第六於五無所緣緣五唯託第八相分為本質故餘五於六有所緣緣以六能通緣一切心故又前現起分別云展轉相望自八識聚亦云展轉相望然前有等無間此無等無間便可知矣五自類前後論緣生自類前後第六容三餘除所緣取現境故許五後見緣前相者五七前後亦有三緣前七於八所緣容有能熏成彼相見種故約八種現識自類前後論緣生也初正明自類次開出所緣三義顯所緣自類如前五前念後念是前五自己之類乃至第八前念後念是第八自己之類諸識皆然也第六容三者六現能緣三世即以前念意識得緣後念後念得緣前念是所緣緣前後相望助而不障是增上緣前後自相開導是等無間緣以唯約現識除於因緣餘除所緣取現境者謂餘七識自類前後具增上無間二緣并除所緣以五取現在五塵七取現在第八八取現在三境不緣過未則自類前不緣後後不緣前故無所緣緣也許五七後念見分得緣前念五七相分者則前五第七亦具三緣唯除因緣然五七因中緣現是常所許緣過未非常所許今雖開之而曰許然亦恐以餘除所緣為正前七於八所緣容有者謂第八因中雖不緣前七種識而前七於八容得有所緣緣何者能熏成彼相見種故前五能熏成彼相分種第七能熏成彼見分種第六能熏成彼相見種種既第八所緣緣相則緣種之時前七之氣味宛在約此義故謂前七於八有所緣緣耳問此以自類前後論緣今八與七論豈不犯自他相望耶曰此因所緣緣便取義而説然終以餘除所緣為正六同聚異體論緣生同聚異體展轉相望唯有增上諸相應法所仗質同不相緣故或依見分説不相緣依相分説有相緣義謂諸相分互為質起如識中種為觸等相質不爾無色彼應無境故設許變色亦定緣種勿相分境不同質故約王所相望論緣生也初明無所緣次釋有所緣一王多所和合似一曰同聚相用各別曰異體展轉相望唯有增上者謂同聚心心法彼此相望不相障礙有能助力曰有增上緣曰唯者無所緣緣故以諸相應法與諸心王所仗質同不相緣故是以無所緣緣義也雖然或依見分説不相緣若依相分有相緣義謂諸相分互為質起心王相分為所本質心所相分為王本質例如本識中所持種子為觸等五所似種相分之質此即心之相分為心之本質他可知矣反而言之若識種不為觸等相質則生無色界時既無身器彼觸等五應無所緣境耶以無色界不變色緣唯緣種子設許變色而為所緣然觸等五亦定緣種變似種相矣勿有相分境不同本質故也質既定同故諸相分容互為質而有相緣之義七同體四分論緣生同體相分為見二緣見分於彼但有增上見與自證相望亦爾餘二展轉俱作二緣此中不依種相分説但説現起互為緣故約現起四分論緣生也初正釋緣生次簡別為緣諸心心所雖皆四分唯一識變曰同體則同體相分貫下乃至同體證自證也為見二緣者相能引見是增上緣相為見緣是所緣緣見分於彼但有增上者以相分非能緣故無所緣緣見唯引生相分但有增上緣見與自證相望亦爾者見於自證容作二緣自證於見但有增上以見通非量不能證故餘二展轉作二緣者自證證自互相引故為增上緣互相緣故為所緣緣此中不依種相分説但説現起互為緣者恐人錯認相分而簡別之謂此中相分互為緣起不説種子相分但説現起相分互為緣起又上從廣至狹此乃從踈至親八淨八識聚論緣生淨八識聚自他展轉皆有所緣能遍緣故唯除見分非相所緣相分理無能緣用故約轉依位中清淨八種現識論緣生也自他展轉皆有所緣者不同前説未轉依位有無不定如見分以自證證自為所緣緣自證以見分證自證為所緣緣證自證以見分自證為所緣緣若自若他自類前後異體同體展轉相望皆有所緣緣以佛果位中諸心心所能遍緣一切法故唯除相分者以相分理無能緣之用故無所緣緣義九現種於種論緣生既現分別緣種現生種亦理應緣現種起現種於種能作幾緣種必不由中二緣起得心心所立彼二故現於親種具作二緣與非親種但為增上種望親種亦具二緣於非親種亦但增上約現種於種躡前以論緣生也初舉例為問次簡釋為答舉能例云既現分別緣種而現行乃生合所例云種亦理應緣現行種子方起乃正問云現種於種能作幾緣答中先簡別云若種子位必不由中間等無間所緣緣起以此二緣得現行心心所之所立故種既非現何由有此二緣故明種唯初後二緣先以現望種現於親種具二緣以親生現行為因緣相助引生為增上於非親種亦但增上不親故無有因緣次以種望親種望非親種準前可知二結斥依斯內識互為緣起分別因果理教皆成所執外緣設有無用况違理教何固執為分別者以前問云若唯內識都無外緣由何而生種種分別故此結云依斯內識為緣起分別等即頌所謂展轉力故彼彼分別生也所執外緣設有無用况違理教何固執為者斥也三廣指雖分別言總顯三界心及心所而隨勝者諸聖教中多門顯示或説為二三四五等如餘論中具廣分別隨勝者隨勝以立名也二謂真識現識三謂業轉現四加智識五加相續識一説二謂墮意不墮意三謂心意識四謂善等四性五謂因果苦樂捨如餘論者如瑜伽論攝大乘論顯識論大論等宗鏡五十六卷廣明以上料簡分別唯識竟三料簡生唯識二初本論二論釋初本論雖有內識而無外緣由何有情生相續頌曰由諸業習氣二取習氣俱前異熟既盡復生餘異熟二論釋四初第一解二第二解三第三解四第四解初第一解四初釋第一句二釋第二句三釋三四句四總申頌意初釋第一句論曰諸業謂福非福不動即有漏善不善思業業之眷屬亦立業名同招引滿異熟果故此雖才起無間即滅無義能招當異熟果而熏本識起自功能即此功能説為習氣是業氣分熏習所成簡曾現業故名習氣如是習氣展轉相續至成熟時招異熟果此顯當果勝增上緣初釋諸業二釋習氣三簡因緣釋諸業中諸業謂福業非福業離界散動之不動業福及不動即有漏善思業非福即有漏不善思業以思為體思外餘心所眷屬亦立業名業者因義對果而言善惡主伴同招引滿異熟果名為業也如人天等真異熟酬福善引業色無色真善異熟酬不動引業人天異熟生唯酬福善滿業色無色異熟生唯酬不動滿業不善引滿反此釋習氣中初難次釋後簡難云此業才起無間即滅流入過去無義能招當果而曰招當果者何耶曰此雖生即滅無招果義而熏本識引起自業之功能即此功能説為習氣習氣是業氣熏習所成由習所成故非過去曾業是業氣分故非現在實業為簡過現二業立習氣名簡因緣者如是習氣展轉相續從生至熟招異熟果此顯當果勝增上緣而非因緣二釋第二句相見名色心及心所本末彼取皆二取攝彼所熏發親能生彼本識上功能名二取習氣此顯來世異熟果心及彼相應諸因緣種俱謂業種二取種俱是踈親緣互相助義業招生顯故頌先説初釋二取二顯緣法三釋俱義四通妨難皆二取攝者相分見分固二取攝名色五蘊亦二取攝心王心所本第八識末前七識皆二取攝也彼指二取現行彼二取現行之所熏發親能生彼本識上所持差別功能名二取習氣即此習氣顯當來異熟果心及彼相應諸因緣種俱者業種是踈緣名增上二取種是親緣名因緣此二不相乖而互助曰業種二取種俱也恐問親先踈後式所宜然先言踈者何也曰業招生顯故頌先説問異熟何必三種習氣而後招曰無業種作增上誰為牽引生勝劣諸根無二取作因緣誰為親生種子生起諸識蓋業有盡而心無窮設無因緣生亦間斷安能相續生生之無盡耶三釋三四句前異熟者謂前前生業異熟果餘異熟者謂後後生業異熟果雖二取種受果無窮而業習氣受果有盡由異熟果性別難招等流增上性同易感由感餘生業等種熟前異熟果受用盡時復別能生餘異熟果由斯生輪轉無窮何假外物方得相續初釋前餘異熟二釋既盡所以三釋既盡復生四原相續對破前異熟果曰前前生業者過去一生業感之果曰前生若二生三生至無量生業感之果曰前前生業異熟果也餘異熟果曰後後生者未來一生業感之果曰後生若二生三生及無量生業感之果曰後後生業異熟果也恐問云二取種子於熏處即生生處即熏生生不已受果無窮頌言異熟既盡者何也釋云雖二取種受果無窮而業習氣受果有盡如戒善感人天異熟於人天中不修戒善則不更生人天惡感亦然故言有盡所以然者由異熟果性是無記業唯善惡而性別果雖由業隔世方熟而難招故有盡也等流增上因果無殊體性相順因果同時互生易感故無窮也既盡復生者由感當來餘生業等種熟於今身中前異熟果受用盡時復別能生餘異熟果故言前盡復生餘也由斯之故生輪轉無有窮盡何假外緣方得相續而汝謂雖有內識而無外緣由何有情生相續也耶問等流增上兼説者何曰增上果𡩖等流亦具增上如眼一識望於親種名等流果望眼根等是增上果耳等皆然也是故增上果無有別體即等流性是等流果故言性同又屬增上言易感耳四總申頌意此頌意説由業二取生輪回皆不離識心心所法為彼性故業以思所為體思於諸行為勝二取即心心所為彼三習氣之性也總顯生輪回由二習氣二種習氣皆不離識所以然者心心所法為彼性故是故生全體唯識二第二解二初別釋習氣二分屬頌文初別釋習氣復次生相續由諸習氣然諸習氣總有三種一名言習氣謂有為法各別親種名言有二一表義名言即能詮義音聲差別二顯境名言即能了境心心所法隨二名言所熏成種作有為法各別因緣二我執習氣謂虛妄執我我所種我執有二一俱生我執即修所斷我我所執二分別我執即見所斷我我所執隨二我執所熏成種令有情等自他差別三有支習氣謂招三界異熟業種有支有二一有漏善即是能招可愛果業二諸不善即是能招非愛果業隨二有支所熏成種令異熟果善惡趣別應知我執有支習氣於差別果是增上緣初總標數目二別釋名言三別釋我執四別釋有支有為法即色心蘊處界等生住異滅各別因緣謂善等三性種不同故此出體也名言曰表義能詮表義理也音聲曰差別無詮表音聲也曰顯境即能了境七識見分心心所法此雖實非名言如言説名顯所詮義能顯所了境如似彼名能詮義此釋相也故隨二名言所熏成種作有為各別因緣者雖能詮音聲是相分色法唯無記性不能熏成色心等種然因名起種名名言種以心隨其名變似五蘊三性法等而熏成色心等種况了境王所是見分心法由依境故而起名言由依言説而能了境皆是色心妄織成種故云隨二名言所熏成種作有為法各別親種此結緣名也虛妄執我我所種者顯此種妄執而有此出體也俱生細執修所斷者通六七二識分別粗執見所斷者唯六識有此釋相也隨此二執所熏成種令有情等自他差別乖平等道此結別立義也有支即十二因緣中行有二支不言行者唯取現在行屬過去故謂招三界異熟業種者出體也三界異熟是所招業是能招熏成習氣名種有支有二一有漏善即是能招可愛果業二諸不善即是能招非愛果業可愛謂人天果非可愛謂三塗果此釋相也隨善惡業熏善惡種隨善惡種令異熟善惡果趣別故此結成趣別也應知我執有支習氣望當來差別果報是增上緣顯非因緣也問有支增上無論矣我執親生異熟應是因緣何云增上答令別自他故成增上二分屬頌文此頌所言業習氣者應知即是有支習氣二取習氣應知即是我執名言二種習氣取我我所及取名言而熏成故皆説名取俱等餘文義如前釋問釋名言習氣曰作有為法各別因緣釋有支習氣曰我執有支於差別果是增上緣今云我執名言屬前二取然前二取文云二取是因緣若我執是增上不應屬於二取因緣矣前後義云何通曰我執習氣名取以我執是惑惑名能取名言是苦苦名所取取著義故以我執屬於取中我執曰增上緣者以苦習氣望生苦果能作因緣親生苦故我執名惑惑與業種於生苦為增上緣助生苦故是則我執習氣有取義故得與於二取不能親生苦果故不與於因緣惑業種子有助生苦果義故得與於增上緣也詳見後文問泛説名言及業種子何所似耶答名言如散土業種若泥團水和散土而作泥團業招名言而為業種泥團不散之際水力能之異熟未萎已來業力如是三第三解二初正解頌文二詳攝有支初正解頌文復次生相續由惑業苦發業潤生煩惱名惑能感後有諸業名業業所引生衆苦名苦惑業苦種皆名習氣前二習氣與生苦為增上緣助生苦故第三習氣望生苦能作因緣親生苦故頌三習氣如應當知惑苦名取能所取故取是著義業不得名俱等餘文義如前釋初明三道相次指屬頌文發業是無明潤生是貪愛前二習氣指業惑第三習氣指苦種能所取者惑名能取苦名所取業不得名業無著義故問發業獨無明矣潤生獨貪愛乎曰此舉其尤耳餘非不兼故總以三名收之如頌云愛取無明惑行有二名業除五餘七支一二皆名苦二詳攝有支二初總標二別釋初總標此惑業苦應知總攝十二有支謂從無明乃至老如論廣釋然十二支略攝為四惑業苦三總攝十二支者如頌云無明愛取三煩惱行有二支屬業道從識至受并生七事同名一苦道廣釋指瑜伽釋云無明體謂行蘊中癡行支體謂身語意思識支體謂第八識種名色支體四蘊名名色蘊名色六入體謂內六處即六根觸支體謂第八觸全前六異熟除第七觸唯有覆故受支體謂遍行受愛支體謂三界貪取支體通取煩惱有支體取識等五及行支種愛取潤已轉名有故生支體謂識等五現老支體生支變滅即老支又稱十二牽連十二重城十二棘圍等是也二別釋四初正釋二料簡三義門四相攝初正釋四初明能引支二明所引支三明能生支四明所生支初明能引支一能引支謂無明行能引識等五果種故此中無明唯取能發正感後世善惡業者即彼所發乃名為行由此一切順現受業別助當業皆非行支此下正釋十二略攝為四謂引二生二今先能引初標釋引義次簡釋引相三簡別行支無明及行攝為能引一支此標能引支也能引釋等五果種故此釋能引義也此中無明唯取能發等者識及名色六入觸受曰五果果從種生種由引起無明與行能引此五果種曰能引支也唯取能發正感後世善惡業者謂後世善惡之果必以善惡之業為正感正感後世善惡之業必以無明為能發今唯取能發正感後世善惡業者為無明捨能發外無所取即彼能發之所發乃名為行捨所發外無所名此簡釋二支相也由此之故行感後世非順現受業行是正感非別助當果之滿業故云皆非行支此簡別行支名也以無明支於發業中有能通發總別報業者有但發總報業者有但發別報業者今取初二為行支故也又此二支亦可名牽引因能引逺果故亦可名增上緣是惑業故二明所引支二所引支謂本識內親生當來異熟果攝識等五種是前二支所引發故此中識種謂本識因除後三因餘因皆是名色種攝後之三因如名次第即後三種或名色種總攝五因於中隨勝立餘四種六處與識總別亦然集論説識亦是能引識中業種名識支故異熟識種名色攝故經説識支通能所引業種識種俱名識故識是名色依非名色攝故識等五種由業熏發雖實同時而依主伴總別勝劣因果相異故諸聖教假説前後或依當來現起分位有次第故説有前後由斯識等亦説現行因時定無現行義故復由此説生引同時潤未潤時必不俱故此於所引總別異同次第而詳釋之也初總釋所引次別釋所引三會通經論四釋五次第總釋所引者謂第八本識內所有識等五種親能生起當來世中異熟果攝識等五法如清涼云既發行已由行熏心令此本識能招當來生老故名之為種若無行熏終不得成故云於諸行中植心種子即是所引識等五種於一剎那為行所積集無有前後此是無明與行二支之所引發故名所引支別釋所引者此五支中識種謂第八本識親因除後六入觸受三因餘因皆是名色種攝者以異熟有三曰識曰生曰色識種是本識因異熟生異熟色曰餘因此皆是名色種攝後之六入觸受三因如名次第曰入種曰受種曰觸種也或名色種總攝五因於五因中隨勝立餘四種如名中所攝勝者則立識受觸三種色中所攝勝者立為六入種是也六處與識總別亦然一説識種一支總攝六處但隨緣説立五處耳一説以六入種總攝五因於五因中隨勝立餘四種識種總別義與入同會通經論者恐有問云此以五支名所引集論説識亦是能引者何舉四故答云識中所持業種名識支故識豈非行行故屬於能引異熟識種攝於名色識緣名色識又豈非能引緣起經説識種通能所引業種識種俱名識故業是能識是所引又豈非通于能引識是名色依非名色攝故者恐有難云論言識屬名色此云何通故答云識為名色依非名色攝論約能依名色言故説識是名色攝又豈非亦可言能引耶釋五次第者亦恐問云識等五種由行業一剎那中熏發而有實是同時而分前後者何故云雖實同時約義約位而分前後約義者依識是主餘四是伴故識前四後依名色是總餘三是別故名色前餘三是後依六入是勝餘二是劣故六入前餘二是後依觸是因受是果故觸前受後依此四義聖教假説前後非實前後也約位者或可依當來五果生起分位有次第故亦説前後由此於識等五亦説現行有前後義然因種對現行時説初因種時定無現行次第義故復由當來現起果位所生所引得説同時以種因生現果必同時故若依識初熏發位則不可説生引同時以已潤未潤必不俱故又此約種子未成熟位説依當果別立五因所引差別之義如此不可以不辨三明能生支三能生支謂愛取有近生當來生老故謂緣迷內異熟果愚發正能招後有諸業為緣引發親生當來生老位五果種已復依迷外增上果愚緣境界受發起貪愛緣愛復生欲等四取愛取合潤能引業種及所引因轉名為有俱能近有後有果故有處唯説業種名有此能正感異熟果故復有唯説五種名有親生當來識等種故承前二支詳釋能生支也初總標二正釋三會通總標能生者謂愛取有三支近生當來生老果故即已潤六支合為有故是生老親種故近生也二正釋三支相謂諸有情受二種果一內異熟果此即正報二及境界所生受增上果此即依報初謂緣迷內異熟果愚者愚於我相昧無我理於後生苦不如實知發正能招後有諸業之行支為緣引發親生當來生老位識等五果種已此指前七支也二復依迷外增上果之覆業迷事無明以境界為緣發起貪愛之愛支愛為緣故復生欲取見取戒取我語取等四取之取支愛取和合滋潤能引業種及所引因轉名為有此已潤業種及所引五因俱能近有後有果故後文已潤六支合為有故是也恐有問云然有處唯説業種名有唯説五種名有與此異者何也故會通云以業因是善惡果是無記此能正感異熟果故即增上緣唯言業種以親生當來識等五種即親因緣顯非業種之增上緣故唯言五種義各有取爾也又説唯業與五種詳見瑜伽第十及三十八卷中四明所生支四所生支謂生老是愛取有近所生故謂從中有至本有中未衰變來皆生支攝諸衰變位總名為老身壞命終乃名為老非定有附立支初標釋所生義次別釋二支相三通釋疑難義標釋所生易見生老位分齊如何謂從中有身自求父母投胎而為生有自生有至本有中未衰變來四十之前皆生支攝諸衰變位四十已後總名為老命終乃名為耳恐有問云生既別立一支老何為共立故云老非定有附立支正釋竟二料簡七初料簡病老二料簡名色三料簡愛支四料簡生引五料簡三惑六料簡自他七料簡異同初料簡病老病何非支不遍定故老雖不定遍故立支諸界趣生除中夭者將終皆有衰朽行故問意以生老病總是遷流餘三可支病不立支者何也答云病相不遍界趣又不定有故不立支難云現見中夭者非老則老亦不定何為立支答老雖不定遍故立支試觀諸界趣生除中夭者皆有衰朽行故豈非是遍二料簡名色名色不遍何故立支定故立支胎卵濕生者六處未滿定有名色故又名色支亦是遍有有色化生初受生位雖具五根而未有用爾時未名六處支故初生無色雖定有意根而不明了未名意處故由斯論説十二有支一切一分上二界有初問二答三證問意以界中無色生中化生必無名色是謂不遍不遍而立故將安在答云定故立支遍故立支定者胎卵濕生六處未滿定有名色故遍者有色化生初受生位雖具五根而未有用爾時未明六處非名色所攝而何初生無色雖定有意根而不明了未名意處非名支而何由斯定遍之故論説十二有支一切一分上二界有一切者一切支也一分者謂色界無想有色一分而無名無色初生有名一分而無色曰一切支中一分上二界有也論之可證如此支豈無故而立三料簡愛支愛非遍有寧別立支生惡趣者不愛彼故定故別立不求無有生善趣者定有愛故不還受生愛雖不起然如彼取定有種故又愛亦遍生惡趣者於現我境亦有愛故依無希求惡趣身愛經説非有非彼全無初標問次答釋三通妨問云愛非遍有寧別立支生惡趣者不愛彼故豈非不遍答云定遍故立定者生惡趣者不求無愛設若有求寧得無愛如人喜為虎等熱獄求涼風等豈全無愛而生善趣者有求求定有愛故也若謂不還果人於潤生位對治力強不起愛者不知雖不起愛而於取支決定有種愛如彼取定有種故有種故愛定有也愛亦遍者生惡趣中於第八見分現行我境第七隨所生所繫四惑常俱則四中我貪豈非愛支攝耶然有經説非有愛者依無希求惡趣身愛説非有耳非謂全無有也豈得以辭害意四料簡生何緣所生立生老所引別立識等五支因位難知差別相故依當果位別立五支謂續生時因識相顯次根未滿名色相增次根滿時六處明盛依斯發觸因觸起受爾時乃名受果究竟依此果位立因為五果位易了差別相故總立二支以顯三苦然所生果若在未來為生厭故説生老若至現在為令了知分位相生説識等五初問生引殊立之緣次明所引立五支義三明所生立二支義問意蓋謂所生果所引因因種果現宜同何緣於所生立生老二支於所引立識等五支耶答云於所引立五支者以因位微隱難知差別相故依當果位別立五支使隱微者昭著耳當果之相云何昭著謂中有身自求父母結生相續時因識相顯故依此位立識支次根未滿名色相增即依此果位立名色支次根滿時六處明盛即依此果位立六入支依入發觸因觸起受爾時乃名受果究竟即依此果位立觸支受支故云依此果位立因為五至於所生止立二支者以果位顯著易了差別相故總立二支以顯生老苦之三種逼迫義耳不獨此也然所生果若在未來為生厭故説生老若至現在為令了知分位相生説識等五隨所在至之時不同各有所為故立名之有多寡耳非因果之相乖也五料簡三惑何緣發業總立無明潤業位中別立愛取雖諸煩惱皆能發潤而發業位無明力增以具十一殊勝事故謂所緣等廣如經説於潤業位愛力偏增説愛如水能沃潤故要數溉灌方生有芽且依初後分愛取二無重發義立一無明雖取支中攝諸煩惱而愛潤勝説是愛增初究立名異總別之緣次答立名異約勝劣説三答立總別約依義説四約愛潤勝釋通妨難問意蓋謂發業潤生皆是煩惱一名無明一名愛取建立何緣不一發潤皆惑廣略宜均總立無明別立愛取廣略何緣有殊答云立名異者雖諸煩惱皆能發潤而發業位無明力增以具十一殊勝事故謂所緣等廣如經説於潤業位愛力偏增説愛如水能沃潤故要數溉灌方生有芽是以各據殊勝立名有不同耳廣略異者且以愛為初取為後分愛取二法實則非無多種現行為潤故潤業位廣若夫發業一發則已無重發義故發業位略廣故別立不一略故總立無有二也恐有難云取支四種一欲取謂於諸欲所有欲貪二見取謂除迦耶見於所餘見所有欲貪三戒取謂于邪願所起戒禁所有欲貪四我語取謂于迦耶見所有欲貪此四通攝諸惑何故於潤業位説是愛力故通云雖取支中攝諸煩惱而愛潤勝説是愛增耳豈有他耶問十一勝事者何曰緣起經云一所緣殊勝遍緣染淨故二行相殊勝隱真顯妄故三因緣殊勝惑業生本故四等起殊勝等能發起能引能生所生緣起法故五轉異殊勝隨眠纏縛相應不共四轉異故六邪行殊勝依諦而起增益損減行故七相狀殊勝微細自相遍愛非愛共相轉故八作業殊勝作流轉所依事作寂止能障事故九障礙殊勝障礙勝法故十隨轉殊勝乃至有頂猶有轉故十一對治殊勝二種妙智所對治故問且依初後分愛取者何謂初後曰於一無明所發之境數數汲灌必有初後初立愛名後於愛境深生染著乃名為取問諸煩惱中何為愛潤偏增曰六俱生十分別二十隨煩惱惟貪一法是正中正潤餘五俱生正中助潤其餘皆是助潤故愛於潤唯最殊勝六料簡自他諸緣起支皆依自地有所發行依他無明如下無明發上地行不爾初伏下地染者所起上定應非行支彼地無明猶未起故從上下地生下上者彼緣何受而起愛支彼愛亦緣當生地受若現若種於理無違自地自他地所居為自地非現所居為他地初釋諸支緣起難二釋緣受起愛難初難在文外恐難諸支相緣而起皆依自地依他地耶釋云皆依自地若有所發行亦依他地無明而發如下地無明能發上地行業若謂下地不能發者則初伏欲界下地煩惱時所起上界禪定應非下地無明所發行支以彼上地無明猶未起故得彼定已方現前故反復推之則知有所發行依他無明也明矣又難云從上地生下地從下地生上地彼緣何地境界受而起愛支耶釋云彼愛亦緣當生地受謂若從上地生下即緣當生下地受而起愛從下地生上即緣當生上地受而起愛令彼貪愛現前彼所緣者或緣種子或緣現行於理無違問下地無明發上地行無明既是下地何以云他曰行是上地而無明非上地以上對下則上為自而下為他也七料簡異同此十二支十因二果定不同世因中前七與愛取有或異或同若二三七各定同世如是十二一重因果足顯輪轉及離斷常施設兩重實為無用或應過此便致無窮初釋異同問二釋因果問此問亦在文外恐有問云諸緣起支同世異世耶釋云此十二支十因二果定不同世謂前十現在後二未來因中前七與愛取有或異或同者潤未潤時俱不俱故已潤則受生報生報定同未潤則受後報後報定異故若二三七各定同世謂二同未來愛取有三因中前七同屬現在諸緣起支世之異同如此恐又問云過去二支因現在五支果此一重也現在三支因未來二支果此二重也兩重因果常所習聞如上云異同等則是一重因果與常不同者何也故為釋云如是十二一重因果足顯輪轉云云也謂立因果法為顯輪轉離斷常耳今之一重由現在十因感未來二果迷果行因因滅果生足顯輪轉不息之義矣因滅故非常果生故非斷及離斷常二種之過矣足顯及離是為有用施設兩重實為無用也或應過此一重而立便致無窮良以為愚前際者説過去二因則更有愚於前二者二因猶少應更多説矣為愚於後際者説未來二果則更有愚於後二者二果猶少應更多説矣便致無窮故止一重也三義門十四初假實分別門至十四四緣分別門初假實分別門此十二支義門別者九實三假已潤六支合為有故即識等五三相位別名生等故此至四緣皆詳辨義門使知十二於門門通逹而無礙也今初九實三假實者自有體義假者自無體義三假者謂已潤行等六支和合為有則有以衆法合為豈非是假生等二支即識等五果上有生老相名位不同離五非別有生等豈非是假三假既明九實可知二一事非事門五是一事謂無明識觸受愛五餘非一事一事猶言一種事非一事猶言非一種事也無明識觸受愛此五各唯一事不兼多事五外之餘七如行通善惡名色是二六處有六取有四取有該六法生老支即識等五皆非一事而兼多事是非明而事體始得不渾三染與不染門三唯是染煩惱性故七唯不染異熟果故七分位中容起染故假説通二餘通二種煩惱性故無明愛取唯染之故也異熟果故識及生唯不染之故也果是無記故曰不染若七於現起分位中容有起染之時此假説通二也故瑜伽第十云假説通二謂染不染既云假説以不染之説為實餘通二種者行有二支通染不染以屬善惡無記故也四純雜分別門無明愛取説名獨相不與餘支相交雜故餘是雜相獨對雜言獨一義純義無明止是無明之相愛取止是愛取之相此外不與餘支相交雜故若夫如已潤六支合而為有即識等五名之為二則五種交雜於二果一有互夾於六支九皆雜相豈得稱純五色非色攝門六唯非色謂無明識觸受愛取餘通二種六皆心法曰唯非色六兼心色曰餘通二種也名色一支兼無俟論行支通於諸根豈得唯心六入既是色法豈得唯心有支具行豈得唯心生二果通於色心故總云通二六有漏等攝門皆是有漏唯有為攝無漏無為非有支故初正明攝二反出故皆是有漏皆是有為矣唯有為攝唯有漏攝矣無漏無為非有支故有漏有為是有支故頓挫覆簡括關鎖蓋如此七三性相攝門無明愛取唯通不善有覆無記行唯善惡有通善惡無覆無記餘七唯是無覆無記七分位中亦起善染唯通簡彼善與無覆無記唯善惡不云通者善惡止行支也有通三性以不離行故善惡具識等五支故無覆無記識及生等七支唯是無覆無記者以是異熟果故七分位中亦通善染即瑜伽假説八三界分別門雖皆通三界而有分有全上地行支能伏下地即粗苦等六種行相有求上生而起彼故有分有全者此十二支欲界全有色無色界分有前云上二界一切一分也如無想唯有有色半支無色唯名半支及六入中唯有意處一分是也有求上生而起彼者謂有厭下粗苦障欣上勝妙離修彼六種觀想而求上生此即上地行支能伏下地惑也六種行相者身中所起心數緣於貪欲不能出離是因苦欲界俱身飢渴寒熱病痛刀杖等種種所逼是果苦以厭欲界因苦即欣初禪上勝禪定之樂是因勝厭欲界果苦即欣初禪禪味之樂是果勝欲界五塵能起衆惡是因粗此身為三十六物尿屎臭穢之所成就是果粗以厭欲因粗即欣初禪禪定之樂心定不動是因妙厭欲果粗即欣受得初禪之身如鏡中像雖有形色無有質礙是果妙煩惱覆蔽真性不能顯發是因障此身質礙不得自在是果障以厭欲因障即欣初禪心得出離是因離復厭欲果障即欣初禪獲得五通之身自在無礙是果離是謂厭下苦粗障欣上勝妙離亦曰淨妙離此略述求上生者六種行相詳如法數及禪門諸經論九學等分別門一切皆唯非學無學聖者所起有漏善業明為緣故違有支故非有支攝由此應知聖必不造感後有業於後苦果不迷求故雜修靜慮資下故業生淨居等於理無違初正釋不攝次通其妨難此有疑問伏於文外疑云學無學聖未必不起有漏善業則於十二有支當何所攝故釋云一切皆非緣聖者雖有有漏善業智明為緣故違有支故非有支攝由此可決其不造不求也仍恐難云然則聖者雜修靜慮生淨居等既是有漏寧不攝於有支故通云雜修者以漏無漏前後雜修第四靜慮資助無雲福生廣果三天之故業而上生淨居感總報果於理無違所以然者蓋總報必行業所感行業必攝於有支今生淨居既是總報於不攝有支之理宜違曰不違者以總報之業及名言種子皆是往昔已造名故後由無漏資生故業生淨居天感總報果耳非聖者特造新業而求生安得攝於有支故曰於理無違十見修二斷門二初第一解二第二解初第一解有義無明唯見所斷要迷諦理能發行故聖必不造後有業故愛取二支唯修所斷貪求當有而潤生故九種命終心俱生愛俱故餘九皆通見修所斷此師無明一支唯見斷愛取唯修斷餘九皆通見修所斷唯見其故有二一以行由迷諦理而發迷諦理惑是見所斷二以聖必無能發煩惱之惑見道名聖必斷能發煩惱之惑以此二故無明唯見所斷不通於修唯修其故亦二一如陀洹七生一來二生不還一生三果聖人貪求當有皆以愛取而潤生故二有九種命終心俱生愛俱之可證故以此二義愛取唯修所斷不通於見餘九皆通如下所釋問何謂九種命終心俱生愛俱曰雜集論云相續力者有九種命終心與自體愛相應於三界中各令欲色無色界生相續一者從欲界沒還生欲界即以欲界自體愛相應命終心結生相續二者從欲界沒若生色界即以色界自體愛相應命終心結生相續三者從欲界沒若生無色界即以無色界自體愛相應命終心結生相續如是欲界沒有三種色界無色界沒各有三種共成九種二第二解二初破前非二申正義初破前非有義一切皆通二斷論説預流果已斷一切一分有支無全斷者故若無明支唯見所斷寧説預流無全斷者若愛取支唯修所斷寧説彼已斷一切支一分又説全界一切煩惱皆能結生往惡趣行唯分別起煩惱能發不言潤生唯修所斷謂感後有行皆見所斷發由此故知無明愛取三支亦通見修所斷初標通二斷引論證成次引論證破前唯二斷三結出三支皆通二斷一切皆通者前云餘九皆通二斷今云一切則無明愛取皆在其中證於瑜伽可知若汝前説無明唯見所斷是預流全斷矣論中寧説預流無全斷而斷一分乎唯見所斷之非可知若汝前説愛取二支唯修所斷是初果全不斷矣論中寧説預流已斷一分非全不斷乎唯修所斷之非又可知不獨此也論中又説全欲界一切煩惱乃至全無色一切煩惱全界一界也各三界煩惱皆能結生相續不言潤生唯修所斷豈愛取支唯修斷耶又説往惡趣行唯分別起煩惱能發不謂一切感後有行皆見所斷煩惱所發豈無明支唯見斷耶故知不獨餘九通於二斷無明愛取三支亦通二斷問又説全界至煩惱能發是一假不言潤生至見所斷發是一假釋中何為以後假拆合上假中之二句釋耶曰但知不言二字謂之一字釋義自昭然矣何則不言不字當貫下謂字而釋中於謂上下一不字以上言字作下謂字以下謂字作上言字其義自明矣二申正義然無明支正發行者唯見所斷助者不定愛取二支正潤生者唯修所斷助者不定又染汙法自性應斷對治起時彼永斷故一切有漏不染汙法非性應斷不違道故然有二義説之為斷一離縛故謂斷緣彼雜彼煩惱二不生故謂斷彼依令永不起依離縛斷説有漏善無覆無記唯修所斷依不生斷説諸惡趣無想定等唯見所斷説十二支通二斷者於前諸斷如應當知初明無明愛取三支次明行及老九支三結示諸支斷義正發惡趣行無明唯見所斷發善趣行無明則通二斷正潤生愛取唯修所斷助潤生者亦通二斷總之正發正潤者局助發助潤者通也故云不定染汙法自性應斷者無明愛取三支及行有一分性是煩惱曰染汙法自性應斷對治起時彼永斷者即出世道障治相違曰永斷一切有漏不染汙者謂行有一分即有漏善識等五及生等二果體唯無記曰不染汙法此皆不違道品曰非性應斷也然有二義説斷一離縛故二不生故離縛者斷離緣彼煩惱雜彼煩惱緣彼煩惱是第七俱生我貪等緣彼識等五種生等二支之異熟果雜彼煩惱是第七我見慢等由我見故令六識中所起施等善法不能忘相故名雜彼即善中雜彼著相之煩惱也依斷此二煩惱義故説行有二支中一分有漏善及識等五與生等二果合有九支惟修所斷二不生者分別煩惱為依彼等生起斷此煩惱彼永不生依不生義説行有二支一分感惡趣行并招無想果有漏善定及有中攝識等五種以因該果具生老是故亦合為九唯見所斷是則説十二支通二斷者三支依正助説通二斷餘九依二義説通二斷故云如應當知十一三受相攝門十樂捨俱受不與受共相應故老位中多分無樂及容捨故十一苦俱非受俱故十樂捨俱謂十支是樂受捨受俱也除受支老支者以受不與受共相應故老位中多分無樂及容捨故十一支與苦受相應唯除受支亦以受非受俱十二三苦分別門十一少分壞苦所攝老位中多無樂受依樂立壞故不説之十二少分苦苦所攝一切支中有苦受故十二全分行苦所攝諸有漏法皆行苦故依捨受説十一少分除老支如壞苦説實義如是諸聖教中隨彼相增所説不定十二支中除老支餘十一支少分壞苦所攝老不説者以壞苦依樂變而立老位中多無樂受壞從何立十二支少分苦苦所攝以依苦受立苦苦一切支中容有苦受俱故曰苦苦攝也十二支全分行苦所攝以諸有漏法是剎那性皆行苦故曰行苦攝也依捨受説十一少分除老支如壞苦説者謂若依行苦對捨受者十一少分行苦所攝老位中無容捨故無捨故無行苦如無樂故無壞苦曰如壞苦説也實義如是指上論所攝是真實義若諸聖教中隨彼增盛之相而言則所説不定不可惑於隨相不定之説遂疑於真實一定之説也問苦苦壞苦皆言少分行苦𨚫言全分何也曰以十二支具三苦性若是二苦必是行苦故言全分有是行苦而非二苦又此二苦各不相攝故云少分十三四諦相攝門皆苦諦攝取蘊性故五亦集諦攝業煩惱性故此十二支於四諦中皆苦諦攝以十二支是五取蘊性實苦不離取蘊豈非苦諦無明愛取行有五支亦集諦攝以是惑業性故實因不離業惑豈非集諦十四四緣分別門四初通明四緣二別明因緣三別明二緣四結指無方初通明四緣諸支相望增上定有餘之三緣有無不定契經依定唯説有一定有者以增上𡩖故有無不定者以餘三局故依定説唯一增上也又此亦可是已明增上故下但明三緣不定二別明因緣愛望於取有望於生有因緣義若説識支是業種者行望於識亦作因緣餘支相望無因緣義而集論説無明望行有因緣者依無明時業習氣説無明俱故假説無明實是行種瑜伽論説諸支相望無因緣者依現愛取唯業有説別明因緣之有無也初正明實義次會通論義實義者愛望於取等皆有因緣也愛望取有者取之現行由愛增盛而現愛是現取之種故有因緣有望生有者有即愛取已潤識等五種名有生即識等五種現行名生現從種生故有因緣行望識有者若説識支是識種行非識之親因若説識支是業種者行望于識有因緣義故云亦作因緣餘無因緣者此外八支曰餘相望者謂無明望行識望名色名色望六入六入望觸觸望於受受望於愛取望於有生望老皆非親因自果故無因緣恐有難云若餘支相望無因緣義何故集論説無明望行有因緣耶故會通云有是假説以依無明俱時思業之習氣假説業種以為無明實是行種作因而生行支耳恐又難云若愛望於取有望於生有因緣何故瑜伽説諸支相望無因緣耶故會通云瑜伽説愛望於取無因緣者謂依現行之愛望現行之取非從自種安得因緣豈比夫前之以愛增取種生現行得為因緣耶瑜伽説有望於生無因緣者唯業有説謂以業種為有業非識體但可增上非是因緣豈比夫前之以識種起生現行得為因緣耶是則此論之無不乖集論之有此論之有不逆瑜伽之無義各有取爾也三別明二緣無明望行愛望於取生望老有餘二緣有望於生受望於愛無等無間有所緣緣餘支相望二俱非有別明二緣有無也有餘二緣者無明至皆以現行相望有等無間所緣緣有等無間者前無明心所滅引後行思心前愛心所滅引後取之心生及老但是識與名色增長衰變增長心滅引生衰變故此三位有等無間緣有所緣緣者行思等心所唯在意識可得反緣無明無明即行家所緣緣取亦反緣前愛愛即取家所緣緣老位中諸心心所可緣生位色心生即老家所緣緣故此三位有所緣緣有望於生受望於愛無等無間有所緣緣無等無間者以前後現行引生曰等無間今有是種子生是現行受是種子愛是現行則等無間從何而引故無等無間也有所緣緣者生自現行能緣有種愛是現行能緣受種則受為愛支所緣緣有為生支所緣緣故曰有所緣緣也餘支相望二俱非有者謂行望於識乃至取望於有其果皆非現行心心所相引生故如識等至受皆是種子有亦種子而行為識因取為有因雖是現行然所生識有即是種故是以非等無間緣既非現行心心所法緣慮無故無所緣緣曰二俱非有也四結指無方此中且依鄰近順次不相雜亂實緣起説異此相望為緣不定諸聰慧者如理應思總結有支於四緣中唯依四義立緣起也一鄰近如無明鄰行行近識等二順次如無明緣行乃至老順其序等三不雜如無明唯無明不雜行業等四實説如唯據各支實種現説無所假借等異此相望為緣不定者如異上鄰近則為隔越於一支法越一越二越多支故異上順次則為逆次如從老乃至無明不以無明為行之緣故異上不雜則為雜亂如説業種名識支等故異上實説則為假説如説無明俱時思業習氣實是行種假説無明等故故云異此四義相望為緣則不定也隔越乃至假説不能盡述故曰如理應思上四科中第三義門一科竟四相攝惑業苦三攝十二者無明愛取是惑所攝行有一分是業所攝七有一分是苦所攝有處説業全攝有者應知彼依業有説故有處説識業所攝者彼説業種為識支故惑業所招獨名苦者唯苦諦攝為生厭故由惑業苦即十二支故此能令生相續初牒標明攝二會通他論三釋通妨難四結答前問前言此惑業苦應知總攝十二有支今牒前標釋云惑業苦三攝十二者謂無明愛取三支是惑道所攝行支及有支一分是業道所攝識等五種至老七支及有一分是苦道所攝也恐疑他論與此所攝不同故會通云有處説業全攝有者應知彼依業有説不依有種説故有處説識業所攝者彼説業種為識支不説識種名識支故又恐問曰十二有支皆是苦攝獨言惑業所招識等七支唯苦攝者何也故釋云唯苦諦攝不通集者為使有情知苦生厭惡故厭始離離則斷斷則不相續矣前云生相續由惑業苦惑業苦即十二支故此能令生相續以上論釋中四解第三解竟四第四解二初標生因緣二釋二種生初標生因緣復次生相續由內因緣不待外緣故唯有識因謂有漏無漏二業正感生故説為因緣謂煩惱所知二障助感生故説為緣第四師重釋頌文立內因緣顯生相續不離唯識也正感曰因以二業為正且約招感生顯現而説助感曰緣以二障為助但約增上緣説二釋二種生三初釋相二料簡三屬頌初釋相所以者何生有二一分假生謂諸有漏善不善業由煩惱障緣助𫝑力所感三界粗異熟果身命短長隨因緣力有定齊限故名分假二不思議變易生謂諸無漏有分別業由所知障緣助𫝑力所感殊勝細異熟果由悲願力改轉身命無定齊限故名變易無漏定願正所資感妙用難測名不思議或名意成身隨意願成故如契經説如取為緣有漏業因續後有者而生三有如是無明習地為緣無漏業因有阿羅漢獨覺已得自在菩生三種意成身亦名變化身無漏定力轉令異本如變化故如有論説聲聞無學永盡後有云何能證無上菩提依變化身證無上覺非業報身故不違理初徴標生二釋二生三會通異名釋相者釋生之相以因緣不同生有別曰分假曰變易曰意成變化聖凡天壤小大不同要之不離於生滅故曰生之相徴意蓋謂所感生由於能感正助正助障業復各不同所以者何意生之必有不同者在也故云生有二一分假二變易分假者善不善業為感生因發潤煩惱為助生緣三界粗異熟為所感果隨因緣力所感身命長短有定齊限不能前後改轉故名分假二不思議變易生者謂無漏有為諸業為能感因由所知障助力為能感緣勝細異熟為所感果又名變易者以由悲願度生無齊限力改轉定有齊限身命無定齊限故名變易又名不思議者以由無漏定願不可思議為能資感正所資感妙用難測名不思議恐疑不思議變易生復名意成身者為因緣有異身亦有異耶為因緣無異身亦不異隨義以立名耶故會通云即變易身或名為意成身耳以其隨大悲意願之所成故取而例之經云如二取煩惱為緣有漏善惡為因續後有者而生欲有色有無色有或續有後而生中有生有本有如是無明習地所知障為緣無漏業為因有阿羅漢獨覺已得自在菩生三種意成身是則此以所知無漏因緣有三乘而生三身彼以煩惱有漏因緣續後有而生三有此三乘三身羅漢三昧正受意生身近於獨覺覺法自性意生身獨覺覺法自性意生身近於菩種類俱生無行作意生身彼續後有者而生欲有近於色有色有近於無色有或中有近於生有生有近於本有以能例所所固自明以所合能所獨不愈明乎仍恐疑云又亦名變化身者何故會通云無漏禪定力轉變本身之時似如變化非新生故如有論説聲聞無學永盡後有分假之身何能出生入行菩行化度有情乃至究竟能證無上菩提之果耶彼論答云依變化身證無上覺非業報身不違於永盡後有能證菩提之理耳問前云悲願力次云無漏定願此云無漏定力何以異耶曰但各隨增勝為説釋所立名實則文雖不備而義自互兼問小乘無漏定力豈得兼悲曰今依變化修證無上之果則所轉是無上之器能轉豈下劣之力耶問改轉身命無定齊限曰變易矣竊以為若所依身隨地有別可説短長而命如燈𦦨念念生滅異於分假一期等事慿何説彼無定齊限耶曰奘師云理實命根無別分限隨所依身假説分限耳問變粗為細易短為長有細生滅曰變易生為復有可指生耶曰覺知𫝑盡名入定還資曰生也問三意生身以何為體曰悲願為體定願為體無明住地惑無漏有分別業為體也二料簡三初釋所知無漏能感問二釋資感生何用問三釋何須所知資感問初釋所知無漏能感問若所知障助無漏業能感生二乘定性應不永入無餘𣵀槃如諸異生拘煩惱故如何道諦實能感苦誰言實感不爾如何無漏定願資有漏業令所得果相續長時展轉增勝假説名感如是感時由所知障為緣助力非獨能感然所知障不障解脫無能發業潤生用故初問二答問中有二初承前變易生問云若所知障助無漏業能感變易生二乘既有所知障在應常感生不入𣵀槃如異生為煩惱所拘不能解脫故次問集能招苦道惟趣滅無漏有分別業乃道諦攝而云能感變易則道諦實能感苦矣如之何答中先答次問答云誰言實感徴云不爾如何釋云第四禪無漏勝定資色無色已感異熟諸有漏業令所得果相續增長無漏資勝依勝助力假説能感非無漏業實能感苦且如是定願資有漏業感果之時非有漏業獨能感果由所知障為緣助力彼業方能感殊勝果次答前問云然所知障雖助生不障解脫非感苦者豈比煩惱有發業潤生之用乎是以二乘雖有所知亦能永入無餘𣵀槃二釋資感生何用問何用資感生苦為自證菩提利樂他故謂不定性獨覺聲聞及得自在大願菩已永斷伏煩惱障故無容復受當分假身恐長時修菩行遂以無漏勝定願力如延壽法資現身因令彼長時與果不絶如是定願資助乃至證得無上菩提初問次答問意謂生是苦宜逺離而乃資感為有何用欲究其資感之故也標答云自證菩提利樂他故而資感也謂不定性獨覺聲聞及八地已上得自在大願菩已永斷永伏煩惱障故則無發潤無容復受當分假身分假既無恐長時修菩行遂以無漏定願如世間延壽之法資現有身轉令異本以此為因令彼長時與果不絶資助乃至具諸相好證得無上菩提耳豈為無用之資感耶三釋何須所知資感問彼復何須所知障助既未圓證無相大悲不執菩提有情實有無由發起猛利悲願又所知障障大菩提為永斷除留身久住又所知障為有漏依此障若無彼定非有故於身住有大助力若所留身有漏定願所資助者分假身攝二乘異生所知境故無漏定願所資助者變易身攝非彼境故由此應知變易生性是有漏異熟果攝於無漏業是增上果有聖教中説為無漏出三界者隨助因説初難問次正答三簡異問意云既以無漏定願資現身因足矣復何須所知障助令長時與果不絶而久住耶答云須此助者其意有三謂無求而求無度而度乃是無相大悲執有可求執有可度者所知障也既在因位未能圓證無相若不假此所知障執有菩提可求有情可度則無由發起猛利悲願此必須於此者一也又所知障障大菩提實難卒斷為永斷除成無上覺留身久住則必須於此者二也又所知障為有漏法所依既變易身是有漏此障若無彼定非有非離所依有能依故此必須於此者三也有此三義故於身住有大助力非小補也恐又問云凡所留身皆變易攝耶皆三界攝耶故簡云若所留身是諸異生世間有漏定願所資助者分假身攝二乘異生所知境故若所留身是諸聖者出世無漏定願所資助者變易身攝微妙勝用不可思議非諸凡小所知境故故結答其後問云由此應知變易生異熟果攝是有漏業正所感故亦增上果攝是無漏業所資助故亦三界攝是有漏故然有聖教説變易生名為無漏出三界者隨無漏因資助説耳不可不察其説便為無漏出於三界三屬頌三初正申頌二通疑問三例淨法初正申頌頌中所言諸業習氣即前所説二業種子二取習氣即前所説二障種子俱執著故俱等餘文義如前釋二業種子即有漏無漏二業俱執著者釋皆名取以取是執著故云二取二通疑問變易生雖無分假前後異熟別盡別生而數資助前後改轉亦有前盡餘復生義雖亦由現生相續而種定有頌偏説之或為顯示真異熟因果皆不離本識故不説現現異熟因不即與果轉識間斷非異熟故設為問答以通變易現行之疑也初通變易疑次通現行疑疑云分假捨生趣生可言異熟前盡復生變易既無捨趣而言前異熟既盡復生餘異熟何也通云變易生雖無分假前後異熟別盡別生之義而以無漏業資助前後改轉令後身命展轉勝前亦有前盡餘復生義故亦言異熟耳又恐疑云變易亦名異熟生相續矣業取現行生豈不由之獨言業取二習氣者何通云異熟雖亦由現生相續而種定有現不定有故頌偏説或為顯示真異熟因果皆不離本識因即本識所持業取二種果即本識自己果位前盡復生之總報主故但説種子不説現行又六轉識現異熟因果在未來必假熏成種子後方與果不即與果酬前滿業無記轉識多間斷故是異熟生非真異熟是則三性現識皆非不離本識所以頌中但言習氣不言現耳三例淨法前中後際生輪回不待外緣既由內識淨法相續應知亦然謂無始來依附本識有無漏種由轉識等熏發漸漸增勝乃至究竟得成佛時轉捨本來雜染識種轉得始起清淨種識任持一切功德種子由本願力盡未來際起諸妙用相續無窮由此應知唯有內識初結前總標二釋明淨法前云復次生相續由內因緣不待外緣故唯有識至此詳解已完結云前中後際生輪回既由內識淨法相續應知亦不待外緣相續者謂本無漏種因熏成佛由本願力盡未來際起諸妙用無有窮盡曰淨法相續也淨法相續亦由本無漏種依附本識熏發成佛轉捨轉識本來雜染識種轉得始起清淨種識任持一切功德種子由本願力起諸妙用無有窮盡發現於一切功德種子而種子住持於淨識曰亦唯內識也以上第三生唯識一大科竟四三性唯識二初本論二論釋初本論若唯有識何故世尊處處經中説有三性應知三性亦不離識所以者何頌曰由彼彼遍計遍計種種物此遍計所執自性無所有依他起自性分別緣所生圓成實於彼常逺離前性故此與依他非異非不異如無常等性非不見此彼二論釋二初正釋三頌二義類相推初正釋三頌八初別釋四句二別釋第五三別釋第六四別釋七八五別釋九十六別釋十一七別釋十二八總申頌意初別釋四句二初略釋二廣辨初略釋論曰周遍計度故名遍計品類衆多説為彼彼謂能遍計虛妄分別即由彼彼虛妄分別遍計種種所遍計物謂所妄執蘊處界等若法若我自性差別此所妄執自性差別總名遍計所執自性如是自性都無所有理教推徴不可得故略釋其義使易曉也初釋第一句次釋第二句三釋三四句謂能遍計虛妄分別者釋上彼彼遍計是能虛妄分別之心也即由彼彼虛妄分別是牒上句遍計種種所遍計物是釋下句牒上釋下有來脈故謂所妄執蘊處界等若法若我自性差別者指上所執種種物也此所妄執自性差別總名遍計所執自性者指定遍計所執自性也理教推徴不可得故出無所有之由也問何謂我法自性差別曰我自性即橫計主宰法自性即橫計軌持我差別即有情命者等預流一來等法差別即蘊處界等實德業等有無一異俱不俱等前已詳釋二廣辨二初總分文二別釋相初總分文或初句顯能遍計識第二句示所遍計境後半方申遍計所執若我若法自性非有已廣顯彼不可得故此廣釋其義使盡其詳也文分易曉二別釋相二初能遍計二所遍計初能遍計二初安慧師二護法師初安慧師初能遍計自性云何有義八識及諸心所有漏攝者皆能遍計虛妄分別為自性故皆似所取能取現故説阿賴耶以遍計所執自性妄執種為所緣故此師以初二故通原八種識及諸心所為能遍計心以虛妄分別為自性似能所取皆是有漏心故以第三故別原第八為能遍計心以所緣既是遍計所執自性妄執種則能緣第八豈非遍計妄執之心以所驗能心可知矣不知能所有辨八無計度破在下文二護法師三初正釋二斥非三結示初正釋有義第六第七心品執我法者是能遍計唯説意識能遍計故意及意識名意識故計度分別能遍計故執我法者必是慧故二執必與無明俱故不説無明有善性故癡無癡等不相應故不見有執導空智故執有執無不俱起故曾無有執非能熏故護法師以六七二識心品執我法者是能遍計復出十故以原其旨第一約唯説原第二約名字原第三約分別原此三皆尅證六七是能遍計第四約執斷是原第五約執斷俱原此二不唯原能遍計是六七且第八無慧癡矣第六約不説原第七約不俱原不通善性非善心所俱此二不惟原二執是能遍計亦暗斥前師謂諸心所皆能遍計以諸心通善染故第八約不見原第九約比例原謂善慧無執見無執者能導空智染慧有執不見有執能導空智執有者不起無執執無者不起有執有無既不俱起有執則非空智豈不例知第十約能熏原不惟原六七有執能熏是能遍計亦前五無執八非能熏是知從一故至十故原之又原而搜窮理窟則六識與七識指之更指而燦發心華將見不俟後之破斥而慧師必當首肯矣二斥非有漏心等不證實故一切皆名虛妄分別雖似所取能取相現而非一切能遍計攝勿無漏心亦有執故如來後得應有執故經説佛智現身土等種種影像如鏡等故若無緣用應非智等雖説藏識緣遍計種而不説唯故非誠證初正破二反破三證破四破引前以虛妄分別為自性釋有漏心等有能所取皆能遍計不知有漏中所攝諸心心所皆不能證圓成實性故一切皆名虛妄分別非説遍計恐難既非遍計何故復説能取所取相現故通云雖似能取所取相現而有遍計有不遍計者豈能所取皆能遍計攝耶此明有漏善心遍而非計也若謂似能所取皆能遍計勿無漏心亦是遍計若無漏心是遍計者勿如來後得無漏智心有似能所取義亦應有執亦應能遍計攝耶例之可知况證之于經云佛智現身土等種種影像如鏡等故夫種種影像喻所現之固明如鏡等故譬能現之甚顯若無緣用應非佛智故知無漏心與後得智及諸善心所皆能廣緣而無計執而謂能緣等皆是遍計漫然不一甄別可乎又前引藏識所緣種子證賴耶為能遍計心然雖説藏識緣遍計種而不説唯者以亦緣報身器界諸法故也故彼所引非是誠證三結示由斯理趣唯於第六第七心品有能遍計識品雖二而有二三四五六七八九十等遍計不同故言彼彼初正結二通妨由斯通收正釋斥非之理趣唯於六七二識有能遍計此外非能遍計心也恐難云既唯六七頌云彼彼者何故通云識品雖云六七二種而有二法三法乃至十法遍計不同故云彼彼耳問自二至十等名相云何答一名二義曰二一分別戲論所依緣二見及慢三貪瞋癡曰三一自相二差別三所取相四能取相曰四一依名遍計義二依義遍計名三依名遍計名四依義遍計義五依二遍計二曰五一自性二差別三覺悟四隨眠五加行六名曰六即前名遍計中所攝一有為二無為三常四無常五善六不善七無記曰七一自性二差別三總持四我五我所六愛七不愛八愛不愛俱違曰八亦即前名遍計中所攝一此為何物二云何此物三此是何物四此云何物五或為色蘊六或為受蘊七或為想蘊八或為行蘊九或為識蘊曰九即前五加行遍計中復有五種一貪愛二嗔恚三合會四別種五隨捨曰十曰等者總之于百千法上遍計不同是也又應知遍計有四料簡一有遍非計如無漏心及有漏善心廣緣而非計故二有計非遍如有漏第七唯計第八非遍起故三亦遍亦計如第六識通緣內外恆起我法故四非遍非計如有漏前五及第八各了自境不起計故二所遍計次所遍計自性云何攝大乘説是依他起遍計心等所緣緣故圓成實性寧非彼境真非妄執所緣境故依展轉説亦所遍計遍計所執雖是彼境而非所緣緣故非所遍計初以所遍計自性為問引論答云所遍計自性是依他起法謂即遍計心等所緣緣故次問圓成實性寧得非彼遍計心境答云圓成是真遍計是妄真非遍計妄執所緣境故雖然若依遍計由依他依他實性即圓成依此展轉遡流窮源亦所遍計恐難遍計所執即遍計之境云何不是所遍計耶通云雖是彼境非所緣緣故非所遍計以所緣緣必用實緣起法今遍計所執我法猶如空華殊無實性無實性故非所緣緣非所緣緣故非所遍計上初別釋四句一科竟二別釋第五二初徴二釋初徴遍計所執其相云何與依他起復有何別此以頌文第五句與遍計所執對問以窮其相之不同也二釋二初第一解二第二解初第一解有義三界心及心所由無始來虛妄熏習雖各體一而似二生謂見相分即能所取如是二分情有理無此相説為遍計所執二所依體實托緣生此性非無名依他起虛妄分別緣所生故云何知然諸聖教説虛妄分別是依他起二取名為遍計所執此師止立二分故以相見能所為遍計相見所依自證分體為依他復引教為證而不知其所解之未盡也下文自詳二第二解四初申頌義二證依他三斥前非四結正旨初申頌義有義一切心及心所由熏習力所變二分從緣生故亦依他起遍計依斯妄執定實有無一異俱不俱等此二方名遍計所執初申依他二申遍計此師意謂不簡漏無漏染無染凡世出世間一切心及心所若所依體性若所變相見由熏習力從緣生故亦依他起非獨以所依體為依他已也遍計心等依斯緣生相見虛妄執著一定實有我法有無一異俱不俱等此有無此一異此俱不俱此二方名遍計所執豈得以緣起相見便名遍計也耶一答而兩問雙明二相煥然矣二證依他諸聖教説唯量唯二種種皆名依他起故又相等四法十一識等論皆説為依他起攝故此引教以證依他使知無濫于遍計之相也唯獨也量分量唯量唯識分量識外無所有也唯二者見相二分種種諸識種種相見也相等四法等後三分十一識者梁攝論云一身識謂眼等五界二身者識謂染汙意三受者識謂意界四應受識謂色等六塵五正受識謂六識界六世識謂生生相續不斷七識謂算計由一至於無量八處識謂器世間九言説識謂見聞覺知十言説自他差別識謂依身差別即我見熏習種子生十一善惡兩道生識謂生趣無量種即有支習氣種子生如是諸識論皆説為虛妄分別依他起故既皆以此為依他乃以此為遍計者何耶三斥前非不爾無漏後得智品二分應名遍計所執許應聖智不緣彼生緣彼智品應非道諦不許應知有漏亦爾又若二分是遍計所執應如兔角等非所緣緣遍計所執體非有故又應二分不熏成種後識等生應無二分又諸習氣是相分攝豈非有法能作因緣若緣所生內相見分非依他起二所依體例亦應然無異因故以理量展轉斥前非也初約無漏難破遍計二約譬喻難破遍計三約無種難破遍計四約因緣難破遍計五約比例難破遍計不爾者謂不以相見為依他必執相見遍計攝者則因中無漏果上後得智品皆有相見二分應名遍計所執矣汝能許之否耶許則淨分依他應非聖智所緣之境即能緣聖智乃集諦攝非道諦所攝有是理乎若不許無漏位中二分是遍計所執則有漏位亦不許相見遍計所攝理甚明也又若二分是遍計所執應如兔角無體非所緣緣矣二分豈得非所緣緣乎又若二分是遍計所執則是無體之法不熏成種後識等生應無二分識生豈得無二分乎又諸習氣是第八相分所攝豈非有體之法能作親因緣耶若衆緣所生內相見分汝必謂非依他起是遍計者則汝所説二分之體亦非依他以相見自證無異因故因既不異性自無殊不惟相見遍計將見汝執依他之體反成遍計如之何自證體既依他云何二分非依他起四結正旨由斯理趣衆緣所生心心所體及相見分有漏無漏皆依他起依他衆緣而得起故由斯理趣者總收申義斥非二𫨻中理趣也皆依他起者以王所體用相見染淨雖各不同而緣依亦衆依他衆緣而得起故皆名依他起也問衆緣曰他者何曰對自心故約義分故望前後故三別釋第六頌言分別緣所生者應知且説染分依他淨分依他亦圓成故或諸染淨心心所法皆名分別能緣慮故是則一切染淨依他皆是此中依他起攝釋頌文第六句分別緣所生也初約染分解二約染淨解三結定所攝四別釋七八二空所顯圓滿成就諸法實性名圓成實顯此遍常體非虛謬簡自共相虛空我等無漏有為離倒究竟勝用周遍亦得此名然今頌中説初非後此即於彼依他起上常逺離前遍計所執二空所顯真如為性説於彼言顯圓成實與依他起不即不離常遠離言顯妄所執能所取性理恆非有前言義顯不空依他性顯二空非圓成實真如離有離無性故釋頌中圓成實於彼常逺離前性也初釋前三字次釋後七字前三字即圓成實二空所顯圓滿成就諸法實性名圓成實而有簡顯不同顯者顯此遍常體非虛謬簡者簡自共相虛空我等遍顯圓滿即簡自相以如色等質礙等自相非周遍故常顯成就即簡共相以諸法無常苦空等共相非常住故非虛謬顯實即簡於空我以虛空是妄有我是謬執但虛謬故問此圓成實有理有果為復果得此名理得此名而頌中為復約理為説約果為説耶故云無漏有為四智菩提離倒名實究竟名成勝用周遍名圓亦得此圓成實名不但理得此名已也但今頌中説初非後以理圓成通一切位果不通於因位故也後七字者於彼常逺離前性也釋有總別總謂此即於彼依他起上常逺離前遍計所執二空所顯真如為性別謂於彼者顯圓成實與依他起不即不離以相即不應言彼相離不應言於彼故常逺離者顯妄所執能所取性理非恆有前之一言顯但空遍計不空依他性之一言顯二空非圓成實性以真如離有無故意謂依他似有二空似無真如之性離於有無則圓成非即二空要是二空所顯名圓成實耳五別釋九十由前理故此圓成實與彼依他起非異非不異異應真如非彼實性不異此性應是無常彼此俱應淨非淨境則本後智用應無別釋故此於依他非異非不異也初順釋二反釋由前理故此圓成於依他異與不異俱非何則異應真如非彼實性然而真如是彼實性何得云異不異此性應是無常然而此性乃是真常何得云不異又不異者彼此俱應淨非淨境則本後智用應無別以圓成實唯根本淨智境依他是後得智境亦通非淨若不異者彼此應通二境二智照用亦應無別有是理乎故非不異六別釋十一云何二性非異非一如彼無常無我等法無常等性與行等法異應彼法非無常等不異此應非彼共相由斯喻顯此圓成實與彼依他非一非異法與法性理必應然勝義世俗相待有故釋如無常等性也初徴次標三釋四合徴云云何依他圓成二性非一異耶舉頌標云如無常無樂無我無淨之法釋云何謂如無常等謂如無常等性是諸行共相共有此無常等相也與蘊界等諸行生滅之法非異非一異應彼行非無常等性不異此無常等應是行等自相非彼法之共相矣有是理乎故合云由斯喻顯此圓成實與彼依他非一非異依他是法圓成是性法與法性一異之難如無常等其理必應非異非不異性是勝義法是俗諦待依他俗諦有圓成勝義諦離此無彼故非異彼不即此故非不異法喻昭然即離安在七別釋十二非不證見此圓成實而能見彼依他起性未逹遍計所執性空不如實知依他有故無分別智證真如已後得智中方能了逹依他起性如幻事等雖無始來心心所法已能緣自相見分等而我法執恆俱行故不如實知衆緣所引自心心所虛妄變現猶如幻事陽𦦨夢境鏡像光影谷響水月變化所成非有似有依如是義故有頌言非不見真如而能了諸行皆如幻事等雖有而非真釋頌中非不見此彼也初正釋次通妨三引證正釋中先消釋次反釋三順釋三皆可知通妨中恐有疑云一切異生無始已來各能緣自相見等分何言不見圓成實不能實知依他有耶通云雖無始來已能緣等而以法我恆行故不實知衆緣所引自心心所虛妄變現猶如幻事猶如陽𦦨猶如夢境猶如鏡像猶如光影猶如谷響猶如水月猶如變化所成非有似有耳教中依如是義故有頌言非不見真如而能了諸行皆如幻事等雖有而非真即今非不見此彼也蓋言必見真如能了諸行如幻如𦦨如夢如像如影如響如水月如變化此頌彼頌義寧有異也耶如上所釋意已明矣但古釋𭓩轉曲盡其妙能細心熟玩不厭繁瑣則我法可以漸虛真如因以漸近不能自己謹備録以俟智者清涼疏云若依攝論説喻皆喻依他起性茲為遣疑所疑不同所喻亦異一以外人聞依他起相但是妄分別有非真實義遂即生疑云若無實義何有所行境界故説如幻謂幻者幻作所緣六處雖無實義而成境界二疑云若無實義即無所緣既無所緣諸心心所法云何而轉故説如陽𦦨𦦨譬心心法水喻於義譬如陽𦦨有搖動故雖無有義而生水覺諸心心法亦復如是由搖動故雖無有義而生義覺三疑云若無實義何有愛非愛受用差別故説如夢境夢中之境雖無實義而見種種愛與非愛受用差別現前可得此亦如是四疑云若無實義云何淨不淨業愛非愛果差別而生故説如鏡像顯依他起如鏡影像實無有義即於本質起影像覺然影像無別可得此亦如是應知雖無愛與非愛真實果義而現可得五疑云若無實義云何得有種種識轉故説如光影顯依他起如弄影者有其種種光影可得而光影義實無所有識亦如是無種種義而有種種義現可得六疑云若無實義無量品類戲論言説云何而轉故説谷響喻顯依他起譬如谷響雖無有義而現可得戲論言説亦復如是雖無實義而現可得七疑云若無實義云何世間定心心法有義可得由説定心能如實知如實見故故説水月喻顯依他起譬如水月其義實無由水潤滑澄清性故而現可得定心亦爾所緣境義雖實無有而現可得水喻其定以是潤滑澄清性故八疑云若有情義實無所有云何證真諸菩等作彼利樂覺慧為先彼彼趣中攝受自體故説如變化顯依他起譬如變化實無有義由化者力一切事成非變化義而不可得應知此中亦復如是所受自體其義雖無而有能作一切有情利益安樂所受自體義現可得是知萬法雖空體虛成事一真非有無性隨緣則湛爾堅凝常隨物化紛然起作不動真如八總申頌意此中意説三種自性皆不逺離心心所法謂心心所及所變現衆緣生故如幻事等非有似有誑惑愚夫一切皆名依他起性愚夫於此橫執我法有無一異俱不俱等如空華等性相都無一切皆名遍計所執依他起上彼所妄執我法俱空此空所顯識等真性名圓成實是故此三不離心等總申頌意使不迷于言詞也初標次釋三結釋中先依他次遍計三圓成文義亦顯若總量之依他起性非有似有衆緣生故如幻事等遍計所執性相都無妄所執故如空華等圓成實性所顯真理離有無故如晴明空末句結申前三頌意三性不離唯識耳以上論釋三性唯識中第一大科正釋三頌竟二義類相攝二初正明相攝二結略指廣初正明相攝十二初六種無為至十二異非異門初六種無為虛空擇滅非擇滅等何性攝耶三皆容攝心等變似虛空等相隨心生故依他起攝愚夫於中妄執實有此即遍計所執性攝若於真如假施設有虛空等義圓成實攝有漏心等定屬依他無漏心等容二性攝衆緣生故攝屬依他無顛倒故圓成實攝自此至異非異門皆義類相攝見三性之帡包也初問次答問舉三無為而云等者不止等於餘三意該百法為問答云三皆容攝者三性皆容攝彼無為等也何則心等變似虛空等相隨心生故依他起攝如前云曾聞説虛空等名隨分別有虛空等相習力故心等生時似虛空等無為相現此所現相前後相似無有變易假説為常則虛空等六唯心所變故屬依他愚夫不逹於依他幻有中妄執實有此即遍計所執性攝若於真如法性假施設有虛空等義圓成實攝此六無為三性所攝如此有漏心等者轉釋上心變故屬依他能變心等通漏無漏謂有漏諸心心所相見分等從染緣所生定屬依他若無漏心等容依他圓成二性所攝以從衆淨緣生故攝屬依他無顛倒故攝屬圓成如前文云無漏有為離倒究竟亦得此名二七種真如如是三性與七真如云何相攝七真如者一流轉真如謂有為法流轉實性二實相真如謂二無我所顯實性三唯識真如謂染淨法唯識實性四安立真如謂苦實性五邪行真如謂集實性六清淨真如謂滅實性七正行真如謂道實性此七實性圓成實攝根本後得二智境故隨相攝者流轉苦集三前二性攝妄執雜染故餘四皆是圓成實攝初徴問相攝二標列名體三正明相攝流轉依有為立實相依二空立唯識依染淨立餘四依四諦立七種是相其性是體體非有異隨在立名安立者三界安立三有衆生等故餘文易知此七實性圓成實攝隨相則一與四五前二性攝妄執雜染故二三六七皆圓成攝所顯實性唯識實性滅道實性故詳如深密經中三色等六法三性六法相攝云何彼六法中皆具三性色受想行識及無為皆有妄執緣生理故初問次答五隂及無為名六法皆有妄執緣生理故名相攝如妄執色為實妄執色中有我等名遍計知色等從緣生名依他了色等本自性空是圓成文中理字含二意一即圓成二三性俱該無為同上亦通三性四名等五事六初問答總標二依他攝四三三性攝五四亦三攝五五二性攝六六總判所攝初問答總標三性五事相攝云何諸聖教説相攝不定五事謂名相分別正智真如凡落稱謂皆目曰名凡可觀對皆號曰相三界所攝諸心心所曰分別根後二智曰正智二空所顯聖智所行思議莫及曰真如問謂相攝云何意欲得其一定之攝總標答云諸聖教説相攝不定二依他攝四謂或有處説依他起攝彼相名分別正智圓成實性攝彼真如遍計所執不攝五事彼説有漏心心所法變似所詮説名為相似能詮現施設為名能變心等立為分別無漏心等離戲論故但總名正智不説能所詮四從緣生皆依他説自此至假立義名皆別釋聖教相攝不定也初引文二釋義引文者依他攝四圓成攝一遍計不攝釋義者然彼文説依他攝四者其説云何出其意云彼説有漏染分依他攝三事無漏淨分依他攝一事四從緣生皆依他攝瑜伽云初自性五法中幾所攝答都非所攝第二自性幾所攝答四所攝第三自性幾所攝答一所攝正同此攝竊疑遍計於五法都非所攝而探於顯曰遍計所執自相是無何以故五事所不攝故除五事外更無所有則遍計所執相無有自體云何能起遍計執耶以由名於義轉故謂隨彼假名於義流轉世間愚夫執有名義決定相稱真實自性故此執亦名為邪以二更互為客故以名與義非稱體故説之為客義亦如名無所有故説之為客由是觀之名相分別三事皆從緣起故屬依他染分所惡於遍計者執其決定相稱真實自性耳若但名而已矣義而已矣分別而已矣遍計安在三三性攝五或復有處説依他起攝相分別遍計所執唯攝彼名正智真如圓成實攝彼説有漏心及心所相分名相餘名分別遍計所執都無體故為顯非有假説為名二無倒故圓成實攝三攝五者依他攝相與分別二事相見分故遍計攝名一事安有名故圓成智如二事無顛倒故云三性攝五事也初至圓成實攝引文下皆出意四亦三攝五或有處説依他起性唯攝分別遍計所執攝彼相名正智真如圓成實攝彼説有漏心及心所相見分等總名分別虛妄分別為自性故遍計所執能詮所詮隨情立為名相二事亦三攝五者依他攝分別一事遍計攝相名二事圓成攝正智如如二事云亦三攝五非全同前三攝五也初至圓成實攝引文下皆出意彼説有漏心及心所至為自性故見依他雖唯攝分別而分別所該甚廣隨情立為二事亦見遍計情有理無五二性攝二復有處説名屬依他起性義屬遍計所執彼説有漏心心所法相見分等由名𫝑力成所遍計故説為名遍計所執隨名橫計體實非有假立義名二性攝二者依他攝名遍計攝相名二性攝二也初引文二出意義屬遍計所執義即義相由名𫝑力等見義因名有假立義名耳六總判所攝諸聖教中所説五事文雖有異而義無違然初所説不相離亂如瑜伽論廣説應知文雖有異而義無違約義判也然初所説不相離亂約勝判也亦約世界悉檀如瑜伽者如初節釋中所引遍計不攝五事依他攝四圓成攝如如已上第四名等五事一大科竟五所詮等五又聖教中説有五相與此三性相攝云何所詮能詮各具三性謂妄所計屬初性攝相名分別隨其所應所詮能詮屬依他起真如正智隨其所應所詮能詮屬圓成實後得變似能詮相故二相屬相唯初性攝妄執異名定相屬故被執著相唯依他起虛妄分別為自性故不執著相唯圓成實無漏智等為自性故初問次答答中初二通三性攝後三唯三性攝問云聖教中説有五相如顯云一所詮相二能詮相三此二相屬相四執著相五不執著相彼五與此三性相攝云何答中先標所詮能詮二相各具三性釋云謂妄所計實有能所詮相屬初遍計性攝若以所詮應所緣相分能詮應能緣名與分別隨其所應屬依他起攝若以能詮應正智所詮應如如隨其所應屬圓成攝恐問正智如如離心緣名字何有能詮之名通云雖正智離於名字等然後得智為他説法施設如智之名則變似能詮故二答三唯三性者二相屬相唯初遍計性攝不通餘説以妄執名義定相屬故然當名第三而云二者以初能所二相通攝三性為一故此名二第四被執著相即心心所等被遍計所執成所遍計故云被執著相唯依他起攝亦不通於餘攝五不執著相即心心所離遍計執成無漏智故云不執著相唯圓成實無漏智等為自性者唯圓成實性所攝亦不通餘所攝六四種真如又聖教中説四真實與此三性相攝云何世間道理所成真實依他起攝三事攝故二障淨智所行真實圓成實攝二事攝故辨中邉論説初真實唯初性攝共所執故第二真實通屬三性理通執無執雜染清淨故後二真實唯屬第三初徴問二答攝三引論四真實者顯意云一世問真實謂一切世間於諸事等由串習所得悟入知見共施設世俗性如於地謂是地非是火等自昔傳來名言決定自他分別共為真實非邪思搆觀察所取二道理真實即正智者以證比至教三量極善思擇決定智所行所知事以如實因緣證成道理所建立故三煩惱障淨智所行真實謂一切聲聞獨覺無漏方便智無漏正智無漏後所得世間智等所行境界四所知障淨智所行真實謂諸菩佛薄伽梵為入法無我及已入極清淨者依一切法離言説自性無分別智所行境界彼四真實與此三性相攝云何答云世間道理二種真實依他起性所攝所以然者以此二種是前五事之中相名分別三事攝故而此三既屬依他故依他攝二障淨智所行真實圓成實性所攝所以然者以此二種是前五事之中正智如如二事攝故而此二既屬圓成故圓成攝然依辨中邉論所攝與此不同初説真實唯初性攝以世間一切共所執故與前攝於依他者異矣第二真實通屬三性理通執無執雜染清淨故夫理通清淨屬圓成理通執有雜染是遍計依他故與前唯屬依他者異矣後二真實唯屬第三與前無異亦可執謂遍計無執謂圓成雜染謂依他清淨謂圓成亦可雜染清淨屬依他以依他中有染淨故問論攝與前何所折衷曰似違不違義各有取前唯取攝於三事後通取攝於所執唯取攝於三事無執則遍計自非不通則依圓不具故唯依他耳通取攝於所執則世間迷情之妄執自屬遍計道理迷情之妄執亦屬遍計而道理染淨之通執一執持之執二無執之執自屬依圓矣故云義各有取也七四種真諦三初問答總標二別釋諦相三結配三性初問答總標三性四諦相攝云何四中一一皆具三性二別釋諦相四初苦下有三二集下有三三滅下有三四道下有三初苦下有三且苦諦中無常等四各有三性無常三者一無性無常性常無故二起盡無常有生滅故三垢淨無常位轉變故苦有三者一所取苦我法二執所依取故二事相苦三苦相故三和合苦苦和合故空有三者一無性空性非有故二異性空與妄所執自性異故三自性空二空所顯為自性故無我三者一無相無我我相無故二異相無我與妄所執我相異故三自相無我無我所顯為自相故此苦諦之下四觀每觀各有三性如無常觀中有無性起盡垢淨之三乃至無我觀中有無相異相自相之三曰各有三性此三即有遍計依圓亦各有三性也無常三者於一無常觀我法性無常性故觀緣起法有生滅故觀垢時無淨淨時無垢隨位轉變故無常三性不同同一無常曰無常觀苦有三者觀所取五蘊是我法二執所依取故觀緣起事相是苦壞行三之事相故觀真實之法與苦和合故苦之三性不同同歸於苦曰苦觀空有三者於一空觀觀遍計所執性非有故觀緣起法與遍計所執自性異故觀二空所顯真如為自性故空之三亦不同同歸於空曰空觀無我三者觀遍計所執此相本來無故觀緣起與遍計所執我相異故觀圓成實以無我所顯為自性故無我三相不同同歸無我曰無我觀二集下有三集諦三者一習氣集謂遍計所執自性執習氣執彼習氣假立彼名二等起集謂業煩惱三未離繫集謂未離障真如集諦三者謂習氣等起未離繫集習氣集是假名謂能遍計心所熏成種以是彼執之習氣故假立彼習氣之名蓋顯能執以所執立名也等起集者謂業煩惱由惑發業以業增惑起義平等故未離繫者真未離障即在纏真如故三滅下有三滅諦三者一自性滅自性不生故二二取滅謂擇滅二取不生故三本性滅謂真如故自性不生謂遍計自性滅擇滅二取不生謂以擇滅智令能所二取滅真如本體元寂滅曰本性滅四道下有三道諦三者一遍知道能知遍計所執故二永斷道能斷依他起故三作證道能證圓成實故然遍知道亦通後二遍知者能知所執性空故能斷者能斷染分依他故作證者能證實理故遍知道亦通後二者謂遍知不惟遍計亦通後依他圓成二性如顯云應知此中於遍計所執唯有遍知於依他起有遍知及永斷是遍知通依他矣於圓成實遍知及證得是遍知通圓成矣故云亦通後二三結配三性七三三性如次配釋今於此中所配三性或假或實如理應知七三者苦諦有四個三加集滅道諦各有三個共七個三也七三三性如次配釋者如苦諦下初一個三以無性無常配遍計起盡無常配依他垢淨無常配圓成餘六次配準此可知或假或實集諦三種實配三性餘皆約義故云假也八三解脫門三解脫門所行境界與此三性相攝云何理實皆通隨相各一空無願相如次應知緣此復生三無生忍一本性無生忍二自然無生忍三惑苦無生忍如次此三是彼境故三解脫者空無相無願解脫門如華嚴六地云觀諸緣起知無我無人無壽命自性空無作無受者即得空解脫門現在前觀諸有支皆自性滅畢竟解脫無有少法相生即時得無相解脫門現在前如是入空無相已無有願求為除大悲為首教化衆生即時得無願解脫門現在前此三解脫與遍計依圓三性彼此相攝云何答云若以理論實皆通攝一一相容若隨相論一各攝一不相混濫謂空攝遍計無願攝依他無相攝圓成緣此空解脫復生本性無生忍謂了本性中無有我人及與壽命畢竟不生忍可於心故緣此無相解脫復生自然無生忍謂了知緣起皆無有相非自然生忍可於心故緣此無願解脫復生惑苦無生忍謂了知三界苦果皆由煩惱願求故作有漏諸業若無願求苦無因得則惑苦無生忍可於心此三忍如次是彼三門境故問空當攝遍計矣無願攝依他無相攝圓成何耶曰依他色心等法是諸欲本故無願則解脫圓成真實有體若執圓成真實有者亦是法執故無相則解脫是以文云空無願相蓋謂一空二無願三無相也經論義各有取爾也九真俗二諦此三云何攝彼二諦應知世俗具此三種勝義唯是圓成實性世俗有三一假世俗二行世俗三顯了世俗如次應知即此三性勝義有三一義勝義謂真如勝之義故二得勝義謂𣵀槃勝即義故三行勝義謂聖道勝為義故無變無倒隨其所應故皆攝在圓成實性問三性云何攝彼真俗二諦耶答中先標云世俗諦具三性勝義諦唯圓成性釋云世俗具三者以世俗有三一假二行三顯了假如蘊處界等從緣生故行謂念念遷流變滅不常故顯了者後智了知如鏡像等故如次應知即此三性假即遍計行即依他顯了即圓成也勝義唯是圓成而勝義有三謂義勝義得勝義行勝義義勝義者真如乃聖智所緣境義此境殊勝勝之義故曰義勝義得勝義者謂𣵀槃是殊勝果而勝即是義故曰得勝義行勝義者謂聖位所有根後二智以勝法而為所緣勝為義故曰行勝義又勝之義是理境勝即義是理果勝為義是理智若以六釋顯之勝之義乃依主釋勝即義乃持業釋勝為義亦持業釋準思可知十凡聖智境如是三性何智所行遍計所執都非智所行以無自性非所緣緣故愚夫執有聖者逹無亦得説為凡聖智境依他起性二智所行圓成實性唯聖智境如文可知十一假實攝門此三性中幾假幾實遍計所執妄安立故可説為假無體相故非假非實依他起性有實有假聚集相續分位性故説為假有心心所色從緣生故説為實有若無實法假法亦無假依實因而施設故圓成實性唯是實有不依他緣而施設故遍計所執可説為假者約妄安立而説也若直觀體相本來元無假實從何處著耶故曰非假非實依他有假實者假謂聚集假相續假分位假聚集者根塵及法處少分皆集聚四大而成豈非是假相續者謂心心所前滅後生念念相續性自非恆豈非是假分位者謂不相應行依色心分位假立相待而有豈非是假實者心心所色從緣生故緣生不無故説為實恐難緣生體是虛幻何謂實耶通云若無實法假亦應無假依實因而施設故説為實也圓成實性唯是實有以不依他緣而施設故十二異非異門此三為異為不異耶應説俱非無別體故妄執緣起真義別故如是三性義類無邉恐厭繁文略示綱要應説俱非一異俱非也無別體故非異妄執緣起真義別故非不異義類無邉廣指也略示綱要略結也若欲即略而廣請詳瑜伽初卷至此明唯識相竟信官洪瞻祖捐資刻賢預姑信女張門李氏大緣助板
