body:
  text: 古杭雲棲寺弟子廣伸述八識食體二初引證二釋義初引證又契經説一切有情皆依食住若無此識彼識食體不應有故引生依食住證識食之體於第八也食有四種詳如下釋情曰一切六道通該皆依食住者食具資益任持諸義故能持三界身命而安住也此識謂第八識食指第四若無此識彼體不有者反證必有第八第四食體始不無也識食之體必應有食體之識獨能無耶二釋義二初通明四食二別顯識食初通明四食二初正釋四食二結判四食初正釋四食謂契經説食有四種一者假食變壞為相謂欲界繫香味觸三於變壞時能為食事由此色處非假食攝以變壞時色無用故二者觸食觸境為相謂有漏觸才取境時攝受喜等能為食事此觸雖與諸識相應屬六識者食義偏勝觸粗顯境攝受喜樂及順益捨資養勝故三意思食希望為相謂有漏思與欲俱轉希可愛境能為食事此思雖與諸識相應屬意識者食義偏勝意識於境希望勝故四者識食執持為相謂有漏識由假觸思𫝑力增長能為食事此識雖通諸識自體而第八識食義偏勝一類相續執持勝故正釋食義之不同也初總標食數次別釋食義於別釋中各具標釋簡三如首節初至變壞為相名標次至能為食事名釋三至色無用故名簡下三倣此夫喜悅資持長養諸根名食事事同相亦應同而假等之各異者良以假食欲界香味觸三為體能為喜益資持之事必由吞咽變壞之時則吞咽變壞之時正喜益資持之時也故以變壞為相觸食既非假礙變壞奚從而能為食事者由於攝受攝受由於觸境是以觸才取境之時正攝受喜樂資持之時也故以觸境為相思食更非觸境攝受安在而能為食事者如水雖未接渴以望水而停食固未臨飢慿希食而息思欲俱轉希望可愛境時正悅益資持之時也故以希望為相識食執持為相身命散壞自無直下能為食事似逈離於前三不知有漏第八亦由前三𫝑力增長而能為食事也是以識食之事由於執持執持由於前三執持之時即食事之時故以執持為相若夫簡別不同則假食由此變壞色處非假食攝以假食固色變壞之時色無用故反而觀之由此變壞假食非色處攝色固在假色無消變非食用故觸通諸識觸食取第六者觸境粗顯殊非七八之隱細是以不惟攝受喜樂異彼全無捨受亦離違損而順益異彼縱有但不為損而非益食義獨勝故偏取也思通諸識思食亦取六者意識於境希望勝故食義獨勝亦偏取也第八既通諸識自體識食取第八者以食義不離執持執持第八為勝更偏取也問色聲何非假食之體曰此為眼耳離中所取之境不能資益諸根大種故不為體若夫色食詳簡請觀大論五畨其一云此中假食當言香味觸處所攝由香味觸若正消變便能長養不正消變乃為損減此顯假食非色處也其二云色等餘法既無長養損減消變是故説彼非假食性此顯色處非假食也其三云諸可食物於吞咽時令心歡喜諸根悅豫但名觸食此顯觸食非假食也其四云若受用已增長喜樂安隱消變乃名假食此顯假食非觸食也其五云若諸假物於吞咽時無上二義都不名食此顯總非假觸食也色處假觸義析秋毫不相混濫殆若此二結判四食由是集論説此四食三蘊五處十一界攝此四能持有情身命令不壞斷故名為食假食唯於欲界有用觸意思食雖遍三界而依識轉隨識有無判四食於科界定食義之不同也初以三科判攝否次以三界判有無承上四食不同由是集論判此四食三蘊五處十一界等云云也假食色蘊觸思是行蘊識食是識蘊云三蘊攝也假食是香味觸處觸思是法處識食是意處云五處攝也假食是香味觸界觸思是法界識食是七心界云十一界攝也假食已不恆矣唯有用於欲又不遍矣觸思二食是遍行攝雖遍三界然無相應之識此二亦無依識而轉隨六識以有無是不恆也然則觸思隨六識有假食唯欲界有識食雖略不言恆遍三界有也明矣三科攝否食義之分齊愈明三界有無遍恆之是非可見集論豈徒為之説耶二別顯識食二初簡破轉識非體二定異熟是體初簡破轉識非體二初正簡轉識二詳破異執初正簡轉識眼等轉識有間有轉非遍恆時能持身命謂無心定熟眠悶絶無想天中有間斷故設有心位隨所依緣性界地等有轉易故於持身命非遍非恆諸有執無第八識者依何等食經作是言一切有情皆依食住簡轉識間轉以結難外執也初標簡次釋簡三結難承上前雖通明四食正意唯在識食此固別顯識食肯綮全事簡收簡破既盡存留自現故簡云眼等轉識有間有轉非遍恆云云也有間者謂無心定熟眠時悶絶時無想天皆有間斷間斷豈遍恆持身命而能為食事耶設有心位隨所依根所緣境三性三界九地一切時皆有轉易轉易豈遍恆持身命而能為食事耶故結難云諸有執無第八識者執有轉識也轉識但是三食於三食中依何等食經作是言一切有情皆依食住夫曰一切三食豈盡為依當必有非間非轉者在也執之為無豈其然乎問上言此四能持有情身命令不斷壞此云非遍恆時能持身命若為通會曰前兼第四為言故通云能持此簡轉識則但攝前三故云非遍恆持非全言不能持也二詳破異執非無心位過去未來識等為食彼非現常如空華等無體用故設有體用非現在攝如虛空等非食性故亦不可説入定心等與無心位有情為食住無心時彼已滅故過去非食已極成故又不可説無想定等不相應行即為彼食假等四食所不攝故不相應法非實有故有執滅定等猶有第六識於彼有情能為食事彼執非理後當廣破又彼應説生上二界無漏心時以何為食無漏識等破壞有故於彼身命不可為食亦不可執無漏識中有有漏種能為彼食無漏識等猶如𣵀槃不能執持有漏種故復不可説上界有情身命相持即互為食四食不攝彼身命故又無色無身命無能持故衆同分等無實體故詳破異執以盡所簡也初破過未識二破加心等三破不相應四破第六識初中執云無心位中雖現無食由過去未來有識及有心所即以過未識等為食有何不可奚必第八為識耶破云過未識等是有法非無心位為食是宗因云彼非現常無體用故喻如空華等則無心位過未之識不可為食明矣此以過未必無體用為破假饒縱設許有體用亦非食性以食性必須現在既非現在猶虛空矣何可以為食性耶二中轉計云無體非現固如所破然無定位之前必有入定加行之心以入定加行之心為無心位有情之食亦奚不可故破曰亦不可説等云云也良以安住無心位時彼加行心因無心而已滅已滅既屬過去非食豈不極成何可以為此位之食也耶三中復轉計云定前屬滅固如所破然禪悅可以為食無想滅盡二定是不相應行既非過去即為彼入二定者之食亦奚不可故破云又不可説乃至即為彼食等也非彼食者非假等四食攝故非食攝者以不相應離色心等無實自體非若假等各有自體之實有故也四中雖總破第六不得為食曲分三節初至不可為食破無漏識食二至有漏種故破有漏種食三至無實體故破身命互食文雖三節義實一貫故初云不可次云亦不可三云復不可也今乃融而釋之曰有執滅定等猶有第六意識於彼有情能為食事情計為是而不知所執之非理也廣破當俟後文此先略為詰辨詰云滅盡生二界起無漏心時既無有漏第六爾時有情以何為食得無即以無漏意識為食耶不知未證轉依所有身命盡屬有漏若以無漏持彼有漏障治相違破壞於有不可以為食也得無救云無漏固不可為有漏之食無漏識中有有漏種漏種不壞漏識豈不能為彼食不知無漏識等猶如𣵀槃清淨無染不能持彼有漏染種漏種且無以何為食故云亦不可執也得無又救云無種固不可以為食上界有情以身持命身為命食以命持身命為身食即互為食亦奚為不可不知四食不攝彼身命故身命何可以為食又無色界現無色身彼有情命無能持故以何為食衆同分等如彼命根自無實體亦不能持於身故云復不可也展轉窮之無一可者六為食事理將何在二定異熟是體由此定知異諸轉識有異熟識一類恆遍執持身命令不壞斷世尊依此故作是言一切有情皆依食住唯依取蘊建立有情佛無有漏非有情攝説為有情依食住者當知皆依示現而説既異熟識是勝食性彼識即是此第八識定異熟是體以竟引證識食體也初正釋食體次通諸妨難三結示第八定者由諸食之通明差別炯然自識食之簡破披析盡矣甄別既精真知自故云由此定知異諸轉識有異熟識何彼之執無第八耶一類恆遍執持身命令不壞斷何彼之迷有間轉耶世尊依此故作是言一切有情皆依食住不然依何等食經作是言一切有情皆依食住耶若疑一切有情皆依食住佛亦依食應是有情者不知唯依有漏取蘊建立有情佛無有漏非有情攝説為有情皆依食住者當知非是直詮佛體皆依諸佛示現化諸有情而説耳不必疑也是則異熟於四食中是食殊勝之性彼識即是此第八識故前云若無此識彼識食體不應有故九滅定心三初引經證成二詳釋其義三結歸不離初引經證成又契經説住滅定者身語心行無不皆滅而壽不滅亦不離暖根無變壞識不離身若無此識住滅定者不離身識不應有故引滅定不離身識證有第八識也初引經次理證身語心行者出入息是身加行受想是心加行伺是語加行此三皆與第六相應壽者第八種上連持一報色心不斷功能名壽暖者暖觸即第八相分無不皆滅者在滅定中六識身語心行悉不行也然而壽命不滅亦不離暖根無變壞識不離身此何理耶蓋自其滅者而觀之宜乎皆盡自其不滅者而觀之豈滅中自有不滅者在耶會文切理若無第八住滅定者不離身識謂之誰耶二詳釋其義二初明滅定所有二破滅定所有初明滅定所有三初依義明有二斥無為非三正明有識初依義明有謂眼等識行相粗動於所緣境起必勞慮厭患彼故暫求止息漸次伏除至都盡位依此位立住滅定者故此定中彼識皆滅若不許有微細一類恆遍執持壽等識在依何而説識不離身依識有滅在之義明有第八識也初至彼識皆滅順明住滅定者轉識皆滅次至識不離身反明不離身識定是第八義之所在非強明也二斥無為非若謂後時彼識還起如隔日瘧名不離身是則不應説心行滅識與想等起滅同故壽暖諸根應亦如識便成大過故應許識如壽暖等實不離身又此位中若全無識應如瓦礫非有情數豈得説為住滅定者又異熟識此位若無誰能執持諸根壽暖無執持故皆應壞滅猶如尸便無壽等既爾後識必不還生説不離身彼何所屬諸異熟識捨此身已離託餘身無重生故又若此位無持種識後識無種如何得生過去未來不相應法非實有體已極成故諸色等法離識皆無受熏等種亦已故斥無第八之非見其必不可無也初斥執後時還起過計意蓋謂六識在定如瘧暫止出定還起如瘧復發復發是瘧不離體還起名識不離身而不知其所計之謬也何則誠如所計則契經不應説心行滅識與心行起滅同故行滅則識滅壽暖諸根應如識滅滅則名離何名不離後時還起壽暖諸根應如識起起則還活便成大過矣故當應許識如壽暖實不離身名為不離不當許識滅離還起異於壽暖非實不離名不離身也二斥執全無諸識過又若計此位中若全無識應如瓦礫非有情數豈得經中説為住滅定者既有住定之人必非無情之數不落無情必有住滅定者之識也三斥執無有異熟過又異熟識此位若無誰能執持至無壽等者牒難無持也既爾後識必不還生説不離身彼何所屬者詰空前執也諸異熟識捨此身已離託餘身無重生故者不還之由也彼何所屬者意以汝説不離者屬於後識還生耳必不還生説不離身彼何所屬良以異熟不重生則轉識無本六識必不還生故也四斥執無種不生過初至如何得生正破也次至亦已故轉破也正破顯持種之識斷不能無轉破見此識之外全無所當三正明有識然滅定等無心位中如有心位定實有識具根壽暖有情攝故由斯理趣住滅定者決定有識實不離身比量滅定結斷有識不離身也初比量有識次結斷有識以經云識不離身證云不離身識釋云依何而説識不離身斥云乃至説不離身等故承此以量結云然滅定等無心位中決定有識實不離身實簡假設定簡非定決定有識真實不離根於理趣豈強説耶故初之約義明有固顯有識不離次之斥無為非亦顯有識不離今之比量其有正顯有識不離科明滅定所有良有以也若更量之則滅定無心是有法定實有識具根壽暖為宗因云有情攝故同喻如有心位有心位中諸根不壞壽暖依識無位如有決定有識實不離身二破滅定所有三初約名位破二約心所破三約三性破初約名位破若謂此位有第六識名不離身亦不應理此定亦名無心定故若無五識名無心者應一切定皆名無心諸定皆無五識身故意識攝在六轉識中如五識身滅定非有或此位識行相所緣不可知故如壽暖等非第六識若此位有行相所緣可知識者應如餘位非此位攝本為止息行相所緣可了知識入此定故以名位破滅定有第六識也初約名破次約位破約名破者先破正計云若謂此位有第六識名不離身亦不應理所以然者此滅盡定亦名無心有六識心名理安在次破轉計云若無五識名無心者應一切定皆名無心所以然者四禪八定皆無五識滅定名無名理何辨然而意識滅定非有所以然者攝在六轉識中如五識身五識既無意識亦無可例知矣約位破者先順破云或此滅定位識行相所緣幽隱微細不可知故如壽暖等名不離身非第六識是此位識次反破云若滅定位有行相所緣可知識者應如餘位有心非此無心位攝所以然者乖本因地之所為故是則核之於名展轉叵得推之於位反覆皆窮無心之名滅定之位是有第六識於名位中耶二約心所破二初總徴二別破初總徴又若此位有第六識彼心所法為有為無自此而下至如何名無心定皆約心所有無破此位有第六識也彼即第六為有為無雙設兩關為難二別破二初約有心所破二約無心所破初約有心所破三初破違名教二敘破轉救三結違名教初破違名教若有心所經不應言住此定者心行皆滅又不應名滅受想定經言心行皆滅此有心所是違教彼名滅受想定此有心所是違名既皆相違所豈當有二敘破轉救二初破救違二破救心初破救違二初敘救詞二破救意初敘救詞此定加行但厭受想故此定中唯受想滅受想二法資助心強諸心所中獨名心行説心行滅何所相違但厭其餘不厭也唯滅餘不滅也餘既不滅自有心所豈得違經資助心強獨名心行名心行滅餘不必滅自有心所何得違名二破救意無想定中應唯想滅但厭想故然汝不許既唯受想資助心強此二滅時心亦應滅然汝不許例破救違名也意以此既不許彼亦應然彼不名唯餘所安在何可救也心亦應滅例破有六識也問何不例破救違教曰此有三義一順文義故二勝該劣故三是正意故順文義者文曰資助心強義謂諸所雖亦資助資助心王生起之力此二為強耳既以強力而起必因強滅而滅故曰此二滅時心亦應滅也勝該劣者心王之勝尚滅餘所之劣何存則不必破其救違教而救自破矣是正意者前徴計云又若此位有第六識彼心所法為有為無以此知因破而救雖在於所即救而原意主於王故云心亦應滅也是則不惟箭鋒相拄亦且力倒其鋒假手行拳借劍行殺破法之妙如此二破救心二初敘救詞二詳破救初敘救詞如身行滅而身猶在寧要責心令同行滅救意蓋謂受想是心行如出入息是身行也受想滅而心猶在如身行滅而身猶在也既不可責身令同息滅寧要責心令同行滅是則行雖滅而心猶在也二詳破救二初正破救心二例破心所初正破救心若爾語行伺滅時語應不滅而非所許然行於法有遍非遍遍行滅時法定隨滅非遍行滅法或猶在非遍行者謂入出息見息滅時身猶在故伺於語是遍行攝彼若滅時語定無故受想於心亦遍行攝許如思等大地法故受想滅時心定隨滅如何可説彼滅心在初舉例破例次以理破例破意蓋謂息是身行受想是心行猶伺是語行也以身例心既爾語例身心亦然語行滅時而汝不許定中有語豈當行滅而汝例許心王猶在耶以理論之然行於法行有周遍不遍之殊遍行滅時法定隨滅非遍行滅法或猶在息既非遍息滅身在伺是遍語豈能存今受想亦遍行攝俱舍許如大地法故而云遍一切心是則受想滅時心定隨滅如何可説彼受想滅六識心在例之難例理論無理滅所當滅豈要責之令同行耶二例破心所又許思等是大地法滅受想時彼亦應滅既爾信等此位亦無非遍行滅餘可在故如何可言有餘心所既許思等此位非無受想應然大地法故又此定中若有思等亦應有觸餘心所法無不皆依觸力生故若許有觸亦應有受觸緣受故既許有受想亦應生不相離故如受緣愛非一切受皆能起愛故觸緣受非一切觸皆能生受由斯所難其理不成彼救不然有差別故謂佛自簡唯無明觸所生諸受為緣生愛曾無有處簡觸生受故若有觸必有受生受與想俱其理決定初順破心所次反難心所三轉救所難四重破所救順而復反救之更破展轉推窮一使情盡理顯心所不容有於此位中耳總括大意如此詳之順破中思等等別境五所信等等染法二十六所以彼宗許遍行別境十所是大地法信等十一是大善地法貪等二十六所是大染地法意謂汝宗既許思等是大地法受想二法滅時彼餘大地法亦應滅既滅大地法故則信等善法貪等染法此位亦無所以然者非遍行滅餘可在故如何可説唯滅受想有餘心所無應俱無也反難中既許思等此位非無等者意謂必汝執言雖滅受想思等心所猶在不滅者則受想等斷不應滅以受想與思總是大地法故以有思等必有觸觸是心所之根故有觸必有受觸能緣受故有受必有想受想二法不相離故有應俱有如何可言有餘心所不有受想脫轉救云如受緣愛非一切受皆能起愛惟見可樂始能緣愛有所簡也例觸緣受非一切觸皆能生受惟觸可意始能生受亦有所簡也由斯所難觸為大地一切皆能生受其理不成豈當有必俱有耶重破中佛自簡者經謂諸受生起有二種緣有依無明觸生有依明觸生唯無明觸所生諸受為緣生愛非明觸也則前云非一切受皆能生愛者誠然矣曾無有處簡觸生受而曰何觸生受何觸不生故若有觸必有受有受必有想其理決定是大地法則前非一切觸皆能生受者豈其然乎三結違名教或應如餘位受想亦不滅執此位中有思等故許便違害心行滅言亦不得成滅受想定以比量結違名教格定此位不容許有心所也前執此位有思等故因以受想不滅難之雖救而復破若不量定猶虞執有未窮故云或應等也或應者意謂若立量以破之恐當云受想此位亦不滅為宗因云執此位中有思等故喻如餘位許便違害心行滅言如名何亦不得成滅受想定如教何名教不可違行等必皆滅行等既皆滅此位思等是不滅耶思之哉二約無心所破二初破正計二破轉計初破正計若無心所識亦應無不見餘心離心所故餘遍行滅法隨滅故受等應非大地法故此識應非相應法故許則應無所依緣等如色等法亦非心故又契經説意法為緣生於意識三和合觸與觸俱起有受想思若此定中有意識者三和合故必應有觸觸既定與受想思俱如何有識而無心所初例破無識次引經責非承上若此位中有第六識彼心所法為有為無有如上破必不可有若無心所識亦應無又必不可無也何者四因可證故契經可據故如何有識而無心所總括大意如此詳之餘心謂第六之外餘七心王不見餘王離所證此無所應無王也餘遍行謂第六之外餘七心所餘滅法隨滅故證此所無王隨無也受等遍一切心是大地法曰應非者證此所必不無於王也有王必有所是相應法曰此識應非者證此王必不無於所也所依謂根所緣謂境等者同時同事謂許非相應則應此識不得言與心所同所依根同所緣境同時同事便如色等非心法矣又證於經説則曰意根法境為緣生於意識三和合觸與觸俱起有受想思是説有識必有所也若此定中有意識者亦必有所如何有識而無心所我故曰若無心所識亦應無也二破轉計若謂餘時三和有力成觸生觸能起受等由此定前厭患心所故在定位三事無能不成生觸亦無受等若爾應名滅心所定如何但説滅受想耶若謂厭時唯厭受想此二滅故心所皆滅依前所厭以立定名既爾此中心亦應滅所厭俱故如餘心所不爾如何名無心定隨救為破發六識王所俱無於此定之中也初推原無有心所救二如何名滅受想破三依前唯厭立名救四心俱應滅無心破大約初救有識次破違名三救立名四破無識總是無所必無心如何救使有識無所問如何滅定名滅受想亦名無心曰受想滅則無所滅心則無王所無而王豈能有王滅而所自不生名偏義圓非苟立也故前破云如何但説滅受想定意含無所必無王也次破云如何名無心定正謂所無王應無也脈絡連貫破法關鎖即此名見讀者詳之三約三性破二初徴二破初徴又此定位意識是何自此至心亦應無皆約三性破無心所明意識非有於此位也意識是何謂若言此滅定位有意識者意識為是何法是染性耶是善性耶是無記性耶先徴定其所是始能破是之所非也二破二初破染無記二破諸善性初破染無記不應是染或無記性諸善定中無此事故餘染無記心必有心所故不應厭善起染等故非求寂靜起散故以四故證滅定意識非是染無記也善定曰諸此滅亦善定也中無此事染等不容於內也染無記心曰餘者餘時意識染無記心也必有心所違無所也反其所厭違於所求種種相乖破不應是豈一因二因已耶二破諸善性二初正破二結破初正破若謂是善相應善故應無貪等善根相應此心不應是自性善或勝義善違自宗故非善根等及𣵀槃故若謂此心是等起善加行善根所引發故理亦不然違自宗故如餘善心非等起故善心無間起三性心如何善心由前等起初破相應善二破性義善三破等起善據集論十三善法自性善標第一即信等十一心所有法勝義善標第六即真如𣵀槃加行善標第八即依止親近善丈夫故聽聞正法如理作意修習淨法及隨法行等起善標第十三即等流善謂已得寂靜者由此增上力故發起勝品神通等世出世共不共功德破意承上必執滅定有意識者又此定位意識是何是染無記已如所破若謂是善相應善故又不應矣何者如攝論云然此意識且非是善應有無貪等善根相應過故而汝謂無心所相應者何也若謂是自性善勝義善者亦不應矣何者謂此滅定善心是厭患粗動想等不行善心相應故善是汝宗義今是自性則違自宗非善根故是勝義則違自宗非𣵀槃故也若謂此定心是等起善加行善根所引發故不由善根相應力故理亦不然此與彼論由相應力心得成善安立相違故云違自宗也若由加行善根引發則如餘善心非等起故何者善心無間起三性心如集論第二釋三性無間云謂從善無間不善性生不善無間善性復生從二無間無記性生等如何滅定善心由前等起是加行善根所引生耶二結破故心是善由相應力既爾必與善根相應寧説此心獨無心所故無心所心亦應無就所許以結破其執也故心是善由相應力結所許也既爾必與善根相應定所許也寧説此心獨無心所難所許也故無心所心亦應無破所許也三結歸不離如是推徴眼等轉識於滅定位非不離身故契經言不離身者彼識即是此第八識入滅定時不為止息此極寂靜執持識故無想等位類此應知總結第八不離滅定身也初結破滅定有轉識次引證滅定有第八末類諸定位有第八也十染淨心三初引經證成二釋義總別三結成有識初引經證成又契經説心雜染故有情雜染心清淨故有情清淨若無此識彼染淨心不應有故自此至下釋義皆約染淨由心證有第八識也初順引經文次反證有識心因識有豈不識即是心二釋義總別二初總釋二別釋初總釋謂染淨法以心為本因心而生依心住故心受彼熏持彼種故先總釋使心義易顯下文差別有所統也心為本者離心法無源故因心生者由種始生現故依心住者現以心為依故心受彼熏者離心無所藏故持彼種故者離心無能藏故二別釋二初釋雜染二釋清淨初釋雜染二初標數二釋成初標數然雜染法略有三種煩惱業界種類別故煩惱惑即下無明愛取三支惑所發業即下行有二支業所感果即下識等生等七支略有三者廣之則三復各有種類故也亦可種謂種子類是品類二釋成三初煩惱無因失二業果無因失三有支不成失初煩惱無因失若無此識持煩惱種界地往還無染心後諸煩惱起皆應無因餘法不能持彼種故過去未來非實有故若諸煩惱無因而生則無三乘學無學果諸已斷者皆應起故初凡夫惑起無因失次斷惑還應仍起失界地即三界分九地也離下染而上升曰往盡上報而下生曰還無染心後諸煩惱起皆應無因者如無想天轉識已滅曰無染心天報既盡正下生時曰無染心後下地根隨煩惱識生曰諸煩惱起無識持種曰皆應無因餘法不能持彼種故釋無因也過去未來非實有故釋不能也諸已斷者皆應起故謂已斷煩惱皆應又起煩惱釋無果也然而決無此理則必有因種既有因種則有持惑等之識也明矣二業果無因失若無此識持業果種界地往還異類法後諸業果起亦應無因餘種餘因前已故若諸業果無因而生入無餘依𣵀槃界已三界業果還復應生煩惱亦應無因生故初凡夫業果無因失次聖人復生業果失異類法後諸業果起亦應無因者染淨業果不同曰異類法染淨復各不同亦異類法前之業果已盡曰異類法後後之業果忽生曰諸業果起無識持種曰亦應無因此如鬱頭藍弗久受非想之報若無此識持欲界業果種子後則不應受飛貍之身矣餘種餘因者謂或執異性因生異性果或執色心互為因緣或執餘法能持種子前已故釋無因也入無餘依𣵀槃界已三界業果還復應生正業果無因而生也煩惱亦應無因生故釋業果無因生也然而決無此理則必有業果之種既有因種必有持種之識也又明矣三有支不成失又行緣識應不得成轉識受熏前已故結生染識非行感故應説名色行為緣故時分懸隔無緣義故此不成故後亦不成初標不成次原不成三結不成意謂若無此識持業果種又行緣識應不得成何以故轉識染識名色俱不可以為行緣故也一法不成後諸有支亦不能成本識何可無也總括大意如此詳之則行是正感後世善惡之業名為能熏識謂本識內親生當來異熟果攝異熟識種識中業種俱名識故是為所熏既無本識無法能持業種識種故行緣識應不得成若謂轉識持種轉識受熏前已故豈能持種若謂結生染識持種非行業感故豈能持種若謂名色時分懸隔亦不可以為識緣也故行緣識一不成故諸亦不成問何為結生染識曰結繫屬生受生染識即愛心結生染識者謂是繫屬母腹受生愛染心也良以生必須潤無愛則乾如遠師云第四受生無明在識之後與結生相續同時故中有末位第六意識先起愛潤生執取結生則唯第八起愛潤者若男中有緣母起愛生於欲心女中有緣父起愛生於欲心由起此二種愛心便為己身與所愛境合所泄不淨流至胎藏認為己身後便生歡喜此心生已中有身沒受生有身正結生相續剎那五蘊起名生有也生有雖在名色而執取正是第八由是觀之喜正生時染識尚居於末位此心生已生身全處於沒時正沒正生不先不後如稱兩頭低昂時等正沒故非常正生故非斷緣起之理又見於此矣問分劑不明行相不徹敢問統論四有分劑如何曰有後生有前劑此中間名中有中有後本有前劑此前後名生有生有後有前劑此前後名本有本有後中有前劑此前後名有則將正五蘊皆滅而曰有者謂有有心即第八識故也是則略而為三分之而四廣之十二若無此識障無其因有以何有緣不成緣矣思之哉二釋清淨二初標二釋初標諸清淨法亦有三種世出世道斷果別故世道是異生所修通該地前出世道即聖位所修通該地後斷果謂𣵀槃對前二因言也亦者前略有三此三亦略言也廣之則無量故二釋二初釋淨道二釋斷果初釋淨道二初通釋淨道二重明出世初通釋淨道若無此識持世出世清淨道種異類心後起彼淨法皆應無因所執餘因前已破故若二淨道無因而生入無餘依𣵀槃界已彼二淨道還復應生所依亦應無因生故通明淨道無因過反顯第八之不能無也初明二道無因次出無因之過無因者種即是因起即現行無識持種異類淨法心起以何為因耶如初果已見道復起修道出觀雖起世間心後入觀時復起出世心皆由第八持種為因若無此識以何為因無因過者若二淨道無因而生則有證復生修之過證亦無因之過謂證無因而生修過既所應證無因生過亦應也故云所依亦應無因生故乃有以所依作種子作煩惱作身智者雖各不無其旨恐非正意智者詳之問異類心後者為以異生為異類為以世出世道相望為異類曰二説皆通終以相望為勝蓋世出世道大約雖止二類詳分厥類實繁良以用此望彼彼此心道固名為異以此望此彼彼相望心道皆得名異也是則相望可該於異生異生恐狹於相望故以相望為勝二重明出世又出世道初不應生無法持彼法爾種故有漏類別非彼因故無因而生非識種故初不生故後亦不生是則應無三乘道果但明無識持種出世淨道不生復出過反顯持種識之必不能無也初正明不生次不生之過初以因修言後以果證言出世道生即無漏現行初不應生者無第八識持彼法爾本有無漏因種故也恐計從聞熏習生出世道聞熏即因何必法爾種為因耶故破云有漏類別非彼因故謂法爾屬無漏聞熏是有漏類既逈別因何可同因不可同曰非彼因故非因能生是無因而生非識中種子之所生矣有是理乎初不生故後亦不生者初因不生後果亦不生也三乘道果可斷滅耶故知定有此識持彼本有無漏種子而為因故方能生出世道也問無識持種同為識持本有熏生為因似濫答顯出世道生不以有漏別類為因必以本有法爾無漏種子為因則無始法爾依附本識之持義愈明熏習但令增長之義更顯是以重辨二釋斷果二初正釋義二破轉計初正釋義若無此識持煩惱種轉依斷果亦不得成謂道起時現行煩惱及彼種子俱非有故染淨二心不俱起故道相應心不持彼種自性相違如𣵀槃故去來得等非實有故餘法持種理不成故既無所斷能斷亦無依誰由誰而立斷果約斷果不成之故顯持種識之必不能無也初標不成次釋不成三結不成道起者聖道發起染淨二心不俱起故者釋現行非有也道相應心不持彼種者釋種子非有也自性相違如𣵀槃者釋不持之由也所斷謂煩惱能斷謂斷煩惱無所斷曰依誰無能斷曰由誰意謂𣵀槃斷果因於能斷煩惱能斷因有所斷所斷煩惱因有第八持煩惱種若無此識持煩惱種則聖道起時煩惱種現俱無既無所斷能斷亦無依誰由誰而立𣵀槃斷果耶故知持種之識必不能無也二破轉計若由道力後惑不生立斷果者則初道起應成無學後諸煩惱皆已無因永不生故計意蓋謂前云無所斷故能斷亦無斷果慿何而立我謂斷果之立立於斷惑但由道力後惑不生而立斷果亦豈知所立之不能立乎何者若由道力後惑不生則初地見道豈非道力後惑若果不生應成無學則後諸修道位中所斷俱生思惑皆已無因永不生故然而後惑宛在豈曰不生不能不生不能名斷果也明矣何能立也三結成有識許有此識一切皆成唯此能持染淨種故結第十染淨心也如頌云持種異熟心趣生有受識生緣依食滅定心染淨可證之理固十種必先異熟而後染淨中間亦有自然次第否耶曰先因後果異熟次於持種因果必有體趣生體次異熟趣生無雜由有執受執受次於趣生執受則識壽暖三互不相離次之以持壽暖識然而既涉渾融猶相假借欲其孤標獨立顯於去後來先故次之以生既之後生不自生受生之前必有中有投胎故次之以緣依既投胎已由生而住住則不能無食故次之以識食如斯盡入流轉流轉豈無還滅故次之以滅定而流轉還滅不出染淨二心故次之以染淨終焉二總結勸證此識有理趣無邉恐厭繁文略述綱要別有此識教理顯然諸有智人應深信受總結從一至十之正理以勸信也綱要已當深信况條目况細至於十種乎諸有智人應深忍信冥於此理應深納受得於此理不然教之更教理之再理不厭頻繁重重披析之謂何仰思先聖之婆心一設身以處其地焉不覺涕泗久之固當熟讀詳玩鏤骨銘肌圖報恩德於無窮可也二第七識二初本頌二論釋初本頌如是已説初能變相第二能變其相云何頌曰次第二能變是識名末那依彼轉緣彼思量為性相四煩惱常俱謂我癡我見并我慢我愛及餘觸等俱有覆無記攝隨所生所繫阿羅漢滅定出世道無有二論釋二初釋頌二引證初釋頌八初釋識名二釋依緣三釋性相四釋煩惱五釋餘所六釋性攝七釋界繫八釋位捨初釋識名三初略辨名二設問答三原立名初略辨名論曰次初異熟能變識後應辨思量能變識相是識聖教別名末那恆思量勝餘識故初句結前次句起後三句牒名四句釋名以梵語末那此云染汙意由恆思量勝餘識故而得意名如云第八恆而不第六而不恆前五非非恆總劣於第七之恆雙具也二設問答此名何異第六意識此持業釋如藏識名識即意故彼依主釋如眼識等識異意故問以名同無辨為難答謂同而不同解釋之法有異故也如六種釋法中體能持用用能顯體體用相即名持業釋依於所依依是能依能依所起名依主釋今第七名意識此持業釋識體親持恆思量用故如藏識名第八親持含藏用故彼是藏即識名為藏識此是識即意名為意識第六名意識者此依主釋意根為主是識所依如眼為主眼識所依彼是眼之識名為眼識此是意之識名為意識名同而釋不同正同非同豈得不異三原立名然諸聖教恐此濫彼故於第七但立意名又標意名為簡心識積集了別劣餘識故或欲顯此與彼意識為近所依故但名意承上然諸聖教不名意識但名意者簡濫第六意識故但名意簡劣第八積集名心前五了別名識故但名意或欲顯此第七與彼第六意識為近所依故但名意如眼識近所依既名為眼乃至身識近所依既名為身此與意識為近所依故但名意一名而含多義立豈偶然二釋依緣二初釋依二釋緣初釋依二初正明第七所依二通明諸識所依三結歸第七正釋初正明第七所依依彼轉者顯此所依彼謂即前初能變識聖説此識依藏識故有義此意以彼識種而為所依非彼現識此無間斷不假現識為俱有依亦得生故有義此意以彼識種及彼現識俱為所依雖無間斷而有轉易名轉識故必假現識為俱有依方得生故轉謂流轉顯示此識恆依彼識取所緣故釋依彼轉明第七所依也初正釋所依次別舉二義三略釋轉義顯此所依者此謂第七所依即第八第八是第七之所依故此無間斷不假現識為俱有依亦得生者意謂前六轉識是有間斷必假本識現行方生此第七識既無間斷則自己生生無已何假彼現生方得耶故但以種子為俱有依雖無間斷而有轉易名轉識故必假現識為俱有依方得生者意謂凡是轉識必用本識為俱有依以有間有轉必依無間無轉而得生故前六種識是有間斷固名轉識七雖無間而有轉易亦名轉識故不但假種亦假彼現為俱有依轉謂流轉流是相續義生起義謂此恆依第八或種或現相續生起取所依而為緣故問此識無始時來一類緣內執我恆無轉易今何言轉易耶曰依八轉故轉識攝故六修行時聖道現前亦轉染而易淨故二通明諸識所依二初總標二別釋初總標諸心心所皆有所依然彼所依總有三種二別釋二初略釋二廣釋初略釋一因緣依謂自種子諸有為法皆託此依離自因緣必不生故二增上緣依謂內六處諸心心所皆託此依離俱有根必不轉故三等無間緣依謂前滅意諸心心所皆託此依離開導根必不起故唯心心所具三所依名有所依非所餘法略釋以總其要也初略釋次結簡三緣即𡩖三依即狹𡩖者種生現種生種現生種皆是因緣內處外處順逆親踈力與無力皆增上緣諸心心所皆等無間緣狹者唯取種生現行是因緣依唯取五色根及意根是增上緣依唯取八識心王是等無間緣依唯取種生現者因隱果顯異現熏種因反顯而果反隱故因果同時異種生種因果不同時故是以因緣依對果得名此因是果之所依故現行名果能生種子名因緣依對果名因此因有親生現果之用名緣因即是緣名因緣因緣即依名因緣依唯取內六處者相助增長既是親近最有力故如前五王所無五色根不轉六無意根不轉七八亦皆相依而得轉故唯取八種心王者以前念心王有力能引後念一聚心心所法名等力齊等故無自類為間隔名為無間後念心心所法以此為依而得起故名等無間緣依然是對後名前非過去已滅無體之法名前蓋取現在一念有體之法為等無間緣依也又名開導者謂前念心王等無間處即是開闢引導如前波開闢引導後波始得起故非餘法者非色不相應及無為法具此三依也問生轉起三何辨曰生約現果依種而出生故轉約隨順與力而運轉故起約前開闢而後升起故問心法四緣生今論三者何也以論依則所緣緣不可為依故也二廣釋三初釋因緣依二增上緣依三等無間依初釋因緣依初種子依有作是説要種滅已現果方生無種已生集論説故種與芽等不俱有故有義彼説為證不成彼依引生後種説故種生芽等非勝義故種滅芽生非極成故𦦨炷同時互為因故然種自類因果不俱種現相生決定俱有故瑜伽説無常法與他性為因亦與後念自性為因是因緣義自性言顯種子自類前為後因他性言顯種與現行互為因義攝大乘論亦作是説藏識染法互為因緣猶如束蘆俱時而有又説種子與果必俱故種子依定非前後設有處説種果前後應知皆是隨轉理門如是八識及諸心所定各別有種子所依初錯解不俱次破謬顯正三引論證成四結顯所依錯解不俱者滅已方生錯解種現不俱時也無種已生錯引論義而為證也種與芽等錯引外種而為證也破謬顯正者彼論説無種已生是依種子引生自類後種説故非依種子引生他類現果説也引論之錯可知種生芽等不俱有者説世俗外種非勝義內種之真因也現見外種亦有種芽俱不俱者豈極成之論耶引外之謬又可知種生現行現生種子俱時而有取而喻之如𦦨炷同時互為因故然則種子自類因果不俱種現相生決定俱有而以俱為不俱豈正義耶故證之於瑜伽種子自類不俱種與現行必俱證之於攝論因果必俱定非前後初無種現不俱之説也倘有他處説不俱者但是隨宜方便之權非一定不易之理也豈可不逆其意遂以權説為定論哉如是八識及諸心所結王所現行也定各別有種子所依結心王現行定各別有心王種子為所依心所現行定各別有心所種子為所依也二增上緣依四初第一師二第二師三第三師四第四師初第一師次俱有依有作是説眼等五識意識為依此現起時必有彼故無別眼等為俱有依眼等五根即種子故二十唯識伽他中言識從自種生似境相而轉為成內外處佛説彼為十彼頌意説世尊為成十二處故説五識種為眼等根五識相分為色等境故眼等根即五識種觀所緣論亦作是説識上色功能名五根應理功能與境色無始互為因彼頌意言異熟識上能生眼等色識種子名色功能説為五根無別眼等種與色識常互為因能熏與種為因故第七八識無別此依恆相續轉自力勝故第六意識別有此依要託末那而得起故初先明五識次重為引證三復顯後三大約此師於八種識説俱有依七八全無五六有一全無固非有一未盡何則六識之有不止末那前五之有又豈止一意識耶而更以眼等五根即種子重重引證不知佛意論意而妄自意釋尤為迷謬至下破文當知二第二師二初先破前非二結申正意初先破前非四初破五根即識種二破業種名色根三破通所引頌意四破明六七二識初破五根即識種有義彼説理教相違若五色根即五識種十八界種應成雜亂然十八界各別有種諸聖教中處處説故又五識種各有能生相見分異為執何等名眼等根若見分種應識蘊攝若相分種應外處攝便違聖教眼等五根皆是色蘊內處所攝又若五根即五識種五根應是五識因緣不應説為增上緣攝又鼻舌根即二識種則應𮮰舌唯欲界繫或應二識通色界繫許便俱與聖教相違眼耳身根即三識種二地五地為難亦然又五識種既通善惡應五色根非唯無記又五識種無執受攝五根亦應非有執受又五色根若五識種應意識種即是末那彼以五根為同法故又瑜伽論説眼等識皆具三依若五色根即五識種依但應二又諸聖教説眼等根皆通現種執唯是種便與一切聖教相違此師破法初總次別共十𫨻隨文可解破意蓋謂汝説五識無別眼等五根為俱有依而曰眼等五根即種子故將謂順理復引唯識所緣緣論為證將謂順教而不知其説與理教之相違也何則十八界各別有種則各別生現秩然不亂此教理也若五色根即五識種十八界種應成雜亂此相違於教理之界畔者一也又眼等五根皆是色蘊而非識蘊內色處攝非外色處攝此教理也而汝説眼等五根即種子者五識種子各有相見分異為執何等名眼等根耶若見分種為根者見分應識蘊攝便違根是色蘊攝矣若相分種為根者相分應外處攝便違根是內處攝矣此相違於教理之見相者二也又五根是五識增上緣依此教理也若五根即五識種五根應是五識因緣此相違於教理之緣攝者三也又鼻舌二根通色界繫𮮰舌二識唯欲界繫眼耳身根通於五地眼耳身識唯二地居此教理也而汝執鼻舌二根即二識種則應鼻舌二根唯欲界繫或應鼻舌二識通欲色繫眼耳身根即三識種二地五地為難亦然此相違於教理之界地者四也又五識種通三性五色根唯無記此教理也汝執眼等五根即種子者識種既通善惡色根應非無記此相違於教理之三性者五也又五識種第八但緣為境而不執受是無執受攝緣諸根時亦緣亦執受五根是有執受攝此教理也汝執五根即種子故五根亦應非有執受矣此相違於教理之執受者六也又五根為五識所依末那為意識所依名為同法同為有間轉識所依之法故此教理也執五色根是五識種應意識種即是末那有是理乎此相違於教理之同法者七也又眼等識皆具三依謂識種於現為因緣依五根於識為增上緣依前滅意為識等無間緣依此教理也若根即種是用增上而為因緣依但有二此相違於教理之三依者八也又眼等五根皆通種現以眼根有眼根種子眼根現行乃至身根有身根種子身根現行此教理也汝執五根唯種即無現行此相違於教理之種現者九也一違不可况九種乎眼等五根即種之執斷不可也明矣二破業種名色根二初敘救二破救初敘救有避如前所説過難朋附彼執復轉救言異熟識中能感五識增上業種名五色根非作因緣生五識種妙符二頌善順瑜伽能感五識增上業種者指五識所作善惡業習氣能感當來異熟果攝無記五識即有情工巧無記如眼識乃至身識有此無記工巧智種後時眼識乃至身識現行能作種種器具是也救意以前説五根即種者即説此業種名五色根作增上依生五識等非作因緣生五識種既以增上業種為根則合唯識識從自種生亦契緣論功能名五根豈不妙符二頌既種但為增上不為因緣豈不善順瑜伽具三依義不知其不惟不妙且不能符不惟不善且不能順二破救彼有虛言都無實義應五色根非無記故又彼應非唯有執受唯色蘊攝唯內處故鼻舌唯應欲界繫故三根不應五地繫故感意識業應末那故眼等不應通現種故又應眼等非色根故又若五識皆業所感則應一向無記性攝善等五識既非業感應無眼等為俱有依故彼所言非為善救又諸聖教處處皆説阿賴耶識變似色根及根依處器世間等如何汝等無色根許眼等識變似色等不許眼等藏識所變如斯迷謬深違教理初破同前例次破皆業感三總責違教破同前者意謂以業種為五根使果妙符善順有言有義矣今彼有虛言都無實義不惟不符而且悖不惟不順而且逆何則若業種名色根業種通善染應五色根非無記故業種無執受通識蘊通意處五根應非唯有執受應非唯色蘊攝應非唯內處攝故鼻舌二根通色界繫鼻舌二識唯欲界繫眼耳身根通五地繫眼耳身識唯二地繫若業種名色根鼻舌唯應欲界繫三根不應通五地故感五識業既是五根感意識業應末那故業種既即五根眼等不應通種現故業種既即五根根是業種非色根故過豈不同前耶皆業感者又眼等識通於三性業所感者唯無記性若五識身皆業所感則應一向無記性攝不通善染耶無記是業所感可有眼等為增上依善染五識非業所感應無眼等為俱有依耶此又不通之説也故彼以業種為色根實為善墮非為善救違教者又眼等五根藏識所變諸教皆説而汝以業種為五根許眼等識變似色根不許眼等藏識所變迷昧錯謬深違教理妙符安在善順安在我故曰彼有虛言都無實義三破通所引頌意然伽他説種子功能名五根者為破離識實有色根於識所變似眼根等以有發生五識用故假名種子及色功能非謂色根即識業種破意謂汝引識論伽他説種子名五根引緣論伽他説功能名五根而證識種是五根等蓋不知彼之所為而假名耳何者伽他説種子功能名色根為破離識實有色根故於本識所變似眼等以有發生五識之用假名此根為種子功能非謂色根即識種及與業種乃汝以假為實豈伽他本意耶名言不可以不察也四破明六七二識又緣五境明了意識應以五識為俱有依以彼必與五識俱故若彼不依眼等識者彼應不與五識為依彼此相依𫝑力等故又第七識雖無間斷而見道等既有轉易應如六識有俱有依不爾彼應非轉識攝便違聖教轉識有七故應許彼有俱有依此即現行第八識攝如瑜伽説有藏識故得有末那末那為依意識得轉彼論意言現行藏識為依止故得有末那非由彼種不爾應説有藏識故意識得轉由此彼説理教相違初破通第六次破通第七三引論證成破通者彼執第六不以五識為依第七無依今通第六以五為依第七以八為依五依無依者破矣即通而破故曰破通見道等者等修道位有轉易者謂見修二位漏無漏相間而起故也引證者瑜伽説有藏識故得有末那證八為七依也末那為依意識得轉證七為六依也論意以現行藏識為俱有依不依種子則不當以種為根也又明矣若言第七無俱有依彼論應言有藏識故意識得轉不應言有藏識故得有末那末那為依意識得轉矣由此論意則彼説以種為根及第七無依者豈不理教相違二結申正意是故應言前五轉識一一定有二俱有依謂五色根同時意識第六轉識決定恆有一俱有依謂第七識若與五識俱時起者亦以五識為俱有依第七轉識決定唯有一俱有依謂第八識唯第八識恆無轉變自能立故無俱有依此師補色根為五識俱有依補第八為第七俱有依則勝於前然於第八無依五六多所未盡三第三師二初破前未盡二結申正意初破前未盡有義此説猶未盡理第八類餘既同識性如何不許有俱有依第七八識既恆俱轉更互為依斯有何失許現起識以種為依識種亦應許依現識能熏異熟為生長住依識種離彼不生長住故又異熟識有色界中能執持身依色根轉如契經説阿賴耶識業風所飄遍依諸根恆相續轉瑜伽亦説眼等六識各別依故不能執受有色根身若異熟識不遍依止有色諸根應如六識非能執受或所立因有不定失初破第八不以第七為依次破識種不以現識為依三破異熟不以色根為依意謂初説無理次破有理而未盡以第八理應有依識種理應有依異熟理應色根為依故也能熏異熟為生長住依者正明種依現識能熏指前七現行識異熟指所熏第八現行識為生長住依者能熏為種子生長依異熟為種子安住依也引契經者順證色根為依引瑜伽者反證色根為依或所立因有不定失者所立因謂不遍依止之因不定失者謂此因通執受非執受二宗上轉犯因明共不定過如云眼等六識不能執受有色身為宗因云各別依故設異熟不遍依止有色諸根則以六識而為同喻應如六識若謂異熟是能執受而不遍依有色諸根則所立因有共不定過矣過若不犯必遍依止必能執受有色根身必依有色根身也二結申正意是故藏識若現起者定有一依謂第七識在有色界亦依色根若識種子定有一依謂異熟識初熏習位亦依能熏餘如前説此師補第八有依又勝於前而於種子以及於餘猶有未盡四第四師二初斥前非二申正義初斥前非二初總斥未了二別釋未了初總斥未了有義前説皆不應理未了所依與依別故護法正義也皆不應理總斥前三未了所依等違理之故也良以依𡩖所狹前師多入依中不能盡入所依者未了故耳觀於下文之了未了可知二別釋未了二初明依義二明所依初明依義依謂一切有生滅法仗因託緣而得生住諸所仗託皆説為依如王與臣互相依等量依以別所依也生滅曰一切盡有為法也仗因託緣而得生住出有為生住所由得也諸所仗託皆説為依者能仗託曰一切所仗託曰諸也諸所仗託皆説為依則不簡親踈勝劣能所皆説為依矣若量之一切生滅法諸所仗託皆説為依為宗因云互相依故如王與臣王臣互仗託皆可説為依法之所仗託豈不皆為依二明所依若法決定有境為主令心心所取自所緣乃是所依即內六處餘非有境定為主故此但如王非如臣等故諸聖教唯心心所名有所依非色等法無所緣故但説心所心為所依不説心所為心所依彼非主故然有處説依為所依或所依為依皆隨宜假説比量所依引教簡別通其説以別於依也初量定所依次引教簡別三釋通違妨量定所依者內六處是有法是所依為宗因云決定有境為主令心心所取自所緣故但喻如王決定者內六處於五識決定有七八意處於第六決定有七八意處互決定有此簡五識與第六無決定義以有第六時不決定有前五故亦簡五色根與第八無決定義如生無色第八即無色根為依故又簡能熏七現與所熏種子無決定義以能熏現識有間斷故有境者內六處於五識有境七八意處於第六有境七八更互有境以有照境緣境功能故此簡四大五塵命根種子雖現行識時皆決有此等而闕有境義不可為所依故為主者內六處於五識有為主義七八意處於第六有為主義七八更互有為主義此簡五遍行雖具決定有境而闕為主義不可為所依故令心心所取自所緣者如眼根能令眼識取自家所緣色等是故內六處於前五有令取自所緣義七八意處有令第六取自所緣義七八更互有令取自所緣義此簡第八現行識望識中種子雖具決定有境為主三義不能為種子俱有依者不能令種子取自所依家所緣以第八識中種子是無緣慮不能取自所緣故也故曰餘非有境定為主故此但如王非如臣等故諸聖教唯心心所名有所依非色等法無所緣故者簡色等不名有所依簡非能緣法故也但説心所心為所依不説心所為心所依彼非主故者簡心所不為所依心王説為所依也故宗鏡云是能依非所依謂諸心所是所依非能依謂諸色根是能依是所依謂諸心王非能依非所依謂諸色等然有處説依為所依所依為依皆是隨宜假説者見當明依與所依歷然有辨之實談不可昧依與所依渾而莫辨之假説也然總其大意如是名依如是名所依簡別分明不滯於假説名之為了而前説皆未了於此故曰未了依與所依別故問內六前五是色根意處果何所是曰如宗鏡云意處攝八種心王且取現行問何不言根而言處耶曰言根取能生義言處取能依義言根則種現俱在言處則獨取內六處現行種則無境不成所依現方有境乃是所依耳名言非苟然也二申正義三初心王二心所三結顯初心王四初前五二第六三第七四第八初前五由此五識俱有所依定有四種謂五色根六七八識隨闕一種必不轉故同境分別染淨根本所依別故聖教唯説依五根者以不共故又必同境近相順故楷定五識所依會通對法以其執也初正明所依次會通教説由此二字貫下王所謂由依與所依既了則八識王所所依有定式也今先五識隨闕一種必不轉故者決四種必具也言同境等所依別者闕一不轉之故也五色根為五識同境依同緣一境故第六識為五識分別依依六五有分別故第七識為五識染淨依依七染淨六染淨故第八識為五識根本依若離第八五不立故是則五識定依四種矣聖教唯説依五根者但取不共同境近順三義之故而唯説也不共者眼根但為眼識所依非餘識依乃至身根例然同境者眼根必與眼識同緣色境乃至身根例然近順者五根五識相近而順六七與八比根為遠遠覺不順故聖教且於不共等三義説五根為依非竟後三也問五識定四所依所依四義何如曰如眼識以眼根為決定同境依決定同取一境故身可例知五識以第六為決定分別依以第七為決定染淨依以第八為決定根本依餘三可例知矣二第六第六意識俱有所依唯有二種謂七八識隨闕一種必不轉故雖五識俱取境明了而不定有故非所依聖教唯説依第七者染淨依故同轉識攝近相順故楷定六識所依異通説以其執也初正明次異三會通隨闕一種必不轉故決六有二依也然恐前難云五與六俱取境明了何不以五為六俱有依云雖五識俱取境明了而不定有意識無五亦能緣故不以不定有者為俱有依也恐又難云既有七八二依何聖教唯説依第七耶通云以七是第六染淨依同轉識攝與六近順依此三故而説唯非竟無第八不可不逆其意三第七第七意識俱有所依但有一種謂第八識藏識若無定不轉故如伽他説阿賴耶為依故有末那轉依止心及意餘轉識得生楷定第七所依引證以及其餘也初正明所依次引證所依藏識若無定不轉故決有第八為依也阿賴耶為依故有末那轉證第七依第八有也依止心及意餘轉識得生證餘六皆依七八而得生也四第八阿賴耶識俱有所依亦但一種謂第七識彼識若無定不轉故論説藏識恆與末那俱時轉故又説藏識恆依染汙此即末那而説三位無末那者依有覆説如言四位無阿賴耶非無第八此亦應爾雖有色界亦依五根而不定有非所依攝識種不能現取自境可有依義而無所依楷定第八所依引證通妨異以及其餘也初正明所依次引證所依三通妨所依四謬所依彼識若無定不轉故者決有第七為八依也恆與末那俱時轉故者證彼識若無定不轉也通妨者然既説藏識恆依染汙此即末那而説阿羅漢滅定出世道三位無末那者此是依有覆煩惱不起義説非無第七本體也如言三乘無學佛地四位無阿賴耶亦依無含藏雜染之名而説非無第八識體也然恐前第三師云第八執持有色根身則五色根亦俱有依故云雖有色界亦依五根入無色界無色根故不以不決定者為所依也恐又執云種子有決定義何不為八所依故又云識種不能現取自所依家所緣境闕第二義故故與現識但有依義無所依義也二心所心心所依隨識應説復各加自相應之心隨識應説者如前五四依五所亦四乃至第八一依八所亦一復各自加相應之心者如前五所加前五王乃至第八五所加第八心王是也三結顯若作是説妙符理教三等無間依三初第一師二第二師三第三師初第一師後開導依有義五識自他前後不相續故必第六識所引生故唯第六識為開導依第六意識自相續故亦由五識所引生故以前六識為開導依第七八識自相續故不假他識所引生故但以自類為開導依自他如眼識為自望耳為他耳識為自望餘皆他等也前後者念已生曰前未生曰後諸識皆有已未曰自他前後大約此師之論以五不相續必用六引故唯用六六獨頭自相續故用自六明了亦由五引故總用六至於七八不惟不用前六亦復七不用八八不用七皆以自類能續故但用自也難陀之論如此若對後文取義正釋開謂開闢處所導謂導引令生即前念心王臨滅時開闢處所引後念心心所令彼生起後念心心所託前念開導心王所依而生曰開導依則皆取自類心王為開導依彼難陀者豈不得在於七八失在於前六乎二第二師二初斥前非二申己釋初斥前非二初總斥非二別破非初總斥非有義前説未有究理自此而下皆安慧破難陀之詞二別破非二初破前五二破後三初破前五二初總縱破二別奪破初總縱破且前五識未自在位遇非勝境可如所説謂未自在是凡夫位非勝境是劣境也可如所説不相續也此約位境為縱然必先縱者窮本意故使無辨故奪有力故二別奪破二初約位奪二約境奪初約位奪若自在位如諸佛等於境自在諸根互用任運決定不假求彼五識身寧不相續等流五識既為決定染淨作意𫝑力引生專注所緣未能捨頃如何不許多念相續故瑜伽説決定心後方有染淨此後乃有等流眼識善不善轉而彼不由自分別力乃至此意不趣餘境經爾所時眼意二識或善或染相續而轉如眼識生乃至身識應知亦爾彼意定顯經爾所時眼意二識俱相續轉既眼識時非無意識故非二識互相續生約自在位五識相續奪破前執五識不相續也但欲明此義須知五心一率爾心二求心三決定心四染淨心五等流心率爾者遇境便起率爾倉卒墮於境中之心也求等者雖墮境中於境未逹方有求既求已知法體印解決定既決定已識界差別取正因等相於住惡於親住善染淨心生由此染淨意識為先引生眼等同性善染順前而起前後相等名等流心此五於八識中前五有率爾決定染淨等流四心無求心以無計度分別故第七有決定染淨等流三心無率爾求二心以常緣第八現在境故第八有率爾決定等流三心無染淨求二心以外緣多境故有率爾以無分別故無求等至若第六五心皆具此五皆能熏種唯率爾但除生境以不強勝故若緣曾聞熟境亦能熏種更有九心成輪恐繁不敘今初至多念相續是約位奪破次至互相續生是引論證成約位奪破者意以未自在位必假求而後決定五識容有不行若自在位六根互用任運決定不假思求索彼五識身寧不相續又率爾遇境可不相續等流五識既為決定染淨作意𫝑力引生則此等流專注所緣之境未能捨離之頃念念無間如何不許多念相續而曰五識自他前後不相續耶引論證成者初至應知亦爾引證相續次至互相續生顯意斥前而彼不由自分別力者證眼識專注所緣未能捨頃也乃至此意不趣餘境證意識專注所緣未能捨頃也亦可而彼不由自分別力是顯等流眼識為意識引起已來乃至意識不趣聲等餘境之時中間為時甚長故曰經爾所時眼意二識相續而轉通證相續也如眼識生乃至身識應知亦爾例證相續也彼論意定顯經爾所時眼意二識俱相續轉既眼識時非無意識則二識非互相續生而汝前云五用意識為開導依六用前五作引生者是互相生矣互生即先後先後即非俱如論之俱相續轉何哉問作意𫝑力引生者為𫝑力通上決定染淨為單指作意而言曰通上三皆𫝑力獨指作意尤強謂意正起具四因故如瑜伽云一由欲力若於是處心有愛著心則於彼多作意生二由念力若於彼已善取其相己極作意心則於彼多作意生三由境界力或極廣大或極可意正現在前心則於彼多作意生四串習力若於彼境界己極串習己極諳悉心則於彼多作意生若異此者應於一所緣境唯一作意一切時生又非五識身有二剎那相隨俱生亦無展轉無間更互而生又一剎那五識身生已從此無間必意識中第二決定心生至分別染淨令等流五識為意識之決定染淨及自作意𫝑力引生也問既為第六引生又斥非互生者何也曰初起時不無引生正相續二識俱轉俱則二識同時誰為先後而言互相續生耶二約境奪若增盛境相續現前逼奪身心不能暫捨時五識身理必相續如熱地獄戲忘天等故瑜伽言若此六識為彼六識等無間緣即施設此名為意根若五識前後定唯有意識彼論應言若此一識為彼六識等無間緣或彼應言若此六識為彼一識等無間緣既不如是故知五識有相續義約境勝奪前五識不相續也初約境正奪次引論證成奪云前執五不相續遇非勝境或如所説若苦增盛境如熱地獄等樂增盛境如戲忘天等相續現前動經劫數逼奪身心應接不暇雖欲暫捨𫝑自不能當爾之時以理揆之五識相續理所必然故瑜伽言若此六識為彼六識等無間緣即施設此名為意根此彼即前後施設即假名意根即引生義蓋謂現前為後來等無間緣即假名為意根耳非謂互相引生也若如汝執五識前定有意識則彼論應言若此一識為彼六識等無間緣名為意根矣若汝執五識後定有一意識或彼論應言若此六識為彼第六一識等無間緣名意根矣既不如是非互開導故知五識有相續義汝謂五識自他前後不相續者何歟辨之於位相續有徴約之於境相續可據必假第六引生者豈可必哉二破後三三初第六二第七三第八初第六五識起時必有意識能引後念意識令起何假五識為開導依無心睡眠悶絶等位意識斷已後復起時藏識末那既恆相續亦應與彼為開導依若彼用前自類開導五識自類何不許然此既不然彼云何爾破第六有無心位不用前五為開導依也初正明次通妨有不用者五識起時必有意識能引後念意識令起何假五識無不用者無心睡眠悶絶等位意識斷已此無心位也後復起時藏識末那既恆相續亦應與彼為開導依何假於五通妨難者恐彼難云無心不用前五開導亦不當用七八開導當用自類為是故通云若彼第六用自類開導五識自類何不許然此五既不許然彼六云何許自類耶故知當用七八為開導依二第七平等性智相應末那初起必由第六意識亦應用彼為開導依破執第七唯用自類為開導依也初起必由第六者謂初轉依時必由第六修二空觀成彼識乃得轉染成淨故亦應用第六為開導依而汝不許何也三第八圓鏡智俱第八淨識初必六七方便引生又異熟心依染汙意或依悲願相應善心既爾必應許第八識亦以六七為開導依由此彼言都未究理破執第八唯用自類為開導依也初約初轉依破次約未轉依破三牒定所依四總責前言初必六七方便引生者謂第八初轉必由妙平二智引生是已轉依位不離六七又異熟心依第七染汙意為根或依第六悲願相應善心利生長劫是未轉依位不離六七故牒定其所依云既爾必應許第八識亦以六七為開導依由此論之彼言豈獨五不究理六不究理七不究理第八亦不究理都未能盡故前云未有究理二申己釋應説五識前六識內隨用何識為開導依第六意識用前自類或第七八為開導依第七末那用前自類或第六識為開導依阿陀那識用前自類及第六七為開導依皆不違理由前説故此應説義不離前破蓋破中已具應説故也前云未有究理次云都未究理此云皆不違理意以理破理立不可易也理立前五唯一依隨用何識故第六有三依自類及六七故第七有二依或用第六及自類故第八有三依用前自類及六七故前説總指上文自謂理之不違不知説之於理果不相違否耶至下自知三第三師三初破前非二申正義三通妨難初破前非二初總破二別破初總破有義此説亦不應理此下皆護法正意此説指上二説先總破云難陀之説不應理安慧之説不應理云亦不應理也破不應理立必應理是以下文別破中必先立理以為破案而申正通妨不過應理而已立含破內故云總破二別破三初樹名理二出過端三通妨難初樹名理開導依者謂有緣法為主能作等無間緣此於後生心心所法開闢引導名開導依此但屬心非心所等原依所由名簡別為出過之案也初正原其名次簡別所屬有緣法者一有能緣慮法非不相應行色及無為無緣慮法也二為主有自在義心所雖有緣慮為王所轉闕為主義也三能作等無間緣謂自類心王前念後念力用齊等前能生後中無間隔具此三義前念心王於後所生心心所法開闢引導而為所依名開導依也簡別之則此但屬心非心所等以此開導依但屬八種自類心王非屬心所等等者等不相應行色及無為法也非不相應者三義全無故非心所者闕為主一義故是則才言有緣法但存王所而色等自簡才言為主但存於王而心所又簡才言能作等無間緣但存自類之王而異類之王亦簡名言含蓄如此不可忽也二出過端若此與彼無俱起義説此於彼有開導力一身八識既容俱起如何異類為開導依若許為依應不俱起便同異部心不並生又一身中諸識俱起多少不定若容互作等無間緣色等應爾便違聖説等無間緣唯心心所破安慧異類為依之過以詳其亦不應理也初過同異部次過違聖教承上開導依義既明異類依過自顯此彼者諸識相望互為彼此使此彼無俱起義説此與彼有開導力或可耳然一身八識既容俱起如何異類為開導依耶若許為依應不俱起既不俱起便同小乘心不並生一身八識俱起心能不並生乎此異類為依之過也又一身中諸識俱起或二三四乃至七八多少不定設謂此依但多少名等非簡異類名等以此之故若容互作等無間緣則色根等與心異類並生亦應互作等無間緣色作此緣便違聖教此緣唯心心所此又異類為依之過也異類為依之過如此我故曰亦不應理問諸識通是心品曰異類自類何也曰第八前念為第八後念開導依諸識例然此名自類第八第七等為第六第五開導依諸識例然此名異類三通妨難然攝大乘説色亦容有等無間緣者是縱奪言謂假縱小乘色心前後有等無間緣奪因緣故不爾等言應成無用若謂等言非多少但表同類便違汝執異類識作等無間緣設為妨難窮異類為依之過也初正通妨難次復轉救恐難云攝大乘説色等亦有等無間緣何言違教通云是縱奪言非實語也以小乘執從前剎那色後剎那無間而生從前剎那心後剎那心無間而生此中因果道理成就何用復計阿賴耶識是諸法因故大乘破竟而縱之云是故色心前後相生但應容有等無間緣及增上緣奪云無有因緣是則此乃假縱而奪非謂色法真有此等無間緣也不爾等言應成無用者若謂非是縱奪定互為緣不知等者蓋言齊等一多少一表同類若用異類互為開導則此二義全無等言應成無用矣名言豈徒然哉若轉救云非多少但表同類又違自執矣如之何難之不能為難援之無理可援我故曰亦不應理二申正義是故八識各唯自類為開導依深契教理自類必無俱起義故心所此依應隨識説各唯自類者如第八獨用第八前念為第八後念開導依乃至眼識獨用眼識前念為眼識後念開導依也必無俱起者決自類各為開導依之故也心所此依應隨識説者心所無主義故非開導依隨識開導説為依耳如後念眼識心所以前念眼識而為開導餘可例知三通妨難三初通心所難二通間斷難三通聖教難初通心所難雖心心所異類並生而互相應和合似一定俱生滅事業必同一開導時餘亦開導故展轉作等無間緣諸識不然不應為例然諸心所非開導依於所引生無主義故若心心所等無間緣各唯自類第七八識初轉依時相應信等此緣便闕則違聖説諸心心所皆四緣生通心所依難發明心所此依隨識應説之旨也初釋通所難次重明正旨恐有難云既曰心所此依應隨識説則此心彼所豈非異類隨識應説豈非異類並生為開導依諸識亦應例此而汝不許異類為開導依者何也通云雖心心所異類並生而互相應如衆燈明和合似一謂同一所緣同一依同一時同一性而王所定俱生滅體事業用必同王開導時所必開導一所開導餘亦開導故心與所所與所展轉作等無間緣諸識相望無前五義故不應與心所為例亦欲異類並生而為開導依也重明正旨者雖云一開導時餘亦開導展轉作緣皆由心王及餘心所異類引起之力然諸心所非能自類為開導依也以於所引生無主義故但可隨識而已若心心所等無間緣王唯自類而所亦唯自類則第七八識初轉依時相應信等此等無間緣便闕以七八二識因中於有漏位無信等故當初轉依無漏信等起時便無自類為開導依則四緣中闕一緣矣豈不違聖教諸心心所皆四緣生乎心所之不可自類明矣故心所此依應隨識説前云一開導時餘亦開導展轉作緣正隨識應説之旨不可不可説心所自類為開導依也二通間斷難無心睡眠悶絶等位意識雖斷而後起時彼開導依即前自類間斷五識應知亦然無異類心於中為隔名無間故彼先滅時已於今識為開導故何煩異類為開導依恐又難云七八二識初轉依時相應信等依彼引生矣則無心等位意識既斷七八二識應為開導而亦有煩於異類耶通云意識五識斷而復起皆依自類其故有二無異類心於中為隔名無間故彼先滅時已於今識為開導故彼先滅等者即前念心王臨欲滅時有其力用能引後念令生作此功能了畢便滅即現在一念有行後念功能以為法體非取過去已滅無體之法為依也是則唯用自類其義極成何煩異類而汝執第六前五互相引生又以七八二識為開導依耶三通聖教難然聖教中説前六識互相引起或第七八依六七生皆依殊勝增上緣説非等無間故不相違瑜伽論説若此識無間諸識決定生説此為彼等無間緣又此六識為彼六識等無間緣即施設此名意根者言總意別亦不相違故自類依深契教理恐更難云誠如自類之説則佛地論中説前六互相引生第七依第六生第八依六七生此皆異類何不相違耶通云皆依殊勝增上緣説非等無間緣故不相違至若瑜伽此彼之言一往觀之言似通於自他再深察之則彼此者乃自類前後之意耳亦不相違故自類依不唯契教而且深矣三結歸第七正釋傍論已了應辨正論此能變識雖具三所依而依彼轉言但顯前二為顯此識依緣同故又前二依有勝用故或開導依易了知故正釋頌文依彼轉三字也前二即因緣依增上緣依因緣依謂種子識增上緣依即第八現行但顯前二者其故有三一為顯此識所依所緣同是第八故但顯前二二又前因緣依有生識勝用增上依有引識勝用故但顯前二三或開導依易了知故故但顯前二也二釋緣二初問答總釋二四師別釋初問答總釋如是已説此識所依所緣云何謂即緣彼彼謂即前此所依識聖説此識緣藏識故初結前問答次總釋證成二四師別釋四初第一師二第二師三第三師四第四師初第一師有義此意緣彼識體及相應法論説末那我我所執恆相應故謂緣彼體及相應法如次執為我及我所然諸心所不離識故如唯識言無違教失引難陀釋緣彼義也初正引釋義次復通妨難緣彼識體及相應法即緣王所復引瑜伽及釋為證緣王為我緣所為我所矣恐有難云頌緣彼而曰相應豈不違教通云然諸心所不離識故如唯識言則雖緣相應亦攝彼中豈致違教二第二師有義彼説理不應然曾無處言緣觸等故應言此意但緣彼識見及相分如次執為我及我所相見俱以識為體故不違聖説火辨釋緣彼義也初斥緣心所之非次申緣見相為是三通見相妨彼之難以識為體則見相雖分總屬於彼故無所違三第三師有義此説亦不應理五色根境非識蘊故應同五識亦緣外故應如意識緣共境故應生無色者不執我所故厭色生彼不變色故應説此意但緣藏識及彼種子如次執為我及我所以種即是彼識功能非實有物不違聖教安慧釋緣彼義也初斥緣相分之非次申緣識種之是七緣相分不應理者七緣識蘊若緣相分五色根境非識蘊故七緣內心若緣相分應同五識緣外境故七唯緣內心若緣相分應如第六同五緣共境故七既執相為所應生無色者既無色相不執我所故所以無色者以厭色生彼不變色故多種相違故云亦不應理應説緣識為我緣種為所仍恐難云第七不緣實物何又緣種通云種非實物但是識上功能緣識必緣種不違聖教四第四師二初破前非二申正義初破前非有義前説皆不應理色等種子非識蘊故論説種子是實有故假應如無非因緣故又此識俱迦耶見任運一類恆相續生何容別執有我我所無一心中有斷常等二境別執俱轉義故亦不應説二執前後此無始來一味轉故自此而下皆護法釋緣彼義今先破也初總破前三次別破第三三通破前三四復破轉救破第三師云汝執七緣識種又言種是假物不違聖教不自知其非理何者種通色心心種識蘊攝色種是色蘊七緣色蘊可乎瑜伽説種是實有為親因緣假應如無而非因緣可乎安慧之非理也明矣通破三師云難陀執七緣王所為我我所火辨執七緣見相為我我所安慧執七緣識種為我我所皆非理也何則此識俱生身見非造作而任運非夾雜而一類非間斷而相續何能容其別執有我我所無一心中有二執俱轉義故脫轉救云而有前後亦不應説以此無始已來一味恆轉從何而有前後分位之可得耶三師之盡非又明矣我故曰皆不應理問云何斷常曰此有二義一執我為常我所為斷二借六識心斷常以例七我與我所彼一心中無有二執此一心中亦無我及我所之二故二申正義二初明所緣二明轉依初明所緣應知此意但緣藏識見分非餘彼無始來一類相續似常一故恆與諸法為所依故此唯執彼為自內我乘語𫝑故説我所言或此執彼是我之我故於一見義説二言若作是説善順教理多處唯言有我見故我我所執不俱起故第七緣彼正義也初正義次釋疑意謂前既皆已非理正意畢竟如何故云應知此七緣彼之意但緣藏識見分非餘相分種子及心所等餘法也以彼第八無始已來一類相續似常一故恆與諸法為所依故此第七唯執彼為自內我似常者簡根器有間斷故簡種子或損伏而永斷故似一者簡觸等心所法非一故是以不緣心所種子餘法唯緣第八為自內我而無我所仍恐疑云唯執為內我云何大論言有我所通云乘語𫝑故説我所言或此執彼是我之我是我者能執為是我之我者所執為之我故於一見約義而説我我所二言耳豈真有二法有二言哉若作是説可謂不泥於言而得意善順教理矣何者多處唯言有我見故我我所執不俱起故泥於一論而生疑不決豈善順之謂哉二明轉依三初正明二簡別三通妨初正明未轉依位唯緣藏識既轉依已亦緣真如及餘諸法平等性智證得十種平等性故知諸有情勝解差別示現種種佛影像故明轉依別於未轉之位也未轉依位唯緣藏識染緣之狹可知既轉依已亦緣真如及餘諸法淨緣之廣何限平等性智證得十種平等性故正本智緣真如也知諸有情勝解差別示現種種佛影像故正後智緣餘法也十種者佛地經云一諸相增上喜樂二一切領受緣起三遠離異相非相四弘濟大慈五無待大悲六隨諸有情所樂示現七一切有情我愛所説八世間寂靜皆同一味九世間諸法苦樂一味十修植功德究竟證此性已即知十地有情勝解意樂差別能起他受用身之影像故二簡別此中且説未轉依時故但説此緣彼藏識悟迷通局理應爾故無我我境遍不遍故此中且説至緣藏識簡定頌説之不遍則説已轉依位此能遍緣自在其中矣故難云均一末那緣何異同通云悟迷等也蓋言悟則通通則無我而遍故緣真及餘法迷則局局則我我則不遍故唯緣藏識也此識無二迷悟不同大事未明如喪考妣明悟不可後也三通妨如何此識緣自所依如有後識即緣前意彼既極成此亦何恐有難云如何此識既依彼生仍復緣彼舉例通云如有後念意識即緣前念滅意前念滅意是等無間緣與後念作所緣緣彼既極成此所依識是增上緣與能依識作所緣緣又復何而不極成故依彼轉緣彼也問七何不緣內二分曰自證證自證沉隱難知故問七緣八見為踈為親曰是踈非親以從自識相分起故緣八見分不著但緣中間假我相分無實種生從兩頭起此相分一半從本質上起一半從自能緣第七見分上起半無覆性半有覆性從兩頭心法上爍起成一相分故曰𭘧質境三釋性相頌言思量為性相者雙顯此識自性行相意以思量為自性故即復用彼為行相故由斯兼釋所立別名能思量名末那故未轉依位恆思量所執我相已轉依位亦思量無我相故初牒頌總標次正釋性相三兼釋別名此據宗鏡攝論皆説意是體性思量其實但是行相以體即是識蘊攝故今且約頌文及此論而釋則頌云思量為性相此論釋云意以思量為自性故頌云思量為性相性者自己體性指第七內二分相者流行相貌指第七見分見分緣我為相分固是思量自證證自見分思量豈外思量頌與論文名言歷歷恐不可擅易智者詳之無間緣立名八識通名為意故前云前滅意思量立名唯在第七故稱別名由斯兼釋所立別名者意謂頌中思量二字不惟正釋第七性相由斯思量兼釋末那之名何者能思量名末那故未轉已轉皆思量故未轉者初地已前二乘有學及諸異生已轉可知矣特其思量我無我之不同耳然而皆名末那豈非兼釋別名四釋煩惱二初釋第五句二釋六七句初釋第五句此意相應有幾心所且與四種煩惱常俱此中俱言顯相應義謂從無始至未轉依此意任運恆緣藏識與四根本煩惱相應問意相應曰有幾總問相應之所也舉頌為答曰且與姑列根本之數也俱謂相應而曰從無始等者格常俱之時也二釋六七句二初標釋二通妨初標釋其四者何謂我癡我見并我慢我愛是名四種我癡者謂無明愚於我相迷無我理故名我癡我見者謂我執於非我法妄計為我故名我見我慢者謂倨傲恃所執我令心高舉故名我慢我愛者謂我貪於所執我深生耽著故名我愛并表慢愛有見慢俱餘部執無相應義此四常起擾濁內心令外轉識恆成雜染有情由此生輪回不能出離故名煩惱初問答標名次釋別名義三釋通名義無明是癡體我癡者愚於自心所變我相迷於無我真如之理曰我癡我見即我執於第八非我之上虛妄計度執為實我曰我見我慢是倨傲挾持所執內我令能緣心高舉自大曰我慢我愛是我貪於所執我境深生耽著曰我愛此三皆以無明為因曰并者表我愛與慢我見俱起餘部計三無相應義不俱起故四皆煩惱者此四常起擾濁內心第七不得澄清令外六轉恆成雜染有情由此輪回不能出離故名煩惱二通妨二初通全闕我見難二通俱起相違難初通全闕我見難彼有十種此何唯四有我見故餘見不生無一心中有二慧故如何此識要有我見二取邪見但分別生唯見所斷此俱煩惱唯是俱生修所斷故我所邉見依我見生此相應見不依彼起恆內執有我故要有我見由見決疑無容起愛著我故瞋不得生故此識俱煩惱唯四此中雖有兩重問答脈絡元非判然故總為一假初問云彼根本惑有貪瞋癡慢疑并餘五見此第七何故相應唯四闕餘六耶通云有我見故其餘二取邊邪四見不生良以見必用慧為體無一心中有二慧故是以餘見不生也此通不惟瞋疑未答而餘見不生似尚未詳故躡前又問如何此識要有我見意含如何此識不要有餘見等故又通云二取及邪見但分別生唯見道斷此識相應煩惱唯是俱生修道所斷是故無有二取邪見也至於我所邉見依我見生有邉見者定有我見我見不依邉見而起是故無有斷常邉見然要有我見者恆內執有我由此我見決疑無容起愛著我故瞋不得生故此識俱煩惱唯四餘自不俱頌豈無故而云然二通俱起相違難見慢愛三如何俱起行相無違俱起何失瑜伽論説貪令心下慢令心舉寧不相違分別俱生外境內境所陵所恃粗細有殊故彼此文義無乖返此亦兩重問答亦非脈絡判然故亦總為一假問云見慢愛三行相乖反如何俱起執餘部為難也通云此三行相無違俱起何失然猶未委無違故又即教而為難云瑜伽論説貪令心下慢令心舉一沉一升寧不相違而云無違者何也故又通云分別俱生外境內境等謂彼論言貪慢相違是第六相應分別惑此言無違是第七相應俱生惑分別起者貪取外境慢陵外人行相粗浮何容並起俱生惑者貪染內境慢恃內己行相微細寧得相違故彼瑜伽與此論文雖似反義實無乖何可以文害義五釋餘所二初問答略標二隨義廣釋初問答略標此意心所唯有四耶不爾及餘觸等俱故二隨義廣釋二初第一解二第二解初第一解二初明所有二簡所無初明所有有義此意心所唯九前四及餘觸等五法即觸作意受想與思意與遍行定相應故前説觸等異熟識俱恐謂同前亦是無覆顯此異彼故置餘言及是集義前四後五合與末那恆相應故此師釋第七唯九心所固非釋餘字異前為餘亦非釋及字但合後五亦不盡是二簡所無此意何故無餘心所謂欲希望未遂合事此識任運緣遂合境無所希望故無有欲勝解印持曾未定境此識無始恆緣定事經所印持故無勝解念唯記憶曾所習事此識恆緣現所受境無所記憶故無有念定唯繫心專注一境此識任運剎那別緣既不專一故無有定慧即我見故不別説善是淨故非此識俱隨煩惱生必依煩惱前後分位差別建立此識恆與四煩惱俱前後一類分位無別故此識俱無隨煩惱惡作追悔先所造業此識任運恆緣現境非悔先業故無惡作睡眠必依身心重昧外衆緣力有時暫起此識無始一類內執不假外緣故彼非有伺俱依外門而轉淺深推度粗細發言此識唯依內門而轉一類執我故非彼俱初簡別境次簡善位三簡諸隨四簡不定其所簡者別境之慧既謬諸隨煩惱更非其餘易解問第八見分豈非一境七唯緣此豈非專注一境而曰不專一者何也曰原彼之意或以定對散言專注一境正神凝於境之謂今此識以第八為境剎那生滅念念攀緣前後之散天眼莫窺曾何神凝於境而言專注故曰別緣曰無定也二第二解二初總斥申正二別分四家初總斥申正有義彼釋餘義非理頌別説此有覆攝故又闕意俱隨煩惱故煩惱必與隨煩惱俱故此餘言顯隨煩惱總斥前者一錯釋餘言故一闕隨煩惱故總申正者煩惱必與隨煩惱俱決不可闕故此餘言顯隨煩惱非簡無覆二別分四家四初十五所二十九所三草四所四十八所初十五所二初明所有二簡所無初明所有此中有義五隨煩惱遍與一切染心相應如集論説惛沉掉舉不信懈怠放逸於一切染汙品中恆共相應若離無堪任性等染汙性成無是處故煩惱起時心既染汙故染心位必有彼五煩惱若起必由無堪任囂動不信懈怠放逸故掉舉雖遍一切染心而貪位增但説貪分如眠與悔雖遍三性心而癡位增但説為癡分雖餘處説有隨煩惱或六或十遍諸染心而彼俱依別義説遍非彼實遍一切染心謂依二十隨煩惱中解通粗細無記不善通障定慧相顯説六依二十二隨煩惱中解通粗細二性説十故此彼説非互相違然此意俱心所十五謂前九法五隨煩惱并別境慧我見雖是別境慧攝而五十一心所法中義有差別故開為二所有者第七所有之心所也初釋有五所次會通掉舉三會通餘處四結數重通初釋五所者據集論釋先順明次反決後出過其義頗明二會通掉舉者恐有問云瑜伽説此是貪分故此云何説此遍諸染心故通云雖遍而貪增瑜伽但説貪分例於眠悔可知會餘處者恐又有難云餘處説有隨煩惱或六或十遍諸染心此何唯説五耶故云雖瑜伽説六説十而彼俱依別義方便説遍非彼實遍一切染心也云何名別義説遍且六依別義説遍者謂依二十隨煩惱之中解通粗細解即行相通粗者謂遍前六通細謂遍第七通有覆無記性不善性通障定慧相顯而説六隨耳意以二十隨煩惱有通不通今簡去不通之十四依行相通識通性通障而説六謂不信懈怠放逸散亂失念不正知也十依別義説遍者謂依二十二隨煩惱之中解亦通粗細通二性而説十也意以二十加邪欲邪解名二十二而此二十二中有通不通今簡去不通之十二依行相通識通性而説十謂大隨八及邪欲邪解是也依如是別義而説遍耳非彼實遍一切染心此遍染心故不違彼結數重通者數是十五則慧非我見然則我見非別境慧攝耶故通云雖是慧攝而五十一心所中義有差別故開為二以我見唯染慧慧通染淨故也二簡所無何緣此意無餘心所謂忿等中行相粗動此識細故非彼俱無慚無愧唯是不善此無記故非彼相應散亂令心馳流外境此恆內執一類境生不外馳流故彼非有不正知者謂起外門身語意行違越軌則此唯內執故非彼俱無餘心所義如前説問此意以何緣由唯心所十五無餘三十六耶謂小隨十以粗非細故簡中隨二以性不相應故簡大隨散亂外馳異於內執不正知亦外違軌則異於內執故簡無餘心義如前説者即別境前四不定位四根十中六前師已簡故也又大隨闕簡忘念者其義甚明不必簡故以忘念要緣曾受之境發起此識唯是現緣曾何可忘故略之耳二十九所三初六隨相應二會通前後三結釋相應初六隨相應有義應説六隨煩惱遍與一切染心相應瑜伽論説不信懈怠放逸忘念散亂惡慧一切染心皆相應故忘念散亂惡慧若無心必不能起諸煩惱要緣曾受境界種類發起忘念及邪簡擇方起貪等諸煩惱故煩惱起時心必流蕩皆由於境起散亂故惛沉掉舉行相互違非諸染心皆能遍起初標數二引證三釋成四簡別忘念散亂惡慧若無心必不起諸煩惱者反決三法不可無也要緣曾受境界種類發起忘念及邪簡擇方起貪等諸煩惱故者順明忘念惡慧貪等煩惱所由起也煩惱起時心必流蕩皆由於境起散亂故仍釋散亂亦由於境也惛沉掉舉行相互違非諸染心皆能遍起簡別不能遍諸染心之故也二會通前後論説五法遍染心者解通粗細違唯善法純隨煩惱通二性故説十遍言義如前説上云沉掉相違不遍一切染心然前二師一引瑜伽説沉掉不信懈怠放逸五法説遍一引瑜伽説十遍言與此六法不同者果何以故故通云論説等也謂論説五遍者取行相通於粗細非若小隨之不通於七識之細取唯違善法非若中二之亦違無記取純隨煩惱通有覆無記不善二性之故而説五耳然此義前已説之説十遍言義亦如前而説故知依別義説遍非實遍一切染心與此説亦義各有取耳三結釋相應然此意俱心所十九謂前九法六隨煩惱并念定慧及加惛沉此別説念準前慧釋并有定者專注一類所執我境曾不捨故加惛沉者謂此識俱無明尤重心惛沉故無掉舉者以相違故無餘心所如上應知初標相應數次釋明所增三釋明所減此別説念準前慧者恐謂忘念即念何重增念故通云準前慧釋意以忘念雖是別境念攝而五十一心所中義有差別故開為二也此相違故者此謂惛沉以惛沉時掉不起故三草四所三初標數證釋二通妨會指三結申相應初標數證釋有義復説十隨煩惱遍與一切染心相應瑜伽論説放逸掉舉惛沉不信懈怠邪欲邪勝解邪念散亂不正知此十一切染汙心起通一切處三界繫故若無邪欲邪勝解時心必不能起諸煩惱於所受境要樂合離印持事相方起貪等諸煩惱故初標數次引證三釋成邪念即忘念不正知即惡慧若無邪欲乃至不能起諸煩惱者反決二所之不可無也於所受境乃至方起諸煩惱者順明邪欲邪解之當有也所受境即所愛與不愛境於所愛樂合於不愛樂離更以邪解決定印持可愛而起貪決定印持非可愛而起瞋故諸染心決有此二二通妨會指諸疑理者於色等事必無猶豫故疑相應亦有勝解於所緣事亦猶豫者非煩惱疑如疑人杌餘處不説此二遍者緣非愛事疑相應心邪欲勝解非粗煩故餘互有無義如前説初通妨二會指通妨者恐有難云勝解以印持為性疑以猶豫為性二元相違若邪解遍諸染心則疑染有印持矣如之何其能遍耶故通云諸疑理者於色等事必無猶豫故疑相應亦有勝解豈非能遍恐又難云於所緣事亦猶豫者勝解安在故又通云事上必無猶豫中間亦有猶豫非俱生迷理煩惱疑如以無枝之樹杌而亦有疑為人者此不妨亦有邪解豈非能遍恐又難云既是能遍餘處不説此二遍者何也故更通云緣非愛事疑相應心邪欲勝解微細非粗煩故略而不説非全無也恐又難云餘處有隨煩惱或六或十等互為有無者何也故指云義如前説意謂皆依別義説遍非實遍一切染心也三結申相應此意心所有二十四謂前九法十隨煩惱加別境五準前理釋無餘心所如上應知準前理釋者所加邪欲邪解雖別境欲解所攝而五十一心所中義有差別故別開耳四十八所三初破前諸師二舉數釋成三結申相應初破前諸師有義前説皆未盡理且疑他世為有為無於彼有何欲勝解相煩惱起位若無惛沉應不定有無堪任性掉舉若無應無囂動便如善等非染汙位若染心中無散亂者應非流蕩非染汙心若無失念不正知者如何能起煩惱現前自此而下護法正義也初總破三師次別破三師三別破第二四別破第一破第三云前引瑜伽謂邪欲勝解遍一切染心不知解義尚未圓也何則既遍染心疑中須有欲解且如有人疑於過未二他世中或謂為有或謂為無此時心尚未定於彼疑煩惱相應心中有何欲勝解相耶是故此二非遍染心所當除也破第二師云前謂惛沉掉舉行相互違非諸染心皆能遍起不知煩惱起位若無惛沉應不定有無堪任性掉舉若無應無囂動定有此二是染汙位此二既無便如善等非善染位是故此二能遍染心所當加也破第一師云前引集論證五隨煩惱遍諸染心而除散亂失念不正知其解亦未圓也何則若染心中無散亂者應非流蕩非染汙心若無失念不正知者如何能煩惱現前是故此三遍一切染心何可除也增減俱未允當我故曰皆未盡理二舉數釋成故染汙心決定皆與八隨煩惱相應而生謂惛沉掉舉不信懈怠放逸忘念散亂不正知忘念不正知念慧為性者不遍染心非諸染心皆緣曾受有簡擇故若以無明為自性者遍染心起由前説故初標定次釋成承上諸師增減既皆未盡故染汙心決定皆與八大隨煩惱相應不可易也然此八中忘念及不正知性須簡擇而後可何則忘念固以念為性亦以癡為性不正知固以慧為性亦以癡為性念慧為性不遍染心所以然者非諸染心皆緣曾受有簡擇故必用念慧為體之二必以無明為自性者遍諸染心由前説無明遍與一切染心相應故也三結申相應然此意俱心所十八謂前九法八隨煩惱并別境慧無餘心所及論三文準前應釋若作是説不違教理然此至別境慧結相應也無餘心所者簡所無也準前應釋者解通粗細云云也論謂瑜伽集論三文謂集論一文五隨瑜伽二文六種十種之不同也若作是説不違理教則不作是説者違順可知雲棲法眷廣振周天軸捨刻第四卷祈亡父潛鱗居士周從龍母嶽氏俞氏早升蓮界室人廣魯沈氏男大壽周濎永注長生之籍丕紹書香多結來世之緣諧登善果者賢預姑蘇信女張門李氏大緣助板
