body:
  text: 古杭雲棲寺弟子廣伸述二信等位二初本論二論釋初本論已說徧行別境二位善位心所其相云何頌曰善謂信慚愧無貪等三根勤安不放逸行捨及不害二論釋三初正釋頌文二料簡有無三餘門分別初正釋頌文二初總標二別釋初總標論曰唯善心俱名善心所謂信慚等定有十一善心心王也唯善心俱名善心所簡染等也于十三種中此名第一自性善能為諸善之體詳如雜集中二別釋九初釋信所至九釋不害初釋信所四初總釋體用二轉釋差別三問答料簡四斥破異執初總釋體用云何為信于實德能深忍樂欲心淨為性對治不信樂善為業信以心淨為體體在深忍樂欲深忍樂欲全依真實德能如香體全在香氣香氣全依香處也不信是所治善法是所樂即以所治所求而為信用又深忍了知于我𨿽名信因樂欲欣慕于彼𨿽名信果實則忍之不深樂欲不至淨之不極治求不盡由所依以觀忍等而信體可明即治求以遡信體而心淨愈現忍與樂欲然非信體下文又自明也二轉釋差別然信差別畧有三種一信實有謂于諸法實事理中深信忍故二信有德謂于三寳真淨德中深信樂故三信有能謂于一切世出世善深信有力能得能成起希望故由斯對治不信彼心愛樂證修世出世善信實德能是差別今轉釋差別也實有謂諸法實事理信實有謂于諸法實事理中深信忍也實事即俗諦實理即真諦皆言諸法者離諸法無事理故良以佛法無量不出此二此二真實莫可變易如云日可冷月可𤍠眾魔無能壞此真說曰實有于此實有了然忍可于心不為邪謬事理之所引轉曰深信忍也有德謂三寳真淨德信有德謂于三寳真淨德中深信樂也常樂我淨智力無畏等曰佛寳德無為寂滅法性真如等曰法寳德三學嚴身六和具體曰僧寳德皆言真淨者以各離妄名真離染名淨為諸一切有情所皈依處于此真淨欣慕好樂崇尚無厭曰深信樂也有能謂于一切世出世善信有能謂于一切世出世善深信有力能得能成起希望也世善即五戒十善四禪八定等出世善即四諦諸緣六度四攝等世善之力能得人天善果出世善力能成聖賢善果于此有能希求仰望期于必得曰深信欲也由斯對治不信彼心者謂于實等不深忍等穢惡之心此能對治使滅世出世善此能愛樂證修其釋之不同如此故曰差別問釋三種差別不釋信體先釋用者何耶曰以體須料簡釋在下文用不離信隨便顯故三問答料簡忍謂勝解此即信因樂欲謂欲即是信果確陳此信自相是何豈不適言心淨為性此猶未了彼心淨言若淨即心應非心所若令心淨慚等何別心俱淨法為難亦然此性澄清能淨心等以心勝故立心淨名如水清珠能清濁水慚等𨿽善非淨為相此淨為相無濫彼失又諸染法各有別相唯有不信自相渾濁復能渾濁餘心心所如極穢物自穢穢他信正彼故淨為相簡定信體使無所濫也初簡因果次簡相濫恐謂所依真實德能清淨能依深忍樂欲清淨此便是體豈更別有體耶故問云勝解即信因非信自相樂欲即信果非信自相確陳此信自相是何答云豈不適言心淨為性又恐不了心淨之言為復淨即是心名心淨為復能令心淨名心淨為復心俱淨法名心淨耶故難云若淨即心曰心淨此約持業而釋應非心所若令心淨曰心淨此約依主而釋慚等何別若心俱淨法曰心淨此約鄰近而釋亦與慚等何別既皆不可何名心淨故答云此性澄清能淨心與心所獨言心淨者以心勝故立心淨名如水清珠自體清淨能清濁水故言心淨為性慚等𨿽善各別有體非淨為相此淨為相無濫彼失何必以此差別為難耶又觀不信心濁為相信正彼則唯淨為相之㫖益明四斥破異執有說信者愛樂為相應通三性體應即欲又應苦集非信所緣有執信者隨順為相應通三性即勝解欲若印順者即勝解故若樂順者即是欲故離彼二體無順相故由此應知心淨是信斥破異執結定信體也初破小乘執次破大乘執末結定信體愛樂為相者小乘執信果為性也破云應通三性體即是欲以愛樂非唯善性體是別境欲心所故何關于信而執以為相耶又苦集是信所緣實事既非可愛樂法應不緣此而起信耶尤不可也隨順為相者大乘執信因為性也破云若是隨順即別境中勝解與欲應通三性不名善性若印持而隨順者體即勝解若好樂而隨順者體即是欲以離彼二體無順相故是則愛樂為相既犯別境而非唯善性隨順為相亦犯別境而非唯善性由此應知心淨是信益明矣二釋慚愧二初別釋二通簡初別釋二初釋慚二釋愧初釋慚云何為慚依自法力崇重賢善為性對治無慚止息惡行為業謂依自法尊貴增上崇重賢善羞耻過惡對治無慚息諸惡行初正釋體用二轉釋體用自自身法教法崇賢尚人重善尊法言我如是人解如是法敢作諸惡耶故以崇賢重善為性對治無慚止息惡行為業自法尊貴增上等者轉釋體用也謂自身尊貴教法增上于賢欽崇于善敬重羞耻等耳若夫𤰞污其身下賤其業造至于相忘既無自法可依慚從何起是故當念身為道行為道業慚耻之服于諸莊嚴最為第一不可不慎二釋愧云何為愧依世間力輕拒𭧂惡為性對治無愧止息惡行為業謂依世間訶厭增上輕拒𭧂惡羞耻過罪對治無愧息諸惡業初正釋二轉釋世人譏訶名世間力依此于𭧂人輕之不親于惡業拒之不作此愧體也對治無愧止息惡行此愧用也轉釋易知二通簡三初設難簡二破救簡三通妨簡初設難簡羞耻過惡是二通相故諸聖教假說為體若執羞耻為二別相應慚與愧體無差別則此二法定不相應非受想等有此義故若待自他立二別者應非實有便違聖教若許慚愧實而別起復違論說十徧善心設為問難簡去其非也初通正意二簡非別三簡非實四簡非徧正意者慚愧二法以崇重輕拒為別體羞耻過惡為通體簡非者恐謬解執通為別則不相應有待而別則非實有實而別起則不徧善故皆簡之以顯慚愧具通別二體是相應實有而徧善心者也總括大意如此詳之崇重賢善尅是慚體而云羞耻過惡輕拒𭧂惡尅是愧體亦云羞耻過惡葢崇拒自別于慚愧不得以羞耻而言通羞耻自通于崇拒不得因慚愧而云別通別二相慚愧各具至聖玄剖妙𮜿天分一毫不可得而變易者也故顯諸教皆云從通假說為體若執羞耻為二別相應慚與愧體無差別則此二法定不相應决非自類俱起非受想等徧一切心而有前後不相應義慚愧徧諸善心而有不相應義乎良以受想相應體各別故此二相應體既無別以例受想相應體應無別彼既不爾此云何然如是例之不可執羞等為二別相也明矣若謂羞耻過惡𨿽是通相然慚待自法愧待他法因待故異立二別者又應非實便違聖教慚愧是實有體倘若更許慚愧體𨿽實有但各別起復違論說十徧善心以論說十一唯除輕安餘十徧一切善心中故則不可執因待而別實而別起也益又明矣二破救簡崇重輕拒若二別相所緣有異應不俱生二失既同何乃偏責誰言二法所緣有異不爾如何善心起時隨緣何境皆有崇重善及輕拒惡義故慚與愧俱徧善心所緣無別豈不我說亦有此義汝執慚愧自相既同何理能前所設難即破救以簡去其非也初救別起二簡非別三救設難四簡非理救別起云崇重輕拒若是慚愧別相崇重緣善境輕拒緣惡境所緣有異二法應不俱生矣不俱則二失既同應責已失而乃偏責我前別起之為失耶簡非別云誰言崇重止緣善境輕拒止緣惡境所緣之有異耶徴云不爾如何釋云善心起時緣善境有崇重輕拒緣惡境亦有崇重輕拒是則善心隨緣何境皆有此二此二既非異緣慚愧俱徧善心也明矣故慚與愧俱徧善心所緣豈有別耶救設難云豈不我說亦有此羞耻過惡為二別相亦有崇重輕拒等義既有此義不當以體無差別違徧善心為難矣簡非理云汝執慚愧皆以羞耻為體則自相是同自相既同則前難體無差別違徧善心為有理矣汝將何理能此難耶必不可救何救為哉三通妨簡然聖教說顧自他者自法名自世間名他或即此中崇拒善惡于己損益名自他故通妨難以簡去其非也恐妨難云若言待自他立名非實者云何聖教亦說此顧自他耶釋云聖教自法名自世間名他或崇重賢善與己有益名自輕拒𭧂惡于己無損名他非汝唯一羞耻觀待自他而立二別之假有也三釋三根二初總明二別釋初總明無貪等者等無瞋癡此三名根生善勝故三不善根近對治故生善曰勝能生功用殊勝故對治曰近無貪等對治貪等敵體反故二別釋二初釋前二二釋無癡初釋前二云何無貪于有有具無著為性對治貪著作善為業云何無瞋于苦苦具無恚為性對治瞋恚作善為業善心起時隨緣何境皆于有等無著無恚觀有等立非要緣彼如前慚愧觀善惡立故此二種俱徧善心初別釋體用次通簡善俱也有後有即三有異熟果有具即有因謂彼惑業中有及器世界無著為性者于此因果不生膠粘躭著是無貪之體性也對治貪著是別用作善為業是通用以通作眾善故苦三苦之果即苦諦苦具三苦之因即集諦于此因果不生瞋恚是無瞋體性對治瞋恚是別用作善為業是通用恐有疑云此二善根一緣有等一緣苦等所緣有異應不俱起非徧善心故通簡云善心起時隨緣何境皆于有等無著無恚觀有等立無貪瞋非要緣彼而為境故何以緣境為難例前慚愧之立可知矣故此二種俱徧善心不必疑也問於苦具惑業起憎方能逺離于此不憎任彼起耶答於此不憎正顯無瞋之善故曰善心二釋無癡二初正釋二料簡初正釋云何無癡于諸理事明解為性對治愚癡作善為業諸理謂諸諦理諸事諸法實事明解者癡即無明迷暗理事無癡是無無明故于諸理事分明解了為性別治愚癡通作善事為用二料簡二初第一解二第二解初第一解有義無癡即慧為性集論說此報教證智决擇為體生得聞思修所生慧如次皆是决擇性故此𨿽即慧為顯善品有勝功能如煩𢚰見故復別說此師料簡無癡初正釋二引證三通妨即慧為性者見慧外無別體也如集論說此無癡報教證智决擇為體决擇豈非慧耶慧為决擇者前因所感曰報智是生得慧現生熏習曰教智是聞思所生慧忘言契理曰證智是修所生慧如次皆是决擇性故故曰决擇為體仍恐疑云此即別境中慧何復別說耶通云此𨿽即慧慧通善染此既善品為顯有勝功能如煩𢚰見𨿽是慧攝以惟染故別開為二彼見既爾此亦應然不必疑也噫此解由正釋而證明再通妨以例見可謂詳矣乃思稍淺者觀之必以為確然不知別對之理未的通治之通不明下文自顯二第二解四初正申有體二破訶非正三通前引論四釋成有體初正申有體有義無癡非即是慧別有自性正對無明如無貪瞋善根攝故論說大悲無瞋癡攝非根攝故此下皆無癡正義正對無明明解為性可知如無貪瞋所攝別有自性非慧所攝可知大悲無瞋癡攝非慧根攝無癡非慧更可知又非即是慧是別有自性正對無明是表如無貪瞋善根攝故即同類以原自性論說大悲無瞋癡攝非根攝故引他論以原自性論即瑜伽大悲謂佛悲非根攝者非信進等五中之慧根攝也二破前非正若彼無癡以慧為性大悲如力等應慧等根攝又若無癡無別自性如不害等應非實物便違論說十一善中三世俗有餘皆是實初破以慧為性二破無別自性破慧性者承前瑜伽說大悲無瞋癡攝非慧根攝正以無癡非慧為性也若彼以慧為性則大悲應如十力四無所畏等亦是慧等根攝非無瞋癡之所攝矣豈論意耶又若無癡無別自性則如不害依無瞋不放逸及行捨依精進應非實物便違論說十一善中不害等三是俗有而非實餘皆是實而非假矣種種違教豈得為是三通前引論然集論說慧為體者舉彼因果顯此自性如以忍樂表信自體理必應爾恐執集論為定量故通云然集論說慧為體者非即以慧為無癡自體也乃是舉彼三慧因果以顯此無癡自性謂聞思所生慧即無癡因修所生慧即無癡果以顯此明解之自性耳例之如以忍為信因樂為信果表信自體是心淨耳理决應然非強為說由是而知論意有在不可滯言四釋成有體以貪瞋癡六識相應正煩𢚰攝起惡勝故立不善根斷彼必由通別對治通唯善慧別即三根由此無癡必應別有原無癡別有自體之故也以貪瞋癡六識相應正煩𢚰攝起惡勝故立不善根斷彼不善非一法所能必由通對治與別對治而後可也通唯別境善慧別即三種善根假令無癡即慧不應別對愚癡必應別有明解能對之性豈可以通為別使通別相渾致通別皆失耶四釋精進二初總明體用二別顯差別初總明體用勤謂精進于善惡品修斷事中勇悍為性對治懈怠滿善為業勇表勝進簡諸染法悍表精純簡淨無記即顯精進唯善性攝初正釋體用二轉釋體用善惡修斷者于善品修于惡品斷又惡品已生應修律儀令斷名律儀斷惡品未生欲令不現行斷不現前斷為斷故斷名斷斷善法未生數數修習能令現前能有所斷名修習斷善法已生修不放逸令住無失修習圓滿防護已生所有善法能有所斷名防護斷是則分屬善當云修惡當云斷通言善惡皆云修斷故云于善惡品修斷事中云云也勇悍為性者于此二事勇悍不怯為體能治懈怠成滿善事為用勇悍各有表簡勇勇猛以表勝進簡不善有覆無記諸染法無勝堪能設勤易退故悍強悍以表精純簡無覆無記易合間雜𨿽純不精故既簡二性顯唯善性所攝是則勤通三性勤謂精進豈不唯善二別顯差別此相差別畧有五種所謂被甲加行無下無退無足即經所說有𫝑有勤有勇堅猛不捨善軛如次應知此五別者謂初𤼵心自分勝進自分行中三品別故或初𤼵心長時無間殷重無餘修差別故或資糧等五道別故二乘究竟道欣大菩提故諸佛究竟道樂利樂他故或二加行無間解脫勝進別故彰差別以顯要也初會通經論次原釋差別會通者論之被甲精進即經之有𫝑加行即有勤無下即有勇無退即堅猛無足即不捨善軛詞不同義無殊也總以喻明如人入陣既被甲已奮力爭先了無屈下唯進為心直至攻城得地而猶以為未足也學道亦然既誓願已加添功行了無屈下大難不退直至真竆惑盡而猶不能以自己也淺深具備思之可知原釋五之所以別者以諸聖賢從始至終行修位道各有差別然皆不離于精進行差別者謂初𤼵心行攝被甲精進自分下品行攝加行自分中品行攝無下自分上品行攝無退勝進行攝無足故修差別者或𤼵心修攝被甲精進長時修攝加行無間修攝無下殷重修攝無退無餘修攝無足故位差別者一資糧位攝被甲精進二加行位攝加行三通逹位攝無下四修習位攝無退五究竟位攝無足故問第五究竟位何故亦攝無足精進曰𨿽云究竟淺深不同若二乘究竟欣大菩提故有無足精進若諸佛究竟利樂有情故有無足精進虚空若足萬象有餘滄𪷆若足百川不納故聖人名沃焦誠以其無盡蔵也道差別者一資糧道攝被甲精進二加行道攝加行三無間道攝無下四解脫道攝無退五勝進道攝無足故是則行修位道以精進差別而有成精進差別因行修位道而有辨始終不離于精進故諸度中精進最要三根名作善精進名滿善良有以也五釋輕安安謂輕安逺離麄重調暢身心堪任為性對治惽沉轉依為業謂此伏除能障定法令所依止轉安適故初正釋二轉釋麄重謂雜染品法輕則逺離麄重安即調暢身心于善品法堪任修持而為體性對治惽沉轉捨染依轉得淨依而為業用能障定法即是惽沉亦即麄重除伏即逺離正輕安之體也所依止即身心令所依止等正輕安之用也轉安適故正是轉依文簡而義盡六不放逸三初釋體用二通妨難三重料簡初釋體用不放逸者精進三根于所斷修防修為性對治放逸成滿一切世出世間善事為業謂即四法于斷修事皆能防修名不放逸非別有體無異相故于防惡事修善事中離四功能無別用故初正釋體用二轉釋體用防修者于所斷惡防令不生于所修善引令增長正釋體用易明轉釋者轉釋不放逸體用謂即四法于修斷事皆能防修名不放逸非離四法之外別有不放逸體所以然者以與四法無異相故體相無異故云即也于防惡事修善事中非離四法之外更有功能所以然者離四功能無別用故業用無別故不離也功能即對治放逸成滿世出世善義二通妨難𨿽信慚等亦有此能而方彼四𫝑用微劣非根徧策故非此依恐有難云信慚等皆能防修不放逸亦當依彼而立獨依四法立者何耶通云𨿽信慚等亦有此能然以此方彼彼𫝑著而此微彼用勝而此劣以信等非三善根非徧策故防修之能微劣不可為依故不放逸不依彼立三重料簡豈不防修是此相用防修何異精進三根彼要待此方有作用此應復待餘便有無竆失勤唯徧策根但為依如何說彼有防修用汝防修用其相云何若普依持即無貪等若徧策錄不異精進止惡進善即總四法令不散亂應是等持令同取境與觸何別令不忘失即應是念如是推不放逸用離無貪等竟不可得故不放逸定無別體重為問答料簡防修不離于四法也初防修是此相用問二防修異彼多失答三彼四無有防修問四離四無有防修答初問云豈不防修是不放逸之相用何云離彼四法無體用耶答云汝謂防修是此相用則防修異彼四法防修異彼彼不即防修反待不放逸之防修為作用矣然而防修何異精進三根耶若彼四要待此不放逸方有作用則不放逸自既無體此應復待餘信慚等而有作用矣展轉不已便有無竆過失豈得防修是此相用次問云勤唯徧策徧策之外無有根但為依為依之外無有如何于此唯但而說彼有防修防修是不放逸之體用也明矣答云誠若所論是外依策以論防修矣吾試推之汝防修用其相云何相明彼此之屬自知為復普為諸善依持為防修之相乎抑復周徧策錄為防修之相乎若普依持即無貪等固非離此而有防修若徧策錄不異精進亦非離此而有防修若以止惡進善為防修者即總四法愈非離四之外而有防修得無以令不散亂為防修之相乎應是等持而非防修又得無以令同取境為防修之相乎與觸何別而非防修更得無以令不忘失為防修之相乎即應是念而非防修如是推可謂盡矣不放逸用離無貪等竟不可得故不放逸離四法外定無別體體即四法何以難為哉七釋行捨二初正釋體用二轉釋差別初正釋體用云何行捨精進三根令心平等正直無功用住為性對治掉舉靜住為業行捨者此善法即行蘊捨簡非受蘊所攝之無記捨平等者離高下故正直者離邪曲故無功用住離有功用故精進三根者不離四法也令心等者正見行捨自體也掉舉對治寂靜安住用生于令心等初中後之體也二轉釋差別謂即四法令心逺離掉舉等障靜住名捨平等正直無功用住初中後位辯捨差別由不放逸先除雜染捨復令心寂靜而住此無別體如不放逸離彼四法無相用故能令寂靜即四法故所令寂靜即心等故即體用辯差別析易渾于秋毫也易渾者初中後位易渾不放逸捨易渾能令所令易渾今皆析之而使明也初總釋捨名次辯位差別三明二不同四明無別體五原無別體總釋捨名者總渾體用而釋捨名也辯位差別者初心平等捨掉舉行次心正直捨邪曲行後無功用捨有功用行也明二不同者恐疑不放逸與行捨皆以四法為體差別云何故云由不放逸先除雜染捨復令心寂靜而住則除雜染之用屬不放逸令心寂靜之用屬于行捨用不同也明無別體者此無別體如不放逸離彼四法無相用故可比知也原無別體者能令寂靜即四法故所令寂靜即心等故心等不離于能令行捨離四故無別體然則名由差別而愈顯用固是別而體同轉釋之不可無也明矣八釋不害三初正釋體用二轉釋差別三斥破異解初正釋體用云何不害于諸有情不為損𢚰無瞋為性能對治害悲愍為業諸有情所該甚廣微至蚤𧒢昆凢加侵損使之失益逼𢚰使之不安皆害也况其餘乎不損𢚰而悲愍益莫大矣苐以不為損𢚰為體悲愍為用竊有難焉何則由悲愍而不損𢚰非不損𢚰而悲愍悲愍宜體不損𢚰宜用今乃倒置厥㫖安在豈不以直詮自體是不損𢚰不損𢚰而損𢚰之害自違不損𢚰而損𢚰之苦自用不離體不為倒置二轉釋差別謂即無瞋于有情所不為損𢚰假名不害無瞋對斷物命瞋不害正違損𢚰物害無瞋與樂不害苦是謂此二麄相差別理實無瞋實有自體不害依彼一分假立為顯慈悲二相別故利樂有情彼二勝故初空實名二顯差別三原假立空實名者恐謂離彼無瞋有體實名不害故云謂即無瞋于有情所不為損𢚰假名不害耳豈自有實體之實名耶然則無瞋不害果何所別故云無瞋根本中瞋不害違小隨中害無瞋與不之樂不害損𢚰之苦麄相𨿽別細以理推無瞋有體不害假立必假立者為顯慈悲二相別故不可渾也必顯彼者利樂有情彼二勝故不可忽也標立豈偶然哉三斥破異解有說不害非即無瞋別有自體謂賢善性此相云何謂不損𢚰無瞋亦爾寧別有性謂于有情不為損𢚰慈悲賢善是無瞋故初敘異解次破異解不害非即無瞋用無瞋為自體也別有自體表體離無瞋而自有也自體固謂賢善不得其相其體不明故復重徴異解其相云何異解釋之曰謂不損𢚰乃斥破云無瞋亦爾寧別有性謂于有情不為損𢚰慈悲賢善是無瞋故然則知無瞋是處不害之面目愈明寧得離此而有不害之性乎全合于離破法之妙固如此九釋及字二初總釋二別釋初總釋及顯十一義別心所謂欣厭等善心所法𨿽義有別說種種名而體無異故不別立顯此外不立餘善之故也此外者頌中及言顯十一善外根隨二十六種信等止十一餘不者以及言該之恐難云欣等善所名義各別云何頌中亦不別立故云𨿽義有別說種種名然彼欣等之體不異此善等體故畧不言耳𠑽之𨿽無量善法亦體不出此豈獨欣厭等已耶二別釋二初明應二明不初明應六初欣等五善二厭等三善三不覆等三四不慢一善五不疑一善六不亂等四初欣等五善欣謂欲俱無瞋一分于所欣境不憎恚故不忿恨𢚰嫉等亦然隨應正瞋一分故此欣等五所應也欣者欣悅于所欣境不憎恚故與善欲俱起以無瞋一分為體不忿不恨不𢚰不嫉亦以無瞋一分為體隨應正忿恨𢚰嫉瞋一分為體之四小隨故是則此五體皆無瞋所攝故云體無異故不別立也二厭等三善厭謂慧俱無貪一分于所厭境不染著故不慳憍等當知亦然隨應正貪一分故此厭等三所應也厭謂厭離于所厭境不染著故與善慧俱起以無貪一分為體不慳不憍亦以無貪一分為體隨應正慳憍唯貪一分為體之二小隨故是則此三皆無貪所攝故云體無異故不別立也三不覆等三不覆諂誑無貪癡一分隨應正貪癡一分故有義不覆唯無癡一分無處說覆亦貪一分故此不覆等三所應也不覆不誑不諂無貪無癡一分為體隨應正覆誑與諂貪癡一分所攝三小隨故有義止許不覆無癡一分不許貪一分者其義未盡以不懼當苦而覆是癡一分恐失利養而覆是貪一分故此不辨者以下自有文又初說二分皆具自形一分為不盡故是則此三體皆無貪癡一分所攝故云體無異故不別立也四不慢一善有義不慢信一分攝謂若信彼不慢彼故有義不慢捨一分攝心平等者不高慢故有義不慢慚一分攝若崇重彼不慢彼故此不慢之應也不慢信捨慚各一分所攝正根本之慢體皆攝于十一中三善故云體無異故不別立也五不疑一善有義不疑即信所攝謂若信彼無猶豫故有義不疑即正勝解以决定者無猶豫故有義不疑即正慧攝以正見者無猶豫故此不疑之應也不疑是信正解慧所攝正根本之疑體攝于別境十一中三善故云體無異故不別立也六不亂等四不散亂體即正定攝正見正知俱善慧攝不忘念者即是正念此不散亂等四應也不散亂即正定為體大隨中散亂正見正知俱善慧為體根本中我見大隨不正知不忘念者正念為體大隨中失念是則四皆別境三善所攝故云體無異故不別立也從欣等至此善法計共十有七種唯欣厭無別對耳此皆頌中及字所攝之義問欣厭無別對何列此中答取體無異故問周孔仁義禮智等體無異于此耶曰仁攝無瞋中禮攝無貪中義攝無貪善慧中信攝信中智攝善慧中餘可例知實則十一善等無善不攝二明不悔眠伺通染不染如觸欲等無別對無別對者染與善對可以染為善有別敵對悔等既通三性如觸欲等皆通善染無別對何可也故云無別對上初正釋頌文竟二料簡有無二初料簡建立二料簡染淨初料簡建立何緣諸染所善中有別建立有不爾者相用別者便別立之餘善不然故不應責又諸染法徧六識者勝故之別立善法慢等忿等唯意識俱害𨿽亦然而數現起損𢚰他故障無上乘勝因悲故為了知彼增上過失立不害失念散亂及不正知入別境善中不說料簡建立者料簡有建無建之故以明所也初問建有無二相用為答三顯勝為答四通不害疑五通不說疑亦可後三皆約顯勝而答問意云諸染所善法數應二十六種今頌中別立信等十一餘不立者意殆云何相用為答云信等十一體相業用各別便別立之無所濫餘之相用不別故不別立次顯勝為答云根本貪瞋癡及中隨二大隨中不信懈怠放逸掉舉惽沉小隨中害此諸染法徧前六識作用勝故立善法根本慢疑見三及忿等九小隨唯在第六意識故不別立恐有疑云害唯意俱何別立耶故通云害𨿽亦然而數起損他障大悲故為使了知彼過增上故別立恐又疑云若言徧前六識勝故之失念散亂不正知三既徧六識何不之別立善法故通云此三入別境正定善念善慧是以善中不說別建立不建立差別如此烏容不料簡耶二料簡染淨染淨相淨寧少染淨勝染劣少敵多故又解理通說多同體迷情事局隨相分多故于染淨不應齊責料簡染淨者料簡淨少染多之故以明所也初問次答問意云染淨相多少宜等淨寧當少于染止有十一染寧當多于淨有二十六耶答云淨勝染劣少敵多故又淨法悟解理通說多同體故不多立染法迷情事局隨相差別是以多分故知不應齊責定欲均等差別如此故須料簡三餘門分別二初正明二結示初正明六初體用假實門二徧與不徧門三諸識相應門四諸受相應門五境性界學門六見斷等攝門初體用假實門此十一法三是假有謂不放逸捨及不害義如前說餘八實有相用別故二徧與不徧門二初第一師二第二師初第一師有義十一四徧善心精進三根徧善品故餘七不定推事理未决定時不生信故慚愧同類依處各別隨起一時第二無故要世間道斷煩𢚰時有輕安故不放逸捨無漏道時方得起故悲愍有情時乃有不害故論說十一六位中起謂决定位有信相應止息染時有慚愧起顧自他故于善品位有精進三根世間道時有輕安起于出世道有捨不放逸攝眾生時有不害故此師謂精進三根徧諸善心餘七不定初總標次單釋三引證依處各別者意以慚依自力愧依世間依處既別隨起第一不起第二即不定義也餘六引證文顯可知二第二師三初斥前非二通論意三申正㫖初斥前非有義彼說未為應理推事理未决定心信若不生應非是善如染心等無淨信故慚愧類異依別境同俱徧善心前已說故若出世道輕安不生應此覺支非無漏故若世間道無捨不放逸應非寂靜防惡修善故又應不伏掉放逸故有漏善心既具四法如出世道應有二故善心起時皆不損物違能損法有不害故破餘七不定之解也初總破非理次別推其故破云前言推事理未决定時不生信故所以不定不知信若不生應非是善所以然者無淨信故如染心等然而既許是善寧得無信故彼說之不應理也前言慚愧類同依處各別起一無一所以不定不知慚愧崇拒類異自他依別隨緣何境皆有崇拒而境是同俱徧善心前已說故故彼說之不應理也前言要世間道斷煩𢚰時有輕安故所以不定不知世間斷惑得有出世斷惑若無則輕安覺支非無漏攝然是無漏攝故彼說之不應理也前言不放逸捨無漏道時方得起故所以不定不知既名世間道須具寂靜防修等法若世間道無此二者應非寂靜防修又應不伏掉舉放逸何名世間道耶量之有漏善心應有不放逸捨所以然者具四法故如出世道出世具四法出世有此二世間既具四安得無有二故彼說之不應理也前云攝眾生時有不害故所以不定不知善心起時皆有不害違能損法故彼說之亦不應理也二通論意論說六位起十一者依彼彼增作此此說故彼所說定非應理前師引論以證說意說之必不可破今破其說不通于證猶弗破也故云論說六位起十一等者益有所依而說耳不由依以察其說竟執于說而為之說豈得有理依彼彼增作此此說者謂决定位則信增乃至攝眾生位不害增依决定乃至攝眾生彼彼增盛之位作有信慚愧乃至有不害之此此說耳非謂獨于此位方有他位全無也何為不得于說而竟為之說故彼所說定非應理豈苟為之破耶三申正㫖應說信等十一法中十徧善心輕安不徧要在定位方有輕安調暢身心餘位無故决擇分說十善心所定不定地皆徧善心定地心中增輕安故有義定加行亦得定地名彼亦微有調暢義故由斯欲界亦有輕安不爾便違本地分說信等十一通一切地有義輕安唯在定有由定滋養有調暢故論說欲界諸心心所由闕輕安名不定地說一切地有十一者通有伺等三地皆有故正明徧不徧也初總明徧與不徧次別明輕安亦徧三別明輕安不徧總明徧與不徧者十徧善心輕安不徧釋云要在定位方有輕安調暢身心餘位無故證之則决擇分說十善心所色無色定地欲界不定地皆徧善心十徧可證也定地心中增輕安故不徧可證也輕安亦徧者有義定加行亦得定名顯决擇定地增輕安者不必根本也何者彼亦微有調暢義故由斯欲界亦有輕安證之則若不爾者便違本地分說信等十一通一切地矣輕安不徧者有義輕安唯在定有由定滋養有調暢故論說欲界諸心心所由闕輕安名不定地前本地分說一切地有十一者通有有伺地無有伺地無無伺地之上一切地而言非連欲界不定地名一切地也良以初靜慮中未入定時有有伺已入定時即無有伺自二靜慮至色究竟皆無無伺是以輕安唯通上地不徧欲界故說欲界無禪若夫身居欲界定越輕安則又不可以欲界拘之如法師問鵝湖大義禪師云欲界無禪汝何言禪答曰子知欲界無禪不知禪無欲界妙哉言乎此破格之論也由是而知論從多分囿于欲界者為言耳智者詳之三諸識相應門此十一種前已具說第七八識隨位有無第六識中定位皆具若非定位唯闕輕安有義五識唯有十種自性散動無輕安故有義五識亦有輕安定所引言者亦有調暢故成所作智俱必有輕安故隨位有無者七八二識因位俱無果位俱有六識在定皆具不定唯闕輕安五識則一師謂無輕安自性散動故一師云有定所引善五識者亦有輕安轉依位中亦有輕安故有義為正四諸受相應門此善十一何受相應十五相應一除憂苦有逼迫受無調暢故十五相應者十法與五受皆相應也一除憂苦者輕安一法除憂苦二受也有逼迫受者逼迫于心名憂受逼迫于身名苦受無調暢者二受無輕安也五境性界學門此與別境皆得相應信等欲等不相違故十一唯善輕安非欲餘通三界皆學等三此中四門總為一科以文少于前均廣畧故不相違故者別境與十一善法皆俱是別境相應門也十一唯善者于三性中十一唯善性攝是三性相攝門也輕安非欲餘通三界者輕安一法不徧欲界餘十徧于三界是三界繫屬門也皆學等三者此十一法于學無學非二三位中皆具有故是學等三攝門也六見斷等攝門非見所斷瑜伽論說信等六根唯修所斷非見所斷信等六根者信進念定慧及未知當知根信即如名進即精進此二既爾餘九皆通于修斷故引瑜伽證唯修斷然瑜伽云六修所斷餘二非所斷此論取不通于見故曰唯修所斷餘二非所斷餘二者已知根具知根也然總其大意是有漏十一屬修所斷無漏十一屬非所斷故論云非見唯修意含及非所斷也二結示餘門分別如理應思三根惑位二初本論二論釋初本論如是已說善位心所煩𢚰心所其相云何頌曰煩𢚰謂貪瞋癡慢疑惡見二論釋二初總釋二別釋初總釋論曰此貪等六性是根本煩𢚰攝故得煩𢚰名二別釋二初正釋六種二餘門分別初正釋六種六初釋貪二釋瞋三釋癡四釋慢五釋疑六釋見初釋貪云何為貪于有有具染著為性能障無貪生苦為業謂由愛力取蘊生故正釋體用義見善位謂由愛力取蘊生故者轉釋生苦之由也以由貪愛之力為因後五取蘊苦果復得生也苦有八種謂生老至五蘊八苦各具五相如生有眾苦所隨等五至蘊有生苦器等五是也相明而逼迫之態始明態明而畏苦之心自𤼵可懼也已又貪依十事生具如別載文繁不錄二釋瞋云何為瞋于苦苦具憎恚為性能障無瞋不安隱性惡行所依為業謂瞋必令身心𤍠𢚰起諸惡業不善性故體用亦見上文謂瞋必令身心𤍠𢚰者轉釋不安隱性也起諸惡業不善性者轉釋惡行所依也瞋依十事生亦如別載三釋癡云何為癡于諸理事迷闇為性能障無癡一切雜染所依為業謂由無明起疑邪見貪等煩𢚰隨煩𢚰業能招後生雜染法故于諸理事迷闇者不共無明迷理相應無明迷事也謂由無明等者轉釋一切雜染所依為業也謂由無明起疑見貪等煩𢚰隨煩𢚰惑雜染由惑造作有漏善不善等諸業雜染由業習氣能招後生五趣善不善果生雜染故云一切雜染所依此三雜染皆依癡而起故也至若癡依七事生亦如別載文繁不錄四釋慢二初總釋體用二別顯差別初總釋體用云何為慢恃己于他高舉為性能障不慢生苦為業謂若有慢于德有德心不謙下由此生輪轉無竆受諸苦故初正釋體用二轉釋體用恃己于他所該者廣畧之即學問技𮒛族姓色力等恃己于他高舉為性能障不慢生苦為用謂若有慢等者轉釋生苦為業之由謂此慢者不以道德為尚若于三寳真淨之德及有德一切師友等人心不謙下競生人我由此慢惑造諸惡業輪轉生受諸苦報于無竆也二別顯差別此慢差別有七九種謂于三品我德處生一切皆通見修所斷聖位我慢既得現行慢類由斯起亦無失顯差別詳察以知斷也初顯差別二顯斷位三釋修斷七種者一慢二過慢三慢過慢四𤰞劣慢五我慢六邪慢七增上慢九類者一我勝慢類二我等慢類三我劣慢類四有勝我慢類五有等我慢類六有劣我慢類七無勝我慢類八無等我慢類九無劣我慢類慢者于他下劣謂己為勝或復于等謂己為等令心高舉此猶未過故但名慢過慢者于等謂勝于勝謂等令心高舉此則己過故名過慢慢過慢者于勝謂勝令心高舉此復更過故名慢過慢𤰞劣慢者于多勝中謂己少劣令心高舉此以劣恃故名𤰞劣慢我慢者妄謂諸行為我我所令心高舉此以我恃故名我慢邪慢者實無其德謂己有德令心高舉謬恃以德故名邪慢增上慢者于其殊勝所證法中未得謂得令心高舉妄恃增勝故名增上慢九類廣如雜集大約九類從七慢中慢過慢𤰞慢三種出也三品我德處生者謂一劣有情品二等有情品三勝有情品四我處即內取蘊五德處即已得未得顛倒六妄謂功德顛倒慢依此生者慢依劣等二品有情事生過慢依等勝二品有情事生慢過慢𤰞劣慢此二依一勝品有情事生邪慢及增上慢依二顛倒德處生我慢妄計取蘊為我我所即依我處生故總云謂于三品我德處生也一切皆通見修所斷者明斷所攝依見起者名見所斷緣事生者名修所斷我慢既得現行等者釋成修斷也聖位我慢現行者俱生我慢現行也慢類由斯起亦無失者運大悲故隨宜利物起亦無失也五釋疑二初正釋二簡異初正釋云何為疑于諸諦理猶豫為性能障不疑善品為業謂猶豫者善不生故謂猶豫者善不生故轉釋障善之由也以不生因于猶豫猶豫豈不障善鞠疑根源由聞不正法見師邪行見所受信意見差別或性自愚或甚深法性及廣大教法之六事而生也二簡異有義此疑以慧為體猶豫簡擇說為疑故毘𦔳末底是疑義故末底般若義無異故有義此疑別有自體令慧不决非即慧故瑜伽論說六煩𢚰中見世俗有即慧分故餘是實有別有性故毘𦔳末底執慧為疑毘𦔳若南智應為識非由𦔳力義便轉變是故此疑非慧為體二義並陳以後簡前見慧為疑體之非正也初義以慧為體三出其故始云猶豫簡擇說為疑故即疑名以原體也二云毘𦔳末底是疑義故即疑義以原體也三云末底般若義無異故即義同以原體也次義先正釋破二引證破三比例破正釋破者別有自體令慧不决非即慧故引證破者瑜伽論說六煩𢚰中唯見是假有即慧分故餘是實有別有性故疑豈是假有耶比例破者梵語若南此云智梵語毘若底此云識梵語末底此云慧末般二字是慧義若字是智義故梵語般若此智慧前師以毘者比義𦔳者輔𦔳意明比益輔𦔳于慧者即是疑義𦔳慧之法應是慧故故知此疑以慧為體耳次師破云若以毘𦔳末底之毘字為𦔳慧之力故執慧為疑則應毘若南之毘字亦有𦔳智之力智亦應為識乎此既不然彼云何然可例知矣設疑能𦔳慧亦非由𦔳力便能轉變其體是故此疑非慧為體六釋見二初總釋體用二別釋差別初總釋體用云何惡見于諸諦理顛倒推求染慧為性能障善見招苦為業謂惡見者多受苦故顛倒推求即是染慧善見即非顛倒多受苦者苦由業業由見見難卒善惡業頗長隨業受報苦誠不少二別釋差別二初標二釋初標此見行相差別有五體唯染慧曰有五者約用不同故二釋四初身見二邉見三邪見四二取初身見一迦耶見謂于五取蘊執我我所一切見趣所依為業此見差別有二十句六十五等分別起攝初釋行相二顯別攝梵語此云敗壞梵語迦耶此云和合積聚于敗壞和合積聚之身而起我身之見曰迦耶見約義而言即身見也謂于五取蘊執我我所者是釋身見執者顛倒推求妄計堅持之謂一切見趣所依為業者一切是能依身見是所依言身見為生一切見趣之所依也二十句者謂色大我小我在色中我大色小色在我中即色是我離色是我四蘊例此成二十句六十五者一蘊為我四皆我所各具瓔珞僮僕窟宅三法我與我所合十三句五蘊互具成六十五分別攝者謂此見差別皆外道等計度而起曰分別起攝詳載婆沙二邉見二邉執見謂即于彼隨執斷常障處中行出離為業此見差別諸見趣中有執前際四徧常論一分常論及計後際有想十六無想俱非各有八論七斷滅論等分別起攝初釋相用二顯別攝相用謂即于身見增益之力隨執我斷我常是邉見行相障處中道解脫之行令堕偏僻繫縛是邉見業用也別攝者四徧常等及七斷滅共四十七種是邉見差別此皆外道計度分別而起所攝綂括大意如此詳之四徧常者一觀心境二觀四大三觀八識四觀隂理皆計為常一分常者亦有四種一觀心對眾生二觀境見壞否三觀心對色身四觀隂有常否各計一分是常有想十六者四隂各計四相皆計後有相無想八論者通觀四隂現在因亡未來果䘮因果合論成八故計後八皆無相俱非八論者通觀四隂見有非有觀無不無隨舉一隂皆具二非故計後八皆非相七斷滅者欲界人天二處色界四禪無色皆計現前斷滅後不生以上畧取義釋詳如楞嚴瑜伽是則七種是斷前四十是常差別𨿽多總管斷常故前云隨執斷常三邪見三邪見謂謗因果作用實事及非四見諸餘邪執如增上緣名義徧故此見差別諸見趣中有執前際二無因論四有邉等不矯亂及計後際五現𣵀槃或計自在世主釋梵及餘物類常恒不易或計自在等是一切物因或有橫計諸邪解脫或有妄執非道為道諸如是等皆邪見攝初顯邪見該博次顯邪見差別如瑜伽第七空見中畧云謗因者無施無受及無祠祀等謗果者無妙行業果惡行業果及無異熟果等謗作用者無妙行作用無惡行作用等謗實事者無父無母無化生有情無真阿羅漢等及非四見諸邪執者謂非前後四見所攝及謗方等經等諸餘邪執皆此見攝如增上緣名義徧故餘緣所不攝者皆此緣攝二無因者觀八萬劫前無因自有名本無因劫中性非遷改名末無因四有邉者一觀三世取現在為有邉二觀見聞以見聞處為有邉三觀徧知取境有極為有邉四觀一身生滅取一身為有邉不矯亂者亦有四種一觀變化分于變恒生滅及增滅有無故答問則云亦生亦滅等二觀心無故答問唯止一字但言其無三觀心有故答亦惟止一字但言其是四觀有無答問則云亦有即是亦無亦無之中不是亦有一切矯亂無容竆詰顯不錯答者得生于不天中曰不矯亂五現𣵀槃者計欲界四禪五處安隱為勝淨依故自在即欲界頂釋即帝釋梵即大梵世主者釋是欲界主梵即大千主彼計此天及餘物類其體實常而不變易或計自在是一切物因者即計彼常能生諸法諸邪解脫者橫計邪果非道為道者妄執邪因也諸如是等皆邪見攝結別歸總也無因果等即相能障正見等即用今不言者行文不便故可以意得故例上可知故四二取二初二取二通妨初二取四見取謂于諸見及所依蘊執為最勝能得清淨一切鬬諍所依為業五戒禁取謂于隨順諸見戒禁及所依蘊執為最勝能得清淨無利勤苦所依為業執為最勝等者于諸見中隨執一見及所依蘊為最勝之因能得清淨之果正見取也鬬諍等者諍起于互非非由于執著執此為是餘必皆非故諸諍依此而起曰所依為業也隨順諸見戒禁及所依蘊等者謂即于隨順諸見所持戒禁及戒禁所依之蘊亦執為最勝之因能得清淨之果也無利勤苦等者謂不能得出苦義也問諸見戒禁云何曰如狗牛象鹿眠針卧棘等是如十住婆沙論及𣵀槃所明二通妨然有處說執為最勝名為見取執能得淨名戒取者是影畧說或隨轉門不爾如何非滅計滅非道計道說為邪見非二取攝恐有難云既言執最勝因能得勝果二取皆然云何有處說執最勝名見取執能得淨名戒取耶故為通云是影畧說或隨轉門非見取單計于因戒取單計于果也不爾如何非滅計滅非道計道說為邪見其意葢謂非因計因非果計果因果𨿽具而單計者曰邪見非因執因非果執果執于此因能得淨果而雙計因果者曰二取耳二餘門分別二初正明二結示初正明十初俱生分別門至十隨境立名門初俱生分別門如是總別十煩𢚰中六通俱生及分別起任運思察俱得生故疑後三見唯分別起要由惡友及邪教力自思察方得生故邉執見中通俱生者有義唯斷常見相麄惡友等力方引生故瑜伽等說何邉執見是俱生耶謂斷見攝學現觀者起如是怖今者我我何所在耶故禽獸等若遇違緣皆恐我斷而起驚怖有義彼論依麄相說理實俱生亦通常見謂禽獸等執我常存熾然造集長時資具故顯等諸論皆說于五取蘊執斷計常或是俱生或分別起初通判十惑次別判邉見承上貪及慢疑五總煩𢚰身及見戒五別煩𢚰如是煩𢚰于俱生分別果何所通耶故云六通俱生等云云也六謂貪瞋癡慢以及身邉皆通俱生分別以任運得生故通俱生思察得生故通分別疑後三見者疑及邪見二取也此四唯分別起以要由惡友邪教自思察三力方生任運不能生也別判邉見者以邉見之解不同初執俱生邉見唯斷非常引瑜伽為證次解邉見俱生雙通斷常引諸論為證問瑜伽何為但依麄相理實耶曰彼云謂斷見攝不云唯斷見攝則言陳似局意或兼通或且據斷以明邉故說何邉執見是俱生耶謂斷見攝則知亦可據常以明邉可說何邉執見是俱生耶謂常見攝矣影畧且舉一隅使其自會不然瑜伽果局麄相矣豈其然乎又現觀對比觀說指地上言也分別已伏除故二自類相應門六初以貪對餘八二以瞋對餘七三以慢對餘六四以疑對五見五以五見互對六以癡對餘九初以貪對餘八此十煩𢚰誰幾相應貪與瞋疑定不俱起愛憎二境必不同故于境不决無染著故貪與慢見或得相應所愛所陵境非一故說不俱起所染所恃境可同故說得相應于五見境皆可愛故貪與五見相應無失文分三叚皆先標次釋初貪與瞋疑起定不俱二貪與慢見或俱不俱三貪與五見皆應得俱其義易見二以瞋對餘七瞋與慢疑或得俱起所瞋所恃境非一故說不相應所蔑所憎境可同故說得俱起初猶豫時未憎彼故說不俱起久思不决便憤𤼵故說得相應疑順違事隨應亦爾瞋與二取必不相應執為勝道不憎彼故此與三見或得相應于有樂蘊起身常見不生憎故說不相應于有苦蘊起身常見生憎恚故說得俱起斷見此說瞋有無邪見誹惡事好事如次說瞋或無或有初瞋與慢疑或俱不俱二瞋與二取定是不俱三瞋與三見或俱不俱四顯與斷邪差別不同亦皆先標次釋斷見此說瞋有無者苦樂蘊也謂苦蘊起斷則瞋無樂蘊起斷則瞋有誹惡事瞋不俱起誹好事瞋得相應順事猶豫瞋得相應違未决瞋不俱起故云隨應亦爾三以慢對餘六慢于境定疑則不然故慢與疑無相應義慢與五見皆容俱起行相展轉不相違故然與斷見必不俱生執我斷時無陵恃故與身邪見一分亦爾初慢與疑不俱二慢與五見皆俱三顯斷與身邪有無全分不同一分亦爾者身見執苦劣蘊邪見誹好事無陵恃故慢不相應四以疑對五見疑不决與相見違故疑與見定不俱起五以五見互對五見展轉必不相應非一心中有多慧故六以癡對餘九癡與九種皆定相應諸煩𢚰生必由癡故以上𨿽分六節亦可為三一一與多對二諸見互對三一與九對俱否之義既明單複之理自現三諸識相應門此十煩𢚰何識相應蔵識全無末那有四意識具十五識唯三謂貪瞋癡無分別故由稱量等起慢等故無分別者無計度等分別故惟三也稱量等者等惡友邪教思察也由稱量彼此勝劣而起慢由惡友邪教思察而起疑及惡見五無稱量等故無慢等也四諸受相應門二初委細釋二麄相釋初委細釋四初貪瞋癡二慢差別三疑三見四身邉見初貪瞋癡此十煩𢚰何受相應貪瞋癡三俱生分別一切容與五受相應貪會違緣憂苦俱故瞋遇順境喜樂俱故貪會違緣等者恐疑貪境順情應無憂苦瞋境逆情應無喜樂今云五受俱何耶故云貪會于違則憂苦必俱瞋遇于順則喜樂必俱不必疑也二慢差別有義俱生分別起慢容與非苦四受相應恃苦劣蘊憂相應故有義俱生亦苦俱起意有苦受前已說故分別慢等純苦趣無彼無邪師邪教等故然彼不造引惡趣業要分別起能𤼵彼故此分二解後義為正初解俱生分別二慢皆與四受相應唯除于苦而與憂相應者以恃苦劣蘊憂必定俱故也次解俱生慢亦有苦受相應引前為證分別慢無苦受然曰純苦趣無則非純苦者有苦可知無邪師等者不能引生分別故不造引惡趣業者以能造之思唯意識分別所起純苦唯屬俱生無有分別生起能𤼵彼故三疑三見疑後三見容四受俱欲疑無苦等亦喜受俱故二取若緣憂俱見等爾時得與憂相應故疑後三見者二取及邪見此皆分別四受俱者除苦受也恐疑疑是猶豫何得有喜取執殊勝何得有憂故通云欲界繫疑未來無苦等亦喜相應故二取若緣憂俱見戒及所依蘊得與憂俱如髮熏鼻無利勤苦等事亦有憂故邪見喜憂皆具自可知矣四身邉見有義俱生身邉二見但與喜樂捨受相應非五識俱唯無記故分別二見容四受俱執苦俱蘊為我我所常斷見此與憂相應故有義二見若俱生者亦苦受俱純受苦處緣極苦蘊苦相應故論說俱生一切煩𢚰皆于三受現行可得廣說如前餘如前說此分二解後義為正初義非五識俱唯無記故出俱生身邉無苦憂二受之故也以此二見非五識俱故無有苦受唯有覆無記性故無有憂受四受俱者除苦受也恐有難云分別二見何有憂受故通云執苦俱蘊為我我所常執樂俱蘊為我我所斷爾時得與憂相應故次義俱生身邉二見非唯喜樂捨三亦通苦受者以純受苦處緣極苦蘊苦相應故證于論說俱生一切煩𢚰皆于三受現行可得廣說如前第五卷中餘如前說者分別二見相應受名餘如前說者准前初解也二麄相釋此依實義隨麄相者貪慢四見樂喜捨俱瞋唯苦憂捨受俱起癡與五受皆得相應邪見及疑四俱除苦貪癡俱樂通下四地餘七俱樂除欲通三疑獨行癡欲唯憂捨餘受俱起如理應知約麄相以綂微細差別使易見也初明相應諸受次明所通界地意謂上依實義微細研竆如此若一徃但依麄相而言貪慢與身邉二取六煩𢚰皆樂喜捨俱瞋唯苦憂捨俱癡與五受皆俱邪見與疑唯除苦俱所通界地者貪癡相應樂于九地中通下四地謂欲及第三禪也不通上地以上五地唯捨相應故餘七相應樂除欲界通初禪及三禪除欲界者以此五見疑慢之餘七唯在意地意地之樂非欲界故不言瞋者以約麄相而言瞋非樂故疑與獨行無明欲界唯憂捨而已餘受俱起如理應知者色無色界及餘惑餘受俱起所通界地如理思之可知五別境相應門此與別境幾互相應貪瞋癡慢容五俱起專注一境得有定故疑及五見各容四俱疑除勝解不决定故見非慧俱不異慧故專注一境得有定故通伏難也恐有難云貪等麄動何容有定故為通云如戲忘天專注一境起貪瞋癡得有定故疑除勝解見非慧俱等者釋各容四俱之故也六三性相攝門此十煩𢚰何性所攝瞋唯不善損自他故餘九通二上二界者唯無記攝定所伏故若欲界繫分別起者唯不善攝𤼵惡行故若是俱生𤼵惡行者亦不善攝損自他故餘無記攝細不障善非極損𢚰自他處故當知俱生身邉二見唯無記攝不𤼵惡業𨿽數現起不障善故上二界等者釋餘九通二之差別也謂上二界所繫餘九若俱生若分別唯有覆無記性攝以恒為定力之所伏故若欲界繫餘九分別起者唯不善性攝以能𤼵起惡趣行故若俱生通二性攝以𤼵惡行者亦不善攝不𤼵惡者唯無記攝無記攝者是何俱生乃指出云當知俱生身邉二見唯無記攝不𤼵惡業𨿽數現起微細不障善故七界繫現緣門三初明界攝二明現起三明相緣初明界攝此十煩𢚰何界繫耶瞋唯在欲餘通三界二明現起生在下地未離下染上地煩𢚰不現在前要得彼地根本定者彼地煩𢚰容現前故諸有漏道𨿽不能伏分別起惑及細俱生而能伏除俱生麄惑漸次證得上根本定彼但迷事依外門轉散亂麄動正障定故得彼定已彼地分別俱生諸惑皆容現前生在上地下地諸惑分別俱生皆容現起生第四定中有中者由謗解脫生地獄故身在上地將生下時起下潤生俱生愛故而言生上不起下者依多分說或隨轉門明界攝中現起不同也初明下不起上次明上能起下生在下地未離下染上地煩𢚰不現在前者如生欲界未離欲界煩𢚰初禪煩𢚰必不現前乃至無所有非非想皆然也要得彼地根本定彼地煩𢚰容現在前謂離欲界下染得彼初禪根本定乃至離無所有下染得非非想根本定彼上諸地煩𢚰容現前耳諸有漏道等者謂凢夫所修世間味禪曰有漏道以無二空觀智𨿽不能伏分別惑及第七識中俱生細惑然由有厭下苦麄障等心故而能伏除六識中俱生麄惑漸次證得如伏欲麄惑即證得初禪上根本定乃至伏初禪至無所有處麄惑即證得非非想上根本定也彼但迷事麄惑任運而起不障理也依外門轉緣外五塵生也散亂麄動正障定故顯不伏不能以得定也伏此俱生得彼定已彼地分別及細俱生皆容現前正彼地煩𢚰容現前也生在上地下地諸惑分別俱生皆容現起標上能起下也生第四定中有中者由謗解脫生地獄故舉實事以釋上能起下分別也身在上地將下生時起下潤生俱生愛故者釋上能起下俱生也第四定即四禪無想天中有中者謂有外道于欲界中修得無想定自謂得阿羅漢果後生彼天果報既滿將下生時見中有身起便誹謗言世間無有真阿羅漢遂堕地獄如經謂無聞比丘等是也生上不起下等者恐難既上能起下有處言生上不起下果何所謂故通云乃至是依多分說非無少分不起下故是則一九通局界攝之大分固不可以不明上下起否大分之差殊尤不可以不辨三明相緣下地煩𢚰亦緣上地瑜伽等說欲界繫貪求上地生味上定故既說瞋恚憎嫉滅道亦應憎嫉離欲地故總緣諸行執我我所斷常慢者得緣上故餘五緣上其理極成而有處言貪瞋慢等不緣上者依麄相說或依別緣不見世間執他地法為我等故邉見必依身見起故上地煩𢚰亦緣下地說生上者于下有情恃己勝德而陵彼故總緣諸行執我我所斷常愛者得緣下故疑後三見如理應思而說上惑不緣下者彼依多分或別緣說明界攝中相緣不同也初明下惑緣上次通下不緣上三明上惑緣下四通上不緣下初下惑緣上者下地煩𢚰亦緣上地證于瑜伽貪緣上地可知推之憎嫉瞋緣上地可知論于總緣身邉慢三緣上可知貪等五惑既然癡等五惑緣上可例知矣二通下不緣上者而有處言貪瞋慢等不緣上者是依麄相而說或依別緣局于自地而不通則曰不見世間執他地法為我等故是身見不緣上地矣邉見必依身見起不見緣他地法執我斷常故是邉見不緣上地矣作此釋者皆依麄相一徃而說理實貪等得緣上地三明上惑緣下者上地煩𢚰亦緣下地證于上地慢固緣下論于總緣身邉貪三亦得緣下疑後三見可例知矣不言瞋者上無瞋故不及癡者是徧染故四通上不緣下者彼依多分非無少分緣下或別緣說非通緣說也問前言下不現上此言下能緣上者何曰前言現此云緣現則下染可蔽故不能緣則貪等可上故可能也豈得同論問前言總緣諸行後亦總緣諸行義是同否曰謂有外道等總緣三界色心諸行執我我所是同但前言欲界此言上界之不同耳八學等三攝門此十煩𢚰學等何攝非學無學彼唯善故初徴二三原反顯非二所攝謂此煩𢚰非是學位所攝非是無學所攝以彼二位唯善此十是染法故葢反顯此十是非學非無學位所攝也九見等所斷門二初明所斷二明迷諦初明所斷此十煩𢚰何所斷耶非非所斷彼非染故分別起者唯見所斷麄易斷故若俱生者唯修所斷細難斷故初徴二三顯徴云何所斷耶者以非所斷是無漏淨法此十是染故非非所斷也分別起等正顯十是見修所斷唯者意顯不通于修地前已伏入初地已種現俱斷故云易也唯修所斷者意顯不通于見七地猶間現起八地等覺方盡故云難也二明迷諦二初明麄相唯見所斷二明細相通修所斷初明麄相唯見所斷二初總標總別二別釋總別初總標總別見所斷十實俱頓斷以真見道總緣諦故然迷諦相有總有別以真見道總緣諦故者總迷四諦十惑是生豈不總見四諦十惑頓斷然迷諦相有總別者總標總別迷相也二別釋總別二初別釋總迷相二別釋別迷相初別釋總迷相總謂十種皆迷四諦苦集是彼因依處故滅道是彼怖畏處故因依處者集謂煩𢚰種現即彼因處苦謂果報身心即彼依處怖畏處者滅謂斷果道謂道品此二障治苦集敵體相違即彼怖畏處也由此十惑迷四諦理故令有情不能知苦斷集慕滅修道二別釋別迷相二初標釋二正釋初標釋別謂別迷四諦相起二唯迷苦八通迷四即標有釋不止于標曰標釋也二八迷有通局正別迷相二唯迷苦者餘三諦不起身邉故八通迷四者八種煩𢚰皆迷四諦理故二正釋二初釋二唯迷苦二釋八通迷四初釋二唯迷苦身邉二見唯果處起別空非我屬苦諦故果處世間果報處指五蘊也唯果處起獨生于迷苦也別空非我屬苦諦故以觀門原唯迷也謂真見道位中別修空觀及無我觀對治身邉二見此觀唯觀苦諦故知唯迷此也二釋八通迷四三初釋十迷苦諦二釋八通迷三三結迷諦之相初釋十迷苦諦謂疑三見親迷苦理二取執彼三見戒禁及所依蘊為勝能淨于自他見及彼眷屬如次隨應起貪恚慢相應無明與九同迷不共無明親迷苦理釋八通迷四而曰十者以苦諦合兼身邉故也十者疑及身邉邪見此四于苦親迷二取及貪恚慢此五于苦踈迷相應無明獨行無明此二于苦為親踈迷葢不共唯親相應者踈親也親者直于五取蘊苦諦中起踈者轉于迷苦所有諸見等起也大意如此詳之疑三見親迷苦理者如瑜伽云愚夫于此五取蘊中起二十句薩迦耶見即用如是薩迦耶見以為依止于五取蘊見我斷常故邉執見亦迷于苦又諸邪見謂無施等乃至妙行惡行業果及與異熟等如是名為迷苦邪見若有外道于此諸見不定信受亦不一向誹謗如來所立苦諦但于苦諦心懷猶豫此及所餘于苦猶豫是迷苦疑此親迷苦諦之四也二取及貪恚慢者論云若有見取妄取迷苦所有諸見以為第一謂能清淨解脫出離如是名為迷苦見取若有妄取隨順此見隨法所受禁戒以為第一能得清淨解脫出離此戒禁取是迷苦諦若于如是自所起見寳愛堅著如此見貪是迷苦貪若于異分他所起見心懷違損是迷苦恚若恃此見心生高舉是迷苦慢此踈迷苦諦之五也相應無明與九同迷者同踈迷不共無明親迷苦理故云親踈迷也如論云若有無智于此諸見及疑貪等相應若唯于苦獨行無智此二並名迷苦無明此十煩𢚰皆迷苦諦見苦所斷獨即不共義無智即無明無明即癡前四後五與癡曰十也二釋八通迷三疑及邪見親迷集等二取貪等准苦應知然瞋亦能親迷滅道由怖畏彼生憎嫉故初正釋二重釋疑邪二取貪瞋癡慢名八集與滅道名三謂八種煩𢚰皆迷集等三種諦理曰八通迷三也疑及邪見親迷集等二取貪等准苦應知者瑜伽云云何迷集有八隨眠謂諸沙門若婆羅門謗因邪見或計自在等是一物生者化者及與作者此惡因論所有邪見等是迷集諦所有邪見若有見取取彼諸見以為第一能得清淨解脫出離是迷集諦所起見取若于隨順此見諸法所受禁戒以為第一能得清淨廣說如前是迷集諦戒禁取餘疑貪等如前應知如是八種隨眠迷于集諦見集所斷云何迷滅有八隨眠謂諸沙門若婆羅門計邉無邉不矯亂諸見一分乃至無世間真阿羅漢所有斷德誹謗滅諦等如是諸見是迷滅諦所起邪見若有見取取彼諸見以為第一廣說如前是迷滅諦所起見取若于隨順彼見諸法所受戒禁取為第一廣說如前是迷滅諦戒禁取所餘貪等如前應知如是八種煩𢚰隨眠迷于滅諦見諦所斷云何迷道有八隨眠謂無世間真阿羅漢乃至廣說此中所有一切誹謗一切智為首有為無漏當知此見是迷道諦所起邪見又諸外道謗道邪見彼謂沙門喬答摩種為諸弟子說出離道實非出離由此不能盡出離苦佛所施設無我之見及所受持戒禁隨法是惡邪道非正妙道如是亦名迷道邪見又彼外道作如是計我等所行若行若道是真行道能盡出離一切諸苦如是亦名迷道邪見若有見取取彼邪見以為第一能得清淨解脫出離如是名為迷道見取若于隨順彼見諸法所受戒禁取為第一能得清淨解脫出離是名迷道戒禁取所餘貪等迷道煩𢚰如迷滅諦道理應知如是八種煩𢚰隨眠迷于道諦見道所斷然瞋亦能親迷等者重釋瞋亦親迷滅道也如論云謂于迷諦起怖畏心起損害心起恚𢚰心如是瞋恚迷于滅諦迷道可知矣是則若據十種總迷四諦則欲界有四十品隨眠上二界每諦除瞋二界共有七十二品隨眠合之三界共一百一十二品若據十種別迷四諦十迷苦諦為十八通迷三為二十四則欲界四諦有三十四品隨眠上二除瞋共有六十品隨眠三界合之共有九十四品經云八十八使見所斷者于此無異三結迷諦之相迷諦親踈麄相如是二明細相通修所斷委細說者貪瞋慢三見疑俱生隨應如彼俱生二見及彼相應愛慢無明𨿽迷苦諦細難斷故修道方斷瞋餘愛等迷別事生不違諦觀故修所斷貪瞋慢三見疑俱生隨應如彼者俱生即相應義謂分別之貪瞋慢三邪見二取相應起者隨應如彼見道所斷也俱生二見及彼相應等者謂俱生身邉二見及此二見相應愛慢無明此五𨿽迷苦諦細故難斷修道方斷也瞋餘愛等者謂復有迷別事生瞋及餘愛此與諦觀不相違故亦修所斷是則如上所說欲界所斷俱生有六謂身邉愛慢癡與瞋也上二除瞋有十三界合之乃有十六即教所謂八十一品思惑是也十隨境立名門三初有事無事境二有漏無漏境三自地他地境初有事無事境𨿽諸煩𢚰皆有相分而所仗質或有或無名緣有事無事煩𢚰相分即識上變起之相如能貪為見分所貪為相分曰皆有相分者如自心內蘊一切皆有也而所仗質或有或無者謂本質不定如自心外蘊或有或無也以諸煩𢚰若緣現境則所仗質或有名緣有事煩𢚰若緣過未及空華等則所仗質或無名緣無事煩𢚰有無曰或不定于一之謂後言或者倣此二有漏無漏境彼親所緣𨿽皆有漏而所仗質亦通無漏名緣有漏無漏煩𢚰彼親所緣皆有漏者能變之心唯是有漏故也而所仗質亦通無漏者如緣道滅二諦屬無漏故三自地他地境緣自地者相分似質名緣分別所起事境緣滅道諦及他地者相分與質不相似故名緣分別所起名境自地謂自所居地相質相似者皆有體故名為事境他地兼上下如上地緣下地下地緣上不相似故者相是獨頭起無質可似故以其未曾修證及與見聞名為名境但有名字而無質故然境有二十文具顯此但有六上釋正明中十門竟二結示餘門分別如理應思餘門等者例顯未盡以此但有六種如顯則境有二十云云也已上釋第三根惑位竟四隨惑位二初本論二論釋初本論已說根本六煩𢚰相諸隨煩𢚰其相云何頌曰隨煩𢚰謂忿恨覆𢚰嫉慳誑諂與害憍無慚及無愧掉舉與惽沉不信并懈怠放逸及失念散亂不正知二論釋二初正釋頌文二餘門分別初正釋頌文三初釋名二釋類三釋相初釋名論曰唯是煩𢚰分位差別等流性故名隨煩𢚰分位差別如二十中忿等十及失念不正知放逸等自無有體乃于根本煩𢚰分位別立等流性者如二十中無慚無愧及掉舉五法𨿽別有體即前煩𢚰品類等流謂平等流類也皆由煩𢚰為因而得生故名隨煩𢚰二釋類此二十種類別有三謂忿等十各別起故名小隨煩𢚰無慚等二徧不善故名中隨煩𢚰掉舉等八徧染心故名大隨煩𢚰類別有三謂小中大各別起故徧不善故徧染心故出小中大之故也大約自類俱起徧染二性徧諸染心此三皆具名大具一名中俱無名小二性者不善性有覆性也各別起故闕自類俱起唯是不善闕徧染二性既闕有覆不徧一切染心三義俱無名小中二自類俱起具一名中掉舉等自類俱起於染皆徧既徧染心即具徧染二性三義皆具名大又各別起者唯于不善中自性猛利各自為主若一起時必無第二是謂自類不俱徧不善者通于一切不善心起也自類必俱可知不通有覆可知徧染心者通于一切染汙心起自類必俱徧染二性自具又二十種同為煩𢚰品類而忿等非不共他中大惑俱行位劣故名為小無慚無愧亦通忿等唯徧不善位局于後八故名為中後八三義皆具勝故名大耳三釋相二初釋二十種二釋與并及初釋二十種三初小隨二中隨三大隨初小隨十初釋忿至十釋憍初釋忿云何為忿依對現前不饒益境憤𤼵為性能障不忿執仗為業謂懷忿者多𤼵𭧂惡身表業故此即瞋恚一分為體離瞋無別忿相用故初正釋體用二轉釋體用三假釋體用依現違境者見忿所自起身表業者即執仗諍鬬不善表業離瞋無別相用反顯必以瞋為體用也如瑜伽云若瞋恚繮能令面貌𢡖烈奮𤼵若煩𢚰繮能令執持仗鬬訟違諍等是也二釋恨云何為恨由忿為先懷惡不捨結為性能障不恨𤍠𢚰為業謂結恨者不能含忍恒𤍠𢚰故此亦瞋恚一分為體離瞋無別恨相用故初正釋二轉釋三顯假由忿為先恨所自始也纏縛于心而不放釋曰結燥悶于懷而不清涼曰𤍠𢚰不能含忍而恒𤍠𢚰用全依體也三釋覆云何為覆于自作罪恐失利譽隱蔵為性能障不覆悔𢚰為業謂覆罪者後必悔𢚰不安隱故有義此覆癡一分攝論唯說此癡一分故不懼當苦覆自罪故有義此覆貪癡一分攝亦恐失利譽覆自罪故論據麄顯唯說癡分如說掉舉是貪分故然說掉舉徧諸染心不可執為唯是貪分初釋體用有正轉二釋分位唯癡分三釋分位具貪癡四通論意例貪癡以恐失利譽而覆者屬貪一分不懼當苦而覆者屬癡一分故然通論意之唯據麄相例掉舉以徧諸染心至理皎然後釋貪癡俱分為是四釋𢚰云何為𢚰忿恨為先追觸𭧂𤍠狠戾為性能障不𢚰䖧螫為業謂追徃惡觸現違緣心便狠戾多𤼵囂𭧂凶鄙麄言䖧螫他故此亦瞋恚一分為體離瞋無別恼相用故初正釋二轉釋三顯假為先忿恨為𢚰之先導也狠戾者兇狠乖戾囂喧囂𭧂卒𭧂凶鄙麄言曰蛆螫他者象之也蛆蝍蛆即蜈蚣螫奮毒以傷人也五釋嫉云何為嫉殉自名利不耐他榮妬忌為性能障不嫉憂慼為業謂嫉妬者聞見他榮深懷憂慼不安隱故此亦瞋恚一分為體離瞋無別嫉相用故三𫨻如前殉以身從物不離之謂以直欲己榮故不耐他榮以不耐他榮故常懷憂慼耳獨不念見他勝進其心歡喜善用其心最勝最妙之報乎噫嫉可空矣六釋慳云何為慳躭著財法不能惠捨秘悋為性能障不慳鄙畜為業謂慳悋者心多鄙澀畜積財法不能捨故此即貪愛一分為體離貪無別慳相用故三叚仍前躭謂沉𭰫著謂黏著慳財者固不足論慳法者果謂之真有法也耶七釋誑云何為誑為獲利譽矯現有德詭詐為性能障不誑邪命為業謂矯誑者心懷異謀多現不實邪命事故此即貪癡一分為體離二無別誑相用故三叚如前誑誑妄本無德而現有德曰矯矯現有五邪命有四四謂下仰方維如常所說五者一矯異二自親三激動四抑五因求無德而矯現異儀如頭陀非戚而矯現親密如骨肉不是施物激動其施心時抑時因利覓利此皆以邪法活命而非淨命自育者也貪癡一分者為于利養而矯現故屬貪昧于諦理而矯現故屬癡離二無別相用誑必相用于貪癡也八釋諂云何為諂為罔他故矯設異儀險曲為性能障不諂教誨為業謂諂曲者為罔冒他曲順時宜矯設方便為取他意或蔵己失不任師友正教誨故此亦貪癡一分為體離二無別諂相用故三𫨻如前諂䛕諂罔欺罔險隂惡曲邪曲為罔冒他者欺其不知隂惡陽善曲順時宜矯設方便務以悅人而逢迎之也不任正教誨者違聖經直心道塲逆善友正法開示故貪一分攝者為名利故癡一分攝者昧諦理故九釋害云何為害于諸有情心無悲愍損𢚰為性能障不害逼𢚰為業謂有害者逼𢚰他故此亦瞋恚一分為體離瞋無別害相用故瞋害別相准善應說正釋轉釋顯假如文可知瞋害別相准善應說者彼謂無瞋對斷物命瞋不害正違損𢚰物害瞋障大慈無瞋與樂害障大悲不害苦故也十釋憍云何為憍于自盛事深生染著醉傲為性能障不憍染依為業謂憍醉者生長一切雜染法故此亦貪愛一分為體離貪無別憍相用故三𫨻如文于自盛事者依瑜伽七種謂無病少年族姓色力富貴以及于多聞也沉溺此等盛事以之陵人傲物如醉人為酒所役曰醉傲為性生長一切雜染則憍為起染之依滿招損謙受益人固何讐于謙日與之逺何親于憍而日與之近耶二中隨二初正釋二通簡初正釋二初釋無慚二釋無愧初釋無慚云何無慚不顧自法輕拒賢善為性能障礙慚生長惡行為業謂于自法無所顧者輕拒賢善不耻過惡障慚生長諸惡行故自自己法自所治業不顧者無所顧忌也賢謂有功德人善謂戒定等諸功德輕即不重拒即不崇于賢人不敬重于善法不崇尚不耻過惡障慚而過惡愈生用固其宜矣二釋無愧云何無愧不顧世間崇重𭧂惡為性能障礙愧生長惡行為業謂于世間無所顧者崇重𭧂惡不耻過罪障愧生長諸惡行故對上無慚釋愧所可知二通簡不耻過惡是二通相故諸聖教假說為體若執不耻為二別相則應此二體無差別由斯二法應不俱生非受想等有此義故若待自他立二別者應非實有便違聖教若許此二實而別起復違論說俱徧惡心不善心時隨緣何境皆有輕拒善及崇重惡義故此二法俱徧惡心所緣不異無別起失然諸聖教說不顧自他者自法名自世間名他或即此中拒善崇惡于己損益名自他故而論說為貪等分者是彼等流非即彼性此簡明不耻過惡為慚愧之通相而非別也初設難二顯體三通妨其義如前慚愧中已釋對之可知三大隨八初釋掉舉至八不正知初釋掉舉二初釋體用二明分位初釋體用云何掉舉令心于境不寂靜為性能障行捨奢摩他為業行捨令心靜住此令于境不寂靜故障之也奢摩他此云止亦云冺相澄神今令心于境動故亦障之也二明分位三初第一師二第二師三第三師初第一師有義掉舉貪一分攝論唯說此是貪分故此由憶昔樂事生故初釋唯貪分攝二證唯貪分位三原唯貪分位二第二師有義掉舉非唯貪攝論說掉舉徧染心故又掉舉相謂不寂靜說是煩𢚰共相攝故掉舉離此無別相故𨿽依一切煩𢚰假立而貪位增說為貪分此師不說分位非貪但非初師唯貪攝耳證于論之徧染則瞋癡等之皆具豈是唯貪分耶更申己解是共相攝謂掉舉以不寂靜為體不寂靜是煩𢚰共相以諸煩𢚰皆有不寂靜義掉舉離此不寂靜無別相故故知掉舉是煩𢚰共相然恐難云既是共相何說為貪通云而貪位增說為貪分此師之解𨿽是而執離此不寂靜無別相故則有未盡其義于不寂靜者下自可知三第三師有義掉舉別有自性徧諸染心如不信等非說他分體便非實勿不信等亦假有故而論說為世俗有者如睡眠等隨他相說掉舉別相謂即囂動令俱生法不寂靜故若離煩𢚰無別此相不應別說障奢摩他故不寂靜非此別相初量明別體二破初師非三正中體相四破次師非量明別體者謂掉舉是有法別有自性為宗因云徧諸染心故喻如不信等不信徧染心不信別有體掉舉徧染心豈不別有性破初師非者以初師引論唯貪分則掉舉自無實體矣故破云非說他分體便非實勿不信等亦假有故恐難論說掉舉是世俗假有今有自性即實矣豈不違彼論說假有耶故通云論說世俗有者是隨他貪相說例如睡眠𨿽實有體隨他無明相說論亦言世俗有耳何違之有耶三正申體相者掉舉別相即囂動令俱生心心所等不寂靜故四破次師非曰若離煩𢚰無別此相者不應別說障奢摩他故不寂靜非此別相牒執正破而結其非也意顯不應以共而為此別別是囂動二釋惽沉二初釋體用二明分位初釋體用云何惽沉令心于境無堪任為性能障輕安毘鉢舎那為業無堪任者惽沉現前令心無所堪能無所負任不能明了色等境故障輕安者輕安逺離麄重有勝堪能此正麄重故障之障毘鉢舎那者毘鉢舎那此云觀亦云起幻消塵能于諸境明了緣生此則令心無所堪任故亦障之總之惽沉者不惟不得輕安亦且不能入觀二明分位三初一解二二解三三解初一解有義惽沉癡一分攝論唯說此是癡分故惽昧沉重是癡相故二二解有義惽沉非但癡攝謂無堪任是惽沉相一切煩𢚰皆無堪任離此無別惽沉相故𨿽依一切煩𢚰假立而癡相增但說癡分煩𢚰非但癡攝破初解也謂無堪任是惽沉相申己釋也一切煩𢚰皆無堪任離此無別惽沉相故原已釋也𨿽依一切煩𢚰假立而癡相增但說癡分通妨難也此師之解𨿽是曰離此無別惽沉相故則有未盡其義于無堪任者下自顯之三三解有義惽沉別有自性𨿽名癡分而是等流如不信等非即癡攝隨他相說名世俗有如睡眠等是實有性惽沉別相謂即懵重令俱生法無堪任故若離煩𢚰無別惽沉相不應別說障毘鉢舎那故無堪任非此別相此與癡相有差別者謂癡于境迷闇為相正障無癡而非懵重惽沉于境懵重為相正障輕安而非迷闇初量明別性量云惽沉非即癡別有自性故喻如不信等次釋通妨難恐難云既別有性何論說為世俗有耶故通云彼論隨他相說名世俗有例如睡眠實有性以隨他相說亦名假有比之可知三正申別相別相謂即懵重以惽懵沉重令俱生心心所法無所堪任故名惽沉耳四破次解非者以次解云一切煩𢚰皆無堪任離此無別惽沉相故破云若離煩𢚰無別惽沉相者不應別說障毘鉢舎那既別障觀必有別體不應以共為別故無堪任非此別相五顯二相別者由前義說惽沉即癡此顯差別正破前執也癡以迷闇為相正障無癡而非懵重惽沉以懵重為相正障輕安而非迷闇此懵重之別于癡相者也惽沉既有別相何謂離此而無別耶量之別有自性通之妨無所妨惽沉既以懵重為相次師之解自非癡與懵重既別別有自相無疑矣問既以懵重為相前正釋以無堪任者非耶曰謂即懵重令俱生法無堪任故是于全懵重之處明無堪任耳思之三釋不信云何不信于實德能不忍樂欲心穢為性能障淨信堕依為業謂不信者多懈怠故不信三相信應知然諸染法各有別相唯此不信自相渾濁復能渾濁餘心心所如極穢物自穢穢他是故說此心穢為性由不信故于實德能不忍樂欲非別有性若于餘事邪忍樂欲是此因果非此自性初正釋體用次轉釋體用三簡非體用正轉二釋可知簡非者由不信故于實德能不忍樂欲非別有性者簡不忍樂欲非不信體也若于餘事邪忍樂欲是此因果非此自性者簡邪欲勝解非不信體也一一上信所可知四釋懈怠二初正釋二簡異初正釋云何懈怠于善惡品修斷事中懶堕為性能障精進增染為業謂懈怠者滋長染故懶堕于善不勤修于惡不勤斷也滋長懈怠滋潤染法使增勝故二簡異于諸染事而策勤者亦名懈怠退善法故于無記事而策勤者于諸善品無進退故是欲勝解非別有性如于無記忍可樂欲非淨非染無信不信恐疑于諸名利等策勤不息者將非不懈怠耶故曰于諸染事而策勤亦名懈怠以退善法故則于諸善法策勤不名懈怠可知無記有四曰威儀工巧變化異熟于此等事策勵勤行善固不進亦無所退是欲勝解所攝非別有性例之如于無記忍可樂欲是欲勝解非淨故無信非染故無不信五釋放逸二初正釋體用二分位通妨初正釋體用云何放逸于染淨品不能防修縱蕩為性障不放逸增惡損善所依為業不能防修等者放逸之力于染不能防于淨不能修恣縱流蕩而為體也染依此增善依此損增損是能依放逸為所依也二分位通妨謂由懈怠及貪瞋癡不能防修染淨品法總名放逸非別有體𨿽慢疑等亦有此能而方彼四𫝑用微劣障三善根徧策法故推究此相如不放逸初分位二通妨三比例分位者離貪等四法無有別體也通妨者恐難慢疑等亦有不防修之能何不依之而立故通云𨿽慢疑等亦有此能而方彼四𫝑用微劣于貪等之障三善根精進之徧策法故也若更詳之推究此相如不放逸反顯之而相愈明也六釋失念二初正釋二分位初正釋云何失念于諸所緣不能明記為性能障正念散亂所依為業謂失念者心散亂故二分位有義失念念一分攝說是煩𢚰相應念故有義失念癡一分攝瑜伽說此是癡分故癡令念失故名失念有義失念俱一分攝由前二文影畧說故論復說此徧染心故初念二癡三俱俱者為正由前二文影畧者謂說念影畧于癡其癡自在說癡影畧于念而念自存且論說失念徧諸染心則唯癡唯念其何能徧以唯念則獨于曾習非諸染心皆有曾習唯癡可例知矣故必二俱為正問癡徧染心何謂不徧曰癡不徧癡又與癡俱煩𢚰亦不徧故七釋散亂二初體用二分位初體用云何散亂于諸所緣令心流蕩為性能障正定惡慧所依為業謂散亂者𤼵惡慧故流蕩放曠不收斂義謂流而忘返蕩而不息能障正定邪惡簡擇依此而𤼵生也散亂多種約之有六謂作意心散亂外心散亂內心散亂相心散亂麄重心散亂自性心散亂作意心散亂者謂諸菩棄捨大乘相應作意退習聲聞獨覺相應下劣作意外心散亂者謂正修善時于外妙五欲及憒閙相思隨煩𢚰等內心散亂者謂正修善時或由惽沉睡眠下劣或由味著諸定或由定中種種隨煩𢚰故𢚰亂其心相心散亂者謂依止外相作意思惟內境相貌麄重心散亂者謂內作意為緣生起諸受由麄重身故計我我所自性心散亂者謂五識身由彼自性于內靜定無功德故詳如集論二分位三初初解二次解三後解初初解有義散亂癡一分攝瑜伽說此是癡分故二次解有義散亂貪瞋癡攝集論等說是三分故說癡分者徧染心故謂貪瞋癡令心流蕩勝餘法故說為散亂初標立次引證三通妨四解釋標立者先立義以標定云散亂貪瞋癡攝證于集論之說可知然說散亂獨是癡分者果何所謂以癡徧染心故此說必三分攝者果何所謂謂貪瞋癡令心流蕩勝餘法故初師之解固錯此師之解亦非至下自顯三後解有義散亂別有自體說三分者是彼等流如無慚等非即彼攝隨他相說名世俗有散亂別相謂即躁擾令俱生法皆流蕩故若離彼三無別自體不應別說障三摩地掉舉散亂二用何別彼令易解此令易緣𨿽一剎那解緣無易而于相續有易義故染汙心時由掉亂力常應念念易解易緣或由念等力所制伏如繫猿猴有暫時住故掉與亂俱徧染心初量顯有體次正申自體三斥破前非四問答別義五問答徧染量顯有體者量云散亂是有法別有自體非貪等攝為宗因云說三分者是彼等流非分位故喻如無慚等然恐難云說三分者果何說耶故通云隨他相說名世俗有非是實有正申自體者散亂別相謂即躁擾令俱生法皆流蕩故斥破前非者前執散亂是三分攝離三無別自體破云若離彼三無別自體不應別說障三摩地以既別障定非三共相也明矣問答別義者問云意謂掉相囂動散亂躁擾相既有別作用何所別耶答云彼掉舉令心念念轉其能知之心而易解此散亂令心時時更其所緣之境而易緣是用別也然恐難云一剎那心當生即滅無容從此轉至餘方豈有易解易緣之義而曰有別用耶故為通云𨿽一剎那解緣無易而于纔合即解纔解即緣解緣相續有易義故用有別也問答徧染者問云染汙心時由掉亂力常應念念易解易緣方顯此二徧諸染心或有染心不易之時此應不徧耶故釋云或由念等力所制伏如繫猿猴有暫時住義理實常應念念易解易緣俱徧染心也已上欲其逐節分明故致解釋似𤨏碎耳若夫脈絡大意使㫖瞭然則散亂別有自體自體即是躁擾躁擾別能障定豈得離三無別自體耶是則散亂以躁擾為體既別掉舉囂動之相則散亂易緣之用自別掉舉易解之用矣而染汙心時由此掉舉之力常應念念易解易緣或由念等制伏如繫猿猴暫住而已豈能久耶故掉與亂俱徧染心也亦可念等即念定若第七相應掉亂制伏者是第六俱正念正定若前六掉亂而能制者即前六邪念邪定此中意指後義是以結云俱徧染心故又易解乃以境從心易緣是以心從境耳解緣無易正剎那無二相續有易正剎那用別相續者解緣脈脈易自綿綿于脈脈耳微乎淵哉澄神靜慮研之可見問躁擾為別相流蕩者非耶曰全躁擾于流蕩流蕩之躁擾耳八不正知二初釋體用二明分位初釋體用云何不正知于所觀境謬解為性能障正知毀犯為業謂不正知者多所毀犯故非無知知不正耳故于所觀無常苦空等義非無解解邪謬耳邪謬能障善品真正知解毀犯身口意三而為業用多所毀犯謂亦有僥倖不毀犯者對少曰多又業管于解解謬而所作之業益謬曰多如言欲非殺非偷之類是也二明分位有義不正知慧一分攝說是煩𢚰相應慧故有義不正知癡一分攝瑜伽說此是癡分故令知不正名不正知有義不正知俱一分攝由前二文影畧說故論復說此徧染心故初慧攝二癡攝三俱攝俱攝為正俱一分攝者由前二文影畧說故慧影畧于癡癡影畧于慧則二必俱可知又由論說此徧染心故既徧染心此二必俱以二俱能徧染故上初釋二十種竟二釋并與及與并及言顯隨煩𢚰非唯二十雜事等說貪等多種隨煩𢚰故隨煩𢚰名亦攝煩𢚰是前煩𢚰等流性故煩𢚰同類餘染汙法但名隨煩𢚰非煩𢚰攝故唯說二十隨煩𢚰者謂非煩𢚰唯染麄故此餘染法或此分位或此等流皆此所攝隨其類別如理應知顯攝義原與并及言之所該也初牒證所該次原釋該義然綂括正㫖與并及言一徃觀之不過二十隨煩𢚰中貫華偈之𦔳語辭耳似無該及之義而論云顯隨煩𢚰非唯二十者固有雜集論事之可證豈無㫖趣之可原乎故云亦攝煩𢚰非煩𢚰攝皆此所攝等也意以隨煩𢚰名亦攝煩𢚰二十隨惑不離于六種之根本此餘染法皆此所攝諸餘染法不離二十之隨惑分位等流既攝屬而不離并與及言自該收而不失葢曠觀源流精研差別自當得意于言外非強為增益也大意如此詳之則多種隨煩𢚰者瑜伽論云若雜事中世尊所說諸隨煩𢚰廣說乃至愁嘆憂苦隨擾𢚰等又云伺惡作睡眠此四隨煩𢚰通善不善無記心起若有極久求伺察便令身疲念失心亦勞損是故伺名隨煩𢚰等此即多種隨煩𢚰也隨煩𢚰名隨根本之二十隨煩𢚰名也但名隨煩𢚰隨二十外之餘染汙法但名隨煩𢚰也亦煩𢚰攝煩𢚰指根本是前煩𢚰等流性故原亦攝之故也不言分位者義自具故非煩𢚰攝煩𢚰亦指根本非攝故者原但名隨煩𢚰之故也謂非煩𢚰唯染麄者謂伺等亦通善淨非如二十之唯染亦通細非如二十之唯麄此餘染法者二十之外餘愁嘆等也或此二十之差別分位無自體故或此二十之等流同類有自體故𨿽不定于一而皆此二十隨煩𢚰之所攝也類別不易知隨其類別而如理知之則似置差別于權度耳何難乎其輕重長短也耶上論釋隨惑初正釋頌文竟二餘門分別十二初假實差別門至十二隨境立名門初假實差別門如是二十隨煩𢚰中小十大三定是假有無慚無愧不信懈怠定是實有教理成故掉舉惽沉散亂三種有義是假有義是實所引理教如前應知自此而下皆異門分攝使精研差別無所濫也今先假實一定是假有謂小十放逸失念不正知之大三也以依根本分位立故二定是實有謂中二大二三雙通假實謂獨是大三大約假者自無其體是前貪瞋等分位立故實者自有實體是前等流性故既有教理如前應知故不更釋然通假實者如前或貪分癡分徧染者是假囂動懵重躁擾為體者是實也二俱生分別門二十皆通俱生分別隨二煩𢚰𫝑力起故隨二𫝑力起者謂隨俱生分別二煩𢚰𫝑力起也隨俱生起謂之俱生隨分別起即名分別既通二起故皆通二三自類相應門此二十中小十展轉定不俱起互相違故行相麄猛各為主故中二一切不善心俱隨應皆得小大俱起論說大八徧諸染心展轉小中皆容俱起有處說六徧染心者惽掉增時不俱起故有處但說五徧染者以惽掉等違唯善故初釋自類相應次通諸論殊說小十展轉定不俱起者一起二决不起所以然者互相違故行相麄而且猛各為主故故不俱起也中二一切不善心俱小大隨中皆得俱起曰隨應者以不徧有覆故大八于小隨中隨展轉皆容俱起以論說大八徧諸染心故也然恐難云瑜伽說六徧染心者何耶通云以惽沉增時不容掉起掉舉增時不容惽起既除此二故止言六又恐難云集論但說五徧染者何耶通云以惽掉不信懈怠放逸解通二性違唯善法除散亂失念不正知三故止言五耳是則時多時寡義各有取不必疑也四諸識俱起門此唯染故非第八俱第七識中唯有大八取捨差別如上應知第六識俱容有一切小十麄猛五識中無中大相通五識容有第八無覆無記此唯染故非第八俱第七有覆無記故唯八俱曰取捨差別如上應知者近之即六徧五徧如上所言逺之則四卷之末諸師所辯也六識于小中大三一切容俱五識則唯有大中而無小十曰相通者中大自類俱起不同小隨自類不俱前五是自類俱起故亦容有五諸受相應門由斯中大五受相應有義小十除三忿等唯喜憂捨三受相應諂誑憍三四俱除苦有義忿等四俱除樂諂誑憍三五受俱起意有苦受前已說故此受俱相如煩𢚰說實義如是若隨麄相忿恨𢚰嫉害憂捨俱覆慳喜捨餘三增樂中大隨麄亦如實義于小中大三據實論諸受之相應也初明實義次約麄顯承上而斷其相應之受曰由斯中大二隨是五受相應也然則小十果何受耶此有二解初解云小十除諂誑憍三忿等七種唯憂喜捨三受相應諂誑憍三四受相應而除苦受次解云忿等小七四受相應而除樂視初解增苦受矣諂誑憍三五受俱起視初解亦增苦受矣其意以為第六意識有苦受前已說故𨿽其次愈于前而總之皆未盡也若盡此受俱相必合于真實之義而後可何則由前云貪瞋癡三俱生分別一切容與五受相應此中忿等小七即前瞋等分位彼既五俱此亦應爾故云此小受相例前煩𢚰所說實義如是故知二十皆通五受義方盡耳然但取麄顯之相而說則小相者忿恨𢚰嫉害是根本瞋一分攝與憂捨相應覆慳是根本貪癡一分所攝與喜捨相應諂誑憍三亦貪癡一分所攝喜樂捨三相應若夫中大二隨隨麄相而說俱受者則亦如前實義必具五受問既云此受俱相如煩𢚰說實義如是則小隨必俱五受又約麄相說者何也曰因前二師或三或七受多受少其解不同故即約麄相以顯亦可如是說耳非取必于此也實則小隨必俱五受如前所說六別境俱起門如是二十與別境五皆容俱起不相違故染念染慧𨿽非念慧俱而癡分者亦得相應故念亦緣現曾習類境忿亦得緣剎那過去故忿與念亦得相應染定起時心亦躁擾故亂與定相應無失明二十與別境相應也初正明俱起次難問𤼵明不相違故正皆容俱起也然恐難云既忿等二十與別境五所皆容俱起敢問二十中失念是染念不正知是染慧此二念慧一分所攝豈有念慧復與念慧俱耶故釋云此二癡分攝者得與念慧俱故又恐難云念緣曾習境忿緣現前境所緣不同寧得俱耶故釋云念亦緣現曾習類境退念于後矣忿亦得緣剎那過去境進忿于前矣類者謂有現境類似曾習境故更恐難云定亂相違何容俱起故釋云染定起時心亦躁擾故亂與定相應無失七根本相應門中二大八十煩𢚰俱小十定非見疑俱起此相麄動彼細故忿等五法容慢癡俱非貪恚並是瞋分故慳癡慢俱非貪瞋並是貪分故憍唯癡俱與慢解別是貪分故覆誑與諂貪癡慢俱行相無違貪癡分故明根隨相應門也中二大八十煩𢚰俱者中隨二大隨八與十根本相應也小十定非見疑俱起者以小隨麄動見疑細故也忿恨𢚰與嫉害五法容與癡慢俱者以所蔑所憎境可同故癡徧染故非貪瞋並是瞋分者愛憎二境必不同故瞋更不與瞋同起故慳與癡慢容俱起者是貪分故癡徧染故所染所恃境可同故非貪瞋並者貪非貪俱故愛憎境別故憍唯癡俱者不與瞋貪慢俱也不與慢俱者貪下慢高故也是貪分故不與貪瞋並故也誑覆與諂貪癡慢俱者良以行相無違是貪癡分故此三癡分攝者不與貪慢違貪分攝者不與癡違不類憍唯貪分與彼慢解別也八三性相攝門小七中二唯不善攝小三大八亦通無記忿等七小及中隨二唯不善性所攝諂誑憍三與大隨八不惟不善亦通無記所攝九界攝現緣門小七中二唯欲界攝誑諂欲色餘通三界生在下地容起上十一躭定與他起憍誑諂故若生上地起下後十邪見愛俱容起彼故小十生上無由起下非正潤生及謗滅故中二大八下亦緣上上緣貪等相應起故有義小十下不緣上行相麄近不逺取故有義嫉等亦得緣上于勝地法生嫉等故大八諂誑上亦緣下下緣慢等相應起故梵于釋子起諂誑故憍不緣下非所恃故初判界攝二明現起三明相緣先判界攝者小隨七種中隨二種唯欲界有以上二界無瞋則無忿恨與𢚰嫉害行四無量則無慳行十善法故無覆也誑諂二種唯欲色二界不通無色餘小隨憍及大隨八皆通三界現起者生在下地容起上惑十一種謂憍誑諂及大八也躭定于他起憍誑諂者謂如離生喜樂地等異生得初靜慮等自謂淨妙深生躭著故于上地有情而起憍等此即下地起上小三而大八徧染之義可知若生上地起下後十者謂中二大八是也以邪見愛俱容起彼故邪見俱者謂生于第四定中有中謗解脫容與後十而俱起故愛俱者身在上地將生下時起下潤生俱生愛者容與後十相應起故小十生上無由起下者此非正潤生及正謗滅故正潤謂俱生愛謗滅謂邪見也相緣者中二大八下惑亦緣于上以上緣貪等相應起故上緣貪者如前云求上地生味上定者即上緣貪大八徧染容與此貪相應起故等者等于瞋等前云既說瞋恚憎嫉滅道亦應憎嫉離欲地者即上緣瞋中大二隨容與此瞋相應起故小十相緣其解不同一解云下不緣上一解云亦得緣上或緣不緣二說兼備為是若夫上地緣下則大八諂誑上亦緣下以下緣慢等相應起故謂如前云說生上者于下有情恃己勝德而陵彼者得與大八相應起故上之梵天于下釋子起諂誑故至于憍之一法即不緣下以下地法非上地有情所恃自盛事故問慢得緣下憍何不緣曰慢兼所陵故得緣下憍但所恃故不緣也問梵王諂誑云何曰如成實論謂梵王謂比丘言我亦不知四大何處無餘滅盡等又梵王于自眾中匿己情事現相誑惑馬勝比丘等是也十學等三攝門二十皆非學無學攝此但是染彼唯淨故非學無學意顯唯是非二位攝此但是染彼唯淨故敵體相違故皆非攝十一見斷等攝門後十唯通見修所斷與二煩𢚰相應起故見所斷者隨迷諦相或總或別煩𢚰俱生故隨所應皆通四部迷諦親踈等皆如煩𢚰說前十有義唯修所斷緣麄事境任運生故有義亦通見修所斷依二煩𢚰𫝑力起故緣他見等生忿等故見所斷者隨所應緣總別惑力皆通四部此中有義忿等但緣迷諦惑生非親迷諦行相麄淺不深取故有義嫉等亦親迷諦于滅道等生嫉等故初釋後十惑次釋前十惑後十者中二大八唯通見修所斷不通非非所斷所以然者以此十種與根本俱生分別二煩𢚰相應起故意以與俱生相應起者是修所斷與分別相應起者是見所斷也修所斷者且置見所斷者其說如何此後十惑若與總迷四諦煩𢚰相應起者則總迷四諦若與別迷四諦煩𢚰或親或踈相應起者則別親踈迷于四諦故曰隨應如煩𢚰說四部即四諦謂部分也見所斷者之說如此修所斷者其說可例推矣前十謂十小隨此有二解一云唯修所斷以緣麄事境任運生故故唯修也二云亦通見所斷以依俱生分別二煩𢚰𫝑力起故故通二斷又緣他身見邉見等生忿等故故不止于修斷也見所斷惑隨所應緣總別惑力皆通四部者如上後十隨煩𢚰說此中有義忿等但緣等者釋迷諦親踈其解有二一云唯踈一云嫉等亦親踈親𨿽各有致亦親亦踈俱為正十二隨境立名門然忿等十但緣有事要託本質方得生故緣有漏等准上應知但緣有事者但名緣有事煩𢚰也所以然者以要仗託本質方得生起故然彼親所緣緣𨿽皆有漏而所仗質或通無漏故曰緣有漏等准上應知者准前根本煩𢚰中隨事立名而有諸有漏無漏之不同分別事境名境之不一多門多義此亦應爾故曰准上贒預信官廣霦翁汝進捐資刻成唯識論訂正第六前半卷祈保先考妣誥封中憲大夫知府鑑塘公張恭人及祖高曾祖考妣轉識成智證正覺者信官廣霦翁汝進以元配誥封王恭人遺飾刻成唯識論訂正第六後半卷祈保轉識成智證正覺者崇禎歲次壬申孟夏八日佛誕日謹識姑蘇信女張門李氏大緣𦔳板
