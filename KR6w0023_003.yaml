前過及有此失故唯異熟法是正實趣生承上簡非趣生而明正實趣生也初順立趣生次反釋趣生意謂非異熟法諸異熟色等皆非實有恆遍無雜不可立為趣生矣何法具此四種是正趣生耶故順立云唯異熟心及彼心所實遍恆純四法皆具是正實趣生也反立者三界總是趣生趣生不離此心此心若無生無色界色與五識皆無意識或起善及無記而以無異熟持種不復執藏為自內我應非趣生耶恐彼救云無色異生未斷惑故所起善等是有漏攝猶名趣生故縱云設許趣生攝諸有漏那含聖等生無色界已斷惑故所起善等或是無漏應非趣生耶許非趣生便違有界必有趣生之正理矣如之何故欲免起善等非趣生之過及無漏非趣生之失唯異熟法是正實趣生五明佛非趣生由是如來非趣生攝佛無異熟無記法故亦非界攝非有漏故世尊已捨苦集諦故諸戲論種已永斷故承上明佛非界趣攝見非佛皆攝於界趣也無異熟無記法者空趣生之體故非有漏者界有漏之法故捨苦集諦者是世界因果之法故諸戲論種已永斷者界是因義即有漏戲論之法故也六結第八趣生正實趣生既唯異熟心及心所彼心心所離第八識理不得成故知別有此第八識結歸第八竟引證解釋意也以正實趣生之體不離異熟異熟王所不離第八離則理不得成故知別有第八為趣生體此其理之可徴者三也四有執受五初引經證成二正明執受三顯意通妨四總破諸法五結歸第八初引經證成又契經說有色根身是有執受若無此識彼能執受不應有故二正明執受謂五色根及彼依處唯現在世是有執受彼定由有能執受心唯異熟心先業所引非善染等一類能遍相續執受有色根身眼等轉識無如是義正明根心執受釋引證之文也初釋上引經顯色根有執受心次釋上證成正有執受心色根謂勝義依處謂浮塵執受者執持不壞令生覺受也唯現在者過去已滅未來未生無實體故彼謂現在有執受之色根决定由有能執受之心而後能執受之也先業所引不由現在之緣而起一類無記非善非染能遍為依止相續而不斷也眼等轉識以兼善染無一類能遍相續執受色根之義總是色根當有執受之心唯異熟心非轉識心也三顯意通妨此言意顯眼等轉識皆無一類能遍相續執受自內有色根身非顯能執受唯異熟心勿諸佛色身無執受故然能執受有漏色身唯異熟心故作是說通妨簡別使不滯名而得意也良以諸佛唯無垢心執持無漏色身有情唯異熟心執持有漏色身上明執持於轉識言無於異熟言唯非異熟外更無所有名唯以能執持有漏者獨是異熟名唯耳若以唯為唯勿諸佛色身無有執受而亦以異熟為執受耶是故當得其意四總破諸法謂諸轉識現緣起故如聲風等彼善染等非業引故如非擇滅異熟生者非異熟故非遍依故不相續故如電光等不能執受有漏色身諸心識言亦攝心所定相應故如唯識言非諸色根不相應行可能執受有色根身無所緣故如虛空等量破諸法皆非執受益顯執受唯異熟心也初量破轉識次量破心所三量破根行承上轉識無如是義等者謂諸轉識不能執受有色根身因云隨現緣起故如聲風等彼善染等不能執受有色根身因云非業引故如非擇滅異熟生者不能執受有色根身非異熟故非遍依故不相續故如電光等初一量總約轉識次二量別約三性必三量者欲詳盡故現緣起者以現在九緣等引起非異熟先業所引也非引業故者簡非異熟一類又自力所招非他業引也如非擇滅者如自性清淨非假他惑斷後而始淨也異熟生者轉識唯依異熟體生通善惡性非如異熟唯無記性也量破心所者轉識心所不能執受有色根身因云與諸心識定相應故如唯識言轉識既不能執受心所亦不執受也量破根行者色根不相應不能執受有色根身因云無所緣故如虛空等以彼色根不相應行非能緣心故不能緣所緣豈能執受以執受者必緣所緣故也五結歸第八故應別有能執受心彼心即是此第八識結執受歸於第八竟引釋執受之意也彼心即此識豈不此識即彼心此其理之可徴者四也五壽暖識五初引經證成二正釋其義三以理通妨四顯以有漏五結歸第八初引經證成又契經說壽暖識三更互依持得相續住若無此識能持壽暖令久住識不應有故二正釋其義謂諸轉識有間有轉如聲風等無恆持用不可立為持壽暖識唯異熟識無間無轉猶如壽暖有恆持用故可立為持壽暖識比量可否釋有持壽暖識也初量簡轉識次量立異熟承上云若無此識久住識不應有者果何所謂簡云謂諸轉識不可立為持壽暖識以有間有轉無恆持用如聲風等則若有此識久住識應有者果何所謂立云謂唯異熟識可立為持壽暖識以無間無轉有恆持用猶如壽暖也間間斷轉轉易皆不恆義壽暖住持决定無有間轉有恆持用故云如壽暖也三以理通妨經說三法更互依持而壽與暖一類相續唯識不然豈符正理𨿽說三法更互依持而許唯暖不遍三界何不許識獨有間轉此於前理非為過難謂若是處具有三法無間轉者可恆相持不爾便無恆相持用前以此理顯三法中所說識言非詮轉識舉暖不遍豈壞前理故前所說其理極成以理通妨難見持壽暖識必不可易也初立理次設難三通難立理者承上恐有難云經說識言或詮轉識亦未可知何為定是第八識耶故釋云經說三法等也意以暖不自立依壽而持壽不自立依識而持識非自立依於壽暖三法皆是一類而非善染皆是相續而無間斷故得更互依持此正理也如壽與暖一類相續識有間轉是二法皆然唯識不然豈符三法更互依持之正理乎設難者意謂更互依持既曰三法則許否宜俱於三法𨿽說三法更互依持而許唯暖不遍三界何不許識獨有間轉定執無間無轉異熟識耶以無色界既無色質亦無有暖故云不遍通難者意謂汝舉此難將謂是過可以壞正理也豈知此於前理非為過難前理云何謂於是處具有三法無間轉者可恆相持不爾便無恆相持用前以此三俱無間轉之理意許非轉識也明矣既非轉識舉暖不遍豈壞前意許之理乎前理不壞其說極成四顯以有漏又三法中壽暖二種既唯有漏故知彼識如壽與暖定非無漏生無色界起無漏心爾時何識能持彼壽以有漏顯有第八為能持也初以理顯三法定俱有漏次以理難無漏不持有漏意謂若以轉識不以第八則三法既皆有漏那含生無色界第六轉識既起無漏則無有漏若無第八爾時何識能持有漏之壽耶不應無漏之心能持有漏唯第八因中恆是有漏故能持於壽暖之有漏五結歸第八由此故知有異熟識一類恆遍能持壽暖彼識即是此第八識結指持壽暖於第八也由此證釋通妨有漏能持故知有識能持彼識即第八豈不第八即彼識此其理之可徴者五也六生心四初引經證成二正釋其義三斥破異解四約觸顯有初引經證成又契經說諸有情類受生命終必住散心非無心定若無此識生時心不應有故二正釋其義謂生時身心惛昧如睡無夢極悶絶時明了轉識必不現起又此位中六種轉識行相所緣不可知故如無心位必不現行六種轉識行相所緣有必可知如餘時故真異熟識極微細故行相所緣俱不可了是引業果一期相續恆無變轉是散有心名生心不違正理以生時位相續不變簡顯散有之是非也初簡轉識次顯異熟散有心謂生二位諸心離散唯此識有名散有心又非定名散非無名有非無心定名散有心上云若無此識生時心不應有故反顯必有此識生時心方能有也然果何以見之耶以心唯八種若生時無有第八尚有轉識可稱有心今轉識亦無故不應有生之時位然耳時者謂生與時身心惛昧悶絶之極如睡無夢明了轉識必不現起位者生與位以順而量之此位六種轉識必不現行行相所緣不可知故如無心定反而驗之此位六種轉識若定現行行相所緣有必可知喻如餘時是則生時位决無轉識轉識豈生時位散有之心耶然何以見有第八即有生時心謂真異熟極微細故行相所緣俱不可了非是無心是引業果為總報主一期相續恆無變轉是故色心𨿽散此識𭓩存名散有心不違正理古云百骸潰散一物常靈劫火洞然這個不壞者固不即此亦不離此也三斥破異解有說五識此位定無意識取境或因五識或因他教或定為因生位諸因既不可得故受生位意識亦無若爾有情生無色界後時意識應永不生定心必由散意識引五識他教彼界必無引定散心無由起故若謂彼定由串習力後時率爾能現在前彼初生時寧不現起又欲色界初受生時串習意識亦應現起若由惛昧初未現前此即前因何勞別說有餘部執生等位別有一類微細意識行相所緣俱不可了應知即是此第八識極成意識不如是故破小乘以意識為散有心指所執微細意識是散有心也初敘彼執情次破彼執情三破彼轉救四指出第八敘執者執意蓋謂生位不但定無五識亦無意識以同時意識須同時五識為明了而生散位獨頭意識須聞他言教引起而生定位獨頭意識須禪定引起而生今生位五識未明著故同時意識無因耳惛不聞言教散位無因散位無定定中獨頭無因諸因不可得意識亦無由生意識既無何言受生命終必住散心耶破執者意謂誠如所執生無色界後時意識應永不生以定由散意加行引起散由五識他教引起彼界既無他教五識散意亦無然而無色在定散意時常現起何得以言無也破轉救者恐彼救云彼定不由散意引起由常串習意識熏習定力後生彼界定即率爾現起者則彼初生無色亦應串習意識率爾現起矣無色且然生色與欲何獨不然串習意識亦應現起矣若謂初受生時由惛昧故未即現前者此之惛昧即前所說不可了知生散有心也何勞別說第六為耶指出第八者若謂生位中別有一類微細意識行相所緣俱不可了應知此不可了者即是如來密說第八識非是第六以第六行相所緣皆可了知是極成義不如是之可了知也四約觸顯有又將時由善惡業下上身分冷觸漸起若無此識彼事不成轉識不能執受身故眼等五識各別依故或不行故第六意識不住身故境不定故遍𭔃身中恆相續故不應冷觸由彼漸生唯異熟心由先業力恆遍相續執受身分捨執受處冷觸便生壽暖識三不相離故冷觸起處即是非情𨿽變亦緣而不執受故知定有此第八識約冷觸漸起顯執受是第八識也初標顯第八是觸事二釋簡轉識非觸事三釋明第八有觸事前約生位已顯今約位重顯故云又將時等也由善惡業下上身分冷觸漸起者以生平作惡業者將時識於所依從上分捨即從上分冷觸隨起如是漸捨乃至心處作善業者將之時識於所依從下分捨即從下分冷觸隨起如是漸捨乃至心處當知後識唯心處捨從此冷觸遍滿所依若無此識彼事不成反顯有第八則有執受有執受則有捨執受有捨執受方成冷觸漸起之事也簡轉識者簡其無冷觸漸起之事也所以然者不能執受異於第八執受各別依根異於第八遍依或緣闕不行異於第八恆起且六不住身中唯依於心異第八住於身中境有三世色心不定異第八唯三性境且遍𭔃身中寓於諸根恆相續故隨逐諸塵無時暫捨以此諸義不應冷觸由彼而生也明第八者明冷觸由第八有也由第八者唯異熟識是能執受捨執受處冷觸便生以壽暖識三不相離故無識之處便無有暖冷觸起處如外器界即是非情蓋此識𨿽變亦緣為境而不執受同於非情是則據經理以詳釋慿正義而破情復驗之於轉識曾無執受豈有捨執之冷觸異熟既有執受自有捨執之冷觸以此之故知定有第八不必疑也問何名六不住身答身即五根謂六不依於五根而依於心故問既遍𭔃身又恆相續何異第八答此約第六當分言相似而實不同以第六在在處處常處諸根曰遍𭔃隨逐諸塵無有暫捨曰相續此皆不遍之遍有間之恆豈可類於第八恆遍亦可反言如上所釋七緣起依二初引經證成二正釋其義初引經證成又契經說識緣名色名色緣識如是二法展轉相依譬如蘆束俱時而轉若無此識彼識自體不應有故引緣起相依之理證有第八識也初引經顯理次據理證成識緣名色名色緣識者名即四蘊心法色即羯羅藍等色法識即第八為名外識支與名色為依者瑜伽云識於現法中用名色為緣名色於後法中用識為緣所以者何以於母腹中有相續時說互為緣故由識為緣於母腹中諸精血等名色所攝受和合共成羯羅藍性此識緣名色也即此名色為緣復令彼識於此得住此名色緣識也十二支中此二逆順互緣餘皆順緣自體者反證有第八為自體也二正釋其義謂彼經中自作是釋名謂非色四蘊色謂羯羅藍等此二與識相依而住如二蘆束更互為緣恆俱時轉不相捨離眼等轉識攝在名中此識若無說誰為識亦不可說名中識蘊謂五識身識謂第六羯羅藍時無五識故又諸轉識有間轉故無力恆時執持名色寧說恆與名色為緣故彼識言顯第八識依經釋義正明有第八也初依經釋義次彼轉救三結有第八依經釋義者經中自作是釋而以名色各攝蘊中曰此二與識相依而住此二既是名色則識竟是何法眼等轉識攝在名中第八若無說誰為識耶轉救者恐彼救云名中識蘊者謂五識身所謂識支即是第六故破云不可以識是第六意識小乘不許羯羅藍時有五識故結有第八者以與名色為緣者必其有力恆時能持名色轉識既有間轉無力恆持緣將何出以是之故彼經名色緣識識緣名色識言定顯第八决非前六紹興府上虞縣祖貫今移住會稽縣信士倪元瓚捐資一拾二兩刻此唯識論訂正第三卷上薦先考雨田府君先妣曹太人早生蓮界并保在堂母施太安人壽年綿逺崇禎辛未歲季春望日謹識賢預姑蘇信女張門李氏大緣𦔳板
