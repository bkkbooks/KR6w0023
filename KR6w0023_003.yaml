body:
  text: 古杭雲棲寺弟子廣伸述五相應所相二初問答總標二條陳別釋初問答總標此識與幾心所相應常與觸作意受想思相應阿賴耶識無始時來乃至未轉於一切位恆與此五心所相應以是遍行心所攝故此明初變相應之所以別餘二變也初問相應之所二舉頌文為答三釋相應之時四原恆應之故未轉者無始時來始自異生乃至十地金剛道前皆名未轉一切者凡有多位聖更多位也相應者王所俱生俱滅也遍行者一切心中皆有具四一切也二條陳別釋二初五所體用二與識相應初五所體用五初釋觸二作意三釋受四釋想五釋思初釋觸三初標釋體用二轉釋體用三結判是非初標釋體用觸謂三和分別變異令心心所觸境為性受想思等所依為業樹立其名曰標分析其義曰釋標則非釋云標釋者以望下轉釋此但名標就此性業亦得名釋云標釋也承上本識固與五所恆相應矣五所體用果何如耶故云觸謂三和分別變異等云云也意以就五所明體用五所之體用攸分即體用見五所五所之面容宛爾故知欲辨差別當識面容欲識面容須詳體用也下皆倣此問六塵之觸五所之觸義何以別曰彼色此心何可同年詳如下文二轉釋體用二初轉釋體二轉釋用初轉釋體二初釋二句二釋三句初釋二句二初釋正義二通難問初釋正義謂根境識更相隨順故名三和觸依彼生令彼和合故說為彼三和合位皆有順生心所功能說名變異觸似彼起故名分別此轉釋觸體二句義也三和為第一句分別變異為第二句更相隨順者無所乖戾更互涉入義也觸依彼生者觸離三和生無所依也令彼和合者和合離觸合無所令也位安於其所之義三和位於觸觸是三和位故說觸為彼三和合位也不乖於生曰順生順流而生亦順生也皆有順生者根可依境可取識依於根而取境正三和時皆有順生心所之功能也觸似彼起者即順生功能似如也觸如三和之上順生心所功能起也分別是觸上功能即變異之別名也若更括其大意則觸謂三和者果何所謂謂根境識三更相隨順和觸不離觸為和位曰觸謂三和也分別變異者果何所謂謂三和之上皆有順生心所功能曰變異觸似三和順生功能而起曰分別變異也問分別與變異何別曰變異是三和生心功能分別是似變異瑜伽云有二種變易性一異性變易性由有相似生故二變性變異性由有不相似生故分別之用是觸功能謂觸之上有似前三順生心所變異功能說名分別分別即是領似異名如子似父名分別父二通難問根變異力引觸起時勝彼識境故集論等但說分別根之變異難云觸既分別三之變異何集論等但言於根不及境識耶通云根變異力引觸起時具主近遍恆四義勝彼識境互闕之劣舉勝足以該劣故集論等但說分別根之變異耳詳之根之生心有殊勝之能名主至邇之義名近相續之義名恆王所俱生之義名遍境之比根是客是逺是間但遍之一義豈非劣乎根之對識識固非客非逺然有間而不相續生所而不生心闕遍恆二義得為勝乎故總舉具足之義乃彰別稱殊勝之理始現或單或具教道然耳不必疑也二釋三句和合一切心及心所令同觸境是觸自性令心心所觸境為性是第三句今轉釋也一切心及心所是總別之眼識相應觸能和合眼識心心所同觸色境耳識相應觸能和合耳識心心所同觸聲境乃至第八識相應觸和合第八識心心所同觸根身等三境也合前皆觸體性二轉釋用三初正釋二引證三通妨初正釋既似順起心所功能故以受等所依為業前標釋云受想思等所依為業今轉釋云觸既似三順生心所功能故有與受等為所依之業用也上句轉𥼶所以下句轉結於業釋法輕妥體貼天然而且即體於用其體愈明觸似彼起正是既似順起心所功能耳讀者宜細心焉二引證起盡經說受想行蘊一切皆以觸為緣故由斯故說識觸受等因二三四和合而生此引經證受等所依為業也意以觸之業用非無據也如起盡經說受想行蘊諸識心所一切皆以觸為緣故由此為緣之故說識因根境之二和合而生觸因根境識三和合而生受因根境識觸四法和合而生故云受等所依為業又此中若緣若因皆增上緣等非親因緣又行蘊但約心所止攝四十九法總顯所該則攝七十三法又心所法何故除受想餘皆行攝答以受著諸欲想著諸見味受著故貪著諸欲倒想力故貪著諸見生以受想為最勝因輪𢌞無已故別立也三通妨瑜伽但說與受想思為所依者思於行蘊為主勝故舉此攝餘集論等說為受依者以觸生受近而勝故謂觸所取可意等相與受所取順益等相極相鄰近引發勝故妨難者行該四十九法思止行中一法思猶行中一法受乃行外一蘊受想行蘊所依為是思與受依非矣瑜伽集論所依為是受想行依非矣彼此果何從乎通云思𨿽是一以主勝故可該行蘊之法受𨿽是一以近勝故且取親勝之依思是業體名主造作最強名勝觸受所取三境極鄰曰近觸之生受引發最強曰勝是則無集論近勝之義不顯無瑜伽主勝之理不彰無此論完足之說不備𨿽義各有取說本相通得㫖忘言違妨安在三結判是非然觸自性是實非假六六法中心所性故是食攝故能為緣故如受等性非即三和此判假實以杜疑執之妄也自有體性曰實藉他為體曰假疑者恐人疑前觸謂三和執者謂經部師執觸即三和也故正釋之後復以比量判定云然觸自性是實非假非即三和所以然者六六法中心所性故同喻如受等性識與觸受想思愛名六識有六種觸有六種至愛亦六種曰六六也言觸是六六法中心所性故豈得為假假觸思識四食之中觸是食攝豈得為假十二緣中能為受緣豈得為假問非即三和觸謂三和此云何通曰觸為三和之位曰觸謂三和於三和中分別變異令心心所觸境為性曰非即三和是則觸謂三和者不離三和而有非即三和者不以三和為性總之三和是因觸乃是果何可同也二作意二初釋正義二破異解初釋正意作意謂能警心為性於所緣境引心為業謂此警覺應起心種引令趣境故名作意𨿽此亦能引起心所心是主故但說引心警心為性引心為業標作意之體用警起引趣故名作意釋體用名作意王所俱能引起約主故但說心謂此警覺應起心種者謂此作意明利自居種位便能警覺應起王所心種而使之起現行也此釋警心為性引令趣境者自起現行復能引心現行趣境此釋引心為業故名作意原作意之名於體用也二破異解有說令心𢌞趣異境或於一境持心令住故名作意彼俱非理應非遍行不異定故初敘隨情之解二陳據理之破隨情解者有說令心𢌞趣異境名作意以散解作意也或於一境持心令住名作意以定解作意也彼皆自以為是而不知所說之非理何者𢌞趣異境應非遍行之一境持心令住不異別境之定心作意是遍行而反非作意異別境而不異理將安在三釋受二初釋正義二破異解初釋正義受謂領納順違俱非境相為性起愛為業能起合離非二欲故領謂領收納容納收容三境為體性依此收納起愛為業用愛謂愛欲能起順境合欲違境離欲順違俱非平平欲也亦名中庸欲二破異解二初敘異二破異初敘異有作是說受有二種一境界受謂領所緣二自性受謂領俱觸唯自性受是受自相以境界受共餘相故所緣是境界領所緣故名境界受俱觸者觸與受俱生受正生時此受不納外境唯納俱生之觸以觸為自性名自性受唯自性受是受所緣自相之境不與心王共緣若境界受則同心王緣共餘相矣是以欲明受性須就受中必領俱觸是受自性唯自性受是受自相不然與餘法相渾而非的顯受所之面目矣異解本意如此二破異二初破領俱觸二破共餘相初破領俱觸彼說非理受定不緣俱生觸故若似觸生名領觸者似因之果應皆受性又既受因應名因受何名自性若謂如王食諸國邑受能領觸所生受體名自性受理亦不然違自所執不自證故若不捨自性名自性受應一切法皆是受自性故彼所說但誘嬰兒此展轉窮情破領俱觸之非理也初總以理斷二別約因推三別約體推四別推不捨五結歸虛妄何故非理以受𨿽依觸而生觸以三和分別變異為性受以領納為性各各自能緣境受定不緣俱生觸故也若謂受似觸生名領觸者則觸為因而受為果果似因起名為領彼凡似因之果皆應領因領故名受應皆受性又既受因應名因受何名自性受若謂自性受如王觸如國邑受能領觸如王食諸國邑所生受體名自性受非以觸為自性者理亦不然以彼領俱生觸為自性故今以所生受為自性則受無自證之境彼執俱生觸為自相境故也若謂受𨿽領觸不捨受之自性即領自性名自性受者則一切法皆不捨自性皆是領自性亦皆可謂受自性矣有是理乎故彼所說但誘嬰兒非可以誘成人以全虛妄無理可以欺人故也二破共餘相然境界受非共餘相領順等相定屬已者名境界受不共餘故彼謂不定屬已名共餘相今既不共則境界𨿽通一切名境界受者非通一切矣然則此說是理受定能緣異解其知之四釋想想謂於境取像為性施設種種名言為業謂要安立境分齊相方能隨起種種名言先標釋次轉釋如前安立境分齊相者即取境相貌安放樹立其高下妍醜方圓斜直等種種分劑界限分明方能隨此所取種種之像而起種種名曰此妍此醜此斜此直等也又想起之緣本於名言而因即種子所生依心而起與心俱轉具詳顯論中豫忽大睡方覺瞥取舊日所受境相不啻十數種而始還因返照一切衆生從朝抵暮皆沉沒于受想中受想之害何如佛之別立二蘊良有以也𨿽然以想易想是亦存乎其人耳故十六觀經亦但云想諸經亦云觀想五釋思思令心造作為性於善品等役心為業謂能取境正因等相驅役自心令造善等初標釋次轉釋因對果言等者等邪因非邪非正因也以因有邪正俱非之別業分善惡無記之差果有苦樂俱非之不同也取境者著於境之因相思惟經畫斟酌其可否以有此能名令心造作此釋思體驅役等者以能令心造作故驅役自心造善惡等業也此釋思用問令心造作令造善等體用何分曰驅役自心是思用令造業等是思用但令之一字尚在能取境因相上緊緊發來是造業之前茅先經畫停妥而後能令意也略有不同如此如顯意云思者謂令心造作得失俱非意業為體或為和合或為別離或為隨與或為貪嗔或為棄捨或為伺或復為起身語二業或為染污或為清淨等是也問思與作意何別曰作意如馬行思如騎者思之為要儒釋皆崇正以騎者之調於行耳善思其要矣夫已上五所體用初科竟二與識相應此五既是遍行所攝故與藏識决定相應其遍行相後當廣釋此觸等五與異熟識行相𨿽異而時依同所緣事等故名相應五所體用𨿽詳於前與識相應竟何所謂故云此五既是遍行所攝與藏識决定相應等云云也以既遍於心相應故可决定既釋于後行相不假預明然而識之行相與所有異何可契合云相應耶故云行相𨿽異所起時同所依根同所緣境等各自體事等云相應也問二同二等何別曰同謂無二同一剎那時同所依根故曰同等謂相似體各惟一境相相似曰等各一體者各一自證相相似者八王因緣變五所分別變八王是性境五所非境但約所變相分相似曰等也上五相應所相竟六王所受相二初明相應受相二簡餘所相應初明相應受相二初正明二通難初正明此識行相極不明了不能分別違順境相微細一類相續而轉是故唯與捨受相應又此相應受唯是異熟隨先引業轉不待現緣任善惡業勢力轉故惟是捨受苦樂二受是異熟生非真異熟待現緣故非此相應又由此識常無轉變有情恆執為自內我若與苦樂二受相應便有轉變寧執為我故此但與捨受相應此釋相應唯捨受也初約識行相釋次約受自體釋三約識執藏釋必三釋者良以本識捨受彼此不違名曰相應是必先明識之行相次明受之自體識受既明唯與相應之義不期然而然矣更足之以有情執我之故因於常無轉變轉變既屬苦樂無變為捨受也又明矣此其大略也詳之行相者識以了別等為行相也行相明了始與苦樂相應極不明了非捨而何行相分別始與苦樂相應不能分別非捨而何行相粗顯始與苦樂相應微而且細非捨而何品類叢雜者始與苦樂相應行相一類非捨而何前後間斷者始與苦樂相應行相相續非捨而何以行相之五義釋捨受之唯應不猶以規矩而成方圓乎自體者真異熟也隨順先世引業善惡勢力任運而轉不待現在苦樂之緣而轉者也若夫苦樂二受是異熟生非真異熟必待現緣矣以引業之異熟釋捨受之唯應不猶以權𢖍而定輕重乎執藏者有情執為自內我者也以其常無轉變故執為我若與苦樂相應便有轉變寧執為我轉變既屬苦樂非轉變者非捨而何以不變之執藏釋捨受之唯應不猶以丈尺而量短長乎問五六亦有俱非之受與捨何殊曰彼細此粗彼微此顯彼相續而此間斷彼不待緣而此必待緣名𨿽同義何可同也問異熟真生何以詳辨曰真簡命根𨿽是異熟是假非實又真是常義體常相續遍界地有名真異熟若體是異熟從異熟起有具間斷不遍界地但名異熟生八為真異熟前六為異熟生也二通難若爾如何此識亦是惡業異熟既許善業能招捨受此亦應然捨受不違苦樂品故如無記法善惡俱招設為問答顯捨受不違於苦樂也初難問二通難若爾者牒捨受如何此識亦是惡業異熟難捨受也意謂此識名捨受者為不與苦樂相應不與苦樂相應者為非惡業等所招也若亦是惡業異熟寧無苦受耶故云如何難其有妨於捨受也通云既許善業能招捨受則惡業亦能招捨受矣所以然者此捨受識不違苦樂品故也例如無記之法善業可招惡業亦可招也量之則此異熟識善惡俱招為宗因云不違苦樂品故例如無記法問善惡異熟與不違苦樂即今可指出否曰虎等八識惡業異熟也人天等八識善業異熟也此捨受異熟於前轉識所起苦樂二受能與之俱不違苦樂故也以不違故受熏以受熏故能感善惡異熟二簡餘所相應二初總徴其故二別釋其故初總徴其故如何此識非別境等心所相應二別釋其故互相違故謂欲希望所樂事轉此識任業無所希望勝解印持决定事轉此識瞢昧無所印持念唯明記曾習事轉此識昧劣不能明記定能令心專注一境此識任運剎那別緣慧唯簡擇得等事轉此識微昧不能簡擇故此不與別境相應此識唯是異熟性故善染污等亦不相應惡作等四無記性者有間斷故定非異熟此簡非餘所相應益見遍行之唯相應也初釋別境次釋餘所互相違故一一如文可見任業者任隨先業勢力而轉也瞢昧即昏昧昧劣即無力微昧即沉細別緣謂三境剎那謂不停任運謂不待現境自然而然者也異熟性對異熟生言善即十一善所染即二十染所惡作既通三性無記應屬此識然以有間斷故定非異熟性也是則六位心所根本無論矣餘四皆在所簡上六王所受相竟七王所性相二初明王性二明所性初明王性二初列法總徴二舉頌別釋初列法總徴法有四種謂善不善有覆無記無覆無記阿賴耶識何法攝耶所列四法下文自明文單舉識何謂總徴曰觸等五所𨿽有亦如是言亦可含於徴中以舉勝必攝劣故况下但牒頌而釋無有徴文故以總字該之二舉頌別釋此識唯是無覆無記異熟性故異熟若是善染污者流轉還滅應不得成又此識是善染依故若善染者互相違故應不與二俱作所依又此識是所熏性故若善染者如極香臰應不受熏無熏習故染淨因果俱不成立故此唯是無覆無記覆謂染法障聖道故又能蔽心令不淨故此識非染故名無覆無記謂善惡有愛非愛果及殊勝自體可記別故此非善惡故名無記此釋頌文是無覆無記也初舉頌總答二反釋其性三順釋其性反釋中初約異熟反釋次約所依反釋三約所熏反釋異熟等者真異熟性非善非染流轉還滅故得成也若是善性應不流轉若是染性應不還滅此識豈是善染性耶又此識非善非染故是善染之依若是善者應與染違非染所依若是染者應與善違非善所依此識豈是善染性耶又此識非善非染故是所熏若是善性猶如極香不受臰熏若是惡性猶如極臰不受香熏無熏習故染淨因果俱不得成此識豈是善染性耶以故此識唯是無覆無記然所謂無覆者覆謂染法障聖道故又能蔽心令不淨故此識非染故名無覆又無記者謂善惡有愛非愛果及殊勝自體可記別故此非善惡故名無記反顯以决其義順釋以定其名餘三自非唯此為是問前以有覆無覆分無記可盡無記否曰詳分仍有多種一能變無記即心心所法二所變無記即諸色法及諸種子等三分位無記即二十四不相應中有假無記法分位立者四勝義無記即虛空非擇滅無為又第一能變中更有四種一異熟二威儀三工巧四變化異熟無記者因通善惡果唯無記名異熟者因果合論名異熟無記者不能記別當果名無記或於善惡業中無所記別名無記此業能感當來真異熟無記業即善惡二思感即招當來總報識等五果種子及異熟五蘊現行若威儀等三𨿽有作用不招善惡等果故名無記二明所性二初釋正義二出異解初釋正義觸等亦如是者謂如阿賴耶識唯是無覆無記性攝觸作意受想思亦爾諸相應法必同性故又觸等五如阿賴耶亦是異熟所緣行相俱不可知緣三種境五法相應無覆無記故說觸等亦如是言此釋頌文觸等亦如是也初略釋二詳釋必同性故者决所性同於心王亦是無覆無記性也詳其所同則又觸等五如阿賴耶亦是異熟至無覆無記亦是二字貫下謂亦是所緣行相俱不可知亦是緣三種境亦是五法相應亦是無覆無記故說觸等亦如是言五法相應者賴耶望觸等有五法相應觸等五中隨舉其一以望賴耶及作意等亦是五法相應其意是異熟至無覆無記皆同名亦如是但除一切種耳又皆同者此等皆同無記又觸不當與觸相應今言五法相應亦就無記云相應也二出異解二初敘異解二破異解初敘異解有義觸等如阿賴耶亦是異熟及一切種廣說乃至無覆無記亦如是言無簡別故此解病在無所簡別錯認亦如是耳二破異解三初破能持種二破外轉救三破無簡別初破能持種彼說非理所以者何觸等依識不自在故如貪信等不能受熏如何同識能持種子又若觸等亦能受熏應一有情有六種體若爾果起從何種生理不應言從六種起未見多種生一芽故若說果生唯從一種則餘五種便為無用亦不可說次第生果熏習同時𫝑力等故又不可說六果頓生勿一有情一剎那頃六眼識等俱時生故此窮盡持種之非以正頌義也初正破持種二縱破持種正破者意以汝說持種為是我以汝說非理何則持種必始於受熏受熏必本乎自在觸等依識既不自在何能受熏不能受熏不能同識持種矣故曰彼說之非理也倘於非理中強為之說曰觸等亦能受熏應一有情有六種體矣情一而種多敢問現行之果其何以生為從六種生耶為從一種生耶為復次第生耶為復頓然而無次第耶從六則多種一芽之從一則餘五竟自何為次第乖𫝑力之等平頓生犯情界之增過無一可者理將安在二破外轉救誰言觸等亦能受熏持諸種子不爾如何觸等如識名一切種謂觸等五有似種相名一切種觸等與識所緣等故無色觸等有所緣故親所緣緣定應有故此似種相不為因緣生現識等如觸等上似眼根等非識所依亦如似火無能燒用彼救非理觸等所緣似種等相後執受處方應與識而相例故由此前說一切種言定目受熏能持種義不爾本頌有重言失大文二假一救詰二破救轉救者以所緣似種名一切種救前持種名一切種也破轉救者後執受處當以所緣似種為例前一切種不當以所緣似種而為例也救云誰言觸等亦能受熏持諸種子詰云不爾如何前云觸等如識名一切種救云謂觸等五所緣境之時託八所緣三境為質自變相分而緣即以所變似種名一切種非受熏持種名一切種也况似種可證者因有三種今夫王所不同同一所緣王有所緣之種所寧無種為所緣乎觸等與識所緣等故似種可證者一也欲色有質觸等託變三境為所緣無色無託觸等寧無所變之似種乎無色觸等有所緣故似種之可證者二也緣種子名親所緣所託識種名踈所緣然必內所慮託似種相故是親所緣緣則親所緣緣定應有故此似種之可證者三也此似種相不為因緣生現識等猶如觸等所變似根非識所依亦如所變似火無能燒用只成所緣緣不成因緣安得以從種生現一多頓漸因緣之為難耶破云彼為此救將為前失之可援也寧知其所救之非理乎何則本頌執受處方名所緣本頌一切種是明持種然則觸等所緣似種等相當與識之執受處相例不當例於一切種言也明矣若例一切種是一切種言已自先明所緣後於執受處又明所緣本頌寧免重言之失乎我故曰彼救之非理也三破無簡別又彼所說亦如是言無簡別故咸相例者定不成證勿觸等五亦能了別觸等亦與觸等相應由此故知亦如是者隨所應說非謂一切初牒破二質破三結示前說亦如是言無簡別故證一切法皆當相例此破所說無簡別故咸相例者為證不成即如以觸等例識之了別能證成乎以觸等例識之相應能證成乎定不成證不可咸例也明矣不可咸例安得無簡別乎故知亦如是言隨所應當說者說之謂亦如識之無覆無記有所簡別非謂一切相同之如是而無所簡別也八因果喻相三初正釋法喻二破難顯理三破餘異解初正釋法喻三初問答顯法二合釋法喻三結顯正意初問答顯法阿賴耶識為斷為常非斷非常以恆轉故恆謂此識無始時來一類相續常無間斷是界趣生施設本故性堅持種令不失故轉謂此識無始時來念念生滅前後變異因滅果生非常一故可為轉識熏成種故頌中恆轉如暴流此釋恆轉顯所喻之法也初問次答三釋以此為問者標斷常為諸過之本問在答處雙為欲顯雙非舉頌答者樹恆轉是萬法之源答全頌處雙非由於恆轉以此識恆轉故非斷常是緣起理以理是大乘緣起故自相深妙離言不惟凡外無知亦復餘乘莫測也全主意如此無始齊未轉依暫時也一類指無記性善惡性也相續表常有間斷也界即三界趣即五趣生即四生施設本謂此識是引果也堅謂堅住不移也𨿽通是釋恆而其間宛轉一類相續常無間斷釋恆是界趣生施設本故釋一類相續常無間斷性堅持種令不失故釋施設本所以然者一有間斷則不施設捨生趣生者其誰耶一不持種則無現行界趣之現行其誰耶展轉推窮欲人親見於恆耳從轉至熏成種故亦通是釋轉而其間宛轉念念生滅前後變異因滅果生釋轉非常一故釋生滅變異因果可謂轉識熏成種故釋非常一所以然者常一則前後無有變異豈有生滅因果耶常一不可熏種可為熏種則必非常一亦展轉推窮欲人親見於轉耳又一無記二堅住三可熏四非常一具此四義可為轉識熏成種故則恆又全在於轉中矣全轉而恆故持種全恆而轉故受熏受熏持種為萬法之宗恆轉二字之時義大矣哉問外道執我常一今因果則簡非我生滅則簡非常常一之法無因果故不俟論矣然前又云常無間斷與非常一違者何也曰佛法有二種常一相續常即有為識因滅果生者是二凝然常即真如無為不變者是今前約初義名常後約簡義云非常何違之有二合釋法喻恆言斷轉表非常猶如暴流因果法爾如暴流水非斷非常相續常時有所漂溺此識亦爾從無始來生滅相續非常非斷漂溺有情令不出離又如暴流𨿽風等擊起諸波浪而流不斷此識亦爾𨿽遇衆緣起眼識等而恆相續又如暴流漂水上下魚草等物隨流不捨此識亦爾與內習氣外觸等法恆相隨轉釋恆轉如暴流顯法喻之相合也初至因果法爾總合法喻次至恆相隨轉別合法喻恆言等者前答非斷非常以恆轉故既知一類相續等如是之為恆豈不於滅絶不生之斷見乎既知生滅變異等如是之為轉豈不表於非確定不變之常乎非斷非常猶如暴流因滅故非常果生故非斷天然無作法爾相合者也別合者初有所漂溺合二緣起不斷合三隨流不捨合亦可有所漂溺合界趣生本緣起不斷合可為熏等隨流不捨合性堅持種必總別者順文義故各總別故總其別故順文義者總中法喻別中法喻𨿽總別不同氣元一貫正順先法次喻後以法合之文義也各總別者總中法喻各總別中法喻各別各總者法望上下皆總喻望下文為總各別者喻法望上皆有三種之別也總其別者別𨿽多種總不出上文因果非斷常也以有如是三義故必先總而後別也三結顯正意如是法喻意顯此識無始因果非斷常義謂此識性無始時來剎那剎那果生因滅果生故非斷因滅故非常非斷非常是緣起理故說此識恆轉如流此結顯合意明緣起之正理也初結標正意二結釋正意三結歸法喻承上法喻相合𨿽已詳明其中正意竟何所顯故總收上文而結顯云如是法喻意顯此識無始因果非斷常義也如何顯耶釋云謂此識性無始時來剎那剎那果生因滅果生故非斷因滅故非常因緣而起乃佛法之宗非斷非常是緣起之理則每一剎那具九百生滅每一生滅非斷非常而為緣起之理也故說此識恆轉如暴流以法合喻用喻顯法如是法喻豈徒然哉順文消釋其略如此詳之則此節是通要㫖故不獨上文法喻相合意為顯此下之問難顯理亦為顯此破諸異解亦欲解此也故後之前因滅位後果即生如稱兩頭低昂時等即此剎那中生滅後之觀現在法假立因果現識似彼相現正理深妙離言即此緣起理之自相不可以假智詮得也此節不明後文不貫故預取耳若但消此文直宜渾渾說去不可太顯妨下難端問教有剎那生滅一期生滅剎那已若所言一期差別云何曰即前隂隂滅後隂隂生問前隂隂滅後隂隂生為前來至後後即前隂之所為耶為前不來後後非前隂之所生耶若後是前隂所為則一隂三世墮於常過前不來後則善應生惡惡應引善等矣如之何曰𣵀槃云如日垂沒山陵堆阜影現東移理無西逝衆生業果亦復如是前隂隂滅中隂隂生中隂隂滅後隂隂生又如蠟印印泥印與泥合印壞文成而是蠟印不變在泥文非泥出不餘處來以印因緣而有是文𣵀槃之言如此合之則前隂隂滅如日垂沒中隂隂生如影東移中隂隂滅如日垂沒後隂隂生如影東移又蠟印如前隂泥文如後隂印與泥合如前印習氣印與後隂印壞文成如前隂滅位後印即生而是蠟印不變在泥如前隂不為後隂文非泥出如後隂不能自生不餘處來如不離前隂而有以印因緣而有是文正非斷非常緣起理也法喻相齊印隂理顯印不變泥而淺深高下之全同者以蠟印因緣而有是文隂不至隂而善惡習氣之克肖者以前隂因緣而生後隂遠離斷常果因不謬近論即一期促論即剎那實則一期由剎那而成言剎那而一期自在故雜華云由剎那自相壞而集果不失相又合仁王僧祇律意九百生滅為一剎那九十剎那為一念二十念為一瞬二十瞬為一彈指二十彈指為一羅預二十羅預為一須三十須為一晝夜則剎那為時至促是時之最始者也二破難顯理二初約去來難二約因果難初約去來難三初問難二破難三顯理初問難過去未來既非實有非常可爾非斷如何斷豈得成緣起正理此約去來非實以難緣起也非實有者餘乘多部等執三世皆實有又大乘破過未非實有如空華也非斷如何難不得為非斷也斷豈得成等者難不得成緣起也意謂緣起正理由於非斷非常非斷非常由於果生因滅生滅屬世世如實有可為緣起過未既非實有曰非常則可矣如何能曰非斷耶不能非斷則成斷滅斷豈得成緣起正理二破難過去未來若是實有可許非斷如何非常常亦不成緣起正理此即彼所執以破其難也是實有餘乘之執也如何非常難破非常可爾也常亦不成等者難破實有不成緣起也意謂汝難非實不成緣起是實必得成緣起矣不知若是實有可許非斷矣如何能曰非常耶不能非常則是常見常亦不成緣起正理自先招難何以難他三顯理豈斥他過己義便成若不摧邪難以顯正前因滅位後果即生如稱兩頭低昂時等如是因果相續如流何假去來方成非斷此顯發緣起之正理也初示摧斥之意二顯緣起之理三責難無所用承上邪正不容並立隱顯互為低昂邪若不摧正必不顯上所云云非是斥他成己乃為摧邪顯正耳顯正云何前因滅位後果即生等也意謂汝以過未非實為難良以不知果生因滅者非前因滅盡後果始生之異時乃前因滅位後果即生之同時耳取而喻之本識如稱因果如兩頭生滅如低昂稱之兩頭低昂時等識之因果生滅同時因果體異生滅事殊而剎那時等如是因果前後曾無間斷相續如流現在足矣何假去來是實方成非斷也耶正義既明邪宗可氷釋矣二約因果難四初難問二躡破三轉破四顯理初難問因現有位後果未生因是誰因果現有時前因已滅果是誰果既無因果誰離斷常此約因果難斷常見緣起之不成也初難因果二難斷常因是誰因難無因也果是誰果難無果也誰離斷常難斷常也難承上意謂汝言何假去來方成非斷意取現在即離斷常亦孰知斷常之不可離耶何者因非自因由果名因果亦非果因因而果既云前因滅位後果即生是因現有位後果未生也後果未生因是誰家之因耶是無因矣既云後果即生前因滅位是果現有時前因已滅也前因已滅果是誰家之果耶是無果矣無因無果誰離斷常不離斷常不成緣起也明矣故知因現有果現有單取現在因果不成須具過未而後可二躡破若有因時已有後果果既本有何待前因因義既無果義寧有無因無果豈離斷常此躡執破難見所難無與於緣起也初破無因果二破是斷常若有因時已有後果躡所執也何待前因破無因也果義寧有破無果也豈離斷常破是斷常也破意蓋謂汝云因現有位後果未生等名無因果意欲有因時已有後果始成因果可離斷常耳亦寧知斷常之不可離乎何者若有因時已有後果果既本有何待前因是無因矣因義既無果義寧有是無果矣無因無果豈離斷常豈成緣起故顯謂因中有果因果二相異與不異皆不應理以不異則無决定因果二相異則未生已生二俱不可未生則彼因中果猶未生何得說有已生則果體已生何復從因生耶故知因中非先有果然要有因故待緣而生耳既執而辨據論以徴𨿽欲難他實為破己矣如之何三轉破因果義成依法作用故所詰難非預我宗體既本有用亦應然所待因緣亦本有故由斯汝意因果定無應信大乘緣起正理此轉破以刳情執正理之易信也初轉入結難二轉决所難三轉惑於信轉入結難者轉入我宗結釋彼難無預於我也意以汝詰誰離斷常將謂前所立義是因果不成詰難有預於我宗也我破豈離斷常則我前所立義因果義成依法作用故所詰難非預於我宗也法指生滅法體用體上作用依法作用者依現前剎那前滅後生如稱兩頭低昂時等法體作用而建立因果成緣起理也轉决所難者前已破無因果此復轉决定無因果轉所詰難之有預於彼也體謂果體用謂體上之用因緣者顯發體上作用之因緣也意謂故所詰難非預我宗乃有預於汝宗矣所以然者果體既是本有用根於體用亦本有所待因緣亦應本有矣由斯汝執體用因緣皆是本來實有墮在常常無轉變定無因果斷常將何所歸是所詰難豈不有預於汝宗乎昔以迷惑而生難今因明辨而當信矣故曰應信大乘緣起正理四顯理謂此正理深妙離言因果等言皆假施設觀現在法有引後用假立當果對說現因觀現在法有酬前相假立曾因對說現果假謂現識似彼相現如是因果理趣顯然遠離二邉契會中道諸有智者應順修學此深顯緣起之理以勸學也初標次釋三結承上已勸汝應信矣然此大乘緣起正理自相非假智詮所到深妙不可思議離言說相而言因言果言離斷常者正假智詮增益似相假施設顯耳假說云何謂以觀智觀現在法有引生後果之用假立當果對說現在為後果之因觀現在法有酬前相假立曾因對說現在是前因之果因果不離現在剎那一念對前後假立說成因果相續不斷不似汝等定執三世為實也又窮其假之所以立者立不自立謂生滅現識似彼引後酬前因果相現故耳如是因果理趣昭然酬前故非斷引後故非常曾因故非常當果故非斷妙有中道非智莫契故勸應學也問心心所法並約現在色等諸法安得亦同時耶曰若約色心三世未為不是但色法亦不離心故大乘唯言現在耳剎那生滅如稱兩頭低昂時等因果同時為緣起正理殊非小乘過因現果現因來果三世之執頌云恆轉如流釋云謂此識性豈徒然哉幸讀者首尾通貫細而研之三破餘異解三初破餘部二破經部三結勸信初破餘部二初敘計二破非初敘計有餘部說𨿽無去來而有因果恆相續義謂現在法極迅速者猶有初後生滅二時生時酬因滅時引果時𨿽有二而體是一前因正滅後果正生體相𨿽殊而俱是有如是因果非假施設然離斷常又無前難誰有智者捨此信餘此敘異計為破斥之案也初標現相續二釋現相續三結離勸信有餘部者大衆雞胤等七部也無去來者彼執法無去來也而有因果恆相續義者彼執法𨿽無有去來而有現在因果生滅恆相續也何謂因果謂現在法且無論稍緩者具有因果即石火電光極迅速者猶有初生後滅二時生時酬因滅時引果時𨿽有二而因果法體是一名因果也何謂相續謂現在前因正滅現在後果正生生滅體相𨿽殊即滅即生而俱是有名相續也如是因果生時酬因即名為果奚必曾因對說現果之假施設乎滅時引果即名為因何藉當果對說現因之假施設乎然前因正滅則離常後果正生則離斷又無前無因果等難前云諸有智者應順修學由是觀之誰有智者捨此現在一念生滅因果之真實而信餘假因假果之假施設乎二破非三初總標破二別釋破三總結破初總標破彼有虛言都無實義從此至結詳破現在實有生滅之非以顯現在假設因果之為是也彼有虛言如上所敘都無實義詳在下非然必詳非其義之不實始實其言之皆虛也二別釋破四初破一念二時二破二相一體三破時體同立四結同現非理初破一念二時何容一念而有二時生滅相違寧同現在滅若現在生應未來有故名生既是現在無故名滅寧非過去滅若非無生應非有生既現有滅應現無此展轉破生滅二時不容於現在一念之中也初斥一念不容二時二釋一念不容之相三約反常難滅非現四約順常難滅非現五約逆順互例非現斥一念等者前云現在極迅速者猶有初後生滅二時故斥云何容現在一念而有生滅二時然其所以不容者以生滅相違現在一念屬生不屬於滅豈得同居現在故不容也如以三世反常而論滅若現在生應未來應乎否耶無是理矣若順而論之有故名生既是現在無故名滅寧非過去而謂滅同現在者何也更若互而例之滅若非無生應非有生既現有滅應現無而以滅居現在之有者何也反復推窮决無現在一念具有生滅二時之理問前云轉謂此識從無始時來念念生滅前後變異因滅果生非常一故可為轉識熏成種故夫既念念生滅豈非一念亦有生滅二時今非之乃自語前後矛盾矣答不觀結顯正意中剎那剎那因滅果生耶則知一剎那中九百生滅九十剎那為一念一念該八萬一千生滅矣而云念念生滅者蓋以念念總剎那顯生滅無量無邉不可𥮅數意耳問如是則一念尚具無量生滅獨不可立一生滅乎而非其不容者何也答彼云現在一念既云現在則滅屬過去故不容于生之現在耳問然則前云現在法有引後用假立當果對說現因觀現在法有酬前相假立曾因對說現果者以一念為現在耶以一剎那為現在耶以一剎那中九百生滅之一生滅為現在耶以九百生滅中一生滅之生為現在耶答據實細論實以九百生滅中一生滅之生論現在法為是而曰剎那剎那果生因滅者以其至細難窺以剎那總之又以剎那難見以念總之欲使由念見剎那即剎那見剎那中之生滅耳今乃現在具生滅二時是現在而有過去安得謂之現在故以一念破其不容二時使易曉耳貴得其意在現在是生過去是滅而以滅屬現在為不可也二破二相一體又二相違如何體一非苦樂等見有是事此破前時𨿽有二而體是一等也初難破二例破相違者生則無滅生與滅違滅則無生滅與生違如何體一而曰𨿽有二時而體是一耶例如苦則無樂樂則無苦非於苦樂等見有現在一念而具在之事也是事不見有二相一體之决無也明矣三破時體同立生滅若一時應無二生滅若異寧說體同此顯自語相違見時體之難於同立也初二句以體難時次二句以時難體意謂生滅若是一體則生不異滅滅不異生應無二時而汝言時𨿽有二者何也生滅若是異時則生屬現在滅屬過去體不可同而汝言同一體者何也語自相違義無的據四結同現非理故生滅時俱現在有同依一體理必不成生滅二時俱現在有同依一體結有虛言也理必不成結無實義也汝執以情我破以理豈徒為破斥已哉二破經部經部師等因果相續理亦不成彼不許有阿賴耶識能持種故此以理破經部益顯第八為緣起之要也經部師等因果相續者彼依六識三毒建立染淨因果相續不斷也理亦不成者以彼不許有阿賴耶識能持種故良以由種生現因現生種種現不斷是相續理而能持種子者則以有第八識故也今既不許種將安在無種則無現相續不斷者其誰耶故理不成也三結勸信由此應信大乘所說因果相續緣起正理此總勸餘部及經部師等也邪執既摧正理自顯故云由此應信等也因果者種因現果現因種果也相續者前因滅位後果正生如稱兩頭低昂時等相續如流無間斷也緣起正理離斷離常諸有智者不此乘之應信而將誰信哉九伏斷位相二初設問頌答二解釋頌義初設問頌答此識無始恆轉如流乃至何位當究竟捨阿羅漢位方究竟捨此設為問答以便標釋也設問之意在標頌標頌之意在便釋良以對問名答對釋名標故也二解釋頌義二初正明賴耶二通辨名位初正明賴耶三初釋正義二通妨難三斥異解初釋正義謂諸聖者斷煩𢚰障究竟盡時名阿羅漢爾時此識煩𢚰粗重永遠離故說之為捨此中所說阿羅漢者通攝三乘無學果位皆已永害煩𢚰賊故應受世間妙供養故永不復受分假生故云何知然决擇分說諸阿羅漢獨覺如來皆不成就阿賴耶故集論復說若諸菩得菩提時頓斷煩𢚰及所知障成阿羅漢及如來故此正釋位捨修進者無躐等之也初正釋捨位次轉釋捨位三引證位捨釋位捨者何名阿羅漢位耶謂學無學聖但斷我執分別煩𢚰不名羅漢分別俱生煩𢚰種現究竟盡時名阿羅漢位何名阿羅漢位捨阿賴耶識以證羅漢位時煩𢚰種子永遠離故說之為捨良以阿賴名藏能藏不離所藏而得名所藏雜染種子既盡能藏之名亦不立也轉釋捨位者轉釋捨賴耶之阿羅漢位也以羅漢果位通攝三乘無學不止聲聞第四名羅漢也所以然者梵語阿羅漢義殺賊應供無生今三乘無學俱具三義應俱得此名也引證位捨者何知三乘無學皆捨賴耶皆名羅漢答證之瑜伽則决擇分說三乘皆捨賴耶證之集論集論復說菩名為羅漢誠非無據而云然二通妨難若爾菩煩𢚰種子未永斷盡非阿羅漢應皆成就阿賴耶識何故即彼决擇分說不退菩亦不成就阿賴耶識彼說二乘無學果位𢌞心趣向大菩提者必不退起煩𢚰障故趣菩提故即復轉名不退菩彼不成就阿賴耶識即攝在此阿羅漢中故彼論文不違此義又不動地以上菩一切煩𢚰永不行故法駛流中任運轉故能諸行中起諸行故剎那剎那轉增進故此位方名不退菩然此菩𨿽未斷盡異熟識中煩𢚰種子而緣此識我見愛等不復執藏為自內我由斯永捨阿賴耶名故說不成阿賴耶識此亦說彼名阿羅漢此設難通妨詳捨位必通乎三乘也初設為問難二通以𢌞心三通以直修難云若爾者躡前為難云斷障方名羅漢羅漢始無賴耶然則菩煩𢚰種子未永斷盡非阿羅漢應皆成就阿賴耶識何故即彼論說不退菩亦不成耶論同說異理將安在通云適疑不退菩未詳不退之差別耳何則即𢌞小向大轉名不退者言之已失賴耶名已攝羅漢位彼此固不相違若以直修大乘正名不退言之亦失賴耶名亦名羅漢位彼此更不相違也脈絡如此詳之必不退起者以無學果位既以斷盡煩𢚰更不起煩𢚰惑既以𢌞小向大更不退於菩之位也轉名者本名小果以向大故轉小名為菩之大名也即攝在此者即攝在此阿羅漢位捨之頌中也不退謂八地已上兼後諸地言也一切煩𢚰俱生分別也永不行者絶起現行之纏縛也駛迅速義法駛流者所知法執漂溺有情如暴流也法駛流中任運轉故者能於駛流而得自在不障因故能諸行中起諸行故者如於一度能起諸度度度然也剎那剎那轉增進故者念念無間展轉深入於智慧海也此位方名者具上如是諸義而方得此不退之名也我見愛等者謂第七我癡我見我愛我慢相應四種俱生我執也不復執為自內我者八地已上生空智果相續現前故我見等不復執藏為自內我也意以未盡異熟中煩𢚰種子似不能無賴耶然以我見等不復執我由斯永捨賴耶之名亦說彼為阿羅漢也是則不退之類既𡩖羅漢之攝亦廣豈特小乘四果名羅漢耶三斥異解三初敘破異解二重破轉救三結顯有體初敘破異解有義初地以上菩已證二空所顯理故已得二種殊勝智故已斷分別二重障故能一行中起諸行故𨿽為利益起諸煩𢚰而彼不作煩𢚰過失故此亦名不退菩然此菩𨿽未斷盡俱生煩𢚰而緣此識所有分別我見愛等不復執藏為自內我由斯亦捨阿賴耶名故說不成阿賴耶識此亦說彼名阿羅漢故集論中作如是說十地菩𨿽未永斷一切煩𢚰然此煩𢚰猶如咒藥所伏諸毒不起一切煩𢚰過失一切地中如阿羅漢已斷煩𢚰故亦說彼名阿羅漢彼說非理七地已前猶有俱生我見愛等執藏此識為自內我如何已捨阿賴耶名若彼分別我見愛等不復執藏說名為捨則預流等諸有學位亦應已捨阿賴耶名許便違害諸論所說此辨破異解軌定頌中位捨之所收也初敘異解二破異解異解意謂不必八地已上始名不退始捨賴耶始名羅漢即初地已上約所證得所斷行所不執而證之於論即名不退即失賴耶即說名為阿羅漢矣大意如此詳之二空者我法二空二智者根後二智也二障者煩𢚰所知二障也不作煩𢚰過失者不障道心也分別我見愛等者第六意識相應煩𢚰也猶如咒藥所伏諸毒者煩𢚰如毒正智如藥正智調伏𨿽起而無患證前不作煩𢚰過失也斷名羅漢伏不應名然𨿽未斷猶如已斷故云如阿羅漢也破中先正破非理次例破非理正破者彼說非理以賴耶名執藏七地已前既有俱生我執賴耶之名如何已捨例之預流亦無分別我執若彼分別不復執藏說名為捨則預流等亦已捨矣有是理乎許便違害諸論所說不許此亦應然然則初地已上豈得名捨二重破轉救地上菩所起煩𢚰皆由正知不為過失非預流等得有斯事寧可以彼例此菩彼六識中所起煩𢚰𨿽由正知不為過失而第七識有漏心位任運現行執藏此識寧不與彼預流等同由此故知彼說非理此重破轉救精察幽微以盡異解之執情也初敘轉救次破轉救轉救意謂前以預流例破所解我以為不可同也何則地上菩與預流等人品既異智慧自殊菩所起煩𢚰皆由正知不為過失預流所起煩𢚰既怯正知未必無失寧可以彼而例此耶所例既其不當所解豈為所破破轉救云俱生通前七識彼六識中有間斷者正知不為過失可如所說而第七識中無間俱生豈如其所說耶何者以諸菩於見道位已永遠離分別二障俱生二障猶未伏滅故於地上漏與無漏相間而起無漏心位則第七我見愛等不復執藏有漏心位無間俱生任運執我寧不與彼預流同耶由此之故而知彼說之非理耳是則所解之已謬轉救之不能八地已上皆為捨位所收七地之前同有俱生執藏可細察之三結顯有體然阿羅漢斷此識中煩𢚰粗重究竟盡故不復執藏阿賴耶識為自內我由斯永失阿賴耶名說之為捨非捨一切第八識體勿阿羅漢無識持種爾時便入無餘𣵀槃此結顯有體以妨生疑於捨識也初原頌名捨二非捨體三反出所以煩𢚰名粗重俱生分別種子也盡既究竟不復執我由所藏之惑既空能立之名永失頌義如此說之為捨非捨一切第八識體名之為捨也若羅漢位即捨識體難道阿羅漢位無識持所知障種及諸色根爾時便入無餘𣵀槃耶以此觀之必不捨體已上正明賴耶初科竟二通辨名位二初通釋諸名二通辨二位初通釋諸名二初釋諸名二簡所捨初釋諸名然第八識𨿽諸有情皆悉成就而隨義別立種種名謂或名心由種種法熏習種子所積集故或名阿陀那執持種子及諸色根令不壞故或名所知依能與染淨所知諸法為依止故或名種子識能遍任持世出世間諸種子故此等諸名通一切位或名阿賴耶攝藏一切雜染品法令不失故我見愛等執藏以為自內我故此名唯在異生有學非無學位不退菩有雜染法執藏義故或名異熟識能引生善不善業異熟果故此名唯在異生二乘諸菩位非如來地猶有異熟無記法故或名無垢識最極清淨諸無漏法所依止故此名唯在如來地有菩二乘及異生位持有漏種可受熏習未得善淨第八識故如契經說如來無垢識是淨無漏界解脫一切障圓鏡智相應此通辨諸名使知由義定名不迷於名也初總標名隨義別二通釋通位諸名三別釋阿賴耶名四別釋異熟識名五別釋無垢識名承上非捨一切第八識體則諸有情皆悉成就體𨿽悉就名以義殊不可不辨其殊也或名心者以此識體受染淨熏積集種子集起現行故或名阿陀那以執持種子不散執持結生相續執持色根不壞故或名所知依以第八識能與所應知染淨諸法為所依止是彼因故能引彼故等也或名種子識以因中持漏無漏種果上唯持無漏漏名世間無漏出世任持周遍之義故也此之四名通凡聖因果一切位也或名阿賴耶以有攝藏執藏之義唯在異生有學非無學位不退菩有雜染法執藏義故局賴耶所在之位也或名異熟識以有能引果報之義此名唯在等非如來等者局異熟所在之位以如來唯有善法故也或名無垢識者以是最極清淨諸無漏功德法所依止此名唯在如來地有菩二乘以至未得等者局無垢識所在之位也經云是淨無漏界解脫一切障圓鏡智相應豈非最極清淨諸無漏法依止之明證乎二簡所捨阿賴耶名過失重故最初捨故此中偏說異熟識體菩將得菩提時捨聲聞獨覺入無餘依𣵀槃時捨無垢識體無有捨時利樂有情無盡時故心等通故隨義應說此簡定七種捨否先後通別之不同也初明賴耶先捨偏說之故二明異熟後捨時位之殊三明無垢不捨時無窮盡四明心等四名通於染淨承上既第八有此諸名何故頌中唯說捨阿賴耶故云過失重故等云云也重者與雜染互相攝義有情執藏為我非如餘名無此過也將得菩提時捨者即最後身觸等五所轉大圓鏡智無垢識體證大菩提所謂金剛道後異熟空也入無餘依𣵀槃時捨者對有餘言以煩𢚰初盡異熟苦果尚在名有餘依生所依故若捨異熟即入無餘依以彼身智俱泯故也如天台謂子縛𨿽盡果縛未忘名有餘依子果俱盡名無餘依也無垢識體無有捨時等者以從自受用身起他受用等出生十力無畏種種無漏善法窮未來際隨機以化物也心等通故隨義應說者謂四名通一切位隨染淨所應說之義而說之耳此四至果染法𨿽盡淨法常存通染可知通淨隨義說者謂淨法積集執持淨種淨法所依淨種子識也二通辨二位二初正辨二引證初正辨然第八識總有二位一有漏位無記性攝唯與觸等五法相應但緣前說執受處境二無漏位唯善性攝與二十一心所相應謂遍行別境各五善十一與一切心恆相應故常樂證知所觀境故於所觀境恆印持故於曾受境恆明記故世尊無有不定心故於一切法常决擇故極淨信等常相應故無染污故無散動故此亦唯與捨受相應任運恆時平等轉故以一切法為所緣境鏡智遍緣一切法故通辨二位明因果相應性境之不同也有漏因位所唯觸等五法性是無記所攝境是執受三境無漏果位所通觸等念一性唯善攝境是一切故不同也無染污故簡根隨二十六煩𢚰無散動故簡四不定法此亦唯與捨受相應者有漏非善非惡故與捨受相應此唯是善亦與捨受相應者以𨿽行善法任運恆時平等而轉無有高下略似化母之無心故也上釋初阿賴耶至羅漢位捨二行半頌竟下以小乘等不信有此第八故廣引教理力證有此識也二引證三初問答判定二別引教理三結勸信受初問答判定云何應知此第八識離眼等識有別自體聖教正理為定量故此假問以標理教為有別自體之定量也徴謂有體𨿽如上說使人了然而知無所疑惑當云何耶欲究其知之之道取信於當時後世也答云聖教正理為定量故謂此識微妙非現量所見之境必聖教正理為一定不移之量而後應知之也然則看教不精熟見理不精細何由而知不知此識不得學問大頭腦縱用苦功亦難免於外道二乘之過勉之勉之二別引教理二初引聖教二引正理初引聖教二初大乘四頌二餘乘四部初大乘四頌二初引四頌二顯聖量初引四頌四初逹摩頌二重引頌三深密頌四楞伽頌初逹摩頌三初引頌標意二詳釋頌文三結歸第八初引頌標意謂有大乘阿毗逹摩契經中說無始如來界一切法等依由此有諸趣及𣵀槃證得此第八識自性微細故以作用而顯示之頌中初半顯第八識為因緣用後半顯與流轉還滅作依持用引逹摩證有第八復標意杜不示自體之疑也以此識自性微細不能直示其體故偈以第八作用顯示第八自體欲人因用知體也作用云何頌中初半是顯第八為因緣用頌中後半是顯第八為依持用即因緣用處返照其發用者即依持用處返照其為依持者微其微細其細而識之自性可知矣此頌文顯示意也幸毋辜負婆心二詳釋頌文四初釋因緣用二釋依持用三約染淨釋四約三性釋初釋因緣用界是因義即種子識無始時來展轉相續親生諸法故名為因依是緣義即執持識無始時來與一切法等為依止故名為緣謂能執持諸種子故與現行法為所依故即變為彼及為彼依變為彼者謂變為器及有根身為彼依者謂與轉識作所依止以能執受五色根故眼等五識依之而轉又與末那為依止故第六意識依之而轉末那意識轉識攝故如眼等識依俱有根第八理應是識性故亦以第七為俱有依是謂此識為因緣用此釋因緣用以顯示識體也初分釋因緣次合釋因緣分釋者何名為因界是因義因是何法即種子識此識非有初際無始時來漏無漏種令各引生自類展轉相續至成熟位親生現行諸法故名為因無此識體因用何從故以因用驗知有識體也何名為緣依是緣義緣是何法即依持識此識非有初際無始時來與一切現行無所簡擇為平等依故名為緣無此識體緣用何從故即緣用驗知有識體也合釋者作用固有分別因緣殊非判然良以因固此識緣亦此識謂此識能執持諸種子故此識與現行法為所依故即此識變為彼曰親生諸法故名為因及此識為彼依曰與一切法等為依止故名為緣也總釋變依則變為彼者謂此識變為器及有根身為彼依者謂此識與轉識作所依止也別釋所依則以此識能執受五色根故眼等五識依此色根而轉名依此識又與末那為依止故第六意識依之而轉亦名依也末那必依於第八者以末那意識是轉識攝故依俱有根者如眼等五識亦轉識攝故依俱有五色根也然則以比量定末那彼等是轉識攝故必依第八為俱有依以道理定第八第八是識性攝故亦必以第七為俱有依也因緣固自有分然皆不離第八故結云是謂此識有因緣用二釋依持用由此有者由有此識有諸趣者有善惡趣謂由有此第八識故執持一切順流轉法令諸有情流轉生𨿽惑業生皆是流轉而趣是果勝故偏說或諸趣言通能所趣諸趣資具亦得趣名諸惑業生皆依此識是與流轉作依持用及𣵀槃證得者由有此識故有𣵀槃證得謂由有此第八識故執持一切順還滅法令修行者證得𣵀槃此中但說能證得道𣵀槃不依此識有故或此但說所證𣵀槃是修行者正所求故或此雙說𣵀槃與道俱是還滅品類攝故謂𣵀槃言顯所證滅後證得言顯能得道由能斷道斷所斷惑究竟盡位證得𣵀槃能所斷證皆依此識是與還滅作依持用此釋依持用以證第八之自體也初正釋流轉次通釋流轉三結釋流轉四正釋還滅五轉釋還滅六結釋還滅初正釋流轉中順流轉法謂惑業苦種流轉生謂五趣現果惑業望生是增上緣苦望生能作因緣由有此識執持此惑業苦三一切順流轉法令諸有情生相續二通釋流轉中恐有疑云惑業及苦報衆生皆流轉法何故頌中唯言諸趣不言惑業耶通云一者苦趣是果勝於業惑故偏說之二者或諸趣之言通能趣之惑業所趣苦果之衆生言資具者惑業能作諸果趣資糧苦具故則偏言果該因果皆攝趣中故言諸趣三結釋流轉中諸惑業生皆依此識是與流轉作依持用也四正釋還滅中及兼義謂此識不但與流轉作依持用兼能與還滅法作依持用順還滅法者即法爾本有無漏種子由此識持故于資加勝進位展轉熏增乃至證得究竟𣵀槃故云令修行者證得也五轉釋還滅中謂此頌中言𣵀槃證得者唯說能證道品不言𣵀槃以𣵀槃是清淨法界即識實性不依此識有故此唯約能證而釋或此但約所證𣵀槃以是修行者正所求故此唯約所證釋也或此雙說𣵀槃與道俱是能還所還品類攝故此約能所雙釋也然雙說之意言𣵀槃者顯所證滅後證得言顯能得道能得即解脫道能斷即無間道斷所斷惑究竟盡位證得𣵀槃也六結釋還滅中能所斷證謂能斷道所斷惑能得道所證滅皆依此識是與還滅作依持用也三約染淨釋又此頌中初句顯示此識自性無始恆有後三顯與雜染清淨二法總別為所依止雜染法者謂苦集諦即所能趣生及業惑清淨法者謂滅道諦即所能證𣵀槃及道彼二皆依此識而有依轉識等理不成故此約染淨釋頌證第八之自體也初總釋四句次別釋二句三結證以理自性者界即性也總別者次句總依止後二句別依止也即所能趣生及業惑者集諦即能趣惑業苦諦即趣生也即所能證𣵀槃及道者道諦即能證得道滅諦即所證𣵀槃也彼二皆依此識而有者以性是無記可與染淨為所依止依轉識等理不成故者以通善染不能與二俱作所依也是則即染淨之法觀依止之用即依止之用觀依止之體豈不即染淨依止之用而證有第八之自體乎四約三性釋或復初句顯此識體無始相續後三顯與三種自性為所依止謂依他起遍計所執圓成實性如次應知此約三性釋頌證第八之自體也如次應知者次句是依他性一切諸法皆依緣所生故三句是遍計性諸趣皆以分別周遍計度而有故四句是圓成性道滅二諦皆清淨法故總之頌意是顯此識自體無始相續故能與三自性為所依止豈非證有第八自體三結歸第八今此頌中諸所說義離第八識皆不得有此反結有第八以竟引頌之意也頌𨿽四句義說多種不離第八若離第八因緣慿誰而有染淨無地三性無依矣豈皆得而有耶此頌之可證其有一也二重引頌二初引頌文二釋頌意初引頌文即彼經中復作是說由攝藏諸法一切種子識故名阿賴耶勝者我開示二釋頌義三初釋前三句二釋後一句三結歸第八初釋前三句由此本識具諸種子故能攝藏諸雜染法依斯建立阿賴耶名非如勝性轉為大等種子與果體非一故能依所依俱生滅故與雜染法互相攝藏亦為有情執藏為我故說此識名阿賴耶此釋次頌之名證有第八自體也初約持熏釋二約簡異釋三約三藏釋具諸種子即持種識攝藏諸法即受熏義以此持種故能受熏以此持熏二義建立阿賴耶名簡異者數論謂勝性轉為大等二十三法因果𨿽殊而體是一果𨿽生滅而體是常今則能生種子與現行果體非一故非如彼體是一也能依諸法與所依識俱生滅故非如彼之果生滅而體是常也三藏者據能持種則種名所藏識為能藏據所熏依則染法名能藏此識為所藏故云與雜染法互相攝藏亦為有情執為自我則名執藏具此三藏故說此識名阿賴耶二釋後一句已入見道諸菩衆得真現觀名為勝者彼能證解阿賴耶識故我世尊正為開示或諸菩皆名勝者𨿽見道前未能證解阿賴耶識而能信解求彼轉依故亦為說釋頌所為機證第八於證解之人也初約地上釋次約地前釋見道即初地真現觀對地前似現觀言彼能證解者以得根後二智如實了知故也正為開示者𨿽能分覺猶未窮源故須開示教與機逗也或諸菩皆名勝者則不必局於真現觀名勝也而能信解者非全己智力依教生信解也轉依者本識能持染淨法種與染淨俱為所依聖道轉令捨染得淨名轉依也求彼轉依者謂資糧位等諸菩𨿽未實證賴耶而能依教信解於唯識義發大勇猛求彼轉依之果故也亦為開示𨿽非是正或可進於證也三結歸第八非諸轉識有如是義結諸義歸於識以竟重引頌文之意也非諸轉識有如是義是賴耶識有如是義也既由如是受熏持種三藏之義以定名豈不即如是受熏持種三藏之名以證體乎此頌之可證其有二也三深密頌三初引頌二釋義三結歸初引頌解深密經亦作是說阿陀那識甚深細一切種子如暴流我於凡愚不開演恐彼分別執為我二釋義以能執持諸法種子及能執受色根依處亦能執取結生相續故說此識名阿陀那無性有情不能窮底故說甚深趣寂種性不能通逹故名甚細是一切法真實種子緣擊便生轉識波浪恆無間斷猶如暴流凡即無性愚即趣寂恐彼於此起分別執墮諸惡趣障生聖道故我世尊不為開演此釋第三頌義以證有第八識也執持執受執取三義名阿陀那執持不失多如上說執受色根及根依處者安危共同盡壽隨轉曰執受以一不執受色根爛壞故也執取結生者結是繫屬生即受生於母胎中一念受生即繫屬彼相續者不斷義於諸趣中捨生趣生皆由此識而得相續如經云阿陀那識若不入母胎者不應和合成羯羅藍等鐵如父母精血第八如磁毛石一剎那頃便攬而住同時根塵等種從自識中亦生現行名執取結生而雜集謂命終心與自體愛相應是相續力名結生相續生欲界者即以欲界自體愛相應命終心結生相續色無色餘處皆然而有九種此自體愛唯是俱生不了所緣境有覆無記性攝而能分別我自體生差別境界由此𫝑力諸異生輩令無間中有相續至未欲聖者已離聖者諸菩等之不同豫走筆至此而知第七為害於生中殊為可恨蓋自體愛即第七而命終心即第八八與七相依不離曰相應也無性即闡提趣寂即聲聞為此漂蕩而不出離曰不能窮底為此淪溺而不覺了曰不能通逹真實者親生現行非外榖麥等假種子也恆無間斷者𨿽遇緣生識而此識自體恆無間斷如暴流水𨿽遇風擊起諸波浪而流不斷也起分別執者以未遇聖教恆起俱生今聽法音深妙不能領解復起邪執妄計即分別我也墮惡障生者以分別我執是惡趣之因聖道之障故佛杜口不使過生三結歸唯第八識有如是相結歸第八竟第三引頌之意也如是執持執受執取等相既唯有於第八豈非有第八識乎此頌之可證其有者三也四楞伽頌入楞伽經亦作是說如海遇風緣起種種波浪現前作用轉無有間斷時藏識海亦然境等風所擊恆起諸識浪現前作用轉眼等諸識無如大海恆相續轉起諸識浪故知別有第八識性此等無量大乘經中皆別說有此第八識此第四引頌證有第八識也初引二釋三結如文易見初引四頌竟二顯聖量二初約比量證二引七因證初約比量證諸大乘經皆順無我違數取趣棄背流轉趣向還滅讃佛法僧毀諸外道表蘊等法勝性等樂大乘者許能顯示無顛倒理契經攝故如增一等至教量攝顯大乘是至教量證所引頌第八之不必疑也初顯契理次顯契機三顯比量承上已引止於四頌未引尚有多經汝小乘信阿含等為至教量不信有第八識若知大乘亦至教量當信有第八識也何則大乘義理分齊小乘固不能及小乘義理分齊大乘未始其不具也使小乘契理契機而大乘有所不契非至教量攝今則順違皆同背向皆同讃毀皆同表無不皆同何其契理樂大乘者許能顯示無倒正理何其契機既機理之皆契亦同至教量攝也是故增一等是至教量攝契經攝故如大乘等大乘亦至教量攝契經攝故如增一等教量既同信胡容異然則大乘之教說有第八不必疑也二約七因證又聖慈氏以七種因證大乘經真是佛說一先不記故若大乘經佛滅度後有餘為壞正法故說何故世尊非如當起諸可怖事先預記別二本俱行故大小乘教本來俱行寧知大乘獨非佛說三非餘境故大乘所說廣大甚深非外道等思量境界彼經論中曾所未說設為彼說亦不信受故大乘經非非佛說四應極成故若謂大乘是餘佛說非今佛語則大乘教是佛所說其理極成五有無有故若有大乘即應信此諸大乘教是佛所說離此大乘不可得故若無大乘聲聞乘教亦應非有以離大乘决定無有得成佛義誰出於世說聲聞乘故聲聞乘是佛所說非大乘教不應正理六能對治故依大乘經勤修行者皆能引得無分別智能正對治一切煩𢚰故應信此是佛所說七義異文故大乘所說意趣甚深不可隨文而取其義便生誹謗謂非佛語是故大乘真是佛說如莊嚴論頌此義言先不記俱行非餘所行境極成有無有對治異文故此復引多因重證第八之不必疑也初標舉次別釋三總頌承上不獨以比量證大乘是至教量攝所說第八不必有疑又慈氏多因證大乘真是佛說則所說第八尤不必疑地上已當仰信况慈氏乎一因已當仰信况多至於七因乎教量既至因證更多餘疑斷斷當永釋矣上初大乘四頌竟二餘乘四部二初總標二別明初總標餘部經中亦密意說阿賴耶識有別自性從此至結引小乘諸部證有第八識也承上至教量攝慈氏七因皆約大乘證有至若小乘諸部將謂必無可證孰知餘部𨿽非顯說亦密說此識有別自性乎是則不惟大乘可證即汝本部亦可證矣何必疑也二別明四初大衆部二上座部三化地部四說有部初大衆部謂大衆部阿笈摩中密意說此名根本識是眼識等所依止故譬如𣗳根是莖等本非眼等識有如是義指小教密說第八為根本識也大衆部者老少共集之律部阿笈摩者律部中經也密說者恐其分別執為我兾其機至而忽解也名根本識至是莖等本笈摩之詞密說此名根本等論主釋笈摩之意非眼等識有如是義者以小乘錯解根本執無第八故破云非意以五識姑不必言縱第六亦是莖中攝故何有於根本也耶二上座部上座部經分別論者俱密說此名有分識有謂三有分是因義唯此恆遍為三有因指小教密說第八為有分識也上座部老𪧐共集之律部經即此部中經也分別論者造論釋經之人俱密說者經論意符亦恐分別執為我又兾其時至而忽解也有既三有分既因義有因之識豈間斷不遍者所能唯此第八恆遍故為三有因也三化地部化地部說此名窮生蘊離第八識無別蘊法窮生際無間斷時謂無色界諸色間斷無想天等餘心等滅不相應行離色心等無別自體已極成故唯此識名窮生蘊指小教密說第八名窮生蘊也蘊有三種一一念頃蘊謂一剎那有生滅法二一期生蘊謂生乃至恆隨轉法三窮生蘊謂乃至得金剛際喻定恆隨轉法諸色間斷色蘊不窮生餘心間斷受想等四蘊不窮生不相應行無別自體不窮生唯第八遍於三界九地有生處即以此為依止直至金剛心末煩𢚰盡時方捨故名窮生蘊四說有部三初引文略釋二約義廣釋三結歸第八初引文略釋說一切有部增一經中亦密意說此名阿賴耶謂愛阿賴耶樂阿賴耶欣阿賴耶喜阿賴耶謂阿賴耶識是貪總別三世境故立此四名指小教密說第八名賴耶識也初增一文次論主釋總別者愛是總句總緣三世境故餘三是別別緣三世境故樂樂現在正生賴耶欣欣過去已生賴耶喜喜未來當生賴耶有此總別故立四名二約義廣釋三初標釋正義二別簡諸非三總結愛處初標釋正義有情執為真自內我乃至未斷恆生愛著故阿賴耶識是真愛著處不應執餘五取蘊等釋第八為真愛著處餘非真愛著處也執為真等者有情剎那剎那執第八見分為我不應執餘五取蘊等者不應執賴耶之外餘五取蘊等為賴耶也以有一類異解者謂佛所說衆生愛阿賴耶乃至廣說五取蘊名賴耶等有餘復謂貪俱樂受名賴耶等故今總簡不應執等別簡非處又總以該別故但約愛處而樂欣喜三自在其中矣二別簡諸非謂生一向苦受處者於餘取蘊不生愛著彼恆厭逆餘五取蘊念我何時當捨此命此衆同分此苦身心令我自在受快樂故五欲亦非真愛著處謂離欲者於五妙欲𨿽不貪著而愛我故樂受亦非真愛著處謂離第三靜慮染者𨿽厭樂受而愛我故身見亦非真愛著處謂非無學信無我者𨿽於身見不生貪著而於內我猶生愛故轉識等亦非真愛著處謂非無學求滅心者𨿽厭轉識等而愛我故色身亦非真愛著處離色染者𨿽厭色身而愛我故不相應行離色心等無別自體是故亦非真愛著處簡諸非愛著處顯賴耶是真愛著處也文分七節初簡去取蘊二簡去五欲三簡去樂受四簡去身見五簡去轉識六簡去色身七簡不相應行承上不應執餘五取蘊等者謂餘取蘊五欲樂受身見乃至不相應行皆非真愛著處也一向苦受處者謂極熱等獄及三苦趣也餘取蘊對賴耶言念我何時當捨此等者正於餘取生厭而不愛令我自在受快樂者正於賴耶是真愛著處也離欲者指不還果已斷欲界煩𢚰名離欲之人於五妙欲不生貪著正五欲非真愛著處𨿽不貪著以惑未窮盡而愛我故正於賴耶真愛著處也四禪苦樂二心俱時頓捨名樂受非真愛著處者𨿽厭樂受而愛我故正於賴耶真愛著處也非無學謂有學也於外身見不生貪著正於身見非真愛著處𨿽於身見不生貪著而於內我猶生愛故正於賴耶真愛著處也求滅心者入滅盡定與入無想也厭轉識等正轉識非真愛著處𨿽厭轉識而愛我故正於賴耶之真愛著處也離染色等者或無學聖及諸凡夫厭離有色求無色處正色身非真愛著處𨿽厭色身而愛我故正於賴耶是真愛著處也既離色心無別自體故不相應行亦非真愛著處是則處處推窮非愛處處非愛愛我不應執餘五取蘊等豈徒言哉三總結愛處異生有學起我愛時𨿽於餘蘊有愛非愛而於此識我愛定生故唯此是真愛著處結定我愛以賴耶是真愛處也於餘蘊中有愛非愛猶有未可定而於此識我愛定生更無不可决者矣故唯此是真愛著處前云阿賴耶識是真愛著豈徒言哉三結歸第八由是彼說阿賴耶名定唯顯此阿賴耶識决名於識結顯第八竟引釋之意也由是由正釋之既明簡別之愈悉結定之更而彼說四名唯顯第八豈有他哉是則大乘四頌已當不疑况證之以至教量乎慈氏七因更當氷釋况又餘乘之四部乎第八之疑不容再矣以上引聖教竟二引正理二初結前起後二詳顯正理初結前起後已引聖教當顯正理二詳顯正理二初引經文二總結勸初引經文十初持種心至十染淨心初持種心七初引經證二比量釋三破識類四破色心五破過未六破空理七結持種初引經證謂契經說雜染清染諸法種子之所集起故名為心若無此識彼持種心不應有故引經顯理證有此識為持種心也初引經二證成理即經中之理會文切理而為證非離經別有理為證也心不自心集種起現名心種非自種必有持種之識故論主推云持種心即第八識若無此識彼持種心不應有故然則既有集起心必有持種識也明矣二比量釋謂諸轉識在滅定等有間斷故根境作意善等類別易脫起故如電光等不堅住故非可熏習不能持種非染淨種所集起心此識一類恆無間斷如苣蕂等堅住可熏契當彼經所說心義若不許有能持種心非但違經亦違正理謂諸所起染淨品法無所熏故不熏成種則應所起唐捐其功染淨起時既無因種應同外道執自然生色不相應非心性故如聲光等理非染淨內法所熏豈能持種又彼離識無實自性寧可執為內種依止轉識相應諸心所法如識間斷易脫起故不自在故非心性故不能持種亦不受熏故持種心理應別有比量其理證有第八持種心也初量轉識不能受熏持種謂在滅定無心位中有間斷故不能持種在有心位根境作意等緣善等三性類別易脫起故猶如電光性非堅住非可受熏二量第八是持種心順量則一類異於脫起既可受熏無斷非彼間斷又能持種契當彼經所說心義反量若不許有能持種心非但違前所引聖教亦違此中所引正理亦且有現行不熏成種之失無因自然而生之失是以許有方無此過三量色不相應非持種心以色非心性不相應行無實體故猶如聲光理非受熏豈能持種又此是識變無體是假非內種依豈能持種四量轉識心所非持種心以間斷易脫有無心位既與轉識相同况不自在非心性故豈能受熏持種故以理論應當別有第八為持種心也三破識類有說六識無始時來依根境等前後分位事𨿽轉變而類無別是所熏習能持種子由斯染淨因果皆成何要執有第八識性彼言無義所以者何執類是實則同外道許類是假便無勝用應不能持內法實種又執識類何性所攝若是善惡應不受熏許有記故猶如擇滅若是無記善惡心時無無記心此類應斷非事善惡類可無記別類必同別事性故又無心位此類定無既有間斷性非堅住如何可執持種受熏又阿羅漢或異生心識類同故應為諸染無漏法熏許便有失又眼等根或所餘法與眼等識根法類同應互相熏然汝不許故不應執識類受熏又六識身若事若類前後二念既不俱有如隔念者非互相熏能熏所熏必俱時故執唯六識俱時轉者由前理趣既非所熏故彼亦無能持種義以理推破識類受熏持種之異執也文分八節初敘執識類受熏持種次下七節皆破識類受熏持種初敘執中事謂善惡等事如下文云非事善惡別事性故類謂相似以前念後念識之品類是相似故依根境等前後分位事𨿽轉變而類無別者依根境等緣所生之識以善惡三性別故前後分位轉變不同然事𨿽轉變善惡有別而眼至意識之類無善惡等別也意以前念六識𨿽滅於後念中𭘧起相似六識如谷之響聲𨿽已滅而響猶存名之為類即此識類是所熏習能持種子因果皆成反破前云何要執有第八識性蓋執五識為能熏六識為所熏無第八識為所熏也二約假實破識類謂執類是實過同外道許類是假便無勝用豈能持於內法實種而執識類受熏持種者何也三約三性破識類以若善惡類攝則有記同於擇滅應不受熏若無記類攝則善惡心時此類應斷亦無受熏非事善惡類可無記以別類必同別事性故既是別類何成所熏而謂識類受熏持種者何也四約無心破識類謂無心位既無六識此類定無無則間斷非堅如何持受而謂識類受熏持種者何也五約聖凡破識類謂識類既同聖凡無異聖凡無異羅漢應受染熏異生應受淨熏許之否耶許則羅漢應名異生異生當名羅漢如斯大失汝豈能許而許識類受熏持種者何也六約根法破識類謂眼等諸根色等餘法與眼等識同無記類無記類同受熏宜等識類既許受熏根法亦應受熏然汝不許根法而許識類受熏持種者何也七約不同時破識類謂能所熏習必得同時汝既執事類前後二念則不得俱有無二剎那一時而有無一時中二眼識並既不俱生必不俱滅不俱生滅如隔念者非互熏習而謂識類受熏持種者何也八約執同時破識類俱時者前五為能熏第六為所熏由同時轉故熏習義成能持種子執唯俱轉者信有第六不信有第八識也破云由前理趣等者謂第六無心位時既有間斷性非堅住無所熏義豈能持種而執識類受熏持種者何也四破色心有執色心自類無間前為後種因果義立故先所說為證不成彼執非理無熏習故謂彼自類既無熏習如何可執前為後種又間斷者應不更生二乘無學應無後蘊位色心為後種故亦不應執色心展轉互為種生轉識色等非所熏習前已說故以理破色心自類前為後種之執也文分四節初敘彼執情次破無熏習三破有間斷四破彼轉救有執者經部師也自類無間者色以色為自類心以心為自類前後相續無間隔也前為後種者前剎那色能為種子後剎那色因彼而生也前為後種前因義立後因前生後果義立心亦然也故先所說集起名心為染淨種為證不成不知前滅後生但是現引現非種生現何可執前便為後種故次破云名為種子必藉熏生自類無熏如何可執前為後種此執之非理者一也又間斷者應不更生前為後因引生後念五位無心斷滅不續應不更生矣二乘無學最後色心是有漏攝必定永斷應不𢌞心更受後蘊及意生身矣以彼不以第八為種以位色心為後種故位既無色心以何為種能生後蘊故曰應無此執之非理者二也縱執無色尚有心在無想猶有身存色心互為種生彼定起退沒非無色心亦不應也以色法不能熏心種心法不能熏色種轉識色等非所熏習前已破故此執之非理者三也我故曰彼執非理五破過未有說三世諸法皆有因果感赴無不皆成何勞執有能持種識然經說心為種子者起染淨法𫝑用強故彼說非理過去未來非常非現如空華等非實有故又無作用不可執為因緣性故若無能持染淨識種一切因果皆不得成以理破三世因果無種子之執也初敘執情次破執情執意蓋謂執有持種識者不過為成因果故耳今三世諸法皆是實有過因現果現因來果因感果赴無不皆成何勞別執有持種識此立己執而破他宗也然經說心為種者約起染淨𫝑用強故之義而說非謂實有種子此釋經義而非論主引解之不當也破意蓋謂汝說三世實有因果皆成可以為因緣性不勞執有持種識一切因果皆得成者亦寧知所說之非理乎良以過去已滅故非常未來未至故非現如空中華既無實體焉有作用而可執以為因緣性耶無持種識則無種子無種無因無因無果一切因果皆不得成矣持種之識果可無耶我故曰彼說非理六破空理有執大乘遣相空理為究竟者依似比量無此識及一切法彼特違害前所引經智斷證修染淨因果皆執非實成大邪見外道毀謗染淨因果亦不謂全無但執非實故若一切法皆非實有菩不應為捨生精勤修集菩提資糧誰有智者為除幻敵求石女兒用為軍旅破以空理為究竟無第八之執也初敘彼執情次展轉推破遣相空理者般若廣談空理為凡愚著相不了真實遣彼著心耳有餘不能正解對治之法以為究竟依相似比量亦遣無此識及一切法皆無所有名為合於空理而不知其所之非但有違害成大邪見反正智耳何則佛經名至教量日可令冷月可令熱說不可變彼乃歷證此識汝則遣此識是違害前所引經矣可乎起智斷惑修因證果染淨諸法外道亦不全為無但毀染因不招惡果淨因不招善果如空華等因果皆虛耳今汝全為無是尤甚於外道而成大邪見矣可乎菩為捨生之敵整資糧之旅非虛事也若一切法皆非實有是諸智者為捨幻敵求石女兒用為軍旅反正智矣可乎聖經必不可違邪見必不可成正智